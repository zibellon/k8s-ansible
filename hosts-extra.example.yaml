    # Дополнительные ExternalSecrets для seaweedfs (per-project S3 IAM creds и др.)
    # Пример:
    eso_vault_integration_seaweedfs_secrets_extra:
      - external_secret_name: "eso-seaweedfs-custom"
        vault_path: "/seaweedfs/custom/creds"
