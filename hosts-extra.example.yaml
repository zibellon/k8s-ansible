# =============================================================================
# hosts-extra.yaml — дополнительные Vault политики, роли и ESO secrets
# =============================================================================
# Этот файл НЕ входит в git (добавлен в .gitignore).
# Скопируй этот шаблон: cp hosts-extra.yaml.example hosts-extra.yaml
#
# Использование:
#   ansible-playbook -i hosts.yaml -i hosts-extra.yaml playbook-app/vault-policy-sync.yaml
#
# Правила именования:
#   - Имена политик/ролей НЕ должны совпадать с именами в vault_policies/vault_roles в hosts.yaml.
#   - external_secret_name и target_secret_name в *_secrets_extra НЕ должны совпадать
#     с уже определёнными в *_secrets в hosts.yaml для того же компонента.
#   - Расширить можно только массив секретов (*_secrets_extra).
#     Конфигурацию SecretStore (eso_vault_integration_XXX) изменить нельзя.
#   - При конфликте имён playbook упадёт с ошибкой.
# =============================================================================

all:
