    # Дополнительные ExternalSecrets для ArgoCD (включая git-ops credentials).
    # SA eso-main + SecretStore eso-main.vault (namespace argocd).
    # Git-ops credentials требуют ArgoCD-специфичных labels в body.target.template.metadata.labels:
    #   argocd.argoproj.io/secret-type: repo-creds  — pattern credentials (wildcard URL match)
    #   argocd.argoproj.io/secret-type: repository  — direct credentials (exact URL)
    # Пример (все доступные варианты):
    eso_vault_integration_argocd_secrets_extra:
      # Произвольный секрет (dataFrom extract), без ArgoCD-специфичных labels
      - external_secret_name: "eso-argocd-custom"
        vault_path: "/argocd/custom/creds"
        refresh_interval: "1m"
        body:
          target:
            name: "eso-argocd-custom"
          dataFrom:
            - extract:
                key: "{{ eso_vault_integration_argocd.kv_engine_path }}/data/argocd/custom/creds"

      # git-ops credential template (label: repo-creds — wildcard URL match)
      - external_secret_name: "eso-argocd-git-ops-repo-pattern"
        vault_path: "/argocd/git-ops/repo-pattern"
        refresh_interval: "1m"
        body:
          target:
            name: "eso-argocd-git-ops-repo-pattern"
            template:
              metadata:
                labels:
                  argocd.argoproj.io/secret-type: repo-creds
          dataFrom:
            - extract:
                key: "{{ eso_vault_integration_argocd.kv_engine_path }}/data/argocd/git-ops/repo-pattern"

      # git-ops repository (label: repository — exact URL or helm/OCI registry)
      - external_secret_name: "eso-argocd-git-ops-repo-direct"
        vault_path: "/argocd/git-ops/repo-direct"
        refresh_interval: "1m"
        body:
          target:
            name: "eso-argocd-git-ops-repo-direct"
            template:
              metadata:
                labels:
                  argocd.argoproj.io/secret-type: repository
          dataFrom:
            - extract:
                key: "{{ eso_vault_integration_argocd.kv_engine_path }}/data/argocd/git-ops/repo-direct"

    # Дополнительные ExternalSecrets для mon-system (Grafana admin creds и др.)
    # Пример:
    eso_vault_integration_mon_system_secrets_extra:
