    # Временные S3-секреты для Longhorn disaster recovery (без Vault/ESO)
    # Используются playbook-ами longhorn-s3-restore-create.yaml / longhorn-s3-restore-delete.yaml
    # Пример:
    longhorn_s3_restore_secrets:
      - name: "longhorn-s3-backup-creds"
        data:
          AWS_ACCESS_KEY_ID: "my-access-key"
          AWS_SECRET_ACCESS_KEY: "my-secret-key"
          AWS_ENDPOINTS: "https://s3.example.com"
          AWS_REGION: "us-east-1"

    # Переопределение списка ClusterIssuer (заменяет список из hosts.yaml целиком)
    # Формат: массив {name, spec} — name → metadata.name, spec → ClusterIssuer.spec (raw, as-is)
    cert_manager_cluster_issuers:
      - name: "acme-prod"
        spec:
          acme:
            server: "https://acme-v02.api.letsencrypt.org/directory"
            email: "admin@example.com"
            privateKeySecretRef:
              name: "cluster-issuer-acme-prod-account-key"
            solvers:
              - http01:
                  ingress:
                    ingressClassName: "traefik-lb"
                    ingressTemplate:
                      metadata:
                        annotations:
                          "kubernetes.io/ingress.class": "traefik-lb"
                          "traefik.ingress.kubernetes.io/router.entrypoints": "web"
                    podTemplate:
                      metadata:
                        labels:
                          app.kubernetes.io/name: acme-solver
                          app.kubernetes.io/instance: traefik-lb
                          app.kubernetes.io/component: acme-http01-solver
                          app.kubernetes.io/managed-by: cert-manager
      - name: "cluster-issuer-acme-staging"
        spec:
          acme:
            server: "https://acme-staging-v02.api.letsencrypt.org/directory"
            email: "admin@example.com"
            privateKeySecretRef:
              name: "cluster-issuer-acme-staging-account-key"
            solvers:
              - http01:
                  ingress:
                    ingressClassName: "traefik-lb"
                    ingressTemplate:
                      metadata:
                        annotations:
                          "kubernetes.io/ingress.class": "traefik-lb"
                          "traefik.ingress.kubernetes.io/router.entrypoints": "web"
                    podTemplate:
                      metadata:
                        labels:
                          app.kubernetes.io/name: acme-solver
                          app.kubernetes.io/instance: traefik-lb
                          app.kubernetes.io/component: acme-http01-solver
                          app.kubernetes.io/managed-by: cert-manager

    # Дополнительные политики Vault (не связанные с ESO интеграциями)
    # Пример:
    vault_policies_extra:
      - name: my-custom-policy
        rules: |
          path "secret/data/my-app/*" { capabilities = ["read", "list"] }
          path "secret/metadata/my-app/*" { capabilities = ["read", "list"] }

    # Дополнительные роли Vault (не связанные с ESO интеграциями)
    # Пример:
    vault_roles_extra:
      - name: my-app-role
        bound_service_account_namespaces: my-app
        bound_service_account_names: my-app-sa
        policies:
          - my-custom-policy
        ttl: "{{ vault_roles_default_ttl }}"

    # Дополнительные ExternalSecrets для Traefik
    # Поле body содержит всё тело spec начиная с target: (рендерится через toYaml as-is).
    # Пример (плоский default — target.name + dataFrom.extract.key):
    eso_vault_integration_traefik_secrets_extra:
      - external_secret_name: "eso-traefik-my-secret"
        vault_path: "/traefik/my-secret"
        body:
          target:
            name: "eso-traefik-my-secret"
          dataFrom:
            - extract:
                key: "{{ eso_vault_integration_traefik.kv_engine_path }}/data/traefik/my-secret"

    # Дополнительные ExternalSecrets для HAProxy
