    # Дополнительные ExternalSecrets для ArgoCD Git-Ops (git repo credentials)
    # Обрабатываются argocd-git-ops/pre chart (SA: eso-argocd-git-ops, namespace: argocd)
    # Допустимые типы: "default", "git_ops_repo_pattern", "git_ops_repo_direct"
    #
    # git_ops_repo_pattern — label: repo-creds (credential template для всех репо по URL-префиксу)
    # git_ops_repo_direct  — label: repository (конкретный репозиторий или helm/OCI реестр)
    # default      — произвольный секрет, без ArgoCD-label
    #
    # Vault-ключи (имена совпадают с полями ArgoCD Secret напрямую):
    #   git SSH:       type="git", url, sshPrivateKey
    #   git userpass:  type="git", url, username, password
    #   helm repo:     type="helm", name, url, username*, password*  (* не добавлять если публичный)
    #   helm OCI:      type="helm", name, url, username*, password*, enableOCI="true"
    eso_vault_integration_argocd_git_ops_extra:
      secrets: []
    # Пример (все доступные типы):
    # eso_vault_integration_argocd_git_ops_extra:
    #   secrets:
    #
    #     # ── type: git_ops_repo_pattern ────────────────────────────────────────────────
    #     # label: repo-creds — credential template для всех репо по URL-префиксу
    #     # Vault path must contain: type, url, sshPrivateKey (или username + password)
    #     - external_secret_name: "eso-git-ops-repo-creds-gitlab"
    #       target_secret_name: "eso-git-ops-repo-creds-gitlab"
    #       vault_path: "/argocd/git-ops/repo-creds-gitlab/creds"
    #       refresh_interval: "1m"
    #       type: "git_ops_repo_pattern"
    #
    #     # ── type: git_ops_repo_direct (git SSH) ───────────────────────────────────────
    #     # label: repository — конкретный репозиторий
    #     # Vault path must contain: type, url, sshPrivateKey
    #     - external_secret_name: "eso-git-ops-my-repo-ssh"
    #       target_secret_name: "eso-git-ops-my-repo-ssh"
    #       vault_path: "/argocd/git-ops/my-repo-ssh/creds"
    #       refresh_interval: "1m"
    #       type: "git_ops_repo_direct"
    #
    #     # ── type: git_ops_repo_direct (git userpass) ─────────────────────────────────
    #     # label: repository — конкретный репозиторий
    #     # Vault path must contain: type, url, username, password
    #     - external_secret_name: "eso-git-ops-my-repo-https"
    #       target_secret_name: "eso-git-ops-my-repo-https"
    #       vault_path: "/argocd/git-ops/my-repo-https/creds"
    #       refresh_interval: "1m"
    #       type: "git_ops_repo_direct"
    #
    #     # ── type: git_ops_repo_direct (helm repo) ────────────────────────────────────
    #     # label: repository — helm chart repository
    #     # Vault path must contain: type, name, url, username*, password*
    #     - external_secret_name: "eso-git-ops-helm-argo"
    #       target_secret_name: "eso-git-ops-helm-argo"
    #       vault_path: "/argocd/git-ops/helm-argo/creds"
    #       refresh_interval: "1m"
    #       type: "git_ops_repo_direct"
    #
    #     # ── type: git_ops_repo_direct (helm OCI) ─────────────────────────────────────
    #     # label: repository — OCI-реестр как источник Helm-чартов
    #     # Vault path must contain: type, name, url, username*, password*, enableOCI="true"
    #     - external_secret_name: "eso-git-ops-helm-oci-registry"
    #       target_secret_name: "eso-git-ops-helm-oci-registry"
    #       vault_path: "/argocd/git-ops/helm-oci-registry/creds"
    #       refresh_interval: "1m"
    #       type: "git_ops_repo_direct"

    # ArgoCD ConfigMaps — расширение кастомными ключами
    # Каждая переменная независима: можно переопределить только нужную в hosts-extra.yaml
    # Заполнить ssh_known_hosts после установки GitLab:
    #   kubectl exec -n argocd deploy/argocd-repo-server -- ssh-keyscan -p 3714 gitlab-gitlab-shell.gitlab.svc.cluster.local
    argocd_cm_ssh_known_hosts_extra: []
    argocd_cm_extra: {}
    argocd_cm_cmd_params_extra: {}
    argocd_cm_gpg_keys_extra: {}
    argocd_cm_notifications_extra: {}
    argocd_cm_rbac_extra: {}
    argocd_cm_tls_certs_extra: {}
    # Пример: добавить SSH ключи GitLab (переопределить только эту переменную)
    # argocd_cm_ssh_known_hosts_extra:
    #   - "[gitlab-gitlab-shell.gitlab.svc.cluster.local]:3714 ecdsa-sha2-nistp256 AAAA..."
    #   - "[gitlab-gitlab-shell.gitlab.svc.cluster.local]:3714 ssh-ed25519 AAAA..."
    #   - "[gitlab-gitlab-shell.gitlab.svc.cluster.local]:3714 ssh-rsa AAAA..."
    # Пример: добавить только RBAC политики
    # argocd_cm_rbac_extra:
    #   policy.default: "role:readonly"

