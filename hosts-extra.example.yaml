# =============================================================================
# hosts-extra.yaml — дополнительные Vault политики, роли и ESO secrets
# =============================================================================
# Этот файл НЕ входит в git (добавлен в .gitignore).
# Скопируй этот шаблон: cp hosts-extra.yaml.example hosts-extra.yaml
#
# Использование:
#   ansible-playbook -i hosts-vars/ -i hosts-vars-override/ playbook-app/<c>-install.yaml
#
# Где хранятся базовые ESO-интеграции:
#   Базовые списки eso_vault_integration_<c>_secrets и объект eso_vault_integration_<c>
#   теперь живут в hosts-vars/<c>.yaml рядом с остальной конфигурацией компонента.
#   Этот файл — шаблон ТОЛЬКО для *_extra overrides (расширение в hosts-vars-override/).
#
# Правила именования:
#   - Имена политик/ролей НЕ должны совпадать с именами в vault_policies/vault_roles в hosts-vars/vault.yaml.
#   - external_secret_name и body.target.name в *_secrets_extra НЕ должны совпадать
#     с уже определёнными в *_secrets в hosts-vars/<c>.yaml для того же компонента.
#   - Расширить можно только массив секретов (*_secrets_extra).
#     Конфигурацию SecretStore (eso_vault_integration_XXX) изменить нельзя.
#   - При конфликте имён playbook упадёт с ошибкой.
# =============================================================================

