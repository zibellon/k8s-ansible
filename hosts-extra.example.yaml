          dataFrom:
            - extract:
                key: "{{ eso_vault_integration_seaweedfs.kv_engine_path }}/data/seaweedfs/custom/creds"

    # SeaweedFS sync — дополнительные buckets + per-bucket quotas + per-bucket policies (full AWS IAM schema).
    # policy — OPTIONAL, один AWS IAM document на bucket; sync применяет через aws s3api put-bucket-policy.
    # CRITICAL — SeaweedFS 4.29 non-AWS deviations:
    #   - Principal — flat string или array, НЕ dict {AWS: ...}.
    #   - Resource — только этот bucket (no cross-bucket policy).
    #   - Только Allow statements (Deny блокирует и admin).
    #   - Account ID — wildcard '*'.
    # Пример (private bucket-1 для alice, bucket-2 без policy, public-read assets-public):
    seaweedfs_sync_buckets_extra:
      - name: bucket-1
        quota:
          enabled: true
          size: "100GiB"
        policy:
          Version: "2012-10-17"
          Statement:
            - Sid: "UserAliceObjects"
              Effect: "Allow"
              Principal: "arn:aws:iam::*:user/alice"
              Action:
                - "s3:GetObject"
                - "s3:PutObject"
                - "s3:DeleteObject"
              Resource: ["arn:aws:s3:::bucket-1/*"]
            - Sid: "UserAliceBucketOps"
              Effect: "Allow"
              Principal: "arn:aws:iam::*:user/alice"
              Action: ["s3:ListBucket"]
              Resource: ["arn:aws:s3:::bucket-1"]
      - name: bucket-2
        # quota опц, policy опц (admin может всегда, остальные — default-deny)
      - name: assets-public
        quota:
          enabled: true
          size: "10GiB"
        policy:
          Version: "2012-10-17"
          Statement:
            - Sid: "PublicReadObjects"
              Effect: "Allow"
              Principal: "*"
              Action: ["s3:GetObject"]
              Resource: ["arn:aws:s3:::assets-public/*"]
            - Sid: "PublicListBucket"
              Effect: "Allow"
              Principal: "*"
              Action: ["s3:ListBucket"]
              Resource: ["arn:aws:s3:::assets-public"]

    # SeaweedFS sync — дополнительные identities + extra Vault paths для distribute.
    # extra_vault_paths — OPTIONAL list of full Vault paths (с mount prefix). Sync
    # (--tags identity-distribute) дополнительно кладёт identity creds (fixed keys:
    # username, accessKey, secretKey) в каждый указанный путь, поверх mandatory
    # combined JSON в /seaweedfs/s3-config/all. Anonymous + extra_vault_paths → fail.
    # Пример (alice раздаётся в gitlab и team-alpha; bob — только combined JSON):
    seaweedfs_identities_extra:
      - name: alice
        actions: []
        extra_vault_paths:
          - "eso-secret/gitlab/s3-storage"
          - "secret/team-alpha/s3-creds"
      - name: bob
        actions: []

    # Дополнительные ExternalSecrets для zitadel (custom IdP/SAML connectors creds и др.)
    # Пример:
    eso_vault_integration_zitadel_secrets_extra:
      - external_secret_name: "eso-zitadel-custom"
        vault_path: "/zitadel/custom/creds"
        refresh_interval: "1m"
        body:
          target:
            name: "eso-zitadel-custom"
          dataFrom:
            - extract:
                key: "{{ eso_vault_integration_zitadel.kv_engine_path }}/data/zitadel/custom/creds"

    # ArgoCD: kustomize patches install phase — расширение upstream install.yaml.
    # Базовая часть в hosts-vars/argocd.yaml (argocd_kustomize_patches);
    # extra применяется ПОСЛЕ базовой (last-wins при конфликте data-ключей).
    # Поддерживаются strategic merge и JSON Patch (RFC 6902) — kustomize
    # определяет тип автоматически по содержимому patch.
    argocd_kustomize_patches_extra: []
    # Пример 1: расширить data ConfigMap argocd-cm своим ключом (strategic merge)
    # argocd_kustomize_patches_extra:
    #   - target:
    #       kind: ConfigMap
    #       name: argocd-cm
    #     patch: |-
    #       apiVersion: v1
    #       kind: ConfigMap
    #       metadata:
    #         name: argocd-cm
    #       data:
    #         users.session.duration: "240h"
    # Пример 2: изменить replicas Deployment argocd-server (JSON Patch RFC 6902)
    # argocd_kustomize_patches_extra:
    #   - target:
    #       kind: Deployment
    #       name: argocd-server
    #     patch: |-
    #       - op: replace
    #         path: /spec/replicas
    #         value: 3

    # Operator-side extension of mon_system_prometheus_operator_kustomize_patches.
    # Concat-merge at runtime (last-wins on conflicting kustomize targets).
    mon_system_prometheus_operator_kustomize_patches_extra: []

    # Переопределение ArgoCD git-ops приложений (заменяет argocd_git_ops_apps из hosts.yaml целиком)
    argocd_git_ops_apps:
      - name: "root-app-of-apps"
        project:
          sourceRepos: ["*"]
          sourceNamespaces: ["*"]
          destinations:
            - name: "*"
              namespace: "*"
              server: "*"
          clusterResourceBlacklist:
            - group: "*"
              kind: "*"
          namespaceResourceBlacklist:
            - group: "argoproj.io"
              kind: "AppProject"
            - group: "argoproj.io"
              kind: "Application"
          clusterResourceWhitelist:
            - group: ""
              kind: "Namespace"
          namespaceResourceWhitelist:
            - group: "apps"
              kind: "Deployment"
            - group: "apps"
              kind: "StatefulSet"
          orphanedResources:
            warn: false
          roles:
            - name: read-only
              description: "Read-only privileges"
              policies:
                - "p, proj:root-app-of-apps:read-only, applications, get, root-app-of-apps/*, allow"
              groups:
                - my-oidc-group
        apps:
          - name: "root-app-of-apps"
            repoURL: "ssh://git@gitlab-gitlab-shell.gitlab.svc.cluster.local:3714/server/git-ops.git"
            targetRevision: "master"
            path: "argocd-system"
            destinationServer: "https://kubernetes.default.svc"
            revisionHistoryLimit: 3
            retry:
              limit: 5
              backoff:
                duration: "20s"
                factor: 1
                maxDuration: "30s"
