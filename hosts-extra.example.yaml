    # SeaweedFS sync — managed IAM policies (Layer P / SECTION 1). Одна policy на consumer;
    # прикрепляется к identity через identity.policy_names (SECTION 2 ниже). Schema:
    #   name     — policy name (ссылается из identity.policy_names).
    #   document — AWS IAM doc {Version, Statement: [{Sid?, Effect: "Allow", Action, Resource}]}.
    #              Только Allow (explicit Deny блокирует и admin); Principal НЕ нужен (policy = на
    #              identity); Resource — bucket ARN(s) "arn:aws:s3:::<bucket>" + "arn:aws:s3:::<bucket>/*".
    # Пример (team-alpha-rw — full-access на bucket-1, прикрепляется к alice ниже):
    seaweedfs_managed_policies_extra:
      - name: team-alpha-rw
        document:
          Version: "2012-10-17"
          Statement:
            - Sid: "TeamAlphaFullAccess"
              Effect: "Allow"
              Action: ["s3:*"]
              Resource:
                - "arn:aws:s3:::bucket-1"
                - "arn:aws:s3:::bucket-1/*"

    # SeaweedFS sync — дополнительные buckets с owner + replication/rack/dataCenter + optional quota.
    # Schema per bucket: {name, owner, replication, rack, dataCenter, quota_size?}.
    #   owner       — SeaweedFS identity (SECTION 2), REQUIRED, IMMUTABLE. Доступ к данным — через
    #                 managed policy (SECTION 1), прикреплённую к identity (owner НЕ влияет на
    #                 policy-check; v14 — per-bucket policies + aws-cli helper удалены).
    #   replication — 3-digit code (REQUIRED), напр. "001" (+1 копия в том же rack).
    #   rack/dataCenter — preferred tier/DC (REQUIRED, soft, IMMUTABLE), напр. "workers-1"/"dc-1".
    #   quota_size  — OPTIONAL ("100GiB"/"5TiB"); нет → unlimited. Enforcement нативный (4.31+).
    # Public-read — через managed policy на identity 'anonymous' (SECTION 1+2), НЕ через bucket.
    # Пример (bucket-1 для alice с квотой, bucket-2 минимальный, assets-public для public-read):
    seaweedfs_sync_buckets_extra:
      - name: bucket-1
        owner: "alice"
        replication: "001"
        rack: "workers-1"
        dataCenter: "dc-1"
        quota_size: "100GiB"
      - name: bucket-2
        owner: "bob"
        replication: "001"
        rack: "workers-1"
        dataCenter: "dc-1"
      - name: assets-public
        owner: "alice"            # owner — любая identity; public-read задаётся managed policy на anonymous
        replication: "001"
        rack: "workers-1"
        dataCenter: "dc-1"
        quota_size: "10GiB"

    # SeaweedFS sync — дополнительные identities (per-key) для distribute.
    # keys[].vault_paths — OPTIONAL list of full Vault paths (с mount prefix). Sync
    # (--tags identity-distribute) кладёт creds ЭТОГО ключа (fixed keys: username,
    # accessKey, secretKey) в каждый указанный путь. access_key — operator-chosen plaintext
    # идентификатор (globally unique). Anonymous с ключом, несущим vault_paths → fail.
    # Пример (alice раздаётся в gitlab и team-alpha; bob — без distribute):
    seaweedfs_identities_extra:
      - name: alice
        actions: []
        policy_names: ["team-alpha-rw"]   # attached managed policy (SECTION 1 выше)
        keys:
          - access_key: "alice"
            vault_paths:
              - "eso-secret/gitlab/s3-storage"
              - "secret/team-alpha/s3-creds"
      - name: bob
        actions: []
        keys:
          - access_key: "bob"

