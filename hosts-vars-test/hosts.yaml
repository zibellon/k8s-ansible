          api_server_advertise_address: 192.0.2.11
          api_server_bind_port: 6443
          longhorn_node_tags:
            - "lh-manager"
            - "lh-major"

    workers:
      hosts:
        w1:
          ansible_host: 192.0.2.20
          ansible_user: test
          ansible_password: "test"
