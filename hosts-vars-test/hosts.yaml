# =============================================================================
# hosts-vars-test/hosts.yaml — synthetic inventory for tests
#
# Public, committed replacement for hosts-vars-override/hosts.yaml in the
# test environment. Used only by `make test` (Docker) targets. All values
# are fake — IPs from RFC 5737 TEST-NET-1 (192.0.2.0/24), passwords are
# literal "test". DO NOT put real values here.
# =============================================================================

all:
  children:
    managers:
      hosts:
        m1:
          ansible_host: 192.0.2.10
          ansible_user: test
          ansible_password: "test"
          new_hostname: m1
          is_master: true
          internal_ip: 192.0.2.10
          api_server_advertise_address: 192.0.2.10
          api_server_bind_port: 6443
          longhorn_node_tags:
            - "lh-manager"
            - "lh-major"

        m2:
          ansible_host: 192.0.2.11
          ansible_user: test
          ansible_password: "test"
          new_hostname: m2
          is_master: false
