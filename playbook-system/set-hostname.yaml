---
# =============================================================================
# Set hostname on server
# =============================================================================
# Usage:
#   ansible-playbook -i hosts-vars/ -i hosts-vars-override/ playbook-system/set-hostname.yaml --limit k8s-worker-1
# =============================================================================

- name: Set hostname on server
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: "Resolve master-manager and bastion facts"
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-set-master-manager.yaml"

    - name: Check current hostname
      command: hostname
      register: current_hostname_result
      changed_when: false

    - name: Set hostname
      command: hostnamectl set-hostname {{ new_hostname }}
      when: current_hostname_result.stdout != new_hostname
      register: hostname_change_result

    - name: Show result
      command: hostnamectl
      register: hostname_result
      changed_when: false

    - name: Print hostname info
      debug:
        msg: "{{ hostname_result.stdout_lines }}"

    - name: Compute reboot condition
      set_fact:
        set_hostname_needs_reboot: "{{ hostname_change_result is defined and hostname_change_result.changed }}"

    - name: Reboot servers if hostname changed
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-reboot-cluster.yaml"
      vars:
        dto_label_name: "set-hostname"
        dto_reboot_when_condition: "{{ set_hostname_needs_reboot }}"
