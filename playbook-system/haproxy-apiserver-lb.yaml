# =============================================================================
# HAProxy API Server Load Balancer (linux service)
# Installs and configures HAProxy as a systemd service on all nodes
# =============================================================================
# Usage:
#   ansible-playbook -i hosts.yaml playbook-system/haproxy-apiserver-lb.yaml --limit k8s-worker-1
#
# This playbook:
#   1. Installs haproxy via apt (pinned version, held from upgrades)
#   2. Creates /etc/haproxy/haproxy.cfg with all manager IPs
#   3. Enables and starts the haproxy systemd service
#   4. Waits for haproxy healthz to be ready
# =============================================================================

---
- name: Deploy HAProxy API Server LB
  hosts: all
  become: true
  gather_facts: false

  tasks:
    # =========================================================================
    # HAPROXY APT REPOSITORY
    # =========================================================================
    - name: Install software-properties-common
      apt:
        name: software-properties-common
        state: present
        install_recommends: false

    - name: Add HAProxy PPA
      command: add-apt-repository -y ppa:vbernat/haproxy-{{ haproxy_apiserver_lb_package_version }}
      changed_when: false

    # =========================================================================
    # INSTALL HAPROXY
    # =========================================================================
    - name: Install haproxy
      apt:
        name: "haproxy={{ haproxy_apiserver_lb_package_version }}*"
        state: present
        update_cache: true

    - name: Hold haproxy version
      command: apt-mark hold haproxy
      changed_when: false

    - name: Enable haproxy service
      systemd:
        name: haproxy
        enabled: true
        daemon_reload: true

    # =========================================================================
    # HAPROXY CONFIG
    # =========================================================================
    - name: Generate HAProxy config
      include_tasks: tasks/tasks-haproxy-lb-config-create.yaml

    # =========================================================================
    # RELOAD IF CONFIG CHANGED
    # =========================================================================
    - name: Reload haproxy service
      include_tasks: tasks/tasks-haproxy-lb-restart.yaml
      when: haproxy_config_result.changed

    # =========================================================================
    # WAIT FOR HAPROXY
    # =========================================================================
    - name: Wait for HAProxy to be ready
      include_tasks: tasks/tasks-haproxy-lb-health-wait.yaml
