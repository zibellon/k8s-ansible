# =============================================================================
# Update HAProxy config on all joined hosts
# =============================================================================
# Usage:
#   ansible-playbook -i hosts-vars/ -i hosts-vars-override/<cluster>/ playbook-system/utils/haproxy-apiserver-lb-update.yaml
#
# This playbook:
#   1. Checks which nodes are joined to cluster via kubectl on master_manager
#   2. Updates HAProxy config only on joined nodes (sequentially via serial: 1)
#   3. Skips nodes not yet joined (e.g., new node being added)
#
# Use case: Before adding a new manager, update HAProxy config on all existing
# hosts so they know about the new manager IP.
# =============================================================================

# =============================================================================
# PLAY 1: Check which nodes are joined (parallel)
# =============================================================================
---
- name: "HAProxy Update - Play 1: Check joined nodes"
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Find master manager
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-set-master-manager.yaml"
    - name: Check cluster initialization
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-set-is-cluster-init.yaml"
    - name: Check node join status
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-set-is-node-joined.yaml"
# =============================================================================
# PLAY 2: Update HAProxy config (serial: 1)
# =============================================================================
- name: "HAProxy Update - Play 2: Update config"
  hosts: all
  become: true
  gather_facts: false
  serial: 1

  tasks:
    - name: Generate HAProxy config
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-haproxy-lb-config-create.yaml"
      when: is_node_joined

    - name: Reload haproxy service
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-haproxy-lb-restart.yaml"
      when: is_node_joined and haproxy_config_result.changed

    - name: Wait for HAProxy ready
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-haproxy-lb-health-wait.yaml"
      when: is_node_joined

    - name: Print skip message for not joined nodes
      debug:
        msg: "SKIP: {{ inventory_hostname }} ({{ internal_ip }}) - not joined to cluster"
      when: not is_node_joined
