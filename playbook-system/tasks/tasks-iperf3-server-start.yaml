---
# =============================================================================
# Start iperf3 server in background (nohup-detached), wait for port to listen
# =============================================================================

- name: "[{{ dto_label_name }}] assert iperf3-server-start params"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
      - dto_iperf3_port is defined
      - dto_iperf3_port | string | length > 0
    fail_msg: "dto_label_name and dto_iperf3_port are required and must be non-empty"
  tags: [always]

- name: "[{{ dto_label_name }}] Start iperf3 server in background"
  # AUTHORIZED §2.1 #4 + #6: shell для nohup+redirect+&; async/poll 0 для detach
  shell: nohup iperf3 -s -p {{ dto_iperf3_port }} </dev/null >/tmp/iperf3-server-{{ dto_iperf3_port }}.log 2>&1 &
  async: 0
  poll: 0

- name: "[{{ dto_label_name }}] Wait for iperf3 server port {{ dto_iperf3_port }} to be listening"
  wait_for:
    port: "{{ dto_iperf3_port }}"
    state: started
    timeout: 10
