---
# =============================================================================
# Install containerd + kubeadm/kubelet/kubectl
# =============================================================================
# Usage:
#   ansible-playbook -i hosts-vars/ -i hosts-vars-override/<cluster>/ playbook-system/install-main-components.yaml --limit k8s-worker-1
# =============================================================================

- name: Install containerd + kubeadm/kubelet/kubectl
  hosts: managers:workers
  become: true
  gather_facts: false

  tasks:
    # =========================================================================
    # KUBERNETES APT REPOSITORY
    # =========================================================================
    - name: Install required packages for apt repo
      apt:
        name: "{{ apt_repo_package_list }}"
        state: present
        update_cache: yes

    # /etc/apt/keyrings already exists on Ubuntu 22.04+
    - name: Ensure /etc/apt/keyrings exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    # Key is re-downloaded on each run to support k8s version changes
    - name: Download Kubernetes apt key
      shell: >-
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key
        | gpg --batch --yes --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add Kubernetes apt repository
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: |
          deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /
        mode: '0644'

    # =========================================================================
    # CONTAINERD
    # =========================================================================
    - name: Pre-Check if containerd is installed
      command: which containerd
      register: containerd_pre_check
      changed_when: false
      failed_when: false

    - name: "[main-components] assert containerd install method"
      assert:
        that:
          - containerd_install_method in ["url", "local_tarball"]
          - (containerd_install_method != "local_tarball") or (containerd_local_tarball_path is defined and containerd_local_tarball_path | length > 0)
          - (containerd_install_method != "local_tarball") or (containerd_service_local_path is defined and containerd_service_local_path | length > 0)

    # =========================================================================
    # CONTAINERD — url branch
    # =========================================================================
    - name: Download containerd
      get_url:
        url: "{{ containerd_url }}"
        dest: /tmp/containerd.tar.gz
      when:
        - containerd_pre_check.rc != 0
        - containerd_install_method == "url"

    - name: Extract containerd to /usr/local
      unarchive:
        src: /tmp/containerd.tar.gz
        dest: /usr/local
        remote_src: yes
      when:
        - containerd_pre_check.rc != 0
        - containerd_install_method == "url"

    - name: Download containerd.service
      get_url:
        url: "{{ containerd_service_url }}"
        dest: /usr/lib/systemd/system/containerd.service
        mode: '0644'
      when: containerd_install_method == "url"

    # =========================================================================
    # CONTAINERD — local_tarball branch (offline, AirGap-friendly)
    # =========================================================================
    - name: Copy containerd tarball to /tmp
      copy:
        src: "{{ project_root }}/{{ containerd_local_tarball_path }}"
        dest: /tmp/containerd.tar.gz
        mode: '0644'
      when:
        - containerd_pre_check.rc != 0
        - containerd_install_method == "local_tarball"

    - name: Extract containerd from local tarball to /usr/local
      unarchive:
        src: /tmp/containerd.tar.gz
        dest: /usr/local
        remote_src: yes
      when:
        - containerd_pre_check.rc != 0
        - containerd_install_method == "local_tarball"

    - name: Cleanup containerd tarball
      file:
        path: /tmp/containerd.tar.gz
        state: absent
      when:
        - containerd_pre_check.rc != 0
        - containerd_install_method == "local_tarball"

    - name: Copy containerd.service from local file
      copy:
        src: "{{ project_root }}/{{ containerd_service_local_path }}"
        dest: /usr/lib/systemd/system/containerd.service
        mode: '0644'
      when: containerd_install_method == "local_tarball"

    - name: Enable and start containerd
      systemd:
        name: containerd
        enabled: yes
        state: started
        daemon_reload: yes

    # =========================================================================
    # RUNC
    # =========================================================================
    - name: Pre-Check if runc is installed
      command: which runc
      register: runc_pre_check
      changed_when: false
      failed_when: false

    - name: "[main-components] assert runc install method"
      assert:
        that:
          - runc_install_method in ["url", "local_file"]
          - (runc_install_method != "local_file") or (runc_local_path is defined and runc_local_path | length > 0)

    # =========================================================================
    # RUNC — url branch
    # =========================================================================
    - name: Download runc
      get_url:
        url: "{{ runc_url }}"
        dest: /tmp/runc.amd64
        mode: '0755'
      when:
        - runc_pre_check.rc != 0
        - runc_install_method == "url"

    - name: Install runc
      copy:
        src: /tmp/runc.amd64
        dest: /usr/local/sbin/runc
        mode: '0755'
        remote_src: yes
      when:
        - runc_pre_check.rc != 0
        - runc_install_method == "url"

    # =========================================================================
    # RUNC — local_file branch (offline, AirGap-friendly)
    # =========================================================================
    - name: Install runc from local file
      copy:
        src: "{{ project_root }}/{{ runc_local_path }}"
        dest: /usr/local/sbin/runc
        mode: '0755'
      when:
        - runc_pre_check.rc != 0
        - runc_install_method == "local_file"

    # =========================================================================
    # CNI PLUGINS
    # =========================================================================
    - name: Pre-Check if CNI plugins are installed
      stat:
        path: /opt/cni/bin/bridge
      register: cni_pre_check

    - name: "[main-components] assert cni_plugins install method"
      assert:
        that:
          - cni_plugins_install_method in ["url", "local_tarball"]
          - (cni_plugins_install_method != "local_tarball") or (cni_plugins_local_tarball_path is defined and cni_plugins_local_tarball_path | length > 0)

    - name: Create /opt/cni/bin directory
      file:
        path: /opt/cni/bin
        state: directory
        mode: '0755'

    # =========================================================================
    # CNI PLUGINS — url branch
    # =========================================================================
    - name: Download CNI plugins
      get_url:
        url: "{{ cni_plugins_url }}"
        dest: /tmp/cni-plugins.tgz
      when:
        - not cni_pre_check.stat.exists
        - cni_plugins_install_method == "url"

    - name: Extract CNI plugins
      unarchive:
        src: /tmp/cni-plugins.tgz
        dest: /opt/cni/bin
        remote_src: yes
      when:
        - not cni_pre_check.stat.exists
        - cni_plugins_install_method == "url"

    # =========================================================================
    # CNI PLUGINS — local_tarball branch (offline, AirGap-friendly)
    # =========================================================================
    - name: Copy CNI plugins tarball to /tmp
      copy:
        src: "{{ project_root }}/{{ cni_plugins_local_tarball_path }}"
        dest: /tmp/cni-plugins.tgz
        mode: '0644'
      when:
        - not cni_pre_check.stat.exists
        - cni_plugins_install_method == "local_tarball"

    - name: Extract CNI plugins from local tarball
      unarchive:
        src: /tmp/cni-plugins.tgz
        dest: /opt/cni/bin
        remote_src: yes
      when:
        - not cni_pre_check.stat.exists
        - cni_plugins_install_method == "local_tarball"

    - name: Cleanup CNI plugins tarball
      file:
        path: /tmp/cni-plugins.tgz
        state: absent
      when:
        - not cni_pre_check.stat.exists
        - cni_plugins_install_method == "local_tarball"

    # =========================================================================
    # CRICTL (cri-tools)
    # =========================================================================
    - name: Pre-Check if crictl is installed
      command: which crictl
      register: crictl_pre_check
      changed_when: false
      failed_when: false

    - name: "[main-components] assert crictl install method"
      assert:
        that:
          - crictl_install_method in ["url", "local_tarball"]
          - (crictl_install_method != "local_tarball") or (crictl_local_tarball_path is defined and crictl_local_tarball_path | length > 0)

    # ----- url branch -----
    - name: Download crictl
      get_url:
        url: "{{ crictl_url }}"
        dest: /tmp/crictl.tar.gz
      when:
        - crictl_pre_check.rc != 0
        - crictl_install_method == "url"

    - name: Extract crictl to /usr/local/bin
      unarchive:
        src: /tmp/crictl.tar.gz
        dest: /usr/local/bin
        remote_src: yes
      when:
        - crictl_pre_check.rc != 0
        - crictl_install_method == "url"

    # ----- local_tarball branch (offline, AirGap-friendly) -----
    - name: Copy crictl tarball to /tmp
      copy:
        src: "{{ project_root }}/{{ crictl_local_tarball_path }}"
        dest: /tmp/crictl.tar.gz
        mode: '0644'
      when:
        - crictl_pre_check.rc != 0
        - crictl_install_method == "local_tarball"

    - name: Extract crictl from local tarball to /usr/local/bin
      unarchive:
        src: /tmp/crictl.tar.gz
        dest: /usr/local/bin
        remote_src: yes
      when:
        - crictl_pre_check.rc != 0
        - crictl_install_method == "local_tarball"

    - name: Cleanup crictl tarball
      file:
        path: /tmp/crictl.tar.gz
        state: absent
      when:
        - crictl_pre_check.rc != 0

    # ----- config -----
    - name: Write /etc/crictl.yaml
      copy:
        dest: /etc/crictl.yaml
        content: |
          runtime-endpoint: unix:///run/containerd/containerd.sock
          image-endpoint: unix:///run/containerd/containerd.sock
          timeout: 10
        mode: '0644'

    # =========================================================================
    # CONTAINERD CONFIG
    # =========================================================================

    - name: Create /etc/containerd directory
      file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Check if containerd config exists
      stat:
        path: /etc/containerd/config.toml
      register: containerd_config_stat

    - name: Generate default containerd config
      shell: containerd config default > /etc/containerd/config.toml
      when: >-
        not containerd_config_stat.stat.exists or
        force_containerd_config_regenerate
      register: containerd_config_result

    - name: Enable SystemdCgroup in containerd config
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
      register: containerd_cgroup_result

    # =========================================================================
    # REGISTRY MIRRORS / ADDITIONAL CONFIGS
    # =========================================================================
    # Drop-in dir подход через `/etc/containerd/certs.d/<namespace>/hosts.toml`.
    # Containerd 2.x поддерживает special `_default` namespace — fallback для
    # всех registries без dedicated dir. См. hosts-vars/k8s-base.yaml для
    # развёрнутого описания + дефолтного mirror'а на mirror.gcr.io.
    # config_path = '/etc/containerd/certs.d:/etc/docker/certs.d' установлен
    # containerd-defaults для 2.x — отдельной правки config.toml не требует.
    # Оператор переопределяет список целиком в hosts-vars-override/k8s-base.yaml.

    - name: "[main-components] Ensure /etc/containerd/certs.d/ exists"
      file:
        path: /etc/containerd/certs.d
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: "[main-components] Find existing subdirs in /etc/containerd/certs.d/"
      find:
        paths: /etc/containerd/certs.d
        file_type: directory
        recurse: no
      register: containerd_certs_d_existing

    - name: "[main-components] Compute expected /etc/containerd/certs.d/ subdir paths"
      set_fact:
        containerd_certs_d_expected: >-
          {{ containerd_additional_configs
             | map(attribute='dirName')
             | map('regex_replace', '^', '/etc/containerd/certs.d/')
             | list }}

    - name: "[main-components] Compute orphan /etc/containerd/certs.d/ subdirs"
      set_fact:
        containerd_certs_d_orphans: >-
          {{ containerd_certs_d_existing.files
             | map(attribute='path')
             | list
             | difference(containerd_certs_d_expected) }}

    - name: "[main-components] Delete orphan /etc/containerd/certs.d/ subdirs"
      file:
        path: "{{ item }}"
        state: absent
      loop: "{{ containerd_certs_d_orphans }}"
      loop_control:
        label: "{{ item }}"
      register: containerd_certs_d_orphans_deleted

    - name: "[main-components] Ensure managed /etc/containerd/certs.d/ subdirs exist"
      file:
        path: "/etc/containerd/certs.d/{{ item.dirName }}"
        state: directory
        mode: '0755'
        owner: root
        group: root
      loop: "{{ containerd_additional_configs }}"
      loop_control:
        label: "{{ item.dirName }}"
      register: containerd_certs_d_dirs_written

    - name: "[main-components] Write hosts.toml for each managed /etc/containerd/certs.d/ subdir"
      copy:
        dest: "/etc/containerd/certs.d/{{ item.dirName }}/hosts.toml"
        content: "{{ item.content }}"
        mode: '0644'
        owner: root
        group: root
      loop: "{{ containerd_additional_configs }}"
      loop_control:
        label: "{{ item.dirName }}"
      register: containerd_certs_d_files_written

    - name: "[main-components] Set containerd_certs_d_changed fact"
      set_fact:
        containerd_certs_d_changed: >-
          {{ (containerd_certs_d_orphans_deleted is defined and containerd_certs_d_orphans_deleted.changed)
             or (containerd_certs_d_dirs_written is defined and containerd_certs_d_dirs_written.changed)
             or (containerd_certs_d_files_written is defined and containerd_certs_d_files_written.changed) }}

    - name: Restart containerd
      systemd:
        name: containerd
        state: restarted
      when: >-
        containerd_cgroup_result.changed or
        (containerd_certs_d_changed is defined and containerd_certs_d_changed) or
        containerd_config_result.changed

    # =========================================================================
    # KUBEADM, KUBELET, KUBECTL
    # =========================================================================

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install kubelet, kubeadm, kubectl
      apt:
        name: "{{ k8s_package_list }}"
        state: present

    - name: Hold kubelet, kubeadm, kubectl versions
      command: apt-mark hold {{ k8s_package_list | join(' ') }}
      changed_when: false

    - name: Enable kubelet
      systemd:
        name: kubelet
        enabled: yes
        state: started

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    # ======
    # APT REPO PACKAGES
    # ======
    - name: Check apt repo packages are installed
      command: dpkg -l {{ item }}
      register: apt_repo_pkg_check
      changed_when: false
      failed_when: false
      loop: "{{ apt_repo_package_list }}"

    - name: Assert apt repo packages are installed
      assert:
        that:
          - item.rc == 0
        fail_msg: "{{ item.item }} is NOT installed!"
        quiet: true
      loop: "{{ apt_repo_pkg_check.results }}"
      loop_control:
        label: "{{ item.item }}"

    # ======
    # CONTAINERD
    # ======
    - name: Check containerd version
      command: containerd --version
      register: containerd_check
      changed_when: false
      failed_when: false

    - name: Assert containerd is installed
      assert:
        that:
          - containerd_check.rc == 0
        fail_msg: "containerd is NOT installed!"
        success_msg: "containerd: OK"

    # ======
    # RUNC
    # ======
    - name: Check runc version
      command: runc --version
      register: runc_check
      changed_when: false
      failed_when: false

    - name: Assert runc is installed
      assert:
        that:
          - runc_check.rc == 0
        fail_msg: "runc is NOT installed!"
        success_msg: "runc: OK"

    # ======
    # CRICTL
    # ======
    - name: Check crictl version
      command: crictl --version
      register: crictl_check
      changed_when: false
      failed_when: false

    - name: Assert crictl is installed
      assert:
        that:
          - crictl_check.rc == 0
        fail_msg: "crictl is NOT installed!"
        success_msg: "crictl: OK"

    # ======
    # KUBEADM
    # ======
    - name: Check kubeadm version
      command: kubeadm version -o json
      register: kubeadm_check
      changed_when: false
      failed_when: false

    - name: Assert kubeadm is installed
      assert:
        that:
          - kubeadm_check.rc == 0
        fail_msg: "kubeadm is NOT installed!"
        success_msg: "kubeadm: OK"

    # ======
    # KUBELET
    # ======
    - name: Check kubelet version
      command: kubelet --version
      register: kubelet_check
      changed_when: false
      failed_when: false

    - name: Assert kubelet is installed
      assert:
        that:
          - kubelet_check.rc == 0
        fail_msg: "kubelet is NOT installed!"
        success_msg: "kubelet: OK"

    # ======
    # KUBECTL
    # ======
    - name: Check kubectl version
      command: kubectl version --client -o json
      register: kubectl_check
      changed_when: false
      failed_when: false

    - name: Assert kubectl is installed
      assert:
        that:
          - kubectl_check.rc == 0
        fail_msg: "kubectl is NOT installed!"
        success_msg: "kubectl: OK"

    - name: Print final status
      debug:
        msg:
          - "=== Kubernetes Components Installed ==="
          - "containerd: {{ containerd_check.stdout }}"
          - "runc: {{ runc_check.stdout_lines[0] }}"
          - "crictl: {{ crictl_check.stdout }}"
          - "kubeadm: {{ kubeadm_check.stdout }}"
          - "kubelet: {{ kubelet_check.stdout }}"
          - "kubectl: {{ kubectl_check.stdout }}"
