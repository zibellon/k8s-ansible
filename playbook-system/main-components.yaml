---
# =============================================================================
# Install containerd + kubeadm/kubelet/kubectl
# =============================================================================
# Usage:
#   ansible-playbook -i hosts-vars/ -i hosts-vars-override/ playbook-system/main-components.yaml --limit k8s-worker-1
# =============================================================================

- name: Install containerd + kubeadm/kubelet/kubectl
  hosts: all
  become: true
  gather_facts: false

  tasks:
    # =========================================================================
    # ASSERT INSTALL METHOD
    # =========================================================================
    - name: "[main-components] assert k8s install method"
      assert:
        that:
          - k8s_install_method in ["apt", "local_deb"]
          - (k8s_install_method != "local_deb") or (k8s_kubernetes_cni_local_deb_path is defined and k8s_kubernetes_cni_local_deb_path | length > 0)
          - (k8s_install_method != "local_deb") or (k8s_cri_tools_local_deb_path is defined and k8s_cri_tools_local_deb_path | length > 0)
          - (k8s_install_method != "local_deb") or (k8s_local_deb_path_list is defined and k8s_local_deb_path_list is sequence and k8s_local_deb_path_list | length > 0)
          - (k8s_install_method != "local_deb") or (k8s_local_deb_path_list | length == k8s_package_list | length)

    # =========================================================================
    # KUBERNETES APT REPOSITORY
    # =========================================================================
    - name: Install required packages for apt repo
      apt:
        name: "{{ apt_repo_package_list }}"
        state: present
        update_cache: yes

    # /etc/apt/keyrings already exists on Ubuntu 22.04+
    - name: Ensure /etc/apt/keyrings exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    # Key is re-downloaded on each run to support k8s version changes
    - name: Download Kubernetes apt key
      shell: >-
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key
        | gpg --batch --yes --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      when: k8s_install_method == "apt"

    - name: Add Kubernetes apt repository
      copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: |
          deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /
        mode: '0644'
      when: k8s_install_method == "apt"

    # =========================================================================
    # CONTAINERD
    # =========================================================================
    - name: Pre-Check if containerd is installed
      command: which containerd
      register: containerd_pre_check
      changed_when: false
      failed_when: false

    - name: Download containerd
      get_url:
        url: "{{ containerd_url }}"
        dest: /tmp/containerd.tar.gz
      when: containerd_pre_check.rc != 0

    - name: Extract containerd to /usr/local
      unarchive:
        src: /tmp/containerd.tar.gz
        dest: /usr/local
        remote_src: yes
      when: containerd_pre_check.rc != 0

    - name: Download containerd.service
      get_url:
        url: "{{ containerd_service_url }}"
        dest: /usr/lib/systemd/system/containerd.service
        mode: '0644'

    - name: Enable and start containerd
      systemd:
        name: containerd
        enabled: yes
        state: started
        daemon_reload: yes

    # =========================================================================
    # RUNC
    # =========================================================================
    - name: Pre-Check if runc is installed
      command: which runc
      register: runc_pre_check
      changed_when: false
      failed_when: false

    - name: Download runc
      get_url:
        url: "{{ runc_url }}"
        dest: /tmp/runc.amd64
        mode: '0755'
      when: runc_pre_check.rc != 0

    - name: Install runc
      copy:
        src: /tmp/runc.amd64
        dest: /usr/local/sbin/runc
        mode: '0755'
        remote_src: yes
      when: runc_pre_check.rc != 0

    # =========================================================================
    # CNI PLUGINS
    # =========================================================================
    - name: Pre-Check if CNI plugins are installed
      stat:
        path: /opt/cni/bin/bridge
      register: cni_pre_check

    - name: Create /opt/cni/bin directory
      file:
        path: /opt/cni/bin
        state: directory
        mode: '0755'

    - name: Download CNI plugins
      get_url:
        url: "{{ cni_plugins_url }}"
        dest: /tmp/cni-plugins.tgz
      when: not cni_pre_check.stat.exists

    - name: Extract CNI plugins
      unarchive:
        src: /tmp/cni-plugins.tgz
        dest: /opt/cni/bin
        remote_src: yes
      when: not cni_pre_check.stat.exists

    # =========================================================================
    # CONTAINERD CONFIG
    # =========================================================================

    - name: Create /etc/containerd directory
      file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Check if containerd config exists
      stat:
        path: /etc/containerd/config.toml
      register: containerd_config_stat

    - name: Generate default containerd config
      shell: containerd config default > /etc/containerd/config.toml
      when: >-
        not containerd_config_stat.stat.exists or
        force_containerd_config_regenerate
      register: containerd_config_result

    - name: Enable SystemdCgroup in containerd config
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
      register: containerd_cgroup_result

    - name: Override sandbox (pause) image in containerd config
      replace:
        path: /etc/containerd/config.toml
        regexp: '^(\s*)sandbox\s*=\s*[''"][^''"]+[''"]'
        replace: "\\1sandbox = '{{ containerd_sandbox_image_registry }}/{{ containerd_sandbox_image_name }}:{{ containerd_sandbox_image_tag }}'"
      register: containerd_sandbox_result

    # =========================================================================
    # REGISTRY MIRRORS / ADDITIONAL CONFIGS
    # =========================================================================

    - name: Create additional containerd config directories
      file:
        path: "/etc/containerd/certs.d/{{ item.dirName }}"
        state: directory
        mode: '0755'
      loop: "{{ containerd_additional_configs }}"
      when: containerd_additional_configs | length > 0

    - name: Create additional containerd config files
      copy:
        dest: "/etc/containerd/certs.d/{{ item.dirName }}/hosts.toml"
        content: "{{ item.content }}"
        mode: '0644'
      loop: "{{ containerd_additional_configs }}"
      when: containerd_additional_configs | length > 0
      register: containerd_additional_config_result

    # containerd 2.x already has config_path = '/etc/containerd/certs.d:/etc/docker/certs.d' by default
    - name: Restart containerd
      systemd:
        name: containerd
        state: restarted
      when: >-
        containerd_cgroup_result.changed or
        containerd_sandbox_result.changed or
        (containerd_additional_config_result is defined and containerd_additional_config_result.changed) or
        containerd_config_result.changed

    # =========================================================================
    # KUBEADM, KUBELET, KUBECTL
    # =========================================================================

    - name: Update apt cache
      apt:
        update_cache: yes
      when: k8s_install_method == "apt"

    - name: Install kubelet, kubeadm, kubectl
      apt:
        name: "{{ k8s_package_list }}"
        state: present
      when: k8s_install_method == "apt"

    - name: Hold kubelet, kubeadm, kubectl versions
      command: apt-mark hold {{ k8s_package_list | join(' ') }}
      changed_when: false
      when: k8s_install_method == "apt"

    # =========================================================================
    # KUBEADM, KUBELET, KUBECTL — local_deb branch (offline, AirGap-friendly)
    # Order: kubernetes-cni → cri-tools → k8s_local_deb_path_list iteration
    # (kubelet → kubectl → kubeadm by inventory order). kubelet.deb has Depends
    # on kubernetes-cni and cri-tools; kubeadm.deb has Depends on kubelet/kubectl.
    # =========================================================================
    - name: Install kubernetes-cni from local .deb
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-deb-install.yaml"
      vars:
        dto_label_name: "main-components"
        dto_deb_local_path: "{{ k8s_kubernetes_cni_local_deb_path }}"
        dto_apt_mark_hold_pkg_name: "kubernetes-cni"
      when: k8s_install_method == "local_deb"

    - name: Install cri-tools from local .deb
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-deb-install.yaml"
      vars:
        dto_label_name: "main-components"
        dto_deb_local_path: "{{ k8s_cri_tools_local_deb_path }}"
        dto_apt_mark_hold_pkg_name: "cri-tools"
      when: k8s_install_method == "local_deb"

    - name: Install kubelet/kubectl/kubeadm from local .debs
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-deb-install.yaml"
      vars:
        dto_label_name: "main-components"
        dto_deb_local_path: "{{ item }}"
        dto_apt_mark_hold_pkg_name: "{{ k8s_package_list[i] }}"
      loop: "{{ k8s_local_deb_path_list }}"
      loop_control:
        index_var: i
      when: k8s_install_method == "local_deb"

    - name: Enable kubelet
      systemd:
        name: kubelet
        enabled: yes
        state: started

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    # ======
    # APT REPO PACKAGES
    # ======
    - name: Check apt repo packages are installed
      command: dpkg -l {{ item }}
      register: apt_repo_pkg_check
      changed_when: false
      failed_when: false
      loop: "{{ apt_repo_package_list }}"

    - name: Assert apt repo packages are installed
      assert:
        that:
          - item.rc == 0
        fail_msg: "{{ item.item }} is NOT installed!"
        quiet: true
      loop: "{{ apt_repo_pkg_check.results }}"
      loop_control:
        label: "{{ item.item }}"

    # ======
    # CONTAINERD
    # ======
    - name: Check containerd version
      command: containerd --version
      register: containerd_check
      changed_when: false
      failed_when: false

    - name: Assert containerd is installed
      assert:
        that:
          - containerd_check.rc == 0
        fail_msg: "containerd is NOT installed!"
        success_msg: "containerd: OK"

    # ======
    # RUNC
    # ======
    - name: Check runc version
      command: runc --version
      register: runc_check
      changed_when: false
      failed_when: false

    - name: Assert runc is installed
      assert:
        that:
          - runc_check.rc == 0
        fail_msg: "runc is NOT installed!"
        success_msg: "runc: OK"

    # ======
    # KUBEADM
    # ======
    - name: Check kubeadm version
      command: kubeadm version -o json
      register: kubeadm_check
      changed_when: false
      failed_when: false

    - name: Assert kubeadm is installed
      assert:
        that:
          - kubeadm_check.rc == 0
        fail_msg: "kubeadm is NOT installed!"
        success_msg: "kubeadm: OK"

    # ======
    # KUBELET
    # ======
    - name: Check kubelet version
      command: kubelet --version
      register: kubelet_check
      changed_when: false
      failed_when: false

    - name: Assert kubelet is installed
      assert:
        that:
          - kubelet_check.rc == 0
        fail_msg: "kubelet is NOT installed!"
        success_msg: "kubelet: OK"

    # ======
    # KUBECTL
    # ======
    - name: Check kubectl version
      command: kubectl version --client -o json
      register: kubectl_check
      changed_when: false
      failed_when: false

    - name: Assert kubectl is installed
      assert:
        that:
          - kubectl_check.rc == 0
        fail_msg: "kubectl is NOT installed!"
        success_msg: "kubectl: OK"

    - name: Print final status
      debug:
        msg:
          - "=== Kubernetes Components Installed ==="
          - "containerd: {{ containerd_check.stdout }}"
          - "runc: {{ runc_check.stdout_lines[0] }}"
          - "kubeadm: {{ kubeadm_check.stdout }}"
          - "kubelet: {{ kubelet_check.stdout }}"
          - "kubectl: {{ kubectl_check.stdout }}"
