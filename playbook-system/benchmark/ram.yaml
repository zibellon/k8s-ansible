---
# =============================================================================
# Stress RAM via sysbench (memory bandwidth) + stress-ng (capacity) on N nodes
#
# Usage:
#   # All hosts:
#   ansible-playbook -i hosts-vars/ -i hosts-vars-override/<cluster>/ \
#     playbook-system/benchmark/ram.yaml
#
#   # Subset via --limit:
#   ansible-playbook ... --limit k8s-manager-1,k8s-worker-2
#
#   # Force sequential (one host at a time):
#   ansible-playbook ... --forks 1
#
# Requirements:
#   - >= 1 host in inventory after --limit filtering.
#   - sudo/root privileges (become: true) — нужны для apt install sysbench / stress-ng.
#   - ВАЖНО: capacity-проход занимает ~mem_capacity_percent% физической RAM и churn'ит её.
#     Запускать ТОЛЬКО на raw-узлах ДО cluster-init.yaml (pre-flight проверка железа) либо
#     на drained-узле. На живом узле возможен OOM-killer (kubelet / поды под раздачу).
#
# Steps:
#   1. Validate inputs (assert: >=1 host).
#   2. Install sysbench + stress-ng inline (idempotent: pre-check which + apt + verify).
#   3. Detect nproc + total RAM, run three passes (от лёгкого к тяжёлому):
#        - sysbench memory write  (bandwidth, --threads=nproc)
#        - sysbench memory read   (bandwidth, --threads=nproc)
#        - stress-ng --vm nproc   (capacity: ~mem_capacity_percent% RAM суммарно, --verify)
#      Тест ничего не пишет на диск и не поднимает демонов — cleanup не нужен.
#   4. Aggregate parsed results on localhost, print vertical per-host
#      stanzas + cluster summary via debug: msg.
#
# Metrics: MiB/sec transferred (bandwidth) + bogo-ops/s real (capacity throughput).
# Ни sysbench, ни stress-ng не умеют JSON — stdout парсится через regex_search.
#
# Output: stdout only (no file, no Vault, no cluster facts).
# =============================================================================

- name: Stress RAM via sysbench (bandwidth) + stress-ng (capacity)
  hosts: managers:workers
  become: true
  gather_facts: false

  tasks:
    # === Phase 1: Validate inputs ===
    - name: "[ram] Assert >=1 host selected"
      assert:
        that:
          - ansible_play_hosts | length >= 1
        fail_msg: |
          ERROR: no hosts selected. ansible_play_hosts is empty.
          Raw --limit value: {{ ansible_limit | default('(none)') }}.
      run_once: true

    - name: "[ram] Show selected hosts and parameters"
      debug:
        msg:
          - "Hosts under test: {{ ansible_play_hosts | sort | join(', ') }}"
          - "Bandwidth: block={{ mem_block_size }}, scope={{ mem_scope }}, mode={{ mem_access_mode }}, threads=nproc, runtime={{ mem_runtime }}s/pass"
          - "Capacity:  --vm nproc, ~{{ mem_capacity_percent }}% RAM суммарно, --vm-method all --verify, runtime={{ mem_capacity_runtime }}s"
      run_once: true

    # === Phase 2: Install sysbench + stress-ng inline ===
    - name: "[ram] Pre-check: is sysbench installed?"
      command: which sysbench
      register: sysbench_pre_check
      changed_when: false
      failed_when: false # AUTHORIZED §2.1: pre-check не должен fail play

    - name: "[ram] Install sysbench via apt"
      apt:
        name: sysbench
        state: present
        update_cache: true
      when: sysbench_pre_check.rc != 0

    - name: "[ram] Verify sysbench binary works"
      command: sysbench --version
      register: sysbench_version_check
      changed_when: false

    - name: "[ram] Pre-check: is stress-ng installed?"
      command: which stress-ng
      register: stressng_pre_check
      changed_when: false
      failed_when: false # AUTHORIZED §2.1: pre-check не должен fail play

    - name: "[ram] Install stress-ng via apt"
      apt:
        name: stress-ng
        state: present
        update_cache: true
      when: stressng_pre_check.rc != 0

    - name: "[ram] Verify stress-ng binary works"
      command: stress-ng --version
      register: stressng_version_check
      changed_when: false

    - name: "[ram] Show installed tool versions"
      debug:
        msg:
          - "sysbench on {{ inventory_hostname }}: {{ sysbench_version_check.stdout_lines[0] }}"
          - "stress-ng on {{ inventory_hostname }}: {{ stressng_version_check.stdout_lines[0] }}"

    # === Phase 3: Detect host facts and run three passes ===
    - name: "[ram] Detect CPU count (nproc)"
      command: nproc
      register: cpu_nproc
      changed_when: false

    - name: "[ram] Detect total RAM (bytes via free -b)"
      command: free -b
      register: mem_free_raw
      changed_when: false

    - name: "[ram] Set mem_total_bytes fact"
      set_fact:
        mem_total_bytes: "{{ mem_free_raw.stdout | regex_search('Mem:\\s+([0-9]+)', '\\1') | first }}"

    - name: "[ram] Run sysbench memory — write (bandwidth)"
      command: >
        sysbench memory
        --memory-block-size={{ mem_block_size }}
        --memory-total-size={{ mem_total_size }}
        --memory-scope={{ mem_scope }}
        --memory-access-mode={{ mem_access_mode }}
        --memory-oper=write
        --threads={{ cpu_nproc.stdout | trim }}
        --time={{ mem_runtime }}
        run
      register: mem_write_result
      async: "{{ stress_test_async.timeout }}"  # защита от обрыва SSH / зависания прогона
      poll: "{{ stress_test_async.poll }}"
      failed_when: mem_write_result.rc != 0 # AUTHORIZED §2.1
      changed_when: false

    - name: "[ram] Run sysbench memory — read (bandwidth)"
      command: >
        sysbench memory
        --memory-block-size={{ mem_block_size }}
        --memory-total-size={{ mem_total_size }}
        --memory-scope={{ mem_scope }}
        --memory-access-mode={{ mem_access_mode }}
        --memory-oper=read
        --threads={{ cpu_nproc.stdout | trim }}
        --time={{ mem_runtime }}
        run
      register: mem_read_result
      async: "{{ stress_test_async.timeout }}"  # защита от обрыва SSH / зависания прогона
      poll: "{{ stress_test_async.poll }}"
      failed_when: mem_read_result.rc != 0 # AUTHORIZED §2.1
      changed_when: false

    - name: "[ram] Run stress-ng vm — capacity (~{{ mem_capacity_percent }}% RAM)"
      command: >
        stress-ng
        --vm {{ cpu_nproc.stdout | trim }}
        --vm-bytes {{ ((mem_total_bytes | int) * mem_capacity_percent / 100 / (cpu_nproc.stdout | trim | int)) | int }}
        --vm-method all
        --verify
        --metrics-brief
        --timeout {{ mem_capacity_runtime }}s
      register: mem_capacity_result
      async: "{{ stress_test_async.timeout }}"  # защита от обрыва SSH / зависания прогона
      poll: "{{ stress_test_async.poll }}"
      failed_when: mem_capacity_result.rc != 0 # AUTHORIZED §2.1
      changed_when: false

    # === Phase 4: Aggregate results and print report ===
    - name: "[ram] Build per-host stanza"
      set_fact:
        per_host_stanzas: "{{ per_host_stanzas | default([]) + new_stanza }}"
      loop: "{{ ansible_play_hosts | sort }}"
      vars:
        write_out: "{{ hostvars[item].mem_write_result.stdout }}"
        read_out: "{{ hostvars[item].mem_read_result.stdout }}"
        cap_out: "{{ hostvars[item].mem_capacity_result.stdout }}"
        cores: "{{ hostvars[item].cpu_nproc.stdout | trim }}"
        ram_gib: "{{ ((hostvars[item].mem_total_bytes | int) / 1073741824) | round(1) }}"
        alloc_gib: "{{ ((hostvars[item].mem_total_bytes | int) * mem_capacity_percent / 100 / 1073741824) | round(1) }}"
        write_mibs: "{{ (write_out | regex_search('transferred \\(([0-9.]+) MiB/sec\\)', '\\1') | first | float) | round(2) }}"
        read_mibs: "{{ (read_out | regex_search('transferred \\(([0-9.]+) MiB/sec\\)', '\\1') | first | float) | round(2) }}"
        write_ops: "{{ (write_out | regex_search('Total operations: [0-9]+ \\(([0-9.]+) per second\\)', '\\1') | first | float) | round(2) }}"
        read_ops: "{{ (read_out | regex_search('Total operations: [0-9]+ \\(([0-9.]+) per second\\)', '\\1') | first | float) | round(2) }}"
        write_avg: "{{ (write_out | regex_search('avg:\\s+([0-9.]+)', '\\1') | first | float) | round(2) }}"
        read_avg: "{{ (read_out | regex_search('avg:\\s+([0-9.]+)', '\\1') | first | float) | round(2) }}"
        write_p95: "{{ (write_out | regex_search('95th percentile:\\s+([0-9.]+)', '\\1') | first | float) | round(2) }}"
        read_p95: "{{ (read_out | regex_search('95th percentile:\\s+([0-9.]+)', '\\1') | first | float) | round(2) }}"
        cap_bogos: "{{ (cap_out | regex_search('vm\\s+[0-9]+\\s+[0-9.]+\\s+[0-9.]+\\s+[0-9.]+\\s+([0-9.]+)', '\\1') | first | float) | round(2) }}"
        new_stanza:
          - "--- {{ item }} ({{ cores }} cores, {{ ram_gib }} GiB RAM) ---"
          - "  Bandwidth Write:  {{ write_mibs }} MiB/s   ops/s={{ write_ops }}   avg={{ write_avg }}ms   p95={{ write_p95 }}ms"
          - "  Bandwidth Read:   {{ read_mibs }} MiB/s   ops/s={{ read_ops }}   avg={{ read_avg }}ms   p95={{ read_p95 }}ms"
          - "  Capacity:         allocated ~{{ alloc_gib }} GiB ({{ mem_capacity_percent }}%)   bogo-ops/s={{ cap_bogos }} (real)"
          - ""
      run_once: true
      delegate_to: localhost
      become: false # AUTHORIZED §2.1

    - name: "[ram] Build cluster numeric stats"
      set_fact:
        mem_write_mibs_list: "{{ mem_write_mibs_list | default([]) + [write_mibs | float] }}"
        mem_read_mibs_list: "{{ mem_read_mibs_list | default([]) + [read_mibs | float] }}"
        mem_cap_bogos_list: "{{ mem_cap_bogos_list | default([]) + [cap_bogos | float] }}"
      loop: "{{ ansible_play_hosts | sort }}"
      vars:
        write_out: "{{ hostvars[item].mem_write_result.stdout }}"
        read_out: "{{ hostvars[item].mem_read_result.stdout }}"
        cap_out: "{{ hostvars[item].mem_capacity_result.stdout }}"
        write_mibs: "{{ (write_out | regex_search('transferred \\(([0-9.]+) MiB/sec\\)', '\\1') | first | float) | round(2) }}"
        read_mibs: "{{ (read_out | regex_search('transferred \\(([0-9.]+) MiB/sec\\)', '\\1') | first | float) | round(2) }}"
        cap_bogos: "{{ (cap_out | regex_search('vm\\s+[0-9]+\\s+[0-9.]+\\s+[0-9.]+\\s+[0-9.]+\\s+([0-9.]+)', '\\1') | first | float) | round(2) }}"
      run_once: true
      delegate_to: localhost
      become: false # AUTHORIZED §2.1

    - name: "[ram] Build cluster summary lines"
      set_fact:
        cluster_summary_lines:
          - "=== Cluster summary across {{ ansible_play_hosts | length }} hosts ==="
          - "  Bandwidth Write:  MiB/s min={{ mem_write_mibs_list | min }} max={{ mem_write_mibs_list | max }} avg={{ ((mem_write_mibs_list | sum) / (mem_write_mibs_list | length)) | round(2) }}"
          - "  Bandwidth Read:   MiB/s min={{ mem_read_mibs_list | min }} max={{ mem_read_mibs_list | max }} avg={{ ((mem_read_mibs_list | sum) / (mem_read_mibs_list | length)) | round(2) }}"
          - "  Capacity:         bogo-ops/s min={{ mem_cap_bogos_list | min }} max={{ mem_cap_bogos_list | max }} avg={{ ((mem_cap_bogos_list | sum) / (mem_cap_bogos_list | length)) | round(2) }}"
      run_once: true
      delegate_to: localhost
      become: false # AUTHORIZED §2.1

    - name: "[ram] Compose and print final report"
      vars:
        sysbench_version_for_header: "{{ hostvars[ansible_play_hosts | first].sysbench_version_check.stdout_lines[0] | default('unknown') }}"
        stressng_version_for_header: "{{ hostvars[ansible_play_hosts | first].stressng_version_check.stdout_lines[0] | default('unknown') }}"
        header_lines:
          - "=== Memory Stress Test ({{ sysbench_version_for_header }} / {{ stressng_version_for_header }}) ==="
          - "Bandwidth params: block={{ mem_block_size }}, scope={{ mem_scope }}, mode={{ mem_access_mode }}, threads=nproc, runtime={{ mem_runtime }}s/pass"
          - "Capacity params:  --vm nproc, ~{{ mem_capacity_percent }}% RAM суммарно, --vm-method all --verify, runtime={{ mem_capacity_runtime }}s"
          - "Metrics: MiB/sec (bandwidth, выше = быстрее) + bogo-ops/s real (capacity throughput)"
          - "Hosts under test: {{ ansible_play_hosts | sort | join(', ') }}"
          - ""
      debug:
        msg: "{{ header_lines + per_host_stanzas + cluster_summary_lines }}"
      run_once: true
      delegate_to: localhost
      become: false # AUTHORIZED §2.1
