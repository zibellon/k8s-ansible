---
# =============================================================================
# Return node to cluster after maintenance
# =============================================================================
# Usage:
#   ansible-playbook -i hosts-vars/ -i hosts-vars-override/ playbook-system/node-drain-off.yaml --limit k8s-worker-3
#
# This playbook:
#   1. Waits for node to be Ready
#   2. Uncordons the node (enables scheduling)
# =============================================================================

- name: Return node to cluster
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: "[pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-require-limit.yaml"
    # =========================================================================
    # GATHER CLUSTER FACTS
    # =========================================================================
    - name: Find master manager
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-set-master-manager.yaml"
    - name: Check cluster initialization
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-set-is-cluster-init.yaml"
    - name: Check node join status
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-set-is-node-joined.yaml"
    # =========================================================================
    # PRE-CHECK: Verify node is joined
    # =========================================================================
    - name: Fail if node not in cluster
      fail:
        msg: "Node {{ new_hostname }} not found in cluster"
      when: not is_node_joined

    # =========================================================================
    # UNCORDON: Enable scheduling on node
    # =========================================================================
    - name: Uncordon node
      command: kubectl uncordon {{ new_hostname }}
      delegate_to: "{{ master_manager_fact }}"
      register: uncordon_result
      changed_when: "'uncordoned' in uncordon_result.stdout"

    - name: Show uncordon result
      debug:
        msg: "{{ uncordon_result.stdout }}"
