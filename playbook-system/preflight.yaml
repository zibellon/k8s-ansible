# =============================================================================
# Preflight — eliminate package-manager races before provisioning starts
# =============================================================================
# Runs as Step 2 in node-install.yaml (after setup-ssh-keys.yaml, before any
# apt-operations and before the first reboot in server-prepare.yaml).
# Idempotent on already-provisioned hosts.
#
# Purpose:
#   - Wait for cloud-init to finish if it is installed (cloud-init itself
#     kicks off unattended-upgrade runs on first boot; entering provisioning
#     before it finishes is a recipe for apt-lock contention + reboot
#     interrupting a dpkg transaction).
#   - Stop any running unattended-upgrade and wait for it to exit cleanly.
#   - Mask + disable unattended-upgrades / apt-daily.timer /
#     apt-daily-upgrade.timer permanently. OS updates on k8s nodes are
#     handled by rolling update, not in the background.
#   - Recover from any interrupted dpkg transaction via configure-all.
#     Also fixes hosts whose provider-supplied image was snapshotted
#     mid-config.
# =============================================================================

---
- name: Preflight — package-manager hygiene
  hosts: all
  become: true
  gather_facts: false

  tasks:
    # =========================================================================
    # CLOUD-INIT (skip cleanly if cloud-init is not installed)
    # =========================================================================
    - name: Check if cloud-init binary exists
      command: which cloud-init
      register: preflight_cloud_init_check
      changed_when: false
      failed_when: false

    - name: Wait for cloud-init to complete
      # cloud-init exit codes: 0 = done, 1 = error, 2 = recoverable error
      # (degraded done — completed with non-fatal warnings, e.g. schema
      # validation). Accept both 0 and 2; only 1 means real failure.
      command: cloud-init status --wait
      changed_when: false
      register: preflight_cloud_init_wait
      failed_when: preflight_cloud_init_wait.rc not in [0, 2]
      when: preflight_cloud_init_check.rc == 0

    # =========================================================================
    # APT/DPKG LOCKS — wait for any running background upgrade to release them
    # =========================================================================
    # If cloud-init / unattended-upgrades / apt-daily-upgrade is currently
    # holding any of the apt or dpkg lock files, proceeding (especially the
    # `systemd mask + stop` in the next block) may interrupt a transaction
    # mid-way and leave dpkg half-configured. Wait cooperatively up to 5 min
    # for the locks to free up.

    - name: Wait for apt/dpkg locks to be released (up to 5m)
      command: fuser -s /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/lib/apt/lists/lock
      register: preflight_apt_locks
      until: preflight_apt_locks.rc != 0
      retries: 60
      delay: 5
      changed_when: false
      ignore_errors: true

    - name: Assert apt/dpkg locks are now free
      assert:
        that: preflight_apt_locks.rc != 0
        fail_msg: "apt/dpkg locks still held after 5 minutes — another process is still running apt; investigate before retrying"

    # =========================================================================
    # UNATTENDED-UPGRADES + APT-DAILY — mask permanently (policy: OS updates
    # via rolling upgrade, not in background)
    # =========================================================================
    - name: Disable + mask unattended-upgrades and apt-daily timers
      systemd:
        name: "{{ item }}"
        enabled: false
        state: stopped
        masked: true
      loop:
        - unattended-upgrades.service
        - apt-daily.timer
        - apt-daily.service
        - apt-daily-upgrade.timer
        - apt-daily-upgrade.service
      failed_when: false   # some units may not exist on this distro; mask whichever do

    # =========================================================================
    # DPKG STATE RECOVERY
    # =========================================================================
    - name: Detect interrupted dpkg transaction
      command: dpkg --audit
      register: preflight_dpkg_audit
      changed_when: false

    - name: Recover interrupted dpkg transaction
      command: dpkg --configure -a
      when: preflight_dpkg_audit.stdout | length > 0
      register: preflight_dpkg_recover

    - name: Verify dpkg is now clean
      command: dpkg --audit
      register: preflight_dpkg_verify
      changed_when: false
      failed_when: preflight_dpkg_verify.stdout | length > 0

    # =========================================================================
    # INVENTORY SANITY (managers only) — api_server_advertise_address must be
    # on a real network interface, otherwise etcd fails to bind on first
    # kubeadm init/join with `EADDRNOTAVAIL` (cluster-init then hangs 4min on
    # wait-control-plane and dies with a confusing "context deadline exceeded"
    # from kube-apiserver healthcheck — ask me how I know).
    # =========================================================================
    - name: Discover IPv4 addresses on this host
      command: ip -4 -o addr show
      register: preflight_host_ipv4
      changed_when: false
      when: "'managers' in group_names"

    - name: Assert api_server_advertise_address is configured on this manager
      assert:
        that:
          - api_server_advertise_address in (preflight_host_ipv4.stdout | regex_findall('inet (\d+\.\d+\.\d+\.\d+)/'))
        fail_msg: |
          Inventory error: api_server_advertise_address={{ api_server_advertise_address }}
          is not present on any network interface of {{ inventory_hostname }}.
          Available IPv4 addresses on this host:
            {{ preflight_host_ipv4.stdout | regex_findall('inet (\d+\.\d+\.\d+\.\d+)/') | join(', ') }}
          Fix hosts-vars-override/hosts.yaml — set api_server_advertise_address
          to one of the addresses above.
      when: "'managers' in group_names"
