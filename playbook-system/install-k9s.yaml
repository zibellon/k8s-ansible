# =============================================================================
# Install k9s on manager node
# =============================================================================
# Usage:
#   ansible-playbook -i hosts-vars/ -i hosts-vars-override/ playbook-system/install-k9s.yaml --limit k8s-manager-1
# =============================================================================

---
- name: Install k9s
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    # =========================================================================
    # PRE-CHECK
    # =========================================================================
    - name: Check if k9s is installed
      command: which k9s
      register: k9s_pre_check
      changed_when: false
      failed_when: false

    # =========================================================================
    # ASSERT INSTALL METHOD
    # =========================================================================
    - name: "[install-k9s] assert install method"
      assert:
        that:
          - k9s_install_method in ["url", "local_deb"]
          - (k9s_install_method != "url") or (k9s_url is defined and k9s_url | length > 0)
          - (k9s_install_method != "local_deb") or (k9s_local_deb_path is defined and k9s_local_deb_path | length > 0)

    # =========================================================================
    # INSTALL — url branch
    # =========================================================================
    - name: Download k9s deb package
      get_url:
        url: "{{ k9s_url }}"
        dest: /tmp/k9s_linux_amd64.deb
      when:
        - k9s_pre_check.rc != 0
        - k9s_install_method == "url"

    - name: Install k9s from deb package
      apt:
        deb: /tmp/k9s_linux_amd64.deb
      when:
        - k9s_pre_check.rc != 0
        - k9s_install_method == "url"

    - name: Cleanup temp files
      file:
        path: /tmp/k9s_linux_amd64.deb
        state: absent
      when:
        - k9s_pre_check.rc != 0
        - k9s_install_method == "url"

    # =========================================================================
    # INSTALL — local_deb branch (offline, AirGap-friendly)
    # =========================================================================
    - name: Install k9s from local .deb
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-deb-install.yaml"
      vars:
        dto_label_name: "install-k9s"
        dto_deb_local_path: "{{ k9s_local_deb_path }}"
        dto_apt_mark_hold_pkg_name: "k9s"
      when:
        - k9s_pre_check.rc != 0
        - k9s_install_method == "local_deb"

    # =========================================================================
    # VERIFICATION
    # =========================================================================
    - name: Check k9s version
      command: k9s version
      register: k9s_version_check
      changed_when: false
      failed_when: false

    - name: Check k9s info
      command: k9s info
      register: k9s_info_check
      changed_when: false
      failed_when: false

    - name: Assert k9s is installed
      assert:
        that:
          - k9s_version_check.rc == 0
          - k9s_info_check.rc == 0
        fail_msg: "k9s is NOT installed!"
        success_msg: "k9s: OK"

    - name: Print k9s version
      debug:
        msg: "k9s version: {{ k9s_version_check.stdout }}"

    - name: Print k9s info
      debug:
        msg: "k9s info: {{ k9s_info_check.stdout }}"
