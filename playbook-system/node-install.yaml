- name: Step 1 - Setup SSH keys
  import_playbook: setup-ssh-keys.yaml

- name: Step 2 - Preflight (cloud-init, unattended-upgrades, dpkg state)
  import_playbook: preflight.yaml

- name: Step 3 - Set hostnames
  import_playbook: set-hostname.yaml

- name: Step 4 - Prepare servers (swap, sysctl, kernel modules)
  import_playbook: server-prepare.yaml

- name: Step 5 - Prepare Longhorn
  import_playbook: longhorn-prepare.yaml

- name: Step 6 - Prepare Cilium
  import_playbook: cilium-prepare.yaml

- name: Step 7 - Install containerd + kubeadm/kubelet/kubectl
  import_playbook: main-components.yaml

- name: Step 8 - Deploy HAProxy API Server LB
  import_playbook: haproxy-apiserver-lb.yaml

- name: Step 9 - Install Helm (managers only)
  import_playbook: install-helm.yaml

- name: Step 10 - Install k9s (managers only)
  import_playbook: install-k9s.yaml
