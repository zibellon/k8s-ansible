---
# =============================================================================
# Prepare Linux — service config (apt / fail2ban / sshd) + node kernel prep
# (swap / sysctl / modules / softdog); two halves, each with conditional reboot
# =============================================================================
# Объединяет два прежних playbook'а: linux-service-configure.yaml
# (apt-configure + fail2ban-install + sshd-configure) и node-prepare.yaml
# (swap / sysctl / kernel modules / softdog). Идут последовательно в одном
# bootstrap-pass; drop-in файлы синкаются по префиксу "ansible-" через
# tasks-sync-managed-files.yaml.
#
# Phases:
#   1. APT — sync /etc/apt/{sources.list.d, apt.conf.d, preferences.d}/ files
#            from apt_additional_configs + apt_preferences. Refresh apt cache.
#   2. FAIL2BAN — install package, sync /etc/fail2ban/jail.d/ from
#                 fail2ban_jail_d_files, restart on change.
#   3. SSHD — sync /etc/ssh/sshd_config.d/ from sshd_config_d_files, validate via
#             sshd -t, reload (not restart) on change.
#   4. REBOOT (services) — conditional reboot if any of the 5 service-sync facts:
#               apt_sources_changed / apt_conf_d_changed / apt_prefs_changed /
#               fail2ban_files_changed / sshd_files_changed.
#   5. SWAP — swapoff, comment swap in /etc/fstab, mask swap.target.
#   6. SYSCTL — write /etc/sysctl.d/k8s.conf from k8s_sysctl_list.
#   7. KERNEL MODULES — write /etc/modules-load.d/k8s.conf from k8s_module_list
#                       (overlay, br_netfilter).
#   8. SOFTDOG — modprobe config + softdog.service watchdog unit.
#   9. REBOOT (node) — conditional reboot if sysctl / modules / softdog changed
#                      or swap was active.
#  10. FINAL VERIFICATION — assert swap off, sysctl params set, modules loaded.
#
# Usage:
#   ansible-playbook -i hosts-vars/ -i hosts-vars-override/ \
#     playbook-system/prepare-linux-pkgs.yaml [--limit <host>]
# =============================================================================

- name: Configure linux services (apt / fail2ban / sshd) + conditional reboot
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: "Resolve master-manager and bastion facts"
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-set-master-manager.yaml"

    # =========================================================================
    # PHASE: APT — sync managed files in /etc/apt/{sources.list.d, apt.conf.d, preferences.d}/
    # =========================================================================

    - name: "[apt-configure] Assert apt_additional_configs entries"
      assert:
        that:
          - item.filePath is defined
          - item.filePath | length > 0
          - "'..' not in item.filePath"
          - >-
            item.filePath.startswith("sources.list.d/ansible-")
            or item.filePath.startswith("apt.conf.d/ansible-")
          - item.content is defined
          - item.content | length > 0
        fail_msg: >-
          apt_additional_configs[{{ idx }}]: filePath must
          start with "sources.list.d/ansible-" or "apt.conf.d/ansible-",
          content required, no '..' in path
      loop: "{{ apt_additional_configs }}"
      loop_control:
        label: "{{ item.filePath | default('<no filePath>') }}"
        index_var: idx
      when: apt_additional_configs | length > 0
      tags: [always]

    - name: "[apt-configure] Assert apt_preferences entries"
      assert:
        that:
          - item.name is defined
          - item.name | length > 0
          - item.name.startswith("ansible-")
          - "'/' not in item.name"
          - item.content is defined
          - item.content | length > 0
        fail_msg: >-
          apt_preferences[{{ idx }}]: name must start with
          "ansible-", no '/' in name, content required
      loop: "{{ apt_preferences }}"
      loop_control:
        label: "{{ item.name | default('<no name>') }}"
        index_var: idx
      when: apt_preferences | length > 0
      tags: [always]

    - name: "[apt-configure] Initialize per-subdir file lists"
      set_fact:
        apt_sources_list_d_files: []
        apt_conf_d_files: []
        apt_preferences_d_files: []

    - name: "[apt-configure] Build apt_sources_list_d_files from apt_additional_configs"
      set_fact:
        apt_sources_list_d_files: >-
          {{ apt_sources_list_d_files + [{
               'filename': item.filePath | regex_replace('^sources\\.list\\.d/', ''),
               'content': item.content
             }] }}
      loop: "{{ apt_additional_configs }}"
      loop_control:
        label: "{{ item.filePath }}"
      when: item.filePath.startswith('sources.list.d/')

    - name: "[apt-configure] Build apt_conf_d_files from apt_additional_configs"
      set_fact:
        apt_conf_d_files: >-
          {{ apt_conf_d_files + [{
               'filename': item.filePath | regex_replace('^apt\\.conf\\.d/', ''),
               'content': item.content
             }] }}
      loop: "{{ apt_additional_configs }}"
      loop_control:
        label: "{{ item.filePath }}"
      when: item.filePath.startswith('apt.conf.d/')

    - name: "[apt-configure] Build apt_preferences_d_files from apt_preferences"
      set_fact:
        apt_preferences_d_files: >-
          {{ apt_preferences_d_files + [{
               'filename': item.name,
               'content': item.content
             }] }}
      loop: "{{ apt_preferences }}"
      loop_control:
        label: "{{ item.name }}"

    - name: "[apt-configure] Sync /etc/apt/sources.list.d/"
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-sync-managed-files.yaml"
      vars:
        dto_label_name: "apt-configure-sources"
        dto_target_dir: "/etc/apt/sources.list.d"
        dto_files_list: "{{ apt_sources_list_d_files }}"
        dto_filename_prefix: "ansible-"
        dto_res_fact_changed: "apt_sources_changed"

    - name: "[apt-configure] Sync /etc/apt/apt.conf.d/"
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-sync-managed-files.yaml"
      vars:
        dto_label_name: "apt-configure-conf"
        dto_target_dir: "/etc/apt/apt.conf.d"
        dto_files_list: "{{ apt_conf_d_files }}"
        dto_filename_prefix: "ansible-"
        dto_res_fact_changed: "apt_conf_d_changed"

    - name: "[apt-configure] Sync /etc/apt/preferences.d/"
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-sync-managed-files.yaml"
      vars:
        dto_label_name: "apt-configure-preferences"
        dto_target_dir: "/etc/apt/preferences.d"
        dto_files_list: "{{ apt_preferences_d_files }}"
        dto_filename_prefix: "ansible-"
        dto_res_fact_changed: "apt_prefs_changed"

    - name: "[apt-configure] Update apt cache"
      apt:
        update_cache: true
      when: apt_sources_changed or apt_conf_d_changed or apt_prefs_changed

    # =========================================================================
    # PHASE: FAIL2BAN — install package, sync jail.d/
    # =========================================================================

    - name: "[fail2ban-install] Assert legacy fail2ban_jail_local is not used"
      assert:
        that:
          - fail2ban_jail_local is not defined
        fail_msg: >-
          Variable `fail2ban_jail_local` is deprecated. Migrate content to
          `fail2ban_jail_d_files` (list of {filename, content}). See
          reference/variables.md §2.13.
      tags: [always]

    - name: "[fail2ban-install] Assert fail2ban_jail_d_files is defined"
      assert:
        that:
          - fail2ban_jail_d_files is defined
          - fail2ban_jail_d_files is sequence
        fail_msg: "fail2ban_jail_d_files must be defined in inventory (hosts-vars/linux-pkgs.yaml or override)"
      tags: [always]

    - name: "[fail2ban-install] Install fail2ban package"
      apt:
        name: fail2ban
        state: present
        update_cache: true
        cache_valid_time: 3600
      register: fail2ban_apt_result

    - name: "[fail2ban-install] Sync /etc/fail2ban/jail.d/"
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-sync-managed-files.yaml"
      vars:
        dto_label_name: "fail2ban-install"
        dto_target_dir: "/etc/fail2ban/jail.d"
        dto_files_list: "{{ fail2ban_jail_d_files }}"
        dto_filename_prefix: "ansible-"
        dto_res_fact_changed: "fail2ban_files_changed"

    - name: "[fail2ban-install] Ensure fail2ban is enabled and running"
      systemd:
        name: fail2ban
        enabled: true
        state: started

    - name: "[fail2ban-install] Restart fail2ban if package or config changed"
      systemd:
        name: fail2ban
        state: restarted
      when: >-
        fail2ban_apt_result.changed
        or fail2ban_files_changed

    - name: "[fail2ban-install] Check fail2ban service is active"
      command: systemctl is-active fail2ban
      register: fail2ban_active_check
      changed_when: false

    - name: "[fail2ban-install] Assert fail2ban is active"
      assert:
        that:
          - fail2ban_active_check.stdout | trim == 'active'
        fail_msg: "fail2ban service is NOT active"
        success_msg: "fail2ban: active"

    - name: "[fail2ban-install] Get fail2ban-client status"
      command: fail2ban-client status
      register: fail2ban_status
      changed_when: false

    - name: "[fail2ban-install] Print fail2ban status"
      debug:
        var: fail2ban_status.stdout_lines

    - name: "[fail2ban-install] Print final status"
      debug:
        msg: "=== fail2ban Installation Complete ==="

    # =========================================================================
    # PHASE: SSHD — sync sshd_config.d/, validate, reload on change
    # =========================================================================

    - name: "[sshd-configure] Assert sshd_config_d_files is defined"
      assert:
        that:
          - sshd_config_d_files is defined
          - sshd_config_d_files is sequence
        fail_msg: "sshd_config_d_files must be defined in inventory (hosts-vars/linux-pkgs.yaml or override)"
      tags: [always]

    - name: "[sshd-configure] Sync /etc/ssh/sshd_config.d/"
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-sync-managed-files.yaml"
      vars:
        dto_label_name: "sshd-configure"
        dto_target_dir: "/etc/ssh/sshd_config.d"
        dto_files_list: "{{ sshd_config_d_files }}"
        dto_filename_prefix: "ansible-"
        dto_res_fact_changed: "sshd_files_changed"

    - name: "[sshd-configure] Validate full sshd config (sshd -t)"
      command: sshd -t
      changed_when: false

    - name: "[sshd-configure] Reload sshd"
      systemd:
        name: ssh
        state: reloaded
      when: sshd_files_changed

    - name: "[sshd-configure] Check ssh service is active"
      command: systemctl is-active ssh
      register: ssh_active_check
      changed_when: false

    - name: "[sshd-configure] Assert ssh is active"
      assert:
        that:
          - ssh_active_check.stdout | trim == 'active'
        fail_msg: "ssh service is NOT active"
        success_msg: "ssh: active"

    - name: "[sshd-configure] Print final status"
      debug:
        msg: "=== sshd-configure complete (sshd_files_changed={{ sshd_files_changed }}) ==="

    # =========================================================================
    # PHASE: REBOOT — conditional reboot if any sync fact is true
    # =========================================================================

    - name: "[reboot-services] Compute reboot condition"
      set_fact:
        linux_service_configure_needs_reboot: >-
          {{ apt_sources_changed
             or apt_conf_d_changed
             or apt_prefs_changed
             or fail2ban_files_changed
             or sshd_files_changed }}

    - name: "[reboot-services] Reboot servers if any linux service config changed"
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-reboot-cluster.yaml"
      vars:
        dto_label_name: "linux-service-configure"
        dto_reboot_when_condition: "{{ linux_service_configure_needs_reboot }}"

    # =========================================================================
    # DISABLE SWAP
    # =========================================================================

    - name: Pre-Check swap status
      command: swapon --show
      register: swap_pre_check
      changed_when: false

    - name: Disable swap
      command: swapoff -a
      when: swap_pre_check.stdout | length > 0

    - name: Comment swap in /etc/fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\s+swap\s+.*)$'
        replace: '# \1'
        backup: yes
      when: swap_pre_check.stdout | length > 0

    - name: Mask swap.target
      systemd:
        name: swap.target
        masked: yes
      when: swap_pre_check.stdout | length > 0

    # =========================================================================
    # SYSCTL PARAMETERS
    # =========================================================================

    - name: Create /etc/sysctl.d/k8s.conf
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          {% for param in k8s_sysctl_list %}
          {{ param }} = 1
          {% endfor %}
        mode: '0644'
      register: sysctl_conf_create_result

    # =========================================================================
    # KERNEL MODULES (overlay, br_netfilter)
    # =========================================================================

    - name: Create /etc/modules-load.d/k8s.conf
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          {% for module in k8s_module_list %}
          {{ module }}
          {% endfor %}
        mode: '0644'
      register: modules_conf_create_result

    # =========================================================================
    # SOFTDOG (WATCHDOG)
    # =========================================================================

    - name: Create softdog modprobe config
      copy:
        dest: /etc/modprobe.d/softdog.conf
        content: |
          options softdog soft_margin={{ softdog_timeout }}
          install softdog /sbin/modprobe --ignore-install softdog
        mode: '0644'
      register: softdog_conf_result

    - name: Create softdog systemd service
      copy:
        dest: /etc/systemd/system/softdog.service
        content: |
          [Unit]
          Description=Load softdog watchdog module
          After=systemd-modules-load.service

          [Service]
          Type=oneshot
          ExecStart=/sbin/modprobe softdog
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
        mode: '0644'
      register: softdog_service_result

    - name: Enable softdog service
      systemd:
        name: softdog.service
        enabled: true
        daemon_reload: true

    # =========================================================================
    # REBOOT
    # =========================================================================

    - name: Compute reboot condition
      set_fact:
        node_prepare_needs_reboot: >-
          {{ sysctl_conf_create_result.changed
             or modules_conf_create_result.changed
             or softdog_conf_result.changed
             or softdog_service_result.changed
             or (swap_pre_check.stdout | length > 0) }}

    - name: Reboot servers if kernel modules/sysctl/softdog/swap changed
      include_tasks: "{{ project_root }}/playbook-system/tasks/tasks-reboot-cluster.yaml"
      vars:
        dto_label_name: "node-prepare"
        dto_reboot_when_condition: "{{ node_prepare_needs_reboot }}"

    # =========================================================================
    # FINAL VERIFICATION
    # =========================================================================

    # ======
    # SWAP
    # ======
    - name: Check swap status
      command: swapon --show
      register: swap_check
      changed_when: false

    - name: Assert swap is disabled
      assert:
        that:
          - swap_check.stdout | length == 0
        fail_msg: "Swap is still active"
        success_msg: "Swap disabled"

    # ======
    # SYSCTL
    # ======
    - name: Check sysctl parameter
      command: sysctl -n {{ item }}
      register: sysctl_check
      changed_when: false
      loop: "{{ k8s_sysctl_list }}"

    - name: Assert all sysctl parameters are 1
      assert:
        that:
          - item.stdout | trim == '1'
        fail_msg: "{{ item.item }} is NOT 1!"
        quiet: true
      loop: "{{ sysctl_check.results }}"
      loop_control:
        label: "{{ item.item }}"

    # ======
    # MODULES
    # ======
    - name: Check loaded modules
      command: lsmod
      register: lsmod_check
      changed_when: false

    - name: Assert k8s modules are loaded
      assert:
        that:
          - "item in lsmod_check.stdout"
        fail_msg: "{{ item }} module is NOT loaded!"
        success_msg: "{{ item }}: OK"
      loop: "{{ k8s_module_list }}"

    - name: Print final status
      debug:
        msg: "=== Server Preparation Complete ==="
