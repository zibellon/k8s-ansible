# =============================================================================
# Install cert-manager via Helm
# Steps:
#   1. cert-manager/pre: NetworkPolicies for cert-manager namespace
#   2. Official cert-manager Helm chart (jetstack/cert-manager)
#   3. cert-manager/post: ClusterIssuer for Let's Encrypt
#
# Usage (tags):
#   ansible-playbook cert-manager-install.yaml              # full install
#   ansible-playbook cert-manager-install.yaml --tags pre   # only pre (NetworkPolicies)
#   ansible-playbook cert-manager-install.yaml --tags install
#   ansible-playbook cert-manager-install.yaml --tags post  # only post (ClusterIssuer)
# =============================================================================

---
- name: Install cert-manager
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[cert-manager-install-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        label_name: "cert-manager-install-pre-check"
      tags: [always]

    - name: "[cert-manager-install-pre-check] Forbid kube-system namespace"
      include_tasks: tasks/tasks-forbid-kube-system.yaml
      vars:
        label_name: "cert-manager-install-pre-check"
        namespace_value: "{{ cert_manager_namespace }}"
      tags: [always]

    # =========================================================================
    # STEP 1: CERT-MANAGER/PRE (NetworkPolicies)
    # =========================================================================

    - name: "[cert-manager-pre] Copy chart to server"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "cert-manager-pre"
        chart_name: "pre"
        chart_local_src: "{{ project_root }}/playbook-app/charts/cert-manager/pre/"
        chart_remote_dest: "{{ remote_charts_dir }}/cert-manager/pre"
      tags: [pre]

    - name: "[cert-manager-pre] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/cert-manager/pre/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ cert_manager_namespace }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [pre]

    - name: "[cert-manager-pre] Install or upgrade via Helm"
      command: >
        helm upgrade --install cert-manager-pre {{ remote_charts_dir }}/cert-manager/pre
        --namespace {{ cert_manager_namespace }}
        --create-namespace
        --values {{ remote_charts_dir }}/cert-manager/pre/values-override.yaml
        --cleanup-on-fail
        --atomic
        --wait
        --wait-for-jobs
        --timeout {{ cert_manager_config_helm_timeout }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [pre]

    # =========================================================================
    # STEP 2: OFFICIAL CERT-MANAGER HELM
    # =========================================================================

    - name: "[cert-manager-install] Add Helm repository"
      include_tasks: tasks/tasks-add-helm-repo.yaml
      vars:
        label_name: "cert-manager-install"
        helm_repo_name: "jetstack"
        helm_repo_url: "https://charts.jetstack.io"
      tags: [install]

    - name: "[cert-manager-install] Ensure charts directory exists"
      file:
        path: "{{ remote_charts_dir }}/cert-manager/install"
        state: directory
        mode: "0755"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[cert-manager-install] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/cert-manager/install/values-override.yaml"
        mode: "0644"
        content: |
          crds:
            enabled: true
          prometheus:
            enabled: true
            servicemonitor:
              enabled: {{ cert_manager_service_monitor_enabled }}
              prometheusInstance: "{{ cert_manager_service_monitor_prometheus_instance }}"
              targetPort: "{{ cert_manager_service_monitor_target_port }}"
              path: "{{ cert_manager_service_monitor_path }}"
              interval: "{{ cert_manager_service_monitor_interval }}"
              scrapeTimeout: "{{ cert_manager_service_monitor_scrape_timeout }}"
              labels: {{ cert_manager_service_monitor_labels | to_json }}
          tolerations: {{ cert_manager_tolerations | to_json }}
          nodeSelector: {{ cert_manager_node_selector | to_json }}
          affinity: {{ cert_manager_affinity | to_json }}
          replicaCount: {{ cert_manager_replica_count }}
          resources: {{ cert_manager_resources | to_json }}
          cainjector:
            tolerations: {{ cert_manager_cainjector_tolerations | to_json }}
            nodeSelector: {{ cert_manager_cainjector_node_selector | to_json }}
            affinity: {{ cert_manager_cainjector_affinity | to_json }}
            replicaCount: {{ cert_manager_cainjector_replica_count }}
            resources: {{ cert_manager_cainjector_resources | to_json }}
          webhook:
            tolerations: {{ cert_manager_webhook_tolerations | to_json }}
            nodeSelector: {{ cert_manager_webhook_node_selector | to_json }}
            affinity: {{ cert_manager_webhook_affinity | to_json }}
            replicaCount: {{ cert_manager_webhook_replica_count }}
            resources: {{ cert_manager_webhook_resources | to_json }}
          startupapicheck:
            tolerations: {{ cert_manager_startupapicheck_tolerations | to_json }}
            nodeSelector: {{ cert_manager_startupapicheck_node_selector | to_json }}
            affinity: {{ cert_manager_startupapicheck_affinity | to_json }}
            resources: {{ cert_manager_startupapicheck_resources | to_json }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[cert-manager-install] Install or upgrade via Helm"
      command: >
        helm upgrade --install cert-manager jetstack/cert-manager
        --namespace {{ cert_manager_namespace }}
        --version v{{ cert_manager_version }}
        --values {{ remote_charts_dir }}/cert-manager/install/values-override.yaml
        --cleanup-on-fail
        --atomic
        --wait
        --wait-for-jobs
        --timeout {{ cert_manager_helm_timeout }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    # =========================================================================
    # WAIT FOR CERT-MANAGER CRDs
    # =========================================================================

    - name: "[cert-manager-install] Wait for CRDs"
      include_tasks: tasks/tasks-wait-crds.yaml
      vars:
        label_name: "cert-manager-install"
        crds_list:
          - crd/certificaterequests.cert-manager.io
          - crd/certificates.cert-manager.io
          - crd/challenges.acme.cert-manager.io
          - crd/clusterissuers.cert-manager.io
          - crd/issuers.cert-manager.io
          - crd/orders.acme.cert-manager.io
      tags: [install]

    # =========================================================================
    # WAIT FOR CERT-MANAGER PODS
    # =========================================================================

    - name: "[cert-manager-install] Wait for rollouts"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "cert-manager-install"
        rollout_namespace: "{{ cert_manager_namespace }}"
        rollout_timeout: "{{ cert_manager_rollout_timeout }}"
        rollout_resources:
          - deployment/cert-manager
          - deployment/cert-manager-cainjector
          - deployment/cert-manager-webhook
      tags: [install]

    # =========================================================================
    # STEP 3: CERT-MANAGER/POST (ClusterIssuer)
    # =========================================================================

    - name: "[cert-manager-post] Validate ClusterIssuer names are unique"
      assert:
        that:
          - cert_manager_cluster_issuers | map(attribute='name') | list | count ==
            cert_manager_cluster_issuers | map(attribute='name') | unique | list | count
        fail_msg: >-
          cert_manager_cluster_issuers contains duplicate names:
          {{ cert_manager_cluster_issuers | map(attribute='name') | list }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [post]

    - name: "[cert-manager-post] Validate ClusterIssuer privateKeySecretNames are unique"
      assert:
        that:
          - cert_manager_cluster_issuers | map(attribute='privateKeySecretName') | list | count ==
            cert_manager_cluster_issuers | map(attribute='privateKeySecretName') | unique | list | count
        fail_msg: >-
          cert_manager_cluster_issuers contains duplicate privateKeySecretNames:
          {{ cert_manager_cluster_issuers | map(attribute='privateKeySecretName') | list }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [post]

    - name: "[cert-manager-post] Copy chart to server"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "cert-manager-post"
        chart_name: "post"
        chart_local_src: "{{ project_root }}/playbook-app/charts/cert-manager/post/"
        chart_remote_dest: "{{ remote_charts_dir }}/cert-manager/post"
      tags: [post]

    - name: "[cert-manager-post] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/cert-manager/post/values-override.yaml"
        mode: "0644"
        content: |
          clusterIssuers:
          {{ cert_manager_cluster_issuers | to_nice_yaml | indent(2, true) }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [post]

    - name: "[cert-manager-post] Install or upgrade via Helm"
      command: >
        helm upgrade --install cert-manager-post {{ remote_charts_dir }}/cert-manager/post
        --namespace {{ cert_manager_namespace }}
        --values {{ remote_charts_dir }}/cert-manager/post/values-override.yaml
        --cleanup-on-fail
        --atomic
        --wait
        --wait-for-jobs
        --timeout {{ cert_manager_config_helm_timeout }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [post]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[cert-manager-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        helm_namespace: "{{ cert_manager_namespace }}"
        label_name: "cert-manager-verify"
      tags: [always]

    - name: "[cert-manager-verify] Get cert-manager pods status"
      command: kubectl get pods -n {{ cert_manager_namespace }} -o wide
      register: certmanager_pods
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[cert-manager-verify] Print cert-manager pods status"
      debug:
        msg: "{{ certmanager_pods.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[cert-manager-verify] Installation complete"
      debug:
        msg: "cert-manager-pre + cert-manager + cert-manager-post: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
