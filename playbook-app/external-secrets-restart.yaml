# =============================================================================
# EXTERNAL SECRETS RESTART
# Restarts External Secrets Operator Deployments to apply configuration changes
# =============================================================================
# Usage:
#   ansible-playbook -i hosts-vars/ -i hosts-vars-override/ playbook-app/external-secrets-restart.yaml
# =============================================================================

- name: Restart External Secrets Operator
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[external-secrets-restart-pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-pre-check.yaml"
      vars:
        dto_label_name: "external-secrets-restart-pre-check"

    # -------------------------------------------------------------------------
    # PRE-CHECK: Verify External Secrets is installed
    # -------------------------------------------------------------------------

    - name: "[external-secrets-restart] Check if External Secrets namespace exists"
      command: kubectl get namespace {{ external_secrets_namespace }}
      register: namespace_check
      changed_when: false
      failed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    - name: "[external-secrets-restart] Fail if External Secrets namespace not found"
      fail:
        msg: "External Secrets namespace '{{ external_secrets_namespace }}' not found. Install External Secrets first."
      when: namespace_check.rc != 0
      run_once: true

    - name: "[external-secrets-restart] Show pods in {{ external_secrets_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "external-secrets-restart"
        dto_pods_namespace: "{{ external_secrets_namespace }}"

    # -------------------------------------------------------------------------
    # RESTART DEPLOYMENTS
    # -------------------------------------------------------------------------

    - name: "[external-secrets-restart] Restart External Secrets Deployments"
      command: kubectl rollout restart deployment/{{ item }} -n {{ external_secrets_namespace }}
      loop:
        - external-secrets
        - external-secrets-webhook
        - external-secrets-cert-controller
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    # -------------------------------------------------------------------------
    # WAIT FOR ROLLOUTS TO COMPLETE
    # -------------------------------------------------------------------------

    - name: "[external-secrets-restart] Wait for rollouts"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "external-secrets-restart"
        dto_rollout_namespace: "{{ external_secrets_namespace }}"
        dto_rollout_timeout: "{{ external_secrets_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment/external-secrets
          - deployment/external-secrets-webhook
          - deployment/external-secrets-cert-controller

    # -------------------------------------------------------------------------
    # VERIFY RESTART
    # -------------------------------------------------------------------------

    - name: "[external-secrets-verify] Show pods in {{ external_secrets_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "external-secrets-verify"
        dto_pods_namespace: "{{ external_secrets_namespace }}"

    - name: "[external-secrets-verify] Restart completed"
      debug:
        msg: "External Secrets Operator restart complete"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
