---
# Namespace for resources
# Example: hosts.yaml + hosts-extra.yaml.example (cert_manager_cluster_issuers)
namespace: ""

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443
external:
  httpPort: 80
  httpsPort: 443

# =============================================================================
# cert-manager component ports
# =============================================================================
certManager:
  metricsPort: 9402  # controller, cainjector, webhook Prometheus metrics
  webhookPort: 10250 # admission webhook (apiserver -> cert-manager-webhook)
