---
# Namespace for resources
namespace: ""

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443

# =============================================================================
# reloader component ports
# =============================================================================
reloader:
  metricsPort: 9090  # http server: /live (health) + /metrics (Prometheus)

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
