# =============================================================================
# STAKATER-RELOADER NETWORK POLICIES
# =============================================================================

---
# Default deny all traffic in stakater-reloader namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow DNS for all pods in stakater-reloader namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: {{ .Values.dns.port }}
        - protocol: TCP
          port: {{ .Values.dns.port }}

# =============================================================================
# STAKATER-RELOADER CONTROLLER
# =============================================================================

---
# Allow stakater-reloader egress to kube-apiserver (watch ConfigMaps/Secrets,
# patch Deployments/StatefulSets/DaemonSets).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-stakater-reloader
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: stakater-reloader
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: {{ .Values.apiserver.port }}

---
# Allow Prometheus (mon-system) to scrape stakater-reloader metrics on :9090.
# Port-only ingress (matches external-secrets allow-for-monitoring convention).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-for-monitoring
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.stakaterReloader.metricsPort }}
