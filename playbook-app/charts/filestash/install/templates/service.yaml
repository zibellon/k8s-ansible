apiVersion: v1
kind: Service
metadata:
  name: filestash
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: filestash
    app.kubernetes.io/instance: filestash-{{ .Values.namespace }}
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: filestash
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
  selector:
    app.kubernetes.io/name: filestash
    app.kubernetes.io/instance: filestash-{{ .Values.namespace }}
