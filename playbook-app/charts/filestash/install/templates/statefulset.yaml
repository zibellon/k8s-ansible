apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: filestash
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: filestash
    app.kubernetes.io/instance: filestash-{{ .Values.namespace }}
    app.kubernetes.io/component: app
    app.kubernetes.io/part-of: filestash
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  serviceName: filestash
  selector:
    matchLabels:
      app.kubernetes.io/name: filestash
      app.kubernetes.io/instance: filestash-{{ .Values.namespace }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: filestash
        app.kubernetes.io/instance: filestash-{{ .Values.namespace }}
        app.kubernetes.io/component: app
        app.kubernetes.io/part-of: filestash
        app.kubernetes.io/managed-by: Helm
    spec:
      automountServiceAccountToken: false
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: filestash
          image: {{ .Values.image }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: APPLICATION_URL
              value: {{ .Values.applicationUrl | quote }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.adminSecret.name }}
                  key: {{ .Values.adminSecret.key }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: {{ .Values.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: filestash
        - name: tmp
          emptyDir: {}
