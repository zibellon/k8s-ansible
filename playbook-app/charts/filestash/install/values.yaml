---
# Namespace
namespace: "filestash"

# Container image (full URI:tag)
image: "docker.io/machines/filestash:latest"

# HTTP port
port: 8334

# Public application URL (env APPLICATION_URL -> general.host)
applicationUrl: ""

# Admin password (bcrypt hash) from ESO secret -> env ADMIN_PASSWORD
adminSecret:
  name: ""
  key: ""

# Storage (static PVC on /app/data)
storageClass: "lnstr-major-multi-sync"
storageSize: "2Gi"

# Pod/container securityContext
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  readOnlyRootFilesystem: false

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
