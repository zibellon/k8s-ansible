# =============================================================================
# FILESTASH NETWORK POLICIES - HARDENED
# =============================================================================

# =============================================================================
# BASE POLICIES
# =============================================================================

---
# Default deny all traffic in filestash namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# DNS for all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: {{ .Values.dns.port }}
        - protocol: TCP
          port: {{ .Values.dns.port }}

---
# Allow all traffic between pods inside the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-traffic
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}

# =============================================================================
# FILESTASH APPLICATION POLICY
# =============================================================================

---
# FILESTASH: ingress from Traefik (port 8334) + egress to SeaweedFS S3 (cross-ns)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-filestash
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: filestash
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # From Traefik
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ .Values.filestash.port }}
  egress:
    # To SeaweedFS S3 gateway (cross-namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.seaweedfs.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/component: s3
      ports:
        - protocol: TCP
          port: {{ .Values.seaweedfs.s3Port }}

# =============================================================================
# CROSS-NAMESPACE: SeaweedFS S3 ingress from Filestash (в namespace seaweedfs)
# =============================================================================
{{- if .Values.seaweedfs.enabled }}
---
# SeaweedFS S3: accept ingress from filestash pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: filestash-allow-seaweedfs-s3
  namespace: {{ .Values.seaweedfs.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: s3
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: filestash
      ports:
        - protocol: TCP
          port: {{ .Values.seaweedfs.s3Port }}
{{- end }}

# =============================================================================
# ACME SOLVER (cert-manager HTTP-01 challenge) — одна пара политик на каждый http01 solver
# =============================================================================
{{- if .Values.issuer.enabled }}
{{- $spec := .Values.issuer.spec | default dict }}
{{- if hasKey $spec "acme" }}
{{- range $i, $solver := ($spec.acme.solvers | default list) }}
{{- if hasKey $solver "http01" }}
{{- $ing := $solver.http01.ingress | default dict }}
{{- $solverLabels := dig "podTemplate" "metadata" "labels" (dict "acme.cert-manager.io/http01-solver" "true") $ing }}
---
# http01 solver #{{ $i }} — ingress к solver-pod от traefik
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "allow-acme-solver-{{ $i }}"
  namespace: {{ $.Values.namespace }}
spec:
  podSelector:
    matchLabels:
      {{- toYaml $solverLabels | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ $.Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ $.Values.acmeSolver.port }}
---
# http01 solver #{{ $i }} — egress traefik → solver-pod (в namespace traefik)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "{{ $.Values.namespace }}-allow-acme-solver-{{ $i }}"
  namespace: {{ $.Values.traefik.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Values.traefik.instanceName }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Values.namespace }}
          podSelector:
            matchLabels:
              {{- toYaml $solverLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.acmeSolver.port }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

# =============================================================================
# TRAEFIK NAMESPACE POLICY (allow egress from Traefik to FILESTASH)
# =============================================================================

---
# Allow Traefik to reach FILESTASH (port 8334)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.namespace }}-allow-traefik
  namespace: {{ .Values.traefik.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
  policyTypes:
    - Egress
  egress:
    # To FILESTASH app
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: filestash
      ports:
        - protocol: TCP
          port: {{ .Values.filestash.port }}
