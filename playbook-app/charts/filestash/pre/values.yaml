---
# Namespace
namespace: "filestash"

# External Secrets settings
externalSecrets:
  namespace: ""

# Traefik settings for NetworkPolicy
traefik:
  namespace: ""
  instanceName: ""

# SeaweedFS settings for cross-namespace NetworkPolicy (egress filestash -> S3)
seaweedfs:
  namespace: ""
  enabled: false
  s3Port: 8333

# Filestash ESO settings
eso:
  vaultServerUrl: ""
  saName: ""
  roleName: ""
  secretStoreName: ""
  kvEnginePath: ""
  secrets: []

# cert-manager Issuer — плоский объект {enabled, name, spec}
issuer:
  enabled: false
  name: ""
  spec: {}

# ESO resources global config
esoResourcesConfig:
  secretStoreRefreshInterval: 60
  externalSecretRefreshInterval: "1m"
  externalSecretRefreshPolicy: "Periodic"

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
acmeSolver:
  port: 8089

# =============================================================================
# filestash component ports
# =============================================================================
filestash:
  port: 8334

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
