---
# Namespace
namespace: ""

# Traefik settings for NetworkPolicy
traefik:
  namespace: ""
  instanceName: ""

# HAProxy settings for NetworkPolicy
haproxy:
  namespace: ""

# Teleport ports
teleport:
  webPort: 3080
  sshPort: 3023
  reverseTunnelPort: 3024
  internalConnectPort: 3025
  kubeApiPort: 3026
  vpnOnlyEnabled: false
  vpnIps: []

# cert-manager Issuer — плоский объект {enabled, name, spec}
issuer:
  enabled: false
  name: ""
  spec: {}

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443
acmeSolver:
  port: 8089
external:
  httpPort: 80
  httpsPort: 443

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
