{{- range .Values.bots }}
---
apiVersion: resources.teleport.dev/v1
kind: TeleportBotV1
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
  {{- if .labels }}
  labels:
    {{- toYaml .labels | nindent 4 }}
  {{- end }}
  {{- if .annotations }}
  annotations:
    {{- toYaml .annotations | nindent 4 }}
  {{- end }}
spec:
  {{- toYaml .spec | nindent 2 }}
{{- end }}
