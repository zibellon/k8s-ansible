# =============================================================================
# TELEPORT WEB UI INGRESS (Traefik)
#   issuerEnabled true  → Certificate + HTTPS IngressRoute (websecure, TLS)
#   issuerEnabled false → HTTP IngressRoute (web, без TLS)
# =============================================================================
{{- if .Values.issuerEnabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.ingress.tlsSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.ingress.tlsSecretName }}
  dnsNames:
    - {{ .Values.ingress.domain | quote }}
  issuerRef:
    name: {{ .Values.issuer.name }}
    kind: Issuer
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: teleport-ui
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.ingress.ingressClass }}"
spec:
  entryPoints:
    - {{ .Values.traefik.entryPoints.websecure }}
  routes:
    - match: Host(`{{ .Values.ingress.domain }}`) && PathPrefix(`/`)
      kind: Rule
      {{- if .Values.ingress.vpnOnlyEnabled }}
      middlewares:
        {{- range .Values.ingress.vpnIngressRouteMiddlewares }}
        - name: {{ .name }}
          namespace: {{ .namespace }}
        {{- end }}
      {{- end }}
      services:
        - name: teleport
          port: {{ .Values.webServicePort }}
          scheme: https
          serversTransport: teleport-insecure
  tls:
    secretName: {{ .Values.ingress.tlsSecretName }}
{{- else }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: teleport-ui
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.ingress.ingressClass }}"
spec:
  entryPoints:
    - {{ .Values.traefik.entryPoints.web }}
  routes:
    - match: Host(`{{ .Values.ingress.domain }}`) && PathPrefix(`/`)
      kind: Rule
      {{- if .Values.ingress.vpnOnlyEnabled }}
      middlewares:
        {{- range .Values.ingress.vpnIngressRouteMiddlewares }}
        - name: {{ .name }}
          namespace: {{ .namespace }}
        {{- end }}
      {{- end }}
      services:
        - name: teleport
          port: {{ .Values.webServicePort }}
          scheme: https
          serversTransport: teleport-insecure
{{- end }}
