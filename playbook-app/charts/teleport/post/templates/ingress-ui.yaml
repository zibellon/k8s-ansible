# =============================================================================
# INGRESSROUTE FOR TELEPORT WEB UI (Traefik)
#   ingress.enabled    → рендерить IngressRoute
#   ingress.tlsEnabled → websecure entrypoint + tls-блок; иначе web, без tls
# =============================================================================
{{- if .Values.ingressConfig.ingress.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: teleport-ui
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.ingressConfig.ingress.ingressClass }}"
spec:
  entryPoints:
    {{- if .Values.ingressConfig.ingress.tlsEnabled }}
    - {{ .Values.traefik.entryPoints.websecure }}
    {{- else }}
    - {{ .Values.traefik.entryPoints.web }}
    {{- end }}
  routes:
    - match: Host(`{{ .Values.ingressConfig.domain }}`) && PathPrefix(`/`)
      kind: Rule
      {{- if .Values.ingressConfig.ingress.vpnOnlyEnabled }}
      middlewares:
        {{- range .Values.ingressConfig.ingress.vpnIngressRouteMiddlewares }}
        - name: {{ .name }}
          namespace: {{ .namespace }}
        {{- end }}
      {{- end }}
      services:
        - name: teleport
          port: {{ .Values.webServicePort }}
          scheme: https
          serversTransport: teleport-insecure
  {{- if and .Values.ingressConfig.ingress.tlsEnabled .Values.ingressConfig.tlsSecretName }}
  tls:
    secretName: {{ .Values.ingressConfig.tlsSecretName }}
  {{- end }}
{{- end }}
