# Namespace
namespace: "teleport"

# Ingress settings
ingress:
  ingressClass: ""
  domain: ""
  clusterIssuer: ""
  tlsSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressMiddlewares: ""
  vpnIngressRouteMiddlewares: []
  httpEnable: false
  httpsEnable: true

webServicePort: 443

# SSH / tunnel / kube proxy ports for HAProxy TCP
sshPort: 3023
reverseTunnelPort: 3024
kubeApiPort: 3026

# Traefik settings
traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

# HAProxy settings for SSH TCP ingress
haproxy:
  namespace: ""
  ingressClass: ""
