---
# Namespace
namespace: "teleport"

# cert-manager Issuer (raw {name, spec}) + enable toggle
issuer: {}
issuerEnabled: false

# Ingress settings
ingress:
  ingressClass: ""
  domain: ""
  tlsSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressMiddlewares: ""
  vpnIngressRouteMiddlewares: []

webServicePort: 443

# SSH / tunnel / kube proxy ports for HAProxy TCP
sshPort: 3023
reverseTunnelPort: 3024
kubeApiPort: 3026

# Traefik settings
traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

# HAProxy settings for SSH TCP ingress
haproxy:
  namespace: ""
  ingressClass: ""

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
