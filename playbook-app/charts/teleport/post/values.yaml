---
# Namespace
namespace: "teleport"

# Ingress config (per-domain)
ingressConfig:
  enabled: false
  domain: ""
  ingressClass: ""
  tlsEnabled: false
  tlsSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressRouteMiddlewares: []

# cert-manager Certificate — плоский объект {enabled, name, spec}
certificateConfig:
  enabled: false
  name: ""
  spec: {}

webServicePort: 443

# SSH / tunnel / kube proxy ports for HAProxy TCP
# accept PROXY protocol v2 per TCP bind (true = behind bastion-proxy). Default off (direct access).
sshPort: 3023
sshAcceptProxy: false

reverseTunnelPort: 3024
reverseTunnelAcceptProxy: false

kubeApiPort: 3026
kubeApiAcceptProxy: false

# Traefik settings
traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

# HAProxy settings for SSH TCP ingress
haproxy:
  namespace: ""
  ingressClass: ""

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
