namespace: operators

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443

# =============================================================================
# medik8s component ports
# =============================================================================
medik8s:
  controllerMetricsPort: 8443  # NHC and SNR controller Prometheus metrics
  controllerHealthPort: 8081   # NHC and SNR controller health probes
  controllerWebhookPort: 9443  # SNR controller admission webhook
  daemonsetMetricsPort: 9440   # SNR daemonset Prometheus metrics
  peerHealthPort: 30001        # SNR daemonset peer-to-peer health checks
