---
# Namespace for GitLab Runner
namespace: ""

# External Secrets settings
externalSecrets:
  namespace: ""

# GitLab Runner ESO settings
eso:
  vaultServerUrl: ""
  saName: ""
  roleName: ""
  secretStoreName: ""
  kvEnginePath: ""
  isNeedEso: true
  secrets: []

# ESO resources global config
esoResourcesConfig:
  secretStoreRefreshInterval: 60
  externalSecretRefreshInterval: "1m"
  externalSecretRefreshPolicy: "Periodic"

# GitLab Runner pod selector labels (for NetworkPolicies)
gitlab_runner:
  name: ""
  component: ""

# GitLab Runner job pod selector labels (for NetworkPolicies)
gitlab_runner_job:
  name: ""
  component: ""

# GitLab namespace settings (for cross-namespace NetworkPolicies)
gitlab:
  namespace: "gitlab"
  releaseName: "gitlab"
  sshPortInternal: 2222
  webservicePort: 8181  # gitlab-webservice (API polling + git clone over HTTP)
  minioApiPort: 9000    # gitlab-minio (runner cache S3 endpoint)

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443
external:
  httpPort: 80
  httpsPort: 443

# =============================================================================
# gitlab-runner component ports
# =============================================================================
gitlabRunner:
  metricsPort: 9252  # gitlab-runner Prometheus metrics
  jobDindPort: 2375  # job pod docker-in-docker sidecar
