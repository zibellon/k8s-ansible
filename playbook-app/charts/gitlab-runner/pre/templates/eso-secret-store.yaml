# =============================================================================
# SECRET STORE FOR GITLAB RUNNER SECRETS
# =============================================================================

{{- if not (eq .Values.runnerEso.isNeedEso false) }}
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ .Values.runnerEso.secretStoreName }}
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: {{ .Values.esoResourcesConfig.secretStoreRefreshInterval }}
  provider:
    vault:
      server: http://vault.{{ .Values.vault.namespace }}.svc.{{ .Values.clusterDomain }}:8200
      path: {{ .Values.runnerEso.kvEnginePath }}
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: {{ .Values.runnerEso.roleName }}
          serviceAccountRef:
            name: {{ .Values.runnerEso.saName }}
{{- end }}
