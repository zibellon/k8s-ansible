# =============================================================================
# EXTERNAL SECRETS FOR GITLAB RUNNER (from Vault)
# =============================================================================

{{- range $secret := .Values.runnerEso.secrets }}
{{- if and (not (eq $.Values.runnerEso.isNeedEso false)) (not (eq $secret.is_need_eso false)) }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $secret.external_secret_name }}
  namespace: {{ $.Values.namespace }}
spec:
  refreshInterval: {{ $secret.refresh_interval | default $.Values.esoResourcesConfig.externalSecretRefreshInterval }}
  refreshPolicy: {{ $.Values.esoResourcesConfig.externalSecretRefreshPolicy }}
  secretStoreRef:
    kind: SecretStore
    name: {{ $.Values.runnerEso.secretStoreName }}
{{- if eq $secret.type "runner_token" }}
  # ==========================================================================
  # SPECIAL: runner_token maps Vault key 'token' → k8s key 'runner-token'.
  # The official gitlab/gitlab-runner chart reads runners.secret and expects
  # BOTH keys in the Secret:
  #   runner-token                — the actual auth token (glrt-xxxxx)
  #   runner-registration-token   — must be present as empty string for
  #                                 compatibility (chart fails without it)
  # ref: https://gitlab.com/gitlab-org/charts/gitlab-runner/blob/main/values.yaml
  # ==========================================================================
  target:
    name: {{ $secret.target_secret_name }}
    template:
      engineVersion: v2
      data:
        runner-registration-token: ""
        runner-token: "{{ `{{ .token }}` }}"
  data:
    - secretKey: token
      remoteRef:
        key: {{ $.Values.runnerEso.kvEnginePath }}/data{{ $secret.vault_path }}
        property: token
{{- else if eq $secret.type "minio_runner_cache" }}
  # ==========================================================================
  # SPECIAL: minio_runner_cache_helm remaps access_key/secret_key →
  # accesskey/secretkey as expected by the official gitlab-runner chart
  # runners.cache.secretName.
  # ==========================================================================
  target:
    name: {{ $secret.target_secret_name }}
  data:
    - secretKey: accesskey
      remoteRef:
        key: {{ $.Values.runnerEso.kvEnginePath }}/data{{ $secret.vault_path }}
        property: access_key
    - secretKey: secretkey
      remoteRef:
        key: {{ $.Values.runnerEso.kvEnginePath }}/data{{ $secret.vault_path }}
        property: secret_key
{{- else }}
  target:
    name: {{ $secret.target_secret_name }}
  dataFrom:
    - extract:
        key: {{ $.Values.runnerEso.kvEnginePath }}/data{{ $secret.vault_path }}
{{- end }}
{{- end }}
{{- end }}
