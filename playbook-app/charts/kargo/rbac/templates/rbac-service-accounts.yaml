# =============================================================================
# KARGO USER SERVICE ACCOUNTS
#   Носители прав для OIDC-логинов: Kargo матчит SA по аннотации
#   rbac.kargo.akuity.io/claims и выполняет SubjectAccessReview от его имени.
#   Токен такого SA не выпускается — под ним никто не работает.
#   Элементы рендерятся как есть; связи с ролями здесь нет.
# =============================================================================
{{- range $sa := .Values.rbacServiceAccounts }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa.name }}
  namespace: {{ $.Values.namespace }}
  {{- with $sa.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $sa.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
