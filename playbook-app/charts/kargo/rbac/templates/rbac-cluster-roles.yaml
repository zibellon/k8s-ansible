# =============================================================================
# KARGO CUSTOM CLUSTER ROLES
#   Собственные роли оператора — в дополнение к четырём, которые создаёт
#   install-фаза upstream-чарта (kargo-admin, kargo-project-creator,
#   kargo-user, kargo-viewer). Правила берутся из values как есть.
# =============================================================================
{{- range $cr := .Values.rbacClusterRoles }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $cr.name }}
rules:
{{ toYaml $cr.rules | indent 2 }}
{{- end }}
