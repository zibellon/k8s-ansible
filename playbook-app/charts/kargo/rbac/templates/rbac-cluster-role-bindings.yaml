# =============================================================================
# KARGO CLUSTER ROLE BINDINGS
#   Связывают субъектов с ролями. roleRef может указывать и на чартовую роль,
#   и на собственную из rbacClusterRoles — шаблон это не проверяет.
# =============================================================================
{{- range $crb := .Values.rbacClusterRoleBindings }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $crb.name }}
roleRef:
{{ toYaml $crb.roleRef | indent 2 }}
subjects:
{{ toYaml $crb.subjects | indent 2 }}
{{- end }}
