# =============================================================================
# KARGO USER RBAC — свои ServiceAccount'ы вместо чартовых
#   Kargo матчит OIDC-claims с аннотацией rbac.kargo.akuity.io/claims на SA и
#   выполняет SubjectAccessReview от его имени. ClusterRole'и создаёт install-фаза.
# =============================================================================
{{- range $sa := .Values.rbacServiceAccounts }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa.name }}
  namespace: {{ $.Values.namespace }}
  annotations:
    rbac.kargo.akuity.io/claims: {{ $sa.claims | toJson | quote }}
{{- range $role := $sa.clusterRoles }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: "{{ $sa.name }}-{{ $role }}"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $role }}
subjects:
  - kind: ServiceAccount
    name: {{ $sa.name }}
    namespace: {{ $.Values.namespace }}
{{- end }}
{{- end }}
