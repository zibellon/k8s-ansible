# =============================================================================
# CERTIFICATES FOR KARGO (cert-manager)
#   Каждый Certificate рендерится если <unit>CertificateConfig.enabled.
#   Полный raw spec из values (issuerRef внутри spec).
# =============================================================================
{{- if .Values.uiCertificateConfig.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.uiCertificateConfig.name }}
  namespace: {{ .Values.namespace }}
spec:
{{ toYaml .Values.uiCertificateConfig.spec | indent 2 }}
{{- end }}
{{- if .Values.webhooksCertificateConfig.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.webhooksCertificateConfig.name }}
  namespace: {{ .Values.namespace }}
spec:
{{ toYaml .Values.webhooksCertificateConfig.spec | indent 2 }}
{{- end }}
