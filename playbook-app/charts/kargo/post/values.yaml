---
namespace: ""

# Ingress config (Traefik). tlsEnabled → websecure + router.tls (ACME); false → web (TLS у Cloudflare).
ingressConfig:
  enabled: false
  domain: ""
  ingressClass: ""
  tlsEnabled: false
  tlsSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressMiddlewares: ""

# cert-manager Certificate — плоский объект {enabled, name, spec}
certificateConfig:
  enabled: false
  name: ""
  spec: {}

traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

# Kargo API service (создаётся install-фазой upstream-чарта)
service:
  name: ""
  port: 80

# Пользовательские ServiceAccount'ы для OIDC-логинов: claims → ClusterRole.
# Элемент: {name, claims: {<claim>: [<значение>...]}, clusterRoles: [<роль>...]}
rbacServiceAccounts: []

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
