---
namespace: ""

# Ingress config (Traefik). tlsEnabled → websecure + router.tls (ACME); false → web (TLS у Cloudflare).
uiIngressConfig:
  enabled: false
  domain: ""
  ingressClass: ""
  tlsEnabled: false
  tlsSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressMiddlewares: ""

# Публичный домен external-webhooks-server (события от GitLab и registry).
webhooksIngressConfig:
  enabled: false
  domain: ""
  ingressClass: ""
  tlsEnabled: false
  tlsSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressMiddlewares: ""

# cert-manager Certificate — плоские объекты {enabled, name, spec}
uiCertificateConfig:
  enabled: false
  name: ""
  spec: {}
webhooksCertificateConfig:
  enabled: false
  name: ""
  spec: {}

traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

# Service'ы создаёт install-фаза upstream-чарта
apiService:
  name: ""
  port: 80
externalWebhooksService:
  name: ""
  port: 80

# Пользовательские RBAC-объекты — три независимых списка, элементы рендерятся
# как есть (raw). Связи между списками нет: SA может быть без биндинга,
# ClusterRole без SA, биндинг — на чартовую роль.
# SA:      {name, annotations?, labels?}
# Role:    {name, rules}
# Binding: {name, roleRef, subjects}
rbacServiceAccounts: []
rbacClusterRoles: []
rbacClusterRoleBindings: []

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
