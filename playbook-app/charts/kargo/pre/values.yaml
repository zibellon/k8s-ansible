---
# Namespace
namespace: "kargo"

# External Secrets settings
externalSecrets:
  namespace: ""

# Traefik settings for NetworkPolicy
traefik:
  namespace: ""
  instanceName: ""

# Kargo ESO settings
eso:
  vaultServerUrl: ""
  saName: ""
  roleName: ""
  secretStoreName: ""
  kvEnginePath: ""
  secrets: []

# cert-manager Issuer — плоский объект {enabled, name, spec}
issuer:
  enabled: false
  name: ""
  spec: {}

# ESO resources global config
esoResourcesConfig:
  secretStoreRefreshInterval: 60
  externalSecretRefreshInterval: "1m"
  externalSecretRefreshPolicy: "Periodic"

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443
acmeSolver:
  port: 8089
external:
  httpPort: 80
  httpsPort: 443

# =============================================================================
# kargo component ports
# =============================================================================
kargo:
  apiPort: 8080          # containerPort API-сервера (Service слушает 80 -> targetPort 8080)
  webhooksServerPort: 9443  # admission webhooks, вызывает kube-apiserver
  externalWebhooksPort: 8080  # containerPort приёмника событий от GitLab/registry

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
