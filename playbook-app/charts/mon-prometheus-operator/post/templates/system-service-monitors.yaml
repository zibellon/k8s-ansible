# =============================================================================
# SERVICEMONITORS FOR SYSTEM COMPONENTS
# Created in prometheus namespace (mon). Prometheus reads ServiceMonitors from
# all namespaces (serviceMonitorNamespaceSelector: {}).
# Components: kube-apiserver, kube-controller-manager, kube-etcd,
#             kube-scheduler, coredns, kubelet
# =============================================================================

{{- range .Values.systemServiceMonitors }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .name }}
  namespace: {{ .namespace }}
spec:
  jobLabel: {{ .jobLabel }}
  namespaceSelector:
    {{- toYaml .namespaceSelector | nindent 4 }}
  selector:
    {{- toYaml .selector | nindent 4 }}
  endpoints:
    {{- toYaml .endpoints | nindent 4 }}
{{- end }}
