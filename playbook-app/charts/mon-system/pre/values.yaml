---
namespace: ""

prometheus_operator:
  enabled: false
prometheus:
  enabled: false
  port: 0
alertmanager:
  enabled: false
  port: 0
nodeExporter:
  enabled: false
ksm:
  enabled: false
loki:
  enabled: false
vector:
  enabled: false
grafana:
  enabled: false
  port: 0

traefik:
  namespace: ""
  instanceName: ""

# cert-manager Issuer — единый объект {enabled, body: {name, spec}}
issuer:
  enabled: false
  body: {}

eso:
  vaultServerUrl: ""
  saName: ""
  roleName: ""
  secretStoreName: ""
  kvEnginePath: ""
  secrets: []

esoResourcesConfig:
  secretStoreRefreshInterval: ""
  externalSecretRefreshInterval: ""
  externalSecretRefreshPolicy: ""

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443
acmeSolver:
  port: 8089
external:
  httpPort: 80
  httpsPort: 443

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
