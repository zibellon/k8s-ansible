apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: grafana
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: monitoring
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/instance: grafana
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: monitoring
        app.kubernetes.io/managed-by: Helm
    spec:
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        fsGroup: 472
        runAsUser: 472
        runAsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: grafana-data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image }}"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.adminSecret.name }}
                  key: {{ .Values.adminSecret.usernameKey }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.adminSecret.name }}
                  key: {{ .Values.adminSecret.passwordKey }}
            - name: GF_DATABASE_TYPE
              value: {{ .Values.database.type | quote }}
            - name: GF_DATABASE_HOST
              value: {{ .Values.database.host | quote }}
            - name: GF_DATABASE_NAME
              value: {{ .Values.database.name | quote }}
            - name: GF_DATABASE_USER
              value: {{ .Values.database.user | quote }}
            - name: GF_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.passwordSecretName }}
                  key: password
            - name: GF_DATABASE_SSL_MODE
              value: {{ .Values.database.sslMode | quote }}
            - name: GF_DATABASE_MAX_OPEN_CONNS
              value: {{ .Values.database.maxOpenConns | quote }}
            - name: GF_DATABASE_MAX_IDLE_CONNS
              value: {{ .Values.database.maxIdleConns | quote }}
            - name: GF_DATABASE_CONN_MAX_LIFETIME
              value: {{ .Values.database.connMaxLifetime | quote }}
            {{- if .Values.grafana.installPlugins }}
            - name: GF_INSTALL_PLUGINS
              value: {{ .Values.grafana.installPlugins | quote }}
            {{- end }}
            {{- if .Values.grafana.externalUrl }}
            - name: GF_SERVER_ROOT_URL
              value: {{ .Values.grafana.externalUrl | quote }}
            {{- end }}
          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
          ports:
            - name: web
              containerPort: {{ .Values.grafana.port }}
              protocol: TCP
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.grafana.port }}
            initialDelaySeconds: 60
            timeoutSeconds: 30
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.grafana.port }}
            initialDelaySeconds: 0
            timeoutSeconds: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.grafana.port }}
            initialDelaySeconds: 30
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 1
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - port: {{ .Values.grafana.port }}
      targetPort: {{ .Values.grafana.port }}
      protocol: TCP
      name: web
