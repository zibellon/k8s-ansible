---
namespace: ""
ingressClass: ""
vpnIngressMiddlewares: ""

# cert-manager Issuer (raw {name, spec}) + enable toggle
issuer: {}
issuerEnabled: false

traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

prometheus_operator:
  enabled: false

grafana:
  enabled: false
  port: 0
  ingress:
    domain: ""
    secretName: ""
    vpnOnlyEnabled: false
  serviceMonitor:
    interval: ""
    scrapeTimeout: ""
    labels: {}

prometheus:
  enabled: false
  port: 0
  ingress:
    domain: ""
    secretName: ""
    vpnOnlyEnabled: false

alertmanager:
  enabled: false
  port: 0
  ingress:
    domain: ""
    secretName: ""
    vpnOnlyEnabled: false

loki:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: ""
    scrapeTimeout: ""
    labels: {}

ksm:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: ""
    scrapeTimeout: ""
    labels: {}

nodeExporter:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: ""
    scrapeTimeout: ""
    labels: {}

systemServices: []
systemServiceMonitors: []

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
