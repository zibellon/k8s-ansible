---
namespace: ""

# Ingress config (per-domain)
grafanaIngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressMiddlewares: ""
prometheusIngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressMiddlewares: ""
alertmanagerIngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressMiddlewares: ""

# cert-manager Certificate (per-domain) — плоский объект {enabled, name, spec}
grafanaCertificateConfig:
  enabled: false
  name: ""
  spec: {}
prometheusCertificateConfig:
  enabled: false
  name: ""
  spec: {}
alertmanagerCertificateConfig:
  enabled: false
  name: ""
  spec: {}

traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

prometheus_operator:
  enabled: false

grafana:
  enabled: false
  port: 0
  serviceMonitor:
    interval: ""
    scrapeTimeout: ""
    labels: {}

prometheus:
  enabled: false
  port: 0

alertmanager:
  enabled: false
  port: 0

loki:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: ""
    scrapeTimeout: ""
    labels: {}

ksm:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: ""
    scrapeTimeout: ""
    labels: {}

nodeExporter:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: ""
    scrapeTimeout: ""
    labels: {}

systemServices: []
systemServiceMonitors: []

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
