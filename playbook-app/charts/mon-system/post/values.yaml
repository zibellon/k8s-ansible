---
namespace: ""

# cert-manager Issuer — единый объект {enabled, body: {name, spec}}
issuer:
  enabled: false
  body: {}

# Ingress config (per-domain) — независимые toggle'ы ingress / certificate
grafanaIngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressMiddlewares: ""
  certificate:
    enabled: false
prometheusIngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressMiddlewares: ""
  certificate:
    enabled: false
alertmanagerIngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressMiddlewares: ""
  certificate:
    enabled: false

traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

prometheus_operator:
  enabled: false

grafana:
  enabled: false
  port: 0
  serviceMonitor:
    interval: ""
    scrapeTimeout: ""
    labels: {}

prometheus:
  enabled: false
  port: 0

alertmanager:
  enabled: false
  port: 0

loki:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: ""
    scrapeTimeout: ""
    labels: {}

ksm:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: ""
    scrapeTimeout: ""
    labels: {}

nodeExporter:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: ""
    scrapeTimeout: ""
    labels: {}

systemServices: []
systemServiceMonitors: []

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
