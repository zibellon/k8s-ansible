# =============================================================================
# CERTIFICATES FOR MON-SYSTEM (cert-manager)
#   Каждый Certificate рендерится если <unit>CertificateConfig.enabled.
#   Полный raw spec из values (workload-гейт свёрнут в enabled на уровне inventory).
# =============================================================================
{{- if .Values.grafanaCertificateConfig.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.grafanaCertificateConfig.name }}
  namespace: {{ .Values.namespace }}
spec:
{{ toYaml .Values.grafanaCertificateConfig.spec | indent 2 }}
{{- end }}
{{- if .Values.prometheusCertificateConfig.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.prometheusCertificateConfig.name }}
  namespace: {{ .Values.namespace }}
spec:
{{ toYaml .Values.prometheusCertificateConfig.spec | indent 2 }}
{{- end }}
{{- if .Values.alertmanagerCertificateConfig.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.alertmanagerCertificateConfig.name }}
  namespace: {{ .Values.namespace }}
spec:
{{ toYaml .Values.alertmanagerCertificateConfig.spec | indent 2 }}
{{- end }}
