# =============================================================================
# CERTIFICATES FOR MON-SYSTEM (cert-manager)
#   Каждый Certificate рендерится только если workload-enable gate И
#   issuer.enabled И <unit>IngressConfig.certificate.enabled. issuer выключен
#   → Certificate молча пропускается (без ошибки).
# =============================================================================
{{- if and .Values.grafana.enabled .Values.issuer.enabled .Values.grafanaIngressConfig.certificate.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.grafanaIngressConfig.tlsSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.grafanaIngressConfig.tlsSecretName }}
  dnsNames:
    - {{ .Values.grafanaIngressConfig.domain }}
  issuerRef:
    name: {{ .Values.issuer.body.name }}
    kind: Issuer
{{- end }}
{{- if and .Values.prometheus_operator.enabled .Values.prometheus.enabled .Values.issuer.enabled .Values.prometheusIngressConfig.certificate.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.prometheusIngressConfig.tlsSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.prometheusIngressConfig.tlsSecretName }}
  dnsNames:
    - {{ .Values.prometheusIngressConfig.domain }}
  issuerRef:
    name: {{ .Values.issuer.body.name }}
    kind: Issuer
{{- end }}
{{- if and .Values.prometheus_operator.enabled .Values.alertmanager.enabled .Values.issuer.enabled .Values.alertmanagerIngressConfig.certificate.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.alertmanagerIngressConfig.tlsSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.alertmanagerIngressConfig.tlsSecretName }}
  dnsNames:
    - {{ .Values.alertmanagerIngressConfig.domain }}
  issuerRef:
    name: {{ .Values.issuer.body.name }}
    kind: Issuer
{{- end }}
