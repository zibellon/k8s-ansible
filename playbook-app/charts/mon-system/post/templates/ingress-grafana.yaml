# =============================================================================
# INGRESS FOR GRAFANA (Traefik)
#   grafana.enabled    → workload-enable gate (composite, внешний)
#   ingress.enabled    → рендерить Ingress
#   ingress.tlsEnabled → websecure entrypoint + router.tls + tls-блок; иначе web, без tls
# =============================================================================
{{- if .Values.grafana.enabled }}
{{- if .Values.grafanaIngressConfig.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ui
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.grafanaIngressConfig.ingress.ingressClass | quote }}
    {{- if .Values.grafanaIngressConfig.ingress.tlsEnabled }}
    traefik.ingress.kubernetes.io/router.entrypoints: {{ .Values.traefik.entryPoints.websecure | quote }}
    traefik.ingress.kubernetes.io/router.tls: "true"
    {{- else }}
    traefik.ingress.kubernetes.io/router.entrypoints: {{ .Values.traefik.entryPoints.web | quote }}
    {{- end }}
    {{- if .Values.grafanaIngressConfig.ingress.vpnOnlyEnabled }}
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.grafanaIngressConfig.ingress.vpnIngressMiddlewares }}"
    {{- end }}
spec:
  ingressClassName: {{ .Values.grafanaIngressConfig.ingress.ingressClass }}
  {{- if and .Values.grafanaIngressConfig.ingress.tlsEnabled .Values.grafanaIngressConfig.tlsSecretName }}
  tls:
    - hosts:
        - {{ .Values.grafanaIngressConfig.domain }}
      secretName: {{ .Values.grafanaIngressConfig.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.grafanaIngressConfig.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: {{ .Values.grafana.port }}
{{- end }}
{{- end }}
