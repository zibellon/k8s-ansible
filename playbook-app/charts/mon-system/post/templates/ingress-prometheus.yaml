# =============================================================================
# INGRESS FOR PROMETHEUS UI (Traefik)
#   prometheus_operator.enabled + prometheus.enabled → workload-enable gate (composite, внешний)
#   ingress.enabled    → рендерить Ingress
#   ingress.tlsEnabled → websecure entrypoint + router.tls + tls-блок; иначе web, без tls
# =============================================================================
{{- if and .Values.prometheus_operator.enabled .Values.prometheus.enabled }}
{{- if .Values.prometheusIngressConfig.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.prometheusIngressConfig.ingress.ingressClass | quote }}
    {{- if .Values.prometheusIngressConfig.ingress.tlsEnabled }}
    traefik.ingress.kubernetes.io/router.entrypoints: {{ .Values.traefik.entryPoints.websecure | quote }}
    traefik.ingress.kubernetes.io/router.tls: "true"
    {{- else }}
    traefik.ingress.kubernetes.io/router.entrypoints: {{ .Values.traefik.entryPoints.web | quote }}
    {{- end }}
    {{- if .Values.prometheusIngressConfig.ingress.vpnOnlyEnabled }}
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.prometheusIngressConfig.ingress.vpnIngressMiddlewares }}"
    {{- end }}
spec:
  ingressClassName: {{ .Values.prometheusIngressConfig.ingress.ingressClass }}
  {{- if and .Values.prometheusIngressConfig.ingress.tlsEnabled .Values.prometheusIngressConfig.tlsSecretName }}
  tls:
    - hosts:
        - {{ .Values.prometheusIngressConfig.domain }}
      secretName: {{ .Values.prometheusIngressConfig.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.prometheusIngressConfig.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-instance
                port:
                  number: {{ .Values.prometheus.port }}
{{- end }}
{{- end }}
