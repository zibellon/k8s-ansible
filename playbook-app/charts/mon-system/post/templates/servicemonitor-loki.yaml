{{- if and .Values.loki.enabled .Values.loki.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: loki
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/component: log-store
    app.kubernetes.io/part-of: monitoring
    {{- with .Values.loki.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  endpoints:
    - port: api
      interval: {{ .Values.loki.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.loki.serviceMonitor.scrapeTimeout }}
  namespaceSelector:
    matchNames:
      - {{ .Values.namespace }}
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
{{- end }}
