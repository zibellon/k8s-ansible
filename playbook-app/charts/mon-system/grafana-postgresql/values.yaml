---
# PostgreSQL configuration
namespace: "mon-system"

image: "postgres:17.9-alpine3.23"

# Database identity
databaseName: "grafana"
username: "grafana"

# Network
port: 5432

# Storage
storageClass: "lh-major-multi-best-effort"
storageSize: 10Gi

# Pod scheduling / resources
tolerations: []
nodeSelector: {}
affinity: {}
resources: {}

# Credentials secret (from ESO)
credentials:
  secretName: ""
  usernameKey: ""
  passwordKey: ""

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
