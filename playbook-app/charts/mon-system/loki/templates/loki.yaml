---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lh-loki-data
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Delete=false,Prune=false
spec:
  accessModes:
    - {{ .Values.pvc.accessMode }}
  storageClassName: {{ .Values.pvc.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.pvc.storageSize }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config-yaml
  namespace: {{ .Values.namespace }}
data:
  loki-config.yaml: |
{{ .Values.config_yaml | indent 4 }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: {{ .Values.namespace }}
  annotations:
    argocd.argoproj.io/sync-options: Force=true,Replace=true
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/instance: loki
    app.kubernetes.io/component: log-store
    app.kubernetes.io/part-of: monitoring
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loki
        app.kubernetes.io/instance: loki
        app.kubernetes.io/component: log-store
        app.kubernetes.io/part-of: monitoring
        app.kubernetes.io/managed-by: Helm
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      volumes:
        - name: loki-config
          configMap:
            name: loki-config-yaml
        - name: loki-data
          persistentVolumeClaim:
            claimName: lh-loki-data
        - name: tmp
          emptyDir: {}
      containers:
        - name: loki
          image: "{{ .Values.loki.image.name }}:{{ .Values.loki.image.tag }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: api
              containerPort: {{ .Values.loki.port }}
              protocol: TCP
          volumeMounts:
            - name: loki-data
              mountPath: /loki
              subPath: {{ .Values.pvc.subpath }}
            - name: loki-config
              mountPath: /etc/loki/local-config.yaml
              subPath: loki-config.yaml
              readOnly: true
            - name: tmp
              mountPath: /tmp
          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}

---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/component: log-store
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: loki
  ports:
    - name: api
      protocol: TCP
      port: {{ .Values.loki.port }}
      targetPort: api
