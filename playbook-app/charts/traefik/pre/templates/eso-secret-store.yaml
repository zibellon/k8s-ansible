# =============================================================================
# SECRET STORE FOR TRAEFIK (from Vault)
# =============================================================================

{{- if not (eq .Values.eso.isNeedEso false) }}
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ .Values.eso.secretStoreName }}
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: {{ .Values.esoResourcesConfig.secretStoreRefreshInterval }}
  provider:
    vault:
      server: {{ .Values.eso.vaultServerUrl }}
      path: {{ .Values.eso.kvEnginePath }}
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: {{ .Values.eso.roleName }}
          serviceAccountRef:
            name: {{ .Values.eso.saName }}
{{- end }}
