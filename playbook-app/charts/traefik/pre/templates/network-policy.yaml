# =============================================================================
# TRAEFIK NETWORK POLICIES
# =============================================================================

---
# Default deny all traffic in traefik namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow DNS for traefik
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: {{ .Values.dns.port }}
        - protocol: TCP
          port: {{ .Values.dns.port }}

---
# Allow all traffic between pods inside the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-traffic
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}

# =============================================================================
# PROMETHEUS SCRAPING
# =============================================================================

---
# Allow Prometheus scraping on metrics port for all traefik pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-for-monitoring
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.traefik.metricsPort }} # traefik metrics

# =============================================================================
# TRAEFIK (external traffic)
# =============================================================================

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: traefik
      app.kubernetes.io/instance: {{ .Values.instanceName }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.external.httpPort }} # web
        - protocol: TCP
          port: {{ .Values.external.httpsPort }} # websecure
  egress:
    - ports:
        - protocol: TCP
          port: {{ .Values.external.httpPort }}
        - protocol: TCP
          port: {{ .Values.external.httpsPort }}
        - protocol: TCP
          port: {{ .Values.apiserver.port }}

# =============================================================================
# ACME SOLVER (cert-manager HTTP-01 challenge) — одна пара политик на каждый http01 solver
# =============================================================================
{{- if .Values.issuerEnabled }}
{{- $spec := .Values.issuer.spec | default dict }}
{{- if hasKey $spec "acme" }}
{{- range $i, $solver := ($spec.acme.solvers | default list) }}
{{- if hasKey $solver "http01" }}
{{- $ing := $solver.http01.ingress | default dict }}
{{- $solverLabels := dig "podTemplate" "metadata" "labels" (dict "acme.cert-manager.io/http01-solver" "true") $ing }}
---
# http01 solver #{{ $i }} — ingress к solver-pod от traefik
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "allow-acme-solver-{{ $i }}"
  namespace: {{ $.Values.namespace }}
spec:
  podSelector:
    matchLabels:
      {{- toYaml $solverLabels | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Values.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: {{ $.Values.instanceName }}
      ports:
        - protocol: TCP
          port: {{ $.Values.acmeSolver.port }}
---
# http01 solver #{{ $i }} — egress traefik → solver-pod
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "{{ $.Values.namespace }}-allow-acme-solver-{{ $i }}"
  namespace: {{ $.Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: traefik
      app.kubernetes.io/instance: {{ $.Values.instanceName }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Values.namespace }}
          podSelector:
            matchLabels:
              {{- toYaml $solverLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.acmeSolver.port }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
