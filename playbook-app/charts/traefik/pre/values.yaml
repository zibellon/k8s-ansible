---
# Namespace
namespace: ""
instanceName: ""

# DNS domain for internal service resolution
clusterDomain: ""

# Vault namespace for SecretStore connection
vault:
  namespace: ""

# ESO settings
eso:
  vaultServerUrl: ""
  saName: ""
  roleName: ""
  secretStoreName: ""
  kvEnginePath: ""
  secrets: []

# ESO resources global config
esoResourcesConfig:
  secretStoreRefreshInterval: 60
  externalSecretRefreshInterval: "1m"
  externalSecretRefreshPolicy: "Periodic"

# cert-manager Issuer — единый объект {enabled, body: {name, spec}}
issuer:
  enabled: false
  body: {}

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443
acmeSolver:
  port: 8089
external:
  httpPort: 80
  httpsPort: 443

# =============================================================================
# traefik component ports
# =============================================================================
traefik:
  metricsPort: 9200

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
