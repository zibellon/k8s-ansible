---
# Namespace
namespace: ""

# cert-manager Issuer — единый объект {enabled, body: {name, spec}}
issuer:
  enabled: false
  body: {}

# Ingress config (per-domain) — независимые toggle'ы ingress / certificate
ingressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressMiddlewares: ""
  certificate:
    enabled: false

# Traefik entryPoints
traefik:
  entryPoints:
    web: ""
    websecure: ""

# Middlewares
middlewares: []

# VPN Middlewares (from vpn-rules.yaml)
vpnMiddlewares: []

# Dashboard backend service
dashboard:
  serviceName: ""

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
