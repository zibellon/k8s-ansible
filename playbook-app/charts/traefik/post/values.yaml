---
# Namespace
namespace: ""

# Ingress config (per-domain)
ingressConfig:
  enabled: false
  domain: ""
  ingressClass: ""
  tlsEnabled: false
  tlsSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressMiddlewares: ""

# cert-manager Certificate — плоский объект {enabled, name, spec}
certificateConfig:
  enabled: false
  name: ""
  spec: {}

# Traefik entryPoints
traefik:
  entryPoints:
    web: ""
    websecure: ""

# Middlewares
middlewares: []

# VPN Middlewares (from vpn-rules.yaml)
vpnMiddlewares: []

# Dashboard backend service
dashboard:
  serviceName: ""

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
