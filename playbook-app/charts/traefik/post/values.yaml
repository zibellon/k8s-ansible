---
# Namespace
namespace: ""

# cert-manager Issuer (raw {name, spec}) + enable toggle
issuer: {}
issuerEnabled: false

# IngressClass
ingressClass: ""

# Traefik entryPoints
traefik:
  entryPoints:
    web: ""
    websecure: ""

# Middlewares
middlewares: []

# VPN Middlewares (from vpn-rules.yaml)
vpnMiddlewares: []
vpnIngressMiddlewares: ""

# Dashboard Ingress
dashboard:
  serviceName: ""
  domain: ""
  secretName: ""
  # VPN-only middleware (restrict access to VPN IPs)
  vpnOnlyEnabled: true

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
