---
# Namespace for resources
namespace: ""

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443
external:
  httpPort: 80
  httpsPort: 443

# =============================================================================
# argo-rollouts component ports
# =============================================================================
argoRollouts:
  metricsPort: 8090  # /metrics, скрейпится Prometheus

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
