# =============================================================================
# SERVICEMONITOR FOR ARGO ROLLOUTS (Prometheus Operator)
#   Селектирует Service argo-rollouts-metrics (порт `metrics`, :8090),
#   который создаёт вендоренный upstream-манифест в фазе install.
# =============================================================================
{{- if .Values.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: argo-rollouts
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: argo-rollouts
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  endpoints:
    - port: metrics
      interval: {{ .Values.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout }}
  namespaceSelector:
    matchNames:
      - {{ .Values.namespace }}
  selector:
    matchLabels:
      app.kubernetes.io/name: argo-rollouts-metrics
{{- end }}
