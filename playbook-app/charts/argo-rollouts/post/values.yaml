---
# Namespace for resources
namespace: ""

# ServiceMonitor для Prometheus (mon-system). Метрики отдаёт Service
# argo-rollouts-metrics на порту с именем `metrics`.
serviceMonitor:
  enabled: false
  interval: "30s"
  scrapeTimeout: "15s"
  labels: {}

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
