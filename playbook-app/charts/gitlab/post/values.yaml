---
# Namespace
namespace: ""

# cert-manager Issuer — единый объект {enabled, body: {name, spec}}
issuer:
  enabled: false
  body: {}

# Ingress config (per-domain) — независимые toggle'ы ingress / certificate
uiIngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressMiddlewares: ""
  certificate:
    enabled: false
registryIngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressMiddlewares: ""
  certificate:
    enabled: false
pagesIngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressMiddlewares: ""
  certificate:
    enabled: false
minioApiIngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressMiddlewares: ""
  certificate:
    enabled: false
minioConsoleIngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressMiddlewares: ""
  certificate:
    enabled: false

# SSH port for HAProxy
sshPortExternal: 3714

# Traefik namespace for middleware
traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

# HAProxy settings for SSH TCP ingress
haproxy:
  namespace: ""
  ingressClass: ""

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
