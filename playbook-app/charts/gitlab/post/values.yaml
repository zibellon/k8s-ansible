---
# Namespace
namespace: ""

# cert-manager Issuer (raw {name, spec}) + enable toggle
issuer: {}
issuerEnabled: false

# SSH port for HAProxy
sshPortExternal: 3714

# GitLab settings
gitlab:
  ingressClass: ""
  domain: ""
  registryDomain: ""
  pagesDomain: ""
  uiSecretName: ""
  registrySecretName: ""
  pagesSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressMiddlewares: ""

# MinIO settings (Console + API ingress)
minio:
  ingressClass: ""
  consoleDomain: ""
  apiDomain: ""
  consoleSecretName: ""
  apiSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressMiddlewares: ""

# Traefik namespace for middleware
traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

# HAProxy settings for SSH TCP ingress
haproxy:
  namespace: ""
  ingressClass: ""

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
