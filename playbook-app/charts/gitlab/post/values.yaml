---
# Namespace
namespace: ""

# Ingress config (per-domain)
uiIngressConfig:
  enabled: false
  domain: ""
  ingressClass: ""
  tlsEnabled: false
  tlsSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressMiddlewares: ""
registryIngressConfig:
  enabled: false
  domain: ""
  ingressClass: ""
  tlsEnabled: false
  tlsSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressMiddlewares: ""
pagesIngressConfig:
  enabled: false
  domain: ""
  ingressClass: ""
  tlsEnabled: false
  tlsSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressMiddlewares: ""

# cert-manager Certificate (per-domain) — плоский объект {enabled, name, spec}
uiCertificateConfig:
  enabled: false
  name: ""
  spec: {}
registryCertificateConfig:
  enabled: false
  name: ""
  spec: {}
pagesCertificateConfig:
  enabled: false
  name: ""
  spec: {}

# SSH port for HAProxy
sshPortExternal: 3714

# Traefik namespace for middleware
traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

# HAProxy settings for SSH TCP ingress
haproxy:
  namespace: ""
  ingressClass: ""

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
