# =============================================================================
# INGRESS FOR GITLAB REGISTRY (Traefik)
#   enabled    → рендерить Ingress
#   tlsEnabled → websecure entrypoint + router.tls + tls-блок; иначе web, без tls
# =============================================================================
{{- if .Values.registryIngressConfig.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitlab-registry
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.registryIngressConfig.ingressClass | quote }}
    {{- if .Values.registryIngressConfig.tlsEnabled }}
    traefik.ingress.kubernetes.io/router.entrypoints: {{ .Values.traefik.entryPoints.websecure | quote }}
    traefik.ingress.kubernetes.io/router.tls: "true"
    {{- else }}
    traefik.ingress.kubernetes.io/router.entrypoints: {{ .Values.traefik.entryPoints.web | quote }}
    {{- end }}
    {{- if .Values.registryIngressConfig.vpnOnlyEnabled }}
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.registryIngressConfig.vpnIngressMiddlewares }}"
    {{- end }}
spec:
  ingressClassName: {{ .Values.registryIngressConfig.ingressClass }}
  {{- if and .Values.registryIngressConfig.tlsEnabled .Values.registryIngressConfig.tlsSecretName }}
  tls:
    - hosts:
        - {{ .Values.registryIngressConfig.domain }}
      secretName: {{ .Values.registryIngressConfig.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.registryIngressConfig.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitlab-registry
                port:
                  number: 5000
{{- end }}
