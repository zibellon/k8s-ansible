# =============================================================================
# INGRESS FOR MINIO CONSOLE — HTTPS (Traefik)
# =============================================================================

{{- if .Values.minio.httpsEnable }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.minio.consoleSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.minio.consoleSecretName }}
  dnsNames:
    - {{ .Values.minio.consoleDomain }}
  issuerRef:
    name: {{ .Values.minio.clusterIssuer }}
    kind: ClusterIssuer

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-gitlab-minio-console-https
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.minio.ingressClass }}"
    traefik.ingress.kubernetes.io/router.entrypoints: "{{ .Values.traefik.entryPoints.websecure }}"
    traefik.ingress.kubernetes.io/router.tls: "true"
    {{- if .Values.minio.vpnOnlyEnabled }}
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.traefik.namespace }}-vpn-only@kubernetescrd"
    {{- end }}
spec:
  ingressClassName: {{ .Values.minio.ingressClass }}
  tls:
    - hosts:
        - {{ .Values.minio.consoleDomain }}
      secretName: {{ .Values.minio.consoleSecretName }}
  rules:
    - host: {{ .Values.minio.consoleDomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitlab-minio
                port:
                  number: 9001
{{- end }}
