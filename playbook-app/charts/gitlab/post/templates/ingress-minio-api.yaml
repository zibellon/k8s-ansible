# =============================================================================
# CERTIFICATE FOR MINIO API (cert-manager)
# =============================================================================
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.minio.apiSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.minio.apiSecretName }}
  dnsNames:
    - {{ .Values.minio.apiDomain }}
  issuerRef:
    name: {{ .Values.minio.clusterIssuer }}
    kind: ClusterIssuer
---
{{- if not .Values.minio.httpEnabled }}
# =============================================================================
# INGRESS FOR MINIO API — HTTPS (Traefik)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-gitlab-minio-api-https
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.minio.ingressClass }}"
    traefik.ingress.kubernetes.io/router.entrypoints: "{{ .Values.minio.entrypoint }}"
    traefik.ingress.kubernetes.io/router.tls: "true"
    {{- if .Values.minio.vpnOnlyEnabled }}
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.traefik.namespace }}-vpn-only@kubernetescrd"
    {{- end }}
spec:
  ingressClassName: {{ .Values.minio.ingressClass }}
  tls:
    - hosts:
        - {{ .Values.minio.apiDomain }}
      secretName: {{ .Values.minio.apiSecretName }}
  rules:
    - host: {{ .Values.minio.apiDomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitlab-minio
                port:
                  number: 9000
{{- else }}
# =============================================================================
# INGRESS FOR MINIO API — HTTP (Traefik)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-gitlab-minio-api-http
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.minio.ingressClass }}"
    traefik.ingress.kubernetes.io/router.entrypoints: "web"
    {{- if .Values.minio.vpnOnlyEnabled }}
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.traefik.namespace }}-vpn-only@kubernetescrd"
    {{- end }}
spec:
  ingressClassName: {{ .Values.minio.ingressClass }}
  rules:
    - host: {{ .Values.minio.apiDomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitlab-minio
                port:
                  number: 9000
{{- end }}
