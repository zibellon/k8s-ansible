# =============================================================================
# INGRESS FOR MINIO API (Traefik)
#   issuerEnabled true  → Certificate + HTTPS Ingress (websecure, TLS)
#   issuerEnabled false → HTTP Ingress (web, без TLS)
# =============================================================================
{{- if .Values.issuerEnabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.minio.apiSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.minio.apiSecretName }}
  dnsNames:
    - {{ .Values.minio.apiDomain }}
  issuerRef:
    name: {{ .Values.issuer.name }}
    kind: Issuer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-api
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.minio.ingressClass }}"
    traefik.ingress.kubernetes.io/router.entrypoints: "{{ .Values.traefik.entryPoints.websecure }}"
    traefik.ingress.kubernetes.io/router.tls: "true"
    {{- if .Values.minio.vpnOnlyEnabled }}
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.minio.vpnIngressMiddlewares }}"
    {{- end }}
spec:
  ingressClassName: {{ .Values.minio.ingressClass }}
  tls:
    - hosts:
        - {{ .Values.minio.apiDomain }}
      secretName: {{ .Values.minio.apiSecretName }}
  rules:
    - host: {{ .Values.minio.apiDomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitlab-minio
                port:
                  number: 9000
{{- else }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-api
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.minio.ingressClass }}"
    traefik.ingress.kubernetes.io/router.entrypoints: "{{ .Values.traefik.entryPoints.web }}"
    {{- if .Values.minio.vpnOnlyEnabled }}
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.minio.vpnIngressMiddlewares }}"
    {{- end }}
spec:
  ingressClassName: {{ .Values.minio.ingressClass }}
  rules:
    - host: {{ .Values.minio.apiDomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitlab-minio
                port:
                  number: 9000
{{- end }}
