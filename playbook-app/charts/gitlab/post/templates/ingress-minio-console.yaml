# =============================================================================
# INGRESS FOR MINIO CONSOLE (Traefik)
#   ingress.enabled    → рендерить Ingress
#   ingress.tlsEnabled → websecure entrypoint + router.tls + tls-блок; иначе web, без tls
# =============================================================================
{{- if .Values.minioConsoleIngressConfig.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-console
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.minioConsoleIngressConfig.ingress.ingressClass | quote }}
    {{- if .Values.minioConsoleIngressConfig.ingress.tlsEnabled }}
    traefik.ingress.kubernetes.io/router.entrypoints: {{ .Values.traefik.entryPoints.websecure | quote }}
    traefik.ingress.kubernetes.io/router.tls: "true"
    {{- else }}
    traefik.ingress.kubernetes.io/router.entrypoints: {{ .Values.traefik.entryPoints.web | quote }}
    {{- end }}
    {{- if .Values.minioConsoleIngressConfig.ingress.vpnOnlyEnabled }}
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.minioConsoleIngressConfig.ingress.vpnIngressMiddlewares }}"
    {{- end }}
spec:
  ingressClassName: {{ .Values.minioConsoleIngressConfig.ingress.ingressClass }}
  {{- if and .Values.minioConsoleIngressConfig.ingress.tlsEnabled .Values.minioConsoleIngressConfig.tlsSecretName }}
  tls:
    - hosts:
        - {{ .Values.minioConsoleIngressConfig.domain }}
      secretName: {{ .Values.minioConsoleIngressConfig.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.minioConsoleIngressConfig.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitlab-minio
                port:
                  number: 9001
{{- end }}
