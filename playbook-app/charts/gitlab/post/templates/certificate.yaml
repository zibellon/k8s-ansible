# =============================================================================
# CERTIFICATES FOR GITLAB (cert-manager)
#   Каждый Certificate рендерится если <unit>CertificateConfig.enabled.
#   Полный raw spec из values.
# =============================================================================
{{- if .Values.uiCertificateConfig.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.uiCertificateConfig.name }}
  namespace: {{ .Values.namespace }}
spec:
{{ toYaml .Values.uiCertificateConfig.spec | indent 2 }}
{{- end }}
{{- if .Values.registryCertificateConfig.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.registryCertificateConfig.name }}
  namespace: {{ .Values.namespace }}
spec:
{{ toYaml .Values.registryCertificateConfig.spec | indent 2 }}
{{- end }}
{{- if .Values.pagesCertificateConfig.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.pagesCertificateConfig.name }}
  namespace: {{ .Values.namespace }}
spec:
{{ toYaml .Values.pagesCertificateConfig.spec | indent 2 }}
{{- end }}
