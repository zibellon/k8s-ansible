# =============================================================================
# CERTIFICATE FOR GITLAB PAGES (cert-manager)
# =============================================================================
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.gitlab.pagesSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.gitlab.pagesSecretName }}
  dnsNames:
    - {{ .Values.gitlab.pagesDomain }}
  issuerRef:
    name: {{ .Values.gitlab.clusterIssuer }}
    kind: ClusterIssuer
---
{{- if not .Values.gitlab.httpEnabled }}
# =============================================================================
# INGRESS FOR GITLAB PAGES — HTTPS (Traefik)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-gitlab-pages-https
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.gitlab.ingressClass }}"
    traefik.ingress.kubernetes.io/router.entrypoints: "{{ .Values.gitlab.entrypoint }}"
    traefik.ingress.kubernetes.io/router.tls: "true"
    {{- if .Values.gitlab.vpnOnlyEnabled }}
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.traefik.namespace }}-vpn-only@kubernetescrd"
    {{- end }}
spec:
  ingressClassName: {{ .Values.gitlab.ingressClass }}
  tls:
    - hosts:
        - {{ .Values.gitlab.pagesDomain }}
      secretName: {{ .Values.gitlab.pagesSecretName }}
  rules:
    - host: {{ .Values.gitlab.pagesDomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitlab-gitlab-pages
                port:
                  number: 8090
{{- else }}
# =============================================================================
# INGRESS FOR GITLAB PAGES — HTTP (Traefik)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-gitlab-pages-http
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.gitlab.ingressClass }}"
    traefik.ingress.kubernetes.io/router.entrypoints: "web"
    {{- if .Values.gitlab.vpnOnlyEnabled }}
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.traefik.namespace }}-vpn-only@kubernetescrd"
    {{- end }}
spec:
  ingressClassName: {{ .Values.gitlab.ingressClass }}
  rules:
    - host: {{ .Values.gitlab.pagesDomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitlab-gitlab-pages
                port:
                  number: 8090
{{- end }}
