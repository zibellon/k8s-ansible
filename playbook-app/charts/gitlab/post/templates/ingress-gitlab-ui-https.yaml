# =============================================================================
# INGRESS FOR GITLAB UI — HTTPS (Traefik)
# =============================================================================

{{- if .Values.gitlab.httpsEnable }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.gitlab.uiSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.gitlab.uiSecretName }}
  dnsNames:
    - {{ .Values.gitlab.domain }}
  issuerRef:
    name: {{ .Values.gitlab.clusterIssuer }}
    kind: ClusterIssuer

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitlab-ui-https
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.gitlab.ingressClass }}"
    traefik.ingress.kubernetes.io/router.entrypoints: "{{ .Values.traefik.entryPoints.websecure }}"
    traefik.ingress.kubernetes.io/router.tls: "true"
    {{- if .Values.gitlab.vpnOnlyEnabled }}
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.vpnIngressMiddlewares }}"
    {{- end }}
spec:
  ingressClassName: {{ .Values.gitlab.ingressClass }}
  tls:
    - hosts:
        - {{ .Values.gitlab.domain }}
      secretName: {{ .Values.gitlab.uiSecretName }}
  rules:
    - host: {{ .Values.gitlab.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gitlab-webservice-default
                port:
                  number: 8181
{{- end }}
