---
# PostgreSQL configuration
namespace: gitlab

# Database identity
databaseName: "gitlabhq_production"

image: "postgres:17.9-alpine3.23"

# Storage
storageClass: lh-major-multi-best-effort
storageSize: 20Gi

# Resources (requests/limits; default {} → guard omits the block, no change)
resources: {}

# Node placement (default {} → guard omits the block, schedules anywhere)
nodeSelector: {}

# Tolerations (default [] → guard omits the block, tolerates nothing extra)
tolerations: []

# Credentials secret (from ESO)
creds:
  secretName: ""
  usernameKey: ""
  passwordKey: ""

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
