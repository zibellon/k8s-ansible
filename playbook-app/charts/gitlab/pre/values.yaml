# Namespace
namespace: gitlab

# External Secrets settings
externalSecrets:
  namespace: ""

# Traefik settings for NetworkPolicy
traefik:
  namespace: ""
  instanceName: ""

# HAProxy settings for NetworkPolicy
haproxy:
  namespace: ""

# GitLab Helm chart release name (for pod selectors)
gitlab:
  releaseName: gitlab
  # SSH port exposed via HAProxy
  sshPortExternal: 3714
  sshPortInternal: 2222
  vpnOnlyEnabled: false
  vpnIps: []

# GitLab ESO settings (all secrets in one)
gitlabEso:
  vaultServerUrl: ""
  saName: ""
  roleName: ""
  secretStoreName: ""
  kvEnginePath: ""
  isNeedEso: true
  secrets: []

# ACME solver pod labels (from resolved ClusterIssuer solver)
acmeSolverLabels: {}

# ESO resources global config
esoResourcesConfig:
  secretStoreRefreshInterval: 60
  externalSecretRefreshInterval: "1m"
  externalSecretRefreshPolicy: "Periodic"

# MinIO S3 connection settings (used by ESO template for gitlab_minio_connection secret)
minio:
  s3Endpoint: "http://gitlab-minio:9000"
  s3Region: "us-east-1"
  s3PathStyle: true
