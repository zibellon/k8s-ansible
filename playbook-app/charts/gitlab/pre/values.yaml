---
# Namespace
namespace: gitlab

# External Secrets settings
externalSecrets:
  namespace: ""

# Traefik settings for NetworkPolicy
traefik:
  namespace: ""
  instanceName: ""

# HAProxy settings for NetworkPolicy
haproxy:
  namespace: ""

# GitLab Helm chart release name (for pod selectors)
gitlab:
  releaseName: gitlab
  # SSH port exposed via HAProxy
  sshPortExternal: 3714
  sshPortInternal: 2222
  vpnOnlyEnabled: false
  vpnIps: []
  # Service ports (used by NetworkPolicy templates)
  webservicePort: 8181            # gitlab-webservice (Rails HTTP)
  registryPort: 5000              # gitlab-registry container registry
  pagesPort: 8090                 # gitlab-pages
  minioApiPort: 9000              # gitlab-minio S3 API
  minioConsolePort: 9001          # gitlab-minio console UI
  # Prometheus metrics ports
  webserviceMetricsPort: 8083     # webservice (Rails) metrics
  workhorseMetricsPort: 9229      # workhorse metrics
  gitalyMetricsPort: 9236         # gitaly metrics
  pagesMetricsPort: 9235          # gitlab-pages metrics
  exporterMetricsPort: 9168       # gitlab-exporter metrics
  shellMetricsPort: 9122          # gitlab-shell metrics
  registryMetricsPort: 5001       # registry metrics
  sidekiqMetricsPort: 3807        # sidekiq metrics

# GitLab ESO settings (all secrets in one)
eso:
  vaultServerUrl: ""
  saName: ""
  roleName: ""
  secretStoreName: ""
  kvEnginePath: ""
  secrets: []

# ACME solver pod labels (from resolved ClusterIssuer solver)
acmeSolverLabels: {}

# ESO resources global config
esoResourcesConfig:
  secretStoreRefreshInterval: 60
  externalSecretRefreshInterval: "1m"
  externalSecretRefreshPolicy: "Periodic"

# MinIO S3 connection settings (used by ESO template for gitlab_minio_connection secret)
minio:
  s3Endpoint: "http://gitlab-minio:9000"
  s3Region: "us-east-1"
  s3PathStyle: true

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443
acmeSolver:
  port: 8089
external:
  httpPort: 80
  httpsPort: 443

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
