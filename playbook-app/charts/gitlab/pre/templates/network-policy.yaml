# =============================================================================
# GITLAB NETWORK POLICIES - HARDENED
# =============================================================================

# =============================================================================
# BASE POLICIES
# =============================================================================

---
# Default deny all traffic in gitlab namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# DNS for all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: {{ .Values.dns.port }}
        - protocol: TCP
          port: {{ .Values.dns.port }}

---
# Allow all traffic between pods inside the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-traffic
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}

# =============================================================================
# PROMETHEUS SCRAPING
# =============================================================================

---
# Allow Prometheus scraping on all metrics ports for all gitlab pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-for-monitoring
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.gitlab.webserviceMetricsPort }} # webservice (Rails)
        - protocol: TCP
          port: {{ .Values.gitlab.workhorseMetricsPort }} # workhorse
        - protocol: TCP
          port: {{ .Values.gitlab.gitalyMetricsPort }} # gitaly
        - protocol: TCP
          port: {{ .Values.gitlab.pagesMetricsPort }} # gitlab-pages
        - protocol: TCP
          port: {{ .Values.gitlab.exporterMetricsPort }} # gitlab-exporter
        - protocol: TCP
          port: {{ .Values.gitlab.shellMetricsPort }} # gitlab-shell
        - protocol: TCP
          port: {{ .Values.gitlab.registryMetricsPort }} # registry
        - protocol: TCP
          port: {{ .Values.gitlab.sidekiqMetricsPort }} # sidekiq

# =============================================================================
# GITLAB CORE POLICIES
# =============================================================================

---
# GitLab webservice: ingress from Traefik, egress to storage and external
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gitlab-webservice
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: webservice
      release: {{ .Values.gitlab.releaseName }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # From Traefik
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.webservicePort }}
  egress:
    # External HTTPS (webhooks, external repos)
    - ports:
        - protocol: TCP
          port: {{ .Values.external.httpsPort }}
        - protocol: TCP
          port: {{ .Values.external.httpPort }}

---
# GitLab sidekiq: egress to storage and external
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gitlab-sidekiq
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: sidekiq
      release: {{ .Values.gitlab.releaseName }}
  policyTypes:
    - Egress
  egress:
    # External HTTPS
    - ports:
        - protocol: TCP
          port: {{ .Values.external.httpsPort }}
        - protocol: TCP
          port: {{ .Values.external.httpPort }}

---
# GitLab registry: ingress from Traefik (egress на SeaweedFS S3 backend через allow-seaweedfs-s3)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gitlab-registry
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: registry
      release: {{ .Values.gitlab.releaseName }}
  policyTypes:
    - Ingress
  ingress:
    # From Traefik
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.registryPort }}

---
# GitLab pages: ingress from Traefik
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gitlab-pages
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: gitlab-pages
      release: {{ .Values.gitlab.releaseName }}
  policyTypes:
    - Ingress
  ingress:
    # From Traefik
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.pagesPort }}

---
# GitLab shell: ingress from HAProxy (SSH)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gitlab-shell
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: gitlab-shell
      release: {{ .Values.gitlab.releaseName }}
  policyTypes:
    - Ingress
  ingress:
    # From HAProxy
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.haproxy.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: kubernetes-ingress
              app.kubernetes.io/instance: haproxy-ingress
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.sshPortInternal }}

# =============================================================================
# GITLAB JOBS (shared-secrets, migrations, etc.)
# =============================================================================

---
# GitLab Jobs: egress to kube-apiserver (for creating secrets, etc.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gitlab-jobs
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: gitlab
      release: {{ .Values.gitlab.releaseName }}
  policyTypes:
    - Egress
  egress:
    # To kube-apiserver (for managing secrets/configmaps)
    - ports:
        - protocol: TCP
          port: {{ .Values.apiserver.port }}

# =============================================================================
# ACME SOLVER (cert-manager HTTP-01 challenge) — одна пара политик на каждый http01 solver
# =============================================================================
{{- if .Values.issuer.enabled }}
{{- $spec := .Values.issuer.spec | default dict }}
{{- if hasKey $spec "acme" }}
{{- range $i, $solver := ($spec.acme.solvers | default list) }}
{{- if hasKey $solver "http01" }}
{{- $ing := $solver.http01.ingress | default dict }}
{{- $solverLabels := dig "podTemplate" "metadata" "labels" (dict "acme.cert-manager.io/http01-solver" "true") $ing }}
---
# http01 solver #{{ $i }} — ingress к solver-pod от traefik
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "allow-acme-solver-{{ $i }}"
  namespace: {{ $.Values.namespace }}
spec:
  podSelector:
    matchLabels:
      {{- toYaml $solverLabels | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: {{ $.Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ $.Values.acmeSolver.port }}
---
# http01 solver #{{ $i }} — egress traefik → solver-pod (в namespace traefik)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "{{ $.Values.namespace }}-allow-acme-solver-{{ $i }}"
  namespace: {{ $.Values.traefik.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: traefik
      app.kubernetes.io/instance: {{ $.Values.traefik.instanceName }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Values.namespace }}
          podSelector:
            matchLabels:
              {{- toYaml $solverLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.acmeSolver.port }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

# =============================================================================
# CROSS-NAMESPACE TARGETS (SeaweedFS S3 — invariant L5 dependency)
# =============================================================================

{{- if .Values.seaweedfs.enabled }}
---
# Cross-ns: GitLab pods → SeaweedFS S3 (egress в gitlab ns)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-seaweedfs-s3
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      release: {{ .Values.gitlab.releaseName }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.seaweedfs.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/component: {{ .Values.seaweedfs.s3Component }}
      ports:
        - protocol: TCP
          port: {{ .Values.seaweedfs.s3HttpPort }}

---
# Cross-ns: SeaweedFS S3 ← GitLab pods (ingress в seaweedfs ns)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.namespace }}-allow-seaweedfs-s3
  namespace: {{ .Values.seaweedfs.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: {{ .Values.seaweedfs.s3Component }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              release: {{ .Values.gitlab.releaseName }}
      ports:
        - protocol: TCP
          port: {{ .Values.seaweedfs.s3HttpPort }}
{{- end }}

# =============================================================================
# EXTERNAL NAMESPACE POLICIES
# =============================================================================

---
# Traefik egress to GitLab (in traefik namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "{{ .Values.namespace }}-allow-traefik"
  namespace: {{ .Values.traefik.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: traefik
      app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
  policyTypes:
    - Egress
  egress:
    # To GitLab webservice
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              app: webservice
              release: {{ .Values.gitlab.releaseName }}
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.webservicePort }}
    # To GitLab registry
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              app: registry
              release: {{ .Values.gitlab.releaseName }}
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.registryPort }}
    # To GitLab pages
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              app: gitlab-pages
              release: {{ .Values.gitlab.releaseName }}
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.pagesPort }}

---
# HAProxy egress to GitLab shell (in haproxy namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "{{ .Values.namespace }}-allow-haproxy"
  namespace: {{ .Values.haproxy.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-ingress
      app.kubernetes.io/instance: haproxy-ingress
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {{- if .Values.gitlab.vpnOnlyEnabled }}
      from:
        {{- range .Values.gitlab.vpnIps }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.sshPortExternal }}
  egress:
    # To GitLab shell (SSH)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: gitlab
              app: gitlab-shell
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.sshPortInternal }}
