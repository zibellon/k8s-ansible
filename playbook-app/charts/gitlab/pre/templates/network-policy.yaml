# =============================================================================
# GITLAB NETWORK POLICIES - HARDENED
# =============================================================================

# =============================================================================
# BASE POLICIES
# =============================================================================

---
# Default deny all traffic in gitlab namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# DNS for all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: {{ .Values.dns.port }}
        - protocol: TCP
          port: {{ .Values.dns.port }}

---
# Allow all traffic between pods inside longhorn-system
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-traffic
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}

# =============================================================================
# PROMETHEUS SCRAPING
# =============================================================================

---
# Allow Prometheus scraping on all metrics ports for all gitlab pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-for-monitoring
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.gitlab.webserviceMetricsPort }} # webservice (Rails)
        - protocol: TCP
          port: {{ .Values.gitlab.workhorseMetricsPort }} # workhorse
        - protocol: TCP
          port: {{ .Values.gitlab.gitalyMetricsPort }} # gitaly
        - protocol: TCP
          port: {{ .Values.gitlab.pagesMetricsPort }} # gitlab-pages
        - protocol: TCP
          port: {{ .Values.gitlab.exporterMetricsPort }} # gitlab-exporter
        - protocol: TCP
          port: {{ .Values.gitlab.shellMetricsPort }} # gitlab-shell
        - protocol: TCP
          port: {{ .Values.gitlab.registryMetricsPort }} # registry
        - protocol: TCP
          port: {{ .Values.gitlab.sidekiqMetricsPort }} # sidekiq

# =============================================================================
# STORAGE POLICIES (PostgreSQL, Redis, MinIO)
# =============================================================================

---
# MinIO: ingress from GitLab components and Traefik (console)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-minio
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gitlab-minio
      app.kubernetes.io/instance: gitlab-minio-{{ .Values.namespace }}
  policyTypes:
    - Ingress
  ingress:
    # From Traefik (console UI)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.minioApiPort }}
        - protocol: TCP
          port: {{ .Values.gitlab.minioConsolePort }}

# =============================================================================
# GITLAB CORE POLICIES
# =============================================================================

---
# GitLab webservice: ingress from Traefik, egress to storage and external
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gitlab-webservice
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: webservice
      release: {{ .Values.gitlab.releaseName }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # From Traefik
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.webservicePort }}
  egress:
    # External HTTPS (webhooks, external repos)
    - ports:
        - protocol: TCP
          port: {{ .Values.external.httpsPort }}
        - protocol: TCP
          port: {{ .Values.external.httpPort }}

---
# GitLab sidekiq: egress to storage and external
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gitlab-sidekiq
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: sidekiq
      release: {{ .Values.gitlab.releaseName }}
  policyTypes:
    - Egress
  egress:
    # External HTTPS
    - ports:
        - protocol: TCP
          port: {{ .Values.external.httpsPort }}
        - protocol: TCP
          port: {{ .Values.external.httpPort }}

---
# GitLab registry: ingress from Traefik, egress to MinIO
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gitlab-registry
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: registry
      release: {{ .Values.gitlab.releaseName }}
  policyTypes:
    - Ingress
  ingress:
    # From Traefik
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.registryPort }}

---
# GitLab pages: ingress from Traefik
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gitlab-pages
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: gitlab-pages
      release: {{ .Values.gitlab.releaseName }}
  policyTypes:
    - Ingress
  ingress:
    # From Traefik
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.pagesPort }}

---
# GitLab shell: ingress from HAProxy (SSH)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gitlab-shell
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: gitlab-shell
      release: {{ .Values.gitlab.releaseName }}
  policyTypes:
    - Ingress
  ingress:
    # From HAProxy
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.haproxy.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: kubernetes-ingress
              app.kubernetes.io/instance: haproxy-ingress
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.sshPortInternal }}

# =============================================================================
# GITLAB JOBS (shared-secrets, migrations, etc.)
# =============================================================================

---
# GitLab Jobs: egress to kube-apiserver (for creating secrets, etc.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gitlab-jobs
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: gitlab
      release: {{ .Values.gitlab.releaseName }}
  policyTypes:
    - Egress
  egress:
    # To kube-apiserver (for managing secrets/configmaps)
    - ports:
        - protocol: TCP
          port: {{ .Values.apiserver.port }}

# =============================================================================
# ACME SOLVER (cert-manager HTTP-01 challenge)
# =============================================================================

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-acme-solver
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      {{- .Values.acmeSolverLabels | toYaml | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ .Values.acmeSolver.port }}

# =============================================================================
# EXTERNAL NAMESPACE POLICIES
# =============================================================================

---
# Traefik egress to GitLab (in traefik namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "{{ .Values.namespace }}-allow-traefik"
  namespace: {{ .Values.traefik.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: traefik
      app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
  policyTypes:
    - Egress
  egress:
    # To GitLab webservice
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              app: webservice
              release: {{ .Values.gitlab.releaseName }}
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.webservicePort }}
    # To GitLab registry
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              app: registry
              release: {{ .Values.gitlab.releaseName }}
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.registryPort }}
    # To GitLab pages
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              app: gitlab-pages
              release: {{ .Values.gitlab.releaseName }}
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.pagesPort }}
    # To MinIO (console)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: gitlab-minio
              app.kubernetes.io/instance: gitlab-minio-{{ .Values.namespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.minioApiPort }}
        - protocol: TCP
          port: {{ .Values.gitlab.minioConsolePort }}
    # To ACME solver
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              {{- .Values.acmeSolverLabels | toYaml | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.acmeSolver.port }}

---
# HAProxy egress to GitLab shell (in haproxy namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "{{ .Values.namespace }}-allow-haproxy"
  namespace: {{ .Values.haproxy.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-ingress
      app.kubernetes.io/instance: haproxy-ingress
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {{- if .Values.gitlab.vpnOnlyEnabled }}
      from:
        {{- range .Values.gitlab.vpnIps }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.sshPortExternal }}
  egress:
    # To GitLab shell (SSH)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: gitlab
              app: gitlab-shell
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.sshPortInternal }}
