apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gitlab-redis
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: gitlab-redis
    app.kubernetes.io/instance: gitlab-redis-{{ .Values.namespace }}
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: gitlab
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  serviceName: gitlab-redis
  selector:
    matchLabels:
      app.kubernetes.io/name: gitlab-redis
      app.kubernetes.io/instance: gitlab-redis-{{ .Values.namespace }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitlab-redis
        app.kubernetes.io/instance: gitlab-redis-{{ .Values.namespace }}
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: gitlab
        app.kubernetes.io/managed-by: Helm
    spec:
      automountServiceAccountToken: false
      containers:
        - name: redis
          image: {{ .Values.image }}
          env:
            - name: REDIS_ARGS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentialsSecretName }}
                  key: {{ .Values.credentialsSecretKey }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitlab-redis
