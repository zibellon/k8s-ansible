---
# Namespace for resources
namespace: ""

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443
kubelet:
  port: 10250

# =============================================================================
# metrics-server component ports
# =============================================================================
metricsServer:
  servicePort: 10250  # aggregated API endpoint (apiserver -> metrics-server)

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
