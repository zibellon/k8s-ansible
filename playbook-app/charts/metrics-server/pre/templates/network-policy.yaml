# =============================================================================
# METRICS-SERVER NETWORK POLICIES
# Targets only metrics-server pods (app.kubernetes.io/instance: metrics-server, app.kubernetes.io/name: metrics-server) in kube-system.
# =============================================================================

---
# Allow metrics-server egress to kubelet on all nodes (port 10250)
# and to kube-apiserver (port 6443).
# Allow ingress from kube-apiserver via aggregation layer (port 10250).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-metrics-server
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: metrics-server
      app.kubernetes.io/name: metrics-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # kube-apiserver calls metrics-server via aggregation layer
    - ports:
        - protocol: TCP
          port: 10250
  egress:
    # Scrape kubelet metrics on all nodes
    - ports:
        - protocol: TCP
          port: 10250
    # Watch nodes/pods via kube-apiserver
    - ports:
        - protocol: TCP
          port: 6443
