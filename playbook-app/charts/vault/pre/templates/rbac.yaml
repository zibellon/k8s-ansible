# =============================================================================
# VAULT RBAC
# ServiceAccount + Role + RoleBinding for bank-vaults sidecar (unseal/init)
# leader-election Role + RoleBinding for operator HA
# ClusterRoleBinding for Kubernetes auth delegation
# =============================================================================

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: vault-sa
    app.kubernetes.io/part-of: vault-operator
    app.kubernetes.io/component: rbac

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: vault
    app.kubernetes.io/part-of: vault-operator
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["*"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: leader-election-role
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: leader-election-role
    app.kubernetes.io/part-of: vault-operator
    app.kubernetes.io/component: rbac
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: manager-rolebinding
    app.kubernetes.io/part-of: vault-operator
    app.kubernetes.io/component: rbac
roleRef:
  kind: Role
  name: vault
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: {{ .Values.namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: leader-election-rolebinding
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: leader-election-rolebinding
    app.kubernetes.io/part-of: vault-operator
    app.kubernetes.io/component: rbac
roleRef:
  kind: Role
  name: leader-election-role
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: {{ .Values.namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.namespace }}-vault-auth-delegator
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: manager-rolebinding
    app.kubernetes.io/part-of: vault-operator
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: {{ .Values.namespace }}
