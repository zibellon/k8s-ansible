---
# Vault namespace
namespace: ""

# DNS domain for internal service resolution
clusterDomain: ""

# Traefik namespace for ingress
traefik:
  namespace: ""
  instanceName: ""

# External Secrets namespace
externalSecrets:
  namespace: ""

# ACME solver pod labels (from resolved ClusterIssuer solver)
acmeSolverLabels: {}

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443
acmeSolver:
  port: 8089

# =============================================================================
# vault component ports
# =============================================================================
vault:
  apiPort: 8200  # Vault API + metrics (/v1/sys/metrics)

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
