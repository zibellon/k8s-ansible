# Vault namespace
namespace: ""

# ServiceAccount name for Vault pods (used by bank-vaults sidecar)
serviceAccountName: "vault"

# K8s Secret name where bank-vaults stores unseal keys
unsealerSecretName: "vault-unseal-keys"

# DNS domain for internal service resolution
clusterDomain: ""

# Traefik namespace for ingress
traefik:
  namespace: ""
  instanceName: ""

# External Secrets namespace
externalSecrets:
  namespace: ""

# ACME solver pod labels (from resolved ClusterIssuer solver)
acmeSolverLabels: {}