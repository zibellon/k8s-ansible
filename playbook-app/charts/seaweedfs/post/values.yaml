---
# Namespace
namespace: "seaweedfs"

# Ingress config 1: S3 endpoint — per-domain object с независимыми toggle'ами
s3IngressConfig:
  enabled: false
  domain: ""
  ingressClass: ""
  tlsEnabled: false
  tlsSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressMiddlewares: ""

# Ingress config 2: Master UI — отдельный поддомен (только Host)
masterIngressConfig:
  enabled: false
  domain: ""
  ingressClass: ""
  tlsEnabled: false
  tlsSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressMiddlewares: ""

# Ingress config 3: Filer UI — отдельный поддомен (только Host)
filerIngressConfig:
  enabled: false
  domain: ""
  ingressClass: ""
  tlsEnabled: false
  tlsSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressMiddlewares: ""

# Ingress config 4: Admin component UI — отдельный поддомен (только Host), login+password
adminIngressConfig:
  enabled: false
  domain: ""
  ingressClass: ""
  tlsEnabled: false
  tlsSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressMiddlewares: ""

# cert-manager Certificate (per-domain) — плоский объект {enabled, name, spec}
s3CertificateConfig:
  enabled: false
  name: ""
  spec: {}
masterCertificateConfig:
  enabled: false
  name: ""
  spec: {}
filerCertificateConfig:
  enabled: false
  name: ""
  spec: {}
adminCertificateConfig:
  enabled: false
  name: ""
  spec: {}

# Traefik entrypoint names (used in Ingress router annotations)
traefik:
  entryPoints:
    web: ""
    websecure: ""

# SeaweedFS upstream chart identifiers (used in service name construction)
seaweedfs:
  name: "seaweedfs"          # app.kubernetes.io/name label on SeaweedFS services

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
