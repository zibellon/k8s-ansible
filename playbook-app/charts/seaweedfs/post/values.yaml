---
# Namespace
namespace: "seaweedfs"

# cert-manager Issuer — единый объект {enabled, body: {name, spec}}
issuer:
  enabled: false
  body: {}

# Ingress config 1: S3 endpoint — per-domain object с независимыми toggle'ами
s3IngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressRouteMiddlewares: []
  certificate:
    enabled: false

# Ingress config 2: Master UI — отдельный поддомен (только Host)
masterIngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressRouteMiddlewares: []
  certificate:
    enabled: false

# Ingress config 3: Filer UI — отдельный поддомен (только Host)
filerIngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressRouteMiddlewares: []
  certificate:
    enabled: false

# Ingress config 4: Admin component UI — отдельный поддомен (только Host), login+password
adminIngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressRouteMiddlewares: []
  certificate:
    enabled: false

# Traefik namespace for middleware references + entrypoint names
traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

# SeaweedFS upstream chart identifiers (used in service name construction)
seaweedfs:
  name: "seaweedfs"          # app.kubernetes.io/name label on SeaweedFS services

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
