---
# Namespace
namespace: "seaweedfs"

# cert-manager Issuer — единый объект {enabled, body: {name, spec}}
issuer:
  enabled: false
  body: {}

# Ingress config 1: S3 endpoint — per-domain object с независимыми toggle'ами
s3IngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressRouteMiddlewares: []
  certificate:
    enabled: false

# Ingress config 2: Master UI — отдельный поддомен (только Host)
masterIngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressRouteMiddlewares: []
  certificate:
    enabled: false

# Ingress config 3: Filer UI — отдельный поддомен (только Host)
filerIngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressRouteMiddlewares: []
  certificate:
    enabled: false

# Ingress config 4: Admin component UI — отдельный поддомен (только Host), login+password
adminIngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressRouteMiddlewares: []
  certificate:
    enabled: false

# Traefik namespace for middleware references + entrypoint names
traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

# SeaweedFS upstream chart identifiers (used in ServiceMonitor selectors and service name construction)
seaweedfs:
  name: "seaweedfs"          # app.kubernetes.io/name label on SeaweedFS services
  masterMetricsPort: 9327    # master metricsPort (upstream default, for reference)
  volumeMetricsPort: 9327    # volume metricsPort (upstream default, for reference)
  filerMetricsPort: 9327     # filer metricsPort (upstream default, for reference)
  s3MetricsPort: 9327        # s3 metricsPort (upstream default, for reference)

# ServiceMonitor per-component configuration
serviceMonitor:
  master:
    enabled: true
    interval: "30s"
    scrapeTimeout: "15s"
    additionalLabels: {}
  volume:
    enabled: true
    interval: "30s"
    scrapeTimeout: "15s"
    additionalLabels: {}
  filer:
    enabled: true
    interval: "30s"
    scrapeTimeout: "15s"
    additionalLabels: {}
  s3:
    enabled: true
    interval: "30s"
    scrapeTimeout: "15s"
    additionalLabels: {}

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
