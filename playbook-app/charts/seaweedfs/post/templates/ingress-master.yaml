# =============================================================================
# INGRESS FOR SEAWEEDFS MASTER UI (Traefik)
#   master UI на отдельном поддомене (только Host, без path-prefix).
#   ingress.enabled    → рендерить Ingress
#   ingress.tlsEnabled → websecure entrypoint + router.tls + tls-блок; иначе web, без tls
#   vpnOnlyEnabled     → false (master UI открыт наружу в тестовой фазе)
# =============================================================================
{{- if .Values.masterIngressConfig.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seaweedfs-master-ui
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.masterIngressConfig.ingress.ingressClass | quote }}
    {{- if .Values.masterIngressConfig.ingress.tlsEnabled }}
    traefik.ingress.kubernetes.io/router.entrypoints: {{ .Values.traefik.entryPoints.websecure | quote }}
    traefik.ingress.kubernetes.io/router.tls: "true"
    {{- else }}
    traefik.ingress.kubernetes.io/router.entrypoints: {{ .Values.traefik.entryPoints.web | quote }}
    {{- end }}
    {{- if .Values.masterIngressConfig.ingress.vpnOnlyEnabled }}
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.masterIngressConfig.ingress.vpnIngressMiddlewares }}"
    {{- end }}
spec:
  ingressClassName: {{ .Values.masterIngressConfig.ingress.ingressClass }}
  {{- if and .Values.masterIngressConfig.ingress.tlsEnabled .Values.masterIngressConfig.tlsSecretName }}
  tls:
    - hosts:
        - {{ .Values.masterIngressConfig.domain }}
      secretName: {{ .Values.masterIngressConfig.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.masterIngressConfig.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.seaweedfs.name }}-master
                port:
                  name: swfs-master
{{- end }}
