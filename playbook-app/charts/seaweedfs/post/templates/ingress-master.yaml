# =============================================================================
# INGRESSROUTE FOR SEAWEEDFS MASTER UI (Traefik)
#   master UI на отдельном поддомене (только Host, без path-prefix).
#   ingress.enabled    → рендерить IngressRoute
#   ingress.tlsEnabled → websecure entrypoint + tls-блок; иначе web, без tls
#   vpnOnlyEnabled     → false (master UI открыт наружу в тестовой фазе)
# =============================================================================
{{- if .Values.masterIngressConfig.ingress.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: seaweedfs-master-ui
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.masterIngressConfig.ingress.ingressClass }}"
spec:
  entryPoints:
    {{- if .Values.masterIngressConfig.ingress.tlsEnabled }}
    - {{ .Values.traefik.entryPoints.websecure }}
    {{- else }}
    - {{ .Values.traefik.entryPoints.web }}
    {{- end }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.masterIngressConfig.domain }}`)
      {{- if .Values.masterIngressConfig.ingress.vpnOnlyEnabled }}
      middlewares:
        {{- range .Values.masterIngressConfig.ingress.vpnIngressRouteMiddlewares }}
        - name: {{ .name }}
          namespace: {{ .namespace }}
        {{- end }}
      {{- end }}
      services:
        - name: {{ .Values.seaweedfs.name }}-master
          port: swfs-master
  {{- if and .Values.masterIngressConfig.ingress.tlsEnabled .Values.masterIngressConfig.tlsSecretName }}
  tls:
    secretName: {{ .Values.masterIngressConfig.tlsSecretName }}
  {{- end }}
{{- end }}
