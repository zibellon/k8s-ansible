# =============================================================================
# SERVICEMONITORS FOR SEAWEEDFS (Prometheus Operator)
#   4 компонента: master / volume / filer / s3
#   Каждый gated по .Values.serviceMonitor.<component>.enabled.
#   Порт: named port "metrics" из upstream SeaweedFS Service templates.
#   Selector: app.kubernetes.io/name + app.kubernetes.io/component.
# =============================================================================
{{- if .Values.serviceMonitor.master.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: seaweedfs-master
  namespace: {{ .Values.namespace }}
  {{- with .Values.serviceMonitor.master.additionalLabels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  endpoints:
    - port: metrics
      interval: {{ .Values.serviceMonitor.master.interval }}
      scrapeTimeout: {{ .Values.serviceMonitor.master.scrapeTimeout }}
  namespaceSelector:
    matchNames:
      - {{ .Values.namespace }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.seaweedfs.name }}
      app.kubernetes.io/component: master
{{- end }}
