# =============================================================================
# INGRESSROUTE FOR SEAWEEDFS ADMIN UI (Traefik)
#   Path-routing на одном FQDN:
#     Host(...) && PathPrefix(`/master`) → seaweedfs-master:swfs-master (master admin UI)
#     Host(...)                          → seaweedfs-filer:swfs-filer   (filer admin UI, catch-all)
#   Traefik autoload priority: более длинный match (PathPrefix) имеет higher priority.
#   ingress.enabled    → рендерить IngressRoute
#   ingress.tlsEnabled → websecure entrypoint + tls-блок; иначе web, без tls
#   vpnOnlyEnabled     → true (admin UI только из VPN)
# =============================================================================
{{- if .Values.adminUiIngressConfig.ingress.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: seaweedfs-admin-ui
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.adminUiIngressConfig.ingress.ingressClass }}"
spec:
  entryPoints:
    {{- if .Values.adminUiIngressConfig.ingress.tlsEnabled }}
    - {{ .Values.traefik.entryPoints.websecure }}
    {{- else }}
    - {{ .Values.traefik.entryPoints.web }}
    {{- end }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.adminUiIngressConfig.domain }}`) && PathPrefix(`/master`)
      {{- if .Values.adminUiIngressConfig.ingress.vpnOnlyEnabled }}
      middlewares:
        {{- range .Values.adminUiIngressConfig.ingress.vpnIngressRouteMiddlewares }}
        - name: {{ .name }}
          namespace: {{ .namespace }}
        {{- end }}
      {{- end }}
      services:
        - name: {{ .Values.seaweedfs.name }}-master
          port: swfs-master
    - kind: Rule
      match: Host(`{{ .Values.adminUiIngressConfig.domain }}`)
      {{- if .Values.adminUiIngressConfig.ingress.vpnOnlyEnabled }}
      middlewares:
        {{- range .Values.adminUiIngressConfig.ingress.vpnIngressRouteMiddlewares }}
        - name: {{ .name }}
          namespace: {{ .namespace }}
        {{- end }}
      {{- end }}
      services:
        - name: {{ .Values.seaweedfs.name }}-filer
          port: swfs-filer
  {{- if and .Values.adminUiIngressConfig.ingress.tlsEnabled .Values.adminUiIngressConfig.tlsSecretName }}
  tls:
    secretName: {{ .Values.adminUiIngressConfig.tlsSecretName }}
  {{- end }}
{{- end }}
