# =============================================================================
# INGRESSROUTE FOR SEAWEEDFS S3 ENDPOINT (Traefik)
#   ingress.enabled    → рендерить IngressRoute
#   ingress.tlsEnabled → websecure entrypoint + tls-блок; иначе web, без tls
#   vpnOnlyEnabled     → false (S3 endpoint открыт наружу)
# =============================================================================
{{- if .Values.s3IngressConfig.ingress.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: seaweedfs-s3
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.s3IngressConfig.ingress.ingressClass }}"
spec:
  entryPoints:
    {{- if .Values.s3IngressConfig.ingress.tlsEnabled }}
    - {{ .Values.traefik.entryPoints.websecure }}
    {{- else }}
    - {{ .Values.traefik.entryPoints.web }}
    {{- end }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.s3IngressConfig.domain }}`)
      {{- if .Values.s3IngressConfig.ingress.vpnOnlyEnabled }}
      middlewares:
        {{- range .Values.s3IngressConfig.ingress.vpnIngressRouteMiddlewares }}
        - name: {{ .name }}
          namespace: {{ .namespace }}
        {{- end }}
      {{- end }}
      services:
        - name: {{ .Values.seaweedfs.name }}-s3
          port: swfs-s3
  {{- if and .Values.s3IngressConfig.ingress.tlsEnabled .Values.s3IngressConfig.tlsSecretName }}
  tls:
    secretName: {{ .Values.s3IngressConfig.tlsSecretName }}
  {{- end }}
{{- end }}
