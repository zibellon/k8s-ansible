# =============================================================================
# CERTIFICATES FOR SEAWEEDFS (cert-manager)
#   Рендерится только если issuer.enabled И per-config certificate.enabled.
#   issuer выключен → все Certificate молча пропускаются (без ошибки).
# =============================================================================
{{- if .Values.issuer.enabled }}
{{- if .Values.s3IngressConfig.certificate.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.s3IngressConfig.tlsSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.s3IngressConfig.tlsSecretName }}
  dnsNames:
    - "{{ .Values.s3IngressConfig.domain }}"
  issuerRef:
    name: {{ .Values.issuer.body.name }}
    kind: Issuer
{{- end }}
{{- if .Values.masterIngressConfig.certificate.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.masterIngressConfig.tlsSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.masterIngressConfig.tlsSecretName }}
  dnsNames:
    - "{{ .Values.masterIngressConfig.domain }}"
  issuerRef:
    name: {{ .Values.issuer.body.name }}
    kind: Issuer
{{- end }}
{{- if .Values.filerIngressConfig.certificate.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.filerIngressConfig.tlsSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.filerIngressConfig.tlsSecretName }}
  dnsNames:
    - "{{ .Values.filerIngressConfig.domain }}"
  issuerRef:
    name: {{ .Values.issuer.body.name }}
    kind: Issuer
{{- end }}
{{- if .Values.adminIngressConfig.certificate.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.adminIngressConfig.tlsSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.adminIngressConfig.tlsSecretName }}
  dnsNames:
    - "{{ .Values.adminIngressConfig.domain }}"
  issuerRef:
    name: {{ .Values.issuer.body.name }}
    kind: Issuer
{{- end }}
{{- end }}
