# =============================================================================
# AWS CLI HELPER DEPLOYMENT
# =============================================================================
# Long-running Pod с AWS CLI для bucket-sync Phase B (delete-bucket-policy) +
# Phase D (put-bucket-policy). SeaweedFS shell не имеет команд для bucket policies,
# а образ chrislusf/seaweedfs не содержит aws CLI. Pod живёт всегда (sleep infinity)
# чтобы избежать pod creation overhead на каждом bucket-sync run.
# =============================================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs-aws-cli-helper
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: seaweedfs-aws-cli-helper
    app.kubernetes.io/component: aws-cli-helper
    app.kubernetes.io/part-of: seaweedfs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs-aws-cli-helper
      app.kubernetes.io/component: aws-cli-helper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seaweedfs-aws-cli-helper
        app.kubernetes.io/component: aws-cli-helper
        app.kubernetes.io/part-of: seaweedfs
    spec:
      {{- with .Values.awsCliHelper.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: aws-cli
          image: {{ .Values.awsCliHelper.image | quote }}
          command:
            - sleep
            - infinity
