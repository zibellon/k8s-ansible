# =============================================================================
# SEAWEEDFS NETWORK POLICIES - HARDENED
# =============================================================================
# Intra-namespace traffic (между master/volume/filer/s3/postgresql)
# покрыт общей политикой allow-internal-traffic. Per-component policies оставлены
# только для cross-namespace правил (Traefik ingress) + egress к apiserver.
# =============================================================================

# =============================================================================
# BASE POLICIES
# =============================================================================

---
# Default deny all traffic in seaweedfs namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# DNS for all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: {{ .Values.dns.port }}
        - protocol: TCP
          port: {{ .Values.dns.port }}

---
# Allow all traffic between pods inside the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-traffic
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}

# =============================================================================
# SEAWEEDFS MASTER POLICIES
# =============================================================================

---
# SeaweedFS Master: ingress from Traefik (master UI); egress to apiserver.
# Intra-namespace traffic covered by allow-internal-traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: seaweedfs-master
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: master
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # From Traefik (master UI)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ .Values.seaweedfs.masterHttpPort }}
  egress:
    # To Kubernetes apiserver (pod management via ClusterRole)
    - ports:
        - protocol: TCP
          port: {{ .Values.apiserver.port }}

# =============================================================================
# SEAWEEDFS VOLUME POLICIES
# =============================================================================

---
# SeaweedFS Volume: egress to apiserver (pod management via ClusterRole).
# Intra-namespace traffic covered by allow-internal-traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: seaweedfs-volume
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: volume
  policyTypes:
    - Egress
  egress:
    # To Kubernetes apiserver (pod management via ClusterRole)
    - ports:
        - protocol: TCP
          port: {{ .Values.apiserver.port }}

# =============================================================================
# SEAWEEDFS FILER POLICIES
# =============================================================================

---
# SeaweedFS Filer: ingress from Traefik (admin UI); egress to apiserver.
# Intra-namespace traffic covered by allow-internal-traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: seaweedfs-filer
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: filer
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # From Traefik (admin UI)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ .Values.seaweedfs.filerHttpPort }}
  egress:
    # To Kubernetes apiserver (pod management via ClusterRole)
    - ports:
        - protocol: TCP
          port: {{ .Values.apiserver.port }}

# =============================================================================
# SEAWEEDFS S3 GATEWAY POLICIES
# =============================================================================

---
# SeaweedFS S3: ingress from Traefik (S3 endpoint); egress to apiserver.
# Intra-namespace traffic covered by allow-internal-traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: seaweedfs-s3
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: s3
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # From Traefik (S3 endpoint)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ .Values.seaweedfs.s3HttpPort }}
  egress:
    # To Kubernetes apiserver (pod management via ClusterRole)
    - ports:
        - protocol: TCP
          port: {{ .Values.apiserver.port }}

# =============================================================================
# SEAWEEDFS ADMIN POLICIES
# =============================================================================

---
# SeaweedFS Admin: ingress from Traefik (admin UI); egress to apiserver.
# Intra-namespace traffic (admin <-> master/filer, worker -> admin gRPC)
# covered by allow-internal-traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: seaweedfs-admin
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: admin
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # From Traefik (admin UI)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ .Values.seaweedfs.adminHttpPort }}
  egress:
    # To Kubernetes apiserver (pod management via ClusterRole)
    - ports:
        - protocol: TCP
          port: {{ .Values.apiserver.port }}

# =============================================================================
# PROMETHEUS SCRAPING
# =============================================================================

---
# Allow Prometheus scraping on metrics ports for all seaweedfs pods (9327 =
# master/volume/filer/s3/worker metrics; 23646 = admin /metrics on its http port).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-for-monitoring
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.seaweedfs.metricsPort }}
        - protocol: TCP
          port: {{ .Values.seaweedfs.adminHttpPort }}

# =============================================================================
# ACME SOLVER (cert-manager HTTP-01 challenge) — одна пара политик на каждый http01 solver
# =============================================================================
{{- if .Values.issuer.enabled }}
{{- $spec := .Values.issuer.spec | default dict }}
{{- if hasKey $spec "acme" }}
{{- range $i, $solver := ($spec.acme.solvers | default list) }}
{{- if hasKey $solver "http01" }}
{{- $ing := $solver.http01.ingress | default dict }}
{{- $solverLabels := dig "podTemplate" "metadata" "labels" (dict "acme.cert-manager.io/http01-solver" "true") $ing }}
---
# http01 solver #{{ $i }} — ingress к solver-pod от traefik
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "allow-acme-solver-{{ $i }}"
  namespace: {{ $.Values.namespace }}
spec:
  podSelector:
    matchLabels:
      {{- toYaml $solverLabels | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ $.Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ $.Values.acmeSolver.port }}
---
# http01 solver #{{ $i }} — egress traefik → solver-pod (в namespace traefik)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "{{ $.Values.namespace }}-allow-acme-solver-{{ $i }}"
  namespace: {{ $.Values.traefik.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Values.traefik.instanceName }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Values.namespace }}
          podSelector:
            matchLabels:
              {{- toYaml $solverLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.acmeSolver.port }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

# =============================================================================
# TRAEFIK NAMESPACE POLICY (allow egress from Traefik to SeaweedFS)
# =============================================================================

---
# Allow Traefik to reach SeaweedFS S3 endpoint and master/filer/admin UIs
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.namespace }}-allow-traefik
  namespace: {{ .Values.traefik.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
  policyTypes:
    - Egress
  egress:
    # To SeaweedFS S3 gateway
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/component: s3
      ports:
        - protocol: TCP
          port: {{ .Values.seaweedfs.s3HttpPort }}
    # To SeaweedFS Filer (filer UI)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/component: filer
      ports:
        - protocol: TCP
          port: {{ .Values.seaweedfs.filerHttpPort }}
    # To SeaweedFS Master (master UI)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/component: master
      ports:
        - protocol: TCP
          port: {{ .Values.seaweedfs.masterHttpPort }}
    # To SeaweedFS Admin (admin UI)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/component: admin
      ports:
        - protocol: TCP
          port: {{ .Values.seaweedfs.adminHttpPort }}
