# =============================================================================
# CERT-MANAGER ISSUER (raw spec, rendered as-is from inventory)
# =============================================================================

{{- if .Values.issuer.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Values.issuer.body.name }}
  namespace: {{ .Values.namespace }}
spec:
{{ toYaml .Values.issuer.body.spec | indent 2 }}
{{- end }}
