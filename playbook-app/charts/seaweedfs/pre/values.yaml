---
# Namespace
namespace: "seaweedfs"

# External Secrets settings
externalSecrets:
  namespace: "external-secrets"

# Traefik settings for NetworkPolicy
traefik:
  namespace: ""
  instanceName: ""

# SeaweedFS ESO settings
eso:
  vaultServerUrl: ""
  saName: ""
  roleName: ""
  secretStoreName: ""
  kvEnginePath: "eso-secret"
  secrets: []

# cert-manager Issuer — единый объект {enabled, body: {name, spec}}
issuer:
  enabled: false
  body: {}

# ESO resources global config
esoResourcesConfig:
  secretStoreRefreshInterval: "30s"
  externalSecretRefreshInterval: "30s"
  externalSecretRefreshPolicy: "Periodic"

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443
acmeSolver:
  port: 8089

# =============================================================================
# SeaweedFS component ports (upstream chart 4.28.0 defaults)
# =============================================================================
seaweedfs:
  masterHttpPort: 9333
  masterGrpcPort: 19333
  volumeHttpPort: 8080
  volumeGrpcPort: 18080
  filerHttpPort: 8888
  filerGrpcPort: 18888
  s3HttpPort: 8333
  adminHttpPort: 23646

# PostgreSQL backend for Filer (our local chart)
postgresql:
  port: 5432

# AWS CLI helper Deployment values (consumed by aws-cli-deployment.yaml template)
awsCliHelper:
  image: "amazon/aws-cli:2.32.0"
  imagePullSecrets: []
  tolerations: []
  nodeSelector: {}
  resources: {}

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
