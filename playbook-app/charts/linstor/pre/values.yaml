---
# Namespace for resources (рендерится из linstor_namespace в hosts-vars/linstor.yaml)
namespace: ""
clusterDomain: ""

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443
kubelet:
  port: 10250
external:
  httpPort: 80
  httpsPort: 443

# ------
webhook:
  httpsPort: 9443
linstorController:
  port: 3370
metrics:
  httpsPort: 8443
satellite:
  metricsPort: 9942        # PodMonitor port name: prometheus
piraeusOperator:
  metricsPort: 8443        # Service 443 (name: metrics) → targetPort 8443
csiNfs:
  metricsPort: 999         # Service linstor-csi-nfs port (name: metrics)

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
