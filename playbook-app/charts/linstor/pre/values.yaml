clusterDomain: ""

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443
kubelet:
  port: 10250
external:
  httpPort: 80
  httpsPort: 443
webhook:
  httpsPort: 9443
linstorController:
  port: 3370
metrics:
  httpsPort: 8443
