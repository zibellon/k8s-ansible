# =============================================================================
# LINSTOR / PIRAEUS NETWORK POLICIES
# =============================================================================

---
# Deny all traffic in linstor namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow DNS for all pods in linstor namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: {{ .Values.dns.port }}
        - protocol: TCP
          port: {{ .Values.dns.port }}

---
# Allow all traffic between pods inside the namespace
# (operator ↔ controller ↔ satellite ↔ CSI driver ↔ HA controller)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-traffic
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}

---
# Allow egress to K8s apiserver (via host HAProxy LB on apiserver port)
# Operator + CSI controller + HA controller talk к apiserver через RBAC
# Allow egress to kubelet (CSI node plugin registers с kubelet)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-egress
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: {{ .Values.external.httpPort }}
        - protocol: TCP
          port: {{ .Values.external.httpsPort }}
        - protocol: TCP
          port: {{ .Values.apiserver.port }}
        - protocol: TCP
          port: {{ .Values.kubelet.port }}

---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webhook
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.webhook.httpsPort }}

---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-linstor-controller
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.linstorController.port }}

---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-for-monitoring
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.satellite.metricsPort }}
        - protocol: TCP
          port: {{ .Values.piraeusOperator.metricsPort }}
        - protocol: TCP
          port: {{ .Values.csiNfs.metricsPort }}

# =============================================================================
# CUSTOM: ACME SOLVER (cert-manager HTTP-01 challenge) — одна пара политик на каждый http01 solver
# =============================================================================
{{- if .Values.issuer.enabled }}
{{- $spec := .Values.issuer.body.spec | default dict }}
{{- if hasKey $spec "acme" }}
{{- range $i, $solver := ($spec.acme.solvers | default list) }}
{{- if hasKey $solver "http01" }}
{{- $ing := $solver.http01.ingress | default dict }}
{{- $solverLabels := dig "podTemplate" "metadata" "labels" (dict "acme.cert-manager.io/http01-solver" "true") $ing }}
---
# http01 solver #{{ $i }} — ingress к solver-pod от traefik
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "allow-acme-solver-{{ $i }}"
  namespace: {{ $.Values.namespace }}
spec:
  podSelector:
    matchLabels:
      {{- toYaml $solverLabels | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: {{ $.Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ $.Values.acmeSolver.port }}
---
# http01 solver #{{ $i }} — egress traefik → solver-pod (в namespace traefik)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "{{ $.Values.namespace }}-allow-acme-solver-{{ $i }}"
  namespace: {{ $.Values.traefik.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: traefik
      app.kubernetes.io/instance: {{ $.Values.traefik.instanceName }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $.Values.namespace }}
          podSelector:
            matchLabels:
              {{- toYaml $solverLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ $.Values.acmeSolver.port }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}

# =============================================================================
# CUSTOM: TRAEFIK EGRESS TO LINSTOR CONTROLLER GUI (in traefik namespace)
# =============================================================================

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.namespace }}-allow-traefik
  namespace: {{ .Values.traefik.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: traefik
      app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
  policyTypes:
    - Egress
  egress:
    # To LINSTOR controller GUI (REST API + /ui/)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.linstorController.port }}
