{{- if .Values.linstorController.serviceMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: linstor-controller
  labels:
    app.kubernetes.io/component: linstor-controller
    {{- if .Values.linstorController.serviceMonitor.labels }}
    {{- toYaml .Values.linstorController.serviceMonitor.labels | nindent 4 }}
    {{- end }}
spec:
  endpoints:
    - port: api
      scheme: http
      path: /metrics
      {{- if .Values.linstorController.serviceMonitor.interval }}
      interval: {{ .Values.linstorController.serviceMonitor.interval | quote }}
      {{- end }}
      {{- if .Values.linstorController.serviceMonitor.scrapeTimeout }}
      scrapeTimeout: {{ .Values.linstorController.serviceMonitor.scrapeTimeout | quote }}
      {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: linstor-controller
{{- end }}
