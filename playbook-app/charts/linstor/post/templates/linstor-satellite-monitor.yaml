{{- if .Values.linstorSatellite.podMonitor.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: linstor-satellite
  labels:
    app.kubernetes.io/component: linstor-satellite
    {{- if .Values.linstorSatellite.podMonitor.labels }}
    {{- toYaml .Values.linstorSatellite.podMonitor.labels | nindent 4 }}
    {{- end }}
spec:
  podMetricsEndpoints:
    - port: prometheus
      scheme: http
      {{- if .Values.linstorSatellite.podMonitor.interval }}
      interval: {{ .Values.linstorSatellite.podMonitor.interval | quote }}
      {{- end }}
      {{- if .Values.linstorSatellite.podMonitor.scrapeTimeout }}
      scrapeTimeout: {{ .Values.linstorSatellite.podMonitor.scrapeTimeout | quote }}
      {{- end }}
      relabelings:
        - action: replace
          sourceLabels:
            - __meta_kubernetes_pod_node_name
          targetLabel: node
  selector:
    matchLabels:
      app.kubernetes.io/component: linstor-satellite
{{- end }}
