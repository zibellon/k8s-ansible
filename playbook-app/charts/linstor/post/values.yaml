---
namespace: ""

# cert-manager Issuer — единый объект {enabled, body: {name, spec}}
issuer:
  enabled: false
  body: {}

# Ingress config (per-domain) — независимые toggle'ы ingress / certificate
ingressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressMiddlewares: ""
  certificate:
    enabled: false

traefik:
  entryPoints:
    web: ""
    websecure: ""

linstorController:
  serviceMonitor:
    enabled: false
    interval: ""
    scrapeTimeout: ""
    labels: {}

linstorSatellite:
  podMonitor:
    enabled: false
    interval: ""
    scrapeTimeout: ""
    labels: {}

linstorAffinityController:
  podMonitor:
    enabled: false
    interval: ""
    scrapeTimeout: ""
    labels: {}

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
