---
namespace: ""

# Ingress config (per-domain)
ingressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressMiddlewares: ""

# cert-manager Certificate — плоский объект {enabled, name, spec}
certificateConfig:
  enabled: false
  name: ""
  spec: {}

traefik:
  entryPoints:
    web: ""
    websecure: ""

linstorController:
  serviceMonitor:
    enabled: false
    interval: ""
    scrapeTimeout: ""
    labels: {}

linstorSatellite:
  podMonitor:
    enabled: false
    interval: ""
    scrapeTimeout: ""
    labels: {}

linstorAffinityController:
  podMonitor:
    enabled: false
    interval: ""
    scrapeTimeout: ""
    labels: {}

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
