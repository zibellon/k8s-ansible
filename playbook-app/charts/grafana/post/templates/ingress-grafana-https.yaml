# =============================================================================
# INGRESS FOR GRAFANA — HTTPS (Traefik)
# =============================================================================

{{- if .Values.grafana.ingress.httpsEnable }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.grafana.ingress.secretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.grafana.ingress.secretName }}
  dnsNames:
    - {{ .Values.grafana.ingress.domain }}
  issuerRef:
    name: {{ .Values.clusterIssuer }}
    kind: ClusterIssuer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ui-https
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.ingressClass }}"
    traefik.ingress.kubernetes.io/router.entrypoints: "{{ .Values.traefik.entryPoints.websecure }}"
    traefik.ingress.kubernetes.io/router.tls: "true"
    {{- if .Values.vpnOnlyEnabled }}
    traefik.ingress.kubernetes.io/router.middlewares: "{{ .Values.vpnIngressMiddlewares }}"
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingressClass }}
  tls:
    - hosts:
        - {{ .Values.grafana.ingress.domain }}
      secretName: {{ .Values.grafana.ingress.secretName }}
  rules:
    - host: {{ .Values.grafana.ingress.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: {{ .Values.grafana.port }}
{{- end }}
