# =============================================================================
# CILIUM NAMESPACE NETWORK POLICIES
# =============================================================================

# Default deny
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

# DNS for all pods in cilium namespace
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: {{ .Values.dns.port }}
        - protocol: TCP
          port: {{ .Values.dns.port }}

---
# Allow all traffic between pods inside longhorn-system
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-traffic
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}

# =============================================================================
# PROMETHEUS SCRAPING
# =============================================================================

# Allow Prometheus scraping of Cilium metrics
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-for-monitoring
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.cilium.agentMetricsPort }} # cilium-agent
        - protocol: TCP
          port: {{ .Values.cilium.operatorMetricsPort }} # cilium-operator
        - protocol: TCP
          port: {{ .Values.cilium.envoyMetricsPort }} # cilium-envoy
        - protocol: TCP
          port: {{ .Values.cilium.hubbleMetricsPort }} # hubble-metrics
        - protocol: TCP
          port: {{ .Values.cilium.hubbleRelayMetricsPort }} # hubble-relay

# =============================================================================
# HUBBLE COMPONENTS
# =============================================================================

# Hubble Relay
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-hubble-relay
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      k8s-app: hubble-relay
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.cilium.relayServerPort }}
  egress:
    - ports:
        - protocol: TCP
          port: {{ .Values.cilium.hubblePeerPort }} # hubble-peer (cilium agents)
        - protocol: TCP
          port: {{ .Values.cilium.hubblePeerServicePort }}  # hubble-peer service port

# Hubble UI
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-hubble-ui
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      k8s-app: hubble-ui
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # From Traefik
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ .Values.cilium.hubbleUiPort }}
  egress:
    - ports:
        - protocol: TCP
          port: {{ .Values.apiserver.port }} # API server

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-acme-solver
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      {{- .Values.acmeSolverLabels | toYaml | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ .Values.acmeSolver.port }}

# =============================================================================
# TRAEFIK EGRESS TO CILIUM (in traefik namespace)
# =============================================================================

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.namespace }}-allow-traefik
  namespace: {{ .Values.traefik.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: traefik
      app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
  policyTypes:
    - Egress
  egress:
    # Hubble-UI
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              k8s-app: hubble-ui
      ports:
        - protocol: TCP
          port: {{ .Values.cilium.hubbleUiPort }}
    # ACME solver in Cilium namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              {{- .Values.acmeSolverLabels | toYaml | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.acmeSolver.port }}
