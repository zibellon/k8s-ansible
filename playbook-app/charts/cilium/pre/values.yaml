---
# Cilium namespace
namespace: "cilium"

# Traefik namespace for NetworkPolicy egress rules
traefik:
  namespace: ""
  instanceName: ""

# ACME solver pod labels (from resolved ClusterIssuer solver)
acmeSolverLabels: {}

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443
acmeSolver:
  port: 8089

# =============================================================================
# cilium component ports
# =============================================================================
cilium:
  agentMetricsPort: 9962        # cilium-agent Prometheus metrics
  operatorMetricsPort: 9963     # cilium-operator Prometheus metrics
  envoyMetricsPort: 9964        # cilium-envoy Prometheus metrics
  hubbleMetricsPort: 9965       # hubble metrics
  hubbleRelayMetricsPort: 9966  # hubble-relay metrics
  relayServerPort: 4222         # hubble-relay gRPC server (clients connect here)
  hubblePeerPort: 4244          # hubble-peer (on cilium-agent)
  hubblePeerServicePort: 443    # hubble-peer Service-level port
  hubbleUiPort: 8081            # Hubble UI HTTP
