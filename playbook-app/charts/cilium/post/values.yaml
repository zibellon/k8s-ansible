---
namespace: ""

# Ingress config (per-domain)
ingressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressMiddlewares: ""

# cert-manager Certificate — плоский объект {enabled, name, spec}
certificateConfig:
  enabled: false
  name: ""
  spec: {}

traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

# Node IPs for cluster internal traffic rules
nodeIpsList: []

# =============================================================================
# Common ports (used by CiliumClusterwideNetworkPolicy templates)
# Stored as integers; rendered as quoted strings in CCNP (Cilium CRD requires
# string type for port fields).
# =============================================================================
dns:
  port: 53
external:
  httpPort: 80
  httpsPort: 443
  sshPort: 22
  ntpPort: 123

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
