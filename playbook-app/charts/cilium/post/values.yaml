---
namespace: ""

# cert-manager Issuer — единый объект {enabled, body: {name, spec}}
issuer:
  enabled: false
  body: {}

# Ingress config (per-domain) — независимые toggle'ы ingress / certificate
ingressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressMiddlewares: ""
  certificate:
    enabled: false

traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

# Node IPs for cluster internal traffic rules
nodeIpsList: []

# =============================================================================
# Common ports (used by CiliumClusterwideNetworkPolicy templates)
# Stored as integers; rendered as quoted strings in CCNP (Cilium CRD requires
# string type for port fields).
# =============================================================================
dns:
  port: 53
external:
  httpPort: 80
  httpsPort: 443
  sshPort: 22
  ntpPort: 123

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
