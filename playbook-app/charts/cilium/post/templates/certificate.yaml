# =============================================================================
# CERTIFICATE FOR HUBBLE UI (cert-manager)
#   Рендерится только если issuer.enabled И ingressConfig.certificate.enabled.
#   issuer выключен → Certificate молча пропускается (без ошибки).
# =============================================================================
{{- if and .Values.issuer.enabled .Values.ingressConfig.certificate.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.ingressConfig.tlsSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.ingressConfig.tlsSecretName }}
  dnsNames:
    - "{{ .Values.ingressConfig.domain }}"
  issuerRef:
    name: {{ .Values.issuer.body.name }}
    kind: Issuer
{{- end }}
