# =============================================================================
# CILIUM HOST FIREWALL - Base policy for all nodes
# Requires Cilium CRDs to be installed first
# =============================================================================

apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: host-firewall-base
spec:
  nodeSelector:
    matchLabels: {}

  enableDefaultDeny:
    ingress: true
    egress: true

  ingress:
    # =========================================================================
    # Cluster internal traffic
    # =========================================================================
    - fromEntities:
        - cluster # All pods and nodes in the cluster
        - host # Localhost (same node)
        - health # Cilium health endpoints
        - remote-node # Other nodes in the cluster (explicit)

    # =========================================================================
    # SSH from external
    # =========================================================================
    - fromEntities:
        - world
      toPorts:
        - ports:
            - port: "{{ .Values.external.sshPort }}"
              protocol: TCP

    # =========================================================================
    # ICMP for debugging
    # =========================================================================
    - fromEntities:
        - world
      icmps:
        - fields:
            - type: 8

    # =========================================================================
    # Allow incoming traffic from known cluster node IPs (for node join)
    # =========================================================================
    - fromCIDR:
      {{- toYaml .Values.nodeIpsList | nindent 6 }}

  egress:
    # =========================================================================
    # Cluster internal traffic (free)
    # =========================================================================
    - toEntities:
        - cluster # All pods and nodes in the cluster
        - host # Localhost (same node)
        - health # Cilium health endpoints
        - remote-node # Other nodes in the cluster (explicit)

    # =========================================================================
    # External traffic (HTTP, HTTPS, SSH, DNS, Mail)
    # =========================================================================
    - toEntities:
        - world
      toPorts:
        - ports:
            # Web
            - port: "{{ .Values.external.httpPort }}"
              protocol: TCP
            - port: "{{ .Values.external.httpsPort }}"
              protocol: TCP
            # SSH
            - port: "{{ .Values.external.sshPort }}"
              protocol: TCP
            # DNS
            - port: "{{ .Values.dns.port }}"
              protocol: UDP
            - port: "{{ .Values.dns.port }}"
              protocol: TCP
            # NTP (time sync)
            - port: "{{ .Values.external.ntpPort }}"
              protocol: UDP

    # =========================================================================
    # ICMP for debugging
    # =========================================================================
    - toEntities:
        - world
      icmps:
        - fields:
            - type: 8
    # =========================================================================
    # Allow outgoing traffic to known cluster node IPs (for node join)
    # =========================================================================
    - toCIDR:
      {{- toYaml .Values.nodeIpsList | nindent 6 }}
