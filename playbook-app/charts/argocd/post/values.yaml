---
namespace: ""

# Ingress config (per-domain)
uiIngressConfig:
  enabled: false
  domain: ""
  ingressClass: ""
  tlsEnabled: false
  tlsSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressRouteMiddlewares: []
rpcIngressConfig:
  enabled: false
  domain: ""
  ingressClass: ""
  tlsEnabled: false
  tlsSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressRouteMiddlewares: []

# cert-manager Certificate (per-domain) — плоский объект {enabled, name, spec}
uiCertificateConfig:
  enabled: false
  name: ""
  spec: {}
rpcCertificateConfig:
  enabled: false
  name: ""
  spec: {}

traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

serviceMonitor:
  enabled: false
  interval: "30s"
  scrapeTimeout: "15s"
  labels: {}

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
