---
namespace: ""

# Ingress config (один домен: UI/REST + gRPC через тот же Host).
# Два IngressRoute (ui + grpc) рендерятся из ЭТОГО одного конфига, на один tlsSecret.
ingressConfig:
  enabled: false
  domain: ""
  ingressClass: ""
  tlsEnabled: false
  tlsSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressRouteMiddlewares: []

# cert-manager Certificate (один на домен) — плоский объект {enabled, name, spec}
certificateConfig:
  enabled: false
  name: ""
  spec: {}

traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

serviceMonitor:
  enabled: false
  interval: "30s"
  scrapeTimeout: "15s"
  labels: {}

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
