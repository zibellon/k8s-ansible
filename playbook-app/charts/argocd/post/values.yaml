---
namespace: ""

# cert-manager Issuer — единый объект {enabled, body: {name, spec}}
issuer:
  enabled: false
  body: {}

# Ingress config (per-domain) — независимые toggle'ы ingress / certificate
uiIngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressRouteMiddlewares: []
  certificate:
    enabled: false
rpcIngressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressRouteMiddlewares: []
  certificate:
    enabled: false

traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

serviceMonitor:
  enabled: false
  interval: "30s"
  scrapeTimeout: "15s"
  labels: {}

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
