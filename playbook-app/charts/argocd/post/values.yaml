---
namespace: ""

ingress:
  uiDomain: ""
  rpcDomain: ""
  ingressClass: ""
  clusterIssuer: ""
  uiSecretName: ""
  rpcSecretName: ""
  vpnOnlyEnabled: true
  vpnIngressRouteMiddlewares: []
  httpEnable: false
  httpsEnable: false

traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

serviceMonitor:
  enabled: false
  interval: "30s"
  scrapeTimeout: "15s"
  labels: {}

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
