---
namespace: ""

# cert-manager Issuer (raw {name, spec}) + enable toggle
issuer: {}
issuerEnabled: false

ingress:
  uiDomain: ""
  rpcDomain: ""
  ingressClass: ""
  uiSecretName: ""
  rpcSecretName: ""
  vpnOnlyEnabled: true
  vpnIngressRouteMiddlewares: []

traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

serviceMonitor:
  enabled: false
  interval: "30s"
  scrapeTimeout: "15s"
  labels: {}

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
