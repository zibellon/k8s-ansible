# =============================================================================
# ARGOCD UI INGRESS - HTTPS
# =============================================================================

{{- if .Values.ingress.httpsEnable }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.ingress.uiSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.ingress.uiSecretName }}
  dnsNames:
    - "{{ .Values.ingress.uiDomain }}"
  issuerRef:
    name: {{ .Values.ingress.clusterIssuer }}
    kind: ClusterIssuer

---
# =============================================================================
# INGRESSROUTE FOR ARGOCD UI — HTTPS (Traefik)
# =============================================================================
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ingress-argocd-ui-https
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.ingress.ingressClass }}"
spec:
  entryPoints:
    - {{ .Values.ingress.entryPoints.websecure }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingress.uiDomain }}`)
      priority: 10
      {{- if .Values.ingress.vpnOnlyEnabled }}
      middlewares:
        - name: vpn-only
          namespace: {{ .Values.traefik.namespace }}
      {{- end }}
      services:
        - name: argocd-server
          port: 80
  tls:
    secretName: {{ .Values.ingress.uiSecretName }}
{{- end }}
