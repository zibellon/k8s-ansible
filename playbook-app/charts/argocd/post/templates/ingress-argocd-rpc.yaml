# =============================================================================
# INGRESSROUTE FOR ARGOCD RPC / gRPC (Traefik)
#   enabled    → рендерить IngressRoute
#   tlsEnabled → websecure entrypoint + tls-блок; иначе web, без tls
# Matches gRPC requests by Content-Type header. Higher priority than UI route.
# =============================================================================
{{- if .Values.rpcIngressConfig.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-rpc
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.rpcIngressConfig.ingressClass }}"
spec:
  entryPoints:
    {{- if .Values.rpcIngressConfig.tlsEnabled }}
    - {{ .Values.traefik.entryPoints.websecure }}
    {{- else }}
    - {{ .Values.traefik.entryPoints.web }}
    {{- end }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.rpcIngressConfig.domain }}`) && Header(`Content-Type`, `application/grpc`)
      priority: 11
      {{- if .Values.rpcIngressConfig.vpnOnlyEnabled }}
      middlewares:
        {{- range .Values.rpcIngressConfig.vpnIngressRouteMiddlewares }}
        - name: {{ .name }}
          namespace: {{ .namespace }}
        {{- end }}
      {{- end }}
      services:
        - name: argocd-server
          port: 80
          scheme: h2c
  {{- if and .Values.rpcIngressConfig.tlsEnabled .Values.rpcIngressConfig.tlsSecretName }}
  tls:
    secretName: {{ .Values.rpcIngressConfig.tlsSecretName }}
  {{- end }}
{{- end }}
