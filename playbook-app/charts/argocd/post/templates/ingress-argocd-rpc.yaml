# =============================================================================
# INGRESSROUTE FOR ARGOCD RPC / gRPC (Traefik)
#   issuerEnabled true  → Certificate + HTTPS IngressRoute (websecure, TLS)
#   issuerEnabled false → HTTP IngressRoute (web, без TLS)
# =============================================================================
{{- if .Values.issuerEnabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.ingress.rpcSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.ingress.rpcSecretName }}
  dnsNames:
    - "{{ .Values.ingress.rpcDomain }}"
  issuerRef:
    name: {{ .Values.issuer.name }}
    kind: Issuer
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-rpc
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.ingress.ingressClass }}"
spec:
  entryPoints:
    - {{ .Values.traefik.entryPoints.websecure }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingress.rpcDomain }}`) && Header(`Content-Type`, `application/grpc`)
      priority: 11
      {{- if .Values.ingress.vpnOnlyEnabled }}
      middlewares:
        {{- range .Values.ingress.vpnIngressRouteMiddlewares }}
        - name: {{ .name }}
          namespace: {{ .namespace }}
        {{- end }}
      {{- end }}
      services:
        - name: argocd-server
          port: 80
          scheme: h2c
  tls:
    secretName: {{ .Values.ingress.rpcSecretName }}
{{- else }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-rpc
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.ingress.ingressClass }}"
spec:
  entryPoints:
    - {{ .Values.traefik.entryPoints.web }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingress.rpcDomain }}`) && Header(`Content-Type`, `application/grpc`)
      priority: 11
      {{- if .Values.ingress.vpnOnlyEnabled }}
      middlewares:
        {{- range .Values.ingress.vpnIngressRouteMiddlewares }}
        - name: {{ .name }}
          namespace: {{ .namespace }}
        {{- end }}
      {{- end }}
      services:
        - name: argocd-server
          port: 80
          scheme: h2c
{{- end }}
