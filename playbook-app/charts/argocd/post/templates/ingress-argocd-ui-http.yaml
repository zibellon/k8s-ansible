# =============================================================================
# INGRESSROUTE FOR ARGOCD UI — HTTP (Traefik)
# =============================================================================

{{- if .Values.ingress.httpEnable }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ingress-argocd-ui-http
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.ingress.ingressClass }}"
spec:
  entryPoints:
    - {{ .Values.ingress.entryPoints.web }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingress.uiDomain }}`)
      priority: 10
      {{- if .Values.ingress.vpnOnlyEnabled }}
      middlewares:
        - name: vpn-only
          namespace: {{ .Values.traefik.namespace }}
      {{- end }}
      services:
        - name: argocd-server
          port: 80
{{- end }}
