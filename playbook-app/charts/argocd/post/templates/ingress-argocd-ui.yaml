# =============================================================================
# INGRESSROUTE FOR ARGOCD UI (Traefik)
#   ingress.enabled    → рендерить IngressRoute
#   ingress.tlsEnabled → websecure entrypoint + tls-блок; иначе web, без tls
# =============================================================================
{{- if .Values.uiIngressConfig.ingress.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-ui
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.uiIngressConfig.ingress.ingressClass }}"
spec:
  entryPoints:
    {{- if .Values.uiIngressConfig.ingress.tlsEnabled }}
    - {{ .Values.traefik.entryPoints.websecure }}
    {{- else }}
    - {{ .Values.traefik.entryPoints.web }}
    {{- end }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.uiIngressConfig.domain }}`)
      priority: 10
      {{- if .Values.uiIngressConfig.ingress.vpnOnlyEnabled }}
      middlewares:
        {{- range .Values.uiIngressConfig.ingress.vpnIngressRouteMiddlewares }}
        - name: {{ .name }}
          namespace: {{ .namespace }}
        {{- end }}
      {{- end }}
      services:
        - name: argocd-server
          port: 80
  {{- if and .Values.uiIngressConfig.ingress.tlsEnabled .Values.uiIngressConfig.tlsSecretName }}
  tls:
    secretName: {{ .Values.uiIngressConfig.tlsSecretName }}
  {{- end }}
{{- end }}
