# =============================================================================
# INGRESSROUTE FOR ARGOCD gRPC (Traefik)
#   enabled    → рендерить IngressRoute
#   tlsEnabled → websecure entrypoint + tls-блок; иначе web, без tls
# gRPC (CLI `argocd`) на ТОМ ЖЕ Host, что UI — матчится по Content-Type header.
# Priority выше UI-route. Backend h2c (HTTP/2 cleartext). Отдельный домен не нужен.
# =============================================================================
{{- if .Values.ingressConfig.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-grpc
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.ingressConfig.ingressClass }}"
spec:
  entryPoints:
    {{- if .Values.ingressConfig.tlsEnabled }}
    - {{ .Values.traefik.entryPoints.websecure }}
    {{- else }}
    - {{ .Values.traefik.entryPoints.web }}
    {{- end }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingressConfig.domain }}`) && Header(`Content-Type`, `application/grpc`)
      priority: 11
      {{- if .Values.ingressConfig.vpnOnlyEnabled }}
      middlewares:
        {{- range .Values.ingressConfig.vpnIngressRouteMiddlewares }}
        - name: {{ .name }}
          namespace: {{ .namespace }}
        {{- end }}
      {{- end }}
      services:
        - name: argocd-server
          port: 80
          scheme: h2c
  {{- if and .Values.ingressConfig.tlsEnabled .Values.ingressConfig.tlsSecretName }}
  tls:
    secretName: {{ .Values.ingressConfig.tlsSecretName }}
  {{- end }}
{{- end }}
