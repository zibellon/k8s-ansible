# =============================================================================
# CERTIFICATE FOR ARGOCD (cert-manager)
#   Рендерится если certificateConfig.enabled. Один серт на один домен
#   (UI/REST + gRPC идут через тот же Host).
# =============================================================================
{{- if .Values.certificateConfig.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certificateConfig.name }}
  namespace: {{ .Values.namespace }}
spec:
{{ toYaml .Values.certificateConfig.spec | indent 2 }}
{{- end }}
