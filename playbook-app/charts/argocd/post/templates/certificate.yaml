# =============================================================================
# CERTIFICATES FOR ARGOCD (cert-manager)
#   Каждый Certificate рендерится только если issuer.enabled И
#   <unit>IngressConfig.certificate.enabled. issuer выключен → Certificate
#   молча пропускается (без ошибки).
# =============================================================================
{{- if and .Values.issuer.enabled .Values.uiIngressConfig.certificate.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.uiIngressConfig.tlsSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.uiIngressConfig.tlsSecretName }}
  dnsNames:
    - "{{ .Values.uiIngressConfig.domain }}"
  issuerRef:
    name: {{ .Values.issuer.body.name }}
    kind: Issuer
{{- end }}
{{- if and .Values.issuer.enabled .Values.rpcIngressConfig.certificate.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.rpcIngressConfig.tlsSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.rpcIngressConfig.tlsSecretName }}
  dnsNames:
    - "{{ .Values.rpcIngressConfig.domain }}"
  issuerRef:
    name: {{ .Values.issuer.body.name }}
    kind: Issuer
{{- end }}
