# =============================================================================
# CERTIFICATES FOR ARGOCD (cert-manager)
#   Каждый Certificate рендерится если <unit>CertificateConfig.enabled.
#   Полный raw spec из values.
# =============================================================================
{{- if .Values.uiCertificateConfig.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.uiCertificateConfig.name }}
  namespace: {{ .Values.namespace }}
spec:
{{ toYaml .Values.uiCertificateConfig.spec | indent 2 }}
{{- end }}
{{- if .Values.rpcCertificateConfig.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.rpcCertificateConfig.name }}
  namespace: {{ .Values.namespace }}
spec:
{{ toYaml .Values.rpcCertificateConfig.spec | indent 2 }}
{{- end }}
