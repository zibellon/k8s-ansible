    mainWithRegistry: "quay.io/argoproj/argocd"
    mainTag: "v3.0.6"
    dexWithRegistry: "ghcr.io/dexidp/dex"
    dexTag: "v2.41.1"
    redisWithRegistry: "docker.io/library/redis"
    redisTag: "7.2.7-alpine"
