---
# Default deny all traffic in argocd namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "deny-all"
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow DNS for all pods in argocd namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "allow-dns-egress"
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

# =============================================================================
# ARGOCD INTERNAL COMMUNICATION
# =============================================================================

---
# Allow all ingress between ArgoCD components
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "allow-all-internal"
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}

# =============================================================================
# PROMETHEUS SCRAPING
# =============================================================================

---
# Allow Prometheus scraping on all metrics ports for all argocd pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "allow-for-monitoring"
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8082 # application-controller
        - protocol: TCP
          port: 8083 # argocd-server
        - protocol: TCP
          port: 8084 # repo-server
        - protocol: TCP
          port: 8080 # applicationset-controller
        - protocol: TCP
          port: 5558 # dex-server
        - protocol: TCP
          port: 9001 # notifications-controller

# =============================================================================
# ARGOCD-SERVER (UI + gRPC)
# =============================================================================

---
# Allow argocd-server ingress from Traefik
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "allow-argocd-server"
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: traefik-{{ .Values.traefik.namespace }}
      ports:
        - protocol: TCP
          port: 8080 # actual pod port
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.gitlabRunner.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: gitlab-runner-job
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - ports:
        - protocol: TCP
          port: 6443

# =============================================================================
# ARGOCD-REPO-SERVER (git clone to internal GitLab)
# =============================================================================

---
# Allow repo-server egress to GitLab
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "allow-repo-server"
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-repo-server
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.gitlab.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: gitlab
              app: gitlab-shell
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.sshPortInternal }} # actual pod port

