# =============================================================================
# ACME SOLVER (cert-manager HTTP-01 challenge)
# =============================================================================

---
# Allow ACME solver pod ingress from traefik
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "allow-acme-solver"
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      {{- .Values.acmeSolverLabels | toYaml | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: traefik-{{ .Values.traefik.namespace }}
      ports:
        - protocol: TCP
          port: 8089

# =============================================================================
# EXTERNAL - NS (Traefik -> ArgoCD)
# =============================================================================

---
# Traefik -> argocd-server (UI + gRPC)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "{{ .Values.namespace }}-allow-traefik"
  namespace: {{ .Values.traefik.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: traefik
      app.kubernetes.io/instance: traefik-{{ .Values.traefik.namespace }}
  policyTypes:
    - Egress
  egress:
    # ArgoCD server (UI + gRPC)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: argocd-server
      ports:
        - protocol: TCP
          port: 8080 # actual pod port
    # ACME solver in argocd
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              {{- .Values.acmeSolverLabels | toYaml | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8089

---
# Allow gitlab-runner job pods egress to argocd-server (cross-namespace, owned by argocd chart)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "{{ .Values.namespace }}-allow-gitlab-runner-job"
  namespace: {{ .Values.gitlabRunner.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.gitlabRunnerJob.name }}
      app.kubernetes.io/component: {{ .Values.gitlabRunnerJob.component }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: argocd-server
      ports:
        - protocol: TCP
          port: 8080

---
# GitLab shell <- ArgoCD repo-server
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "{{ .Values.namespace }}-allow-gitlab-shell"
  namespace: {{ .Values.gitlab.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: gitlab
      app: gitlab-shell
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: argocd-repo-server
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.sshPortInternal }}

