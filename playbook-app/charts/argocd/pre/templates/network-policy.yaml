---
# Default deny all traffic in argocd namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "deny-all"
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# Allow DNS for all pods in argocd namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "allow-dns-egress"
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: {{ .Values.dns.port }}
        - protocol: TCP
          port: {{ .Values.dns.port }}

---
# Allow all traffic between pods inside the namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-traffic
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}

# =============================================================================
# PROMETHEUS SCRAPING
# =============================================================================

---
# Allow Prometheus scraping on all metrics ports for all argocd pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "allow-for-monitoring"
  namespace: {{ .Values.namespace }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.argocd.applicationControllerMetricsPort }} # application-controller
        - protocol: TCP
          port: {{ .Values.argocd.serverMetricsPort }} # argocd-server
        - protocol: TCP
          port: {{ .Values.argocd.repoServerMetricsPort }} # repo-server
        - protocol: TCP
          port: {{ .Values.argocd.applicationsetControllerMetricsPort }} # applicationset-controller
        - protocol: TCP
          port: {{ .Values.argocd.dexMetricsPort }} # dex-server
        - protocol: TCP
          port: {{ .Values.argocd.notificationsControllerMetricsPort }} # notifications-controller

# =============================================================================
# ARGOCD-SERVER (UI + gRPC)
# =============================================================================

---
# Allow argocd-server ingress from Traefik
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "allow-argocd-server"
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.traefik.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: {{ .Values.traefik.instanceName }}
      ports:
        - protocol: TCP
          port: {{ .Values.argocd.serverPort }} # actual pod port
{{- if .Values.gitlabRunner.enabled }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.gitlabRunner.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: gitlab-runner-job
      ports:
        - protocol: TCP
          port: {{ .Values.argocd.serverPort }}
{{- end }}
  egress:
    - ports:
        - protocol: TCP
          port: {{ .Values.apiserver.port }}

# =============================================================================
# ARGOCD-REPO-SERVER (git clone: internet HTTP/HTTPS + internal GitLab SSH)
# =============================================================================

---
# Allow repo-server egress: internet (HTTP/HTTPS) + GitLab shell (SSH, if enabled)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "allow-repo-server"
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: argocd-repo-server
  policyTypes:
    - Egress
  egress:
    # Internet egress (HTTP/HTTPS): git-over-HTTPS, Helm repos, OCI registries.
    # 0.0.0.0/0 минус RFC1918 → только внешние адреса (внутрикластерный трафик не открываем).
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
{{- if .Values.gitlab.enabled }}
    # Internal GitLab shell (SSH): git clone over SSH
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.gitlab.namespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: gitlab
              app: gitlab-shell
      ports:
        - protocol: TCP
          port: {{ .Values.gitlab.sshPortInternal }} # actual pod port
{{- end }}

