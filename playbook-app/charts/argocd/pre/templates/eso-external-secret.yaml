# =============================================================================
# EXTERNAL SECRETS FOR ARGOCD (from Vault)
# =============================================================================

{{- range $secret := .Values.eso.secrets }}
{{- if and (not (eq $.Values.eso.isNeedEso false)) (not (eq $secret.is_need_eso false)) }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $secret.external_secret_name }}
  namespace: {{ $.Values.namespace }}
spec:
  refreshInterval: {{ $secret.refresh_interval | default $.Values.esoResourcesConfig.externalSecretRefreshInterval }}
  refreshPolicy: {{ $.Values.esoResourcesConfig.externalSecretRefreshPolicy }}
  secretStoreRef:
    kind: SecretStore
    name: {{ $.Values.eso.secretStoreName }}
{{- if or (eq $secret.type "git_ops_repo_pattern") (eq $secret.type "git_ops_repo_direct") }}
  # SPECIAL: SSH git — repo-creds label (pattern) или repository label (direct)
  # Vault path must contain: repo_url, ssh_private_key
  target:
    name: {{ $secret.target_secret_name }}
    template:
      engineVersion: v2
      metadata:
        labels:
{{- if eq $secret.type "git_ops_repo_pattern" }}
          argocd.argoproj.io/secret-type: repo-creds
{{- else }}
          argocd.argoproj.io/secret-type: repository
{{- end }}
      data:
        type: git
        url: "{{ "{{" }} .repo_url {{ "}}" }}"
        sshPrivateKey: "{{ "{{" }} .ssh_private_key {{ "}}" }}"
  data:
    - secretKey: ssh_private_key
      remoteRef:
        key: "{{ $.Values.eso.kvEnginePath }}/data{{ $secret.vault_path }}"
        property: ssh_private_key
    - secretKey: repo_url
      remoteRef:
        key: "{{ $.Values.eso.kvEnginePath }}/data{{ $secret.vault_path }}"
        property: repo_url
{{- else if or (eq $secret.type "git_ops_repo_direct_userpass") (eq $secret.type "git_ops_repo_pattern_userpass") }}
  # SPECIAL: userpass git — repository label (direct) или repo-creds label (pattern)
  # Vault path must contain: repo_url, username, password, repo_type (git | helm)
  target:
    name: {{ $secret.target_secret_name }}
    template:
      engineVersion: v2
      metadata:
        labels:
{{- if eq $secret.type "git_ops_repo_pattern_userpass" }}
          argocd.argoproj.io/secret-type: repo-creds
{{- else }}
          argocd.argoproj.io/secret-type: repository
{{- end }}
      data:
        type: "{{ "{{" }} .repo_type {{ "}}" }}"
        url: "{{ "{{" }} .repo_url {{ "}}" }}"
        username: "{{ "{{" }} .username {{ "}}" }}"
        password: "{{ "{{" }} .password {{ "}}" }}"
  data:
    - secretKey: repo_type
      remoteRef:
        key: "{{ $.Values.eso.kvEnginePath }}/data{{ $secret.vault_path }}"
        property: repo_type
    - secretKey: repo_url
      remoteRef:
        key: "{{ $.Values.eso.kvEnginePath }}/data{{ $secret.vault_path }}"
        property: repo_url
    - secretKey: username
      remoteRef:
        key: "{{ $.Values.eso.kvEnginePath }}/data{{ $secret.vault_path }}"
        property: username
    - secretKey: password
      remoteRef:
        key: "{{ $.Values.eso.kvEnginePath }}/data{{ $secret.vault_path }}"
        property: password
{{- else if or (eq $secret.type "helm_repo") (eq $secret.type "helm_repo_oci") }}
  # SPECIAL: helm — Helm chart repository or OCI registry (enableOCI added for helm_repo_oci)
  # Vault path must contain: name, repo_url, username, password
  # username and password can be empty strings for public repositories/registries
  target:
    name: {{ $secret.target_secret_name }}
    template:
      engineVersion: v2
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: helm
        name: "{{ "{{" }} .name {{ "}}" }}"
        url: "{{ "{{" }} .repo_url {{ "}}" }}"
        username: "{{ "{{" }} .username {{ "}}" }}"
        password: "{{ "{{" }} .password {{ "}}" }}"
{{- if eq $secret.type "helm_repo_oci" }}
        enableOCI: "true"
{{- end }}
  data:
    - secretKey: name
      remoteRef:
        key: "{{ $.Values.eso.kvEnginePath }}/data{{ $secret.vault_path }}"
        property: name
    - secretKey: repo_url
      remoteRef:
        key: "{{ $.Values.eso.kvEnginePath }}/data{{ $secret.vault_path }}"
        property: repo_url
    - secretKey: username
      remoteRef:
        key: "{{ $.Values.eso.kvEnginePath }}/data{{ $secret.vault_path }}"
        property: username
    - secretKey: password
      remoteRef:
        key: "{{ $.Values.eso.kvEnginePath }}/data{{ $secret.vault_path }}"
        property: password
{{- else if eq $secret.type "argocd_root" }}
  target:
    name: {{ $secret.target_secret_name }}
  dataFrom:
    - extract:
        key: {{ $.Values.eso.kvEnginePath }}/data{{ $secret.vault_path }}
{{- else }}
  target:
    name: {{ $secret.target_secret_name }}
  dataFrom:
    - extract:
        key: {{ $.Values.eso.kvEnginePath }}/data{{ $secret.vault_path }}
{{- end }}
{{- end }}
{{- end }}
