# =============================================================================
# EXTERNAL SECRETS FOR ARGOCD (from Vault)
# Supported types: default, git_ops_repo_pattern, git_ops_repo_direct
#
# default               — произвольный секрет, все поля из Vault как есть,
#                         без ArgoCD-label
#
# git_ops_repo_pattern  — ArgoCD repo-creds (credential template по URL-префиксу)
#                         Vault path must contain: type, url,
#                         and one of: sshPrivateKey | username + password
#
# git_ops_repo_direct   — ArgoCD repository (конкретный репозиторий или helm/OCI реестр)
#                         Vault path must contain: type, url,
#                         and one of: sshPrivateKey | username + password | name + enableOCI
# =============================================================================

{{- range $secret := .Values.eso.secrets }}
{{- if and (not (eq $.Values.eso.isNeedEso false)) (not (eq $secret.is_need_eso false)) }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $secret.external_secret_name }}
  namespace: {{ $.Values.namespace }}
spec:
  refreshInterval: {{ $secret.refresh_interval | default $.Values.esoResourcesConfig.externalSecretRefreshInterval }}
  refreshPolicy: {{ $.Values.esoResourcesConfig.externalSecretRefreshPolicy }}
  secretStoreRef:
    kind: SecretStore
    name: {{ $.Values.eso.secretStoreName }}
{{- if or (eq $secret.type "git_ops_repo_pattern") (eq $secret.type "git_ops_repo_direct") }}
  target:
    name: {{ $secret.target_secret_name }}
    template:
      engineVersion: v2
      metadata:
        labels:
{{- if eq $secret.type "git_ops_repo_pattern" }}
          argocd.argoproj.io/secret-type: repo-creds
{{- else }}
          argocd.argoproj.io/secret-type: repository
{{- end }}
  dataFrom:
    - extract:
        key: "{{ $.Values.eso.kvEnginePath }}/data{{ $secret.vault_path }}"
{{- else }}
  target:
    name: {{ $secret.target_secret_name }}
  dataFrom:
    - extract:
        key: "{{ $.Values.eso.kvEnginePath }}/data{{ $secret.vault_path }}"
{{- end }}
{{- end }}
{{- end }}
