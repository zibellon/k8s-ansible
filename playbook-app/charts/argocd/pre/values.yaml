---
namespace: ""

traefik:
  namespace: ""
  instanceName: ""

gitlabRunner:
  namespace: ""

gitlabRunnerJob:
  name: ""
  component: ""

gitlab:
  namespace: ""
  sshPortInternal: 2222

eso:
  vaultServerUrl: ""
  saName: ""
  roleName: ""
  secretStoreName: ""
  kvEnginePath: ""
  secrets: []

# ESO resources global config
esoResourcesConfig:
  secretStoreRefreshInterval: 60
  externalSecretRefreshInterval: "1m"
  externalSecretRefreshPolicy: "Periodic"

# ACME solver pod labels (from resolved ClusterIssuer solver)
acmeSolverLabels: {}

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443
acmeSolver:
  port: 8089

# =============================================================================
# argocd component ports
# =============================================================================
argocd:
  serverPort: 8080                              # argocd-server pod (UI + gRPC)
  applicationControllerMetricsPort: 8082        # application-controller Prometheus metrics
  serverMetricsPort: 8083                       # argocd-server Prometheus metrics
  repoServerMetricsPort: 8084                   # repo-server Prometheus metrics
  applicationsetControllerMetricsPort: 8080     # applicationset-controller Prometheus metrics
  dexMetricsPort: 5558                          # dex-server Prometheus metrics
  notificationsControllerMetricsPort: 9001      # notifications-controller Prometheus metrics

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
