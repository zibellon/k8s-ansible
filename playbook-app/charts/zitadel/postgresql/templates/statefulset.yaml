apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zitadel-postgresql
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: zitadel-postgresql
    app.kubernetes.io/instance: zitadel-postgresql-{{ .Values.namespace }}
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: zitadel
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  serviceName: zitadel-postgresql
  selector:
    matchLabels:
      app.kubernetes.io/name: zitadel-postgresql
      app.kubernetes.io/instance: zitadel-postgresql-{{ .Values.namespace }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zitadel-postgresql
        app.kubernetes.io/instance: zitadel-postgresql-{{ .Values.namespace }}
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: zitadel
        app.kubernetes.io/managed-by: Helm
    spec:
      automountServiceAccountToken: false
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # non-root: postgres:alpine стартует root и дропает к postgres (uid 70) через su-exec.
      # Форсим на уровне k8s. fsGroup=70 → свежий PVC group-writable; PGDATA=.../pgdata (subdir)
      # создаётся initdb'ом 0700 под uid 70. drop ALL безопасен — su-exec уже не нужен.
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgresql
          image: {{ .Values.image }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.secretName }}
                  key: {{ .Values.credentials.usernameKey }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.secretName }}
                  key: {{ .Values.credentials.passwordKey }}
            - name: POSTGRES_DB
              value: {{ .Values.databaseName | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: data
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /var/run/postgresql
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: zitadel-postgresql
        # writable dirs для readOnlyRootFilesystem: socket/lock (/var/run/postgresql) + temp (/tmp)
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
