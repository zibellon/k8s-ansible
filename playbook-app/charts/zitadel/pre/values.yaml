---
# Namespace
namespace: "zitadel"

# External Secrets settings
externalSecrets:
  namespace: ""

# Traefik settings for NetworkPolicy
traefik:
  namespace: ""
  instanceName: ""

# ZITADEL ESO settings
eso:
  vaultServerUrl: ""
  saName: ""
  roleName: ""
  secretStoreName: ""
  kvEnginePath: ""
  isNeedEso: true
  secrets: []

# ACME solver pod labels (from resolved ClusterIssuer solver)
acmeSolverLabels: {}

# ESO resources global config
esoResourcesConfig:
  secretStoreRefreshInterval: 60
  externalSecretRefreshInterval: "1m"
  externalSecretRefreshPolicy: "Periodic"

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
acmeSolver:
  port: 8089
external:
  httpPort: 80
  httpsPort: 443

# =============================================================================
# zitadel component ports
# =============================================================================
zitadel:
  h2cPort: 8080  # HTTP/2 cleartext (Traefik -> zitadel)
