---
# Namespace
namespace: "zitadel"

# External Secrets settings
externalSecrets:
  namespace: ""

# Traefik settings for NetworkPolicy
traefik:
  namespace: ""
  instanceName: ""

# ZITADEL ESO settings
eso:
  vaultServerUrl: ""
  saName: ""
  roleName: ""
  secretStoreName: ""
  kvEnginePath: ""
  secrets: []

# cert-manager Issuer — плоский объект {enabled, name, spec}
issuer:
  enabled: false
  name: ""
  spec: {}

# ESO resources global config
esoResourcesConfig:
  secretStoreRefreshInterval: 60
  externalSecretRefreshInterval: "1m"
  externalSecretRefreshPolicy: "Periodic"

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443
acmeSolver:
  port: 8089
external:
  httpPort: 80
  httpsPort: 443

# =============================================================================
# zitadel component ports
# =============================================================================
zitadel:
  loginPort: 3000
  h2cPort: 8080  # HTTP/2 cleartext (Traefik -> zitadel)

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
