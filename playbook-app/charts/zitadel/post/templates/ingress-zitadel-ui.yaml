# =============================================================================
# INGRESSROUTE FOR ZITADEL UI (Traefik)
#   enabled    → рендерить IngressRoute
#   tlsEnabled → websecure entrypoint + tls-блок; иначе web, без tls
# Backend speaks h2c (HTTP/2 cleartext) on port 8080.
# =============================================================================
{{- if .Values.ingressConfig.enabled }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: zitadel-ui
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.ingressConfig.ingressClass }}"
spec:
  entryPoints:
    {{- if .Values.ingressConfig.tlsEnabled }}
    - {{ .Values.traefik.entryPoints.websecure }}
    {{- else }}
    - {{ .Values.traefik.entryPoints.web }}
    {{- end }}
  routes:
    # Login v2 (Next.js) — отдельный сервис zitadel-login:3000 (http, НЕ h2c).
    # Priority выше catch-all, чтобы /ui/v2/login выигрывал маршрутизацию.
    - kind: Rule
      match: Host(`{{ .Values.ingressConfig.domain }}`) && PathPrefix(`/ui/v2/login`)
      priority: 20
      {{- if .Values.ingressConfig.vpnOnlyEnabled }}
      middlewares:
        {{- range .Values.ingressConfig.vpnIngressRouteMiddlewares }}
        - name: {{ .name }}
          namespace: {{ .namespace }}
        {{- end }}
      {{- end }}
      services:
        - name: zitadel-login
          port: 3000
          scheme: http
    # Всё остальное → главный backend zitadel (h2c/gRPC).
    - kind: Rule
      match: Host(`{{ .Values.ingressConfig.domain }}`)
      priority: 10
      {{- if .Values.ingressConfig.vpnOnlyEnabled }}
      middlewares:
        {{- range .Values.ingressConfig.vpnIngressRouteMiddlewares }}
        - name: {{ .name }}
          namespace: {{ .namespace }}
        {{- end }}
      {{- end }}
      services:
        - name: zitadel
          port: 8080
          scheme: h2c
  {{- if and .Values.ingressConfig.tlsEnabled .Values.ingressConfig.tlsSecretName }}
  tls:
    secretName: {{ .Values.ingressConfig.tlsSecretName }}
  {{- end }}
{{- end }}
