# =============================================================================
# CERTIFICATE FOR ZITADEL (cert-manager)
#   Рендерится если certificateConfig.enabled. Полный raw spec из values.
# =============================================================================
{{- if .Values.certificateConfig.enabled }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certificateConfig.name }}
  namespace: {{ .Values.namespace }}
spec:
{{ toYaml .Values.certificateConfig.spec | indent 2 }}
{{- end }}
