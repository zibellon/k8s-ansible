# =============================================================================
# CERTIFICATE FOR ZITADEL (cert-manager)
# =============================================================================
# =============================================================================
# INGRESSROUTE FOR ZITADEL UI — HTTPS (Traefik)
# Backend speaks h2c (HTTP/2 cleartext) on port 8080.
# =============================================================================

{{- if .Values.ingress.httpsEnable }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.ingress.tlsSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.ingress.tlsSecretName }}
  dnsNames:
    - "{{ .Values.ingress.domain }}"
  issuerRef:
    name: {{ .Values.ingress.clusterIssuer }}
    kind: ClusterIssuer
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: zitadel-ui-https
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.ingress.ingressClass }}"
spec:
  entryPoints:
    - {{ .Values.traefik.entryPoints.websecure }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingress.domain }}`)
      priority: 10
      {{- if .Values.ingress.vpnOnlyEnabled }}
      middlewares:
        {{- range .Values.vpnIngressRouteMiddlewares }}
        - name: {{ .name }}
          namespace: {{ .namespace }}
        {{- end }}
      {{- end }}
      services:
        - name: zitadel
          port: 8080
          scheme: h2c
  tls:
    secretName: {{ .Values.ingress.tlsSecretName }}
{{- end }}
