# =============================================================================
# INGRESSROUTE FOR ZITADEL gRPC (Traefik)
#   issuerEnabled true  → HTTPS IngressRoute (websecure, TLS) — Certificate в ingress-zitadel-ui.yaml
#   issuerEnabled false → HTTP IngressRoute (web, без TLS)
# Matches gRPC requests by Content-Type header. Higher priority than UI route.
# Backend speaks h2c (HTTP/2 cleartext) on port 8080.
# =============================================================================
{{- if .Values.issuerEnabled }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: zitadel-grpc
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.ingress.ingressClass }}"
spec:
  entryPoints:
    - {{ .Values.traefik.entryPoints.websecure }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingress.domain }}`) && Header(`Content-Type`, `application/grpc`)
      priority: 11
      {{- if .Values.ingress.vpnOnlyEnabled }}
      middlewares:
        {{- range .Values.ingress.vpnIngressRouteMiddlewares }}
        - name: {{ .name }}
          namespace: {{ .namespace }}
        {{- end }}
      {{- end }}
      services:
        - name: zitadel
          port: 8080
          scheme: h2c
  tls:
    secretName: {{ .Values.ingress.tlsSecretName }}
{{- else }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: zitadel-grpc
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "{{ .Values.ingress.ingressClass }}"
spec:
  entryPoints:
    - {{ .Values.traefik.entryPoints.web }}
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingress.domain }}`) && Header(`Content-Type`, `application/grpc`)
      priority: 11
      {{- if .Values.ingress.vpnOnlyEnabled }}
      middlewares:
        {{- range .Values.ingress.vpnIngressRouteMiddlewares }}
        - name: {{ .name }}
          namespace: {{ .namespace }}
        {{- end }}
      {{- end }}
      services:
        - name: zitadel
          port: 8080
          scheme: h2c
{{- end }}
