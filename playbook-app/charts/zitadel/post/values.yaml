---
# Namespace
namespace: "zitadel"

# Ingress config (per-domain)
ingressConfig:
  domain: ""
  tlsSecretName: ""
  ingress:
    enabled: false
    ingressClass: ""
    tlsEnabled: false
    vpnOnlyEnabled: false
    vpnIngressRouteMiddlewares: []

# cert-manager Certificate — плоский объект {enabled, name, spec}
certificateConfig:
  enabled: false
  name: ""
  spec: {}

# Traefik namespace for middleware
traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
