---
# Namespace
namespace: "zitadel"

# cert-manager Issuer (raw {name, spec}) + enable toggle
issuer: {}
issuerEnabled: false

# ZITADEL ingress settings
ingress:
  ingressClass: ""
  domain: ""
  tlsSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressRouteMiddlewares: []

# Traefik namespace for middleware
traefik:
  namespace: ""
  entryPoints:
    web: ""
    websecure: ""

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
