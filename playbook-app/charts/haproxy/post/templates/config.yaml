# =============================================================================
# HAPROXY GLOBAL CONFIG
# =============================================================================

apiVersion: ingress.v1.haproxy.org/v1
kind: Global
metadata:
  name: haproxy-global
  namespace: {{ .Values.namespace }}
  annotations:
    ingress.class: "{{ .Values.ingressClass }}"
spec:
  config:
    {{- .Values.global.config | toYaml | nindent 4 }}
  log_targets:
    {{- .Values.global.logTargets | toYaml | nindent 4 }}

---
# =============================================================================
# HAPROXY DEFAULTS CONFIG
# =============================================================================

apiVersion: ingress.v1.haproxy.org/v1
kind: Defaults
metadata:
  name: haproxy-defaults
  namespace: {{ .Values.namespace }}
  annotations:
    ingress.class: "{{ .Values.ingressClass }}"
spec:
  config:
    {{- .Values.defaults | toYaml | nindent 4 }}
