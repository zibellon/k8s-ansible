---
# Redis configuration
namespace: outline

image: redis:7.4-alpine

# Credentials secret (from ESO). Ключ хранит plain-пароль; requirepass собирается в statefulset args.
credentialsSecretName: ""
credentialsSecretKey: ""

# Storage configuration
storageClass: ""
storageSize: "1Gi"

# Resources (requests/limits; default {} → guard omits the block, no change)
resources: {}

# Node placement (default {} → guard omits the block, schedules anywhere)
nodeSelector: {}

# Tolerations (default [] → guard omits the block, tolerates nothing extra)
tolerations: []

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
