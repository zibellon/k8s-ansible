apiVersion: v1
kind: Service
metadata:
  name: outline-redis
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: outline-redis
    app.kubernetes.io/instance: outline-redis-{{ .Values.namespace }}
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: outline
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app.kubernetes.io/name: outline-redis
    app.kubernetes.io/instance: outline-redis-{{ .Values.namespace }}
