---
namespace: ""

# Scheduled jobs. Outline's `cron` service не в дефолтном SERVICES — дёргаем HTTP-эндпоинт.
cron:
  enabled: true
  image: "busybox:1.36"
  targetHost: "outline"
  targetPort: 3000
  utilsSecretName: ""      # eso-outline-app
  utilsSecretKey: "utilsSecret"
  jobs:
    - period: "hourly"
      schedule: "5 * * * *"
    - period: "daily"
      schedule: "15 3 * * *"

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
