# =============================================================================
# OUTLINE SCHEDULED JOBS (CronJob)
#   Outline's `cron` service НЕ в дефолтном SERVICES — плановые cleanup-задачи
#   триггерятся снаружи через GET /api/cron.<period>?token=<UTILS_SECRET>.
#   Один CronJob на период, бьёт по внутреннему сервису Outline (intra-ns).
# =============================================================================
{{- if .Values.cron.enabled }}
{{- range .Values.cron.jobs }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: outline-cron-{{ .period }}
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/name: outline
    app.kubernetes.io/component: cron
    app.kubernetes.io/part-of: outline
    app.kubernetes.io/managed-by: Helm
spec:
  schedule: {{ .schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: outline
            app.kubernetes.io/component: cron
            app.kubernetes.io/part-of: outline
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: cron
              image: {{ $.Values.cron.image }}
              command: ["/bin/sh", "-c"]
              args:
                - 'wget -q -O- "http://{{ $.Values.cron.targetHost }}:{{ $.Values.cron.targetPort }}/api/cron.{{ .period }}?token=${UTILS_SECRET}"'
              env:
                - name: UTILS_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ $.Values.cron.utilsSecretName }}
                      key: {{ $.Values.cron.utilsSecretKey }}
              securityContext:
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
{{- end }}
{{- end }}
