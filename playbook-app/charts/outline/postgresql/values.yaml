---
# PostgreSQL configuration
namespace: "outline"

# Database identity
databaseName: "outline"

image: "postgres:17.9-alpine3.23"

# Storage
storageClass: "lh-major-multi-best-effort"
storageSize: 10Gi

# Resources (requests/limits; default {} → guard omits the block, no change)
resources: {}

# Node placement (default {} → guard omits the block, schedules anywhere)
nodeSelector: {}

# Tolerations (default [] → guard omits the block, tolerates nothing extra)
tolerations: []

# Credentials secret (from ESO). POSTGRES_USER становится superuser (свойство образа) —
# нужно для CREATE EXTENSION (uuid-ossp/pg_trgm/unaccent), которые ставят миграции Outline.
creds:
  secretName: ""
  usernameKey: ""
  passwordKey: ""

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
