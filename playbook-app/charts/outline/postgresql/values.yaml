---
# PostgreSQL configuration
namespace: "outline"

# Database identity
databaseName: "outline"

image: "postgres:17.9-alpine3.23"

# Storage
storageClass: "lh-major-multi-best-effort"
storageSize: 10Gi

# Credentials secret (from ESO). POSTGRES_USER становится superuser (свойство образа) —
# нужно для CREATE EXTENSION (uuid-ossp/pg_trgm/unaccent), которые ставят миграции Outline.
creds:
  secretName: ""
  usernameKey: ""
  passwordKey: ""

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
