---
# Namespace
namespace: ""

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443

# =============================================================================
# external-secrets component ports
# =============================================================================
externalSecrets:
  metricsPort: 8080  # controller, webhook, cert-controller Prometheus metrics
  webhookPort: 10250 # admission webhook (apiserver -> external-secrets-webhook)
