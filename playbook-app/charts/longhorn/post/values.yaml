---
namespace: ""

# Ingress config (per-domain)
ingressConfig:
  enabled: false
  domain: ""
  ingressClass: ""
  tlsEnabled: false
  tlsSecretName: ""
  vpnOnlyEnabled: false
  vpnIngressMiddlewares: ""

