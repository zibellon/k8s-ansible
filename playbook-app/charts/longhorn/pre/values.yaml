---
namespace: ""

# DNS domain for internal service resolution
clusterDomain: ""

traefik:
  namespace: ""
  instanceName: ""

# Vault namespace for SecretStore connection
vault:
  namespace: ""

# ESO settings
eso:
  vaultServerUrl: ""
  saName: ""
  roleName: ""
  secretStoreName: ""
  kvEnginePath: ""
  secrets: []

# ESO resources global config
esoResourcesConfig:
  secretStoreRefreshInterval: 60
  externalSecretRefreshInterval: "1m"
  externalSecretRefreshPolicy: "Periodic"

# cert-manager Issuer — плоский объект {enabled, name, spec}
issuer:
  enabled: false
  name: ""
  spec: {}

# =============================================================================
# Common ports (used by NetworkPolicy templates)
# =============================================================================
dns:
  port: 53
apiserver:
  port: 6443
kubelet:
  port: 10250
acmeSolver:
  port: 8089
external:
  httpPort: 80
  httpsPort: 443

# =============================================================================
# longhorn component ports
# =============================================================================
longhorn:
  uiPort: 8000          # longhorn-ui (Traefik -> longhorn-ui)
  metricsPort: 9500     # longhorn-backend (manager metrics)
  webhookHttpPort: 9502 # admission webhook (apiserver -> longhorn-manager)
  webhookHttpsPort: 9503 # admission webhook (apiserver -> longhorn-manager)

# Custom K8s objects to render (operator-side, default empty)
extraObjects: []
