namespace: ""

# DNS domain for internal service resolution
clusterDomain: ""

traefik:
  namespace: ""
  instanceName: ""

# Vault namespace for SecretStore connection
vault:
  namespace: ""

# ESO settings
eso:
  vaultServerUrl: ""
  saName: ""
  roleName: ""
  secretStoreName: ""
  kvEnginePath: ""
  isNeedEso: true
  secrets: []

# ESO resources global config
esoResourcesConfig:
  secretStoreRefreshInterval: 60
  externalSecretRefreshInterval: "1m"
  externalSecretRefreshPolicy: "Periodic"

# ACME solver pod labels (from resolved ClusterIssuer solver)
acmeSolverLabels: {}