# =============================================================================
# Async Helm Upgrade (resilient to SSH disconnects)
# =============================================================================
# Params:
#   - label_name: Label prefix for task names (used in logs)
#   - dto_helm_command: Complete helm command string to execute
#
# Fixed:
#   - delegate_to: "{{ master_manager_fact }}" (only managers can run helm)
#   - async/poll/retries/delay from hosts-vars/k8s-base.yaml
#
# Usage:
#   - name: "[component-install] Install via Helm (async)"
#     include_tasks: tasks/tasks-helm-upgrade-async.yaml
#     vars:
#       label_name: "component-install"
#       dto_helm_command: >
#         helm upgrade --install component repo/chart
#         --namespace {{ namespace }}
#         --values {{ values_file }}
#         --cleanup-on-fail --atomic --wait --timeout {{ timeout }}
#     tags: [install]
# =============================================================================

- name: "[{{ label_name }}] Assert all dto params are provided"
  assert:
    that:
      - label_name is defined
      - label_name | length > 0
      - dto_helm_command is defined
      - dto_helm_command | length > 0
    fail_msg: "tasks-helm-upgrade-async: all params required: label_name, dto_helm_command"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Start async helm upgrade"
  command: "{{ dto_helm_command }}"
  async: "{{ helm_async.timeout }}"
  poll: "{{ helm_async.poll }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  register: helm_async_result
  tags: [always]
