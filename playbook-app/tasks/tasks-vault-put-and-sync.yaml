# =============================================================================
# Vault Put and Sync — Write a KV v2 secret and trigger ESO sync
# =============================================================================
# Writes a dict of fields to a Vault KV v2 path (vault kv put — full replace).
# Optionally triggers ESO sync and waits for the downstream k8s Secret to appear.
# Generation of secret values is the caller's responsibility — use tasks-generate-secret.yaml.
#
# Required vars:
#   label_name     — task label prefix
#   vault_put_path — full KV path incl. mount, e.g. "eso-secret/gitlab/postgresql"
#   vault_put_data — dict { field: value } to write (must be non-empty)
#
# Optional vars:
#   eso_sync_namespace   — namespace for ESO force-sync (required for sync/wait to trigger)
#   eso_sync_es_name     — specific ExternalSecret name; if omitted → --all in namespace
#   eso_wait_secret_name — k8s Secret name to poll until present (requires eso_sync_namespace)
#
# Semantics: always vault kv put (full replace). To preserve existing fields the
# caller must pre-read them via tasks-vault-get.yaml and merge into vault_put_data.
# Wait retries/delay are hardcoded: retries=30, delay=5s.
#
# Requires global vars: vault_namespace, vault_creds_host_path, master_manager_fact
# =============================================================================

- name: "[{{ label_name }}] Assert: vault_put_data must be provided"
  assert:
    that:
      - (vault_put_data | default({})) | length > 0
    fail_msg: "tasks-vault-put-and-sync: vault_put_data must be a non-empty dict"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Read Vault root token"
  shell: "jq -r '.\"vault-root\"' {{ vault_creds_host_path }}"
  register: _vault_put_token
  changed_when: false
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Write secret to Vault"
  shell: |
    printf '%s' {{ vault_put_data | to_json | quote }} | \
      kubectl exec -i -n {{ vault_namespace }} vault-0 -- \
        env VAULT_TOKEN="{{ _vault_put_token.stdout }}" \
        vault kv put {{ vault_put_path }} -
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Trigger ESO sync"
  include_tasks: tasks/tasks-eso-force-sync.yaml
  vars:
    label_name: "{{ label_name }}"
    eso_sync_namespace: "{{ eso_sync_namespace }}"
    eso_sync_es_name: "{{ eso_sync_es_name | default('') }}"
  when: eso_sync_namespace is defined and eso_sync_namespace | length > 0
  tags: [always]

- name: "[{{ label_name }}] Wait for k8s Secret to appear"
  command: kubectl get secret {{ eso_wait_secret_name }} -n {{ eso_sync_namespace }}
  register: _vault_put_secret_wait
  until: _vault_put_secret_wait.rc == 0
  retries: 30
  delay: 5
  changed_when: false
  when:
    - eso_wait_secret_name is defined and eso_wait_secret_name | length > 0
    - eso_sync_namespace is defined and eso_sync_namespace | length > 0
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
