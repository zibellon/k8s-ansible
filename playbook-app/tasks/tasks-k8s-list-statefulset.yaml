# =============================================================================
# K8s List StatefulSets — Print `kubectl get statefulset -o wide` output to debug log
# =============================================================================
# Utility include. Runs `kubectl get statefulset -n <ns> -o wide` and prints
# the result via the `debug` module (visible with default verbosity).
# `failed_when: false` keeps the task green when the underlying CRD is not
# installed in the cluster (relevant for Certificate, IngressRoute, TCP).
#
# Required vars:
#   dto_label_name              — task label prefix
#   dto_statefulset_namespace   — K8s namespace
#
# Requires global vars: master_manager_fact
# =============================================================================

- name: "[{{ dto_label_name }}] Assert required dto params are provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
      - dto_statefulset_namespace is defined
      - dto_statefulset_namespace | length > 0
    fail_msg: "tasks-k8s-list-statefulset: dto_label_name and dto_statefulset_namespace are required"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Get statefulsets in namespace {{ dto_statefulset_namespace }}"
  command: kubectl get statefulset -n {{ dto_statefulset_namespace }} -o wide
  register: k8s_list_statefulset_result
  changed_when: false
  failed_when: false
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Print statefulsets in namespace {{ dto_statefulset_namespace }}"
  debug:
    var: k8s_list_statefulset_result.stdout_lines
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
