# =============================================================================
# Wait for rollout to complete
# =============================================================================
# Params:
#   - label_name: Label for task names (used in logs)
#   - dto_rollout_namespace: Namespace
#   - dto_rollout_timeout: Timeout for rollout status
#   - dto_rollout_resources_list: List of resources (e.g. deployment/name, daemonset/name, statefulset/name)
# =============================================================================

- name: "[{{ label_name }}] Assert all dto params are provided"
  assert:
    that:
      - label_name is defined
      - label_name | length > 0
      - dto_rollout_namespace is defined
      - dto_rollout_namespace | length > 0
      - dto_rollout_timeout is defined
      - dto_rollout_timeout | length > 0
      - dto_rollout_resources_list is defined
      - dto_rollout_resources_list is sequence
      - dto_rollout_resources_list | length > 0
    fail_msg: >-
      tasks-wait-rollout: all params required:
      label_name, dto_rollout_namespace, dto_rollout_timeout, dto_rollout_resources_list (non-empty list)
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Wait for rollouts to complete"
  command: kubectl rollout status {{ item }} -n {{ dto_rollout_namespace }} --timeout={{ dto_rollout_timeout }}
  loop: "{{ dto_rollout_resources_list }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  register: rollout_result
  until: rollout_result.rc == 0
  retries: "{{ rollout_wait.retries }}"
  delay: "{{ rollout_wait.delay }}"
  tags: [always]