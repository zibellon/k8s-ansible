# =============================================================================
# K8s Secret Get — Read a single field from a K8s Secret into a named fact
# =============================================================================
# Reads exactly one .data field from a K8s Secret and publishes it as a
# named fact. Never fails on missing secret or field — callers branch on
# <fact_name>_exists.
#
# Required vars:
#   label_name                  — task label prefix
#   dto_secret_namespace        — K8s namespace of the secret
#   dto_secret_name             — name of the K8s Secret
#   dto_secret_field            — key in .data to read (one field per call)
#   dto_secret_res_fact_name    — output fact name (sets <name> and <name>_exists)
#
# Output facts (set on all hosts):
#   {{ dto_secret_res_fact_name }}        — decoded string value ('' if missing)
#   {{ dto_secret_res_fact_name }}_exists — bool (true only if field is non-empty)
#
# Requires global vars: master_manager_fact
# =============================================================================

- name: "[{{ label_name }}] Assert all dto params are provided"
  assert:
    that:
      - label_name is defined
      - label_name | length > 0
      - dto_secret_namespace is defined
      - dto_secret_namespace | length > 0
      - dto_secret_name is defined
      - dto_secret_name | length > 0
      - dto_secret_field is defined
      - dto_secret_field | length > 0
      - dto_secret_res_fact_name is defined
      - dto_secret_res_fact_name | length > 0
    fail_msg: "tasks-k8s-secret-get: all params are required (namespace, name, field, res_fact_name)"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Read field from K8s Secret"
  shell: |
    kubectl get secret {{ dto_secret_name }} \
      -n {{ dto_secret_namespace }} \
      -o jsonpath='{.data.{{ dto_secret_field }}}' 2>/dev/null | base64 --decode
  register: _k8s_secret_get_raw
  failed_when: false
  changed_when: false
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Set result fact"
  set_fact:
    "{{ dto_secret_res_fact_name }}": "{{ _k8s_secret_get_raw.stdout | default('') | string }}"
    "{{ dto_secret_res_fact_name + '_exists' }}": >-
      {{ _k8s_secret_get_raw.rc == 0 and (_k8s_secret_get_raw.stdout | default('') | length > 0) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Set fact to all hosts"
  set_fact:
    "{{ dto_secret_res_fact_name }}": "{{ hostvars[master_manager_fact][dto_secret_res_fact_name] }}"
    "{{ dto_secret_res_fact_name + '_exists' }}": "{{ hostvars[master_manager_fact][dto_secret_res_fact_name + '_exists'] }}"
  tags: [always]
