# =============================================================================
# Add Helm repository and update
# =============================================================================
# Params:
#   - label_name: Label prefix for task names
#   - dto_helm_repo_name: Repository alias (e.g. "cilium", "longhorn")
#   - dto_helm_repo_url: Repository URL
# =============================================================================

- name: "[{{ label_name }}] Assert all dto params are provided"
  assert:
    that:
      - label_name is defined
      - label_name | length > 0
      - dto_helm_repo_name is defined
      - dto_helm_repo_name | length > 0
      - dto_helm_repo_url is defined
      - dto_helm_repo_url | length > 0
    fail_msg: "tasks-add-helm-repo: all params required: label_name, dto_helm_repo_name, dto_helm_repo_url"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Add Helm repository"
  command: helm repo add {{ dto_helm_repo_name }} {{ dto_helm_repo_url }} --force-update
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Update Helm repositories"
  command: helm repo update
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]