# =============================================================================
# Build kustomize output and overwrite the source file in chart templates dir
#
# Workflow on master_manager_fact:
#   1. rm -rf <chart>/kustomize_build_tmp/  (defensive cleanup if previous run failed)
#   2. mkdir <chart>/kustomize_build_tmp/
#   3. cp <chart>/templates/<source> -> <chart>/kustomize_build_tmp/<source>
#   4. render <chart>/kustomize_build_tmp/kustomization.yaml from dto_patches_list
#   5. kubectl kustomize <chart>/kustomize_build_tmp -o <chart>/templates/<source>
#   6. rm -rf <chart>/kustomize_build_tmp
#
# Params:
#   - dto_label_name:        Label for task names (used in logs)
#   - dto_chart_remote_dest: Remote path to chart dir on master_manager_fact (no trailing /)
#   - dto_source_filename:   Name of pristine file inside templates/ (e.g. install.yaml)
#   - dto_patches_list:      Sequence of {target: {...}, patch: |- ...} dicts (merged base + extra)
#   - dto_target_namespace:  Builtin kustomize namespace transformer — rewrites metadata.namespace
#                            of all namespaced resources + subjects[].namespace in (Cluster)RoleBinding
# =============================================================================

- name: "[{{ dto_label_name }}] Assert all required input parameters are defined"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
      - dto_chart_remote_dest is defined
      - dto_chart_remote_dest | length > 0
      - dto_source_filename is defined
      - dto_source_filename | length > 0
      - dto_patches_list is defined
      - dto_patches_list is sequence
      - dto_target_namespace is defined
      - dto_target_namespace | length > 0
    fail_msg: "Required params: dto_label_name, dto_chart_remote_dest, dto_source_filename, dto_patches_list (sequence), dto_target_namespace"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Cleanup leftover staging dir from previous failed run"
  file:
    path: "{{ dto_chart_remote_dest }}/kustomize_build_tmp"
    state: absent
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Create staging dir for kustomize"
  file:
    path: "{{ dto_chart_remote_dest }}/kustomize_build_tmp"
    state: directory
    mode: "0755"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Copy pristine source into staging"
  copy:
    src: "{{ dto_chart_remote_dest }}/templates/{{ dto_source_filename }}"
    dest: "{{ dto_chart_remote_dest }}/kustomize_build_tmp/{{ dto_source_filename }}"
    remote_src: true
    mode: "0644"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Build kustomization data structure"
  set_fact:
    kustomize_build_kustomization:
      apiVersion: kustomize.config.k8s.io/v1beta1
      kind: Kustomization
      namespace: "{{ dto_target_namespace }}"
      resources:
        - "{{ dto_source_filename }}"
      patches: "{{ dto_patches_list }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Render kustomization.yaml in staging"
  copy:
    dest: "{{ dto_chart_remote_dest }}/kustomize_build_tmp/kustomization.yaml"
    mode: "0644"
    content: "{{ kustomize_build_kustomization | to_nice_yaml }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Run kubectl kustomize, write directly to templates/{{ dto_source_filename }}"
  command: "kubectl kustomize {{ dto_chart_remote_dest }}/kustomize_build_tmp -o {{ dto_chart_remote_dest }}/templates/{{ dto_source_filename }}"
  changed_when: false
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Cleanup staging dir"
  file:
    path: "{{ dto_chart_remote_dest }}/kustomize_build_tmp"
    state: absent
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
