# =============================================================================
# K8s List Pods — Print `kubectl get pods -o wide` output to debug log
# =============================================================================
# Utility include. Runs `kubectl get pods -n <ns> -o wide` and prints the
# result via the `debug` module (visible with default verbosity).
#
# Required vars:
#   dto_label_name              — task label prefix
#   dto_pods_namespace          — K8s namespace
#
# Requires global vars: master_manager_fact
# =============================================================================

- name: "[{{ dto_label_name }}] Assert required dto params are provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
      - dto_pods_namespace is defined
      - dto_pods_namespace | length > 0
    fail_msg: "tasks-k8s-list-pods: dto_label_name and dto_pods_namespace are required"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Get pods in namespace {{ dto_pods_namespace }}"
  command: kubectl get pods -n {{ dto_pods_namespace }} -o wide
  register: k8s_list_pods_result
  changed_when: false
  delegate_to: "{{ master_manager_fact }}"
  run_once: true

- name: "[{{ dto_label_name }}] Print pods in namespace {{ dto_pods_namespace }}"
  debug:
    var: k8s_list_pods_result.stdout_lines
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
