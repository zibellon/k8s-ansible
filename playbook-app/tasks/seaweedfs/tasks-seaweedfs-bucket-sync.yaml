# =============================================================================
# SeaweedFS Bucket Sync — declarative buckets + quotas + owner
# =============================================================================
# Reusable task include. Invoked from playbook with:
#   - include_tasks: tasks-seaweedfs-bucket-sync.yaml
#     vars:
#       dto_label_name: "<caller-prefix>"
#
# v17 filer-driven IAM. Buckets get an owner (identity); data access is via the
# consumers' managed policies (SECTION 1+2), NOT bucket policies (removed).
#
# State (v17 — filer = единственный источник истины): текущее состояние читается
# напрямую из живого filer двумя командами — fs.configure (location config:
# replication/rack/dataCenter) + s3.bucket.list (existence + owner). diff vs inventory
# target → delete стейл + create new + reconcile owner + apply quotas. Внешний
# ConfigMap-стор (бывшие per-item ConfigMap'ы) устранён.
#
# Stateless filter API:
#   seaweedfs_buckets_to_delete / _to_create / _owners_to_set / _immutable_violations
#     — signature (fs_configure_raw, bucket_list_raw, target_buckets); each does full
#       validation (replication presence + rack/dataCenter + format) + diff internally.
#   seaweedfs_buckets_quotas_to_apply — signature (target_buckets); annotates every target
#     bucket with _quota_op + _quota_size_mib (quota applied idempotently, no filer read).
#
# Convention: dto_label_name passed ONLY at playbook-level invocation.
#
# Reads inventory:
#   - seaweedfs_sync_buckets + _extra (from hosts-vars/seaweedfs-sync.yaml).
#     Schema per bucket: {name, owner, replication, rack?, dataCenter?, quota_size?}.
#   - seaweedfs_namespace (from hosts-vars/seaweedfs.yaml).
#
# Sync flow (2 reads + 5 resource loops + immutable assert):
#   READ. fs.configure + s3.bucket.list (live filer) → capture stdout (x2).
#   A. Delete стейл buckets (weed shell s3.bucket.delete).
#   B. Create new buckets (weed shell s3.bucket.create -owner=<owner>).
#   C. Apply fs.configure для new buckets (replication + optional rack + dataCenter).
#   D. Reconcile owner у kept buckets (weed shell s3.bucket.owner; owner mutable).
#   E. Apply quotas всем target buckets (quota_size задан → -op=set; иначе -op=remove).
#
# Pre-phase ASSERT: после compute calls, до Phase A — fail-fast если ЛЮБОЕ
# immutable поле (replication, rack или dataCenter) изменилось на kept bucket vs filer.
# Sync aborts с detailed message, cluster intact.
#
# NOTE про bucket delete: 's3.bucket.delete' в SeaweedFS shell не имеет флага
# -force, но команда сама делает hard delete — CollectionDelete sweeps все
# volumes/objects bucket'а. Object Lock с locked objects — единственное препятствие.
# =============================================================================

- name: "[{{ dto_label_name }}] Assert dto_label_name provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
    fail_msg: >-
      tasks-seaweedfs-bucket-sync: dto_label_name required (string, non-empty).
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Declare local fact keys"
  set_fact:
    _local_target_buckets_key: "_local_target_buckets"
    _local_fs_configure_raw_key: "_local_fs_configure_raw"
    _local_bucket_list_raw_key: "_local_bucket_list_raw"
    _local_to_delete_buckets_key: "_local_to_delete_buckets"
    _local_to_create_buckets_key: "_local_to_create_buckets"
    _local_owners_to_set_key: "_local_owners_to_set"
    _local_quotas_to_apply_key: "_local_quotas_to_apply"
    _local_immutable_violations_key: "_local_immutable_violations"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute target buckets list"
  set_fact:
    "{{ _local_target_buckets_key }}": "{{ seaweedfs_sync_buckets + (seaweedfs_sync_buckets_extra | default([])) }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# --- READ 1: current bucket location config from the live filer (fs.configure) ---
- name: "[{{ dto_label_name }}] Read current bucket locations from filer (fs.configure)"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "fs.configure"
    dto_weed_capture_fact: "{{ _local_fs_configure_raw_key }}"
  run_once: true
  tags: [always]

# --- READ 2: current buckets (existence + owner) from the live filer (s3.bucket.list) ---
- name: "[{{ dto_label_name }}] Read current buckets from filer (s3.bucket.list)"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.bucket.list"
    dto_weed_capture_fact: "{{ _local_bucket_list_raw_key }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute to_delete_buckets via filter"
  set_fact:
    "{{ _local_to_delete_buckets_key }}": >-
      {{ lookup('vars', _local_fs_configure_raw_key) | seaweedfs_buckets_to_delete(
           lookup('vars', _local_bucket_list_raw_key),
           lookup('vars', _local_target_buckets_key)
         ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute to_create_buckets via filter"
  set_fact:
    "{{ _local_to_create_buckets_key }}": >-
      {{ lookup('vars', _local_fs_configure_raw_key) | seaweedfs_buckets_to_create(
           lookup('vars', _local_bucket_list_raw_key),
           lookup('vars', _local_target_buckets_key)
         ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute owners_to_set via filter (kept buckets с changed owner)"
  set_fact:
    "{{ _local_owners_to_set_key }}": >-
      {{ lookup('vars', _local_fs_configure_raw_key) | seaweedfs_buckets_owners_to_set(
           lookup('vars', _local_bucket_list_raw_key),
           lookup('vars', _local_target_buckets_key)
         ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute buckets_quotas_to_apply via filter (op + size_mib)"
  set_fact:
    "{{ _local_quotas_to_apply_key }}": >-
      {{ lookup('vars', _local_target_buckets_key) | seaweedfs_buckets_quotas_to_apply }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute bucket immutable_violations via filter (replication + rack + dataCenter)"
  set_fact:
    "{{ _local_immutable_violations_key }}": >-
      {{ lookup('vars', _local_fs_configure_raw_key) | seaweedfs_buckets_immutable_violations(
           lookup('vars', _local_bucket_list_raw_key),
           lookup('vars', _local_target_buckets_key)
         ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Assert no immutable settings changes (replication/rack/dataCenter) — fail-fast"
  assert:
    that:
      - lookup('vars', _local_immutable_violations_key) | length == 0
    fail_msg: |
      ERROR: bucket immutable settings (replication/rack/dataCenter) change attempts detected.
      Immutable settings changes post-creation cause data fragmentation in SeaweedFS — sync aborted.

      Violations ({{ lookup('vars', _local_immutable_violations_key) | length }} buckets):
      {% for v in lookup('vars', _local_immutable_violations_key) %}
        - {{ v.name }}: replication '{{ v.state_replication }}' → '{{ v.target_replication }}', rack '{{ v.state_rack }}' → '{{ v.target_rack }}', dataCenter '{{ v.state_dataCenter }}' → '{{ v.target_dataCenter }}'
      {% endfor %}

      To resolve: revert inventory target к state values OR migrate data manually + align inventory.
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# --- PHASE A: Delete стейл buckets ---
- name: "[{{ dto_label_name }}] Phase A — Delete стейл buckets via weed shell"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.bucket.delete -name={{ item.name }}"
  loop: "{{ lookup('vars', _local_to_delete_buckets_key) }}"
  loop_control:
    label: "{{ item.name }}"
  run_once: true
  tags: [always]

# --- PHASE B: Create new buckets with owner ---
- name: "[{{ dto_label_name }}] Phase B — Create new buckets via weed shell (-owner=<owner>)"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.bucket.create -name={{ item.name }} -owner={{ item.owner }}"
  loop: "{{ lookup('vars', _local_to_create_buckets_key) }}"
  loop_control:
    label: "{{ item.name }} (owner={{ item.owner }})"
  run_once: true
  tags: [always]

# --- PHASE C: Apply immutable settings (replication + rack + dataCenter) for new buckets ---
- name: "[{{ dto_label_name }}] Phase C — Apply fs.configure для new buckets (replication + rack + dataCenter)"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "fs.configure -locationPrefix=/buckets/{{ item.name }} -replication={{ item.replication }}{% if item.rack is defined %} -rack={{ item.rack }}{% endif %}{% if item.dataCenter is defined %} -dataCenter={{ item.dataCenter }}{% endif %} -apply"
  loop: "{{ lookup('vars', _local_to_create_buckets_key) }}"
  loop_control:
    label: "{{ item.name }} → replication={{ item.replication }}{% if item.rack is defined %}, rack={{ item.rack }}{% endif %}{% if item.dataCenter is defined %}, dataCenter={{ item.dataCenter }}{% endif %}"
  run_once: true
  tags: [always]

# --- PHASE D: Reconcile owner у kept buckets (owner mutable) ---
- name: "[{{ dto_label_name }}] Phase D — Reconcile owner у kept buckets via weed shell s3.bucket.owner"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.bucket.owner -name={{ item.name }} -owner={{ item.owner }}"
  loop: "{{ lookup('vars', _local_owners_to_set_key) }}"
  loop_control:
    label: "{{ item.name }} → owner={{ item.owner }}"
  run_once: true
  tags: [always]

# --- PHASE E: Apply quotas (size_mib pre-computed in compute filter) ---
- name: "[{{ dto_label_name }}] Phase E — Apply quotas via weed shell (size_mib pre-computed)"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.bucket.quota -name={{ item.name }} -op={{ item._quota_op }}{% if item._quota_op == 'set' %} -sizeMB={{ item._quota_size_mib }}{% endif %}"
  loop: "{{ lookup('vars', _local_quotas_to_apply_key) }}"
  loop_control:
    label: "{{ item.name }} (quota: {{ item._quota_op }}{% if item._quota_op == 'set' %} {{ item._quota_size_mib }}MiB{% endif %})"
  run_once: true
  tags: [always]
