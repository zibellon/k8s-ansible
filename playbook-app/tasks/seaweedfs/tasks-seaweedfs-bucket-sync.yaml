# =============================================================================
# SeaweedFS Bucket Sync — declarative buckets + quotas + owner
# =============================================================================
# Reusable task include. Invoked from playbook with:
#   - include_tasks: tasks-seaweedfs-bucket-sync.yaml
#     vars:
#       dto_label_name: "<caller-prefix>"
#
# v18 filer-driven IAM. Buckets get an owner (identity); data access is via the
# consumers' managed policies, NOT bucket policies (removed). Фильтры в
# filter_plugins/seaweedfs_bucket.py (split из монолита seaweedfs_sync.py).
#
# v18 changes: owner mutable→IMMUTABLE (owner-reconcile фаза удалена; owner в
# immutable_violations); rack + dataCenter REQUIRED (fs.configure всегда с
# -rack -dataCenter); quotas split на quota_to_upsert (-op=set) + quota_to_delete
# (-op=remove). Read-once (×2) → focused-фильтры вызываются последовательно.
#
# State (filer = единственный источник истины): текущее состояние читается напрямую
# из живого filer двумя командами — fs.configure (replication/rack/dataCenter) +
# s3.bucket.list (existence + owner). diff vs inventory target.
#
# Stateless filter API (signature: (fs_configure_raw, bucket_list_raw, target_buckets)):
#   seaweedfs_buckets_to_delete         — filer-bucket не в target → delete.
#   seaweedfs_buckets_to_create         — target не в filer → create + fs.configure.
#   seaweedfs_buckets_immutable_violations — kept-bucket с изменённым owner/replication/
#                                         rack/dataCenter → fail-fast assert.
#   seaweedfs_buckets_quota_to_upsert   — target с quota_size, чья квота ОТЛИЧАЕТСЯ от filer
#                                         (diff vs s3.bucket.list quota:) → -op=set -sizeMB.
#   seaweedfs_buckets_quota_to_delete   — target без quota_size, у кого в filer квота ЕСТЬ
#                                         → -op=remove (уже-без-квоты скипаются).
#
# Convention: dto_label_name passed ONLY at playbook-level invocation.
#
# Reads inventory:
#   - seaweedfs_sync_buckets + _extra (from hosts-vars/seaweedfs-sync.yaml).
#     Schema per bucket: {name, owner, replication, rack, dataCenter, quota_size?}
#     (owner/replication/rack/dataCenter REQUIRED; quota_size optional).
#   - seaweedfs_namespace (from hosts-vars/seaweedfs.yaml).
#
# Sync flow (2 reads + immutable assert + 5 resource loops):
#   READ. fs.configure + s3.bucket.list (live filer) → capture stdout (x2).
#   ASSERT. immutable (owner/replication/rack/dataCenter) на kept buckets → fail-fast.
#   A. Delete стейл buckets (s3.bucket.delete).
#   B. Create new buckets (s3.bucket.create -owner).
#   C. fs.configure для new buckets (-replication -rack -dataCenter -apply, всегда).
#   D. Quota upsert (s3.bucket.quota -op=set -sizeMB).
#   E. Quota delete (s3.bucket.quota -op=remove).
#
# NOTE про bucket delete: 's3.bucket.delete' в SeaweedFS shell не имеет флага
# -force, но команда сама делает hard delete — CollectionDelete sweeps все
# volumes/objects bucket'а. Object Lock с locked objects — единственное препятствие.
# =============================================================================

- name: "[{{ dto_label_name }}] Assert dto_label_name provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
    fail_msg: >-
      tasks-seaweedfs-bucket-sync: dto_label_name required (string, non-empty).
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Declare local fact keys"
  set_fact:
    _local_target_buckets_key: "_local_target_buckets"
    _local_fs_configure_raw_key: "_local_fs_configure_raw"
    _local_bucket_list_raw_key: "_local_bucket_list_raw"
    _local_to_delete_buckets_key: "_local_to_delete_buckets"
    _local_to_create_buckets_key: "_local_to_create_buckets"
    _local_quota_to_upsert_key: "_local_quota_to_upsert"
    _local_quota_to_delete_key: "_local_quota_to_delete"
    _local_immutable_violations_key: "_local_immutable_violations"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute target buckets list"
  set_fact:
    "{{ _local_target_buckets_key }}": "{{ seaweedfs_sync_buckets + (seaweedfs_sync_buckets_extra | default([])) }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# --- READ 1: current bucket location config from the live filer (fs.configure) ---
- name: "[{{ dto_label_name }}] Read current bucket locations from filer (fs.configure)"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "fs.configure"
    dto_weed_capture_fact: "{{ _local_fs_configure_raw_key }}"
  run_once: true
  tags: [always]

# --- READ 2: current buckets (existence + owner) from the live filer (s3.bucket.list) ---
- name: "[{{ dto_label_name }}] Read current buckets from filer (s3.bucket.list)"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.bucket.list"
    dto_weed_capture_fact: "{{ _local_bucket_list_raw_key }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute to_delete_buckets via filter"
  set_fact:
    "{{ _local_to_delete_buckets_key }}": >-
      {{ lookup('vars', _local_fs_configure_raw_key) | seaweedfs_buckets_to_delete(
           lookup('vars', _local_bucket_list_raw_key),
           lookup('vars', _local_target_buckets_key)
         ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute to_create_buckets via filter"
  set_fact:
    "{{ _local_to_create_buckets_key }}": >-
      {{ lookup('vars', _local_fs_configure_raw_key) | seaweedfs_buckets_to_create(
           lookup('vars', _local_bucket_list_raw_key),
           lookup('vars', _local_target_buckets_key)
         ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute quota_to_upsert via filter (buckets with quota_size)"
  set_fact:
    "{{ _local_quota_to_upsert_key }}": >-
      {{ lookup('vars', _local_fs_configure_raw_key) | seaweedfs_buckets_quota_to_upsert(
           lookup('vars', _local_bucket_list_raw_key),
           lookup('vars', _local_target_buckets_key)
         ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute quota_to_delete via filter (buckets without quota_size)"
  set_fact:
    "{{ _local_quota_to_delete_key }}": >-
      {{ lookup('vars', _local_fs_configure_raw_key) | seaweedfs_buckets_quota_to_delete(
           lookup('vars', _local_bucket_list_raw_key),
           lookup('vars', _local_target_buckets_key)
         ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute bucket immutable_violations via filter (owner + replication + rack + dataCenter)"
  set_fact:
    "{{ _local_immutable_violations_key }}": >-
      {{ lookup('vars', _local_fs_configure_raw_key) | seaweedfs_buckets_immutable_violations(
           lookup('vars', _local_bucket_list_raw_key),
           lookup('vars', _local_target_buckets_key)
         ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Assert no immutable settings changes (owner/replication/rack/dataCenter) — fail-fast"
  assert:
    that:
      - lookup('vars', _local_immutable_violations_key) | length == 0
    fail_msg: |
      ERROR: bucket immutable settings (owner/replication/rack/dataCenter) change attempts detected.
      Immutable settings changes post-creation cause data fragmentation in SeaweedFS — sync aborted.

      Violations ({{ lookup('vars', _local_immutable_violations_key) | length }} buckets):
      {% for v in lookup('vars', _local_immutable_violations_key) %}
        - {{ v.name }}: owner '{{ v.state_owner }}' → '{{ v.target_owner }}', replication '{{ v.state_replication }}' → '{{ v.target_replication }}', rack '{{ v.state_rack }}' → '{{ v.target_rack }}', dataCenter '{{ v.state_dataCenter }}' → '{{ v.target_dataCenter }}'
      {% endfor %}

      To resolve: revert inventory target к state values OR delete+recreate the bucket manually.
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# --- PHASE A: Delete стейл buckets ---
- name: "[{{ dto_label_name }}] Phase A — Delete стейл buckets via weed shell"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.bucket.delete -name={{ item.name }}"
  loop: "{{ lookup('vars', _local_to_delete_buckets_key) }}"
  loop_control:
    label: "{{ item.name }}"
  run_once: true
  tags: [always]

# --- PHASE B: Create new buckets with owner ---
- name: "[{{ dto_label_name }}] Phase B — Create new buckets via weed shell (-owner=<owner>)"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.bucket.create -name={{ item.name }} -owner={{ item.owner }}"
  loop: "{{ lookup('vars', _local_to_create_buckets_key) }}"
  loop_control:
    label: "{{ item.name }} (owner={{ item.owner }})"
  run_once: true
  tags: [always]

# --- PHASE C: Apply immutable settings (replication + rack + dataCenter, all required) for new buckets ---
- name: "[{{ dto_label_name }}] Phase C — Apply fs.configure для new buckets (replication + rack + dataCenter)"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "fs.configure -locationPrefix=/buckets/{{ item.name }} -replication={{ item.replication }} -rack={{ item.rack }} -dataCenter={{ item.dataCenter }} -apply"
  loop: "{{ lookup('vars', _local_to_create_buckets_key) }}"
  loop_control:
    label: "{{ item.name }} → replication={{ item.replication }}, rack={{ item.rack }}, dataCenter={{ item.dataCenter }}"
  run_once: true
  tags: [always]

# --- PHASE D: Quota upsert (buckets with quota_size) ---
- name: "[{{ dto_label_name }}] Phase D — Quota upsert via weed shell (s3.bucket.quota -op=set)"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.bucket.quota -name={{ item.name }} -op=set -sizeMB={{ item._quota_size_mib }}"
  loop: "{{ lookup('vars', _local_quota_to_upsert_key) }}"
  loop_control:
    label: "{{ item.name }} ({{ item._quota_size_mib }}MiB)"
  run_once: true
  tags: [always]

# --- PHASE E: Quota delete (buckets without quota_size → unlimited) ---
- name: "[{{ dto_label_name }}] Phase E — Quota delete via weed shell (s3.bucket.quota -op=remove)"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.bucket.quota -name={{ item.name }} -op=remove"
  loop: "{{ lookup('vars', _local_quota_to_delete_key) }}"
  loop_control:
    label: "{{ item.name }}"
  run_once: true
  tags: [always]
