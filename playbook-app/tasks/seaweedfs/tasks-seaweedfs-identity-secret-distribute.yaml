# =============================================================================
# SeaweedFS Identity Secret Distribution — declarative identity-creds → extra Vault paths
# =============================================================================
# Reusable task include. Invoked from playbook with:
#   - include_tasks: tasks-seaweedfs-identity-secret-distribute.yaml
#     vars:
#       dto_label_name: "<caller-prefix>"
#
# v5 refactor: compute logic вынесена в filter_plugins/seaweedfs_sync.py.
# Ansible task оркеструет flow — vault-get, kubectl, vault-put/delete loops.
# Filters used (7):
#   - seaweedfs_parse_combined_json   — parse current Vault combined JSON
#   - seaweedfs_extract_creds_by_name — {name: {accessKey, secretKey}} dict
#   - seaweedfs_compute_distribution_pairs — pre-compute Phase A iteration list
#   - seaweedfs_compute_state_paths_to_delete — pre-compute Phase B iteration list
#   - seaweedfs_build_new_distribution_state — assemble ConfigMap state
#   - seaweedfs_validate_target_paths_unique — duplicate path check
#   - seaweedfs_validate_anonymous_no_extra_paths — anonymous-with-creds guard
#
# Convention: dto_label_name passed ONLY at playbook-level invocation;
# nested include_tasks (tasks-vault-*) inherit via Ansible variable scope.
#
# Reads inventory:
#   - seaweedfs_identities + _extra (from hosts-vars/seaweedfs-sync.yaml).
#     Schema: identity entry may have optional 'extra_vault_paths' — list of
#     FULL Vault paths (с mount engine prefix, e.g. "eso-secret/gitlab/s3" or
#     "secret/team-alpha/s3"). Identities без extra_vault_paths не distribute'ятся.
#   - seaweedfs_namespace, eso_vault_integration_seaweedfs.kv_engine_path,
#     seaweedfs_secret_s3_identities.vault_path (from hosts-vars/seaweedfs.yaml).
#
# Source of credentials: Vault combined JSON at
# {{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_secret_s3_identities.vault_path }}
# (field 'config', written by tasks-seaweedfs-user-sync). Fail-fast if missing.
#
# Per-path payload (fixed keys, HARD-CODED — не configurable):
#   username  — identity.name
#   accessKey — combined_json.identities[].credentials[0].accessKey
#   secretKey — combined_json.identities[].credentials[0].secretKey
#
# ConfigMap state: 'seaweedfs-sync-identity-distributions-state' в seaweedfs ns,
# хранит JSON list [{identity_name, vault_paths}, ...] — последний applied target.
# Diff vs state:
#   - Phase A: vault-put для каждой (identity, path) target pair (full replace,
#              idempotent — refreshes creds даже если path не изменился).
#   - Phase B: vault-delete для каждой (state path) которой нет в target paths.
#   - Phase C: update ConfigMap с new target snapshot.
#
# Constraints:
#   - Anonymous identity с непустым extra_vault_paths → fail (нет creds).
#   - Target paths must be unique across all identities.
#   - All target identities must exist в combined JSON.
# =============================================================================
- name: "[{{ dto_label_name }}] Assert dto_label_name provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
    fail_msg: >-
      tasks-seaweedfs-identity-secret-distribute: dto_label_name required (string, non-empty).
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
- name: "[{{ dto_label_name }}] Declare local fact keys"
  set_fact:
    _local_target_identities_key: "_local_target_identities"
    _local_has_target_key: "_local_has_target"
    _local_combined_json_key: "_local_combined_json"
    _local_combined_json_exists_key: "_local_combined_json_exists"
    _local_creds_by_name_key: "_local_creds_by_name"
    _local_current_state_key: "_local_current_state"
    _local_target_paths_set_key: "_local_target_paths_set"
    _local_new_state_key: "_local_new_state"
    _local_distribution_pairs_key: "_local_distribution_pairs"
    _local_deletes_key: "_local_deletes"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
- name: "[{{ dto_label_name }}] Compute target identities (with extra_vault_paths)"
  set_fact:
    "{{ _local_target_identities_key }}": >-
      {{ (seaweedfs_identities + (seaweedfs_identities_extra | default([])))
         | selectattr('extra_vault_paths', 'defined')
         | rejectattr('extra_vault_paths', 'equalto', []) | list }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
- name: "[{{ dto_label_name }}] Validate anonymous identity does not have extra_vault_paths via filter"
  assert:
    that:
      - "lookup('vars', _local_target_identities_key) | seaweedfs_validate_anonymous_no_extra_paths"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
- name: "[{{ dto_label_name }}] Compute has_target flag"
  set_fact:
    "{{ _local_has_target_key }}": "{{ (lookup('vars', _local_target_identities_key) | length) > 0 }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
- name: "[{{ dto_label_name }}] Get combined JSON from Vault (only if target non-empty)"
  include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-get.yaml"
  vars:
    dto_vault_get_path: "{{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_secret_s3_identities.vault_path }}"
    dto_vault_get_field: "config"
    dto_vault_get_res_fact_name: "{{ _local_combined_json_key }}"
    dto_vault_get_res_exists_fact_name: "{{ _local_combined_json_exists_key }}"
  when: lookup('vars', _local_has_target_key)
  tags: [always]
- name: "[{{ dto_label_name }}] Assert combined JSON exists if target non-empty"
  assert:
    that:
      - lookup('vars', _local_combined_json_exists_key)
    fail_msg: >-
      Vault combined JSON missing at path '{{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_secret_s3_identities.vault_path }}'.
      identity-distribute requires combined JSON (with identity credentials) to exist.
      Run 'ansible-playbook playbook-app/seaweedfs-install.yaml --tags user-sync' first.
  when: lookup('vars', _local_has_target_key)
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
- name: "[{{ dto_label_name }}] Build creds_by_name via filter (parse → extract)"
  set_fact:
    "{{ _local_creds_by_name_key }}": >-
      {{ (lookup('vars', _local_combined_json_key) | seaweedfs_parse_combined_json) | seaweedfs_extract_creds_by_name }}
  when: lookup('vars', _local_has_target_key)
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
- name: "[{{ dto_label_name }}] Assert all target identities exist in combined JSON"
  assert:
    that:
      - item.name in lookup('vars', _local_creds_by_name_key)
    fail_msg: >-
      Identity '{{ item.name }}' has extra_vault_paths но missing в Vault combined JSON ('{{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_secret_s3_identities.vault_path }}').
      Run 'ansible-playbook playbook-app/seaweedfs-install.yaml --tags user-sync' first.
  loop: "{{ lookup('vars', _local_target_identities_key) }}"
  loop_control:
    label: "{{ item.name }}"
  when: lookup('vars', _local_has_target_key)
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
- name: "[{{ dto_label_name }}] Compute target_paths_set (flatten all extra_vault_paths)"
  set_fact:
    "{{ _local_target_paths_set_key }}": >-
      {{ lookup('vars', _local_target_identities_key)
         | map(attribute='extra_vault_paths') | flatten | list }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
- name: "[{{ dto_label_name }}] Assert target paths unique via filter"
  assert:
    that:
      - "lookup('vars', _local_target_paths_set_key) | seaweedfs_validate_target_paths_unique"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
- name: "[{{ dto_label_name }}] Read current ConfigMap state (may not exist)"
  command: >-
    kubectl get configmap seaweedfs-sync-identity-distributions-state
    -n {{ seaweedfs_namespace }} -o jsonpath={.data.state}
  register: _local_current_state_raw_reg
  failed_when: false
  changed_when: false
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
- name: "[{{ dto_label_name }}] Parse current state (or empty list)"
  set_fact:
    "{{ _local_current_state_key }}": >-
      {{ _local_current_state_raw_reg.stdout | from_json
         if (_local_current_state_raw_reg.rc == 0 and _local_current_state_raw_reg.stdout | length > 0)
         else [] }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
- name: "[{{ dto_label_name }}] Build new_state list via filter"
  set_fact:
    "{{ _local_new_state_key }}": >-
      {{ lookup('vars', _local_target_identities_key) | seaweedfs_build_new_distribution_state }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
- name: "[{{ dto_label_name }}] Compute distribution pairs via filter (Phase A iteration list)"
  set_fact:
    "{{ _local_distribution_pairs_key }}": >-
      {{ lookup('vars', _local_target_identities_key)
         | seaweedfs_compute_distribution_pairs(lookup('vars', _local_creds_by_name_key) | default({})) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
- name: "[{{ dto_label_name }}] Compute state paths to delete via filter (Phase B iteration list)"
  set_fact:
    "{{ _local_deletes_key }}": >-
      {{ lookup('vars', _local_current_state_key)
         | seaweedfs_compute_state_paths_to_delete(lookup('vars', _local_target_paths_set_key)) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
# --- PHASE A: vault-put для каждой (identity, path) target pair ---
- name: "[{{ dto_label_name }}] Phase A — vault-put для каждой (identity, path) target pair"
  include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-put.yaml"
  vars:
    dto_vault_put_path: "{{ item.path }}"
    dto_vault_put_data:
      username: "{{ item.name }}"
      accessKey: "{{ item.accessKey }}"
      secretKey: "{{ item.secretKey }}"
  loop: "{{ lookup('vars', _local_distribution_pairs_key) }}"
  loop_control:
    label: "{{ item.name }}: {{ item.path }}"
  tags: [always]
# --- PHASE B: vault-delete для каждой state path не в target paths ---
- name: "[{{ dto_label_name }}] Phase B — vault-delete для каждой state path не в target paths"
  include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-delete.yaml"
  vars:
    dto_vault_delete_path: "{{ item.path }}"
  loop: "{{ lookup('vars', _local_deletes_key) }}"
  loop_control:
    label: "{{ item.identity_name }}: {{ item.path }}"
  tags: [always]
# --- PHASE C: Update ConfigMap state с new target snapshot ---
- name: "[{{ dto_label_name }}] Phase C — Update ConfigMap state с new target snapshot"
  shell: |
    kubectl create configmap seaweedfs-sync-identity-distributions-state -n {{ seaweedfs_namespace }} \
      --from-literal=state='{{ lookup('vars', _local_new_state_key) | to_json }}' \
      --dry-run=client -o yaml | kubectl apply -f -
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
