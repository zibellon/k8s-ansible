# =============================================================================
# SeaweedFS Identity Secret Distribution — declarative identity-creds → extra Vault paths
# =============================================================================
# Reusable task include. Invoked from playbook with:
#   - include_tasks: tasks-seaweedfs-identity-secret-distribute.yaml
#     vars:
#       dto_label_name: "<caller-prefix>"
#
# v6 refactor: stateless filter API. Compute logic (parse vault + ConfigMap,
# validate, build pairs/deletes/state) — внутри 3 публичных Python функций
# (seaweedfs_distribute_paths_to_add / _delete / _new_state_json) из
# filter_plugins/seaweedfs_sync.py. Все validations (anonymous-no-extra-paths,
# paths-unique, creds-exist) внутри каждой compute функции — fail-fast.
# Ansible task оркеструет только I/O: vault-get, kubectl-get configmap,
# 3 compute calls, vault-put loop (Phase A), vault-delete loop (Phase B),
# kubectl apply ConfigMap (Phase C).
#
# Convention: dto_label_name passed ONLY at playbook-level invocation;
# nested include_tasks (tasks-vault-put, tasks-vault-delete) inherit via Ansible scope.
#
# Reads inventory:
#   - seaweedfs_identities + _extra (from hosts-vars/seaweedfs-sync.yaml).
#     Schema: identity entry may have optional 'extra_vault_paths' — list of
#     FULL Vault paths (с mount engine prefix, e.g. "eso-secret/gitlab/s3" or
#     "secret/team-alpha/s3"). Identities без extra_vault_paths не distribute'ятся.
#   - seaweedfs_namespace, eso_vault_integration_seaweedfs.kv_engine_path,
#     seaweedfs_s3_config_vault_path/_field (from hosts-vars/seaweedfs.yaml).
#
# Source of credentials: Vault combined JSON at
# {{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_s3_config_vault_path }}
# (field from seaweedfs_s3_config_vault_field, written by tasks-seaweedfs-user-sync). Filter
# seaweedfs_distribute_paths_to_add fails fast if missing identity creds.
#
# Per-path payload (fixed keys, HARD-CODED — не configurable):
#   username  — identity.name
#   accessKey — combined_json.identities[].credentials[0].accessKey
#   secretKey — combined_json.identities[].credentials[0].secretKey
#
# ConfigMap state: 'seaweedfs-sync-identity-distributions-state' в seaweedfs ns,
# хранит JSON list [{identity_name, vault_paths}, ...] — последний applied target.
# Phases:
#   - Phase A: vault-put для каждой (identity, path) target pair (full replace, idempotent).
#   - Phase B: vault-delete для каждой state path не в target paths.
#   - Phase C: update ConfigMap с new target snapshot.
# =============================================================================
- name: "[{{ dto_label_name }}] Assert dto_label_name provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
    fail_msg: >-
      tasks-seaweedfs-identity-secret-distribute: dto_label_name required (string, non-empty).
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Declare local fact keys"
  set_fact:
    _local_target_identities_key: "_local_target_identities"
    _local_has_target_key: "_local_has_target"
    _local_combined_json_key: "_local_combined_json"
    _local_combined_json_exists_key: "_local_combined_json_exists"
    _local_configmap_raw_key: "_local_configmap_raw"
    _local_paths_to_add_key: "_local_paths_to_add"
    _local_paths_to_delete_key: "_local_paths_to_delete"
    _local_new_state_json_key: "_local_new_state_json"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute target identities (base + extra, full list)"
  set_fact:
    "{{ _local_target_identities_key }}": "{{ seaweedfs_identities + (seaweedfs_identities_extra | default([])) }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute has_target flag (any identity with extra_vault_paths)"
  set_fact:
    "{{ _local_has_target_key }}": >-
      {{ (lookup('vars', _local_target_identities_key)
          | selectattr('extra_vault_paths', 'defined')
          | rejectattr('extra_vault_paths', 'equalto', []) | list | length) > 0 }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Get combined JSON from Vault (only if target non-empty)"
  include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-get.yaml"
  vars:
    dto_vault_get_path: "{{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_s3_config_vault_path }}"
    dto_vault_get_field: "{{ seaweedfs_s3_config_vault_field }}"
    dto_vault_get_res_fact_name: "{{ _local_combined_json_key }}"
    dto_vault_get_res_exists_fact_name: "{{ _local_combined_json_exists_key }}"
  when: lookup('vars', _local_has_target_key)
  tags: [always]

- name: "[{{ dto_label_name }}] Read current ConfigMap state (may not exist)"
  command: >-
    kubectl get configmap seaweedfs-sync-identity-distributions-state
    -n {{ seaweedfs_namespace }} -o jsonpath={.data.state}
  register: _local_configmap_raw_reg
  failed_when: false
  changed_when: false
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Capture ConfigMap raw stdout (empty if missing)"
  set_fact:
    "{{ _local_configmap_raw_key }}": >-
      {{ _local_configmap_raw_reg.stdout
         if (_local_configmap_raw_reg.rc == 0 and _local_configmap_raw_reg.stdout | length > 0)
         else '' }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute paths_to_add via filter (Phase A iteration list)"
  set_fact:
    "{{ _local_paths_to_add_key }}": >-
      {{ lookup('vars', _local_combined_json_key) | default('')
         | seaweedfs_distribute_paths_to_add(
             lookup('vars', _local_target_identities_key),
             lookup('vars', _local_configmap_raw_key)
           ) }}
  when: lookup('vars', _local_has_target_key)
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute paths_to_delete via filter (Phase B iteration list)"
  set_fact:
    "{{ _local_paths_to_delete_key }}": >-
      {{ lookup('vars', _local_combined_json_key) | default('')
         | seaweedfs_distribute_paths_to_delete(
             lookup('vars', _local_target_identities_key),
             lookup('vars', _local_configmap_raw_key)
           ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute new ConfigMap state JSON via filter (Phase C input)"
  set_fact:
    "{{ _local_new_state_json_key }}": >-
      {{ lookup('vars', _local_combined_json_key) | default('')
         | seaweedfs_distribute_new_state_json(
             lookup('vars', _local_target_identities_key),
             lookup('vars', _local_configmap_raw_key)
           ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# --- PHASE A: vault-put для каждой (identity, path) target pair ---
- name: "[{{ dto_label_name }}] Phase A — vault-put для каждой (identity, path) target pair"
  include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-put.yaml"
  vars:
    dto_vault_put_path: "{{ item.path }}"
    dto_vault_put_data:
      username: "{{ item.name }}"
      accessKey: "{{ item.accessKey }}"
      secretKey: "{{ item.secretKey }}"
  loop: "{{ lookup('vars', _local_paths_to_add_key) | default([]) }}"
  loop_control:
    label: "{{ item.name }}: {{ item.path }}"
  tags: [always]

# --- PHASE B: vault-delete для каждой state path не в target paths ---
- name: "[{{ dto_label_name }}] Phase B — vault-delete для каждой state path не в target paths"
  include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-delete.yaml"
  vars:
    dto_vault_delete_path: "{{ item.path }}"
  loop: "{{ lookup('vars', _local_paths_to_delete_key) }}"
  loop_control:
    label: "{{ item.identity_name }}: {{ item.path }}"
  tags: [always]

# --- PHASE C: Update ConfigMap state с new target snapshot ---
- name: "[{{ dto_label_name }}] Phase C — Update ConfigMap state с new target snapshot"
  shell: |
    kubectl create configmap seaweedfs-sync-identity-distributions-state -n {{ seaweedfs_namespace }} \
      --from-literal=state='{{ lookup('vars', _local_new_state_json_key) }}' \
      --dry-run=client -o yaml | kubectl apply -f -
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
