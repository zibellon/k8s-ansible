# =============================================================================
# SeaweedFS Identity Secret Distribution — declarative identity-creds → extra Vault paths
# =============================================================================
# Reusable task include. Invoked from playbook with:
#   - include_tasks: tasks-seaweedfs-identity-secret-distribute.yaml
#     vars:
#       dto_label_name: "<caller-prefix>"
#
# Stateless filter API. Compute logic (parse vault + ConfigMap, validate, build
# pairs/deletes) — внутри Python функций из filter_plugins/seaweedfs_sync.py:
# seaweedfs_distribute_paths_to_add / _delete (Vault путь diff) + write helpers
# seaweedfs_state_configmaps_to_combined_json (read reconstruction),
# seaweedfs_distribute_configmaps_to_apply / seaweedfs_state_configmaps_to_delete
# (per-item state CM + prune stale). Все validations (anonymous-no-extra-paths,
# paths-unique, creds-exist) внутри compute функций — fail-fast. Ansible task
# оркеструет только I/O: vault-get, kubectl-get configmaps, compute calls,
# vault-put loop (Phase A), vault-delete loop (Phase B), kubectl apply/delete
# per-item ConfigMaps (Phase C/D).
#
# Convention: dto_label_name passed ONLY at playbook-level invocation;
# nested include_tasks (tasks-vault-put, tasks-vault-delete) inherit via Ansible scope.
#
# Reads inventory:
#   - seaweedfs_identities + _extra (from hosts-vars/seaweedfs-sync.yaml).
#     Schema: identity entry may have optional 'extra_vault_paths' — list of
#     FULL Vault paths (с mount engine prefix, e.g. "eso-secret/gitlab/s3" or
#     "secret/team-alpha/s3"). Identities без extra_vault_paths не distribute'ятся.
#   - seaweedfs_namespace, eso_vault_integration_seaweedfs.kv_engine_path,
#     seaweedfs_s3_config_vault_path/_field (from hosts-vars/seaweedfs.yaml).
#
# Source of credentials: Vault combined JSON at
# {{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_s3_config_vault_path }}
# (field from seaweedfs_s3_config_vault_field, written by tasks-seaweedfs-user-sync). Filter
# seaweedfs_distribute_paths_to_add fails fast if missing identity creds.
#
# Per-path payload (fixed keys, HARD-CODED — не configurable):
#   username  — identity.name
#   accessKey — combined_json.identities[].credentials[0].accessKey
#   secretKey — combined_json.identities[].credentials[0].secretKey
#
# State (v15 — per-item ConfigMaps): «последний applied target» хранится НЕ в одном
# ConfigMap, а в наборе per-item ConfigMap'ов 'seaweedfs-sync-identity-distributions-<identity>'
# (по одному на identity с extra_vault_paths), сгруппированных label'ом
# 'seaweedfs-sync-state: identity-distributions' (избегаем etcd per-object size limit).
# Каждый хранит JSON {identity_name, vault_paths}. Чтение всей группы — одним
# 'kubectl get cm -l seaweedfs-sync-state=identity-distributions -o json'; reconstruction
# в combined-array JSON кормит diff-фильтр seaweedfs_distribute_paths_to_delete без изменений.
# Read безусловный (нужен для prune CM'ов identity, потерявших extra_vault_paths).
# Phases:
#   - Phase A: vault-put для каждой (identity, path) target pair (full replace, idempotent).
#   - Phase B: vault-delete для каждой state path не в target paths.
#   - Phase C: apply per-item state ConfigMaps для target identities (с extra_vault_paths).
#   - Phase D: delete стейл per-item state ConfigMaps (identity дропнула extra_vault_paths).
# =============================================================================
- name: "[{{ dto_label_name }}] Assert dto_label_name provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
    fail_msg: >-
      tasks-seaweedfs-identity-secret-distribute: dto_label_name required (string, non-empty).
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Declare local fact keys"
  set_fact:
    _local_target_identities_key: "_local_target_identities"
    _local_has_target_key: "_local_has_target"
    _local_combined_json_key: "_local_combined_json"
    _local_combined_json_exists_key: "_local_combined_json_exists"
    _local_configmap_raw_key: "_local_configmap_raw"
    _local_paths_to_add_key: "_local_paths_to_add"
    _local_paths_to_delete_key: "_local_paths_to_delete"
    _local_configmaps_to_apply_key: "_local_configmaps_to_apply"
    _local_configmaps_to_delete_key: "_local_configmaps_to_delete"
    _local_combined_json_violations_key: "_local_combined_json_violations"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute target identities (base + extra, full list)"
  set_fact:
    "{{ _local_target_identities_key }}": "{{ seaweedfs_identities + (seaweedfs_identities_extra | default([])) }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute has_target flag (any identity with extra_vault_paths)"
  set_fact:
    "{{ _local_has_target_key }}": >-
      {{ (lookup('vars', _local_target_identities_key)
          | selectattr('extra_vault_paths', 'defined')
          | rejectattr('extra_vault_paths', 'equalto', []) | list | length) > 0 }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Get combined JSON from Vault (only if target non-empty)"
  include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-get.yaml"
  vars:
    dto_vault_get_path: "{{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_s3_config_vault_path }}"
    dto_vault_get_field: "{{ seaweedfs_s3_config_vault_field }}"
    dto_vault_get_res_fact_name: "{{ _local_combined_json_key }}"
    dto_vault_get_res_exists_fact_name: "{{ _local_combined_json_exists_key }}"
  when: lookup('vars', _local_has_target_key)
  tags: [always]

- name: "[{{ dto_label_name }}] Compute combined JSON violations (malformed key-store guard)"
  set_fact:
    "{{ _local_combined_json_violations_key }}": >-
      {{ lookup('vars', _local_combined_json_key) | seaweedfs_combined_json_violations }}
  when: lookup('vars', _local_has_target_key)
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Assert combined JSON is valid (refuse stale-creds distribution)"
  assert:
    that:
      - lookup('vars', _local_combined_json_violations_key) | length == 0
    fail_msg: |
      ERROR: Vault combined JSON key-store at {{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_s3_config_vault_path }} (field {{ seaweedfs_s3_config_vault_field }}) is malformed.
      Refusing to distribute — would propagate stale/empty credentials. Run user-sync first (or fix/delete the Vault path).
      Violations:
      {% for v in lookup('vars', _local_combined_json_violations_key) %}
        - {{ v }}
      {% endfor %}
  when: lookup('vars', _local_has_target_key)
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Read current state ConfigMaps (labeled, may be none)"
  command: >-
    kubectl get configmap -n {{ seaweedfs_namespace }}
    -l seaweedfs-sync-state=identity-distributions -o json
  register: _local_configmaplist_reg
  changed_when: false
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Reconstruct combined state from labeled ConfigMaps"
  set_fact:
    "{{ _local_configmap_raw_key }}": >-
      {{ _local_configmaplist_reg.stdout | seaweedfs_state_configmaps_to_combined_json }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute paths_to_add via filter (Phase A iteration list)"
  set_fact:
    "{{ _local_paths_to_add_key }}": >-
      {{ lookup('vars', _local_combined_json_key) | default('')
         | seaweedfs_distribute_paths_to_add(
             lookup('vars', _local_target_identities_key),
             lookup('vars', _local_configmap_raw_key)
           ) }}
  when: lookup('vars', _local_has_target_key)
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute paths_to_delete via filter (Phase B iteration list)"
  set_fact:
    "{{ _local_paths_to_delete_key }}": >-
      {{ lookup('vars', _local_combined_json_key) | default('')
         | seaweedfs_distribute_paths_to_delete(
             lookup('vars', _local_target_identities_key),
             lookup('vars', _local_configmap_raw_key)
           ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute per-item state ConfigMaps to apply"
  set_fact:
    "{{ _local_configmaps_to_apply_key }}": >-
      {{ lookup('vars', _local_target_identities_key) | seaweedfs_distribute_configmaps_to_apply }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute stale state ConfigMaps to delete"
  set_fact:
    "{{ _local_configmaps_to_delete_key }}": >-
      {{ _local_configmaplist_reg.stdout | seaweedfs_state_configmaps_to_delete(
           lookup('vars', _local_configmaps_to_apply_key) | map(attribute='name') | list
         ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# --- PHASE A: vault-put для каждой (identity, path) target pair ---
- name: "[{{ dto_label_name }}] Phase A — vault-put для каждой (identity, path) target pair"
  include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-put.yaml"
  vars:
    dto_vault_put_path: "{{ item.path }}"
    dto_vault_put_data:
      username: "{{ item.name }}"
      accessKey: "{{ item.accessKey }}"
      secretKey: "{{ item.secretKey }}"
  loop: "{{ lookup('vars', _local_paths_to_add_key) | default([]) }}"
  loop_control:
    label: "{{ item.name }}: {{ item.path }}"
  tags: [always]

# --- PHASE B: vault-delete для каждой state path не в target paths ---
- name: "[{{ dto_label_name }}] Phase B — vault-delete для каждой state path не в target paths"
  include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-delete.yaml"
  vars:
    dto_vault_delete_path: "{{ item.path }}"
  loop: "{{ lookup('vars', _local_paths_to_delete_key) }}"
  loop_control:
    label: "{{ item.identity_name }}: {{ item.path }}"
  tags: [always]

# --- PHASE C: Apply per-item state ConfigMaps (labeled seaweedfs-sync-state=identity-distributions) ---
- name: "[{{ dto_label_name }}] Phase C — Apply per-item state ConfigMaps"
  shell: |
    kubectl create configmap {{ item.name }} -n {{ seaweedfs_namespace }} \
      --from-literal=state='{{ item.content }}' \
      --dry-run=client -o yaml | \
      kubectl label --local -f - -o yaml seaweedfs-sync-state=identity-distributions | \
      kubectl apply -f -
  loop: "{{ lookup('vars', _local_configmaps_to_apply_key) }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# --- PHASE D: Delete стейл per-item state ConfigMaps (identity dropped extra_vault_paths) ---
- name: "[{{ dto_label_name }}] Phase D — Delete стейл state ConfigMaps"
  command: >-
    kubectl delete configmap {{ item }} -n {{ seaweedfs_namespace }} --ignore-not-found
  loop: "{{ lookup('vars', _local_configmaps_to_delete_key) }}"
  loop_control:
    label: "{{ item }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
