# =============================================================================
# SeaweedFS Bucket Policy Sync — declarative bucket policies via aws s3api
# =============================================================================
# Reusable task include. Invoked from playbook with:
#   - include_tasks: tasks-seaweedfs-bucket-policy-sync.yaml
#     vars:
#       dto_label_name: "<caller-prefix>"
#
# Convention: dto_label_name passed ONLY at playbook-level invocation;
# nested include_tasks (tasks-k8s-secret-get) inherits dto_label_name
# via Ansible variable scope.
#
# Reads inventory:
#   - seaweedfs_sync_bucket_policies + _extra (from hosts-vars/seaweedfs-sync.yaml)
#   - seaweedfs_secret_s3_identities.body.target.name (from hosts-vars/seaweedfs.yaml)
#   - seaweedfs_namespace (from hosts-vars/seaweedfs.yaml)
#
# Self-contained admin creds fetch: reads K8s Secret seaweedfs-s3-identities
# (materialized by ESO), extracts admin AK+SK, passes as env vars to aws CLI.
# Works standalone after seaweedfs-install.yaml + user-sync.
#
# Logic:
#   1. Compute target policies = seaweedfs_sync_bucket_policies + _extra.
#   2. Validate Principal format (SeaweedFS 4.29 non-AWS limitation —
#      flat string or array, not dict).
#   3. Fetch K8s Secret seaweedfs-s3-identities (admin creds source).
#   4. Extract admin AK+SK from Secret JSON.
#   5. Read current ConfigMap state seaweedfs-sync-bucket-policies-state.
#   6. Parse current state JSON (or empty list).
#   7. Compute diff: to_apply (all target) / to_delete (state - target by bucket).
#   8. Apply via aws s3api put-bucket-policy (full replacement, env admin creds).
#   9. Delete via aws s3api delete-bucket-policy.
#   10. Apply ConfigMap with new state JSON.
# =============================================================================

- name: "[{{ dto_label_name }}] Assert dto_label_name provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
    fail_msg: >-
      tasks-seaweedfs-bucket-policy-sync: dto_label_name required (string, non-empty).
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Declare local fact keys"
  set_fact:
    _local_target_policies_key: "_local_target_policies"
    _local_policies_secret_json_key: "_local_policies_secret_json"
    _local_policies_secret_exists_key: "_local_policies_secret_exists"
    _local_policies_admin_creds_key: "_local_policies_admin_creds"
    _local_current_policies_state_key: "_local_current_policies_state"
    _local_policies_to_apply_key: "_local_policies_to_apply"
    _local_policies_to_delete_key: "_local_policies_to_delete"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute target bucket policies list"
  set_fact:
    "{{ _local_target_policies_key }}": "{{ seaweedfs_sync_bucket_policies + (seaweedfs_sync_bucket_policies_extra | default([])) }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Validate Principal format (SeaweedFS 4.29 limitation)"
  assert:
    that:
      - item.1.Principal is not mapping
    fail_msg: >-
      Bucket policy for '{{ item.0.bucket }}' has Statement with Principal of unsupported
      dict form ({{ item.1.Principal }}). SeaweedFS 4.29 (policy_engine/types.go:55-77)
      supports only flat string or array. Use:
        Principal "arn:aws:iam::*:user/<name>" (single)
        Principal ["arn:aws:iam::*:user/u1", "arn:aws:iam::*:user/u2"] (multiple)
        Principal "*" (anonymous; requires anonymous identity)
  loop: "{{ lookup('vars', _local_target_policies_key) | subelements('policy.Statement') }}"
  loop_control:
    label: "{{ item.0.bucket }}: {{ item.1.Sid | default('?') }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Get K8s Secret with current admin creds"
  include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-secret-get.yaml"
  vars:
    dto_secret_namespace: "{{ seaweedfs_namespace }}"
    dto_secret_name: "{{ seaweedfs_secret_s3_identities.body.target.name }}"
    dto_secret_field: "seaweedfs_s3_config"
    dto_secret_res_fact_name: "{{ _local_policies_secret_json_key }}"
    dto_secret_res_exists_fact_name: "{{ _local_policies_secret_exists_key }}"
  tags: [always]

- name: "[{{ dto_label_name }}] Extract admin creds from Secret JSON"
  set_fact:
    "{{ _local_policies_admin_creds_key }}": >-
      {{
        ((lookup('vars', _local_policies_secret_json_key) | from_json).identities
         | selectattr('name', 'equalto', 'admin') | first).credentials | first
      }}
  when: lookup('vars', _local_policies_secret_exists_key)
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Read current ConfigMap state (may not exist)"
  command: >-
    kubectl get configmap seaweedfs-sync-bucket-policies-state
    -n {{ seaweedfs_namespace }}
    -o jsonpath={.data.state}
  register: _local_current_policies_state_raw_reg
  failed_when: false
  changed_when: false
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Parse current state (or empty list)"
  set_fact:
    "{{ _local_current_policies_state_key }}": >-
      {{ _local_current_policies_state_raw_reg.stdout | from_json
         if (_local_current_policies_state_raw_reg.rc == 0 and _local_current_policies_state_raw_reg.stdout | length > 0)
         else [] }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute diff (to_apply / to_delete)"
  set_fact:
    "{{ _local_policies_to_apply_key }}": "{{ lookup('vars', _local_target_policies_key) }}"
    "{{ _local_policies_to_delete_key }}": >-
      {{ lookup('vars', _local_current_policies_state_key)
         | rejectattr('bucket', 'in', lookup('vars', _local_target_policies_key) | map(attribute='bucket') | list)
         | list }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Apply bucket policies via aws s3api"
  shell: |
    kubectl exec -n {{ seaweedfs_namespace }} deploy/seaweedfs-s3 -- \
      env AWS_ACCESS_KEY_ID='{{ lookup('vars', _local_policies_admin_creds_key).accessKey }}' \
          AWS_SECRET_ACCESS_KEY='{{ lookup('vars', _local_policies_admin_creds_key).secretKey }}' \
      aws --endpoint-url http://localhost:8333 s3api put-bucket-policy \
        --bucket {{ item.bucket }} \
        --policy '{{ item.policy | to_json }}'
  loop: "{{ lookup('vars', _local_policies_to_apply_key) }}"
  loop_control:
    label: "{{ item.bucket }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Delete policies for removed buckets"
  shell: |
    kubectl exec -n {{ seaweedfs_namespace }} deploy/seaweedfs-s3 -- \
      env AWS_ACCESS_KEY_ID='{{ lookup('vars', _local_policies_admin_creds_key).accessKey }}' \
          AWS_SECRET_ACCESS_KEY='{{ lookup('vars', _local_policies_admin_creds_key).secretKey }}' \
      aws --endpoint-url http://localhost:8333 s3api delete-bucket-policy \
        --bucket {{ item.bucket }}
  loop: "{{ lookup('vars', _local_policies_to_delete_key) }}"
  loop_control:
    label: "{{ item.bucket }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Apply ConfigMap with new state"
  shell: |
    kubectl create configmap seaweedfs-sync-bucket-policies-state \
      -n {{ seaweedfs_namespace }} \
      --from-literal=state='{{ lookup('vars', _local_target_policies_key) | to_json }}' \
      --dry-run=client -o yaml | kubectl apply -f -
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
