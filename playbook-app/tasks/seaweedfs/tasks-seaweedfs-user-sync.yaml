# =============================================================================
# SeaweedFS User Sync (Layer 1) — declarative identity sync (Vault key-store + filer apply)
# =============================================================================
# Reusable task include. Invoked from playbook with:
#   - include_tasks: tasks-seaweedfs-user-sync.yaml
#     vars:
#       dto_label_name: "<caller-prefix>"
#
# v14 filer-driven IAM. Identities live in two places:
#   1. Vault combined JSON key-store (/seaweedfs/s3-config/all, field 'config') —
#      source-of-truth для credentials (AK/SK). Written here (when changed).
#   2. filer /etc/iam/identities/<n>.json — applied via weed shell s3.configure
#      -apply (live-reload, без рестарта S3). Access model: actions=[] +
#      policy_names=[<p>] (managed policy attached, identity-based).
#
# NO ESO/K8s-Secret/rollout-restart for identities (combined JSON НЕ монтируется
# в S3 — bootstrap empty-config это отдельный ESO secret). Identities применяются
# в живой filer через weed shell.
#
# Stateless filter API: seaweedfs_user_sync_full (combined JSON build incl.
# policy_names) + seaweedfs_identities_to_delete (стейл names).
#
# Convention: dto_label_name passed ONLY at playbook-level invocation;
# nested include_tasks inherit via Ansible variable scope.
#
# Reads inventory:
#   - seaweedfs_identities + _extra, seaweedfs_sync_{access,secret}_key_{length,charset}
#     (from hosts-vars/seaweedfs-sync.yaml).
#   - seaweedfs_s3_config_vault_path / _field, eso_vault_integration_seaweedfs,
#     seaweedfs_namespace (from hosts-vars/seaweedfs.yaml).
#
# Logic:
#   1. Get current combined JSON from Vault (may not exist on greenfield).
#   2. Compute target = inventory base + extra.
#   3. Admin safety warning if no Admin actions in target.
#   4. Compute new combined JSON via filter (parse, diff, generate AK/SK для new
#      non-anonymous, build incl. policy_names, serialize).
#   5. Compute identities_to_delete (in Vault, not in target).
#   6. identities_changed = current missing OR current_json != new_json.
#   7. When changed: vault-put new combined JSON (key-store update).
#   8. Phase A: weed shell s3.configure -delete стейл identities (filer).
#   9. Phase B: weed shell s3.configure -apply target identities (filer; cred flags
#      only when present → anonymous with a managed policy is applied; identities
#      granting nothing skipped). actions → -actions, policy_names → -policies.
# =============================================================================
- name: "[{{ dto_label_name }}] Assert dto_label_name provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
    fail_msg: >-
      tasks-seaweedfs-user-sync: dto_label_name required (string, non-empty).
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Declare local fact keys"
  set_fact:
    _local_combined_json_key: "_local_combined_json"
    _local_combined_json_exists_key: "_local_combined_json_exists"
    _local_target_identities_key: "_local_target_identities"
    _local_new_combined_json_key: "_local_new_combined_json"
    _local_identities_changed_key: "_local_identities_changed"
    _local_identities_put_data_key: "_local_identities_put_data"
    _local_identities_to_delete_key: "_local_identities_to_delete"
    _local_combined_json_violations_key: "_local_combined_json_violations"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Get current combined JSON from Vault"
  include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-get.yaml"
  vars:
    dto_vault_get_path: "{{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_s3_config_vault_path }}"
    dto_vault_get_field: "{{ seaweedfs_s3_config_vault_field }}"
    dto_vault_get_res_fact_name: "{{ _local_combined_json_key }}"
    dto_vault_get_res_exists_fact_name: "{{ _local_combined_json_exists_key }}"
  tags: [always]

- name: "[{{ dto_label_name }}] Compute combined JSON violations (malformed key-store guard)"
  set_fact:
    "{{ _local_combined_json_violations_key }}": >-
      {{ lookup('vars', _local_combined_json_key) | seaweedfs_combined_json_violations }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Assert combined JSON is valid (refuse silent credential rotation)"
  assert:
    that:
      - lookup('vars', _local_combined_json_violations_key) | length == 0
    fail_msg: |
      ERROR: Vault combined JSON key-store at {{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_s3_config_vault_path }} (field {{ seaweedfs_s3_config_vault_field }}) is malformed.
      Refusing to proceed — treating it as empty would silently re-create ALL identities with NEW credentials (rotating every consumer's S3 creds).
      Violations:
      {% for v in lookup('vars', _local_combined_json_violations_key) %}
        - {{ v }}
      {% endfor %}
      To resolve: fix or delete the Vault path, then re-run.
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute target identities (base + extra)"
  set_fact:
    "{{ _local_target_identities_key }}": "{{ seaweedfs_identities + (seaweedfs_identities_extra | default([])) }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Admin safety warning (no actions=[Admin])"
  debug:
    msg: |
      WARNING: target identities does not contain any entry with actions=['Admin'].
      This will lock out admin (full) access to SeaweedFS S3 API once applied to the filer.
      If intentional, ignore. Otherwise add admin to seaweedfs_identities (base).
  when: >-
    (lookup('vars', _local_target_identities_key)
     | selectattr('actions', 'contains', 'Admin') | list | length) == 0
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute new combined JSON via filter (parse + diff + generate + build + serialize)"
  set_fact:
    "{{ _local_new_combined_json_key }}": >-
      {{ lookup('vars', _local_combined_json_key)
         | seaweedfs_user_sync_full(
             lookup('vars', _local_target_identities_key),
             access_key_length=seaweedfs_sync_access_key_length,
             secret_key_length=seaweedfs_sync_secret_key_length,
             access_key_charset=seaweedfs_sync_access_key_charset,
             secret_key_charset=seaweedfs_sync_secret_key_charset
           ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute identities_to_delete via filter (in Vault, not in target)"
  set_fact:
    "{{ _local_identities_to_delete_key }}": >-
      {{ lookup('vars', _local_combined_json_key)
         | seaweedfs_identities_to_delete(lookup('vars', _local_target_identities_key)) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Determine if identities changed (compare JSON strings)"
  set_fact:
    "{{ _local_identities_changed_key }}": >-
      {{ (not lookup('vars', _local_combined_json_exists_key))
         or (lookup('vars', _local_combined_json_key) != lookup('vars', _local_new_combined_json_key)) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Build Vault put data dict"
  set_fact:
    "{{ _local_identities_put_data_key }}": >-
      {{ {seaweedfs_s3_config_vault_field: lookup('vars', _local_new_combined_json_key)} }}
  when: lookup('vars', _local_identities_changed_key)
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Store new combined JSON in Vault (key-store update, when changed)"
  include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-put.yaml"
  vars:
    dto_vault_put_path: "{{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_s3_config_vault_path }}"
    dto_vault_put_data: "{{ lookup('vars', _local_identities_put_data_key) }}"
  when: lookup('vars', _local_identities_changed_key)
  tags: [always]

# --- PHASE A: Delete стейл identities from filer (in Vault, not in target) ---
- name: "[{{ dto_label_name }}] Phase A — Delete стейл identities via weed shell s3.configure -delete"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.configure -user={{ item }} -delete -apply"
  loop: "{{ lookup('vars', _local_identities_to_delete_key) }}"
  loop_control:
    label: "{{ item }}"
  run_once: true
  tags: [always]

# --- PHASE B: Apply target identities to filer (put-all from new combined JSON; live-reload) ---
# Apply each identity that grants something (creds OR actions OR policy_names).
# Credential flags are emitted only when present, so anonymous (empty creds) WITH a
# managed policy IS applied — s3.configure does not require creds for the reserved
# 'anonymous' identity (sources/seaweedfs/weed/shell/command_s3_configure.go:222).
# actions → -actions; policy_names → -policies (identity-based access).
- name: "[{{ dto_label_name }}] Phase B — Apply target identities via weed shell s3.configure -apply"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.configure -user={{ item.name }}{% if item.credentials[0].accessKey | length > 0 %} -access_key={{ item.credentials[0].accessKey }} -secret_key={{ item.credentials[0].secretKey }}{% endif %}{% if item.actions %} -actions={{ item.actions | join(',') }}{% endif %}{% if item.policy_names %} -policies={{ item.policy_names | join(',') }}{% endif %} -apply"
  loop: "{{ (lookup('vars', _local_new_combined_json_key) | from_json).identities }}"
  loop_control:
    label: "{{ item.name }}"
  when: (item.credentials[0].accessKey | length > 0) or (item.actions | length > 0) or (item.policy_names | length > 0)
  run_once: true
  tags: [always]
