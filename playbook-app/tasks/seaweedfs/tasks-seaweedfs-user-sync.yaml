# =============================================================================
# SeaweedFS User Sync (Layer 1) — declarative identity sync (filer as source of truth)
# =============================================================================
# Reusable task include. Invoked from playbook with:
#   - include_tasks: tasks-seaweedfs-user-sync.yaml
#     vars:
#       dto_label_name: "<caller-prefix>"
#
# v18 filer-driven IAM. Identities live ONLY in the filer (/etc/iam/identities/<n>.json),
# applied via weed shell s3.configure -apply (live-reload, без рестарта S3). Filer = source
# of truth (нет Vault key-store). Access model: actions=[] + policy_names=[<p>] (managed
# policy attached, identity-based). NO ESO/K8s-Secret/rollout-restart for identities.
#
# v20: per-key. Каждая названная identity объявляет keys[] с operator-chosen access_key(s);
# secret_key генерится sync'ом per key; ключи НЕ ротируются (access_key уже в filer не
# re-apply'ится — иначе перезапись секрета, command_s3_configure.go). Фильтры в
# filter_plugins/seaweedfs_user.py (split из монолита). s3.configure -apply АДДИТИВЕН
# (addUniqueToSlice) — снятие grant'ов / ключей через отдельный -delete. Read-once → 6
# focused-фильтров вызываются ОТДЕЛЬНО, последовательно (delete → create → grant → revoke
# → keys-add → keys-delete). Лог-подавление не используется — тест-фаза, печать s3.configure
# (с plaintext secretKey) в консоль ОК.
#
# Stateless filter API (signature: s3configure_raw | filter(target_identities)):
#   seaweedfs_identities_to_delete — filer-identity не в target → bare -delete (whole id).
#   seaweedfs_identities_to_create — target не в filer → create keys[0] + gen secret_key
#                                    (anonymous → пусто) + full actions/policy_names.
#   seaweedfs_keys_to_add          — inventory access_key не в filer → append credential
#                                    (brand-new identity: keys[1:]; gen secret_key). No-rotation.
#   seaweedfs_keys_to_delete       — filer access_key не в target (identity kept) → -access_key
#                                    -delete (single credential, identity survives).
#   seaweedfs_identities_to_grant  — existing: target-grants отсутствующие в filer (add-delta);
#                                    только entries с >=1 непустым списком.
#   seaweedfs_identities_to_revoke — existing: filer-grants отсутствующие в target (remove-delta);
#                                    только entries с >=1 непустым списком (bare-delete guard).
#
# Convention: dto_label_name passed ONLY at playbook-level invocation;
# nested include_tasks inherit via Ansible variable scope.
#
# Reads inventory:
#   - seaweedfs_identities + _extra, seaweedfs_sync_secret_key_{length,charset}
#     (from hosts-vars/seaweedfs-sync.yaml).
#   - seaweedfs_namespace (from hosts-vars/seaweedfs.yaml).
#
# Sync flow (1 read + 6 resource loops):
#   READ. s3.configure (live filer) → capture stdout.
#   A. Delete стейл identities (filer, not in target): s3.configure -user=X -delete -apply (bare).
#   B. Create new identities with keys[0] (target, not in filer): s3.configure -user=X
#      [-access_key -secret_key][-actions][-policies] -apply.
#   C. Grant (existing, add-delta): s3.configure -user=X [-actions=csv][-policies=csv] -apply.
#   D. Revoke (existing, remove-delta): s3.configure -user=X [-policies=csv][-actions=csv]
#      -delete -apply — NEVER a bare -delete (filter + when guard).
#   E. Keys-add (inventory access_key not in filer; keys[1:] of new + extra keys of existing):
#      s3.configure -user=X -access_key=AK -secret_key=<gen> -apply (append credential).
#   F. Keys-delete (filer access_key not in target, identity kept): s3.configure -user=X
#      -access_key=AK -delete -apply (removes ONLY that credential).
# =============================================================================

- name: "[{{ dto_label_name }}] Assert dto_label_name provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
    fail_msg: >-
      tasks-seaweedfs-user-sync: dto_label_name required (string, non-empty).
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Declare local fact keys"
  set_fact:
    _local_target_identities_key: "_local_target_identities"
    _local_s3configure_raw_key: "_local_s3configure_raw"
    _local_identities_to_delete_key: "_local_identities_to_delete"
    _local_identities_to_create_key: "_local_identities_to_create"
    _local_identities_to_grant_key: "_local_identities_to_grant"
    _local_identities_to_revoke_key: "_local_identities_to_revoke"
    _local_keys_to_add_key: "_local_keys_to_add"
    _local_keys_to_delete_key: "_local_keys_to_delete"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute target identities (base + extra)"
  set_fact:
    "{{ _local_target_identities_key }}": "{{ seaweedfs_identities + (seaweedfs_identities_extra | default([])) }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Admin safety warning (no actions=[Admin])"
  debug:
    msg: |
      WARNING: target identities does not contain any entry with actions=['Admin'].
      This will lock out admin (full) access to SeaweedFS S3 API once applied to the filer.
      If intentional, ignore. Otherwise add admin to seaweedfs_identities (base).
  when: >-
    (lookup('vars', _local_target_identities_key)
     | selectattr('actions', 'contains', 'Admin') | list | length) == 0
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# --- READ: current identities from the live filer (s3.configure) ---
- name: "[{{ dto_label_name }}] Read current identities from filer (s3.configure)"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.configure"
    dto_weed_capture_fact: "{{ _local_s3configure_raw_key }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute identities_to_delete via filter"
  set_fact:
    "{{ _local_identities_to_delete_key }}": >-
      {{ lookup('vars', _local_s3configure_raw_key)
         | seaweedfs_identities_to_delete(lookup('vars', _local_target_identities_key)) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute identities_to_create via filter (keys[0] + gen secret for new)"
  set_fact:
    "{{ _local_identities_to_create_key }}": >-
      {{ lookup('vars', _local_s3configure_raw_key)
         | seaweedfs_identities_to_create(
             lookup('vars', _local_target_identities_key),
             secret_key_length=seaweedfs_sync_secret_key_length,
             secret_key_charset=seaweedfs_sync_secret_key_charset
           ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute identities_to_grant via filter (existing add-delta)"
  set_fact:
    "{{ _local_identities_to_grant_key }}": >-
      {{ lookup('vars', _local_s3configure_raw_key)
         | seaweedfs_identities_to_grant(lookup('vars', _local_target_identities_key)) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute identities_to_revoke via filter (existing remove-delta)"
  set_fact:
    "{{ _local_identities_to_revoke_key }}": >-
      {{ lookup('vars', _local_s3configure_raw_key)
         | seaweedfs_identities_to_revoke(lookup('vars', _local_target_identities_key)) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute keys_to_add via filter (inventory keys not in filer; gen secret)"
  set_fact:
    "{{ _local_keys_to_add_key }}": >-
      {{ lookup('vars', _local_s3configure_raw_key)
         | seaweedfs_keys_to_add(
             lookup('vars', _local_target_identities_key),
             secret_key_length=seaweedfs_sync_secret_key_length,
             secret_key_charset=seaweedfs_sync_secret_key_charset
           ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute keys_to_delete via filter (filer keys not in target)"
  set_fact:
    "{{ _local_keys_to_delete_key }}": >-
      {{ lookup('vars', _local_s3configure_raw_key)
         | seaweedfs_keys_to_delete(lookup('vars', _local_target_identities_key)) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# --- PHASE A: Delete стейл identities (filer, not in target) ---
# Bare -delete removes the WHOLE identity — correct here (these names absent from target).
- name: "[{{ dto_label_name }}] Phase A — Delete стейл identities via weed shell"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.configure -user={{ item }} -delete -apply"
  loop: "{{ lookup('vars', _local_identities_to_delete_key) }}"
  loop_control:
    label: "{{ item }}"
  run_once: true
  tags: [always]

# --- PHASE B: Create new identities (gen keys; anonymous → no creds) ---
- name: "[{{ dto_label_name }}] Phase B — Create new identities via weed shell s3.configure -apply"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.configure -user={{ item.name }}{% if item.accessKey | length > 0 %} -access_key={{ item.accessKey }} -secret_key={{ item.secretKey }}{% endif %}{% if item.actions %} -actions={{ item.actions | join(',') }}{% endif %}{% if item.policy_names %} -policies={{ item.policy_names | join(',') }}{% endif %} -apply"
  loop: "{{ lookup('vars', _local_identities_to_create_key) }}"
  loop_control:
    label: "{{ item.name }}"
  when: (item.accessKey | length > 0) or (item.actions | length > 0) or (item.policy_names | length > 0)
  run_once: true
  tags: [always]

# --- PHASE C: Grant (existing identities, add-delta; additive -apply) ---
- name: "[{{ dto_label_name }}] Phase C — Grant added actions/policies via weed shell s3.configure -apply"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.configure -user={{ item.name }}{% if item.actions_add %} -actions={{ item.actions_add | join(',') }}{% endif %}{% if item.policies_add %} -policies={{ item.policies_add | join(',') }}{% endif %} -apply"
  loop: "{{ lookup('vars', _local_identities_to_grant_key) }}"
  loop_control:
    label: "{{ item.name }}"
  when: (item.actions_add | length > 0) or (item.policies_add | length > 0)
  run_once: true
  tags: [always]

# --- PHASE D: Revoke (existing identities, remove-delta; -delete with scope, NEVER bare) ---
# s3.configure -delete + -policies/-actions removes ONLY those (removeFromSlice, idempotent).
# Filter returns only entries with >=1 non-empty list; when-guard prevents bare -delete
# (which would remove the whole identity).
- name: "[{{ dto_label_name }}] Phase D — Revoke filer-extra grants via weed shell s3.configure -delete"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.configure -user={{ item.name }}{% if item.policies_remove %} -policies={{ item.policies_remove | join(',') }}{% endif %}{% if item.actions_remove %} -actions={{ item.actions_remove | join(',') }}{% endif %} -delete -apply"
  loop: "{{ lookup('vars', _local_identities_to_revoke_key) }}"
  loop_control:
    label: "{{ item.name }}"
  when: (item.actions_remove | length > 0) or (item.policies_remove | length > 0)
  run_once: true
  tags: [always]

# --- PHASE E: Keys-add (inventory access_key not in filer; append credential, gen secret) ---
# NEVER re-applies an access_key already in the filer (would rotate its secret —
# command_s3_configure.go). Brand-new identity's keys[0] is created in Phase B, excluded here.
- name: "[{{ dto_label_name }}] Phase E — Add new keys via weed shell s3.configure -apply"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.configure -user={{ item.name }} -access_key={{ item.accessKey }} -secret_key={{ item.secretKey }} -apply"
  loop: "{{ lookup('vars', _local_keys_to_add_key) }}"
  loop_control:
    label: "{{ item.name }}: {{ item.accessKey }}"
  run_once: true
  tags: [always]

# --- PHASE F: Keys-delete (filer access_key not in target; remove single credential) ---
# -access_key=AK -delete removes ONLY that credential (identity survives). Identities absent
# from target are removed wholesale in Phase A (keys_to_delete gates name in target).
- name: "[{{ dto_label_name }}] Phase F — Delete filer-extra keys via weed shell s3.configure -delete"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.configure -user={{ item.name }} -access_key={{ item.accessKey }} -delete -apply"
  loop: "{{ lookup('vars', _local_keys_to_delete_key) }}"
  loop_control:
    label: "{{ item.name }}: {{ item.accessKey }}"
  run_once: true
  tags: [always]
