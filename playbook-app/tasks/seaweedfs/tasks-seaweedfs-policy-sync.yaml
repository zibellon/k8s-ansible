# =============================================================================
# SeaweedFS Policy Sync (Layer P) — declarative managed IAM policies
# =============================================================================
# Reusable task include. Invoked from playbook with:
#   - include_tasks: tasks-seaweedfs-policy-sync.yaml
#     vars:
#       dto_label_name: "<caller-prefix>"
#
# v17 filer-driven IAM. Managed policies (named AWS-style documents) применяются
# в filer через weed shell s3.policy -put/-delete → /etc/iam/policies/<n>.json.
# Прикрепляются к identities через identity.policy_names (user-sync, s3.configure
# -policies). Этот task должен выполняться ДО user-sync (policy должна существовать
# до attach).
#
# State (v17 — filer = единственный источник истины): текущее состояние читается
# напрямую из живого filer командой `s3.policy -list` (имена + JSON-документы), а не
# из внешнего ConfigMap-стора. diff vs inventory target → put changed/new + delete
# стейл. Внешний state-стор (бывшие per-item ConfigMap'ы) устранён.
#
# Stateless filter API (filter_plugins/seaweedfs_policy.py — v18 split из монолита; signature: s3policy_list_raw | filter(target_policies)):
#   seaweedfs_policies_to_put    — put где документ новый ИЛИ изменился (semantic
#                                  dict ==, order-insensitive); только changed/new.
#   seaweedfs_policies_to_delete — filer-policy не в target → delete.
#
# Convention: dto_label_name passed ONLY at playbook-level invocation.
#
# Reads inventory:
#   - seaweedfs_managed_policies + _extra (from hosts-vars/seaweedfs-sync.yaml).
#     Schema per policy: {name, document} where document is AWS IAM policy doc.
#   - seaweedfs_namespace (from hosts-vars/seaweedfs.yaml).
#
# Sync flow (1 read + 2 resource loops):
#   READ. s3.policy -list (live filer) → capture stdout (weed-shell wrapper, READ-
#         режим: NON-looped include + run_once НА include + dto_weed_capture_fact;
#         s3.policy -list секретов не содержит → dto_weed_no_log не нужен).
#   A.    Delete стейл policies (filer, not in target): weed shell s3.policy -delete.
#   B.    Put changed/new target policies: weed shell s3.policy -put -file.
#
# Phase B detail: s3.policy -put требует -file=<path> (нет inline варианта). Document
# передаётся через stdin (printf | kubectl exec -i) в pod и пишется в /tmp файл,
# затем weed shell -put -file — ОБА в одном kubectl exec (sh -c 'cat > f && weed shell'),
# т.к. deploy/seaweedfs-s3 многорепличный (один exec = один pod = файл доступен).
# Document передаётся в single-quoted printf (managed policy documents не содержат
# одинарных кавычек — guard в _validate_managed_policies).
# =============================================================================

- name: "[{{ dto_label_name }}] Assert dto_label_name provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
    fail_msg: >-
      tasks-seaweedfs-policy-sync: dto_label_name required (string, non-empty).
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Declare local fact keys"
  set_fact:
    _local_target_policies_key: "_local_target_policies"
    _local_s3policy_raw_key: "_local_s3policy_raw"
    _local_to_put_policies_key: "_local_to_put_policies"
    _local_to_delete_policies_key: "_local_to_delete_policies"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute target managed policies list"
  set_fact:
    "{{ _local_target_policies_key }}": "{{ seaweedfs_managed_policies + (seaweedfs_managed_policies_extra | default([])) }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# --- READ: current managed policies from the live filer (s3.policy -list) ---
- name: "[{{ dto_label_name }}] Read current managed policies from filer (s3.policy -list)"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.policy -list"
    dto_weed_capture_fact: "{{ _local_s3policy_raw_key }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute policies_to_delete via filter"
  set_fact:
    "{{ _local_to_delete_policies_key }}": >-
      {{ lookup('vars', _local_s3policy_raw_key) | seaweedfs_policies_to_delete(
           lookup('vars', _local_target_policies_key)
         ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute policies_to_put via filter (changed/new only)"
  set_fact:
    "{{ _local_to_put_policies_key }}": >-
      {{ lookup('vars', _local_s3policy_raw_key) | seaweedfs_policies_to_put(
           lookup('vars', _local_target_policies_key)
         ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# --- PHASE A: Delete стейл policies (filer, not in target) ---
- name: "[{{ dto_label_name }}] Phase A — Delete стейл managed policies via weed shell"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.policy -delete -name={{ item.name }}"
  loop: "{{ lookup('vars', _local_to_delete_policies_key) }}"
  loop_control:
    label: "{{ item.name }}"
  run_once: true
  tags: [always]

# --- PHASE B: Put changed/new target policies ---
# Document -> stdin -> /tmp file -> weed shell -put -file, всё в одном kubectl exec
# (single pod из многорепличного deploy/seaweedfs-s3 — файл доступен weed shell'у).
- name: "[{{ dto_label_name }}] Phase B — Put target managed policies via weed shell s3.policy -put -file"
  include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-weed-shell.yaml"
  vars:
    dto_weed_command: "s3.policy -put -name={{ item.name }} -file=/tmp/policy-sync.json"
    dto_weed_stdin_payload: "{{ item.document | to_json }}"
    dto_weed_stdin_path: "/tmp/policy-sync.json"
  loop: "{{ lookup('vars', _local_to_put_policies_key) }}"
  loop_control:
    label: "{{ item.name }}"
  run_once: true
  tags: [always]
