# =============================================================================
# SeaweedFS Policy Sync (Layer P) — declarative managed IAM policies
# =============================================================================
# Reusable task include. Invoked from playbook with:
#   - include_tasks: tasks-seaweedfs-policy-sync.yaml
#     vars:
#       dto_label_name: "<caller-prefix>"
#
# v14 filer-driven IAM. Managed policies (named AWS-style documents) применяются
# в filer через weed shell s3.policy -put/-delete → /etc/iam/policies/<n>.json.
# Прикрепляются к identities через identity.policy_names (user-sync, s3.configure
# -policies). Этот task должен выполняться ДО user-sync (policy должна существовать
# до attach).
#
# State (v15 — per-item ConfigMaps): «последний applied target» хранится НЕ в одном
# ConfigMap, а в наборе per-item ConfigMap'ов 'seaweedfs-sync-policies-<policy>'
# (по одному на policy), сгруппированных label'ом 'seaweedfs-sync-state: policies'
# (избегаем etcd per-object size limit). Чтение всей группы — одним
# 'kubectl get cm -l seaweedfs-sync-state=policies -o json'; reconstruction в
# combined-array JSON (фильтр seaweedfs_state_configmaps_to_combined_json) кормит
# diff-фильтры без изменений.
#
# Stateless filter API: seaweedfs_policies_to_put / _to_delete (diff), плюс
# seaweedfs_state_configmaps_to_combined_json (read reconstruction),
# seaweedfs_policies_configmaps_to_apply / seaweedfs_state_configmaps_to_delete
# (write per-item + prune stale).
#
# Convention: dto_label_name passed ONLY at playbook-level invocation.
#
# Reads inventory:
#   - seaweedfs_managed_policies + _extra (from hosts-vars/seaweedfs-sync.yaml).
#     Schema per policy: {name, document} where document is AWS IAM policy doc.
#   - seaweedfs_namespace (from hosts-vars/seaweedfs.yaml).
#
# Sync phases (2 resource loops + 2 ConfigMap loops):
#   A. Delete стейл policies (in state, not in target): weed shell s3.policy -delete.
#   B. Put target policies (put-all, idempotent overwrite): weed shell s3.policy -put -file.
#   C. Apply per-item state ConfigMaps (labeled) для target policies.
#   D. Delete стейл per-item state ConfigMaps (policy дропнута из target).
#
# Phase B detail: s3.policy -put требует -file=<path> (нет inline варианта). Document
# передаётся через stdin (printf | kubectl exec -i) в pod и пишется в /tmp файл,
# затем weed shell -put -file — ОБА в одном kubectl exec (sh -c 'cat > f && weed shell'),
# т.к. deploy/seaweedfs-s3 многорепличный (один exec = один pod = файл доступен).
# Document передаётся в single-quoted printf (managed policy documents не содержат
# одинарных кавычек — only JSON double-quotes).
# =============================================================================

- name: "[{{ dto_label_name }}] Assert dto_label_name provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
    fail_msg: >-
      tasks-seaweedfs-policy-sync: dto_label_name required (string, non-empty).
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Declare local fact keys"
  set_fact:
    _local_target_policies_key: "_local_target_policies"
    _local_configmap_raw_key: "_local_configmap_raw"
    _local_to_put_policies_key: "_local_to_put_policies"
    _local_to_delete_policies_key: "_local_to_delete_policies"
    _local_configmaps_to_apply_key: "_local_configmaps_to_apply"
    _local_configmaps_to_delete_key: "_local_configmaps_to_delete"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute target managed policies list"
  set_fact:
    "{{ _local_target_policies_key }}": "{{ seaweedfs_managed_policies + (seaweedfs_managed_policies_extra | default([])) }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Read current state ConfigMaps (labeled, may be none)"
  command: >-
    kubectl get configmap -n {{ seaweedfs_namespace }}
    -l seaweedfs-sync-state=policies -o json
  register: _local_configmaplist_reg
  changed_when: false
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Reconstruct combined state from labeled ConfigMaps"
  set_fact:
    "{{ _local_configmap_raw_key }}": >-
      {{ _local_configmaplist_reg.stdout | seaweedfs_state_configmaps_to_combined_json }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute policies_to_delete via filter"
  set_fact:
    "{{ _local_to_delete_policies_key }}": >-
      {{ '' | seaweedfs_policies_to_delete(
           lookup('vars', _local_target_policies_key),
           lookup('vars', _local_configmap_raw_key)
         ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute policies_to_put via filter (put-all target)"
  set_fact:
    "{{ _local_to_put_policies_key }}": >-
      {{ '' | seaweedfs_policies_to_put(
           lookup('vars', _local_target_policies_key),
           lookup('vars', _local_configmap_raw_key)
         ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute per-item state ConfigMaps to apply"
  set_fact:
    "{{ _local_configmaps_to_apply_key }}": >-
      {{ lookup('vars', _local_target_policies_key) | seaweedfs_policies_configmaps_to_apply }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute stale state ConfigMaps to delete"
  set_fact:
    "{{ _local_configmaps_to_delete_key }}": >-
      {{ _local_configmaplist_reg.stdout | seaweedfs_state_configmaps_to_delete(
           lookup('vars', _local_configmaps_to_apply_key) | map(attribute='name') | list
         ) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# --- PHASE A: Delete стейл policies (in state, not in target) ---
- name: "[{{ dto_label_name }}] Phase A — Delete стейл managed policies via weed shell"
  shell: |
    echo "s3.policy -delete -name={{ item.name }}" | \
      kubectl exec -i -n {{ seaweedfs_namespace }} deploy/seaweedfs-s3 -- \
        weed shell -master=seaweedfs-master:9333 -filer=seaweedfs-filer:8888
  loop: "{{ lookup('vars', _local_to_delete_policies_key) }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# --- PHASE B: Put target policies (put-all, idempotent overwrite) ---
# Document -> stdin -> /tmp file -> weed shell -put -file, всё в одном kubectl exec
# (single pod из многорепличного deploy/seaweedfs-s3 — файл доступен weed shell'у).
- name: "[{{ dto_label_name }}] Phase B — Put target managed policies via weed shell s3.policy -put -file"
  shell: |
    printf '%s' '{{ item.document | to_json }}' | \
      kubectl exec -i -n {{ seaweedfs_namespace }} deploy/seaweedfs-s3 -- \
        sh -c 'cat > /tmp/policy-sync.json && echo "s3.policy -put -name={{ item.name }} -file=/tmp/policy-sync.json" | weed shell -master=seaweedfs-master:9333 -filer=seaweedfs-filer:8888'
  loop: "{{ lookup('vars', _local_to_put_policies_key) }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# --- PHASE C: Apply per-item state ConfigMaps (labeled seaweedfs-sync-state=policies) ---
- name: "[{{ dto_label_name }}] Phase C — Apply per-item state ConfigMaps"
  shell: |
    kubectl create configmap {{ item.name }} -n {{ seaweedfs_namespace }} \
      --from-literal=state='{{ item.content }}' \
      --dry-run=client -o yaml | \
      kubectl label --local -f - -o yaml seaweedfs-sync-state=policies | \
      kubectl apply -f -
  loop: "{{ lookup('vars', _local_configmaps_to_apply_key) }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# --- PHASE D: Delete стейл per-item state ConfigMaps (policy dropped from target) ---
- name: "[{{ dto_label_name }}] Phase D — Delete стейл state ConfigMaps"
  command: >-
    kubectl delete configmap {{ item }} -n {{ seaweedfs_namespace }} --ignore-not-found
  loop: "{{ lookup('vars', _local_configmaps_to_delete_key) }}"
  loop_control:
    label: "{{ item }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
