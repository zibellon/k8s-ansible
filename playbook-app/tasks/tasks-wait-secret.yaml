# =============================================================================
# Wait for secret in k8s
# =============================================================================
# DESCRIPTION - here
# DESCRIPTION - here
# DESCRIPTION - here
# DESCRIPTION - here
# params
#  - dto_label_name
#  - dto_wait_secret_name
#  - dto_wait_secret_namespace
# Wait retries/delay are hardcoded: retries=30, delay=5s.
# =============================================================================

- name: "[{{ dto_label_name }}] Assert all dto params are provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
      - dto_wait_secret_name is defined
      - dto_wait_secret_name | length > 0
      - dto_wait_secret_namespace is defined
      - dto_wait_secret_namespace | length > 0
    fail_msg: >-
      tasks-secret-wait: all params required:
      dto_label_name, dto_wait_secret_name, dto_wait_secret_namespace
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Wait for k8s Secret to appear"
  command: kubectl get secret {{ dto_wait_secret_name }} -n {{ dto_wait_secret_namespace }}
  register: _secret_wait_res
  until: _secret_wait_res.rc == 0
  retries: "{{ secret_wait.retries }}"
  delay: "{{ secret_wait.delay }}"
  changed_when: false
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
