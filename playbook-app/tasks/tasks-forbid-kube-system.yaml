# =============================================================================
# Forbid kube-system namespace
# =============================================================================
# Asserts that the given namespace is not 'kube-system'.
#
# Params:
#   - label_name:      Label prefix for task names (e.g. "cilium-install-pre-check")
#   - namespace_value: The namespace value to validate
#
# Requires fact: master_manager_fact (set by tasks-pre-check.yaml)
# =============================================================================

- name: "[{{ label_name }}] Assert all dto params are provided"
  assert:
    that:
      - label_name is defined
      - label_name | length > 0
      - namespace_value is defined
      - namespace_value | length > 0
    fail_msg: "tasks-forbid-kube-system: label_name and namespace_value are required"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Forbid kube-system namespace"
  assert:
    that: namespace_value != "kube-system"
    fail_msg: "{{ label_name }}: namespace must not be 'kube-system'. Got: '{{ namespace_value }}'"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
