# =============================================================================
# Forbid kube-system namespace
# =============================================================================
# Asserts that the given namespace is not 'kube-system'.
#
# Params:
#   - dto_label_name:      Label prefix for task names (e.g. "cilium-install-pre-check")
#   - dto_target_namespace: The namespace value to validate
#
# Requires fact: master_manager_fact (set by tasks-pre-check.yaml)
# =============================================================================

- name: "[{{ dto_label_name }}] Assert all dto params are provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
      - dto_target_namespace is defined
      - dto_target_namespace | length > 0
    fail_msg: "tasks-forbid-kube-system: dto_label_name and dto_target_namespace are required"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Forbid kube-system namespace"
  assert:
    that: dto_target_namespace != "kube-system"
    fail_msg: "{{ dto_label_name }}: namespace must not be 'kube-system'. Got: '{{ dto_target_namespace }}'"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
