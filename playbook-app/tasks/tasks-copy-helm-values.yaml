# =============================================================================
# Create remote directory + write values-override.yaml
#
# Params:
#   - label_name:   Label for task names (used in logs)
#   - dto_dir:      Remote directory path (must NOT end with /)
#   - dto_content:  Content for values-override.yaml
# =============================================================================

- name: "[{{ label_name }}] Assert all dto params are provided"
  assert:
    that:
      - label_name is defined
      - label_name | length > 0
      - dto_dir is defined
      - dto_dir | length > 0
      - dto_content is defined
      - dto_content | length > 0
    fail_msg: "tasks-copy-helm-values: all params required: label_name, dto_dir, dto_content"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Ensure directory exists"
  file:
    path: "{{ dto_dir }}"
    state: directory
    mode: "0755"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true

- name: "[{{ label_name }}] Create values-override.yaml"
  copy:
    dest: "{{ dto_dir }}/values-override.yaml"
    mode: "0644"
    content: "{{ dto_content }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
