# =============================================================================
# Create remote directory + write values-override.yaml
#
# Params:
#   - label_name:   Label for task names (used in logs)
#   - dto_dir:      Remote directory path (must NOT end with /)
#   - dto_content:  Content for values-override.yaml
# =============================================================================

- name: "[{{ label_name }}] Ensure directory exists"
  file:
    path: "{{ dto_dir }}"
    state: directory
    mode: "0755"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true

- name: "[{{ label_name }}] Create values-override.yaml"
  copy:
    dest: "{{ dto_dir }}/values-override.yaml"
    mode: "0644"
    content: "{{ dto_content }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
