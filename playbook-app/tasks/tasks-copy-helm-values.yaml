# =============================================================================
# Create remote directory + write values-override.yaml
#
# Params:
#   - dto_label_name:   Label for task names (used in logs)
#   - dto_dir:      Remote directory path (must NOT end with /)
#   - dto_content:  Content for values-override.yaml
# =============================================================================

- name: "[{{ dto_label_name }}] Assert all dto params are provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
      - dto_dir is defined
      - dto_dir | length > 0
      - dto_filename is defined
      - dto_filename | length > 0
      - dto_content is defined
      - dto_content | length > 0
    fail_msg: "tasks-copy-helm-values: all params required: dto_label_name, dto_dir, dto_content"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Ensure directory exists"
  file:
    path: "{{ dto_dir }}"
    state: directory
    mode: "0755"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Create {{ dto_filename }}"
  copy:
    dest: "{{ dto_dir }}/{{ dto_filename }}"
    mode: "0644"
    content: "{{ dto_content }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
