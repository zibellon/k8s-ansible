# =============================================================================
# ESO Verify (per-component validation)
# =============================================================================
# Pure validation pre-check для одного компонента. Тонкий wrapper: Group A (input
# asserts) — в YAML; B/C/D делегированы в Python-фильтр eso_verify (filter_plugins/eso_verify.py).
# Каждый ESO-integrated playbook вызывает с собственными dto-параметрами после
# вызова tasks-vault-config-verify.yaml (он валидирует Vault config глобально).
#
# Params:
#   - dto_label_name (string): log prefix
#   - dto_eso_secrets_list (sequence): final base + extra array (inline Jinja
#                                       expression в caller'е)
#   - dto_eso_integration_object (mapping): eso_vault_integration_<c> object
#                                            (sa_name, role_name, secret_store_name,
#                                             kv_engine_path)
#   - dto_namespace (string): K8s namespace компонента
#
# Reads (from inventory):
#   - vault_policies, vault_policies_extra (inline merge)
#   - vault_roles, vault_roles_extra (inline merge)
#
# Validates (4 groups):
#   A. Input asserts.
#   B. SecretStore→Vault connectivity (scoped к role of this component).
#   C. ESO uniqueness (external_secret_name + body.target.name in
#      dto_eso_secrets_list).
#   D. Policy path coverage (scoped к role's policies — substring check
#      каждого item Vault path против path "X" patterns из HCL policies).
#
# Output: _local_error_item_list (local fact — list[str] нарушений; [] = OK).
# Callers: 9 ESO-install + 2 ESO-configure playbooks (11 total). НЕ вызывается из
# tests/helm-validate.yaml (рендерит upstream charts — нет component scope).
# =============================================================================

- name: "[{{ dto_label_name }}] Assert input params + inventory vars"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
      - dto_eso_secrets_list is defined
      - dto_eso_secrets_list is sequence
      - dto_eso_integration_object is defined
      - dto_eso_integration_object is mapping
      - dto_eso_integration_object.sa_name is defined
      - dto_eso_integration_object.role_name is defined
      - dto_eso_integration_object.kv_engine_path is defined
      - dto_namespace is defined
      - dto_namespace | length > 0
      - vault_policies is defined
      - vault_policies is sequence
      - vault_roles is defined
      - vault_roles is sequence
    fail_msg: "tasks-eso-verify: all dto params + vault_policies/vault_roles must be defined"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Compute ESO violations via filter"
  set_fact:
    _local_error_item_list: >-
      {{ dto_eso_secrets_list
         | eso_verify(dto_eso_integration_object, dto_namespace,
                      vault_policies + (vault_policies_extra | default([])),
                      vault_roles + (vault_roles_extra | default([]))) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Assert no ESO violations"
  assert:
    that:
      - _local_error_item_list | length == 0
    fail_msg: |
      [{{ dto_label_name }}] ESO verify failed for namespace '{{ dto_namespace }}'
      ({{ _local_error_item_list | length }} violations):
      {% for v in _local_error_item_list %}
        - {{ v }}
      {% endfor %}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
