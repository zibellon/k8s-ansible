# =============================================================================
# Verify Helm releases in a namespace
# =============================================================================
# Params:
#   - dto_helm_namespace: Namespace to list Helm releases
#   - dto_label_name: Label prefix for task names (optional, default: 'verify-helm')
# =============================================================================

- name: "[{{ dto_label_name }}] Assert all dto params are provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
      - dto_helm_namespace is defined
      - dto_helm_namespace | length > 0
    fail_msg: "tasks-verify-helm: all params required: dto_label_name, dto_helm_namespace"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Verify Helm releases"
  command: helm list -n {{ dto_helm_namespace }}
  register: helm_list_result
  changed_when: false
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Format Helm releases output (tabs to spaces)"
  set_fact:
    helm_list_pretty: "{{ helm_list_result.stdout_lines | map('replace', '\t', '  ') | list }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Print Helm releases"
  debug:
    var: helm_list_pretty
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]