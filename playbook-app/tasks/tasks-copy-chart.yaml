# =============================================================================
# Fast chart copy via archive
# Copies chart directory to remote server using tar archive for better performance
#
# Params:
#   - label_name: Label for task names (used in logs)
#   - dto_chart_name: Name of the chart (used for archive filename and logs)
#   - dto_chart_local_src: Local path to chart directory (with trailing /)
#   - dto_chart_remote_dest: Remote destination path
# =============================================================================

- name: "[{{ label_name }}] Assert all dto params are provided"
  assert:
    that:
      - label_name is defined
      - label_name | length > 0
      - dto_chart_name is defined
      - dto_chart_name | length > 0
      - dto_chart_local_src is defined
      - dto_chart_local_src | length > 0
      - dto_chart_remote_dest is defined
      - dto_chart_remote_dest | length > 0
    fail_msg: "tasks-copy-chart: all params required: label_name, dto_chart_name, dto_chart_local_src, dto_chart_remote_dest"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Ensure remote charts directory exists"
  file:
    path: "{{ dto_chart_remote_dest | dirname }}"
    state: directory
    mode: "0755"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Archive chart locally"
  archive:
    path: "{{ dto_chart_local_src }}"
    dest: "{{ dto_chart_local_src | dirname }}/{{ dto_chart_name }}.tar.gz"
    format: gz
  delegate_to: localhost
  become: false
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Remove old chart from remote"
  file:
    path: "{{ dto_chart_remote_dest }}"
    state: absent
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Create remote directory"
  file:
    path: "{{ dto_chart_remote_dest }}"
    state: directory
    mode: "0755"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Copy archive to remote"
  copy:
    src: "{{ dto_chart_local_src | dirname }}/{{ dto_chart_name }}.tar.gz"
    dest: "{{ dto_chart_remote_dest }}.tar.gz"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Unarchive on remote"
  unarchive:
    src: "{{ dto_chart_remote_dest }}.tar.gz"
    dest: "{{ dto_chart_remote_dest }}"
    remote_src: true
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Cleanup remote archive"
  file:
    path: "{{ dto_chart_remote_dest }}.tar.gz"
    state: absent
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Cleanup local archive"
  file:
    path: "{{ dto_chart_local_src | dirname }}/{{ dto_chart_name }}.tar.gz"
    state: absent
  delegate_to: localhost
  become: false
  run_once: true
  tags: [always]
