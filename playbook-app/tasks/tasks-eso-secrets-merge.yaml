# =============================================================================
# ESO Per-Component Secrets Merge
# =============================================================================
# Merges per-component *_secrets + *_secrets_extra → *_secrets_merged for all
# 8 ESO-integrated components. Extra items are appended to the end of the base
# list. Validates uniqueness of external_secret_name and body.target.name
# within each merged list (includes the component name in the error message).
#
# Called by:
#   - traefik-install.yaml
#   - haproxy-install.yaml
#   - longhorn-install.yaml
#   - gitlab-install.yaml
#   - gitlab-runner-install.yaml
#   - argocd-install.yaml
#   - argocd-configure.yaml
#   - gitlab-configure.yaml
#   - zitadel-install.yaml
#   - mon-system-install.yaml
#
# Requires variables (from inventory):
#   - eso_vault_integration_<c>_secrets       (list) for each of 8 components
#   - eso_vault_integration_<c>_secrets_extra (list, default: [])
#
# Produces:
#   - eso_vault_integration_traefik_secrets_merged
#   - eso_vault_integration_haproxy_secrets_merged
#   - eso_vault_integration_longhorn_secrets_merged
#   - eso_vault_integration_gitlab_secrets_merged
#   - eso_vault_integration_gitlab_runner_secrets_merged
#   - eso_vault_integration_zitadel_secrets_merged
#   - eso_vault_integration_argocd_secrets_merged
#   - eso_vault_integration_mon_system_secrets_merged
# =============================================================================

- name: "[eso-secrets-merge] Assert required inventory vars are defined sequences"
  assert:
    that:
      - eso_vault_integration_traefik_secrets is defined
      - eso_vault_integration_traefik_secrets is sequence
      - eso_vault_integration_haproxy_secrets is defined
      - eso_vault_integration_haproxy_secrets is sequence
      - eso_vault_integration_longhorn_secrets is defined
      - eso_vault_integration_longhorn_secrets is sequence
      - eso_vault_integration_gitlab_secrets is defined
      - eso_vault_integration_gitlab_secrets is sequence
      - eso_vault_integration_gitlab_runner_secrets is defined
      - eso_vault_integration_gitlab_runner_secrets is sequence
      - eso_vault_integration_zitadel_secrets is defined
      - eso_vault_integration_zitadel_secrets is sequence
      - eso_vault_integration_argocd_secrets is defined
      - eso_vault_integration_argocd_secrets is sequence
      - eso_vault_integration_mon_system_secrets is defined
      - eso_vault_integration_mon_system_secrets is sequence
    fail_msg: "tasks-eso-secrets-merge: all eso_vault_integration_<c>_secrets vars must be defined sequences in inventory"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# -------------------------------------------------------------------------
# Merge per-component secrets (base + extra, extra appended to end)
# -------------------------------------------------------------------------

- name: "[eso-secrets-merge] Merge traefik secrets"
  set_fact:
    eso_vault_integration_traefik_secrets_merged: >-
      {{ eso_vault_integration_traefik_secrets
         + (eso_vault_integration_traefik_secrets_extra | default([])) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-secrets-merge] Merge haproxy secrets"
  set_fact:
    eso_vault_integration_haproxy_secrets_merged: >-
      {{ eso_vault_integration_haproxy_secrets
         + (eso_vault_integration_haproxy_secrets_extra | default([])) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-secrets-merge] Merge longhorn secrets"
  set_fact:
    eso_vault_integration_longhorn_secrets_merged: >-
      {{ eso_vault_integration_longhorn_secrets
         + (eso_vault_integration_longhorn_secrets_extra | default([])) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-secrets-merge] Merge gitlab secrets"
  set_fact:
    eso_vault_integration_gitlab_secrets_merged: >-
      {{ eso_vault_integration_gitlab_secrets
         + (eso_vault_integration_gitlab_secrets_extra | default([])) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-secrets-merge] Merge gitlab_runner secrets"
  set_fact:
    eso_vault_integration_gitlab_runner_secrets_merged: >-
      {{ eso_vault_integration_gitlab_runner_secrets
         + (eso_vault_integration_gitlab_runner_secrets_extra | default([])) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-secrets-merge] Merge zitadel secrets"
  set_fact:
    eso_vault_integration_zitadel_secrets_merged: >-
      {{ eso_vault_integration_zitadel_secrets
         + (eso_vault_integration_zitadel_secrets_extra | default([])) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-secrets-merge] Merge argocd secrets"
  set_fact:
    eso_vault_integration_argocd_secrets_merged: >-
      {{ eso_vault_integration_argocd_secrets
         + (eso_vault_integration_argocd_secrets_extra | default([])) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-secrets-merge] Merge mon_system secrets"
  set_fact:
    eso_vault_integration_mon_system_secrets_merged: >-
      {{ eso_vault_integration_mon_system_secrets
         + (eso_vault_integration_mon_system_secrets_extra | default([])) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# -------------------------------------------------------------------------
# Validate uniqueness of merged secrets per component
# -------------------------------------------------------------------------

- name: "[eso-secrets-merge] Check unique external_secret_name per component"
  fail:
    msg: >-
      Duplicate external_secret_name in eso_vault_integration_{{ item.component }}_secrets_merged.
      Component: {{ item.component }}. Duplicates: {{ _names | difference(_names | unique) }}
  vars:
    _names: "{{ item.secrets | map(attribute='external_secret_name') | list }}"
  when: _names | length != _names | unique | length
  loop:
    - component: traefik
      secrets: "{{ eso_vault_integration_traefik_secrets_merged }}"
    - component: haproxy
      secrets: "{{ eso_vault_integration_haproxy_secrets_merged }}"
    - component: longhorn
      secrets: "{{ eso_vault_integration_longhorn_secrets_merged }}"
    - component: gitlab
      secrets: "{{ eso_vault_integration_gitlab_secrets_merged }}"
    - component: gitlab_runner
      secrets: "{{ eso_vault_integration_gitlab_runner_secrets_merged }}"
    - component: zitadel
      secrets: "{{ eso_vault_integration_zitadel_secrets_merged }}"
    - component: argocd
      secrets: "{{ eso_vault_integration_argocd_secrets_merged }}"
    - component: mon_system
      secrets: "{{ eso_vault_integration_mon_system_secrets_merged }}"
  loop_control:
    label: "{{ item.component }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-secrets-merge] Check unique body.target.name per component"
  fail:
    msg: >-
      Duplicate body.target.name in eso_vault_integration_{{ item.component }}_secrets_merged.
      Component: {{ item.component }}. Duplicates: {{ _names | difference(_names | unique) }}
  vars:
    _names: "{{ item.secrets | map(attribute='body') | map(attribute='target') | map(attribute='name') | list }}"
  when: _names | length != _names | unique | length
  loop:
    - component: traefik
      secrets: "{{ eso_vault_integration_traefik_secrets_merged }}"
    - component: haproxy
      secrets: "{{ eso_vault_integration_haproxy_secrets_merged }}"
    - component: longhorn
      secrets: "{{ eso_vault_integration_longhorn_secrets_merged }}"
    - component: gitlab
      secrets: "{{ eso_vault_integration_gitlab_secrets_merged }}"
    - component: gitlab_runner
      secrets: "{{ eso_vault_integration_gitlab_runner_secrets_merged }}"
    - component: zitadel
      secrets: "{{ eso_vault_integration_zitadel_secrets_merged }}"
    - component: argocd
      secrets: "{{ eso_vault_integration_argocd_secrets_merged }}"
    - component: mon_system
      secrets: "{{ eso_vault_integration_mon_system_secrets_merged }}"
  loop_control:
    label: "{{ item.component }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# -------------------------------------------------------------------------
# Summary
# -------------------------------------------------------------------------

- name: "[eso-secrets-merge] Show merge summary"
  debug:
    msg:
      - "traefik secrets: {{ eso_vault_integration_traefik_secrets_merged | length }}"
      - "haproxy secrets: {{ eso_vault_integration_haproxy_secrets_merged | length }}"
      - "longhorn secrets: {{ eso_vault_integration_longhorn_secrets_merged | length }}"
      - "gitlab secrets: {{ eso_vault_integration_gitlab_secrets_merged | length }}"
      - "gitlab-runner secrets: {{ eso_vault_integration_gitlab_runner_secrets_merged | length }}"
      - "zitadel secrets: {{ eso_vault_integration_zitadel_secrets_merged | length }}"
      - "argocd secrets: {{ eso_vault_integration_argocd_secrets_merged | length }}"
      - "mon_system secrets: {{ eso_vault_integration_mon_system_secrets_merged | length }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
