# =============================================================================
# ESO Lookup — Find an ExternalSecret in a merged list by external_secret_name
# =============================================================================
# Searches dto_secrets_list for an entry whose external_secret_name matches
# dto_external_secret_name. Fails with a clear message if not found.
# On success, publishes two named facts: target_secret_name and vault_path.
#
# Required vars:
#   label_name                    — task label prefix
#   dto_secrets_list              — merged *_secrets_merged list to search
#   dto_external_secret_name      — external_secret_name to look up
#   dto_res_fact_name_secret      — output fact name for target_secret_name
#   dto_res_fact_name_vault_path  — output fact name for vault_path
#
# Output facts (set on all hosts via master_manager_fact delegation):
#   {{ dto_res_fact_name_secret }}        — target_secret_name of the found entry
#   {{ dto_res_fact_name_vault_path }}    — vault_path of the found entry
#
# Requires global vars: master_manager_fact
# =============================================================================

- name: "[{{ label_name }}] Assert eso-lookup params"
  assert:
    that:
      - label_name is defined
      - label_name | length > 0
      - dto_secrets_list is defined
      - dto_secrets_list is sequence
      - dto_external_secret_name is defined
      - dto_external_secret_name | length > 0
      - dto_res_fact_name_secret is defined
      - dto_res_fact_name_secret | length > 0
      - dto_res_fact_name_vault_path is defined
      - dto_res_fact_name_vault_path | length > 0
    fail_msg: >-
      tasks-eso-lookup: all params are required
      (dto_secrets_list, dto_external_secret_name, dto_res_fact_name_secret, dto_res_fact_name_vault_path)
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Find ExternalSecret in merged list"
  set_fact:
    _eso_lookup_match: >-
      {{ dto_secrets_list
         | selectattr('external_secret_name', 'equalto', dto_external_secret_name)
         | list }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Fail if ExternalSecret not found"
  fail:
    msg: >-
      ExternalSecret '{{ dto_external_secret_name }}' не найден в переданном списке
      (список содержит {{ dto_secrets_list | length }} записей).
      Проверь значение переменной dto_external_secret_name и содержимое merged-списка.
  when: _eso_lookup_match | length == 0
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Export target_secret_name and vault_path facts"
  set_fact:
    "{{ dto_res_fact_name_secret }}": "{{ _eso_lookup_match[0].target_secret_name }}"
    "{{ dto_res_fact_name_vault_path }}": "{{ _eso_lookup_match[0].vault_path }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Propagate facts to all hosts"
  set_fact:
    "{{ dto_res_fact_name_secret }}": "{{ hostvars[master_manager_fact][dto_res_fact_name_secret] }}"
    "{{ dto_res_fact_name_vault_path }}": "{{ hostvars[master_manager_fact][dto_res_fact_name_vault_path] }}"
  tags: [always]
