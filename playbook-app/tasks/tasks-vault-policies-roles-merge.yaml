# =============================================================================
# Vault Policies & Roles Merge
# =============================================================================
# Merges vault_policies + vault_policies_extra → vault_policies_final.
# Merges vault_roles + vault_roles_extra → vault_roles_final.
# Validates name uniqueness and that every role's policies exist in
# vault_policies_final.
#
# Called by:
#   - vault-install.yaml
#
# Requires variables (from inventory):
#   - vault_policies        (list of dicts with 'name' field)
#   - vault_roles           (list of dicts with 'name' and 'policies' fields)
#   - vault_policies_extra  (list, default: [])
#   - vault_roles_extra     (list, default: [])
#
# Produces:
#   - vault_policies_final
#   - vault_roles_final
# =============================================================================

- name: "[vault-policies-roles-merge] Assert required inventory vars are defined"
  assert:
    that:
      - vault_policies is defined
      - vault_policies is sequence
      - vault_roles is defined
      - vault_roles is sequence
    fail_msg: "tasks-vault-policies-roles-merge: vault_policies and vault_roles must be defined sequences in inventory"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# -------------------------------------------------------------------------
# Merge vault_policies
# -------------------------------------------------------------------------

- name: "[vault-policies-roles-merge] Merge vault_policies + vault_policies_extra → vault_policies_final"
  set_fact:
    vault_policies_final: "{{ vault_policies + (vault_policies_extra | default([])) }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[vault-policies-roles-merge] Check unique policy names in vault_policies_final"
  fail:
    msg: >-
      Duplicate policy names in vault_policies_final:
      {{ _names | difference(_names | unique) }}
  vars:
    _names: "{{ vault_policies_final | map(attribute='name') | list }}"
  when: _names | length != _names | unique | length
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# -------------------------------------------------------------------------
# Merge vault_roles
# -------------------------------------------------------------------------

- name: "[vault-policies-roles-merge] Merge vault_roles + vault_roles_extra → vault_roles_final"
  set_fact:
    vault_roles_final: "{{ vault_roles + (vault_roles_extra | default([])) }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[vault-policies-roles-merge] Check unique role names in vault_roles_final"
  fail:
    msg: >-
      Duplicate role names in vault_roles_final:
      {{ _names | difference(_names | unique) }}
  vars:
    _names: "{{ vault_roles_final | map(attribute='name') | list }}"
  when: _names | length != _names | unique | length
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# -------------------------------------------------------------------------
# Validate all role policies exist in vault_policies_final
# -------------------------------------------------------------------------

- name: "[vault-policies-roles-merge] Validate all role policies exist in vault_policies_final"
  fail:
    msg: >-
      Role '{{ item.name }}' references policy '{{ _missing | first }}'
      that is NOT defined in vault_policies_final.
      Define this policy in vault_policies or vault_policies_extra.
  vars:
    _policy_names: "{{ vault_policies_final | map(attribute='name') | list }}"
    _missing: "{{ item.policies | default([]) | difference(_policy_names) }}"
  when: _missing | length > 0
  loop: "{{ vault_roles_final }}"
  loop_control:
    label: "{{ item.name }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# -------------------------------------------------------------------------
# Summary
# -------------------------------------------------------------------------

- name: "[vault-policies-roles-merge] Show merge summary"
  debug:
    msg:
      - "vault_policies_final: {{ vault_policies_final | length }} policies ({{ vault_policies | length }} base + {{ (vault_policies_extra | default([])) | length }} extra)"
      - "vault_roles_final: {{ vault_roles_final | length }} roles ({{ vault_roles | length }} base + {{ (vault_roles_extra | default([])) | length }} extra)"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
