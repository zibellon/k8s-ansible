# =============================================================================
# K8s List Certificates — Print `kubectl get certificate -o wide` output to debug log
# =============================================================================
# Utility include. Runs `kubectl get certificate -n <ns> -o wide` and prints
# the result via the `debug` module (visible with default verbosity).
# `failed_when: false` keeps the task green when the underlying CRD is not
# installed in the cluster (relevant for Certificate, IngressRoute, TCP).
#
# Required vars:
#   dto_label_name              — task label prefix
#   dto_certificate_namespace   — K8s namespace
#
# Requires global vars: master_manager_fact
# =============================================================================

- name: "[{{ dto_label_name }}] Assert required dto params are provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
      - dto_certificate_namespace is defined
      - dto_certificate_namespace | length > 0
    fail_msg: "tasks-k8s-list-certificate: dto_label_name and dto_certificate_namespace are required"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Get certificates in namespace {{ dto_certificate_namespace }}"
  command: kubectl get certificate -n {{ dto_certificate_namespace }} -o wide
  register: k8s_list_certificate_result
  changed_when: false
  failed_when: false
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Print certificates in namespace {{ dto_certificate_namespace }}"
  debug:
    var: k8s_list_certificate_result.stdout_lines
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
