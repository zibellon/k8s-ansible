# =============================================================================
# Vault Get — Read a single KV v2 field into a named fact
# =============================================================================
# Reads exactly one field from a Vault KV v2 path and publishes it as a
# named fact. Never fails on missing path or field — callers branch on
# <fact_name>_exists.
#
# Required vars:
#   label_name          — task label prefix
#   dto_vault_get_path      — full KV path incl. mount, e.g. "eso-secret/gitlab/root"
#   dto_vault_get_field     — field to extract (required; one field per call)
#   dto_vault_get_res_fact_name — output fact name (sets <name> and <name>_exists)
#
# Output facts (set on master_manager_fact):
#   {{ dto_vault_get_res_fact_name }}        — string value of the field ('' if missing)
#   {{ dto_vault_get_res_fact_name }}_exists — bool (true only if path exists AND field non-empty)
#
# Requires global vars: vault_namespace, vault_creds_host_path, master_manager_fact
# =============================================================================

- name: "[{{ label_name }}] Assert dto_vault_get_field is provided"
  assert:
    that:
      - dto_vault_get_field is defined
      - dto_vault_get_field | length > 0
    fail_msg: "tasks-vault-get: dto_vault_get_field is required — pass the field name to extract"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Read Vault root token"
  shell: "jq -r '.\"vault-root\"' {{ vault_creds_host_path }}"
  register: _vault_get_token
  changed_when: false
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Fetch secret from Vault"
  shell: |
    kubectl exec -n {{ vault_namespace }} vault-0 -- \
      env VAULT_TOKEN="{{ _vault_get_token.stdout }}" \
      vault kv get -format=json {{ dto_vault_get_path }}
  register: _vault_get_raw
  failed_when: false
  changed_when: false
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Parse Vault response"
  set_fact:
    _vault_get_data: >-
      {{
        {} if (_vault_get_raw.rc != 0 or _vault_get_raw.stdout | length == 0)
        else (_vault_get_raw.stdout | from_json).data.data
      }}
    _vault_get_path_exists: "{{ _vault_get_raw.rc == 0 and _vault_get_raw.stdout | length > 0 }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Set result fact"
  set_fact:
    "{{ dto_vault_get_res_fact_name }}": "{{ _vault_get_data[dto_vault_get_field] | default('') | string }}"
    "{{ dto_vault_get_res_fact_name + '_exists' }}": >-
      {{
        _vault_get_path_exists | bool
        and (_vault_get_data[dto_vault_get_field] | default('') | string | length > 0)
      }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Set fact to all host"
  set_fact:
    "{{ dto_vault_get_res_fact_name }}": "{{ hostvars[master_manager_fact][dto_vault_get_res_fact_name] }}"
    "{{ dto_vault_get_res_fact_name + '_exists' }}": "{{ hostvars[master_manager_fact][dto_vault_get_res_fact_name + '_exists'] }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
