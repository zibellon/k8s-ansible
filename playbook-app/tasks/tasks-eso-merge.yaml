# =============================================================================
# ESO Integrations Merge
# =============================================================================
# Merges per-component base integrations (from hosts.yaml) with extra secrets
# (from hosts-extra.yaml), then derives Vault policies and roles.
#
# Called explicitly by:
#   - vault-install.yaml       (before tasks-vault-policy-sync.yaml)
#   - vault-policy-sync.yaml   (before tasks-vault-policy-sync.yaml)
#   - longhorn-install.yaml    (to get eso_vault_integration_longhorn_merged)
#   - gitlab-install.yaml      (to get eso_vault_integration_gitlab_merged)
#   - argocd-git-ops-install.yaml (to get _merged objects)
#
# Requires variables (from hosts.yaml):
#   - eso_vault_integration_vault
#   - eso_vault_integration_traefik
#   - eso_vault_integration_haproxy
#   - eso_vault_integration_longhorn
#   - eso_vault_integration_gitlab
#   - eso_vault_integration_argocd
#   - eso_vault_integration_argocd_git_ops
#   - eso_vault_integration_vault_extra             (default: {secrets: []})
#   - eso_vault_integration_traefik_extra           (default: {secrets: []})
#   - eso_vault_integration_haproxy_extra           (default: {secrets: []})
#   - eso_vault_integration_longhorn_extra          (default: {secrets: []})
#   - eso_vault_integration_gitlab_extra            (default: {secrets: []})
#   - eso_vault_integration_argocd_extra            (default: {secrets: []})
#   - eso_vault_integration_argocd_git_ops_extra    (default: {secrets: []})
#   - vault_policies (array)
#   - vault_roles    (array)
#   - vault_policies_extra (array, optional)
#   - vault_roles_extra    (array, optional)
#
# Produces:
#   - eso_vault_integration_vault_merged
#   - eso_vault_integration_traefik_merged
#   - eso_vault_integration_haproxy_merged
#   - eso_vault_integration_longhorn_merged
#   - eso_vault_integration_gitlab_merged
#   - eso_vault_integration_argocd_merged
#   - eso_vault_integration_argocd_git_ops_merged
#   - _derived_policies
#   - _derived_roles
#   - vault_policies_final
#   - vault_roles_final
#
# Flow: merge first, then validate on final/merged results.
# =============================================================================

# -------------------------------------------------------------------------
# STAGE 1: Type validation for extra secrets
# -------------------------------------------------------------------------

- name: "[eso-merge] Validate type=default for extra secrets (vault/traefik/haproxy/longhorn/gitlab)"
  fail:
    msg: >-
      Secret '{{ item.1.external_secret_name }}' in eso_vault_integration_{{ item.0.component }}_extra
      has invalid type '{{ item.1.type | default("MISSING") }}'.
      All secrets in hosts-extra.yaml for {{ item.0.component }} must have type: "default".
  when: (item.1.type | default('')) != 'default'
  loop: "{{ _default_only_extras | subelements('secrets') }}"
  loop_control:
    label: "{{ item.0.component }}/{{ item.1.external_secret_name | default('?') }}"
  vars:
    _default_only_extras:
      - { component: vault, secrets: "{{ eso_vault_integration_vault_extra.secrets | default([]) }}" }
      - { component: traefik, secrets: "{{ eso_vault_integration_traefik_extra.secrets | default([]) }}" }
      - { component: haproxy, secrets: "{{ eso_vault_integration_haproxy_extra.secrets | default([]) }}" }
      - { component: longhorn, secrets: "{{ eso_vault_integration_longhorn_extra.secrets | default([]) }}" }
      - { component: gitlab, secrets: "{{ eso_vault_integration_gitlab_extra.secrets | default([]) }}" }
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-merge] Validate type for extra secrets (argocd/argocd_git_ops)"
  fail:
    msg: >-
      Secret '{{ item.1.external_secret_name }}' in eso_vault_integration_{{ item.0.component }}_extra
      has invalid type '{{ item.1.type | default("MISSING") }}'.
      Allowed types: "default", "git_ops_repo_pattern", "git_ops_repo_direct".
  when: >-
    (item.1.type | default('')) not in ['default', 'git_ops_repo_pattern', 'git_ops_repo_direct']
  loop: "{{ _argocd_extras | subelements('secrets') }}"
  loop_control:
    label: "{{ item.0.component }}/{{ item.1.external_secret_name | default('?') }}"
  vars:
    _argocd_extras:
      - { component: argocd, secrets: "{{ eso_vault_integration_argocd_extra.secrets | default([]) }}" }
      - { component: argocd_git_ops, secrets: "{{ eso_vault_integration_argocd_git_ops_extra.secrets | default([]) }}" }
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# -------------------------------------------------------------------------
# STAGE 2: Merge per-component (base + extra)
# -------------------------------------------------------------------------

- name: "[eso-merge] Merge eso_vault_integration_vault + extra"
  set_fact:
    eso_vault_integration_vault_merged: >-
      {{ eso_vault_integration_vault | combine({
           'secrets': eso_vault_integration_vault.secrets + (eso_vault_integration_vault_extra.secrets | default([]))
         })
      }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-merge] Merge eso_vault_integration_traefik + extra"
  set_fact:
    eso_vault_integration_traefik_merged: >-
      {{ eso_vault_integration_traefik | combine({
           'secrets': eso_vault_integration_traefik.secrets
                      + (eso_vault_integration_traefik_extra.secrets | default([]))
         }) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-merge] Merge eso_vault_integration_haproxy + extra"
  set_fact:
    eso_vault_integration_haproxy_merged: >-
      {{ eso_vault_integration_haproxy | combine({
           'secrets': eso_vault_integration_haproxy.secrets
                      + (eso_vault_integration_haproxy_extra.secrets | default([]))
         }) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-merge] Merge eso_vault_integration_longhorn + extra"
  set_fact:
    eso_vault_integration_longhorn_merged: >-
      {{ eso_vault_integration_longhorn | combine({
           'secrets': eso_vault_integration_longhorn.secrets + (eso_vault_integration_longhorn_extra.secrets | default([]))
         })
      }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-merge] Merge eso_vault_integration_gitlab + extra"
  set_fact:
    eso_vault_integration_gitlab_merged: >-
      {{ eso_vault_integration_gitlab | combine({
           'secrets': eso_vault_integration_gitlab.secrets + (eso_vault_integration_gitlab_extra.secrets | default([]))
         })
      }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-merge] Merge eso_vault_integration_argocd + extra"
  set_fact:
    eso_vault_integration_argocd_merged: >-
      {{ eso_vault_integration_argocd | combine({
           'secrets': eso_vault_integration_argocd.secrets + (eso_vault_integration_argocd_extra.secrets | default([]))
         })
      }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-merge] Merge eso_vault_integration_argocd_git_ops + extra"
  set_fact:
    eso_vault_integration_argocd_git_ops_merged: >-
      {{ eso_vault_integration_argocd_git_ops | combine({
           'secrets': eso_vault_integration_argocd_git_ops.secrets + (eso_vault_integration_argocd_git_ops_extra.secrets | default([]))
         })
      }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# -------------------------------------------------------------------------
# STAGE 3: Build combined integrations list
# -------------------------------------------------------------------------

- name: "[eso-merge] Build combined integrations list"
  set_fact:
    _all_eso_integrations:
      - "{{ eso_vault_integration_vault_merged }}"
      - "{{ eso_vault_integration_traefik_merged }}"
      - "{{ eso_vault_integration_haproxy_merged }}"
      - "{{ eso_vault_integration_longhorn_merged }}"
      - "{{ eso_vault_integration_gitlab_merged }}"
      - "{{ eso_vault_integration_argocd_merged }}"
      - "{{ eso_vault_integration_argocd_git_ops_merged }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# -------------------------------------------------------------------------
# STAGE 4: Validate merged components
# -------------------------------------------------------------------------
# Checking uniqueness on merged (base+extra) catches all three scenarios:
#   - duplicate within base -> merged has duplicate -> fail
#   - duplicate within extra -> merged has duplicate -> fail
#   - collision between base and extra -> merged has duplicate -> fail

- name: "[eso-merge] Check unique external_secret_name per component (merged)"
  fail:
    msg: >-
      Duplicate external_secret_name in {{ item.namespace }} (merged base+extra).
      Duplicates: {{ _names | difference(_names | unique) }}
  vars:
    _names: "{{ item.secrets | map(attribute='external_secret_name') | list }}"
  when: _names | length != _names | unique | length
  loop: "{{ _all_eso_integrations }}"
  loop_control:
    label: "{{ item.namespace }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-merge] Check unique target_secret_name per component (merged)"
  fail:
    msg: >-
      Duplicate target_secret_name in {{ item.namespace }} (merged base+extra).
      Duplicates: {{ _names | difference(_names | unique) }}
  vars:
    _names: "{{ item.secrets | map(attribute='target_secret_name') | list }}"
  when: _names | length != _names | unique | length
  loop: "{{ _all_eso_integrations }}"
  loop_control:
    label: "{{ item.namespace }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# argocd and argocd_git_ops both live in namespace "argocd" — the only case
# where two eso_vault_integration_XXX share a namespace. Colliding names
# would create duplicate k8s resources in the same namespace.

- name: "[eso-merge] CRITICAL: argocd vs argocd_git_ops - no external_secret_name collision"
  fail:
    msg: >-
      CONFLICT: external_secret_name collision between eso_vault_integration_argocd
      and eso_vault_integration_argocd_git_ops (both namespace=argocd).
      Colliding names: {{ _overlap }}.
      This would create duplicate ExternalSecret resources in namespace argocd.
  vars:
    _argocd_names: "{{ eso_vault_integration_argocd_merged.secrets | map(attribute='external_secret_name') | list }}"
    _git_ops_names: "{{ eso_vault_integration_argocd_git_ops_merged.secrets | map(attribute='external_secret_name') | list }}"
    _overlap: "{{ _argocd_names | intersect(_git_ops_names) }}"
  when: _overlap | length > 0
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-merge] CRITICAL: argocd vs argocd_git_ops - no target_secret_name collision"
  fail:
    msg: >-
      CONFLICT: target_secret_name collision between eso_vault_integration_argocd
      and eso_vault_integration_argocd_git_ops (both namespace=argocd).
      Colliding names: {{ _overlap }}.
      This would create duplicate Secret resources in namespace argocd.
  vars:
    _argocd_names: "{{ eso_vault_integration_argocd_merged.secrets | map(attribute='target_secret_name') | list }}"
    _git_ops_names: "{{ eso_vault_integration_argocd_git_ops_merged.secrets | map(attribute='target_secret_name') | list }}"
    _overlap: "{{ _argocd_names | intersect(_git_ops_names) }}"
  when: _overlap | length > 0
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# -------------------------------------------------------------------------
# STAGE 5: Derive policies and roles from merged integrations
# -------------------------------------------------------------------------

- name: "[eso-merge] Initialize derived lists"
  set_fact:
    _derived_policies: []
    _derived_roles: []
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-merge] Derive policies from integration secrets"
  set_fact:
    _derived_policies: >-
      {{ _derived_policies + [{
        'name': item.0.namespace ~ '_' ~ item.1.external_secret_name,
        'paths': [
          {
            'path': item.0.kv_engine_path ~ '/data' ~ item.1.vault_path,
            'capabilities': ['read', 'list']
          },
          {
            'path': item.0.kv_engine_path ~ '/metadata' ~ item.1.vault_path,
            'capabilities': ['read', 'list']
          }
        ]
      }] }}
  loop: "{{ _all_eso_integrations | subelements('secrets') }}"
  loop_control:
    label: "{{ item.0.namespace }}_{{ item.1.external_secret_name }}"
  when:
    - item.0.is_need_eso | default(true)
    - item.1.is_need_eso | default(true)
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-merge] Derive roles from integrations"
  set_fact:
    _derived_roles: >-
      {{ _derived_roles + [{
        'name': item.role_name,
        'namespace': item.namespace,
        'sa_name': item.sa_name,
        'policies': (
            (item.secrets | selectattr('is_need_eso', 'undefined') | list)
            + (item.secrets | selectattr('is_need_eso', 'defined') | rejectattr('is_need_eso', 'equalto', false) | list)
          )
          | map(attribute='external_secret_name')
          | map('regex_replace', '^', item.namespace ~ '_') | list
      }] }}
  loop: "{{ _all_eso_integrations }}"
  loop_control:
    label: "{{ item.namespace }}"
  when: item.is_need_eso | default(true)
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# -------------------------------------------------------------------------
# STAGE 6: Build final policy/role lists + validate uniqueness
# -------------------------------------------------------------------------

- name: "[eso-merge] Merge all policy and role sources into final lists"
  set_fact:
    vault_policies_final: "{{ _derived_policies + vault_policies + (vault_policies_extra | default([])) }}"
    vault_roles_final: "{{ _derived_roles + vault_roles + (vault_roles_extra | default([])) }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-merge] Final uniqueness check - policies"
  fail:
    msg: >-
      Duplicate policy names in vault_policies_final:
      {{ _names | difference(_names | unique) }}
  vars:
    _names: "{{ vault_policies_final | map(attribute='name') | list }}"
  when: _names | length != _names | unique | length
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[eso-merge] Final uniqueness check - roles"
  fail:
    msg: >-
      Duplicate role names in vault_roles_final:
      {{ _names | difference(_names | unique) }}
  vars:
    _names: "{{ vault_roles_final | map(attribute='name') | list }}"
  when: _names | length != _names | unique | length
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

# -------------------------------------------------------------------------
# Summary
# -------------------------------------------------------------------------

- name: "[eso-merge] Show merge summary"
  debug:
    msg:
      - "Merged integrations: vault={{ eso_vault_integration_vault_merged.secrets | length }} secrets, traefik={{ eso_vault_integration_traefik_merged.secrets | length }} secrets, haproxy={{ eso_vault_integration_haproxy_merged.secrets | length }} secrets, longhorn={{ eso_vault_integration_longhorn_merged.secrets | length }} secrets, gitlab={{ eso_vault_integration_gitlab_merged.secrets | length }} secrets, argocd={{ eso_vault_integration_argocd_merged.secrets | length }} secrets, argocd-git-ops={{ eso_vault_integration_argocd_git_ops_merged.secrets | length }} secrets"
      - "Derived: {{ _derived_policies | length }} policies, {{ _derived_roles | length }} roles"
      - "Manual (vault_policies/vault_roles): {{ vault_policies | length }} policies, {{ vault_roles | length }} roles"
      - "Extra (hosts-extra.yaml): {{ (vault_policies_extra | default([])) | length }} policies, {{ (vault_roles_extra | default([])) | length }} roles"
      - "Final totals: {{ vault_policies_final | length }} policies, {{ vault_roles_final | length }} roles"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
