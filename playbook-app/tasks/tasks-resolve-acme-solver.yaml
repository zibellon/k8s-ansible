# =============================================================================
# Resolve ACME solver pod labels from cert-manager ClusterIssuer
# =============================================================================
# Params:
#   - label_name:                   Label prefix for task names (e.g. "longhorn-install-init")
#   - cluster_issuer_name:          Name of ClusterIssuer to look up in cert_manager_cluster_issuers
#   - ingress_class_name:           ingressClass to match inside issuer.solvers
#   - acme_cluster_issuer_result_var: Variable name to store the resolved ClusterIssuer object
#   - acme_solver_result_var:        Variable name to store the resolved solver object
#   - acme_pod_labels_result_var:    Variable name to store solver.podLabels
# =============================================================================

- name: "[{{ label_name }}] Resolve ClusterIssuer"
  set_fact:
    _acme_resolved_issuer: >-
      {{ cert_manager_cluster_issuers
         | selectattr('name', 'equalto', cluster_issuer_name)
         | list | first | default(none) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Validate ClusterIssuer exists"
  assert:
    that: _acme_resolved_issuer is not none
    fail_msg: >-
      cluster_issuer_name='{{ cluster_issuer_name }}'
      not found in cert_manager_cluster_issuers
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Resolve ACME solver by ingressClass"
  set_fact:
    _acme_resolved_solver: >-
      {{ _acme_resolved_issuer.solvers
         | selectattr('ingressClass', 'equalto', ingress_class_name)
         | list | first | default(none) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Validate ACME solver exists"
  assert:
    that: _acme_resolved_solver is not none
    fail_msg: >-
      No solver with ingressClass='{{ ingress_class_name }}'
      found in ClusterIssuer '{{ cluster_issuer_name }}'
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Set ACME solver result vars"
  set_fact:
    "{{ acme_cluster_issuer_result_var }}": "{{ _acme_resolved_issuer }}"
    "{{ acme_solver_result_var }}": "{{ _acme_resolved_solver }}"
    "{{ acme_pod_labels_result_var }}": "{{ _acme_resolved_solver.podLabels }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
