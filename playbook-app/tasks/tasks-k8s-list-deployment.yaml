# =============================================================================
# K8s List Deployments — Print `kubectl get deployment -o wide` output to debug log
# =============================================================================
# Utility include. Runs `kubectl get deployment -n <ns> -o wide` and prints
# the result via the `debug` module (visible with default verbosity).
# `failed_when: false` keeps the task green when the underlying CRD is not
# installed in the cluster (relevant for Certificate, IngressRoute, TCP).
#
# Required vars:
#   dto_label_name              — task label prefix
#   dto_deployment_namespace    — K8s namespace
#
# Requires global vars: master_manager_fact
# =============================================================================

- name: "[{{ dto_label_name }}] Assert required dto params are provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
      - dto_deployment_namespace is defined
      - dto_deployment_namespace | length > 0
    fail_msg: "tasks-k8s-list-deployment: dto_label_name and dto_deployment_namespace are required"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Get deployments in namespace {{ dto_deployment_namespace }}"
  command: kubectl get deployment -n {{ dto_deployment_namespace }} -o wide
  register: k8s_list_deployment_result
  changed_when: false
  failed_when: false
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Print deployments in namespace {{ dto_deployment_namespace }}"
  debug:
    var: k8s_list_deployment_result.stdout_lines
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
