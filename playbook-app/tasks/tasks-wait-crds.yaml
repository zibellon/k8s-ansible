# =============================================================================
# Wait for CRDs to be established
# =============================================================================
# Params:
#   - dto_label_name: Label for task names (used in logs)
#   - dto_crds_list: List of CRD names (with crd/ prefix)
#   - crds_wait: Dict with timeout, retries, delay (from hosts.yaml)
# =============================================================================

- name: "[{{ dto_label_name }}] Assert all dto params are provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
      - dto_crds_list is defined
      - dto_crds_list is sequence
      - dto_crds_list | length > 0
    fail_msg: >-
      tasks-wait-crds: all params required:
      dto_label_name, dto_crds_list (non-empty list)
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Wait for CRDs to be established"
  command: >
    kubectl wait --for=condition=Established
    {{ dto_crds_list | join(' ') }}
    --timeout={{ crds_wait.timeout }}
  register: crds_wait_result
  until: crds_wait_result.rc == 0
  retries: "{{ crds_wait.retries }}"
  delay: "{{ crds_wait.delay }}"
  changed_when: false
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
