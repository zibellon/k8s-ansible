# =============================================================================
# Helm Template + Kustomize Build — Prepare -k/ chart artifact for helm install
# =============================================================================
# Runs helm template to render a LOCAL_CUSTOM or KUSTOMIZE_WRAPPER chart,
# then applies kustomize patches and
# writes the resulting all.yaml into a fresh chart dir ready for helm install.
#
# Workflow on master_manager_fact:
#   1. Create staging dir  (dto_kustomize_tmp_dir)
#   2. helm template       → dto_kustomize_tmp_dir/template-output.yaml
#   3. Render kustomization.yaml in staging (patches only — namespace transformer intentionally NOT applied; multi-namespace charts depend on per-template namespace declarations rendered by helm template)
#   4. Create output dir   (dto_kustomize_final_dir/templates/)
#   5. Copy Chart.yaml     → dto_kustomize_final_dir/Chart.yaml
#   6. kubectl kustomize   → dto_kustomize_final_dir/templates/all.yaml
#
# Required params:
#   dto_label_name         — task label prefix
#   dto_release_name       — helm release name (used for helm template)
#   dto_chart_remote_dest  — source chart path on master (no trailing /)
#   dto_values_file_path   — path to values-override.yaml for helm template --values
#   dto_kustomize_tmp_dir  — staging directory (no trailing /)
#   dto_kustomize_final_dir — output directory (no trailing /)
#   dto_patches_list       — kustomize patches list (empty [] is valid)
#   dto_target_namespace   — passed to helm template --namespace (for .Release.Namespace)
#
# Optional params:
#   dto_kustomize_apply_namespace_transform — bool (default false). If true, kustomize
#     `namespace:` builtin transformer is applied (rewrites metadata.namespace on every
#     namespaced resource + subjects[].namespace in (Cluster)RoleBinding). Use ONLY for
#     KUSTOMIZE_WRAPPER phases (argocd/install, mon-system/prometheus-operator) where
#     pristine upstream YAML has hardcoded namespaces that need rebind to operator's
#     target namespace. Do NOT use for LOCAL_CUSTOM phases — they have multi-namespace
#     templates that would collapse into one namespace.
#
# Output: dto_kustomize_final_dir/templates/all.yaml + Chart.yaml
# Caller then runs tasks-helm-upgrade-async.yaml (or helm upgrade directly)
#   pointing at dto_kustomize_final_dir as the chart.
# =============================================================================

- name: "[{{ dto_label_name }}] Set defaults for optional params"
  set_fact:
    dto_kustomize_apply_namespace_transform: "{{ dto_kustomize_apply_namespace_transform | default(false) }}"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Assert all dto params are provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
      - dto_release_name is defined
      - dto_release_name | length > 0
      - dto_chart_remote_dest is defined
      - dto_chart_remote_dest | length > 0
      - dto_values_file_path is defined
      - dto_values_file_path | length > 0
      - dto_kustomize_tmp_dir is defined
      - dto_kustomize_tmp_dir | length > 0
      - dto_kustomize_final_dir is defined
      - dto_kustomize_final_dir | length > 0
      - dto_patches_list is defined
      - dto_patches_list is sequence
      - dto_target_namespace is defined
      - dto_target_namespace | length > 0
      - dto_kustomize_apply_namespace_transform is defined
      - dto_kustomize_apply_namespace_transform is boolean
    fail_msg: >-
      tasks-helm-template-kustomize-build: all 8 params required:
      dto_label_name, dto_release_name, dto_chart_remote_dest, dto_values_file_path,
      dto_kustomize_tmp_dir, dto_kustomize_final_dir, dto_patches_list (sequence), dto_target_namespace
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Create staging dir"
  file:
    path: "{{ dto_kustomize_tmp_dir }}"
    state: directory
    mode: "0755"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true

- name: "[{{ dto_label_name }}] helm template into staging"
  shell: >-
    helm template {{ dto_release_name }} {{ dto_chart_remote_dest }}
    --values {{ dto_values_file_path }}
    --namespace {{ dto_target_namespace }}
    > {{ dto_kustomize_tmp_dir }}/template-output.yaml
  changed_when: true
  delegate_to: "{{ master_manager_fact }}"
  run_once: true

- name: "[{{ dto_label_name }}] Render kustomization.yaml in staging"
  copy:
    dest: "{{ dto_kustomize_tmp_dir }}/kustomization.yaml"
    mode: "0644"
    content: |
      {% if dto_kustomize_apply_namespace_transform %}
      namespace: {{ dto_target_namespace }}
      {% endif %}
      resources:
        - template-output.yaml
      patches: {{ dto_patches_list | to_json }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true

- name: "[{{ dto_label_name }}] Create output templates dir"
  file:
    path: "{{ dto_kustomize_final_dir }}/templates"
    state: directory
    mode: "0755"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true

- name: "[{{ dto_label_name }}] Copy Chart.yaml to output dir"
  copy:
    src: "{{ dto_chart_remote_dest }}/Chart.yaml"
    dest: "{{ dto_kustomize_final_dir }}/Chart.yaml"
    remote_src: true
    mode: "0644"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true

- name: "[{{ dto_label_name }}] kubectl kustomize into output templates/all.yaml"
  shell: "kubectl kustomize {{ dto_kustomize_tmp_dir }} > {{ dto_kustomize_final_dir }}/templates/all.yaml"
  changed_when: true
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
