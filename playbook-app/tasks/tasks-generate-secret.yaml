# =============================================================================
# Generate Secret — Generate a random value and store as a named fact
# =============================================================================
# Generates a single cryptographically-random string and publishes it
# as a named fact on master_manager_fact. Never logs the value.
#
# Required vars:
#   label_name         — task label prefix
#   dto_generate_fact_name — output fact name
#
# Optional vars:
#   generate_length  — character count (default: 32)
#   generate_chars   — character set  (default: ascii_letters,digits)
#
# Output fact (set on master_manager_fact):
#   {{ dto_generate_fact_name }} — generated string
#
# Requires global vars: master_manager_fact
# =============================================================================

- name: "[{{ label_name }}] Assert all dto params are provided"
  assert:
    that:
      - label_name is defined
      - label_name | length > 0
      - dto_generate_fact_name is defined
      - dto_generate_fact_name | length > 0
    fail_msg: "tasks-generate-secret: all params required: label_name, dto_generate_fact_name"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ label_name }}] Generate secret"
  set_fact:
    "{{ dto_generate_fact_name }}": >-
      {{ lookup('password', '/dev/null length='
         + (generate_length | default(32) | string)
         + ' chars=' + (generate_chars | default('ascii_letters,digits'))) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
