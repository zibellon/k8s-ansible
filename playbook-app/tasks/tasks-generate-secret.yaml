# =============================================================================
# Generate Secret — Generate a random value and store as a named fact
# =============================================================================
# Generates a single cryptographically-random string with deterministic
# character-class guarantees (exact counts of digits / uppercase / lowercase /
# special) via the password_generate filter, and publishes it as a named fact
# on master_manager_fact. Never logs the value.
#
# Required vars:
#   dto_label_name         — task label prefix
#   dto_generate_fact_name — output fact name
#
# Optional vars (defaults sum to 32 with special = 0 — preserves all callers
# that pass only label + fact_name; ZITADEL masterkey requires exactly 32):
#   dto_generate_count_digits    — digit count       (default: 8)
#   dto_generate_count_upper     — uppercase count    (default: 12)
#   dto_generate_count_lower     — lowercase count    (default: 12)
#   dto_generate_count_special   — special count      (default: 0)
#   dto_generate_charset_digits  — digit charset      (default: 0123456789)
#   dto_generate_charset_letters — letter charset     (default: a-z)
#   dto_generate_charset_special — special charset    (default: !@#%^&*-_=+)
#
# Output fact (set on master_manager_fact):
#   {{ dto_generate_fact_name }} — generated string (length = sum of counts)
#
# Requires global vars: master_manager_fact
# =============================================================================

- name: "[{{ dto_label_name }}] Assert all dto params are provided"
  assert:
    that:
      - dto_label_name is defined
      - dto_label_name | length > 0
      - dto_generate_fact_name is defined
      - dto_generate_fact_name | length > 0
    fail_msg: "tasks-generate-secret: all params required: dto_label_name, dto_generate_fact_name"
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]

- name: "[{{ dto_label_name }}] Generate secret"
  set_fact:
    "{{ dto_generate_fact_name }}": >-
      {{ (dto_generate_count_digits | default(8))
         | password_generate(
             dto_generate_count_upper | default(12),
             dto_generate_count_lower | default(12),
             dto_generate_count_special | default(0),
             dto_generate_charset_digits | default('0123456789'),
             dto_generate_charset_letters | default('abcdefghijklmnopqrstuvwxyz'),
             dto_generate_charset_special | default('!@#%^&*-_=+')) }}
  delegate_to: "{{ master_manager_fact }}"
  run_once: true
  tags: [always]
