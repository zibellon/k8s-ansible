# =============================================================================
# ARGOCD RESTART
# Restarts all ArgoCD components to apply ConfigMap changes
# =============================================================================
# Usage:
#   ansible-playbook -i hosts-vars/ -i hosts-vars-override/ playbook-app/argocd-restart.yaml
#
# ArgoCD does not automatically reload ConfigMaps.
# This playbook performs graceful rolling restart of all components.
# =============================================================================

- name: Restart ArgoCD components
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[argocd-restart-pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-pre-check.yaml"
      vars:
        dto_label_name: "argocd-restart-pre-check"

    # -------------------------------------------------------------------------
    # PRE-CHECK: Verify ArgoCD is installed
    # -------------------------------------------------------------------------

    - name: "[argocd-restart] Check if ArgoCD namespace exists"
      command: kubectl get namespace {{ argocd_namespace }}
      register: _local_namespace_check
      changed_when: false
      failed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    - name: "[argocd-restart] Fail if ArgoCD is not installed"
      fail:
        msg: "ArgoCD namespace '{{ argocd_namespace }}' not found. Install ArgoCD first."
      when: _local_namespace_check.rc != 0
      run_once: true

    - name: "[argocd-restart] Show pods in {{ argocd_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "argocd-restart"
        dto_pods_namespace: "{{ argocd_namespace }}"

    # -------------------------------------------------------------------------
    # RESTART STATEFULSET
    # -------------------------------------------------------------------------

    - name: "[argocd-restart] Restart ArgoCD StatefulSet (application-controller)"
      command: kubectl rollout restart statefulset/argocd-application-controller -n {{ argocd_namespace }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    # -------------------------------------------------------------------------
    # RESTART DEPLOYMENTS
    # -------------------------------------------------------------------------

    - name: "[argocd-restart] Restart ArgoCD Deployments"
      command: kubectl rollout restart deployment/{{ item }} -n {{ argocd_namespace }}
      loop:
        - argocd-applicationset-controller
        - argocd-dex-server
        - argocd-notifications-controller
        - argocd-redis
        - argocd-repo-server
        - argocd-server
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    # -------------------------------------------------------------------------
    # WAIT FOR ROLLOUTS TO COMPLETE
    # -------------------------------------------------------------------------

    - name: "[argocd-restart] Wait for rollouts"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "argocd-restart"
        dto_rollout_namespace: "{{ argocd_namespace }}"
        dto_rollout_timeout: "{{ argocd_rollout_timeout }}"
        dto_rollout_resources_list:
          - statefulset/argocd-application-controller
          - deployment/argocd-applicationset-controller
          - deployment/argocd-dex-server
          - deployment/argocd-notifications-controller
          - deployment/argocd-redis
          - deployment/argocd-repo-server
          - deployment/argocd-server

    # -------------------------------------------------------------------------
    # VERIFY RESTART
    # -------------------------------------------------------------------------

    - name: "[argocd-verify] Show pods in {{ argocd_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "argocd-verify"
        dto_pods_namespace: "{{ argocd_namespace }}"

    - name: "[argocd-verify] Restart completed"
      debug:
        msg:
          - "=== ArgoCD Restart Complete ==="
          - "All components have been restarted and are ready."
          - "ConfigMap changes are now applied."
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
