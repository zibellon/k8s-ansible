# =============================================================================
# Install Vector via local Helm charts
# Steps:
#   1. pre:     NetworkPolicies (in vector ns + cross-namespace in loki ns)
#   2. install: ServiceAccount + ClusterRole + ClusterRoleBinding + ConfigMap + DaemonSet
#
# Usage (tags):
#   ansible-playbook mon-vector-install.yaml              # full install
#   ansible-playbook mon-vector-install.yaml --tags pre   # only NetworkPolicies
#   ansible-playbook mon-vector-install.yaml --tags install
# =============================================================================

- name: Install Vector via local Helm chart
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[vector-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        dto_label_name: "vector-pre-check"
      tags: [always]

    - name: "[vector-pre-check] Forbid kube-system namespace"
      include_tasks: tasks/tasks-forbid-kube-system.yaml
      vars:
        dto_label_name: "vector-pre-check"
        dto_target_namespace: "{{ vector_namespace }}"
      tags: [always]

    # =========================================================================
    # STEP 1: PRE (NetworkPolicies)
    # =========================================================================

    - name: "[vector-pre] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        dto_label_name: "vector-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/mon-vector/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-vector/pre"
      tags: [pre]

    - name: "[vector-pre] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        dto_label_name: "vector-pre"
        dto_dir: "{{ remote_charts_dir }}/mon-vector/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ vector_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[vector-pre] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        dto_label_name: "vector-pre"
        dto_helm_command: >
          helm upgrade --install vector-pre {{ remote_charts_dir }}/mon-vector/pre
          --namespace {{ vector_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/mon-vector/pre/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ vector_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: INSTALL (SA + ClusterRole + ClusterRoleBinding + ConfigMap + DaemonSet)
    # =========================================================================

    - name: "[vector-install] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        dto_label_name: "vector-install"
        dto_chart_name: "install"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/mon-vector/install/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-vector/install"
      tags: [install]

    - name: "[vector-install] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        dto_label_name: "vector-install"
        dto_dir: "{{ remote_charts_dir }}/mon-vector/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ vector_install_helm_values | to_nice_yaml }}"
      tags: [install]

    - name: "[vector-install] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        dto_label_name: "vector-install"
        dto_helm_command: >
          helm upgrade --install vector {{ remote_charts_dir }}/mon-vector/install
          --namespace {{ vector_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/mon-vector/install/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ vector_install_helm_timeout }}
      tags: [install]

    - name: "[vector-install] Wait for rollout"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        dto_label_name: "vector-install"
        dto_rollout_namespace: "{{ vector_namespace }}"
        dto_rollout_timeout: "{{ vector_rollout_timeout }}"
        dto_rollout_resources_list:
          - daemonset/vector
      tags: [install]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[vector-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        dto_helm_namespace: "{{ vector_namespace }}"
        dto_label_name: "vector-verify"
      tags: [always]

    - name: "[vector-verify] Show pods in {{ vector_namespace }}"
      include_tasks: tasks/tasks-k8s-list-pods.yaml
      vars:
        dto_label_name: "vector-verify"
        dto_pods_namespace: "{{ vector_namespace }}"
      tags: [always]

    - name: "[vector-verify] Verify NetworkPolicies in {{ vector_namespace }}"
      command: kubectl get networkpolicies -n {{ vector_namespace }}
      register: vector_np_verify
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[vector-verify] Show NetworkPolicies in {{ vector_namespace }}"
      debug:
        var: vector_np_verify.stdout_lines
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[vector-verify] Verify cross-namespace NetworkPolicy in {{ loki_namespace }}"
      command: kubectl get networkpolicies -n {{ loki_namespace }}
      register: loki_np_verify
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[vector-verify] Show NetworkPolicies in {{ loki_namespace }}"
      debug:
        var: loki_np_verify.stdout_lines
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[vector-verify] Installation complete"
      debug:
        msg:
          - "vector-pre + vector: OK"
          - "Namespace: {{ vector_namespace }}"
          - "Image: {{ vector_image_name }}:{{ vector_image_tag }}"
          - "Cross-namespace NP 'vector-allow-loki' should be visible in {{ loki_namespace }} ns above"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
