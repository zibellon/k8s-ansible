# =============================================================================
# Install ArgoCD via local Helm charts
# Steps:
#   1. argocd/pre: NetworkPolicies + ESO (ServiceAccount, SecretStore, ExternalSecret)
#   2. argocd/install: CRDs + ArgoCD manifests
#   3. argocd/post: Ingress (UI + RPC) + default AppProject
#
# Usage (tags):
#   ansible-playbook argocd-install.yaml              # full install
#   ansible-playbook argocd-install.yaml --tags pre   # only pre (NetworkPolicies + ESO)
#   ansible-playbook argocd-install.yaml --tags install
#   ansible-playbook argocd-install.yaml --tags post  # only post (Ingress + AppProject)
#
# NOTE: Admin password management → argocd-configure.yaml
# =============================================================================

- name: Install ArgoCD via local Helm chart
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[argocd-install-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        label_name: "argocd-install-pre-check"
      tags: [always]

    - name: "[argocd-install-pre-check] Forbid kube-system namespace"
      include_tasks: tasks/tasks-forbid-kube-system.yaml
      vars:
        label_name: "argocd-install-pre-check"
        dto_target_namespace: "{{ argocd_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations and resolve ArgoCD config
    # =========================================================================

    - name: "[argocd-install-init] Merge ESO integrations"
      include_tasks: tasks/tasks-eso-merge.yaml
      tags: [always]


    # =========================================================================
    # INIT: Resolve ClusterIssuer + ACME solver pod labels
    # =========================================================================

    - name: "[argocd-install-init] Resolve ACME solver"
      include_tasks: tasks/tasks-resolve-acme-solver.yaml
      vars:
        label_name: argocd-install-init
        cluster_issuer_name: "{{ argocd_cluster_issuer_name }}"
        ingress_class_name: "{{ argocd_ingress_class_name }}"
        acme_cluster_issuer_result_var: "argocd_ui_acme_cluster_issuer"
        acme_solver_result_var: "argocd_ui_acme_solver"
        acme_pod_labels_result_var: "argocd_acme_solver_pod_labels"
      tags: [always]

    # =========================================================================
    # STEP 1: ARGOCD/INSTALL (CRDs + ArgoCD manifests)
    # =========================================================================

    - name: "[argocd-install-crds] Copy crds chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "argocd-install-crds"
        dto_chart_name: "crds"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/argocd/crds/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/argocd/crds"
      tags: [crds]

    - name: "[argocd-install-crds] Install argocd-crds via kubectl"
      command: kubectl create -f {{ remote_charts_dir }}/argocd/crds/crds.yaml
      failed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [crds]

    - name: "[argocd-install-crds] Wait for CRDs"
      include_tasks: tasks/tasks-wait-crds.yaml
      vars:
        label_name: "argocd-install-crds"
        crds_list:
          - crd/applications.argoproj.io
          - crd/applicationsets.argoproj.io
          - crd/appprojects.argoproj.io
      tags: [crds]

    # =========================================================================
    # STEP 2: ARGOCD/PRE (NetworkPolicies + ESO resources)
    # =========================================================================

    - name: "[argocd-pre] Copy pre chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "argocd-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/argocd/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/argocd/pre"
      tags: [pre]

    - name: "[argocd-pre] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/argocd/pre/values-override.yaml"
        mode: "0600"
        content: |
          namespace: {{ argocd_namespace }}
          traefik:
            namespace: {{ traefik_namespace }}
            instanceName: traefik-{{ traefik_namespace }}
          gitlab:
            namespace: {{ gitlab_namespace }}
            sshPortInternal: {{ gitlab_ssh_port_internal }}
          gitlabRunner:
            namespace: {{ gitlab_runner_namespace }}
          gitlabRunnerJob:
            name: {{ gitlab_runner_job_label_name }}
            component: {{ gitlab_runner_job_label_component }}
          eso:
            vaultServerUrl: {{ vault_internal_url }}
            saName: {{ eso_vault_integration_argocd.sa_name }}
            roleName: {{ eso_vault_integration_argocd.role_name }}
            secretStoreName: {{ eso_vault_integration_argocd.secret_store_name }}
            kvEnginePath: {{ eso_vault_integration_argocd.kv_engine_path }}
            isNeedEso: {{ eso_vault_integration_argocd.is_need_eso | default(true) }}
            secrets: {{ eso_vault_integration_argocd_secrets_merged | to_json }}
          esoResourcesConfig:
            secretStoreRefreshInterval: {{ eso_resources_config.secret_store_refresh_interval }}
            externalSecretRefreshInterval: {{ eso_resources_config.external_secret_refresh_interval }}
            externalSecretRefreshPolicy: {{ eso_resources_config.external_secret_refresh_policy }}
          configMaps:
            argocdCm:
              data: {{ argocd_cm_extra | to_json }}
            cmdParamsCm:
              data: {{ argocd_cm_cmd_params_extra | to_json }}
            gpgKeysCm:
              data: {{ argocd_cm_gpg_keys_extra | to_json }}
            notificationsCm:
              data: {{ argocd_cm_notifications_extra | to_json }}
            rbacCm:
              data: {{ argocd_cm_rbac_extra | to_json }}
            sshKnownHostsCm:
              additional: {{ argocd_cm_ssh_known_hosts_extra | to_json }}
            tlsCertsCm:
              data: {{ argocd_cm_tls_certs_extra | to_json }}
          acmeSolverLabels: {{ argocd_acme_solver_pod_labels | to_json }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [pre]

    - name: "[argocd-pre] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "argocd-pre"
        dto_helm_command: >
          helm upgrade --install argocd-pre {{ remote_charts_dir }}/argocd/pre
          --namespace {{ argocd_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/argocd/pre/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ argocd_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 3: ARGOCD/INSTALL (ArgoCD manifests)
    # =========================================================================

    - name: "[argocd-install] Copy install chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "argocd-install"
        dto_chart_name: "install"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/argocd/install/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/argocd/install"
      tags: [install]

    - name: "[argocd-install] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/argocd/install/values-override.yaml"
        mode: "0600"
        content: |
          namespace: {{ argocd_namespace }}
          global:
            image:
              mainWithRegistry: "{{ argocd_image_main_with_registry }}"
              mainTag: "{{ argocd_image_main_tag }}"
              dexWithRegistry: "{{ argocd_image_dex_with_registry }}"
              dexTag: "{{ argocd_image_dex_tag }}"
              redisWithRegistry: "{{ argocd_image_redis_with_registry }}"
              redisTag: "{{ argocd_image_redis_tag }}"
          tolerations: {{ argocd_tolerations | to_json }}
          nodeSelector: {{ argocd_node_selector | to_json }}
          resources:
            applicationController: {{ argocd_resources_application_controller | to_json }}
            applicationsetController: {{ argocd_resources_applicationset_controller | to_json }}
            dexServer: {{ argocd_resources_dex_server | to_json }}
            notificationsController: {{ argocd_resources_notifications_controller | to_json }}
            redis: {{ argocd_resources_redis | to_json }}
            repoServer: {{ argocd_resources_repo_server | to_json }}
            server: {{ argocd_resources_server | to_json }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[argocd-install] Install or upgrade argocd via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "argocd-install"
        dto_helm_command: >
          helm upgrade --install argocd {{ remote_charts_dir }}/argocd/install
          --namespace {{ argocd_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/argocd/install/values-override.yaml
          --cleanup-on-fail
          --skip-crds
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ argocd_install_helm_timeout }}
      tags: [install]

    # =========================================================================
    # WAIT FOR ARGOCD TO BE READY
    # =========================================================================

    - name: "[argocd-install] Wait for rollouts"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "argocd-install"
        rollout_namespace: "{{ argocd_namespace }}"
        rollout_timeout: "{{ argocd_rollout_timeout }}"
        rollout_resources:
          - statefulset/argocd-application-controller
          - deployment.apps/argocd-applicationset-controller
          - deployment.apps/argocd-dex-server
          - deployment.apps/argocd-notifications-controller
          - deployment.apps/argocd-redis
          - deployment.apps/argocd-repo-server
          - deployment.apps/argocd-server
      tags: [install]

    # =========================================================================
    # STEP 4: ARGOCD/POST (Ingress UI + RPC + default AppProject)
    # =========================================================================

    - name: "[argocd-post] Copy post chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "argocd-post"
        dto_chart_name: "post"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/argocd/post/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/argocd/post"
      tags: [post]

    - name: "[argocd-post] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/argocd/post/values-override.yaml"
        mode: "0600"
        content: |
          namespace: {{ argocd_namespace }}
          ingress:
            uiDomain: {{ argocd_ui_domain }}
            rpcDomain: {{ argocd_rpc_domain }}
            ingressClass: {{ argocd_ingress_class_name }}
            clusterIssuer: {{ argocd_cluster_issuer_name }}
            uiSecretName: {{ argocd_ui_https_secret_name }}
            rpcSecretName: {{ argocd_rpc_https_secret_name }}
            vpnOnlyEnabled: {{ argocd_vpn_only_enabled }}
            vpnIngressRouteMiddlewares: {{ vpn_ingress_route_middlewares | to_json }}
            httpEnable: {{ argocd_ingress_http_enable }}
            httpsEnable: {{ argocd_ingress_https_enable }}
          traefik:
            namespace: {{ traefik_namespace }}
            entryPoints:
              web: {{ traefik_web_entrypoint }}
              websecure: {{ traefik_websecure_entrypoint }}
          serviceMonitor:
            enabled: {{ argocd_service_monitor_enabled }}
            interval: "{{ argocd_service_monitor_interval }}"
            scrapeTimeout: "{{ argocd_service_monitor_scrape_timeout }}"
            labels: {{ argocd_service_monitor_additional_labels | to_json }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [post]

    - name: "[argocd-post] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "argocd-post"
        dto_helm_command: >
          helm upgrade --install argocd-post {{ remote_charts_dir }}/argocd/post
          --namespace {{ argocd_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/argocd/post/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ argocd_post_helm_timeout }}
      tags: [post]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[argocd-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        dto_helm_namespace: "{{ argocd_namespace }}"
        label_name: "argocd-verify"
      tags: [always]

    - name: "[argocd-verify] Get argocd pods status"
      command: kubectl get pods -n {{ argocd_namespace }} -o wide
      register: argocd_pods
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[argocd-verify] Print argocd pods status"
      debug:
        msg: "{{ argocd_pods.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[argocd-verify] Verify NetworkPolicies"
      command: kubectl get networkpolicies -n {{ argocd_namespace }}
      register: np_verify
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[argocd-verify] Show NetworkPolicies"
      debug:
        var: np_verify.stdout_lines
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[argocd-verify] Installation complete"
      debug:
        msg:
          - "argocd-pre + argocd + argocd-post: OK"
          - "Run argocd-configure.yaml to save admin password to Vault."
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
