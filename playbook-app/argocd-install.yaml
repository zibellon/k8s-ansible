# =============================================================================
# Install ArgoCD via local Helm charts
# Steps:
#   1. argocd/pre: NetworkPolicies + ESO (ServiceAccount, SecretStore, ExternalSecret)
#   2. argocd/install: CRDs + ArgoCD manifests
#   3. argocd/post: Ingress (UI + RPC) + default AppProject
#   4. argocd-git-ops/install: AppProject + Application(s) from argocd_git_ops_apps
#
# Usage (tags):
#   ansible-playbook argocd-install.yaml              # full install (pre + install + post + gitops)
#   ansible-playbook argocd-install.yaml --tags pre     # only pre (NetworkPolicies + ESO)
#   ansible-playbook argocd-install.yaml --tags install
#   ansible-playbook argocd-install.yaml --tags post    # only post (Ingress + AppProject)
#   ansible-playbook argocd-install.yaml --tags gitops  # only git-ops AppProjects + Applications
#
# NOTE: Admin password management → argocd-configure.yaml
# =============================================================================

- name: Install ArgoCD via local Helm chart
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[argocd-install-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        label_name: "argocd-install-pre-check"
      tags: [always]

    - name: "[argocd-install-pre-check] Forbid kube-system namespace"
      include_tasks: tasks/tasks-forbid-kube-system.yaml
      vars:
        label_name: "argocd-install-pre-check"
        dto_target_namespace: "{{ argocd_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations and resolve ArgoCD config
    # =========================================================================

    - name: "[argocd-install-init] Merge ESO integrations"
      include_tasks: tasks/tasks-eso-merge.yaml
      tags: [always]


    # =========================================================================
    # INIT: Resolve ClusterIssuer + ACME solver pod labels
    # =========================================================================

    - name: "[argocd-install-init] Resolve ACME solver"
      include_tasks: tasks/tasks-resolve-acme-solver.yaml
      vars:
        label_name: argocd-install-init
        dto_cluster_issuer_name: "{{ argocd_cluster_issuer_name }}"
        dto_ingress_class_name: "{{ argocd_ingress_class_name }}"
      tags: [always]

    # =========================================================================
    # STEP 1: ARGOCD/INSTALL (CRDs + ArgoCD manifests)
    # =========================================================================

    - name: "[argocd-install-crds] Copy crds chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "argocd-install-crds"
        dto_chart_name: "crds"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/argocd/crds/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/argocd/crds"
      tags: [crds]

    - name: "[argocd-install-crds] Install argocd-crds via kubectl"
      command: kubectl create -f {{ remote_charts_dir }}/argocd/crds/crds.yaml
      failed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [crds]

    - name: "[argocd-install-crds] Wait for CRDs"
      include_tasks: tasks/tasks-wait-crds.yaml
      vars:
        label_name: "argocd-install-crds"
        dto_crds_list:
          - crd/applications.argoproj.io
          - crd/applicationsets.argoproj.io
          - crd/appprojects.argoproj.io
      tags: [crds]

    # =========================================================================
    # STEP 2: ARGOCD/PRE (NetworkPolicies + ESO resources)
    # =========================================================================

    - name: "[argocd-pre] Copy pre chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "argocd-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/argocd/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/argocd/pre"
      tags: [pre]

    - name: "[argocd-pre] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "argocd-pre"
        dto_dir: "{{ remote_charts_dir }}/argocd/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ argocd_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[argocd-pre] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "argocd-pre"
        dto_helm_command: >
          helm upgrade --install argocd-pre {{ remote_charts_dir }}/argocd/pre
          --namespace {{ argocd_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/argocd/pre/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ argocd_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 3: ARGOCD/INSTALL (ArgoCD manifests)
    # =========================================================================

    - name: "[argocd-install] Copy install chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "argocd-install"
        dto_chart_name: "install"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/argocd/install/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/argocd/install"
      tags: [install]

    - name: "[argocd-install] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "argocd-install"
        dto_dir: "{{ remote_charts_dir }}/argocd/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ argocd_install_helm_values | to_nice_yaml }}"
      tags: [install]

    - name: "[argocd-install] Install or upgrade argocd via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "argocd-install"
        dto_helm_command: >
          helm upgrade --install argocd {{ remote_charts_dir }}/argocd/install
          --namespace {{ argocd_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/argocd/install/values-override.yaml
          --cleanup-on-fail
          --skip-crds
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ argocd_install_helm_timeout }}
      tags: [install]

    # =========================================================================
    # WAIT FOR ARGOCD TO BE READY
    # =========================================================================

    - name: "[argocd-install] Wait for rollouts"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "argocd-install"
        dto_rollout_namespace: "{{ argocd_namespace }}"
        dto_rollout_timeout: "{{ argocd_rollout_timeout }}"
        dto_rollout_resources_list:
          - statefulset/argocd-application-controller
          - deployment.apps/argocd-applicationset-controller
          - deployment.apps/argocd-dex-server
          - deployment.apps/argocd-notifications-controller
          - deployment.apps/argocd-redis
          - deployment.apps/argocd-repo-server
          - deployment.apps/argocd-server
      tags: [install]

    # =========================================================================
    # STEP 4: ARGOCD/POST (Ingress UI + RPC + default AppProject)
    # =========================================================================

    - name: "[argocd-post] Copy post chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "argocd-post"
        dto_chart_name: "post"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/argocd/post/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/argocd/post"
      tags: [post]

    - name: "[argocd-post] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "argocd-post"
        dto_dir: "{{ remote_charts_dir }}/argocd/post"
        dto_filename: "values-override.yaml"
        dto_content: "{{ argocd_post_helm_values | to_nice_yaml }}"
      tags: [post]

    - name: "[argocd-post] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "argocd-post"
        dto_helm_command: >
          helm upgrade --install argocd-post {{ remote_charts_dir }}/argocd/post
          --namespace {{ argocd_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/argocd/post/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ argocd_post_helm_timeout }}
      tags: [post]

    # =========================================================================
    # STEP 5: ARGOCD/GITOPS (AppProject + Application(s) from argocd_git_ops_apps)
    # =========================================================================

    - name: "[argocd-gitops] Copy git-ops install chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "argocd-gitops"
        dto_chart_name: "gitops"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/argocd/gitops/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/argocd/gitops"
      tags: [gitops]

    - name: "[argocd-gitops] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "argocd-gitops"
        dto_dir: "{{ remote_charts_dir }}/argocd/gitops"
        dto_filename: "values-override.yaml"
        dto_content: "{{ argocd_gitops_helm_values | to_nice_yaml }}"
      tags: [gitops]

    - name: "[argocd-gitops] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "argocd-gitops"
        dto_helm_command: >
          helm upgrade --install argocd-gitops {{ remote_charts_dir }}/argocd/gitops
          --namespace {{ argocd_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/argocd/gitops/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ argocd_gitops_helm_timeout }}
      tags: [gitops]

    - name: "[argocd-gitops] Get Application status"
      command: >
        kubectl get application {{ item.1.name }}
        -n {{ argocd_namespace }}
        -o jsonpath='{.status.sync.status} / {.status.health.status}'
      register: argocd_gitops_app_status
      changed_when: false
      failed_when: false
      loop: "{{ argocd_git_ops_apps | subelements('apps') }}"
      loop_control:
        label: "{{ item.1.name }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [gitops]

    - name: "[argocd-gitops] Show Application status"
      debug:
        msg: "{{ item.item.1.name }}: {{ item.stdout }}"
      loop: "{{ argocd_gitops_app_status.results }}"
      loop_control:
        label: "{{ item.item.1.name }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [gitops]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[argocd-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        dto_helm_namespace: "{{ argocd_namespace }}"
        label_name: "argocd-verify"
      tags: [always]

    - name: "[argocd-verify] Get argocd pods status"
      command: kubectl get pods -n {{ argocd_namespace }} -o wide
      register: argocd_pods
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[argocd-verify] Print argocd pods status"
      debug:
        msg: "{{ argocd_pods.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[argocd-verify] Verify NetworkPolicies"
      command: kubectl get networkpolicies -n {{ argocd_namespace }}
      register: np_verify
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[argocd-verify] Show NetworkPolicies"
      debug:
        var: np_verify.stdout_lines
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[argocd-verify] Installation complete"
      debug:
        msg:
          - "argocd-pre + argocd + argocd-post + argocd-git-ops: OK"
          - "Run argocd-configure.yaml to save admin password to Vault."
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
