# =============================================================================
# Sync SeaweedFS S3 declaratively — identities + buckets + policies
# =============================================================================
# Phases (через --tags):
#   identities — vault-get current combined JSON → diff vs target (admin +
#                anonymous + users из seaweedfs_identities + _extra) →
#                CREATE/UPDATE/DELETE; fan-out creds в additional_vault_paths;
#                tasks-eso-force-sync.
#   buckets    — (SUB-6c) kubectl get cm seaweedfs-sync-buckets-state → hash
#                diff vs target → weed shell create/delete/quota; update ConfigMap.
#   policies   — (SUB-6d) kubectl get cm seaweedfs-sync-bucket-policies-state →
#                diff vs target → aws s3api put/delete-bucket-policy; update
#                ConfigMap.
#
# After all phases: conditional kubectl rollout restart deployment/seaweedfs-s3
# (only if identity Secret content changed) — (SUB-6d).
#
# Usage:
#   ansible-playbook -i hosts-vars/ -i hosts-vars-override/ playbook-app/seaweedfs-sync.yaml
#   ansible-playbook ... --tags identities
#   ansible-playbook ... --tags buckets       # available after SUB-6c
#   ansible-playbook ... --tags policies      # available after SUB-6d
#
# Prerequisites:
#   - seaweedfs-install.yaml выполнен (admin bootstrapped, S3 pods running).
#   - Vault + ESO готовы.
#   - hosts-vars/seaweedfs-sync.yaml + hosts-vars/seaweedfs.yaml загружены.
# =============================================================================

---
- name: SeaweedFS sync (identities + buckets + policies)
  hosts: managers
  become: true
  gather_facts: false

  vars:
    # Local fact key names (per .claude/rules/variables.md §1.8 _local_ convention)
    # IDENTITIES phase keys:
    _local_target_identities_key: "_local_target_identities"
    _local_current_identities_json_key: "_local_current_identities_json"
    _local_current_identities_exists_key: "_local_current_identities_exists"
    _local_current_identities_key: "_local_current_identities"
    _local_to_create_identities_key: "_local_to_create_identities"
    _local_to_update_identities_key: "_local_to_update_identities"
    _local_to_delete_identities_key: "_local_to_delete_identities"
    _local_new_combined_identities_key: "_local_new_combined_identities"
    _local_new_combined_json_key: "_local_new_combined_json"
    _local_identities_changed_key: "_local_identities_changed"
    _local_identities_put_data_key: "_local_identities_put_data"
    # BUCKETS phase keys:
    _local_target_buckets_key: "_local_target_buckets"
    _local_current_buckets_state_key: "_local_current_buckets_state"
    _local_buckets_to_create_key: "_local_buckets_to_create"
    _local_buckets_to_update_quota_key: "_local_buckets_to_update_quota"
    _local_buckets_to_delete_key: "_local_buckets_to_delete"
    # POLICIES phase keys:
    _local_target_policies_key: "_local_target_policies"
    _local_policies_secret_json_key: "_local_policies_secret_json"
    _local_policies_secret_exists_key: "_local_policies_secret_exists"
    _local_policies_admin_creds_key: "_local_policies_admin_creds"
    _local_current_policies_state_key: "_local_current_policies_state"
    _local_policies_to_apply_key: "_local_policies_to_apply"
    _local_policies_to_delete_key: "_local_policies_to_delete"

  tasks:
    # =========================================================================
    # PRE-CHECK [always]
    # =========================================================================

    - name: "[seaweedfs-sync-pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-pre-check.yaml"
      vars:
        dto_label_name: "seaweedfs-sync-pre-check"
      tags: [always]

    - name: "[seaweedfs-sync-pre-check] Verify Vault config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-config-verify.yaml"
      vars:
        dto_label_name: "seaweedfs-sync-pre-check"
      tags: [always]

    - name: "[seaweedfs-sync-pre-check] Verify ESO config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-verify.yaml"
      vars:
        dto_label_name: "seaweedfs-sync-pre-check"
        dto_eso_secrets_list: "{{ eso_vault_integration_seaweedfs_secrets + (eso_vault_integration_seaweedfs_secrets_extra | default([])) }}"
        dto_eso_integration_object: "{{ eso_vault_integration_seaweedfs }}"
        dto_namespace: "{{ seaweedfs_namespace }}"
      tags: [always]

    # =========================================================================
    # IDENTITIES PHASE
    # =========================================================================

    - name: "[seaweedfs-sync-identities] Compute target identities list"
      set_fact:
        "{{ _local_target_identities_key }}": "{{ seaweedfs_identities + (seaweedfs_identities_extra | default([])) }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [identities]

    - name: "[seaweedfs-sync-identities] Admin safety warning (no actions=[Admin])"
      debug:
        msg: |
          WARNING: target identities does not contain any entry with actions=['Admin'].
          This will lock out admin access to SeaweedFS S3 API after rollout restart.
          If intentional, ignore. Otherwise add admin to seaweedfs_identities (base).
      when: >-
        (lookup('vars', _local_target_identities_key)
         | selectattr('actions', 'contains', 'Admin') | list | length) == 0
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [identities]

    - name: "[seaweedfs-sync-identities] Get current combined JSON from Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-get.yaml"
      vars:
        dto_label_name: "seaweedfs-sync-identities"
        dto_vault_get_path: "{{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_secret_s3_identities.vault_path }}"
        dto_vault_get_field: "config"
        dto_vault_get_res_fact_name: "{{ _local_current_identities_json_key }}"
        dto_vault_get_res_exists_fact_name: "{{ _local_current_identities_exists_key }}"
      tags: [identities]

    - name: "[seaweedfs-sync-identities] Parse current identities (or empty)"
      set_fact:
        "{{ _local_current_identities_key }}": >-
          {{ (lookup('vars', _local_current_identities_json_key) | from_json).identities
             if lookup('vars', _local_current_identities_exists_key)
             else [] }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [identities]

    - name: "[seaweedfs-sync-identities] Compute to_create / to_update / to_delete"
      set_fact:
        "{{ _local_to_create_identities_key }}": >-
          {{ lookup('vars', _local_target_identities_key)
             | rejectattr('name', 'in', lookup('vars', _local_current_identities_key) | map(attribute='name') | list)
             | list }}
        "{{ _local_to_update_identities_key }}": >-
          {{ lookup('vars', _local_target_identities_key)
             | selectattr('name', 'in', lookup('vars', _local_current_identities_key) | map(attribute='name') | list)
             | list }}
        "{{ _local_to_delete_identities_key }}": >-
          {{ lookup('vars', _local_current_identities_key)
             | rejectattr('name', 'in', lookup('vars', _local_target_identities_key) | map(attribute='name') | list)
             | list }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [identities]

    - name: "[seaweedfs-sync-identities] Generate access_key for new non-anonymous identities"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-generate-secret.yaml"
      vars:
        dto_label_name: "seaweedfs-sync-identities"
        dto_generate_fact_name: "_local_new_ak_{{ item.name }}"
        dto_generate_length: 20
        dto_generate_chars: "ascii_uppercase,digits"
      loop: "{{ lookup('vars', _local_to_create_identities_key) }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.name != 'anonymous'
      tags: [identities]

    - name: "[seaweedfs-sync-identities] Generate secret_key for new non-anonymous identities"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-generate-secret.yaml"
      vars:
        dto_label_name: "seaweedfs-sync-identities"
        dto_generate_fact_name: "_local_new_sk_{{ item.name }}"
        dto_generate_length: 40
        dto_generate_chars: "ascii_letters,digits"
      loop: "{{ lookup('vars', _local_to_create_identities_key) }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.name != 'anonymous'
      tags: [identities]

    - name: "[seaweedfs-sync-identities] Build new combined identities list"
      set_fact:
        "{{ _local_new_combined_identities_key }}": >-
          {{
            [
              {
                'name': item.name,
                'credentials': [{
                  'accessKey': '' if item.name == 'anonymous' else lookup('vars', '_local_new_ak_' + item.name),
                  'secretKey': '' if item.name == 'anonymous' else lookup('vars', '_local_new_sk_' + item.name)
                }],
                'actions': item.actions | default([])
              }
              for item in lookup('vars', _local_to_create_identities_key)
            ]
            +
            [
              {
                'name': target_item.name,
                'credentials': (
                  lookup('vars', _local_current_identities_key)
                  | selectattr('name', 'equalto', target_item.name)
                  | map(attribute='credentials') | first
                ),
                'actions': target_item.actions | default([])
              }
              for target_item in lookup('vars', _local_to_update_identities_key)
            ]
          }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [identities]

    - name: "[seaweedfs-sync-identities] Build new JSON string"
      set_fact:
        "{{ _local_new_combined_json_key }}": "{{ {'identities': lookup('vars', _local_new_combined_identities_key)} | to_json }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [identities]

    - name: "[seaweedfs-sync-identities] Determine if identities changed (compare JSON)"
      set_fact:
        "{{ _local_identities_changed_key }}": >-
          {{ (not lookup('vars', _local_current_identities_exists_key))
             or (lookup('vars', _local_current_identities_json_key) != lookup('vars', _local_new_combined_json_key)) }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [identities]

    - name: "[seaweedfs-sync-identities] Build Vault put data dict"
      set_fact:
        "{{ _local_identities_put_data_key }}": >-
          {{ {'config': lookup('vars', _local_new_combined_json_key)} }}
      when: lookup('vars', _local_identities_changed_key)
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [identities]

    - name: "[seaweedfs-sync-identities] Store new combined JSON in Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-put.yaml"
      vars:
        dto_label_name: "seaweedfs-sync-identities"
        dto_vault_put_path: "{{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_secret_s3_identities.vault_path }}"
        dto_vault_put_data: "{{ lookup('vars', _local_identities_put_data_key) }}"
      when: lookup('vars', _local_identities_changed_key)
      tags: [identities]

    - name: "[seaweedfs-sync-identities] Fan-out: put creds to additional_vault_paths"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-put.yaml"
      vars:
        dto_label_name: "seaweedfs-sync-identities"
        dto_vault_put_path: "{{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ item.1.vault_path }}"
        dto_vault_put_data: >-
          {{ {
               (item.1.secret_keys | default(seaweedfs_identity_default_creds_keys)).username:   item.0.name,
               (item.1.secret_keys | default(seaweedfs_identity_default_creds_keys)).access_key: (
                 lookup('vars', '_local_new_ak_' + item.0.name)
                 if item.0 in lookup('vars', _local_to_create_identities_key)
                 else (lookup('vars', _local_current_identities_key)
                       | selectattr('name', 'equalto', item.0.name)
                       | map(attribute='credentials') | first | first).accessKey
               ),
               (item.1.secret_keys | default(seaweedfs_identity_default_creds_keys)).secret_key: (
                 lookup('vars', '_local_new_sk_' + item.0.name)
                 if item.0 in lookup('vars', _local_to_create_identities_key)
                 else (lookup('vars', _local_current_identities_key)
                       | selectattr('name', 'equalto', item.0.name)
                       | map(attribute='credentials') | first | first).secretKey
               )
             } }}
      loop: "{{ (lookup('vars', _local_to_create_identities_key) + lookup('vars', _local_to_update_identities_key)) | rejectattr('name', 'equalto', 'anonymous') | subelements('additional_vault_paths', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -> {{ item.1.vault_path }}"
      tags: [identities]

    - name: "[seaweedfs-sync-identities] Cleanup: delete additional_vault_paths for DELETE'd identities"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-delete.yaml"
      vars:
        dto_label_name: "seaweedfs-sync-identities"
        dto_vault_delete_path: "{{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ item.1.vault_path }}"
      loop: "{{ lookup('vars', _local_to_delete_identities_key) | subelements('additional_vault_paths', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} -> {{ item.1.vault_path }}"
      tags: [identities]

    - name: "[seaweedfs-sync-identities] Trigger ESO sync"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-force-sync.yaml"
      vars:
        dto_label_name: "seaweedfs-sync-identities"
        dto_eso_sync_namespace: "{{ seaweedfs_namespace }}"
      when: lookup('vars', _local_identities_changed_key)
      tags: [identities]

    - name: "[seaweedfs-sync-identities] Wait for K8s Secret to update"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-secret.yaml"
      vars:
        dto_label_name: "seaweedfs-sync-identities"
        dto_wait_secret_name: "{{ seaweedfs_secret_s3_identities.body.target.name }}"
        dto_wait_secret_namespace: "{{ seaweedfs_namespace }}"
      when: lookup('vars', _local_identities_changed_key)
      tags: [identities]

    # =========================================================================
    # BUCKETS PHASE
    # =========================================================================

    - name: "[seaweedfs-sync-buckets] Compute target buckets list"
      set_fact:
        "{{ _local_target_buckets_key }}": "{{ seaweedfs_sync_buckets + (seaweedfs_sync_buckets_extra | default([])) }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [buckets]

    - name: "[seaweedfs-sync-buckets] Read current ConfigMap state (may not exist)"
      command: >-
        kubectl get configmap seaweedfs-sync-buckets-state
        -n {{ seaweedfs_namespace }}
        -o jsonpath={.data.state}
      register: _local_current_buckets_state_raw_reg
      failed_when: false
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [buckets]

    - name: "[seaweedfs-sync-buckets] Parse current state (or empty list)"
      set_fact:
        "{{ _local_current_buckets_state_key }}": >-
          {{ _local_current_buckets_state_raw_reg.stdout | from_json
             if (_local_current_buckets_state_raw_reg.rc == 0 and _local_current_buckets_state_raw_reg.stdout | length > 0)
             else [] }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [buckets]

    - name: "[seaweedfs-sync-buckets] Compute diff (to_create / to_update_quota / to_delete)"
      set_fact:
        "{{ _local_buckets_to_create_key }}": >-
          {{ lookup('vars', _local_target_buckets_key)
             | rejectattr('name', 'in', lookup('vars', _local_current_buckets_state_key) | map(attribute='name') | list)
             | list }}
        "{{ _local_buckets_to_update_quota_key }}": >-
          {{ lookup('vars', _local_target_buckets_key)
             | selectattr('name', 'in', lookup('vars', _local_current_buckets_state_key) | map(attribute='name') | list)
             | selectattr('quota', 'defined')
             | list }}
        "{{ _local_buckets_to_delete_key }}": >-
          {{ lookup('vars', _local_current_buckets_state_key)
             | rejectattr('name', 'in', lookup('vars', _local_target_buckets_key) | map(attribute='name') | list)
             | list }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [buckets]

    - name: "[seaweedfs-sync-buckets] Create new buckets via weed shell"
      shell: |
        echo "s3.bucket.create -name={{ item.name }} -owner=admin" | \
          kubectl exec -i -n {{ seaweedfs_namespace }} deploy/seaweedfs-s3 -- \
            weed shell -master=seaweedfs-master:9333 -filer=seaweedfs-filer:8888
      loop: "{{ lookup('vars', _local_buckets_to_create_key) }}"
      loop_control:
        label: "{{ item.name }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [buckets]

    - name: "[seaweedfs-sync-buckets] Apply quotas for created+updated buckets"
      shell: |
        echo "s3.bucket.quota -name={{ item.name }} -op={{ 'set' if item.quota.enabled else 'disable' }}{% if item.quota.enabled %} -sizeMB={{ (item.quota.size | regex_replace('(MiB|GiB|TiB)$', '') | int) * (1 if item.quota.size.endswith('MiB') else 1024 if item.quota.size.endswith('GiB') else 1024 * 1024) }}{% endif %}" | \
          kubectl exec -i -n {{ seaweedfs_namespace }} deploy/seaweedfs-s3 -- \
            weed shell -master=seaweedfs-master:9333 -filer=seaweedfs-filer:8888
      loop: "{{ (lookup('vars', _local_buckets_to_create_key) + lookup('vars', _local_buckets_to_update_quota_key)) | selectattr('quota', 'defined') | list }}"
      loop_control:
        label: "{{ item.name }} (quota: {{ item.quota }})"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [buckets]

    - name: "[seaweedfs-sync-buckets] Delete buckets via weed shell (fails if non-empty)"
      shell: |
        echo "s3.bucket.delete -name={{ item.name }}" | \
          kubectl exec -i -n {{ seaweedfs_namespace }} deploy/seaweedfs-s3 -- \
            weed shell -master=seaweedfs-master:9333 -filer=seaweedfs-filer:8888
      loop: "{{ lookup('vars', _local_buckets_to_delete_key) }}"
      loop_control:
        label: "{{ item.name }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [buckets]

    - name: "[seaweedfs-sync-buckets] Apply ConfigMap with new state"
      shell: |
        kubectl create configmap seaweedfs-sync-buckets-state \
          -n {{ seaweedfs_namespace }} \
          --from-literal=state='{{ lookup('vars', _local_target_buckets_key) | to_json }}' \
          --dry-run=client -o yaml | kubectl apply -f -
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [buckets]

    # =========================================================================
    # POLICIES PHASE
    # =========================================================================

    - name: "[seaweedfs-sync-policies] Compute target bucket policies list"
      set_fact:
        "{{ _local_target_policies_key }}": "{{ seaweedfs_sync_bucket_policies + (seaweedfs_sync_bucket_policies_extra | default([])) }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [policies]

    - name: "[seaweedfs-sync-policies] Validate Principal format (SeaweedFS 4.29 limitation)"
      assert:
        that:
          - item.1.Principal is not mapping
        fail_msg: >-
          Bucket policy for '{{ item.0.bucket }}' has Statement with Principal of unsupported
          dict form ({{ item.1.Principal }}). SeaweedFS 4.29 (policy_engine/types.go:55-77)
          supports only flat string or array. Use:
            Principal: "arn:aws:iam::*:user/<name>"
            Principal: ["arn:aws:iam::*:user/u1", "arn:aws:iam::*:user/u2"]
            Principal: "*"  (anonymous; requires anonymous identity)
      loop: "{{ lookup('vars', _local_target_policies_key) | subelements('policy.Statement') }}"
      loop_control:
        label: "{{ item.0.bucket }}: {{ item.1.Sid | default('?') }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [policies]

    - name: "[seaweedfs-sync-policies] Get K8s Secret with current admin creds"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-secret-get.yaml"
      vars:
        dto_label_name: "seaweedfs-sync-policies"
        dto_secret_namespace: "{{ seaweedfs_namespace }}"
        dto_secret_name: "{{ seaweedfs_secret_s3_identities.body.target.name }}"
        dto_secret_field: "seaweedfs_s3_config"
        dto_secret_res_fact_name: "{{ _local_policies_secret_json_key }}"
        dto_secret_res_exists_fact_name: "{{ _local_policies_secret_exists_key }}"
      tags: [policies]

    - name: "[seaweedfs-sync-policies] Extract admin creds from Secret JSON"
      set_fact:
        "{{ _local_policies_admin_creds_key }}": >-
          {{
            ((lookup('vars', _local_policies_secret_json_key) | from_json).identities
             | selectattr('name', 'equalto', 'admin') | first).credentials | first
          }}
      when: lookup('vars', _local_policies_secret_exists_key)
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [policies]

    - name: "[seaweedfs-sync-policies] Read current ConfigMap state (may not exist)"
      command: >-
        kubectl get configmap seaweedfs-sync-bucket-policies-state
        -n {{ seaweedfs_namespace }}
        -o jsonpath={.data.state}
      register: _local_current_policies_state_raw_reg
      failed_when: false
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [policies]

    - name: "[seaweedfs-sync-policies] Parse current state (or empty list)"
      set_fact:
        "{{ _local_current_policies_state_key }}": >-
          {{ _local_current_policies_state_raw_reg.stdout | from_json
             if (_local_current_policies_state_raw_reg.rc == 0 and _local_current_policies_state_raw_reg.stdout | length > 0)
             else [] }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [policies]

    - name: "[seaweedfs-sync-policies] Compute diff (to_apply / to_delete)"
      set_fact:
        "{{ _local_policies_to_apply_key }}": "{{ lookup('vars', _local_target_policies_key) }}"
        "{{ _local_policies_to_delete_key }}": >-
          {{ lookup('vars', _local_current_policies_state_key)
             | rejectattr('bucket', 'in', lookup('vars', _local_target_policies_key) | map(attribute='bucket') | list)
             | list }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [policies]

    - name: "[seaweedfs-sync-policies] Apply bucket policies via aws s3api"
      shell: |
        kubectl exec -n {{ seaweedfs_namespace }} deploy/seaweedfs-s3 -- \
          env AWS_ACCESS_KEY_ID='{{ lookup('vars', _local_policies_admin_creds_key).accessKey }}' \
              AWS_SECRET_ACCESS_KEY='{{ lookup('vars', _local_policies_admin_creds_key).secretKey }}' \
          aws --endpoint-url http://localhost:8333 s3api put-bucket-policy \
            --bucket {{ item.bucket }} \
            --policy '{{ item.policy | to_json }}'
      loop: "{{ lookup('vars', _local_policies_to_apply_key) }}"
      loop_control:
        label: "{{ item.bucket }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [policies]

    - name: "[seaweedfs-sync-policies] Delete policies for removed buckets"
      shell: |
        kubectl exec -n {{ seaweedfs_namespace }} deploy/seaweedfs-s3 -- \
          env AWS_ACCESS_KEY_ID='{{ lookup('vars', _local_policies_admin_creds_key).accessKey }}' \
              AWS_SECRET_ACCESS_KEY='{{ lookup('vars', _local_policies_admin_creds_key).secretKey }}' \
          aws --endpoint-url http://localhost:8333 s3api delete-bucket-policy \
            --bucket {{ item.bucket }}
      loop: "{{ lookup('vars', _local_policies_to_delete_key) }}"
      loop_control:
        label: "{{ item.bucket }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [policies]

    - name: "[seaweedfs-sync-policies] Apply ConfigMap with new state"
      shell: |
        kubectl create configmap seaweedfs-sync-bucket-policies-state \
          -n {{ seaweedfs_namespace }} \
          --from-literal=state='{{ lookup('vars', _local_target_policies_key) | to_json }}' \
          --dry-run=client -o yaml | kubectl apply -f -
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [policies]

    # =========================================================================
    # ROLLOUT [always] — restart S3 deployment if identities changed
    # =========================================================================

    - name: "[seaweedfs-sync-rollout] Restart S3 deployment if identities changed"
      command: >-
        kubectl rollout restart deployment/seaweedfs-s3 -n {{ seaweedfs_namespace }}
      when: lookup('vars', _local_identities_changed_key) | default(false)
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[seaweedfs-sync-rollout] Wait for S3 rollout"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "seaweedfs-sync-rollout"
        dto_rollout_namespace: "{{ seaweedfs_namespace }}"
        dto_rollout_timeout: "{{ seaweedfs_install_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment.apps/seaweedfs-s3
      when: lookup('vars', _local_identities_changed_key) | default(false)
      tags: [always]

    # =========================================================================
    # VERIFY [always]
    # =========================================================================

    - name: "[seaweedfs-sync-verify] Show pods"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "seaweedfs-sync-verify"
        dto_pods_namespace: "{{ seaweedfs_namespace }}"
      tags: [always]
