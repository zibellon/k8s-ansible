# =============================================================================
# Install HashiCorp Vault via bank-vaults operator
# Steps:
#   1. vault/pre: NetworkPolicies
#   2. vault-operator: bank-vaults operator via OCI helm chart
#   3. vault-cr: Vault CR (full spec) — operator creates StatefulSet + sidecars
#   4. vault/post: Ingress
#
# Usage (tags):
#   ansible-playbook vault-install.yaml              # full install
#   ansible-playbook vault-install.yaml --tags pre   # only pre (NetworkPolicies)
#   ansible-playbook vault-install.yaml --tags install
#   ansible-playbook vault-install.yaml --tags post  # only post (Ingress)
#
# Credentials (unseal keys + root_token) are stored in K8s Secret:
#   kubectl get secret {{ vault_unsealer_secret_name }} -n {{ vault_namespace }} -o json
# =============================================================================

---
- name: Install Vault via bank-vaults operator
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[vault-install-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        label_name: "vault-install-pre-check"
      tags: [always]

    - name: "[vault-install-pre-check] Forbid kube-system namespace"
      include_tasks: tasks/tasks-forbid-kube-system.yaml
      vars:
        label_name: "vault-install-pre-check"
        namespace_value: "{{ vault_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations
    # =========================================================================

    - name: "[vault-install-init] Merge ESO integrations"
      include_tasks: tasks/tasks-eso-merge.yaml
      tags: [always]

    - name: "[vault-install-init] Resolve ACME solver"
      include_tasks: tasks/tasks-resolve-acme-solver.yaml
      vars:
        label_name: vault-install-init
        cluster_issuer_name: "{{ vault_ui_cluster_issuer_name }}"
        ingress_class_name: "{{ vault_ui_ingress_class_name }}"
        acme_cluster_issuer_result_var: "vault_ui_acme_cluster_issuer"
        acme_solver_result_var: "vault_ui_acme_solver"
        acme_pod_labels_result_var: "vault_acme_solver_pod_labels"
      tags: [always]

    # =========================================================================
    # STEP 1: PRE (NetworkPolicies)
    # =========================================================================

    - name: "[vault-pre] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "vault-pre"
        chart_name: "pre"
        chart_local_src: "{{ project_root }}/playbook-app/charts/vault/pre/"
        chart_remote_dest: "{{ remote_charts_dir }}/vault/pre"
      tags: [pre]

    - name: "[vault-pre] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/vault/pre/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ vault_namespace }}
          traefik:
            namespace: {{ traefik_namespace }}
            instanceName: traefik-{{ traefik_namespace }}
          externalSecrets:
            namespace: {{ external_secrets_namespace }}
          acmeSolverLabels: {{ vault_acme_solver_pod_labels | to_json }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [pre]

    - name: "[vault-pre] Install via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "vault-pre"
        helm_command: >
          helm upgrade --install vault-pre {{ remote_charts_dir }}/vault/pre
          --namespace {{ vault_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/vault/pre/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ vault_config_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: INSTALL vault-operator (bank-vaults operator via OCI)
    # =========================================================================

    - name: "[vault-operator] Create values-override for vault-operator"
      copy:
        dest: "{{ remote_charts_dir }}/vault/operator-values-override.yaml"
        mode: "0644"
        content: |
          tolerations: {{ vault_operator_tolerations | to_json }}
          nodeSelector: {{ vault_operator_node_selector | to_json }}
          resources: {{ vault_operator_resources | to_json }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [operator]

    - name: "[vault-operator] Ensure vault operator values dir exists"
      file:
        path: "{{ remote_charts_dir }}/vault"
        state: directory
        mode: "0755"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [operator]

    - name: "[vault-operator] Install vault-operator via OCI helm chart (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "vault-operator"
        helm_command: >
          helm upgrade --install vault-operator {{ vault_operator_chart }}
          --namespace {{ vault_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/vault/operator-values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ vault_helm_timeout }}
      tags: [operator]

    - name: "[vault-operator] Wait for vault-operator CRDs"
      include_tasks: tasks/tasks-wait-crds.yaml
      vars:
        label_name: "vault-operator"
        crds_list:
          - "crd/vaults.vault.banzaicloud.com"
      tags: [operator]

    - name: "[vault-operator] Wait for vault-operator Deployment rollout"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "vault-operator"
        rollout_namespace: "{{ vault_namespace }}"
        rollout_timeout: "{{ vault_rollout_timeout }}"
        rollout_resources:
          - "deployment/vault-operator"
      tags: [operator]

    # =========================================================================
    # STEP 3: APPLY Vault CR
    # =========================================================================

    - name: "[vault-cr] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "vault-cr"
        chart_name: "cr"
        chart_local_src: "{{ project_root }}/playbook-app/charts/vault/cr/"
        chart_remote_dest: "{{ remote_charts_dir }}/vault/cr"
      tags: [vault-cr]

    - name: "[vault-cr] Create values-override.yaml"
      copy:
        dest: "{{ remote_charts_dir }}/vault/cr/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ vault_namespace }}
          vaultSpec:
            size: 1
            serviceAccount: vault
            unsealConfig:
              options:
                secretShares: {{ vault_key_shares }}
                secretThreshold: {{ vault_key_threshold }}
              kubernetes:
                secretNamespace: {{ vault_namespace }}
                secretName: {{ vault_unsealer_secret_name }}
            config:
              api_addr: "http://vault.{{ vault_namespace }}.svc.{{ cluster_dns_domain }}:8200"
              cluster_addr: "http://vault.{{ vault_namespace }}.svc.{{ cluster_dns_domain }}:8201"
              storage:
                raft:
                  path: /vault/data
              listener:
                tcp:
                  address: "[::]:8200"
                  cluster_address: "[::]:8201"
                  tls_disable: true
                  telemetry:
                    unauthenticated_metrics_access: "true"
              ui: true
              disable_mlock: true
              telemetry:
                prometheus_retention_time: "120s"
                disable_hostname: true
            externalConfig:
              purgeUnmanagedConfig:
                enabled: true
                exclude:
                  auth: true
              policies: {{ vault_policies_final | to_json }}
              auth:
                - type: kubernetes
                  config:
                    kubernetes_host: "{{ vault_kubernetes_host }}"
                  roles: {{ vault_roles_final | to_json }}
              secrets:
                - path: secret
                  type: kv
                  description: General secrets
                  options:
                    version: 2
                - path: eso-secret
                  type: kv
                  description: ESO secrets
                  options:
                    version: 2
            volumeClaimTemplates:
              - metadata:
                  name: vault-data
                spec:
                  accessModes: [ReadWriteOnce]
                  storageClassName: {{ vault_storage_class }}
                  resources:
                    requests:
                      storage: {{ vault_storage_size }}
            volumeMounts:
              - name: vault-data
                mountPath: /vault/data
            resources:
              vault: {{ vault_resources | to_json }}
            nodeSelector: {{ vault_node_selector | to_json }}
            tolerations: {{ vault_tolerations | to_json }}
            affinity: {{ vault_affinity | to_json }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [vault-cr]

    - name: "[vault-cr] Apply Vault CR via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "vault-cr"
        helm_command: >
          helm upgrade --install vault-cr {{ remote_charts_dir }}/vault/cr
          --namespace {{ vault_namespace }}
          --values {{ remote_charts_dir }}/vault/cr/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ vault_helm_timeout }}
      tags: [vault-cr]

    - name: "[vault-cr] Wait for StatefulSet rollout"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "vault-cr"
        rollout_namespace: "{{ vault_namespace }}"
        rollout_timeout: "{{ vault_rollout_timeout }}"
        rollout_resources:
          - "statefulset/vault"
      tags: [vault-cr]

    - name: "[vault-cr] Wait for unsealer K8s Secret (bank-vaults completed init)"
      command: >
        kubectl get secret {{ vault_unsealer_secret_name }}
        -n {{ vault_namespace }}
        -o jsonpath='{.data.vault-root}'
      register: vault_secret_result
      until: vault_secret_result.stdout | length > 0
      retries: 60
      delay: 5
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [vault-cr]

    - name: "[vault-cr] Distribute credentials to all managers"
      include_tasks: tasks/tasks-vault-distribute-creds.yaml
      vars:
        label_name: "vault-cr"
      tags: [vault-cr]

    # =========================================================================
    # STEP 4: POST (Ingress)
    # =========================================================================

    - name: "[vault-post] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "vault-post"
        chart_name: "post"
        chart_local_src: "{{ project_root }}/playbook-app/charts/vault/post/"
        chart_remote_dest: "{{ remote_charts_dir }}/vault/post"
      tags: [post]

    - name: "[vault-post] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/vault/post/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ vault_namespace }}
          ingress:
            ingressClass: {{ vault_ui_ingress_class_name }}
            domain: {{ vault_ui_domain }}
            clusterIssuer: {{ vault_ui_cluster_issuer_name }}
            secretName: {{ vault_ui_https_secret_name }}
            vpnOnlyEnabled: {{ vault_ui_vpn_only_enabled }}
            vpnIngressMiddlewares: "{{ vpn_ingress_middlewares }}"
            httpEnable: {{ vault_ui_ingress_http_enable }}
            httpsEnable: {{ vault_ui_ingress_https_enable }}
          traefik:
            namespace: {{ traefik_namespace }}
            entryPoints:
              web: {{ traefik_web_entrypoint }}
              websecure: {{ traefik_websecure_entrypoint }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [post]

    - name: "[vault-post] Install via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "vault-post"
        helm_command: >
          helm upgrade --install vault-post {{ remote_charts_dir }}/vault/post
          --namespace {{ vault_namespace }}
          --values {{ remote_charts_dir }}/vault/post/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ vault_config_helm_timeout }}
      tags: [post]

    # =========================================================================
    # VERIFY
    # =========================================================================

    - name: "[vault-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        helm_namespace: "{{ vault_namespace }}"
        label_name: "vault-verify"
      tags: [always]

    - name: "[vault-verify] Get vault pods status"
      command: kubectl get pods -n {{ vault_namespace }} -o wide
      register: vault_pods
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[vault-verify] Print vault pods status"
      debug:
        msg: "{{ vault_pods.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[vault-verify] Installation complete"
      debug:
        msg: "vault-pre + vault-operator + vault-cr + vault-post: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
