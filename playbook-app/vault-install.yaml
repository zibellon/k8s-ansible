# =============================================================================
# Install HashiCorp Vault (Helm deploy only)
# Steps:
#   1. vault/pre: NetworkPolicies, ESO (ServiceAccount, SecretStore, ExternalSecret)
#   2. hashicorp/vault Helm chart
#   3. vault/post: Ingress + CronJob for auto-unseal
#
# Usage (tags):
#   ansible-playbook vault-install.yaml              # full install
#   ansible-playbook vault-install.yaml --tags pre   # only pre (NetworkPolicies + ESO)
#   ansible-playbook vault-install.yaml --tags install
#   ansible-playbook vault-install.yaml --tags post  # only post (Ingress + auto-unseal CronJob)
#
# After install run vault-configure.yaml to initialize, unseal and configure Vault.
# =============================================================================

---
- name: Install Vault via Helm
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[vault-install-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        label_name: "vault-install-pre-check"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations and resolve Vault config
    # =========================================================================

    - name: "[vault-install-init] Merge ESO integrations"
      include_tasks: tasks/tasks-eso-merge.yaml
      tags: [always]

    - name: "[vault-install-init] Set vault_eso from merged integration"
      set_fact:
        vault_eso: "{{ eso_vault_integration_vault_merged }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    # =========================================================================
    # STEP 1: INSTALL PRE (NetworkPolicies, ESO)
    # =========================================================================

    - name: "[vault-pre] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "vault-pre"
        chart_name: "pre"
        chart_local_src: "{{ inventory_dir }}/playbook-app/charts/vault/pre/"
        chart_remote_dest: "{{ remote_charts_dir }}/vault/pre"
      tags: [pre]

    - name: "[vault-pre] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/vault/pre/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ vault_namespace }}
          clusterDomain: {{ dns_domain }}
          traefik:
            namespace: {{ traefik_namespace }}
          externalSecrets:
            namespace: {{ external_secrets_namespace }}
          eso:
            saName: {{ vault_eso.sa_name }}
            roleName: {{ vault_eso.role_name }}
            secretStoreName: {{ vault_eso.secret_store_name }}
            kvEnginePath: {{ vault_eso.kv_engine_path }}
            isNeedEso: {{ vault_eso.is_need_eso | default(true) }}
            secrets: {{ vault_eso.secrets | to_json }}
          esoResourcesConfig:
            secretStoreRefreshInterval: {{ eso_resources_config.secret_store_refresh_interval }}
            externalSecretRefreshInterval: {{ eso_resources_config.external_secret_refresh_interval }}
            externalSecretRefreshPolicy: {{ eso_resources_config.external_secret_refresh_policy }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [pre]

    - name: "[vault-pre] Install via Helm"
      command: >
        helm upgrade --install vault-pre {{ remote_charts_dir }}/vault/pre
        --namespace {{ vault_namespace }}
        --create-namespace
        --values {{ remote_charts_dir }}/vault/pre/values-override.yaml
        --cleanup-on-fail
        --atomic
        --wait
        --timeout {{ vault_config_helm_timeout }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [pre]

    # =========================================================================
    # STEP 2: INSTALL VAULT (Local Helm Chart)
    # =========================================================================

    - name: "[vault] Copy chart to server"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "vault"
        chart_name: "install"
        chart_local_src: "{{ inventory_dir }}/playbook-app/charts/vault/install/"
        chart_remote_dest: "{{ remote_charts_dir }}/vault/install"
      tags: [install]

    - name: "[vault] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/vault/install/values-override.yaml"
        mode: "0644"
        content: |
          global:
            enabled: true

          server:
            enabled: true
            image:
              repository: hashicorp/vault
              tag: {{ vault_image_tag }}

            standalone:
              enabled: true
              config: |
                ui = true
                listener "tcp" {
                  tls_disable = 1
                  address = "[::]:8200"
                  cluster_address = "[::]:8201"
                }
                storage "raft" {
                  path = "/vault/data"
                }

            dataStorage:
              enabled: true
              size: {{ vault_storage_size }}
              storageClass: {{ vault_storage_class }}

            resources: {}
            nodeSelector: {}
            affinity: ""

          ui:
            enabled: true
            serviceType: ClusterIP

          injector:
            enabled: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[vault] Install via Helm"
      command: >
        helm upgrade --install vault {{ remote_charts_dir }}/vault/install
        --namespace {{ vault_namespace }}
        --values {{ remote_charts_dir }}/vault/install/values.yaml
        --values {{ remote_charts_dir }}/vault/install/values-override.yaml
        --cleanup-on-fail
        --atomic
        --wait
        --timeout {{ vault_helm_timeout }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[vault] Wait for vault pod to be Running"
      command: >
        kubectl wait --for=jsonpath='{.status.phase}'=Running
        pod/vault-0 -n {{ vault_namespace }}
        --timeout={{ vault_rollout_timeout }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    # =========================================================================
    # STEP 3: INSTALL POST (Ingress + auto-unseal CronJob)
    # =========================================================================

    - name: "[vault-post] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "vault-post"
        chart_name: "post"
        chart_local_src: "{{ inventory_dir }}/playbook-app/charts/vault/post/"
        chart_remote_dest: "{{ remote_charts_dir }}/vault/post"
      tags: [post]

    - name: "[vault-post] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/vault/post/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ vault_namespace }}
          ingress:
            ingressClass: {{ traefik_ingress_class }}
            entrypoint: {{ traefik_websecure_entrypoint }}
            domain: {{ vault_domain }}
            clusterIssuer: {{ cert_manager_cluster_issuer }}
            secretName: {{ vault_https_secret_name }}
            vpnOnlyEnabled: {{ vault_vpn_only_enabled }}
          traefik:
            namespace: {{ traefik_namespace }}
          autoUnseal:
            schedule: "{{ vault_auto_unseal_schedule }}"
            keyThreshold: {{ vault_key_threshold }}
            credsHostPath: "{{ vault_creds_host_path }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [post]

    - name: "[vault-post] Install via Helm"
      command: >
        helm upgrade --install vault-post {{ remote_charts_dir }}/vault/post
        --namespace {{ vault_namespace }}
        --values {{ remote_charts_dir }}/vault/post/values-override.yaml
        --cleanup-on-fail
        --atomic
        --wait
        --timeout {{ vault_config_helm_timeout }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [post]

    # =========================================================================
    # VERIFY
    # =========================================================================

    - name: "[vault-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        helm_namespace: "{{ vault_namespace }}"
        label_name: "vault-verify"
      tags: [always]

    - name: "[vault-verify] Get vault pods status"
      command: kubectl get pods -n {{ vault_namespace }} -o wide
      register: vault_pods
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[vault-verify] Print vault pods status"
      debug:
        msg: "{{ vault_pods.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[vault-verify] Installation complete"
      debug:
        msg: "vault-pre + vault + vault-post: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
