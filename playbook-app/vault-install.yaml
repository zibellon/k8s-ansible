# =============================================================================
# Install HashiCorp Vault via bank-vaults operator
# Steps:
#   1. vault/pre: NetworkPolicies
#   2. vault-operator: bank-vaults operator via OCI helm chart
#   3. vault-cr: Vault CR (full spec) — operator creates StatefulSet + sidecars
#   4. vault/post: Ingress
#
# Usage (tags):
#   ansible-playbook vault-install.yaml              # full install
#   ansible-playbook vault-install.yaml --tags pre   # only pre (NetworkPolicies)
#   ansible-playbook vault-install.yaml --tags install
#   ansible-playbook vault-install.yaml --tags post  # only post (Ingress)
#
# Credentials (unseal keys + root_token) are stored in K8s Secret:
#   kubectl get secret {{ vault_unsealer_secret_name }} -n {{ vault_namespace }} -o json
# =============================================================================

---
- name: Install Vault via bank-vaults operator
  hosts: managers
  become: true
  gather_facts: false

  vars:
    # Имена локальных фактов — единая точка объявления (вынос из хардкода)
    _local_vault_operator_helm_chart_source_key: "_local_vault_operator_helm_chart_source"
    _local_vault_cr_root_token_key: "_local_vault_cr_root_token"
    _local_vault_cr_root_token_exists_key: "_local_vault_cr_root_token_exists"

  tasks:
    - name: "[vault-install-pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-pre-check.yaml"
      vars:
        dto_label_name: "vault-install-pre-check"
      tags: [always]

    - name: "[vault-install-pre-check] Forbid kube-system namespace"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-forbid-kube-system.yaml"
      vars:
        dto_label_name: "vault-install-pre-check"
        dto_target_namespace: "{{ vault_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations
    # =========================================================================

    - name: "[vault-install-init] Verify Vault config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-config-verify.yaml"
      vars:
        dto_label_name: "vault-install-init"
      tags: [always]

    # =========================================================================
    # STEP 1: PRE (NetworkPolicies)
    # =========================================================================

    - name: "[vault-pre] Copy chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "vault-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/vault/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/vault/pre"
      tags: [pre]

    - name: "[vault-pre] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "vault-pre"
        dto_dir: "{{ remote_charts_dir }}/vault/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ vault_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[vault-pre] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "vault-pre"
        dto_release_name: "vault-pre"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/vault/pre"
        dto_values_file_path: "{{ remote_charts_dir }}/vault/pre/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/vault/pre-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/vault/pre-k"
        dto_patches_list: "{{ vault_pre_kustomize_patches }}"
        dto_target_namespace: "{{ vault_namespace }}"
      tags: [pre]

    - name: "[vault-pre] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "vault-pre"
        dto_helm_command: >
          helm upgrade --install vault-pre {{ remote_charts_dir }}/vault/pre-k
          --namespace {{ vault_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ vault_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: INSTALL vault-operator (bank-vaults operator via OCI)
    # =========================================================================

    - name: "[vault-operator] Add Helm repository"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-add-helm-repo.yaml"
      vars:
        dto_label_name: "vault-operator"
        dto_helm_is_oci: "{{ vault_operator_helm_is_oci }}"
        dto_helm_url: "{{ vault_operator_helm_url }}"
        dto_helm_chart_version: "{{ vault_operator_helm_chart_version }}"
        dto_helm_chart_source_res_fact_name: "{{ _local_vault_operator_helm_chart_source_key }}"
      tags: [operator]

    - name: "[vault-operator] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "vault-operator"
        dto_dir: "{{ remote_charts_dir }}/vault/operator"
        dto_filename: "values-override.yaml"
        dto_content: "{{ vault_operator_helm_values | to_nice_yaml }}"
      tags: [operator]

    - name: "[vault-operator] Install vault-operator via OCI helm chart (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "vault-operator"
        dto_helm_command: >
          helm upgrade --install vault-operator {{ lookup('vars', _local_vault_operator_helm_chart_source_key) }}
          --namespace {{ vault_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/vault/operator/values-override.yaml
          --version {{ vault_operator_helm_chart_version }}
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ vault_operator_helm_timeout }}
      tags: [operator]

    - name: "[vault-operator] Wait for vault-operator CRDs"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-crds.yaml"
      vars:
        dto_label_name: "vault-operator"
        dto_crds_list:
          - "crd/vaults.vault.banzaicloud.com"
      tags: [operator]

    - name: "[vault-operator] Wait for vault-operator Deployment rollout"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "vault-operator"
        dto_rollout_namespace: "{{ vault_namespace }}"
        dto_rollout_timeout: "{{ vault_rollout_timeout }}"
        dto_rollout_resources_list:
          - "deployment.apps/vault-operator"
      tags: [operator]

    # =========================================================================
    # STEP 3: APPLY Vault CR
    # =========================================================================

    - name: "[vault-cr] Copy chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "vault-cr"
        dto_chart_name: "cr"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/vault/cr/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/vault/cr"
      tags: [vault-cr]

    - name: "[vault-cr] Create values-override.yaml"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "vault-cr"
        dto_dir: "{{ remote_charts_dir }}/vault/cr"
        dto_filename: "values-override.yaml"
        dto_content: "{{ vault_cr_helm_values | to_nice_yaml }}"
      tags: [vault-cr]

    - name: "[vault-cr] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "vault-cr"
        dto_release_name: "vault-cr"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/vault/cr"
        dto_values_file_path: "{{ remote_charts_dir }}/vault/cr/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/vault/cr-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/vault/cr-k"
        dto_patches_list: "{{ vault_cr_kustomize_patches }}"
        dto_target_namespace: "{{ vault_namespace }}"
      tags: [vault-cr]

    - name: "[vault-cr] Apply Vault CR via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "vault-cr"
        dto_helm_command: >
          helm upgrade --install vault-cr {{ remote_charts_dir }}/vault/cr-k
          --namespace {{ vault_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ vault_cr_helm_timeout }}
      tags: [vault-cr]

    - name: "[vault-cr] Wait for StatefulSet rollout"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "vault-cr"
        dto_rollout_namespace: "{{ vault_namespace }}"
        dto_rollout_timeout: "{{ vault_rollout_timeout }}"
        dto_rollout_resources_list:
          - "statefulset/vault"
      tags: [vault-cr]

    - name: "[vault-cr] Wait for unsealer K8s Secret"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-secret.yaml"
      vars:
        dto_label_name: "vault-cr"
        dto_wait_secret_name: "{{ vault_unsealer_secret_name }}"
        dto_wait_secret_namespace: "{{ vault_namespace }}"
      tags: [vault-cr]

    - name: "[vault-cr] Read vault-root field from unsealer secret"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-secret-get.yaml"
      vars:
        dto_label_name: "vault-cr"
        dto_secret_namespace: "{{ vault_namespace }}"
        dto_secret_name: "{{ vault_unsealer_secret_name }}"
        dto_secret_field: "vault-root"
        dto_secret_res_fact_name: "{{ _local_vault_cr_root_token_key }}"
        dto_secret_res_exists_fact_name: "{{ _local_vault_cr_root_token_exists_key }}"
      tags: [vault-cr]

    - name: "[vault-cr] Assert vault-root field is populated"
      assert:
        that: lookup('vars', _local_vault_cr_root_token_exists_key)
        fail_msg: "vault-root field is empty in secret {{ vault_unsealer_secret_name }} (bank-vaults may still be initializing)"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [vault-cr]

    - name: "[vault-cr] Distribute credentials to all managers"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-distribute-creds.yaml"
      vars:
        dto_label_name: "vault-cr"
      tags: [vault-cr]

    # =========================================================================
    # STEP 4: POST (Ingress)
    # =========================================================================

    - name: "[vault-post] Copy chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "vault-post"
        dto_chart_name: "post"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/vault/post/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/vault/post"
      tags: [post]

    - name: "[vault-post] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "vault-post"
        dto_dir: "{{ remote_charts_dir }}/vault/post"
        dto_filename: "values-override.yaml"
        dto_content: "{{ vault_post_helm_values | to_nice_yaml }}"
      tags: [post]

    - name: "[vault-post] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "vault-post"
        dto_release_name: "vault-post"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/vault/post"
        dto_values_file_path: "{{ remote_charts_dir }}/vault/post/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/vault/post-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/vault/post-k"
        dto_patches_list: "{{ vault_post_kustomize_patches }}"
        dto_target_namespace: "{{ vault_namespace }}"
      tags: [post]

    - name: "[vault-post] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "vault-post"
        dto_helm_command: >
          helm upgrade --install vault-post {{ remote_charts_dir }}/vault/post-k
          --namespace {{ vault_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ vault_post_helm_timeout }}
      tags: [post]

    # =========================================================================
    # VERIFY
    # =========================================================================

    - name: "[vault-verify] Verify Helm releases"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-helm.yaml"
      vars:
        dto_helm_namespace: "{{ vault_namespace }}"
        dto_label_name: "vault-verify"
      tags: [always]

    - name: "[vault-verify] Show pods in {{ vault_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "vault-verify"
        dto_pods_namespace: "{{ vault_namespace }}"
      tags: [always]

    - name: "[vault-verify] Show NetworkPolicies in {{ vault_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-network-policy.yaml"
      vars:
        dto_label_name: "vault-verify"
        dto_np_namespace: "{{ vault_namespace }}"
      tags: [always]

    - name: "[vault-verify] Installation complete"
      debug:
        msg: "vault-pre + vault-operator + vault-cr + vault-post: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
