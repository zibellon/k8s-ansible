# =============================================================================
# Install GitLab Runner (Official Helm Chart)
# Steps:
#   1. gitlab-runner/pre: ESO resources (SA, SecretStore, ExternalSecrets) + NetworkPolicies
#   2. S3 creds: verify exist in Vault (provisioned via SeaweedFS sync OR cloud S3 manual)
#   3. Runner token: must be placed in Vault manually before running playbook
#      (GitLab UI → Admin → CI/CD → Runners → Create runner → copy token → vault kv put ...)
#   4. ESO sync: force-sync + wait for secrets
#   5. gitlab-runner: official gitlab/gitlab-runner chart
#   6. Verification
#
# Usage (tags):
#   ansible-playbook gitlab-runner-install.yaml              # full install
#   ansible-playbook gitlab-runner-install.yaml --tags pre   # only pre (ESO + NetworkPolicy)
#   ansible-playbook gitlab-runner-install.yaml --tags install
#
# Prerequisites:
#   - Vault must be installed and unsealed
#   - Vault policies must be synced (... playbook-app/vault-install.yaml --tags vault-cr)
#   - External Secrets Operator must be installed
#   - GitLab must be installed and running (gitlab-install.yaml)
#   - Runner token must be created in GitLab UI and stored in Vault manually
# =============================================================================

---
- name: Install GitLab Runner (Helm)
  hosts: managers
  become: true
  gather_facts: false

  vars:
    # Имена локальных фактов — единая точка объявления (вынос из хардкода)
    _local_runner_minio_root_username_key: "_local_runner_minio_root_username"
    _local_runner_minio_root_username_exists_key: "_local_runner_minio_root_username_exists"
    _local_runner_minio_root_password_key: "_local_runner_minio_root_password"
    _local_runner_minio_root_password_exists_key: "_local_runner_minio_root_password_exists"
    _local_runner_cache_access_key_vault_key: "_local_runner_cache_access_key_vault"
    _local_runner_cache_access_key_vault_exists_key: "_local_runner_cache_access_key_vault_exists"
    _local_gitlab_runner_token_vault_key: "_local_gitlab_runner_token_vault"
    _local_gitlab_runner_token_vault_exists_key: "_local_gitlab_runner_token_vault_exists"
    _local_gitlab_runner_helm_chart_source_key: "_local_gitlab_runner_helm_chart_source"

  tasks:
    - name: "[gitlab-runner-pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-pre-check.yaml"
      vars:
        dto_label_name: "gitlab-runner-pre-check"
      tags: [always]

    - name: "[gitlab-runner-pre-check] Forbid kube-system namespace"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-forbid-kube-system.yaml"
      vars:
        dto_label_name: "gitlab-runner-pre-check"
        dto_target_namespace: "{{ gitlab_runner_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations
    # =========================================================================

    - name: "[gitlab-runner-init] Verify Vault config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-config-verify.yaml"
      vars:
        dto_label_name: "gitlab-runner-init"
      tags: [always]

    - name: "[gitlab-runner-init] Verify ESO config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-verify.yaml"
      vars:
        dto_label_name: "gitlab-runner-init"
        dto_eso_secrets_list: "{{ eso_vault_integration_gitlab_runner_secrets + (eso_vault_integration_gitlab_runner_secrets_extra | default([])) }}"
        dto_eso_integration_object: "{{ eso_vault_integration_gitlab_runner }}"
        dto_namespace: "{{ gitlab_runner_namespace }}"
      tags: [always]

    # =========================================================================
    # STEP 1: INSTALL PRE (ESO Resources + NetworkPolicies)
    # =========================================================================

    - name: "[gitlab-runner-pre] Copy chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "gitlab-runner-pre"
        dto_chart_name: "gitlab-runner-pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/gitlab-runner/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/gitlab-runner/pre"
      tags: [pre]

    - name: "[gitlab-runner-pre] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "gitlab-runner-pre"
        dto_dir: "{{ remote_charts_dir }}/gitlab-runner/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ gitlab_runner_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[gitlab-runner-pre] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "gitlab-runner-pre"
        dto_release_name: "gitlab-runner-pre"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/gitlab-runner/pre"
        dto_values_file_path: "{{ remote_charts_dir }}/gitlab-runner/pre/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/gitlab-runner/pre-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/gitlab-runner/pre-k"
        dto_patches_list: "{{ gitlab_runner_pre_kustomize_patches }}"
        dto_target_namespace: "{{ gitlab_runner_namespace }}"
      tags: [pre]

    - name: "[gitlab-runner-pre] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "gitlab-runner-pre"
        dto_helm_command: >
          helm upgrade --install gitlab-runner-pre {{ remote_charts_dir }}/gitlab-runner/pre-k
          --namespace {{ gitlab_runner_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ gitlab_runner_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: VERIFY S3 CREDS IN VAULT (provisioned via SeaweedFS sync OR cloud S3 manual)
    # =========================================================================

    - name: "[gitlab-runner-s3-validate] Check S3 creds in Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-get.yaml"
      vars:
        dto_label_name: "gitlab-runner-s3-validate"
        dto_vault_get_path: "{{ eso_vault_integration_gitlab_runner.kv_engine_path }}{{ gitlab_runner_secret_s3_creds.vault_path }}"
        dto_vault_get_field: "{{ gitlab_runner_s3_secret_key_access_key }}"
        dto_vault_get_res_fact_name: "_local_gitlab_runner_s3_access_key_vault"
        dto_vault_get_res_exists_fact_name: "_local_gitlab_runner_s3_access_key_vault_exists"
      tags: [install]

    - name: "[gitlab-runner-s3-validate] Assert S3 creds exist (fail-fast если отсутствуют)"
      assert:
        that:
          - _local_gitlab_runner_s3_access_key_vault_exists
        fail_msg: |
          ERROR: GitLab-Runner S3 creds missing в Vault path '{{ eso_vault_integration_gitlab_runner.kv_engine_path }}{{ gitlab_runner_secret_s3_creds.vault_path }}'.
          Друг оператор, нет данных для авторизации в S3-storage для runner cache.

          Вариант A (SeaweedFS sync) — раскомментируй opt-in блоки в своём
          hosts-vars-override/seaweedfs-sync.yaml (см. hosts-vars/seaweedfs-sync.yaml
          SECTION 1 + SECTION 2 — Pre-built opt-in для GitLab + GitLab-Runner), затем:
            ansible-playbook -i hosts-vars/ -i hosts-vars-override/ \
              playbook-app/seaweedfs-install.yaml \
              --tags user-sync,identity-distribute,bucket-sync

          Вариант B (внешний S3 — cloud/etc.):
            vault kv put {{ eso_vault_integration_gitlab_runner.kv_engine_path }}{{ gitlab_runner_secret_s3_creds.vault_path }} \
              {{ gitlab_runner_s3_secret_key_username }}=<username> \
              {{ gitlab_runner_s3_secret_key_access_key }}=<accessKey> \
              {{ gitlab_runner_s3_secret_key_secret_key }}=<secretKey>

          Затем повтори ansible-playbook gitlab-runner-install.yaml.
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-runner-s3-validate] Trigger ESO sync (materialize K8s Secret)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-force-sync.yaml"
      vars:
        dto_label_name: "gitlab-runner-s3-validate"
        dto_eso_sync_namespace: "{{ gitlab_runner_namespace }}"
      tags: [install]

    - name: "[gitlab-runner-s3-validate] Wait for K8s Secret eso-gitlab-runner-s3-creds materialized"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-secret.yaml"
      vars:
        dto_label_name: "gitlab-runner-s3-validate"
        dto_wait_secret_name: "{{ gitlab_runner_secret_s3_creds.body.target.name }}"
        dto_wait_secret_namespace: "{{ gitlab_runner_namespace }}"
      tags: [install]

    # =========================================================================
    # STEP 3: VERIFY RUNNER TOKEN EXISTS IN VAULT (token set manually by DevOps)
    # =========================================================================

    - name: "[gitlab-runner-token] Get runner token from Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-get.yaml"
      vars:
        dto_label_name: "gitlab-runner-token"
        dto_vault_get_path: "{{ eso_vault_integration_gitlab_runner.kv_engine_path }}{{ gitlab_runner_secret_auth_token.vault_path }}"
        dto_vault_get_field: "{{ gitlab_runner_auth_token_secret_key_token }}"
        dto_vault_get_res_fact_name: "{{ _local_gitlab_runner_token_vault_key }}"
        dto_vault_get_res_exists_fact_name: "{{ _local_gitlab_runner_token_vault_exists_key }}"
      tags: [install]

    - name: "[gitlab-runner-token] Fail if runner token not found in Vault"
      fail:
        msg: >
          Runner token not found in Vault at
          {{ eso_vault_integration_gitlab_runner.kv_engine_path }}{{ gitlab_runner_secret_auth_token.vault_path }}.
          Create a runner in GitLab UI (Admin → CI/CD → Runners) and store the token manually:
          vault kv put {{ eso_vault_integration_gitlab_runner.kv_engine_path }}{{ gitlab_runner_secret_auth_token.vault_path }} {{ gitlab_runner_auth_token_secret_key_token }}=<value>
      when: not lookup('vars', _local_gitlab_runner_token_vault_exists_key)
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    # =========================================================================
    # STEP 4: WAIT FOR ESO TO SYNC SECRETS (runner token)
    # =========================================================================

    - name: "[gitlab-runner-wait-eso] Force sync runner token secret"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-force-sync.yaml"
      vars:
        dto_label_name: "gitlab-runner-wait-eso"
        dto_eso_sync_namespace: "{{ gitlab_runner_namespace }}"
      tags: [install]

    - name: "[gitlab-runner-wait-eso] Wait for secret"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-secret.yaml"
      vars:
        dto_label_name: "gitlab-runner-wait-eso"
        dto_wait_secret_name: "{{ gitlab_runner_secret_auth_token.body.target.name }}"
        dto_wait_secret_namespace: "{{ gitlab_runner_namespace }}"
      tags: [install]

    # =========================================================================
    # STEP 5: INSTALL GITLAB RUNNER (Official Helm Chart)
    # =========================================================================

    - name: "[gitlab-runner-install] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "gitlab-runner-install"
        dto_dir: "{{ remote_charts_dir }}/gitlab-runner/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ gitlab_runner_helm_values | to_nice_yaml }}"
      tags: [install]

    - name: "[gitlab-runner-install] Add Helm repository"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-add-helm-repo.yaml"
      vars:
        dto_label_name: "gitlab-runner-install"
        dto_helm_is_oci: "{{ gitlab_runner_helm_is_oci }}"
        dto_helm_url: "{{ gitlab_runner_helm_url }}"
        dto_helm_chart_version: "{{ gitlab_runner_helm_chart_version }}"
        dto_helm_repo_name: "{{ gitlab_runner_helm_repo_name }}"
        dto_helm_chart_name: "{{ gitlab_runner_helm_chart_name }}"
        dto_helm_chart_source_res_fact_name: "{{ _local_gitlab_runner_helm_chart_source_key }}"
      tags: [install]

    - name: "[gitlab-runner-install] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "gitlab-runner-install"
        dto_helm_command: >
          helm upgrade --install gitlab-runner {{ lookup('vars', _local_gitlab_runner_helm_chart_source_key) }}
          --namespace {{ gitlab_runner_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/gitlab-runner/install/values-override.yaml
          --version {{ gitlab_runner_helm_chart_version }}
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ gitlab_runner_install_helm_timeout }}
      tags: [install]

    - name: "[gitlab-runner-install] Wait for rollout to be ready"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "gitlab-runner-install"
        dto_rollout_namespace: "{{ gitlab_runner_namespace }}"
        dto_rollout_timeout: "{{ gitlab_runner_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment/gitlab-runner
      tags: [install]

    # =========================================================================
    # STEP 6: VERIFICATION
    # =========================================================================

    - name: "[gitlab-runner-verify] Verify Helm releases"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-helm.yaml"
      vars:
        dto_helm_namespace: "{{ gitlab_runner_namespace }}"
        dto_label_name: "gitlab-runner-verify"
      tags: [always]

    - name: "[gitlab-runner-verify] Show pods in {{ gitlab_runner_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "gitlab-runner-verify"
        dto_pods_namespace: "{{ gitlab_runner_namespace }}"
      tags: [always]

    - name: "[gitlab-runner-verify] Show NetworkPolicies in {{ gitlab_runner_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-network-policy.yaml"
      vars:
        dto_label_name: "gitlab-runner-verify"
        dto_np_namespace: "{{ gitlab_runner_namespace }}"
      tags: [always]

    - name: "[gitlab-runner-verify] Show access info"
      debug:
        msg:
          - "=============================================="
          - "GITLAB RUNNER INSTALLATION COMPLETE"
          - "=============================================="
          - "Namespace:       {{ gitlab_runner_namespace }}"
          - "GitLab URL:      https://{{ gitlab_ui_domain }}"
          - "Runner chart:    gitlab/gitlab-runner {{ gitlab_runner_helm_chart_version }}"
          - "Executor:        kubernetes"
          - "Cache:           S3 (seaweedfs-s3.{{ seaweedfs_namespace }}.svc.{{ cluster_dns_domain }}:8333)"
          - ""
          - "Runner token secret:     {{ gitlab_runner_secret_auth_token.body.target.name }}"
          - "S3 cache secret:         {{ gitlab_runner_secret_s3_creds.body.target.name }}"
          - ""
          - "Verify registration in GitLab:"
          - "  Admin → CI/CD → Runners"
          - "=============================================="
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-runner-verify] Installation complete"
      debug:
        msg: "gitlab-runner-pre + gitlab-runner: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
