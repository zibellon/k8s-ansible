# =============================================================================
# Install GitLab Runner (Official Helm Chart)
# Steps:
#   1. gitlab-runner/pre: ESO resources (SA, SecretStore, ExternalSecrets) + NetworkPolicies
#   2. MinIO runner-cache: create bucket + access key, store in Vault
#   3. Runner token: must be placed in Vault manually before running playbook
#      (GitLab UI → Admin → CI/CD → Runners → Create runner → copy token → vault kv put ...)
#   4. ESO sync: force-sync + wait for secrets
#   5. gitlab-runner: official gitlab/gitlab-runner chart
#   6. Verification
#
# Usage (tags):
#   ansible-playbook gitlab-runner-install.yaml              # full install
#   ansible-playbook gitlab-runner-install.yaml --tags pre   # only pre (ESO + NetworkPolicy)
#   ansible-playbook gitlab-runner-install.yaml --tags install
#
# Prerequisites:
#   - Vault must be installed and unsealed
#   - Vault policies must be synced (vault-policy-sync.yaml)
#   - External Secrets Operator must be installed
#   - GitLab must be installed and running (gitlab-install.yaml)
#   - Runner token must be created in GitLab UI and stored in Vault manually
# =============================================================================

---
- name: Install GitLab Runner (Helm)
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[gitlab-runner-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        label_name: "gitlab-runner-pre-check"
      tags: [always]

    - name: "[gitlab-runner-pre-check] Forbid kube-system namespace"
      include_tasks: tasks/tasks-forbid-kube-system.yaml
      vars:
        label_name: "gitlab-runner-pre-check"
        dto_target_namespace: "{{ gitlab_runner_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations
    # =========================================================================

    - name: "[gitlab-runner-init] Merge ESO integrations"
      include_tasks: tasks/tasks-eso-merge.yaml
      tags: [always]

    - name: "[gitlab-runner-init] Find secret names and vault paths by type"
      set_fact:
        secret_runner_token: "{{ (eso_vault_integration_gitlab_runner_secrets_merged | selectattr('type', 'equalto', 'runner_token') | first).target_secret_name }}"
        vault_path_runner_token: "{{ (eso_vault_integration_gitlab_runner_secrets_merged | selectattr('type', 'equalto', 'runner_token') | first).vault_path }}"
        secret_minio_cache: "{{ (eso_vault_integration_gitlab_runner_secrets_merged | selectattr('type', 'equalto', 'minio_runner_cache') | first).target_secret_name }}"
        vault_path_minio_cache: "{{ (eso_vault_integration_gitlab_runner_secrets_merged | selectattr('type', 'equalto', 'minio_runner_cache') | first).vault_path }}"
        secret_minio_root: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'minio_root') | first).target_secret_name }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    # =========================================================================
    # STEP 1: INSTALL PRE (ESO Resources + NetworkPolicies)
    # =========================================================================

    - name: "[gitlab-runner-pre] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "gitlab-runner-pre"
        dto_chart_name: "gitlab-runner-pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/gitlab-runner/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/gitlab-runner/pre"
      tags: [pre]

    - name: "[gitlab-runner-pre] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "gitlab-runner-pre"
        dto_dir: "{{ remote_charts_dir }}/gitlab-runner/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ gitlab_runner_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[gitlab-runner-pre] Install via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "gitlab-runner-pre"
        dto_helm_command: >
          helm upgrade --install gitlab-runner-pre {{ remote_charts_dir }}/gitlab-runner/pre
          --namespace {{ gitlab_runner_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/gitlab-runner/pre/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ gitlab_runner_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: MINIO RUNNER-CACHE SETUP (bucket + access key)
    # =========================================================================

    - name: "[gitlab-runner-minio] Get MinIO pod name"
      command: >
        kubectl get pods -n {{ gitlab_namespace }}
        -l app.kubernetes.io/name=gitlab-minio
        -o jsonpath='{.items[0].metadata.name}'
      register: runner_minio_pod_name
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-runner-minio] Get MinIO root username from secret"
      include_tasks: tasks/tasks-k8s-secret-get.yaml
      vars:
        label_name: "gitlab-runner-minio"
        dto_secret_namespace: "{{ gitlab_namespace }}"
        dto_secret_name: "{{ secret_minio_root }}"
        dto_secret_field: "username"
        dto_secret_res_fact_name: "runner_minio_root_username"
      tags: [install]

    - name: "[gitlab-runner-minio] Get MinIO root password from secret"
      include_tasks: tasks/tasks-k8s-secret-get.yaml
      vars:
        label_name: "gitlab-runner-minio"
        dto_secret_namespace: "{{ gitlab_namespace }}"
        dto_secret_name: "{{ secret_minio_root }}"
        dto_secret_field: "password"
        dto_secret_res_fact_name: "runner_minio_root_password"
      tags: [install]

    - name: "[gitlab-runner-minio] Assert MinIO root credentials are present"
      assert:
        that:
          - runner_minio_root_username_exists
          - runner_minio_root_password_exists
        fail_msg: "MinIO root credentials not found in secret {{ secret_minio_root }} (namespace {{ gitlab_namespace }})"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-runner-minio] Configure mc alias"
      command: >
        kubectl exec -n {{ gitlab_namespace }} {{ runner_minio_pod_name.stdout }} --
        mc alias set myminio http://localhost:9000
        '{{ runner_minio_root_username }}'
        '{{ runner_minio_root_password }}'
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-runner-minio] Create runner-cache bucket"
      command: >
        kubectl exec -n {{ gitlab_namespace }} {{ runner_minio_pod_name.stdout }} --
        mc mb myminio/runner-cache --ignore-existing
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-runner-minio] Get runner-cache access key from Vault"
      include_tasks: tasks/tasks-vault-get.yaml
      vars:
        label_name: "gitlab-runner-minio"
        dto_vault_get_path: "{{ eso_vault_integration_gitlab_runner.kv_engine_path }}{{ vault_path_minio_cache }}"
        dto_vault_get_field: access_key
        dto_vault_get_res_fact_name: "runner_cache_access_key_vault"
      tags: [install]

    - name: "[gitlab-runner-minio] Create access key for runner-cache"
      command: >
        kubectl exec -n {{ gitlab_namespace }} {{ runner_minio_pod_name.stdout }} --
        mc admin accesskey create myminio {{ runner_minio_root_username }}
        --name 'runner-cache-key' --json
      register: runner_cache_accesskey_result
      when: not runner_cache_access_key_vault_exists
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-runner-minio] Store runner-cache access key in Vault"
      include_tasks: tasks/tasks-vault-put.yaml
      vars:
        label_name: "gitlab-runner-minio"
        dto_vault_put_path: "{{ eso_vault_integration_gitlab_runner.kv_engine_path }}{{ vault_path_minio_cache }}"
        dto_vault_put_data:
          access_key: "{{ (runner_cache_accesskey_result.stdout | from_json).accessKey }}"
          secret_key: "{{ (runner_cache_accesskey_result.stdout | from_json).secretKey }}"
          bucket_name: runner-cache
      when: not runner_cache_access_key_vault_exists
      tags: [install]

    - name: "[gitlab-runner-minio] Trigger ESO sync"
      include_tasks: tasks/tasks-eso-force-sync.yaml
      vars:
        label_name: "gitlab-runner-minio"
        dto_eso_sync_namespace: "{{ gitlab_runner_namespace }}"
      tags: [install]

    - name: "[gitlab-runner-minio] Wait for secret"
      include_tasks: tasks/tasks-wait-secret.yaml
      vars:
        label_name: "gitlab-runner-minio"
        dto_wait_secret_name: "{{ secret_minio_cache }}"
        dto_wait_secret_namespace: "{{ gitlab_runner_namespace }}"
      tags: [install]

    # =========================================================================
    # STEP 3: VERIFY RUNNER TOKEN EXISTS IN VAULT (token set manually by DevOps)
    # =========================================================================

    - name: "[gitlab-runner-token] Get runner token from Vault"
      include_tasks: tasks/tasks-vault-get.yaml
      vars:
        label_name: "gitlab-runner-token"
        dto_vault_get_path: "{{ eso_vault_integration_gitlab_runner.kv_engine_path }}{{ vault_path_runner_token }}"
        dto_vault_get_field: token
        dto_vault_get_res_fact_name: "gitlab_runner_token_vault"
      tags: [install]

    - name: "[gitlab-runner-token] Fail if runner token not found in Vault"
      fail:
        msg: >
          Runner token not found in Vault at
          {{ eso_vault_integration_gitlab_runner.kv_engine_path }}{{ vault_path_runner_token }}.
          Create a runner in GitLab UI (Admin → CI/CD → Runners) and store the token manually:
          vault kv put {{ eso_vault_integration_gitlab_runner.kv_engine_path }}{{ vault_path_runner_token }} token=<value>
      when: not gitlab_runner_token_vault_exists
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    # =========================================================================
    # STEP 4: WAIT FOR ESO TO SYNC SECRETS (runner token)
    # =========================================================================

    - name: "[gitlab-runner-wait-eso] Force sync runner token secret"
      include_tasks: tasks/tasks-eso-force-sync.yaml
      vars:
        label_name: "gitlab-runner-wait-eso"
        dto_eso_sync_namespace: "{{ gitlab_runner_namespace }}"
      tags: [install]

    - name: "[gitlab-runner-wait-eso] Wait for secret"
      include_tasks: tasks/tasks-wait-secret.yaml
      vars:
        label_name: "gitlab-runner-wait-eso"
        dto_wait_secret_name: "{{ secret_runner_token }}"
        dto_wait_secret_namespace: "{{ gitlab_runner_namespace }}"
      tags: [install]

    # =========================================================================
    # STEP 5: INSTALL GITLAB RUNNER (Official Helm Chart)
    # =========================================================================

    - name: "[gitlab-runner-install] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "gitlab-runner-install"
        dto_dir: "{{ remote_charts_dir }}/gitlab-runner/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ gitlab_runner_helm_values | to_nice_yaml }}"
      tags: [install]

    - name: "[gitlab-runner-install] Add Helm repository"
      include_tasks: tasks/tasks-add-helm-repo.yaml
      vars:
        label_name: "gitlab-runner-install"
        dto_helm_repo_name: "{{ gitlab_runner_helm_repo_name }}"
        dto_helm_repo_url: "{{ gitlab_runner_helm_repo_url }}"
      tags: [install]

    - name: "[gitlab-runner-install] Install via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "gitlab-runner-install"
        dto_helm_command: >
          helm upgrade --install gitlab-runner {{ gitlab_runner_helm_repo_name }}/{{ gitlab_runner_helm_chart_name }}
          --namespace {{ gitlab_runner_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/gitlab-runner/install/values-override.yaml
          --version {{ gitlab_runner_chart_version }}
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ gitlab_runner_install_helm_timeout }}
      tags: [install]

    - name: "[gitlab-runner-install] Wait for rollout to be ready"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "gitlab-runner-install"
        dto_rollout_namespace: "{{ gitlab_runner_namespace }}"
        dto_rollout_timeout: "{{ gitlab_runner_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment/gitlab-runner
      tags: [install]

    # =========================================================================
    # STEP 6: VERIFICATION
    # =========================================================================

    - name: "[gitlab-runner-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        dto_helm_namespace: "{{ gitlab_runner_namespace }}"
        label_name: "gitlab-runner-verify"
      tags: [always]

    - name: "[gitlab-runner-verify] Get runner pods status"
      command: kubectl get pods -n {{ gitlab_runner_namespace }} -o wide
      register: runner_pods
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-runner-verify] Print runner pods status"
      debug:
        msg: "{{ runner_pods.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-runner-verify] Show access info"
      debug:
        msg:
          - "=============================================="
          - "GITLAB RUNNER INSTALLATION COMPLETE"
          - "=============================================="
          - "Namespace:       {{ gitlab_runner_namespace }}"
          - "GitLab URL:      https://{{ gitlab_ui_domain }}"
          - "Runner chart:    gitlab/gitlab-runner {{ gitlab_runner_chart_version }}"
          - "Executor:        kubernetes"
          - "Cache:           S3 (gitlab-minio.{{ gitlab_namespace }}.svc.{{ cluster_dns_domain }}:9000)"
          - ""
          - "Runner token secret:     {{ secret_runner_token }}"
          - "MinIO cache secret:      {{ secret_minio_cache }}"
          - ""
          - "Verify registration in GitLab:"
          - "  Admin → CI/CD → Runners"
          - "=============================================="
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-runner-verify] Installation complete"
      debug:
        msg: "gitlab-runner-pre + gitlab-runner: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
