# =============================================================================
# Install Prometheus Operator + Prometheus + Alertmanager via local Helm charts
# Steps:
#   1. pre:          NetworkPolicies (operator + prometheus + alertmanager)
#   2. install:      CRDs + operator deployment
#   3. prometheus:   Prometheus CRD + RBAC + Service
#   4. alertmanager: Alertmanager CRD + AlertmanagerConfig + Service
#   5. post:         Ingress + Certificates for Prometheus and Alertmanager UIs
#
# Usage (tags):
#   ansible-playbook mon-prometheus-operator-install.yaml                   # full install
#   ansible-playbook mon-prometheus-operator-install.yaml --tags pre        # only NetworkPolicies
#   ansible-playbook mon-prometheus-operator-install.yaml --tags install    # only operator
#   ansible-playbook mon-prometheus-operator-install.yaml --tags prometheus # only prometheus
#   ansible-playbook mon-prometheus-operator-install.yaml --tags alertmanager
#   ansible-playbook mon-prometheus-operator-install.yaml --tags post       # only ingress
# =============================================================================

- name: Install Prometheus Operator via local Helm chart
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[prometheus-operator-install-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        label_name: "prometheus-operator-install-pre-check"
      tags: [always]

    - name: "[prometheus-operator-install-pre-check] Forbid kube-system namespace"
      include_tasks: tasks/tasks-forbid-kube-system.yaml
      vars:
        label_name: "prometheus-operator-install-pre-check"
        dto_target_namespace: "{{ prometheus_operator_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Resolve ACME solver labels (needed for pre NetworkPolicy)
    # =========================================================================

    - name: "[prometheus-operator-init] Resolve ACME solver"
      include_tasks: tasks/tasks-resolve-acme-solver.yaml
      vars:
        label_name: prometheus-operator-init
        dto_cluster_issuer_name: "{{ prometheus_operator_cluster_issuer }}"
        dto_ingress_class_name: "{{ prometheus_operator_ingress_class }}"
      tags: [always]

    # =========================================================================
    # STEP 1: PROMETHEUS-OPERATOR/CRDS (CRDs)
    # =========================================================================

    - name: "[prometheus-operator-crds] Copy CRDs to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "prometheus-operator-crds"
        dto_chart_name: "crds"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/mon-prometheus-operator/crds/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-prometheus-operator/crds"
      tags: [crds]

    - name: "[prometheus-operator-crds] Install prometheus-operator CRDs via kubectl"
      command: kubectl create -f {{ remote_charts_dir }}/mon-prometheus-operator/crds/crds.yaml
      failed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [crds]

    - name: "[prometheus-operator-crds] Wait for CRDs"
      include_tasks: tasks/tasks-wait-crds.yaml
      vars:
        label_name: "prometheus-operator-crds"
        dto_crds_list:
          - crd/alertmanagerconfigs.monitoring.coreos.com
          - crd/alertmanagers.monitoring.coreos.com
          - crd/podmonitors.monitoring.coreos.com
          - crd/probes.monitoring.coreos.com
          - crd/prometheusagents.monitoring.coreos.com
          - crd/prometheuses.monitoring.coreos.com
          - crd/prometheusrules.monitoring.coreos.com
          - crd/scrapeconfigs.monitoring.coreos.com
          - crd/servicemonitors.monitoring.coreos.com
          - crd/thanosrulers.monitoring.coreos.com
      tags: [crds]

    # =========================================================================
    # STEP 2: PROMETHEUS-OPERATOR/PRE (NetworkPolicies)
    # =========================================================================

    - name: "[prometheus-operator-pre] Copy pre chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "prometheus-operator-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/mon-prometheus-operator/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-prometheus-operator/pre"
      tags: [pre]

    - name: "[prometheus-operator-pre] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "prometheus-operator-pre"
        dto_dir: "{{ remote_charts_dir }}/mon-prometheus-operator/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ prometheus_operator_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[prometheus-operator-pre] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "prometheus-operator-pre"
        dto_helm_command: >
          helm upgrade --install prometheus-operator-pre {{ remote_charts_dir }}/mon-prometheus-operator/pre
          --namespace {{ prometheus_operator_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/mon-prometheus-operator/pre/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ prometheus_operator_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 3: PROMETHEUS-OPERATOR/INSTALL (operator manifests)
    # =========================================================================

    - name: "[prometheus-operator-install] Copy install chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "prometheus-operator-install"
        dto_chart_name: "install"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/mon-prometheus-operator/install/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-prometheus-operator/install"
      tags: [install]

    - name: "[prometheus-operator-install] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "prometheus-operator-install"
        dto_dir: "{{ remote_charts_dir }}/mon-prometheus-operator/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ prometheus_operator_install_helm_values | to_nice_yaml }}"
      tags: [install]

    - name: "[prometheus-operator-install] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "prometheus-operator-install"
        dto_helm_command: >
          helm upgrade --install prometheus-operator {{ remote_charts_dir }}/mon-prometheus-operator/install
          --namespace {{ prometheus_operator_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/mon-prometheus-operator/install/values-override.yaml
          --cleanup-on-fail
          --skip-crds
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ prometheus_operator_install_helm_timeout }}
      tags: [install]

    # =========================================================================
    # STEP 4: PROMETHEUS-OPERATOR/ROLLOUT (operator rollout)
    # =========================================================================

    - name: "[prometheus-operator-install] Wait for rollout"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "prometheus-operator-install"
        dto_rollout_namespace: "{{ prometheus_operator_namespace }}"
        dto_rollout_timeout: "{{ prometheus_operator_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment.apps/prometheus-operator
      tags: [install]

    # =========================================================================
    # STEP 3: PROMETHEUS/INSTALL (Prometheus CRD + RBAC + Service)
    # =========================================================================

    - name: "[prometheus-install] Copy prometheus install chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "prometheus-install"
        dto_chart_name: "prometheus-install"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/mon-prometheus-operator/prometheus/install/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-prometheus-operator/prometheus/install"
      tags: [prometheus]

    - name: "[prometheus-install] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "prometheus-install"
        dto_dir: "{{ remote_charts_dir }}/mon-prometheus-operator/prometheus/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ prometheus_operator_prometheus_helm_values | to_nice_yaml }}"
      tags: [prometheus]

    - name: "[prometheus-install] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "prometheus-install"
        dto_helm_command: >
          helm upgrade --install prometheus-operator-prometheus {{ remote_charts_dir }}/mon-prometheus-operator/prometheus/install
          --namespace {{ prometheus_operator_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/mon-prometheus-operator/prometheus/install/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ prometheus_helm_timeout }}
      tags: [prometheus]

    - name: "[prometheus-install] Wait for prometheus rollout"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "prometheus-install"
        dto_rollout_namespace: "{{ prometheus_operator_namespace }}"
        dto_rollout_timeout: "{{ prometheus_rollout_timeout }}"
        dto_rollout_resources_list:
          - statefulset/prometheus-prometheus-instance
      tags: [prometheus]

    # =========================================================================
    # STEP 4: ALERTMANAGER/INSTALL (Alertmanager CRD + AlertmanagerConfig + Service)
    # =========================================================================

    - name: "[alertmanager-install] Copy alertmanager install chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "alertmanager-install"
        dto_chart_name: "alertmanager-install"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/mon-prometheus-operator/alertmanager/install/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-prometheus-operator/alertmanager/install"
      tags: [alertmanager]

    - name: "[alertmanager-install] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "alertmanager-install"
        dto_dir: "{{ remote_charts_dir }}/mon-prometheus-operator/alertmanager/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ prometheus_operator_alertmanager_helm_values | to_nice_yaml }}"
      tags: [alertmanager]

    - name: "[alertmanager-install] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "alertmanager-install"
        dto_helm_command: >
          helm upgrade --install prometheus-operator-alertmanager {{ remote_charts_dir }}/mon-prometheus-operator/alertmanager/install
          --namespace {{ prometheus_operator_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/mon-prometheus-operator/alertmanager/install/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ alertmanager_helm_timeout }}
      tags: [alertmanager]

    - name: "[alertmanager-install] Wait for alertmanager rollout"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "alertmanager-install"
        dto_rollout_namespace: "{{ prometheus_operator_namespace }}"
        dto_rollout_timeout: "{{ alertmanager_rollout_timeout }}"
        dto_rollout_resources_list:
          - statefulset/alertmanager-alertmanager-instance
      tags: [alertmanager]

    # =========================================================================
    # STEP 5: POST (Ingress + Certificates)
    # =========================================================================

    - name: "[prometheus-operator-post] Copy post chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "prometheus-operator-post"
        dto_chart_name: "post"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/mon-prometheus-operator/post/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-prometheus-operator/post"
      tags: [post]

    - name: "[prometheus-operator-post] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "prometheus-operator-post"
        dto_dir: "{{ remote_charts_dir }}/mon-prometheus-operator/post"
        dto_filename: "values-override.yaml"
        dto_content: "{{ prometheus_operator_post_helm_values | to_nice_yaml }}"
      tags: [post]

    - name: "[prometheus-operator-post] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "prometheus-operator-post"
        dto_helm_command: >
          helm upgrade --install prometheus-operator-post {{ remote_charts_dir }}/mon-prometheus-operator/post
          --namespace {{ prometheus_operator_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/mon-prometheus-operator/post/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ prometheus_operator_post_helm_timeout }}
      tags: [post]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[prometheus-operator-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        dto_helm_namespace: "{{ prometheus_operator_namespace }}"
        label_name: "prometheus-operator-verify"
      tags: [always]

    - name: "[prometheus-operator-verify] Get pods status"
      command: kubectl get pods -n {{ prometheus_operator_namespace }} -o wide
      register: prometheus_operator_pods
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[prometheus-operator-verify] Print pods status"
      debug:
        msg: "{{ prometheus_operator_pods.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[prometheus-operator-verify] Verify NetworkPolicies"
      command: kubectl get networkpolicies -n {{ prometheus_operator_namespace }}
      register: np_verify
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[prometheus-operator-verify] Show NetworkPolicies"
      debug:
        var: np_verify.stdout_lines
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[prometheus-operator-verify] Installation complete"
      debug:
        msg:
          - "prometheus-operator-pre + prometheus-operator + prometheus + alertmanager + post: OK"
          - "CRDs installed: alertmanagerconfigs, alertmanagers, podmonitors, probes, prometheusagents, prometheuses, prometheusrules, scrapeconfigs, servicemonitors, thanosrulers"
          - "Prometheus UI: https://{{ prometheus_domain }}"
          - "Alertmanager UI: https://{{ alertmanager_domain }}"
          - "Namespace: {{ prometheus_operator_namespace }}"
          - "Reads ServiceMonitors/PodMonitors from ALL namespaces"
          - "Reads AlertmanagerConfig from ALL namespaces"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
