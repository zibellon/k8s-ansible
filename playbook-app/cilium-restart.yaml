# =============================================================================
# CILIUM RESTART
# Restarts all Cilium components to apply ConfigMap/configuration changes
# =============================================================================
# Usage:
#   ansible-playbook -i hosts-vars/ -i hosts-vars-override/ playbook-app/cilium-restart.yaml
#
# Cilium does not automatically reload ConfigMaps.
# This playbook performs graceful rolling restart of all components:
#   - DaemonSets: cilium, cilium-envoy
#   - Deployments: cilium-operator, hubble-relay, hubble-ui
# =============================================================================

- name: Restart Cilium components
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[cilium-restart-pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-pre-check.yaml"
      vars:
        dto_label_name: "cilium-restart-pre-check"

    # -------------------------------------------------------------------------
    # PRE-CHECK: Verify Cilium is installed
    # -------------------------------------------------------------------------

    - name: "[cilium-restart] Check if Cilium namespace exists"
      command: kubectl get namespace {{ cilium_namespace }}
      register: _local_namespace_check
      changed_when: false
      failed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    - name: "[cilium-restart] Fail if Cilium namespace not found"
      fail:
        msg: "Cilium namespace '{{ cilium_namespace }}' not found. Install Cilium first."
      when: _local_namespace_check.rc != 0
      run_once: true

    - name: "[cilium-restart] Show pods in {{ cilium_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "cilium-restart"
        dto_pods_namespace: "{{ cilium_namespace }}"

    # -------------------------------------------------------------------------
    # RESTART DAEMONSETS
    # -------------------------------------------------------------------------

    - name: "[cilium-restart] Restart Cilium DaemonSets"
      command: kubectl rollout restart daemonset/{{ item }} -n {{ cilium_namespace }}
      loop:
        - cilium
        - cilium-envoy
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    # -------------------------------------------------------------------------
    # RESTART DEPLOYMENTS
    # -------------------------------------------------------------------------

    - name: "[cilium-restart] Restart Cilium Deployments"
      command: kubectl rollout restart deployment/{{ item }} -n {{ cilium_namespace }}
      loop:
        - cilium-operator
        - hubble-relay
        - hubble-ui
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    # -------------------------------------------------------------------------
    # WAIT FOR ROLLOUTS TO COMPLETE
    # -------------------------------------------------------------------------

    - name: "[cilium-restart] Wait for DaemonSet/Deployment rollouts"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "cilium-restart"
        dto_rollout_namespace: "{{ cilium_namespace }}"
        dto_rollout_timeout: "{{ cilium_rollout_timeout }}"
        dto_rollout_resources_list:
          - daemonset.apps/cilium
          - daemonset.apps/cilium-envoy
          - deployment.apps/cilium-operator
          - deployment.apps/hubble-ui
          - deployment.apps/hubble-relay

    # -------------------------------------------------------------------------
    # VERIFY RESTART
    # -------------------------------------------------------------------------

    - name: "[cilium-verify] Show pods in {{ cilium_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "cilium-verify"
        dto_pods_namespace: "{{ cilium_namespace }}"

    - name: "[cilium-verify] Restart completed"
      debug:
        msg:
          - "=== Cilium Restart Complete ==="
          - "All components have been restarted and are ready."
          - "ConfigMap changes are now applied."
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
