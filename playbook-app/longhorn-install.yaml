# =============================================================================
# Install Longhorn via Helm
# Steps:
#   1. longhorn/pre: NetworkPolicies for longhorn namespace
#   2. Official longhorn/longhorn chart
#   3. longhorn/post: StorageClasses, Ingress, S3 Backup Secret
#
# Usage (tags):
#   ansible-playbook longhorn-install.yaml              # full install
#   ansible-playbook longhorn-install.yaml --tags pre   # only pre (NetworkPolicies + ESO)
#   ansible-playbook longhorn-install.yaml --tags install
#   ansible-playbook longhorn-install.yaml --tags post  # only post (StorageClasses + Ingress)
# =============================================================================

---
- name: Install Longhorn via Helm
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[longhorn-install-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        label_name: "longhorn-install-pre-check"
      tags: [always]

    - name: "[longhorn-install-pre-check] Forbid kube-system namespace"
      include_tasks: tasks/tasks-forbid-kube-system.yaml
      vars:
        label_name: "longhorn-install-pre-check"
        dto_target_namespace: "{{ longhorn_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations and resolve Longhorn config
    # =========================================================================

    - name: "[longhorn-install-init] Merge ESO integrations"
      include_tasks: tasks/tasks-eso-merge.yaml
      tags: [always]


    # =========================================================================
    # STEP 1: LONGHORN/PRE (NetworkPolicies, ESO)
    # =========================================================================

    - name: "[longhorn-install-init] Resolve ACME solver"
      include_tasks: tasks/tasks-resolve-acme-solver.yaml
      vars:
        label_name: longhorn-install-init
        dto_cluster_issuer_name: "{{ longhorn_ui_cluster_issuer_name }}"
        dto_ingress_class_name: "{{ longhorn_ui_ingress_class_name }}"
        dto_acme_cluster_issuer_result_var: "longhorn_ui_acme_cluster_issuer"
        dto_acme_solver_result_var: "longhorn_ui_acme_solver"
        dto_acme_pod_labels_result_var: "longhorn_acme_solver_pod_labels"

    - name: "[longhorn-pre] Copy chart to server"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "longhorn-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/longhorn/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/longhorn/pre"
      tags: [pre]

    - name: "[longhorn-pre] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "longhorn-pre"
        dto_dir: "{{ remote_charts_dir }}/longhorn/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ longhorn_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[longhorn-pre] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "longhorn-pre"
        dto_helm_command: >
          helm upgrade --install longhorn-pre {{ remote_charts_dir }}/longhorn/pre
          --namespace {{ longhorn_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/longhorn/pre/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ longhorn_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: OFFICIAL LONGHORN/LONGHORN
    # =========================================================================

    - name: "[longhorn-install] Add Helm repository"
      include_tasks: tasks/tasks-add-helm-repo.yaml
      vars:
        label_name: "longhorn-install"
        dto_helm_repo_name: "{{ longhorn_helm_repo_name }}"
        dto_helm_repo_url: "{{ longhorn_helm_repo_url }}"
      tags: [install]

    - name: "[longhorn-install] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "longhorn-install"
        dto_dir: "{{ remote_charts_dir }}/longhorn/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ longhorn_helm_values | to_nice_yaml }}"
      tags: [install]

    - name: "[longhorn-install] Install or upgrade Longhorn via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "longhorn-install"
        dto_helm_command: >
          helm upgrade --install longhorn {{ longhorn_helm_repo_name }}/{{ longhorn_helm_chart_name }}
          --namespace {{ longhorn_namespace }}
          --create-namespace
          --version {{ longhorn_chart_version }}
          --values {{ remote_charts_dir }}/longhorn/install/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ longhorn_install_helm_timeout }}
      tags: [install]

    - name: "[longhorn-install] Wait for CRDs"
      include_tasks: tasks/tasks-wait-crds.yaml
      vars:
        label_name: "longhorn-install"
        dto_crds_list:
          - crd/backingimagedatasources.longhorn.io
          - crd/backingimagemanagers.longhorn.io
          - crd/backingimages.longhorn.io
          - crd/backupbackingimages.longhorn.io
          - crd/backups.longhorn.io
          - crd/backuptargets.longhorn.io
          - crd/backupvolumes.longhorn.io
          - crd/engineimages.longhorn.io
          - crd/engines.longhorn.io
          - crd/instancemanagers.longhorn.io
          - crd/nodes.longhorn.io
          - crd/orphans.longhorn.io
          - crd/recurringjobs.longhorn.io
          - crd/replicas.longhorn.io
          - crd/settings.longhorn.io
          - crd/sharemanagers.longhorn.io
          - crd/snapshots.longhorn.io
          - crd/supportbundles.longhorn.io
          - crd/systembackups.longhorn.io
          - crd/systemrestores.longhorn.io
          - crd/volumeattachments.longhorn.io
          - crd/volumes.longhorn.io
      tags: [install]

    - name: "[longhorn-install] Wait for HelmMainComponents rollout"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "longhorn-install"
        dto_rollout_namespace: "{{ longhorn_namespace }}"
        dto_rollout_timeout: "{{ longhorn_rollout_timeout }}"
        dto_rollout_resources_list:
          - daemonset/longhorn-manager
          - deployment/longhorn-ui
          - deployment/longhorn-driver-deployer
      tags: [install]

    - name: "[longhorn-install] Wait for ManagedComponents rollout (csi)"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "longhorn-install"
        dto_rollout_namespace: "{{ longhorn_namespace }}"
        dto_rollout_timeout: "{{ longhorn_rollout_timeout }}"
        dto_rollout_resources_list:
          - daemonset/longhorn-csi-plugin
          - deployment/csi-attacher
          - deployment/csi-provisioner
          - deployment/csi-resizer
          - deployment/csi-snapshotter
      tags: [install]

    # =========================================================================
    # STEP 3: LONGHORN/POST (StorageClasses + Ingress)
    # =========================================================================

    - name: "[longhorn-post] Copy chart to server"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "longhorn-post"
        dto_chart_name: "post"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/longhorn/post/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/longhorn/post"
      tags: [post]

    - name: "[longhorn-post] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "longhorn-post"
        dto_dir: "{{ remote_charts_dir }}/longhorn/post"
        dto_filename: "values-override.yaml"
        dto_content: "{{ longhorn_post_helm_values | to_nice_yaml }}"
      tags: [post]

    - name: "[longhorn-post] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "longhorn-post"
        dto_helm_command: >
          helm upgrade --install longhorn-post {{ remote_charts_dir }}/longhorn/post
          --namespace {{ longhorn_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/longhorn/post/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ longhorn_post_helm_timeout }}
      tags: [post]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[longhorn-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        dto_helm_namespace: "{{ longhorn_namespace }}"
        label_name: "longhorn-verify"
      tags: [always]

    - name: "[longhorn-verify] Get longhorn pods status"
      command: kubectl get pods -n {{ longhorn_namespace }} -o wide
      register: longhorn_pods
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[longhorn-verify] Print longhorn pods status"
      debug:
        msg: "{{ longhorn_pods.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[longhorn-verify] Show Longhorn access info"
      debug:
        msg:
          - "Longhorn UI: https://{{ longhorn_ui_domain }}"
          - "Longhorn UI VPN-only: {{ longhorn_ui_vpn_only_enabled }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[longhorn-verify] Installation complete"
      debug:
        msg: "longhorn-pre + longhorn + longhorn-post: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
