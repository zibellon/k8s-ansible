# =============================================================================
# Install Longhorn via Helm
# Steps:
#   1. longhorn/pre: NetworkPolicies for longhorn namespace
#   2. Official longhorn/longhorn chart
#   3. longhorn/post: StorageClasses, Ingress, S3 Backup Secret
#
# Usage (tags):
#   ansible-playbook longhorn-install.yaml              # full install
#   ansible-playbook longhorn-install.yaml --tags pre   # only pre (NetworkPolicies + ESO)
#   ansible-playbook longhorn-install.yaml --tags install
#   ansible-playbook longhorn-install.yaml --tags post  # only post (StorageClasses + Ingress)
# =============================================================================

---
- name: Install Longhorn via Helm
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[longhorn-install-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        label_name: "longhorn-install-pre-check"
      tags: [always]

    - name: "[longhorn-install-pre-check] Forbid kube-system namespace"
      include_tasks: tasks/tasks-forbid-kube-system.yaml
      vars:
        label_name: "longhorn-install-pre-check"
        namespace_value: "{{ longhorn_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations and resolve Longhorn config
    # =========================================================================

    - name: "[longhorn-install-init] Merge ESO integrations"
      include_tasks: tasks/tasks-eso-merge.yaml
      tags: [always]


    # =========================================================================
    # STEP 1: LONGHORN/PRE (NetworkPolicies, ESO)
    # =========================================================================

    - name: "[longhorn-install-init] Resolve ACME solver"
      include_tasks: tasks/tasks-resolve-acme-solver.yaml
      vars:
        label_name: longhorn-install-init
        cluster_issuer_name: "{{ longhorn_ui_cluster_issuer_name }}"
        ingress_class_name: "{{ longhorn_ui_ingress_class_name }}"
        acme_cluster_issuer_result_var: "longhorn_ui_acme_cluster_issuer"
        acme_solver_result_var: "longhorn_ui_acme_solver"
        acme_pod_labels_result_var: "longhorn_acme_solver_pod_labels"

    - name: "[longhorn-pre] Copy chart to server"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "longhorn-pre"
        chart_name: "pre"
        chart_local_src: "{{ project_root }}/playbook-app/charts/longhorn/pre/"
        chart_remote_dest: "{{ remote_charts_dir }}/longhorn/pre"
      tags: [pre]

    - name: "[longhorn-pre] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/longhorn/pre/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ longhorn_namespace }}
          traefik:
            namespace: {{ traefik_namespace }}
            instanceName: traefik-{{ traefik_namespace }}
          eso:
            vaultServerUrl: {{ vault_internal_url }}
            saName: {{ eso_vault_integration_longhorn.sa_name }}
            roleName: {{ eso_vault_integration_longhorn.role_name }}
            secretStoreName: {{ eso_vault_integration_longhorn.secret_store_name }}
            kvEnginePath: {{ eso_vault_integration_longhorn.kv_engine_path }}
            isNeedEso: {{ eso_vault_integration_longhorn.is_need_eso | default(true) }}
            secrets: {{ eso_vault_integration_longhorn_secrets_merged | to_json }}
          esoResourcesConfig:
            secretStoreRefreshInterval: {{ eso_resources_config.secret_store_refresh_interval }}
            externalSecretRefreshInterval: {{ eso_resources_config.external_secret_refresh_interval }}
            externalSecretRefreshPolicy: {{ eso_resources_config.external_secret_refresh_policy }}
          acmeSolverLabels: {{ longhorn_acme_solver_pod_labels | to_json }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [pre]

    - name: "[longhorn-pre] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "longhorn-pre"
        helm_command: >
          helm upgrade --install longhorn-pre {{ remote_charts_dir }}/longhorn/pre
          --namespace {{ longhorn_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/longhorn/pre/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ longhorn_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: OFFICIAL LONGHORN/LONGHORN
    # =========================================================================

    - name: "[longhorn-install] Add Helm repository"
      include_tasks: tasks/tasks-add-helm-repo.yaml
      vars:
        label_name: "longhorn-install"
        helm_repo_name: "longhorn"
        helm_repo_url: "https://charts.longhorn.io"
      tags: [install]

    - name: "[longhorn-install] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/longhorn/values-override.yaml"
        mode: "0644"
        content: |
          # Custom default settings
          defaultSettings:
            managerUrl: {{ longhorn_external_url }}
            defaultDataLocality: "best-effort"
            defaultReplicaCount: 2
            defaultLonghornStaticStorageClass: "longhorn-static"
            disableRevisionCounter: '{"v1":"true"}'
            allowCollectingLonghornUsageMetrics: false
            systemManagedPodsImagePullPolicy: "if-not-present"
            snapshotDataIntegrity: "enabled"
            backupExecutionTimeout: 15
            backupCompressionMethod: "gzip"
            storageMinimalAvailablePercentage: 5
            storageReservedPercentageForDefaultDisk: 5
            priorityClass: "longhorn-critical"
            disableSchedulingOnCordonedNode: true
            replicaAutoBalance: "best-effort"
            removeSnapshotsDuringFilesystemTrim: true
            nodeDownPodDeletionPolicy: "do-nothing"
            nodeDrainPolicy: "block-for-eviction"
            taintToleration: "{{ longhorn_system_managed_components_taint_toleration }}"
            systemManagedComponentsNodeSelector: "{{ longhorn_system_managed_components_node_selector }}"
          # StorageClass settings
          persistence:
            defaultClassReplicaCount: {{ longhorn_default_class_replica_count }}
          longhornManager:
            log:
              format: json
            tolerations: {{ longhorn_manager_tolerations | to_json }}
            nodeSelector: {{ longhorn_manager_node_selector | to_json }}
            resources: {{ longhorn_manager_resources | to_json }}
          longhornDriver:
            tolerations: {{ longhorn_driver_tolerations | to_json }}
            nodeSelector: {{ longhorn_driver_node_selector | to_json }}
          longhornUI:
            replicas: {{ longhorn_ui_replicas }}
            affinity: {{ longhorn_ui_affinity | to_json }}
            tolerations: {{ longhorn_ui_tolerations | to_json }}
            nodeSelector: {{ longhorn_ui_node_selector | to_json }}
          metrics:
            serviceMonitor:
              enabled: {{ longhorn_service_monitor_enabled }}
              interval: "{{ longhorn_service_monitor_interval }}"
              scrapeTimeout: "{{ longhorn_service_monitor_scrape_timeout }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[longhorn-install] Install or upgrade Longhorn via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "longhorn-install"
        helm_command: >
          helm upgrade --install longhorn longhorn/longhorn
          --namespace {{ longhorn_namespace }}
          --version {{ longhorn_chart_version }}
          --values {{ remote_charts_dir }}/longhorn/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ longhorn_helm_timeout }}
      tags: [install]

    - name: "[longhorn-install] Wait for CRDs"
      include_tasks: tasks/tasks-wait-crds.yaml
      vars:
        label_name: "longhorn-install"
        crds_list:
          - crd/backingimagedatasources.longhorn.io
          - crd/backingimagemanagers.longhorn.io
          - crd/backingimages.longhorn.io
          - crd/backupbackingimages.longhorn.io
          - crd/backups.longhorn.io
          - crd/backuptargets.longhorn.io
          - crd/backupvolumes.longhorn.io
          - crd/engineimages.longhorn.io
          - crd/engines.longhorn.io
          - crd/instancemanagers.longhorn.io
          - crd/nodes.longhorn.io
          - crd/orphans.longhorn.io
          - crd/recurringjobs.longhorn.io
          - crd/replicas.longhorn.io
          - crd/settings.longhorn.io
          - crd/sharemanagers.longhorn.io
          - crd/snapshots.longhorn.io
          - crd/supportbundles.longhorn.io
          - crd/systembackups.longhorn.io
          - crd/systemrestores.longhorn.io
          - crd/volumeattachments.longhorn.io
          - crd/volumes.longhorn.io
      tags: [install]

    - name: "[longhorn-install] Wait for DaemonSet rollout"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "longhorn-install"
        rollout_namespace: "{{ longhorn_namespace }}"
        rollout_timeout: "{{ longhorn_manager_rollout_timeout }}"
        rollout_resources:
          - daemonset/longhorn-manager
      tags: [install]

    - name: "[longhorn-install] Wait for Deployment rollout"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "longhorn-install"
        rollout_namespace: "{{ longhorn_namespace }}"
        rollout_timeout: "{{ longhorn_ui_rollout_timeout }}"
        rollout_resources:
          - deployment/longhorn-ui
      tags: [install]

    # =========================================================================
    # STEP 3: LONGHORN/POST (StorageClasses + Ingress)
    # =========================================================================

    - name: "[longhorn-post] Copy chart to server"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "longhorn-post"
        chart_name: "post"
        chart_local_src: "{{ project_root }}/playbook-app/charts/longhorn/post/"
        chart_remote_dest: "{{ remote_charts_dir }}/longhorn/post"
      tags: [post]

    - name: "[longhorn-post] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/longhorn/post/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ longhorn_namespace }}
          ingress:
            ingressClass: {{ longhorn_ui_ingress_class_name }}
            domain: {{ longhorn_ui_domain }}
            clusterIssuer: {{ longhorn_ui_cluster_issuer_name }}
            secretName: {{ longhorn_ui_https_secret_name }}
            vpnOnlyEnabled: {{ longhorn_ui_vpn_only_enabled }}
            vpnIngressMiddlewares: "{{ vpn_ingress_middlewares }}"
            httpEnable: {{ longhorn_ui_ingress_http_enable }}
            httpsEnable: {{ longhorn_ui_ingress_https_enable }}
          traefik:
            namespace: {{ traefik_namespace }}
            entryPoints:
              web: {{ traefik_web_entrypoint }}
              websecure: {{ traefik_websecure_entrypoint }}
          storageClasses: {{ longhorn_storage_classes | to_json }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [post]

    - name: "[longhorn-post] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "longhorn-post"
        helm_command: >
          helm upgrade --install longhorn-post {{ remote_charts_dir }}/longhorn/post
          --namespace {{ longhorn_namespace }}
          --values {{ remote_charts_dir }}/longhorn/post/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ longhorn_config_helm_timeout }}
      tags: [post]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[longhorn-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        helm_namespace: "{{ longhorn_namespace }}"
        label_name: "longhorn-verify"
      tags: [always]

    - name: "[longhorn-verify] Get longhorn pods status"
      command: kubectl get pods -n {{ longhorn_namespace }} -o wide
      register: longhorn_pods
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[longhorn-verify] Print longhorn pods status"
      debug:
        msg: "{{ longhorn_pods.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[longhorn-verify] Show Longhorn access info"
      debug:
        msg:
          - "Longhorn UI: https://{{ longhorn_ui_domain }}"
          - "Longhorn UI VPN-only: {{ longhorn_ui_vpn_only_enabled }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[longhorn-verify] Installation complete"
      debug:
        msg: "longhorn-pre + longhorn + longhorn-post: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
