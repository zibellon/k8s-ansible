# =============================================================================
# Install Loki via local Helm charts
# Steps:
#   1. pre:     NetworkPolicies
#   2. install: PVC + ConfigMap + Deployment + Service
#   3. post:    ServiceMonitor (prometheus-operator)
#
# Usage (tags):
#   ansible-playbook mon-loki-install.yaml              # full install
#   ansible-playbook mon-loki-install.yaml --tags pre   # only NetworkPolicies
#   ansible-playbook mon-loki-install.yaml --tags install
#   ansible-playbook mon-loki-install.yaml --tags post
# =============================================================================

- name: Install Loki via local Helm chart
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[loki-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        dto_label_name: "loki-pre-check"
      tags: [always]

    - name: "[loki-pre-check] Forbid kube-system namespace"
      include_tasks: tasks/tasks-forbid-kube-system.yaml
      vars:
        dto_label_name: "loki-pre-check"
        dto_target_namespace: "{{ loki_namespace }}"
      tags: [always]

    # =========================================================================
    # STEP 1: PRE (NetworkPolicies)
    # =========================================================================

    - name: "[loki-pre] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        dto_label_name: "loki-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/mon-loki/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-loki/pre"
      tags: [pre]

    - name: "[loki-pre] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        dto_label_name: "loki-pre"
        dto_dir: "{{ remote_charts_dir }}/mon-loki/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ loki_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[loki-pre] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        dto_label_name: "loki-pre"
        dto_helm_command: >
          helm upgrade --install loki-pre {{ remote_charts_dir }}/mon-loki/pre
          --namespace {{ loki_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/mon-loki/pre/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ loki_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: INSTALL (PVC + ConfigMap + Deployment + Service)
    # =========================================================================

    - name: "[loki-install] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        dto_label_name: "loki-install"
        dto_chart_name: "install"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/mon-loki/install/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-loki/install"
      tags: [install]

    - name: "[loki-install] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        dto_label_name: "loki-install"
        dto_dir: "{{ remote_charts_dir }}/mon-loki/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ loki_install_helm_values | to_nice_yaml }}"
      tags: [install]

    - name: "[loki-install] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        dto_label_name: "loki-install"
        dto_helm_command: >
          helm upgrade --install loki {{ remote_charts_dir }}/mon-loki/install
          --namespace {{ loki_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/mon-loki/install/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ loki_install_helm_timeout }}
      tags: [install]

    - name: "[loki-install] Wait for rollout"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        dto_label_name: "loki-install"
        dto_rollout_namespace: "{{ loki_namespace }}"
        dto_rollout_timeout: "{{ loki_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment.apps/loki
      tags: [install]

    # =========================================================================
    # STEP 3: POST (ServiceMonitor)
    # =========================================================================

    - name: "[loki-post] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        dto_label_name: "loki-post"
        dto_chart_name: "post"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/mon-loki/post/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-loki/post"
      tags: [post]

    - name: "[loki-post] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        dto_label_name: "loki-post"
        dto_dir: "{{ remote_charts_dir }}/mon-loki/post"
        dto_filename: "values-override.yaml"
        dto_content: "{{ loki_post_helm_values | to_nice_yaml }}"
      tags: [post]

    - name: "[loki-post] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        dto_label_name: "loki-post"
        dto_helm_command: >
          helm upgrade --install loki-post {{ remote_charts_dir }}/mon-loki/post
          --namespace {{ loki_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/mon-loki/post/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ loki_post_helm_timeout }}
      tags: [post]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[loki-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        dto_helm_namespace: "{{ loki_namespace }}"
        dto_label_name: "loki-verify"
      tags: [always]

    - name: "[loki-verify] Show pods in {{ loki_namespace }}"
      include_tasks: tasks/tasks-k8s-list-pods.yaml
      vars:
        dto_label_name: "loki-verify"
        dto_pods_namespace: "{{ loki_namespace }}"
      tags: [always]

    - name: "[loki-verify] Verify NetworkPolicies"
      command: kubectl get networkpolicies -n {{ loki_namespace }}
      register: np_verify
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[loki-verify] Show NetworkPolicies"
      debug:
        var: np_verify.stdout_lines
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[loki-verify] Installation complete"
      debug:
        msg:
          - "loki-pre + loki + loki-post: OK"
          - "Namespace: {{ loki_namespace }}"
          - "Image: {{ loki_image_name }}:{{ loki_image_tag }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
