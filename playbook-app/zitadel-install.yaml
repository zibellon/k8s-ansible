# =============================================================================
# Install ZITADEL (Identity & Access Management, Production Helm Chart)
# Steps:
#   1. zitadel/pre: Vault initial secrets + ESO resources (NetworkPolicies, ServiceAccount, SecretStore, ExternalSecrets)
#   2. zitadel: PostgreSQL + ZITADEL (official chart)
#   3. zitadel/post: Ingress (Traefik, h2c)
#
# Usage (tags):
#   ansible-playbook zitadel-install.yaml              # full install
#   ansible-playbook zitadel-install.yaml --tags pre   # only pre (Vault secrets + ESO resources)
#   ansible-playbook zitadel-install.yaml --tags install
#   ansible-playbook zitadel-install.yaml --tags post  # only post (Ingress)
#
# Prerequisites:
#   - Vault must be installed and unsealed
#   - Vault policies and roles must be synced (vault-policy-sync.yaml)
#   - External Secrets Operator must be installed
#   - Longhorn must be installed (storage)
#
# NOTE: ZITADEL masterkey is generated once and stored in Vault.
#       It is immutable — do NOT regenerate after first install.
# =============================================================================

---
- name: Install ZITADEL (Production Helm)
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[zitadel-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        label_name: "zitadel-pre-check"
      tags: [always]

    - name: "[zitadel-pre-check] Forbid kube-system namespace"
      include_tasks: tasks/tasks-forbid-kube-system.yaml
      vars:
        label_name: "zitadel-pre-check"
        dto_target_namespace: "{{ zitadel_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations and resolve ZITADEL config
    # =========================================================================

    - name: "[zitadel-install-init] Merge ESO integrations"
      include_tasks: tasks/tasks-eso-merge.yaml
      tags: [always]

    - name: "[zitadel-install-init] Find secret names and vault paths by type"
      set_fact:
        secret_postgresql: "{{ (eso_vault_integration_zitadel_secrets_merged | selectattr('type', 'equalto', 'postgresql') | first).target_secret_name }}"
        secret_masterkey: "{{ (eso_vault_integration_zitadel_secrets_merged | selectattr('type', 'equalto', 'masterkey') | first).target_secret_name }}"
        vault_path_postgresql: "{{ (eso_vault_integration_zitadel_secrets_merged | selectattr('type', 'equalto', 'postgresql') | first).vault_path }}"
        vault_path_masterkey: "{{ (eso_vault_integration_zitadel_secrets_merged | selectattr('type', 'equalto', 'masterkey') | first).vault_path }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    # =========================================================================
    # INIT: Resolve ClusterIssuer + ACME solver pod labels
    # =========================================================================

    - name: "[zitadel-install-init] Resolve ACME solver"
      include_tasks: tasks/tasks-resolve-acme-solver.yaml
      vars:
        label_name: zitadel-install-init
        dto_cluster_issuer_name: "{{ zitadel_cluster_issuer_name }}"
        dto_ingress_class_name: "{{ zitadel_ingress_class_name }}"
      tags: [always]

    # =========================================================================
    # STEP 1: INSTALL PRE (ESO Resources, NetworkPolicies)
    # =========================================================================

    - name: "[zitadel-pre] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "zitadel-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/zitadel/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/zitadel/pre"
      tags: [pre]

    - name: "[zitadel-pre] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "zitadel-pre"
        dto_dir: "{{ remote_charts_dir }}/zitadel/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ zitadel_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[zitadel-pre] Install via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "zitadel-pre"
        dto_helm_command: >
          helm upgrade --install zitadel-pre {{ remote_charts_dir }}/zitadel/pre
          --namespace {{ zitadel_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/zitadel/pre/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ zitadel_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: POSTGRESQL SECRETS + INSTALL
    # =========================================================================

    # ---------
    # ---postgresql-creds
    # ---------

    - name: "[zitadel-postgresql-secrets] Get PostgreSQL credentials from Vault"
      include_tasks: tasks/tasks-vault-get.yaml
      vars:
        label_name: "zitadel-postgresql-secrets"
        dto_vault_get_path: "{{ eso_vault_integration_zitadel.kv_engine_path }}{{ vault_path_postgresql }}"
        dto_vault_get_field: password
        dto_vault_get_res_fact_name: "zitadel_postgresql_vault"
      tags: [postgresql]

    - name: "[zitadel-postgresql-secrets] Generate PostgreSQL password"
      include_tasks: tasks/tasks-generate-secret.yaml
      vars:
        label_name: "zitadel-postgresql-secrets"
        dto_generate_fact_name: "_zitadel_postgresql_password_generated"
      when: not zitadel_postgresql_vault_exists
      tags: [postgresql]

    - name: "[zitadel-postgresql-secrets] Store PostgreSQL credentials in Vault"
      include_tasks: tasks/tasks-vault-put.yaml
      vars:
        label_name: "zitadel-postgresql-secrets"
        dto_vault_put_path: "{{ eso_vault_integration_zitadel.kv_engine_path }}{{ vault_path_postgresql }}"
        dto_vault_put_data:
          username: "{{ zitadel_postgresql_username }}"
          password: "{{ _zitadel_postgresql_password_generated }}"
      when: not zitadel_postgresql_vault_exists
      tags: [postgresql]

    - name: "[zitadel-postgresql-secrets] Trigger ESO sync"
      include_tasks: tasks/tasks-eso-force-sync.yaml
      vars:
        label_name: "zitadel-postgresql-secrets"
        dto_eso_sync_namespace: "{{ zitadel_namespace }}"
      tags: [postgresql]

    - name: "[zitadel-postgresql-secrets] Wait for secret"
      include_tasks: tasks/tasks-wait-secret.yaml
      vars:
        label_name: "zitadel-postgresql-secrets"
        dto_wait_secret_name: "{{ secret_postgresql }}"
        dto_wait_secret_namespace: "{{ zitadel_namespace }}"
      tags: [postgresql]

    # ---------
    # ---postgresql-install
    # ---------

    - name: "[zitadel-postgresql] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "zitadel-postgresql"
        dto_chart_name: "postgresql"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/zitadel/postgresql/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/zitadel/postgresql"
      tags: [postgresql]

    - name: "[zitadel-postgresql] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "zitadel-postgresql"
        dto_dir: "{{ remote_charts_dir }}/zitadel/postgresql"
        dto_filename: "values-override.yaml"
        dto_content: "{{ zitadel_postgresql_helm_values | to_nice_yaml }}"
      tags: [postgresql]

    - name: "[zitadel-postgresql] Install via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "zitadel-postgresql"
        dto_helm_command: >
          helm upgrade --install zitadel-postgresql {{ remote_charts_dir }}/zitadel/postgresql
          --namespace {{ zitadel_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/zitadel/postgresql/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ zitadel_postgresql_helm_timeout }}
      tags: [postgresql]

    - name: "[zitadel-postgresql] Wait for rollout to be ready"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "zitadel-postgresql"
        dto_rollout_namespace: "{{ zitadel_namespace }}"
        dto_rollout_timeout: "{{ zitadel_postgresql_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment.apps/zitadel-postgresql
      tags: [postgresql]

    # =========================================================================
    # STEP 3: MASTERKEY SECRETS + ZITADEL INSTALL
    # =========================================================================

    # ----- ZITADEL masterkey (32 ASCII bytes, immutable after first install) -----
    - name: "[zitadel-masterkey-secrets] Get masterkey from Vault"
      include_tasks: tasks/tasks-vault-get.yaml
      vars:
        label_name: "zitadel-masterkey-secrets"
        dto_vault_get_path: "{{ eso_vault_integration_zitadel.kv_engine_path }}{{ vault_path_masterkey }}"
        dto_vault_get_field: masterkey
        dto_vault_get_res_fact_name: "zitadel_masterkey_vault"
      tags: [install]

    - name: "[zitadel-masterkey-secrets] Generate masterkey"
      include_tasks: tasks/tasks-generate-secret.yaml
      vars:
        label_name: "zitadel-masterkey-secrets"
        dto_generate_fact_name: "_zitadel_masterkey_generated"
      when: not zitadel_masterkey_vault_exists
      tags: [install]

    - name: "[zitadel-masterkey-secrets] Store masterkey in Vault"
      include_tasks: tasks/tasks-vault-put.yaml
      vars:
        label_name: "zitadel-masterkey-secrets"
        dto_vault_put_path: "{{ eso_vault_integration_zitadel.kv_engine_path }}{{ vault_path_masterkey }}"
        dto_vault_put_data:
          masterkey: "{{ _zitadel_masterkey_generated }}"
      when: not zitadel_masterkey_vault_exists
      tags: [install]

    - name: "[zitadel-masterkey-secrets] Trigger ESO sync"
      include_tasks: tasks/tasks-eso-force-sync.yaml
      vars:
        label_name: "zitadel-masterkey-secrets"
        dto_eso_sync_namespace: "{{ zitadel_namespace }}"
      tags: [install]

    - name: "[zitadel-masterkey-secrets] Wait for secret"
      include_tasks: tasks/tasks-wait-secret.yaml
      vars:
        label_name: "zitadel-masterkey-secrets"
        dto_wait_secret_name: "{{ secret_masterkey }}"
        dto_wait_secret_namespace: "{{ zitadel_namespace }}"
      tags: [install]

    # ---------
    # ---install
    # ---------

    - name: "[zitadel] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "zitadel"
        dto_dir: "{{ remote_charts_dir }}/zitadel/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ zitadel_helm_values | to_nice_yaml }}"
      tags: [install]

    - name: "[zitadel] Add Helm repository"
      include_tasks: tasks/tasks-add-helm-repo.yaml
      vars:
        label_name: "zitadel"
        dto_helm_repo_name: "{{ zitadel_helm_repo_name }}"
        dto_helm_repo_url: "{{ zitadel_helm_repo_url }}"
      tags: [install]

    - name: "[zitadel] Install via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "zitadel"
        dto_helm_command: >
          helm upgrade --install zitadel {{ zitadel_helm_repo_name }}/{{ zitadel_helm_chart_name }}
          --namespace {{ zitadel_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/zitadel/install/values-override.yaml
          --version {{ zitadel_chart_version }}
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ zitadel_install_helm_timeout }}
      tags: [install]

    - name: "[zitadel] Wait for rollout to be ready"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "zitadel"
        dto_rollout_namespace: "{{ zitadel_namespace }}"
        dto_rollout_timeout: "{{ zitadel_install_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment.apps/zitadel
      tags: [install]

    # =========================================================================
    # STEP 4: POST CHART (Ingress via Traefik)
    # =========================================================================

    - name: "[zitadel-post] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "zitadel-post"
        dto_chart_name: "post"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/zitadel/post/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/zitadel/post"
      tags: [post]

    - name: "[zitadel-post] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "zitadel-post"
        dto_dir: "{{ remote_charts_dir }}/zitadel/post"
        dto_filename: "values-override.yaml"
        dto_content: "{{ zitadel_post_helm_values | to_nice_yaml }}"
      tags: [post]

    - name: "[zitadel-post] Install via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "zitadel-post"
        dto_helm_command: >
          helm upgrade --install zitadel-post {{ remote_charts_dir }}/zitadel/post
          --namespace {{ zitadel_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/zitadel/post/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ zitadel_post_helm_timeout }}
      tags: [post]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[zitadel-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        label_name: "zitadel-verify"
        dto_helm_namespace: "{{ zitadel_namespace }}"
      tags: [always]

    - name: "[zitadel-verify] Get pods status"
      command: kubectl get pods -n {{ zitadel_namespace }} -o wide
      register: zitadel_pods
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[zitadel-verify] Print pods status"
      debug:
        msg: "{{ zitadel_pods.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[zitadel-verify] Show access info"
      debug:
        msg:
          - "=============================================="
          - "ZITADEL INSTALLATION COMPLETE"
          - "=============================================="
          - "ZITADEL UI: https://{{ zitadel_domain }}"
          - ""
          - "Credentials stored in Vault:"
          - "  PostgreSQL: {{ eso_vault_integration_zitadel.kv_engine_path }}{{ vault_path_postgresql }}"
          - "  Masterkey:  {{ eso_vault_integration_zitadel.kv_engine_path }}{{ vault_path_masterkey }}"
          - ""
          - "IMPORTANT: The masterkey is immutable."
          - "  Do NOT regenerate it after first install."
          - "  Back it up from Vault immediately."
          - "=============================================="
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[zitadel-verify] Installation complete"
      debug:
        msg: "zitadel-pre + zitadel-postgresql + zitadel + zitadel-post: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
