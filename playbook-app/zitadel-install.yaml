# =============================================================================
# Install ZITADEL (Identity & Access Management, Production Helm Chart)
# Steps:
#   1. zitadel/pre: Vault initial secrets + ESO resources (NetworkPolicies, ServiceAccount, SecretStore, ExternalSecrets)
#   2. zitadel: PostgreSQL + ZITADEL (official chart)
#   3. zitadel/post: Ingress (Traefik, h2c)
#
# Usage (tags):
#   ansible-playbook zitadel-install.yaml              # full install
#   ansible-playbook zitadel-install.yaml --tags pre   # only pre (Vault secrets + ESO resources)
#   ansible-playbook zitadel-install.yaml --tags install
#   ansible-playbook zitadel-install.yaml --tags post  # only post (Ingress)
#
# Prerequisites:
#   - Vault must be installed and unsealed
#   - Vault policies and roles must be synced (... playbook-app/vault-install.yaml --tags vault-cr)
#   - External Secrets Operator must be installed
#   - Longhorn must be installed (storage)
#
# NOTE: ZITADEL masterkey is generated once and stored in Vault.
#       It is immutable — do NOT regenerate after first install.
# =============================================================================

---
- name: Install ZITADEL (Production Helm)
  hosts: managers
  become: true
  gather_facts: false

  vars:
    # Имена локальных фактов — единая точка объявления (вынос из хардкода)
    _local_zitadel_postgresql_vault_key: "_local_zitadel_postgresql_vault"
    _local_zitadel_postgresql_vault_exists_key: "_local_zitadel_postgresql_vault_exists"
    _local_zitadel_postgresql_password_generated_key: "_local_zitadel_postgresql_password_generated"
    _local_zitadel_postgresql_put_data_key: "_local_zitadel_postgresql_put_data"
    _local_zitadel_masterkey_vault_key: "_local_zitadel_masterkey_vault"
    _local_zitadel_masterkey_vault_exists_key: "_local_zitadel_masterkey_vault_exists"
    _local_zitadel_masterkey_generated_key: "_local_zitadel_masterkey_generated"
    _local_zitadel_admin_creds_vault_key: "_local_zitadel_admin_creds_vault"
    _local_zitadel_admin_creds_vault_exists_key: "_local_zitadel_admin_creds_vault_exists"
    _local_zitadel_admin_creds_password_generated_key: "_local_zitadel_admin_creds_password_generated"
    _local_zitadel_admin_creds_put_data_key: "_local_zitadel_admin_creds_put_data"
    _local_zitadel_helm_chart_source_key: "_local_zitadel_helm_chart_source"

  tasks:
    - name: "[zitadel-pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-pre-check.yaml"
      vars:
        dto_label_name: "zitadel-pre-check"
      tags: [always]

    - name: "[zitadel-pre-check] Forbid kube-system namespace"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-forbid-kube-system.yaml"
      vars:
        dto_label_name: "zitadel-pre-check"
        dto_target_namespace: "{{ zitadel_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations and resolve ZITADEL config
    # =========================================================================

    - name: "[zitadel-install-init] Verify Vault config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-config-verify.yaml"
      vars:
        dto_label_name: "zitadel-install-init"
      tags: [always]

    - name: "[zitadel-install-init] Verify ESO config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-verify.yaml"
      vars:
        dto_label_name: "zitadel-install-init"
        dto_eso_secrets_list: "{{ eso_vault_integration_zitadel_secrets + (eso_vault_integration_zitadel_secrets_extra | default([])) }}"
        dto_eso_integration_object: "{{ eso_vault_integration_zitadel }}"
        dto_namespace: "{{ zitadel_namespace }}"
      tags: [always]

    # =========================================================================
    # STEP 1: INSTALL PRE (ESO Resources, NetworkPolicies)
    # =========================================================================

    - name: "[zitadel-pre] Copy chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "zitadel-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/zitadel/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/zitadel/pre"
      tags: [pre]

    - name: "[zitadel-pre] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "zitadel-pre"
        dto_dir: "{{ remote_charts_dir }}/zitadel/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ zitadel_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[zitadel-pre] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "zitadel-pre"
        dto_release_name: "zitadel-pre"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/zitadel/pre"
        dto_values_file_path: "{{ remote_charts_dir }}/zitadel/pre/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/zitadel/pre-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/zitadel/pre-k"
        dto_patches_list: "{{ zitadel_pre_kustomize_patches }}"
        dto_target_namespace: "{{ zitadel_namespace }}"
      tags: [pre]

    - name: "[zitadel-pre] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "zitadel-pre"
        dto_helm_command: >
          helm upgrade --install zitadel-pre {{ remote_charts_dir }}/zitadel/pre-k
          --namespace {{ zitadel_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ zitadel_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: POSTGRESQL SECRETS + INSTALL
    # =========================================================================

    # ---------
    # ---postgresql-creds
    # ---------

    - name: "[zitadel-postgresql-secrets] Get PostgreSQL credentials from Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-get.yaml"
      vars:
        dto_label_name: "zitadel-postgresql-secrets"
        dto_vault_get_path: "{{ eso_vault_integration_zitadel.kv_engine_path }}{{ zitadel_secret_postgresql_creds.vault_path }}"
        dto_vault_get_field: "{{ zitadel_postgresql_secret_key_password }}"
        dto_vault_get_res_fact_name: "{{ _local_zitadel_postgresql_vault_key }}"
        dto_vault_get_res_exists_fact_name: "{{ _local_zitadel_postgresql_vault_exists_key }}"
      tags: [postgresql]

    - name: "[zitadel-postgresql-secrets] Generate PostgreSQL password"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-generate-secret.yaml"
      vars:
        dto_label_name: "zitadel-postgresql-secrets"
        dto_generate_fact_name: "{{ _local_zitadel_postgresql_password_generated_key }}"
      when: not lookup('vars', _local_zitadel_postgresql_vault_exists_key)
      tags: [postgresql]

    - name: "[zitadel-postgresql-secrets] Prepare PostgreSQL Vault put data"
      set_fact:
        "{{ _local_zitadel_postgresql_put_data_key }}": >-
          {{ {
               zitadel_postgresql_secret_key_username: zitadel_postgresql_username,
               zitadel_postgresql_secret_key_password: lookup('vars', _local_zitadel_postgresql_password_generated_key)
             } }}
      when: not lookup('vars', _local_zitadel_postgresql_vault_exists_key)
      tags: [postgresql]

    - name: "[zitadel-postgresql-secrets] Store PostgreSQL credentials in Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-put.yaml"
      vars:
        dto_label_name: "zitadel-postgresql-secrets"
        dto_vault_put_path: "{{ eso_vault_integration_zitadel.kv_engine_path }}{{ zitadel_secret_postgresql_creds.vault_path }}"
        dto_vault_put_data: "{{ lookup('vars', _local_zitadel_postgresql_put_data_key) }}"
      when: not lookup('vars', _local_zitadel_postgresql_vault_exists_key)
      tags: [postgresql]

    - name: "[zitadel-postgresql-secrets] Trigger ESO sync"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-force-sync.yaml"
      vars:
        dto_label_name: "zitadel-postgresql-secrets"
        dto_eso_sync_namespace: "{{ zitadel_namespace }}"
      tags: [postgresql]

    - name: "[zitadel-postgresql-secrets] Wait for secret"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-secret.yaml"
      vars:
        dto_label_name: "zitadel-postgresql-secrets"
        dto_wait_secret_name: "{{ zitadel_secret_postgresql_creds.body.target.name }}"
        dto_wait_secret_namespace: "{{ zitadel_namespace }}"
      tags: [postgresql]

    # ---------
    # ---postgresql-install
    # ---------

    - name: "[zitadel-postgresql] Copy chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "zitadel-postgresql"
        dto_chart_name: "postgresql"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/zitadel/postgresql/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/zitadel/postgresql"
      tags: [postgresql]

    - name: "[zitadel-postgresql] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "zitadel-postgresql"
        dto_dir: "{{ remote_charts_dir }}/zitadel/postgresql"
        dto_filename: "values-override.yaml"
        dto_content: "{{ zitadel_postgresql_helm_values | to_nice_yaml }}"
      tags: [postgresql]

    - name: "[zitadel-postgresql] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "zitadel-postgresql"
        dto_release_name: "zitadel-postgresql"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/zitadel/postgresql"
        dto_values_file_path: "{{ remote_charts_dir }}/zitadel/postgresql/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/zitadel/postgresql-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/zitadel/postgresql-k"
        dto_patches_list: "{{ zitadel_postgresql_kustomize_patches }}"
        dto_target_namespace: "{{ zitadel_namespace }}"
      tags: [postgresql]

    - name: "[zitadel-postgresql] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "zitadel-postgresql"
        dto_helm_command: >
          helm upgrade --install zitadel-postgresql {{ remote_charts_dir }}/zitadel/postgresql-k
          --namespace {{ zitadel_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ zitadel_postgresql_helm_timeout }}
      tags: [postgresql]

    - name: "[zitadel-postgresql] Wait for rollout to be ready"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "zitadel-postgresql"
        dto_rollout_namespace: "{{ zitadel_namespace }}"
        dto_rollout_timeout: "{{ zitadel_postgresql_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment.apps/zitadel-postgresql
      tags: [postgresql]

    # =========================================================================
    # STEP 3: MASTERKEY SECRETS + ZITADEL INSTALL
    # =========================================================================

    # ----- ZITADEL masterkey (32 ASCII bytes, immutable after first install) -----
    - name: "[zitadel-masterkey-secrets] Get masterkey from Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-get.yaml"
      vars:
        dto_label_name: "zitadel-masterkey-secrets"
        dto_vault_get_path: "{{ eso_vault_integration_zitadel.kv_engine_path }}{{ zitadel_secret_masterkey.vault_path }}"
        dto_vault_get_field: "{{ zitadel_masterkey_secret_key }}"
        dto_vault_get_res_fact_name: "{{ _local_zitadel_masterkey_vault_key }}"
        dto_vault_get_res_exists_fact_name: "{{ _local_zitadel_masterkey_vault_exists_key }}"
      tags: [install]

    - name: "[zitadel-masterkey-secrets] Generate masterkey"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-generate-secret.yaml"
      vars:
        dto_label_name: "zitadel-masterkey-secrets"
        dto_generate_fact_name: "{{ _local_zitadel_masterkey_generated_key }}"
      when: not lookup('vars', _local_zitadel_masterkey_vault_exists_key)
      tags: [install]

    - name: "[zitadel-masterkey-secrets] Store masterkey in Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-put.yaml"
      vars:
        dto_label_name: "zitadel-masterkey-secrets"
        dto_vault_put_path: "{{ eso_vault_integration_zitadel.kv_engine_path }}{{ zitadel_secret_masterkey.vault_path }}"
        dto_vault_put_data: >-
          {{ { zitadel_masterkey_secret_key: lookup('vars', _local_zitadel_masterkey_generated_key) } }}
      when: not lookup('vars', _local_zitadel_masterkey_vault_exists_key)
      tags: [install]

    - name: "[zitadel-masterkey-secrets] Trigger ESO sync"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-force-sync.yaml"
      vars:
        dto_label_name: "zitadel-masterkey-secrets"
        dto_eso_sync_namespace: "{{ zitadel_namespace }}"
      tags: [install]

    - name: "[zitadel-masterkey-secrets] Wait for secret"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-secret.yaml"
      vars:
        dto_label_name: "zitadel-masterkey-secrets"
        dto_wait_secret_name: "{{ zitadel_secret_masterkey.body.target.name }}"
        dto_wait_secret_namespace: "{{ zitadel_namespace }}"
      tags: [install]

    # ----- ZITADEL first human-admin creds (username + password, policy-compliant) -----
    - name: "[zitadel-admin-secrets] Get admin credentials from Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-get.yaml"
      vars:
        dto_label_name: "zitadel-admin-secrets"
        dto_vault_get_path: "{{ eso_vault_integration_zitadel.kv_engine_path }}{{ zitadel_secret_admin_creds.vault_path }}"
        dto_vault_get_field: "{{ zitadel_admin_secret_key_password }}"
        dto_vault_get_res_fact_name: "{{ _local_zitadel_admin_creds_vault_key }}"
        dto_vault_get_res_exists_fact_name: "{{ _local_zitadel_admin_creds_vault_exists_key }}"
      tags: [install]

    - name: "[zitadel-admin-secrets] Generate admin password"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-generate-secret.yaml"
      vars:
        dto_label_name: "zitadel-admin-secrets"
        dto_generate_fact_name: "{{ _local_zitadel_admin_creds_password_generated_key }}"
        dto_generate_count_digits: 4
        dto_generate_count_upper: 6
        dto_generate_count_lower: 6
        dto_generate_count_special: 4
      when: not lookup('vars', _local_zitadel_admin_creds_vault_exists_key)
      tags: [install]

    - name: "[zitadel-admin-secrets] Prepare admin Vault put data"
      set_fact:
        "{{ _local_zitadel_admin_creds_put_data_key }}": >-
          {{ {
               zitadel_admin_secret_key_username: zitadel_admin_username,
               zitadel_admin_secret_key_password: lookup('vars', _local_zitadel_admin_creds_password_generated_key)
             } }}
      when: not lookup('vars', _local_zitadel_admin_creds_vault_exists_key)
      tags: [install]

    - name: "[zitadel-admin-secrets] Store admin credentials in Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-put.yaml"
      vars:
        dto_label_name: "zitadel-admin-secrets"
        dto_vault_put_path: "{{ eso_vault_integration_zitadel.kv_engine_path }}{{ zitadel_secret_admin_creds.vault_path }}"
        dto_vault_put_data: "{{ lookup('vars', _local_zitadel_admin_creds_put_data_key) }}"
      when: not lookup('vars', _local_zitadel_admin_creds_vault_exists_key)
      tags: [install]

    - name: "[zitadel-admin-secrets] Trigger ESO sync"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-force-sync.yaml"
      vars:
        dto_label_name: "zitadel-admin-secrets"
        dto_eso_sync_namespace: "{{ zitadel_namespace }}"
      tags: [install]

    - name: "[zitadel-admin-secrets] Wait for secret"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-secret.yaml"
      vars:
        dto_label_name: "zitadel-admin-secrets"
        dto_wait_secret_name: "{{ zitadel_secret_admin_creds.body.target.name }}"
        dto_wait_secret_namespace: "{{ zitadel_namespace }}"
      tags: [install]

    # ---------
    # ---install
    # ---------

    - name: "[zitadel-install] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "zitadel-install"
        dto_dir: "{{ remote_charts_dir }}/zitadel/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ zitadel_helm_values | to_nice_yaml }}"
      tags: [install]

    - name: "[zitadel-install] Add Helm repository"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-add-helm-repo.yaml"
      vars:
        dto_label_name: "zitadel-install"
        dto_helm_is_oci: "{{ zitadel_helm_is_oci }}"
        dto_helm_url: "{{ zitadel_helm_url }}"
        dto_helm_chart_version: "{{ zitadel_helm_chart_version }}"
        dto_helm_repo_name: "{{ zitadel_helm_repo_name }}"
        dto_helm_chart_name: "{{ zitadel_helm_chart_name }}"
        dto_helm_chart_source_res_fact_name: "{{ _local_zitadel_helm_chart_source_key }}"
      tags: [install]

    - name: "[zitadel-install] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "zitadel-install"
        dto_helm_command: >
          helm upgrade --install zitadel {{ lookup('vars', _local_zitadel_helm_chart_source_key) }}
          --namespace {{ zitadel_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/zitadel/install/values-override.yaml
          --version {{ zitadel_helm_chart_version }}
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ zitadel_install_helm_timeout }}
      tags: [install]

    - name: "[zitadel-install] Wait for rollout to be ready"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "zitadel-install"
        dto_rollout_namespace: "{{ zitadel_namespace }}"
        dto_rollout_timeout: "{{ zitadel_install_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment.apps/zitadel
      tags: [install]

    # =========================================================================
    # STEP 4: POST CHART (Ingress via Traefik)
    # =========================================================================

    - name: "[zitadel-post] Copy chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "zitadel-post"
        dto_chart_name: "post"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/zitadel/post/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/zitadel/post"
      tags: [post]

    - name: "[zitadel-post] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "zitadel-post"
        dto_dir: "{{ remote_charts_dir }}/zitadel/post"
        dto_filename: "values-override.yaml"
        dto_content: "{{ zitadel_post_helm_values | to_nice_yaml }}"
      tags: [post]

    - name: "[zitadel-post] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "zitadel-post"
        dto_release_name: "zitadel-post"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/zitadel/post"
        dto_values_file_path: "{{ remote_charts_dir }}/zitadel/post/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/zitadel/post-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/zitadel/post-k"
        dto_patches_list: "{{ zitadel_post_kustomize_patches }}"
        dto_target_namespace: "{{ zitadel_namespace }}"
      tags: [post]

    - name: "[zitadel-post] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "zitadel-post"
        dto_helm_command: >
          helm upgrade --install zitadel-post {{ remote_charts_dir }}/zitadel/post-k
          --namespace {{ zitadel_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ zitadel_post_helm_timeout }}
      tags: [post]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[zitadel-verify] Verify Helm releases"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-helm.yaml"
      vars:
        dto_label_name: "zitadel-verify"
        dto_helm_namespace: "{{ zitadel_namespace }}"
      tags: [always]

    - name: "[zitadel-verify] Show pods in {{ zitadel_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "zitadel-verify"
        dto_pods_namespace: "{{ zitadel_namespace }}"
      tags: [always]

    - name: "[zitadel-verify] Show NetworkPolicies in {{ zitadel_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-network-policy.yaml"
      vars:
        dto_label_name: "zitadel-verify"
        dto_np_namespace: "{{ zitadel_namespace }}"
      tags: [always]

    - name: "[zitadel-verify] Show access info"
      debug:
        msg:
          - "=============================================="
          - "ZITADEL INSTALLATION COMPLETE"
          - "=============================================="
          - "ZITADEL UI: https://{{ zitadel_domain }}"
          - ""
          - "Credentials stored in Vault:"
          - "  PostgreSQL: {{ eso_vault_integration_zitadel.kv_engine_path }}{{ zitadel_secret_postgresql_creds.vault_path }}"
          - "  Masterkey:  {{ eso_vault_integration_zitadel.kv_engine_path }}{{ zitadel_secret_masterkey.vault_path }}"
          - ""
          - "IMPORTANT: The masterkey is immutable."
          - "  Do NOT regenerate it after first install."
          - "  Back it up from Vault immediately."
          - "=============================================="
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[zitadel-verify] Installation complete"
      debug:
        msg: "zitadel-pre + zitadel-postgresql + zitadel + zitadel-post: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
