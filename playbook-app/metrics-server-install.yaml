# =============================================================================
# Install metrics-server via Helm
# Steps:
#   1. metrics-server/pre: NetworkPolicies for metrics-server pods in kube-system
#   2. Official metrics-server Helm chart (kubernetes-sigs/metrics-server)
#
# Usage (tags):
#   ansible-playbook metrics-server-install.yaml              # full install
#   ansible-playbook metrics-server-install.yaml --tags pre   # only pre (NetworkPolicies)
#   ansible-playbook metrics-server-install.yaml --tags install
#   ansible-playbook metrics-server-install.yaml --tags post  # (no-op)
# =============================================================================

---
- name: Install metrics-server
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[metrics-server-install-pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-pre-check.yaml"
      vars:
        dto_label_name: "metrics-server-install-pre-check"
      tags: [always]

    - name: "[metrics-server-install-pre-check] Forbid kube-system namespace"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-forbid-kube-system.yaml"
      vars:
        dto_label_name: "metrics-server-install-pre-check"
        dto_target_namespace: "{{ metrics_server_namespace }}"
      tags: [always]

    # =========================================================================
    # STEP 1: METRICS-SERVER/PRE (NetworkPolicies)
    # =========================================================================

    - name: "[metrics-server-pre] Copy chart to server"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "metrics-server-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/metrics-server/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/metrics-server/pre"
      tags: [pre]

    - name: "[metrics-server-pre] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "metrics-server-pre"
        dto_dir: "{{ remote_charts_dir }}/metrics-server/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ metrics_server_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[metrics-server-pre] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "metrics-server-pre"
        dto_release_name: "metrics-server-pre"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/metrics-server/pre"
        dto_values_file_path: "{{ remote_charts_dir }}/metrics-server/pre/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/metrics-server/pre-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/metrics-server/pre-k"
        dto_patches_list: "{{ metrics_server_pre_kustomize_patches }}"
        dto_target_namespace: "{{ metrics_server_namespace }}"
      tags: [pre]

    - name: "[metrics-server-pre] Install or upgrade via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "metrics-server-pre"
        dto_helm_command: >
          helm upgrade --install metrics-server-pre {{ remote_charts_dir }}/metrics-server/pre-k
          --namespace {{ metrics_server_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ metrics_server_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: OFFICIAL METRICS-SERVER HELM
    # =========================================================================

    - name: "[metrics-server-install] Add Helm repository"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-add-helm-repo.yaml"
      vars:
        dto_label_name: "metrics-server-install"
        dto_helm_is_oci: "{{ metrics_server_helm_is_oci }}"
        dto_helm_url: "{{ metrics_server_helm_url }}"
        dto_helm_chart_version: "{{ metrics_server_helm_chart_version }}"
        dto_helm_repo_name: "{{ metrics_server_helm_repo_name }}"
        dto_helm_chart_name: "{{ metrics_server_helm_chart_name }}"
        dto_helm_chart_source_res_fact_name: "metrics_server_helm_chart_source"
      tags: [install]

    - name: "[metrics-server-install] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "metrics-server-install"
        dto_dir: "{{ remote_charts_dir }}/metrics-server/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ metrics_server_helm_values | to_nice_yaml }}"
      tags: [install]

    - name: "[metrics-server-install] Install or upgrade via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "metrics-server-install"
        dto_helm_command: >
          helm upgrade --install metrics-server {{ metrics_server_helm_chart_source }}
          --namespace {{ metrics_server_namespace }}
          --create-namespace
          --version {{ metrics_server_helm_chart_version }}
          --values {{ remote_charts_dir }}/metrics-server/install/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ metrics_server_install_helm_timeout }}
      tags: [install]

    # =========================================================================
    # WAIT FOR METRICS-SERVER PODS
    # =========================================================================

    - name: "[metrics-server-install] Wait for rollout"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "metrics-server-install"
        dto_rollout_namespace: "{{ metrics_server_namespace }}"
        dto_rollout_timeout: "{{ metrics_server_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment.apps/metrics-server
      tags: [install]

    # =========================================================================
    # STEP 3: POST (no-op)
    # =========================================================================

    # post: nothing to do for metrics-server

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[metrics-server-verify] Verify Helm releases"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-helm.yaml"
      vars:
        dto_helm_namespace: "{{ metrics_server_namespace }}"
        dto_label_name: "metrics-server-verify"
      tags: [always]

    - name: "[metrics-server-verify] Show pods in {{ metrics_server_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "metrics-server-verify"
        dto_pods_namespace: "{{ metrics_server_namespace }}"
      tags: [always]

    - name: "[metrics-server-verify] Show NetworkPolicies in {{ metrics_server_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-network-policy.yaml"
      vars:
        dto_label_name: "metrics-server-verify"
        dto_np_namespace: "{{ metrics_server_namespace }}"
      tags: [always]

    - name: "[metrics-server-verify] Installation complete"
      debug:
        msg: "metrics-server-pre + metrics-server: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
