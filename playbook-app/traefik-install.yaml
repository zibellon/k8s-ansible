# =============================================================================
# Install Traefik via official Helm chart (traefik/traefik)
# Steps:
#   1. traefik/pre: NetworkPolicies for traefik namespace
#   2. Official traefik/traefik chart (DaemonSet, Services, RBAC, CRDs)
#   3. traefik/post: Middlewares + Dashboard Ingress
#
# Usage (tags):
#   ansible-playbook traefik-install.yaml              # full install
#   ansible-playbook traefik-install.yaml --tags pre   # only pre (NetworkPolicies + ESO)
#   ansible-playbook traefik-install.yaml --tags install
#   ansible-playbook traefik-install.yaml --tags post  # only post (Middlewares + Dashboard)
# =============================================================================

---
- name: Install Traefik via official Helm chart
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[traefik-install-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        label_name: "traefik-install-pre-check"
      tags: [always]

    - name: "[traefik-install-pre-check] Forbid kube-system namespace"
      include_tasks: tasks/tasks-forbid-kube-system.yaml
      vars:
        label_name: "traefik-install-pre-check"
        dto_target_namespace: "{{ traefik_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations and resolve Traefik config
    # =========================================================================

    - name: "[traefik-install-init] Merge ESO integrations"
      include_tasks: tasks/tasks-eso-merge.yaml
      tags: [always]

    - name: "[traefik-init] Resolve ACME solver"
      include_tasks: tasks/tasks-resolve-acme-solver.yaml
      vars:
        label_name: traefik-init
        dto_cluster_issuer_name: "{{ traefik_dashboard_cluster_issuer_name }}"
        dto_ingress_class_name: "{{ traefik_dashboard_ingress_class_name }}"
        dto_acme_cluster_issuer_result_var: "traefik_dashboard_acme_cluster_issuer"
        dto_acme_solver_result_var: "traefik_dashboard_acme_solver"
        dto_acme_pod_labels_result_var: "traefik_acme_solver_pod_labels"

    # =========================================================================
    # STEP 1: TRAEFIK/PRE (NetworkPolicies, ESO)
    # =========================================================================

    - name: "[traefik-pre] Copy chart to server"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "traefik-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/traefik/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/traefik/pre"
      tags: [pre]

    - name: "[traefik-pre] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/traefik/pre/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ traefik_namespace }}
          instanceName: traefik-{{ traefik_namespace }}
          eso:
            vaultServerUrl: {{ vault_internal_url }}
            saName: {{ eso_vault_integration_traefik.sa_name }}
            roleName: {{ eso_vault_integration_traefik.role_name }}
            secretStoreName: {{ eso_vault_integration_traefik.secret_store_name }}
            kvEnginePath: {{ eso_vault_integration_traefik.kv_engine_path }}
            isNeedEso: {{ eso_vault_integration_traefik.is_need_eso | default(true) }}
            secrets: {{ eso_vault_integration_traefik_secrets_merged | to_json }}
          esoResourcesConfig:
            secretStoreRefreshInterval: {{ eso_resources_config.secret_store_refresh_interval }}
            externalSecretRefreshInterval: {{ eso_resources_config.external_secret_refresh_interval }}
            externalSecretRefreshPolicy: {{ eso_resources_config.external_secret_refresh_policy }}
          acmeSolverLabels: {{ traefik_acme_solver_pod_labels | to_json }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [pre]

    - name: "[traefik-pre] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "traefik-pre"
        dto_helm_command: >
          helm upgrade --install traefik-pre {{ remote_charts_dir }}/traefik/pre
          --namespace {{ traefik_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/traefik/pre/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ traefik_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: OFFICIAL TRAEFIK CHART
    # =========================================================================

    - name: "[traefik-install] Add Helm repository"
      include_tasks: tasks/tasks-add-helm-repo.yaml
      vars:
        label_name: "traefik-install"
        dto_helm_repo_name: "{{ traefik_helm_repo_name }}"
        dto_helm_repo_url: "{{ traefik_helm_repo_url }}"
      tags: [install]

    - name: "[traefik-install] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "traefik-install"
        dto_dir: "{{ remote_charts_dir }}/traefik/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ traefik_helm_values | to_nice_yaml }}"
      tags: [install]

    - name: "[traefik-install] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "traefik-install"
        dto_helm_command: >
          helm upgrade --install traefik {{ traefik_helm_repo_name }}/{{ traefik_helm_chart_name }}
          --namespace {{ traefik_namespace }}
          --create-namespace
          --version {{ traefik_chart_version }}
          --values {{ remote_charts_dir }}/traefik/install/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ traefik_install_helm_timeout }}
      tags: [install]

    # =========================================================================
    # WAIT FOR TRAEFIK CRDs
    # =========================================================================

    - name: "[traefik-install] Wait for CRDs"
      include_tasks: tasks/tasks-wait-crds.yaml
      vars:
        label_name: "traefik-install"
        dto_crds_list:
          - crd/ingressroutes.traefik.io
          - crd/ingressroutetcps.traefik.io
          - crd/ingressrouteudps.traefik.io
          - crd/middlewares.traefik.io
          - crd/middlewaretcps.traefik.io
          - crd/serverstransports.traefik.io
          - crd/serverstransporttcps.traefik.io
          - crd/tlsoptions.traefik.io
          - crd/tlsstores.traefik.io
          - crd/traefikservices.traefik.io
          - crd/accesscontrolpolicies.hub.traefik.io
          - crd/aiservices.hub.traefik.io
          - crd/apiauths.hub.traefik.io
          - crd/apibundles.hub.traefik.io
          - crd/apicatalogitems.hub.traefik.io
          - crd/apiplans.hub.traefik.io
          - crd/apiportalauths.hub.traefik.io
          - crd/apiportals.hub.traefik.io
          - crd/apiratelimits.hub.traefik.io
          - crd/apis.hub.traefik.io
          - crd/apiversions.hub.traefik.io
          - crd/managedapplications.hub.traefik.io
          - crd/managedsubscriptions.hub.traefik.io
      tags: [install]

    # =========================================================================
    # WAIT FOR TRAEFIK TO BE READY
    # =========================================================================

    - name: "[traefik-install] Wait for rollouts"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "traefik-install"
        dto_rollout_namespace: "{{ traefik_namespace }}"
        dto_rollout_timeout: "{{ traefik_rollout_timeout }}"
        dto_rollout_resources_list:
          - daemonset/{{ traefik_daemonset_name }}
      tags: [install]

    # =========================================================================
    # STEP 3: TRAEFIK/POST (Middlewares + Dashboard Ingress)
    # =========================================================================

    - name: "[traefik-post] Copy chart to server"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "traefik-post"
        dto_chart_name: "post"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/traefik/post/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/traefik/post"
      tags: [post]

    - name: "[traefik-post] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/traefik/post/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ traefik_namespace }}
          ingressClass: {{ traefik_dashboard_ingress_class_name }}
          traefik:
            entryPoints:
              web: {{ traefik_web_entrypoint }}
              websecure: {{ traefik_websecure_entrypoint }}
          middlewares: {{ traefik_middlewares | to_json }}
          vpnMiddlewares: {{ vpn_traefik_middlewares | to_json }}
          vpnIngressMiddlewares: "{{ vpn_ingress_middlewares }}"
          dashboard:
            serviceName: {{ traefik_dashboard_service_name }}
            domain: {{ traefik_dashboard_domain }}
            secretName: {{ traefik_dashboard_https_secret_name }}
            clusterIssuer: {{ traefik_dashboard_cluster_issuer_name }}
            vpnOnlyEnabled: {{ traefik_dashboard_vpn_only_enabled }}
            httpEnable: {{ traefik_dashboard_ingress_http_enable }}
            httpsEnable: {{ traefik_dashboard_ingress_https_enable }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [post]

    - name: "[traefik-post] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "traefik-post"
        dto_helm_command: >
          helm upgrade --install traefik-post {{ remote_charts_dir }}/traefik/post
          --namespace {{ traefik_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/traefik/post/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ traefik_post_helm_timeout }}
      tags: [post]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[traefik-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        dto_helm_namespace: "{{ traefik_namespace }}"
        label_name: "traefik-verify"
      tags: [always]

    - name: "[traefik-verify] Get traefik pods status"
      command: kubectl get pods -n {{ traefik_namespace }} -o wide
      register: traefik_pods
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[traefik-verify] Print traefik pods status"
      debug:
        msg: "{{ traefik_pods.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[traefik-verify] Installation complete"
      debug:
        msg: "traefik-pre + traefik + traefik-post: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
