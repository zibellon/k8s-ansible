# =============================================================================
# TRAEFIK RESTART
# Restarts Traefik DaemonSet to apply configuration changes
# =============================================================================
# Usage:
#   ansible-playbook -i hosts-vars/ -i hosts-vars-override/ playbook-app/traefik-restart.yaml
# =============================================================================

- name: Restart Traefik
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[traefik-restart-pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-pre-check.yaml"
      vars:
        dto_label_name: "traefik-restart-pre-check"

    # -------------------------------------------------------------------------
    # PRE-CHECK: Verify Traefik is installed
    # -------------------------------------------------------------------------

    - name: "[traefik-restart] Check if Traefik namespace exists"
      command: kubectl get namespace {{ traefik_namespace }}
      register: namespace_check
      changed_when: false
      failed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    - name: "[traefik-restart] Fail if Traefik namespace not found"
      fail:
        msg: "Traefik namespace '{{ traefik_namespace }}' not found. Install Traefik first."
      when: namespace_check.rc != 0
      run_once: true

    - name: "[traefik-restart] Show pods in {{ traefik_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "traefik-restart"
        dto_pods_namespace: "{{ traefik_namespace }}"

    # -------------------------------------------------------------------------
    # RESTART DAEMONSET
    # -------------------------------------------------------------------------

    - name: "[traefik-restart] Restart Traefik DaemonSet"
      command: kubectl rollout restart daemonset/{{ traefik_daemonset_name }} -n {{ traefik_namespace }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    # -------------------------------------------------------------------------
    # WAIT FOR ROLLOUT TO COMPLETE
    # -------------------------------------------------------------------------

    - name: "[traefik-restart] Wait for rollouts"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "traefik"
        dto_rollout_namespace: "{{ traefik_namespace }}"
        dto_rollout_timeout: "{{ traefik_rollout_timeout }}"
        dto_rollout_resources_list:
          - daemonset/{{ traefik_daemonset_name }}

    # -------------------------------------------------------------------------
    # VERIFY RESTART
    # -------------------------------------------------------------------------

    - name: "[traefik-verify] Show pods in {{ traefik_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "traefik-verify"
        dto_pods_namespace: "{{ traefik_namespace }}"

    - name: "[traefik-verify] Restart completed"
      debug:
        msg: "Traefik DaemonSet restart complete"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
