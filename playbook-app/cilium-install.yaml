# =============================================================================
# Install Cilium CNI via Helm
# Steps:
#   1. cilium-pre: NetworkPolicies for kube-system and cilium namespaces
#   2. Official Cilium Helm chart (replaces kube-proxy, enables Hubble, host firewall)
#   3. cilium-post: CiliumClusterwideNetworkPolicy for host protection
#
# For Hubble UI Ingress use separate playbook: cilium-hubble-install.yaml
#
# Usage (tags):
#   ansible-playbook cilium-install.yaml              # full install
#   ansible-playbook cilium-install.yaml --tags pre   # only pre (NetworkPolicies)
#   ansible-playbook cilium-install.yaml --tags install
#   ansible-playbook cilium-install.yaml --tags post  # only post (CiliumClusterwideNetworkPolicy)
# =============================================================================

---
- name: Install Cilium CNI
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[cilium-install-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        label_name: "cilium-install-pre-check"
      tags: [always]

    - name: "[cilium-install-pre-check] Forbid kube-system namespace"
      include_tasks: tasks/tasks-forbid-kube-system.yaml
      vars:
        label_name: "cilium-install-pre-check"
        namespace_value: "{{ cilium_namespace }}"
      tags: [always]

    # =========================================================================
    # STEP 1: CILIUM-PRE (NetworkPolicies)
    # =========================================================================

    - name: "[cilium-pre] Copy chart to server"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "cilium-pre"
        chart_name: "pre"
        chart_local_src: "{{ project_root }}/playbook-app/charts/cilium/pre/"
        chart_remote_dest: "{{ remote_charts_dir }}/cilium/pre"
      tags: [pre]

    - name: "[cilium-pre] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/cilium/pre/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ cilium_namespace }}
          traefik:
            namespace: {{ traefik_namespace }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [pre]

    - name: "[cilium-pre] Install or upgrade via Helm"
      command: >
        helm upgrade --install cilium-pre {{ remote_charts_dir }}/cilium/pre
        --namespace {{ cilium_namespace }}
        --create-namespace
        --values {{ remote_charts_dir }}/cilium/pre/values-override.yaml
        --cleanup-on-fail
        --atomic
        --wait
        --wait-for-jobs
        --timeout {{ cilium_config_helm_timeout }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [pre]

    # =========================================================================
    # STEP 2: OFFICIAL CILIUM HELM
    # =========================================================================

    - name: "[cilium-install] Add Helm repository"
      include_tasks: tasks/tasks-add-helm-repo.yaml
      vars:
        label_name: "cilium-install"
        helm_repo_name: "cilium"
        helm_repo_url: "https://helm.cilium.io/"
      tags: [install]

    - name: "[cilium-install] Ensure charts directory exists"
      file:
        path: "{{ remote_charts_dir }}/cilium"
        state: directory
        mode: "0755"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[cilium-install] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/cilium/values-override.yaml"
        mode: "0644"
        content: |
          tolerations: {{ cilium_tolerations | to_json }}
          nodeSelector: {{ cilium_node_selector | to_json }}
          resources: {{ cilium_resources | to_json }}
          envoy:
            tolerations: {{ cilium_envoy_tolerations | to_json }}
            nodeSelector: {{ cilium_envoy_node_selector | to_json }}
            resources: {{ cilium_envoy_resources | to_json }}
          ipam:
            operator:
              clusterPoolIPv4PodCIDRList:
                - {{ pod_subnet }}
              clusterPoolIPv4MaskSize: {{ cilium_mask_size }}
          operator:
            tolerations: {{ cilium_operator_tolerations | to_json }}
            nodeSelector: {{ cilium_operator_node_selector | to_json }}
            replicas: {{ cilium_operator_replicas }}
            resources: {{ cilium_operator_resources | to_json }}
          kubeProxyReplacement: true
          kubeProxyReplacementHealthzBindAddr: "{{ cilium_healthz_bind_addr }}"
          k8sServiceHost: {{ haproxy_apiserver_lb_host }}
          k8sServicePort: {{ haproxy_apiserver_lb_port }}
          nodePort:
            range: "{{ node_port_start }},{{ node_port_end }}"
          hubble:
            relay:
              enabled: true
              tolerations: {{ cilium_hubble_relay_tolerations | to_json }}
              nodeSelector: {{ cilium_hubble_relay_node_selector | to_json }}
              resources: {{ cilium_hubble_relay_resources | to_json }}
              replicas: {{ cilium_hubble_relay_replicas }}
              affinity: {{ cilium_hubble_relay_affinity | to_json }}
            ui:
              enabled: true
              tolerations: {{ cilium_hubble_ui_tolerations | to_json }}
              nodeSelector: {{ cilium_hubble_ui_node_selector | to_json }}
              replicas: {{ cilium_hubble_ui_replicas }}
              affinity: {{ cilium_hubble_ui_affinity | to_json }}
              backend:
                resources: {{ cilium_hubble_ui_backend_resources | to_json }}
              frontend:
                resources: {{ cilium_hubble_ui_frontend_resources | to_json }}
            peerService:
              clusterDomain: {{ dns_domain }}
          hostFirewall:
            enabled: true
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[cilium-install] Install or upgrade via Helm"
      command: >
        helm upgrade --install cilium cilium/cilium
        --version {{ cilium_version }}
        --namespace {{ cilium_namespace }}
        --values {{ remote_charts_dir }}/cilium/values-override.yaml
        --cleanup-on-fail
        --atomic
        --wait
        --wait-for-jobs
        --timeout {{ cilium_helm_timeout }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    # =========================================================================
    # WAIT FOR CILIUM CRDs
    # =========================================================================

    - name: "[cilium-install] Wait for CRDs"
      include_tasks: tasks/tasks-wait-crds.yaml
      vars:
        label_name: "cilium-install"
        crds_list:
          - crd/ciliumcidrgroups.cilium.io
          - crd/ciliumclusterwidenetworkpolicies.cilium.io
          - crd/ciliumendpoints.cilium.io
          - crd/ciliumidentities.cilium.io
          - crd/ciliuml2announcementpolicies.cilium.io
          - crd/ciliumloadbalancerippools.cilium.io
          - crd/ciliumnetworkpolicies.cilium.io
          - crd/ciliumnodeconfigs.cilium.io
          - crd/ciliumnodes.cilium.io
          - crd/ciliumpodippools.cilium.io
      tags: [install]

    # =========================================================================
    # WAIT FOR CILIUM PODS
    # =========================================================================

    - name: "[cilium-install] Wait for DaemonSet rollouts"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "cilium-install"
        rollout_namespace: "{{ cilium_namespace }}"
        rollout_timeout: "{{ cilium_daemonset_rollout_timeout }}"
        rollout_resources:
          - daemonset/cilium
          - daemonset/cilium-envoy
      tags: [install]

    - name: "[cilium-install] Wait for Deployment rollouts"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "cilium-install"
        rollout_namespace: "{{ cilium_namespace }}"
        rollout_timeout: "{{ cilium_deployment_rollout_timeout }}"
        rollout_resources:
          - deployment/cilium-operator
      tags: [install]

    # =========================================================================
    # STEP 3: CILIUM-POST (CiliumClusterwideNetworkPolicy)
    # =========================================================================

    - name: "[cilium-post] Copy chart to server"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "cilium-post"
        chart_name: "post"
        chart_local_src: "{{ project_root }}/playbook-app/charts/cilium/post/"
        chart_remote_dest: "{{ remote_charts_dir }}/cilium/post"
      tags: [post]

    - name: "[cilium-post] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/cilium/post/values-override.yaml"
        mode: "0644"
        content: |
          nodeIps: {{
            (
              (groups['managers'] + groups['workers'])
              | map('extract', hostvars, 'ansible_host')
              | map('regex_replace', '$', '/32')
              | list
              +
              (groups['managers'] + groups['workers'])
              | map('extract', hostvars, 'internal_ip')
              | map('regex_replace', '$', '/32')
              | list
            ) | to_json }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [post]

    - name: "[cilium-post] Install or upgrade via Helm"
      command: >
        helm upgrade --install cilium-post {{ remote_charts_dir }}/cilium/post
        --namespace {{ cilium_namespace }}
        --values {{ remote_charts_dir }}/cilium/post/values-override.yaml
        --cleanup-on-fail
        --atomic
        --wait
        --wait-for-jobs
        --timeout {{ cilium_post_config_helm_timeout }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [post]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[cilium-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        helm_namespace: "{{ cilium_namespace }}"
        label_name: "cilium-verify"
      tags: [always]

    - name: "[cilium-verify] Get Cilium pods status"
      command: kubectl get pods -n {{ cilium_namespace }} -o wide
      register: cilium_pods
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[cilium-verify] Print Cilium pods status"
      debug:
        msg: "{{ cilium_pods.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[cilium-verify] Get CiliumClusterwideNetworkPolicy status"
      command: kubectl get ciliumclusterwidenetworkpolicies -n {{ cilium_namespace }}
      register: ccnp_status
      changed_when: false
      failed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[cilium-verify] Print CiliumClusterwideNetworkPolicy status"
      debug:
        msg: "{{ ccnp_status.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[cilium-verify] Installation complete"
      debug:
        msg: "cilium-pre + cilium + cilium-post: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
