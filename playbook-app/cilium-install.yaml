# =============================================================================
# Install Cilium CNI via Helm
# Steps:
#   1. cilium-pre: NetworkPolicies for kube-system and cilium namespaces
#   2. Official Cilium Helm chart (replaces kube-proxy, enables Hubble, host firewall)
#   3. cilium-post: CiliumClusterwideNetworkPolicy for host protection
#
# For Hubble UI Ingress use separate playbook: cilium-hubble-install.yaml
#
# Usage (tags):
#   ansible-playbook cilium-install.yaml              # full install
#   ansible-playbook cilium-install.yaml --tags pre   # only pre (NetworkPolicies)
#   ansible-playbook cilium-install.yaml --tags install
#   ansible-playbook cilium-install.yaml --tags post  # only post (CiliumClusterwideNetworkPolicy)
# =============================================================================

---
- name: Install Cilium CNI
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[cilium-install-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        label_name: "cilium-install-pre-check"
      tags: [always]

    - name: "[cilium-install-pre-check] Forbid kube-system namespace"
      include_tasks: tasks/tasks-forbid-kube-system.yaml
      vars:
        label_name: "cilium-install-pre-check"
        dto_target_namespace: "{{ cilium_namespace }}"
      tags: [always]

    - name: "[cilium-install-pre-check] Resolve ACME solver"
      include_tasks: tasks/tasks-resolve-acme-solver.yaml
      vars:
        label_name: cilium-install-pre-check
        dto_cluster_issuer_name: "{{ cilium_hubble_ui_cluster_issuer_name }}"
        dto_ingress_class_name: "{{ cilium_hubble_ui_ingress_class_name }}"
        dto_acme_cluster_issuer_result_var: "cilium_hubble_ui_acme_cluster_issuer"
        dto_acme_solver_result_var: "cilium_hubble_ui_acme_solver"
        dto_acme_pod_labels_result_var: "cilium_hubble_acme_solver_pod_labels"
      tags: [always]

    # =========================================================================
    # STEP 1: CILIUM-PRE (NetworkPolicies)
    # =========================================================================

    - name: "[cilium-pre] Copy chart to server"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "cilium-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/cilium/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/cilium/pre"
      tags: [pre]

    - name: "[cilium-pre] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/cilium/pre/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ cilium_namespace }}
          traefik:
            namespace: {{ traefik_namespace }}
            instanceName: traefik-{{ traefik_namespace }}
          acmeSolverLabels: {{ cilium_hubble_acme_solver_pod_labels | to_json }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [pre]

    - name: "[cilium-pre] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "cilium-pre"
        dto_helm_command: >
          helm upgrade --install cilium-pre {{ remote_charts_dir }}/cilium/pre
          --namespace {{ cilium_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/cilium/pre/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ cilium_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: OFFICIAL CILIUM HELM
    # =========================================================================

    - name: "[cilium-install] Add Helm repository"
      include_tasks: tasks/tasks-add-helm-repo.yaml
      vars:
        label_name: "cilium-install"
        dto_helm_repo_name: "{{ cilium_helm_repo_name }}"
        dto_helm_repo_url: "{{ cilium_helm_repo_url }}"
      tags: [install]

    - name: "[cilium-install] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "cilium-install"
        dto_dir: "{{ remote_charts_dir }}/cilium/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ cilium_helm_values | to_nice_yaml }}"
      tags: [install]

    - name: "[cilium-install] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "cilium-install"
        dto_helm_command: >
          helm upgrade --install cilium {{ cilium_helm_repo_name }}/{{ cilium_helm_chart_name }}
          --version {{ cilium_chart_version }}
          --namespace {{ cilium_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/cilium/install/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ cilium_install_helm_timeout }}
      tags: [install]

    # =========================================================================
    # WAIT FOR CILIUM CRDs
    # =========================================================================

    - name: "[cilium-install] Wait for CRDs"
      include_tasks: tasks/tasks-wait-crds.yaml
      vars:
        label_name: "cilium-install"
        dto_crds_list:
          - crd/ciliumcidrgroups.cilium.io
          - crd/ciliumclusterwidenetworkpolicies.cilium.io
          - crd/ciliumendpoints.cilium.io
          - crd/ciliumidentities.cilium.io
          - crd/ciliuml2announcementpolicies.cilium.io
          - crd/ciliumloadbalancerippools.cilium.io
          - crd/ciliumnetworkpolicies.cilium.io
          - crd/ciliumnodeconfigs.cilium.io
          - crd/ciliumnodes.cilium.io
          - crd/ciliumpodippools.cilium.io
      tags: [install]

    # =========================================================================
    # WAIT FOR CILIUM PODS
    # =========================================================================

    - name: "[cilium-install] Wait for DaemonSet/Deployment rollouts"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "cilium-install"
        dto_rollout_namespace: "{{ cilium_namespace }}"
        dto_rollout_timeout: "{{ cilium_rollout_timeout }}"
        dto_rollout_resources_list:
          - daemonset.apps/cilium
          - daemonset.apps/cilium-envoy
          - deployment.apps/cilium-operator
          - deployment.apps/hubble-ui
          - deployment.apps/hubble-relay
      tags: [install]

    # =========================================================================
    # STEP 3: CILIUM-POST (CiliumClusterwideNetworkPolicy)
    # =========================================================================

    - name: "[cilium-post] Copy chart to server"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "cilium-post"
        dto_chart_name: "post"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/cilium/post/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/cilium/post"
      tags: [post]

    - name: "[cilium-post] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/cilium/post/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ cilium_namespace }}

          nodeIps: {{
            (
              (groups['managers'] + groups['workers'])
              | map('extract', hostvars, 'ansible_host')
              | map('regex_replace', '$', '/32')
              | list
              +
              (groups['managers'] + groups['workers'])
              | map('extract', hostvars, 'internal_ip')
              | map('regex_replace', '$', '/32')
              | list
            ) | to_json }}

          hubbleUi:
            domain: {{ cilium_hubble_ui_domain }}
            clusterIssuer: {{ cilium_hubble_ui_cluster_issuer_name }}
            ingressClass: {{ cilium_hubble_ui_ingress_class_name }}
            secretName: {{ cilium_hubble_ui_https_secret_name }}
            vpnOnlyEnabled: {{ cilium_hubble_ui_vpn_only_enabled }}
            vpnIngressMiddlewares: "{{ vpn_ingress_middlewares }}"
            httpEnable: {{ cilium_hubble_ui_ingress_http_enable }}
            httpsEnable: {{ cilium_hubble_ui_ingress_https_enable }}

          traefik:
            namespace: {{ traefik_namespace }}
            entryPoints:
              web: {{ traefik_web_entrypoint }}
              websecure: {{ traefik_websecure_entrypoint }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [post]

    - name: "[cilium-post] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "cilium-post"
        dto_helm_command: >
          helm upgrade --install cilium-post {{ remote_charts_dir }}/cilium/post
          --namespace {{ cilium_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/cilium/post/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ cilium_post_helm_timeout }}
      tags: [post]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[cilium-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        dto_helm_namespace: "{{ cilium_namespace }}"
        label_name: "cilium-verify"
      tags: [always]

    - name: "[cilium-verify] Get Cilium pods status"
      command: kubectl get pods -n {{ cilium_namespace }} -o wide
      register: cilium_pods
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[cilium-verify] Print Cilium pods status"
      debug:
        msg: "{{ cilium_pods.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[cilium-verify] Get CiliumClusterwideNetworkPolicy status"
      command: kubectl get ciliumclusterwidenetworkpolicies -n {{ cilium_namespace }}
      register: ccnp_status
      changed_when: false
      failed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[cilium-verify] Print CiliumClusterwideNetworkPolicy status"
      debug:
        msg: "{{ ccnp_status.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[cilium-verify] Installation complete"
      debug:
        msg: "cilium-hubble: OK (Hubble UI available at https://{{ cilium_hubble_ui_domain }})"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[cilium-verify] Installation complete"
      debug:
        msg: "cilium-pre + cilium + cilium-post: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
