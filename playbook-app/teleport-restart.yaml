# =============================================================================
# TELEPORT RESTART
# Restarts Teleport Deployment
# =============================================================================

- name: Restart Teleport
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: "[teleport-restart] Assert component enabled"
      assert:
        that:
          - teleport_enabled | default(false) | bool
        fail_msg: "teleport is disabled (teleport_enabled=false). Set teleport_enabled: true in hosts-vars-override/ to install/configure it."
      run_once: true
      tags: [always]

    - name: "[teleport-restart-pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-pre-check.yaml"
      vars:
        dto_label_name: "teleport-restart-pre-check"

    # -------------------------------------------------------------------------
    # PRE-CHECK: Verify teleport is installed
    # -------------------------------------------------------------------------

    - name: "[teleport-restart] Check if teleport namespace exists"
      command: kubectl get namespace {{ teleport_namespace }}
      register: _local_namespace_check
      changed_when: false
      failed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    - name: "[teleport-restart] Fail if teleport namespace not found"
      fail:
        msg: "teleport namespace '{{ teleport_namespace }}' not found. Install teleport first."
      when: _local_namespace_check.rc != 0
      run_once: true

    - name: "[teleport-restart] Show pods in {{ teleport_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "teleport-restart"
        dto_pods_namespace: "{{ teleport_namespace }}"

    # -------------------------------------------------------------------------
    # RESTART
    # -------------------------------------------------------------------------

    - name: "[teleport-restart] Restart teleport"
      command: kubectl rollout restart {{ item }} -n {{ teleport_namespace }}
      loop:
        - deployment.apps/teleport-auth
        - deployment.apps/teleport-proxy
        - deployment.apps/teleport-operator
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    # -------------------------------------------------------------------------
    # WAIT FOR ROLLOUT TO COMPLETE
    # -------------------------------------------------------------------------

    - name: "[teleport-restart] Wait for rollouts"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "teleport-restart"
        dto_rollout_namespace: "{{ teleport_namespace }}"
        dto_rollout_timeout: "{{ teleport_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment.apps/teleport-auth
          - deployment.apps/teleport-proxy
          - deployment.apps/teleport-operator

    # -------------------------------------------------------------------------
    # VERIFY RESTART
    # -------------------------------------------------------------------------

    - name: "[teleport-verify] Show pods in {{ teleport_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "teleport-verify"
        dto_pods_namespace: "{{ teleport_namespace }}"

    - name: "[teleport-verify] Restart completed"
      debug:
        msg: "teleport restart complete"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
