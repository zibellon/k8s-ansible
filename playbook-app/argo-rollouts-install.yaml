# =============================================================================
# Install Argo Rollouts (analysis engine for Kargo Stage verification)
# Steps:
#   1. argo-rollouts/crds:    CustomResourceDefinitions (kubectl create)
#   2. argo-rollouts/pre:     NetworkPolicies
#   3. argo-rollouts/install: vendored upstream manifest v1.9.1 (controller + RBAC)
#   4. argo-rollouts/post:    ServiceMonitor
#
# Usage (tags):
#   ansible-playbook -i hosts-vars/ -i hosts-vars-override/<cluster>/ playbook-app/argo-rollouts-install.yaml
#   ansible-playbook ... --tags crds
#   ansible-playbook ... --tags pre
#   ansible-playbook ... --tags install
#   ansible-playbook ... --tags post
#
# Prerequisites:
#   - Cilium installed (NetworkPolicy enforcement)
#   - mon-system installed if ServiceMonitor is enabled
#
# NOTE: Argo Rollouts — самостоятельный продукт семейства Argo, НЕ путать с Argo CD.
#       Kargo использует его как движок анализа: сам создаёт AnalysisRun, а исполняет
#       проверку контроллер Rollouts. Приложениям НЕ требуется переходить на объекты
#       Rollout. Upstream-манифест вендорится дословно; namespace-рибайндинг и пин
#       образа применяются здесь, на этапе kustomize.
# =============================================================================

---
- name: Install Argo Rollouts (analysis engine for Kargo)
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[argo-rollouts-install] Assert component enabled"
      assert:
        that:
          - argo_rollouts_enabled | default(false) | bool
        fail_msg: "argo-rollouts is disabled (argo_rollouts_enabled=false). Set argo_rollouts_enabled: true in hosts-vars-override/ to install it."
      run_once: true
      tags: [always]

    - name: "[argo-rollouts-pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-pre-check.yaml"
      vars:
        dto_label_name: "argo-rollouts-pre-check"
      tags: [always]

    - name: "[argo-rollouts-pre-check] Forbid kube-system namespace"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-forbid-kube-system.yaml"
      vars:
        dto_label_name: "argo-rollouts-pre-check"
        dto_target_namespace: "{{ argo_rollouts_namespace }}"
      tags: [always]

    # =========================================================================
    # STEP 1: CRDS (kubectl create — CRD > 256KB, apply не подходит)
    # =========================================================================

    - name: "[argo-rollouts-crds] Copy chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "argo-rollouts-crds"
        dto_chart_name: "crds"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/argo-rollouts/crds/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/argo-rollouts/crds"
      tags: [crds]

    - name: "[argo-rollouts-crds] Install CRDs via kubectl"
      command: kubectl create -f {{ remote_charts_dir }}/argo-rollouts/crds/crds.yaml
      failed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [crds]

    - name: "[argo-rollouts-crds] Wait for CRDs"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-crds.yaml"
      vars:
        dto_label_name: "argo-rollouts-crds"
        dto_crds_list:
          - crd/analysisruns.argoproj.io
          - crd/analysistemplates.argoproj.io
          - crd/clusteranalysistemplates.argoproj.io
          - crd/experiments.argoproj.io
          - crd/rollouts.argoproj.io
      tags: [crds]

    # =========================================================================
    # STEP 2: PRE (NetworkPolicies)
    # =========================================================================

    - name: "[argo-rollouts-pre] Copy chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "argo-rollouts-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/argo-rollouts/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/argo-rollouts/pre"
      tags: [pre]

    - name: "[argo-rollouts-pre] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "argo-rollouts-pre"
        dto_dir: "{{ remote_charts_dir }}/argo-rollouts/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ argo_rollouts_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[argo-rollouts-pre] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "argo-rollouts-pre"
        dto_release_name: "argo-rollouts-pre"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/argo-rollouts/pre"
        dto_values_file_path: "{{ remote_charts_dir }}/argo-rollouts/pre/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/argo-rollouts/pre-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/argo-rollouts/pre-k"
        dto_patches_list: "{{ argo_rollouts_pre_kustomize_patches }}"
        dto_target_namespace: "{{ argo_rollouts_namespace }}"
      tags: [pre]

    - name: "[argo-rollouts-pre] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "argo-rollouts-pre"
        dto_helm_command: >
          helm upgrade --install argo-rollouts-pre {{ remote_charts_dir }}/argo-rollouts/pre-k
          --namespace {{ argo_rollouts_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ argo_rollouts_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 3: INSTALL (vendored upstream manifest)
    # =========================================================================

    - name: "[argo-rollouts-install] Copy chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "argo-rollouts-install"
        dto_chart_name: "install"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/argo-rollouts/install/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/argo-rollouts/install"
      tags: [install]

    - name: "[argo-rollouts-install] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "argo-rollouts-install"
        dto_dir: "{{ remote_charts_dir }}/argo-rollouts/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ argo_rollouts_install_helm_values | to_nice_yaml }}"
      tags: [install]

    # namespace_transform обязателен: upstream-манифест хардкодит
    # `namespace: argo-rollouts` в subjects ClusterRoleBinding.
    # Патчи пинят образ (в манифесте он помечен :latest).
    - name: "[argo-rollouts-install] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "argo-rollouts-install"
        dto_release_name: "argo-rollouts"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/argo-rollouts/install"
        dto_values_file_path: "{{ remote_charts_dir }}/argo-rollouts/install/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/argo-rollouts/install-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/argo-rollouts/install-k"
        dto_patches_list: "{{ argo_rollouts_install_kustomize_patches }}"
        dto_target_namespace: "{{ argo_rollouts_namespace }}"
        dto_kustomize_apply_namespace_transform: true
      tags: [install]

    - name: "[argo-rollouts-install] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "argo-rollouts-install"
        dto_helm_command: >
          helm upgrade --install argo-rollouts {{ remote_charts_dir }}/argo-rollouts/install-k
          --namespace {{ argo_rollouts_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ argo_rollouts_install_helm_timeout }}
      tags: [install]

    - name: "[argo-rollouts-install] Wait for rollout"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "argo-rollouts-install"
        dto_rollout_namespace: "{{ argo_rollouts_namespace }}"
        dto_rollout_timeout: "{{ argo_rollouts_install_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment.apps/argo-rollouts
      tags: [install]

    # =========================================================================
    # STEP 4: POST (ServiceMonitor)
    # =========================================================================

    - name: "[argo-rollouts-post] Copy chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "argo-rollouts-post"
        dto_chart_name: "post"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/argo-rollouts/post/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/argo-rollouts/post"
      tags: [post]

    - name: "[argo-rollouts-post] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "argo-rollouts-post"
        dto_dir: "{{ remote_charts_dir }}/argo-rollouts/post"
        dto_filename: "values-override.yaml"
        dto_content: "{{ argo_rollouts_post_helm_values | to_nice_yaml }}"
      tags: [post]

    - name: "[argo-rollouts-post] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "argo-rollouts-post"
        dto_release_name: "argo-rollouts-post"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/argo-rollouts/post"
        dto_values_file_path: "{{ remote_charts_dir }}/argo-rollouts/post/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/argo-rollouts/post-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/argo-rollouts/post-k"
        dto_patches_list: "{{ argo_rollouts_post_kustomize_patches }}"
        dto_target_namespace: "{{ argo_rollouts_namespace }}"
      tags: [post]

    - name: "[argo-rollouts-post] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "argo-rollouts-post"
        dto_helm_command: >
          helm upgrade --install argo-rollouts-post {{ remote_charts_dir }}/argo-rollouts/post-k
          --namespace {{ argo_rollouts_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ argo_rollouts_post_helm_timeout }}
      tags: [post]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[argo-rollouts-verify] Verify Helm releases"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-helm.yaml"
      vars:
        dto_label_name: "argo-rollouts-verify"
        dto_helm_namespace: "{{ argo_rollouts_namespace }}"
      tags: [always]

    - name: "[argo-rollouts-verify] Show pods in {{ argo_rollouts_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "argo-rollouts-verify"
        dto_pods_namespace: "{{ argo_rollouts_namespace }}"
      tags: [always]

    - name: "[argo-rollouts-verify] Show NetworkPolicies in {{ argo_rollouts_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-network-policy.yaml"
      vars:
        dto_label_name: "argo-rollouts-verify"
        dto_np_namespace: "{{ argo_rollouts_namespace }}"
      tags: [always]

    - name: "[argo-rollouts-verify] Show info"
      debug:
        msg:
          - "=============================================="
          - "ARGO ROLLOUTS INSTALLATION COMPLETE"
          - "=============================================="
          - "Version: {{ argo_rollouts_version }}"
          - ""
          - "Движок анализа для верификации Stage в Kargo."
          - "Проверить, что Kargo подхватил интеграцию:"
          - "  kubectl -n {{ kargo_namespace }} logs deploy/kargo-controller | grep -i rollouts"
          - "Ожидается: 'Argo Rollouts integration is enabled'"
          - "=============================================="
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[argo-rollouts-verify] Installation complete"
      debug:
        msg: "argo-rollouts-pre + argo-rollouts + argo-rollouts-post: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
