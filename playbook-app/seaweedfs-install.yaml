# =============================================================================
# Install SeaweedFS (Central S3 Storage, multi-phase)
# Steps:
#   1.  seaweedfs/pre: NetworkPolicies + ESO resources (ServiceAccount, SecretStore, ExternalSecrets)
#   2.  seaweedfs/postgresql: Filer PostgreSQL backend
#   3a. user-sync: Identity sync (admin + users + anonymous) → Vault combined JSON
#   3b. identity-distribute: Distribute identity creds (username/accessKey/secretKey)
#       в дополнительные Vault paths из identity.extra_vault_paths
#   3c. seaweedfs/install: Main upstream chart (seaweedfs/seaweedfs 4.31.0)
#   4.  seaweedfs/post: Certificate + IngressRoute + ServiceMonitor
#   5.  bucket-sync: Declarative buckets + quotas + per-bucket policies sync
#
# Usage (tags):
#   ansible-playbook seaweedfs-install.yaml              # full install
#   ansible-playbook seaweedfs-install.yaml --tags pre   # only pre (ESO resources)
#   ansible-playbook seaweedfs-install.yaml --tags postgresql
#   ansible-playbook seaweedfs-install.yaml --tags user-sync
#   ansible-playbook seaweedfs-install.yaml --tags identity-distribute
#   ansible-playbook seaweedfs-install.yaml --tags install
#   ansible-playbook seaweedfs-install.yaml --tags post  # only post (Ingress + SM)
#   ansible-playbook seaweedfs-install.yaml --tags bucket-sync
#
# Prerequisites:
#   - Vault must be installed and unsealed
#   - Vault policies and roles must be synced (... playbook-app/vault-install.yaml --tags vault-cr)
#   - External Secrets Operator must be installed
#   - Linstor must be installed (storage)
#   - Traefik must be installed (ingress)
# =============================================================================

---
- name: Install SeaweedFS (Central S3 Storage)
  hosts: managers
  become: true
  gather_facts: false

  vars:
    # Имена локальных фактов — единая точка объявления (вынос из хардкода)
    _local_seaweedfs_postgresql_vault_key: "_local_seaweedfs_postgresql_vault"
    _local_seaweedfs_postgresql_vault_exists_key: "_local_seaweedfs_postgresql_vault_exists"
    _local_seaweedfs_postgresql_password_generated_key: "_local_seaweedfs_postgresql_password_generated"
    _local_seaweedfs_postgresql_put_data_key: "_local_seaweedfs_postgresql_put_data"
    _local_seaweedfs_admin_ui_vault_key: "_local_seaweedfs_admin_ui_vault"
    _local_seaweedfs_admin_ui_vault_exists_key: "_local_seaweedfs_admin_ui_vault_exists"
    _local_seaweedfs_admin_ui_password_generated_key: "_local_seaweedfs_admin_ui_password_generated"
    _local_seaweedfs_admin_ui_put_data_key: "_local_seaweedfs_admin_ui_put_data"
    _local_seaweedfs_helm_chart_source_key: "_local_seaweedfs_helm_chart_source"

  tasks:
    - name: "[seaweedfs-pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-pre-check.yaml"
      vars:
        dto_label_name: "seaweedfs-pre-check"
      tags: [always]

    - name: "[seaweedfs-pre-check] Forbid kube-system namespace"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-forbid-kube-system.yaml"
      vars:
        dto_label_name: "seaweedfs-pre-check"
        dto_target_namespace: "{{ seaweedfs_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations and resolve SeaweedFS config
    # =========================================================================

    - name: "[seaweedfs-install-init] Verify Vault config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-config-verify.yaml"
      vars:
        dto_label_name: "seaweedfs-install-init"
      tags: [always]

    - name: "[seaweedfs-install-init] Verify ESO config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-verify.yaml"
      vars:
        dto_label_name: "seaweedfs-install-init"
        dto_eso_secrets_list: "{{ eso_vault_integration_seaweedfs_secrets + (eso_vault_integration_seaweedfs_secrets_extra | default([])) }}"
        dto_eso_integration_object: "{{ eso_vault_integration_seaweedfs }}"
        dto_namespace: "{{ seaweedfs_namespace }}"
      tags: [always]

    # =========================================================================
    # STEP 1: INSTALL PRE (ESO Resources, NetworkPolicies)
    # =========================================================================

    - name: "[seaweedfs-pre] Copy chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "seaweedfs-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/seaweedfs/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/seaweedfs/pre"
      tags: [pre]

    - name: "[seaweedfs-pre] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "seaweedfs-pre"
        dto_dir: "{{ remote_charts_dir }}/seaweedfs/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ seaweedfs_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[seaweedfs-pre] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "seaweedfs-pre"
        dto_release_name: "seaweedfs-pre"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/seaweedfs/pre"
        dto_values_file_path: "{{ remote_charts_dir }}/seaweedfs/pre/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/seaweedfs/pre-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/seaweedfs/pre-k"
        dto_patches_list: "{{ seaweedfs_pre_kustomize_patches }}"
        dto_target_namespace: "{{ seaweedfs_namespace }}"
      tags: [pre]

    - name: "[seaweedfs-pre] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "seaweedfs-pre"
        dto_helm_command: >
          helm upgrade --install seaweedfs-pre {{ remote_charts_dir }}/seaweedfs/pre-k
          --namespace {{ seaweedfs_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ seaweedfs_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: POSTGRESQL SECRETS + INSTALL
    # =========================================================================

    # ---------
    # ---postgresql-creds
    # ---------

    - name: "[seaweedfs-postgresql-secrets] Get PostgreSQL credentials from Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-get.yaml"
      vars:
        dto_label_name: "seaweedfs-postgresql-secrets"
        dto_vault_get_path: "{{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_secret_postgresql_creds.vault_path }}"
        dto_vault_get_field: "{{ seaweedfs_postgresql_secret_key_password }}"
        dto_vault_get_res_fact_name: "{{ _local_seaweedfs_postgresql_vault_key }}"
        dto_vault_get_res_exists_fact_name: "{{ _local_seaweedfs_postgresql_vault_exists_key }}"
      tags: [postgresql]

    - name: "[seaweedfs-postgresql-secrets] Generate PostgreSQL password"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-generate-secret.yaml"
      vars:
        dto_label_name: "seaweedfs-postgresql-secrets"
        dto_generate_fact_name: "{{ _local_seaweedfs_postgresql_password_generated_key }}"
      when: not lookup('vars', _local_seaweedfs_postgresql_vault_exists_key)
      tags: [postgresql]

    - name: "[seaweedfs-postgresql-secrets] Prepare PostgreSQL Vault put data"
      set_fact:
        "{{ _local_seaweedfs_postgresql_put_data_key }}": >-
          {{ {
               seaweedfs_postgresql_secret_key_username: seaweedfs_postgresql_username,
               seaweedfs_postgresql_secret_key_password: lookup('vars', _local_seaweedfs_postgresql_password_generated_key)
             } }}
      when: not lookup('vars', _local_seaweedfs_postgresql_vault_exists_key)
      tags: [postgresql]

    - name: "[seaweedfs-postgresql-secrets] Store PostgreSQL credentials in Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-put.yaml"
      vars:
        dto_label_name: "seaweedfs-postgresql-secrets"
        dto_vault_put_path: "{{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_secret_postgresql_creds.vault_path }}"
        dto_vault_put_data: "{{ lookup('vars', _local_seaweedfs_postgresql_put_data_key) }}"
      when: not lookup('vars', _local_seaweedfs_postgresql_vault_exists_key)
      tags: [postgresql]

    - name: "[seaweedfs-postgresql-secrets] Trigger ESO sync"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-force-sync.yaml"
      vars:
        dto_label_name: "seaweedfs-postgresql-secrets"
        dto_eso_sync_namespace: "{{ seaweedfs_namespace }}"
      tags: [postgresql]

    - name: "[seaweedfs-postgresql-secrets] Wait for secret"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-secret.yaml"
      vars:
        dto_label_name: "seaweedfs-postgresql-secrets"
        dto_wait_secret_name: "{{ seaweedfs_secret_postgresql_creds.body.target.name }}"
        dto_wait_secret_namespace: "{{ seaweedfs_namespace }}"
      tags: [postgresql]

    # ---------
    # ---postgresql-install
    # ---------

    - name: "[seaweedfs-postgresql] Copy chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "seaweedfs-postgresql"
        dto_chart_name: "postgresql"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/seaweedfs/postgresql/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/seaweedfs/postgresql"
      tags: [postgresql]

    - name: "[seaweedfs-postgresql] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "seaweedfs-postgresql"
        dto_dir: "{{ remote_charts_dir }}/seaweedfs/postgresql"
        dto_filename: "values-override.yaml"
        dto_content: "{{ seaweedfs_postgresql_helm_values | to_nice_yaml }}"
      tags: [postgresql]

    - name: "[seaweedfs-postgresql] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "seaweedfs-postgresql"
        dto_release_name: "seaweedfs-postgresql"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/seaweedfs/postgresql"
        dto_values_file_path: "{{ remote_charts_dir }}/seaweedfs/postgresql/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/seaweedfs/postgresql-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/seaweedfs/postgresql-k"
        dto_patches_list: "{{ seaweedfs_postgresql_kustomize_patches }}"
        dto_target_namespace: "{{ seaweedfs_namespace }}"
      tags: [postgresql]

    - name: "[seaweedfs-postgresql] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "seaweedfs-postgresql"
        dto_helm_command: >
          helm upgrade --install seaweedfs-postgresql {{ remote_charts_dir }}/seaweedfs/postgresql-k
          --namespace {{ seaweedfs_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ seaweedfs_postgresql_helm_timeout }}
      tags: [postgresql]

    - name: "[seaweedfs-postgresql] Wait for rollout to be ready"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "seaweedfs-postgresql"
        dto_rollout_namespace: "{{ seaweedfs_namespace }}"
        dto_rollout_timeout: "{{ seaweedfs_postgresql_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment.apps/seaweedfs-postgresql
      tags: [postgresql]

    - name: "[seaweedfs-postgresql] Bootstrap filemeta schema"
      command: >
        kubectl -n {{ seaweedfs_namespace }}
        exec deploy/seaweedfs-postgresql --
        psql -U {{ seaweedfs_postgresql_username }}
        -d {{ seaweedfs_postgresql_database_name }}
        -c "{{ seaweedfs_postgresql_filemeta_schema_sql }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      register: _local_seaweedfs_postgresql_filemeta_bootstrap
      changed_when: '"CREATE TABLE" in _local_seaweedfs_postgresql_filemeta_bootstrap.stdout'
      tags: [postgresql]

    # =========================================================================
    # STEP 3: IDENTITIES SYNC + DISTRIBUTE + SEAWEEDFS INSTALL
    # =========================================================================

    # ----- User sync (admin + users + anonymous) via tasks-seaweedfs-user-sync -----
    # Replaces previous admin-only bootstrap. Full identity sync logic — diff vs
    # Vault combined JSON, generate-if-missing, ESO sync, conditional rollout
    # restart (when identities changed AND deployment exists).
    - name: "[seaweedfs-install-user-sync] Sync identities (admin + users + anonymous)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-user-sync.yaml"
      vars:
        dto_label_name: "seaweedfs-install-user-sync"
      tags: [user-sync]

    # ----- Identity secret distribution via tasks-seaweedfs-identity-secret-distribute -----
    # Distribute identity credentials (fixed keys: username, accessKey, secretKey)
    # в каждый дополнительный Vault path из identity.extra_vault_paths (inventory).
    # Source-of-truth для creds — Vault combined JSON (записанный user-sync above).
    # Diff-based via ConfigMap seaweedfs-sync-identity-distributions-state.
    - name: "[seaweedfs-install-identity-distribute] Distribute identity creds to extra Vault paths"
      include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-identity-secret-distribute.yaml"
      vars:
        dto_label_name: "seaweedfs-install-identity-distribute"
      tags: [identity-distribute]

    # ---------
    # ---admin-creds (seed ПЕРЕД main install — admin StatefulSet монтирует Secret через existingSecret)
    # ---------

    - name: "[seaweedfs-admin-ui-secrets] Get admin credentials from Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-get.yaml"
      vars:
        dto_label_name: "seaweedfs-admin-ui-secrets"
        dto_vault_get_path: "{{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_secret_admin_ui_creds.vault_path }}"
        dto_vault_get_field: "{{ seaweedfs_admin_ui_secret_key_password }}"
        dto_vault_get_res_fact_name: "{{ _local_seaweedfs_admin_ui_vault_key }}"
        dto_vault_get_res_exists_fact_name: "{{ _local_seaweedfs_admin_ui_vault_exists_key }}"
      tags: [install]

    - name: "[seaweedfs-admin-ui-secrets] Generate admin password"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-generate-secret.yaml"
      vars:
        dto_label_name: "seaweedfs-admin-ui-secrets"
        dto_generate_fact_name: "{{ _local_seaweedfs_admin_ui_password_generated_key }}"
      when: not lookup('vars', _local_seaweedfs_admin_ui_vault_exists_key)
      tags: [install]

    - name: "[seaweedfs-admin-ui-secrets] Prepare admin Vault put data"
      set_fact:
        "{{ _local_seaweedfs_admin_ui_put_data_key }}": >-
          {{ {
               seaweedfs_admin_ui_secret_key_user: seaweedfs_admin_ui_username,
               seaweedfs_admin_ui_secret_key_password: lookup('vars', _local_seaweedfs_admin_ui_password_generated_key)
             } }}
      when: not lookup('vars', _local_seaweedfs_admin_ui_vault_exists_key)
      tags: [install]

    - name: "[seaweedfs-admin-ui-secrets] Store admin credentials in Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-put.yaml"
      vars:
        dto_label_name: "seaweedfs-admin-ui-secrets"
        dto_vault_put_path: "{{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_secret_admin_ui_creds.vault_path }}"
        dto_vault_put_data: "{{ lookup('vars', _local_seaweedfs_admin_ui_put_data_key) }}"
      when: not lookup('vars', _local_seaweedfs_admin_ui_vault_exists_key)
      tags: [install]

    - name: "[seaweedfs-admin-ui-secrets] Trigger ESO sync"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-force-sync.yaml"
      vars:
        dto_label_name: "seaweedfs-admin-ui-secrets"
        dto_eso_sync_namespace: "{{ seaweedfs_namespace }}"
      tags: [install]

    - name: "[seaweedfs-admin-ui-secrets] Wait for secret"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-secret.yaml"
      vars:
        dto_label_name: "seaweedfs-admin-ui-secrets"
        dto_wait_secret_name: "{{ seaweedfs_secret_admin_ui_creds.body.target.name }}"
        dto_wait_secret_namespace: "{{ seaweedfs_namespace }}"
      tags: [install]

    # ---------
    # ---install
    # ---------

    - name: "[seaweedfs-install] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "seaweedfs-install"
        dto_dir: "{{ remote_charts_dir }}/seaweedfs/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ seaweedfs_helm_values | to_nice_yaml }}"
      tags: [install]

    - name: "[seaweedfs-install] Add Helm repository"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-add-helm-repo.yaml"
      vars:
        dto_label_name: "seaweedfs-install"
        dto_helm_is_oci: "{{ seaweedfs_helm_is_oci }}"
        dto_helm_url: "{{ seaweedfs_helm_url }}"
        dto_helm_chart_version: "{{ seaweedfs_helm_chart_version }}"
        dto_helm_repo_name: "{{ seaweedfs_helm_repo_name }}"
        dto_helm_chart_name: "{{ seaweedfs_helm_chart_name }}"
        dto_helm_chart_source_res_fact_name: "{{ _local_seaweedfs_helm_chart_source_key }}"
      tags: [install]

    - name: "[seaweedfs-install] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "seaweedfs-install"
        dto_helm_command: >
          helm upgrade --install seaweedfs {{ lookup('vars', _local_seaweedfs_helm_chart_source_key) }}
          --namespace {{ seaweedfs_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/seaweedfs/install/values-override.yaml
          --version {{ seaweedfs_helm_chart_version }}
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ seaweedfs_install_helm_timeout }}
      tags: [install]

    - name: "[seaweedfs-install] Wait for rollout to be ready"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "seaweedfs-install"
        dto_rollout_namespace: "{{ seaweedfs_namespace }}"
        dto_rollout_timeout: "{{ seaweedfs_install_rollout_timeout }}"
        dto_rollout_resources_list:
          - statefulset.apps/seaweedfs-master
          - statefulset.apps/seaweedfs-volume
          - statefulset.apps/seaweedfs-filer
          - deployment.apps/seaweedfs-s3
          - statefulset.apps/seaweedfs-admin
          - deployment.apps/seaweedfs-worker
      tags: [install]

    # =========================================================================
    # STEP 4: POST CHART (Certificate + IngressRoute + ServiceMonitor)
    # =========================================================================

    - name: "[seaweedfs-post] Copy chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "seaweedfs-post"
        dto_chart_name: "post"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/seaweedfs/post/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/seaweedfs/post"
      tags: [post]

    - name: "[seaweedfs-post] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "seaweedfs-post"
        dto_dir: "{{ remote_charts_dir }}/seaweedfs/post"
        dto_filename: "values-override.yaml"
        dto_content: "{{ seaweedfs_post_helm_values | to_nice_yaml }}"
      tags: [post]

    - name: "[seaweedfs-post] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "seaweedfs-post"
        dto_release_name: "seaweedfs-post"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/seaweedfs/post"
        dto_values_file_path: "{{ remote_charts_dir }}/seaweedfs/post/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/seaweedfs/post-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/seaweedfs/post-k"
        dto_patches_list: "{{ seaweedfs_post_kustomize_patches }}"
        dto_target_namespace: "{{ seaweedfs_namespace }}"
      tags: [post]

    - name: "[seaweedfs-post] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "seaweedfs-post"
        dto_helm_command: >
          helm upgrade --install seaweedfs-post {{ remote_charts_dir }}/seaweedfs/post-k
          --namespace {{ seaweedfs_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ seaweedfs_post_helm_timeout }}
      tags: [post]

    # =========================================================================
    # STEP 5: BUCKET SYNC (after install + post)
    # =========================================================================
    # Declarative buckets + quotas + per-bucket policies sync (объединено в один
    # task — см. tasks-seaweedfs-bucket-sync). Idempotent — diffs vs K8s ConfigMap
    # state. Requires S3 pods running + filer ready.

    - name: "[seaweedfs-install-bucket-sync] Sync buckets + quotas"
      include_tasks: "{{ project_root }}/playbook-app/tasks/seaweedfs/tasks-seaweedfs-bucket-sync.yaml"
      vars:
        dto_label_name: "seaweedfs-install-bucket-sync"
      tags: [bucket-sync]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[seaweedfs-verify] Verify Helm releases"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-helm.yaml"
      vars:
        dto_label_name: "seaweedfs-verify"
        dto_helm_namespace: "{{ seaweedfs_namespace }}"
      tags: [always]

    - name: "[seaweedfs-verify] Show pods in {{ seaweedfs_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "seaweedfs-verify"
        dto_pods_namespace: "{{ seaweedfs_namespace }}"
      tags: [always]

    - name: "[seaweedfs-verify] Show NetworkPolicies in {{ seaweedfs_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-network-policy.yaml"
      vars:
        dto_label_name: "seaweedfs-verify"
        dto_np_namespace: "{{ seaweedfs_namespace }}"
      tags: [always]

    - name: "[seaweedfs-verify] Show access info"
      debug:
        msg:
          - "=============================================="
          - "SEAWEEDFS INSTALLATION COMPLETE"
          - "=============================================="
          - "S3 endpoint: https://{{ seaweedfs_s3_domain }}"
          - "Master UI:   https://{{ seaweedfs_master_ui_domain }}"
          - "Filer UI:    https://{{ seaweedfs_filer_ui_domain }}"
          - "Admin UI:    https://{{ seaweedfs_admin_ui_domain }} (login: {{ seaweedfs_admin_ui_username }})"
          - ""
          - "Credentials stored in Vault:"
          - "  PostgreSQL:    {{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_secret_postgresql_creds.vault_path }}"
          - "  S3 identities: {{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_secret_s3_identities.vault_path }} (combined JSON)"
          - "  Admin UI:      {{ eso_vault_integration_seaweedfs.kv_engine_path }}{{ seaweedfs_secret_admin_ui_creds.vault_path }}"
          - ""
          - "IMPORTANT: Admin identity is bootstrapped on first install."
          - "  Back it up from Vault immediately."
          - "  Users + bucket policies — manage via --tags user-sync/identity-distribute/bucket-sync."
          - "=============================================="
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[seaweedfs-verify] Installation complete"
      debug:
        msg: "seaweedfs-pre + seaweedfs-postgresql + seaweedfs + seaweedfs-post: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
