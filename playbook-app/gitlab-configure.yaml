# =============================================================================
# Configure GitLab root credentials
# Steps:
#   1. Resolve root password: check Vault → check k8s secret → validate → save to Vault → delete k8s initial secret
#
# Usage:
#   ansible-playbook gitlab-configure.yaml
#
# Prerequisites:
#   - GitLab must be installed and webservice running (gitlab-install.yaml)
#   - Vault must be installed and unsealed
#   - External Secrets Operator must be installed
# =============================================================================

---
- name: Configure GitLab root credentials
  hosts: managers
  become: true
  gather_facts: false

  vars:
    # Имена локальных фактов — единая точка объявления (вынос из хардкода)
    _local_gitlab_root_pw_vault_key: "_local_gitlab_root_pw_vault"
    _local_gitlab_root_pw_vault_exists_key: "_local_gitlab_root_pw_vault_exists"
    _local_k8s_gitlab_initial_password_key: "_local_k8s_gitlab_initial_password"
    _local_k8s_gitlab_initial_password_exists_key: "_local_k8s_gitlab_initial_password_exists"
    _local_active_root_password_key: "_local_active_root_password"
    _local_root_password_source_key: "_local_root_password_source"

  tasks:
    - name: "[gitlab-configure] Assert component enabled"
      assert:
        that:
          - gitlab_enabled | default(false) | bool
        fail_msg: "gitlab is disabled (gitlab_enabled=false). Set gitlab_enabled: true in hosts-vars-override/ to install/configure it."
      run_once: true
      tags: [always]

    - name: "[gitlab-configure-pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-pre-check.yaml"
      vars:
        dto_label_name: "gitlab-configure-pre-check"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations and resolve GitLab config
    # =========================================================================

    - name: "[gitlab-configure-init] Verify Vault config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-config-verify.yaml"
      vars:
        dto_label_name: "gitlab-configure-init"
      tags: [always]

    - name: "[gitlab-configure-init] Verify ESO config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-verify.yaml"
      vars:
        dto_label_name: "gitlab-configure-init"
        dto_eso_secrets_list: "{{ eso_vault_integration_gitlab_secrets + (eso_vault_integration_gitlab_secrets_extra | default([])) }}"
        dto_eso_integration_object: "{{ eso_vault_integration_gitlab }}"
        dto_namespace: "{{ gitlab_namespace }}"
      tags: [always]

    # =========================================================================
    # STEP 1: RESOLVE ROOT PASSWORD
    # Priority: Vault password → k8s initial secret → fail if neither valid
    # =========================================================================

    - name: "[gitlab-root-password] Get root password from Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-get.yaml"
      vars:
        dto_label_name: "gitlab-root-password"
        dto_vault_get_path: "{{ eso_vault_integration_gitlab.kv_engine_path }}{{ gitlab_secret_root_creds.vault_path }}"
        dto_vault_get_field: "{{ gitlab_root_secret_key_password }}"
        dto_vault_get_res_fact_name: "{{ _local_gitlab_root_pw_vault_key }}"
        dto_vault_get_res_exists_fact_name: "{{ _local_gitlab_root_pw_vault_exists_key }}"
      tags: [always]

    - name: "[gitlab-root-password] Get root password from k8s initial secret"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-secret-get.yaml"
      vars:
        dto_label_name: "gitlab-root-password"
        dto_secret_namespace: "{{ gitlab_namespace }}"
        dto_secret_name: "gitlab-gitlab-initial-root-password"
        dto_secret_field: "password"
        dto_secret_res_fact_name: "{{ _local_k8s_gitlab_initial_password_key }}"
        dto_secret_res_exists_fact_name: "{{ _local_k8s_gitlab_initial_password_exists_key }}"
      tags: [always]

    - name: "[gitlab-root-password] Get GitLab toolbox pod name"
      command: >
        kubectl get pods -n {{ gitlab_namespace }}
        -l app=toolbox
        -o jsonpath='{.items[0].metadata.name}'
      register: _local_gitlab_toolbox_pod
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-root-password] Validate Vault password via gitlab-rails"
      shell: |
        kubectl exec -n {{ gitlab_namespace }} {{ _local_gitlab_toolbox_pod.stdout }} -- \
          gitlab-rails runner \
          "puts User.find_by_username('{{ gitlab_root_username }}').valid_password?('{{ lookup('vars', _local_gitlab_root_pw_vault_key) }}')"
      register: _local_vault_password_valid_result
      when: lookup('vars', _local_gitlab_root_pw_vault_exists_key)
      failed_when: false
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-root-password] Set active password from Vault if valid"
      set_fact:
        "{{ _local_active_root_password_key }}": "{{ lookup('vars', _local_gitlab_root_pw_vault_key) }}"
        "{{ _local_root_password_source_key }}": "vault"
      when:
        - lookup('vars', _local_gitlab_root_pw_vault_exists_key)
        - _local_vault_password_valid_result.stdout is defined
        - _local_vault_password_valid_result.stdout | trim == "true"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-root-password] Validate k8s secret password via gitlab-rails"
      shell: |
        kubectl exec -n {{ gitlab_namespace }} {{ _local_gitlab_toolbox_pod.stdout }} -- \
          gitlab-rails runner \
          "puts User.find_by_username('{{ gitlab_root_username }}').valid_password?('{{ lookup('vars', _local_k8s_gitlab_initial_password_key) }}')"
      register: _local_k8s_password_valid_result
      when:
        - _local_active_root_password_key not in hostvars[inventory_hostname]
        - lookup('vars', _local_k8s_gitlab_initial_password_exists_key)
      failed_when: false
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-root-password] Set active password from k8s secret if valid"
      set_fact:
        "{{ _local_active_root_password_key }}": "{{ lookup('vars', _local_k8s_gitlab_initial_password_key) }}"
        "{{ _local_root_password_source_key }}": "k8s_secret"
      when:
        - _local_active_root_password_key not in hostvars[inventory_hostname]
        - lookup('vars', _local_k8s_gitlab_initial_password_exists_key)
        - _local_k8s_password_valid_result.stdout is defined
        - _local_k8s_password_valid_result.stdout | trim == "true"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-root-password] Fail if no valid password found"
      fail:
        msg: >
          No valid root password found.
          Vault password: {{ 'present but invalid' if lookup('vars', _local_gitlab_root_pw_vault_exists_key) else 'not set' }}.
          K8s secret password: {{ 'present but invalid' if lookup('vars', _local_k8s_gitlab_initial_password_exists_key) else 'not set' }}.
      when: _local_active_root_password_key not in hostvars[inventory_hostname]
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-root-password] Save active password to Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-put.yaml"
      vars:
        dto_label_name: "gitlab-root-password"
        dto_vault_put_path: "{{ eso_vault_integration_gitlab.kv_engine_path }}{{ gitlab_secret_root_creds.vault_path }}"
        dto_vault_put_data: >-
          {{ {
               gitlab_root_secret_key_username: gitlab_root_username,
               gitlab_root_secret_key_password: lookup('vars', _local_active_root_password_key)
             } }}
      when: lookup('vars', _local_root_password_source_key) == "k8s_secret"
      tags: [always]

    - name: "[gitlab-root-password] Print password resolution result"
      debug:
        msg: "Root password resolved from source: {{ lookup('vars', _local_root_password_source_key) }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-root-password] Delete k8s initial root password secret"
      command: >
        kubectl delete secret gitlab-gitlab-initial-root-password
        --namespace {{ gitlab_namespace }} --ignore-not-found=true
      register: _local_gitlab_initial_secret_delete
      changed_when: "'deleted' in _local_gitlab_initial_secret_delete.stdout"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    # =========================================================================
    # VERIFY
    # =========================================================================

    - name: "[gitlab-configure-verify] Show result"
      debug:
        msg:
          - "=============================================="
          - "GITLAB CONFIGURE COMPLETE"
          - "=============================================="
          - "GitLab Web UI: https://{{ gitlab_ui_domain }}"
          - ""
          - "Root credentials stored in Vault:"
          - "  Path: {{ eso_vault_integration_gitlab.kv_engine_path }}{{ gitlab_secret_root_creds.vault_path }}"
          - "  Fields: username, password"
          - ""
          - "Password source: {{ lookup('vars', _local_root_password_source_key) }}"
          - "=============================================="
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-configure-verify] Configuration complete"
      debug:
        msg: "gitlab-configure: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
