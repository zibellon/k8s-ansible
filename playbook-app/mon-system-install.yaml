        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-system/prometheus"
        dto_values_file_path: "{{ remote_charts_dir }}/mon-system/prometheus/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/mon-system/prometheus-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/mon-system/prometheus-k"
        dto_patches_list: "{{ mon_system_prometheus_kustomize_patches }}"
        dto_target_namespace: "{{ mon_system_namespace }}"
      when: mon_system_prometheus_operator_enabled and mon_system_prometheus_enabled
      tags: [prometheus]

    - name: "[mon-system-prometheus] Install or upgrade via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "mon-system-prometheus"
        dto_helm_command: >
          helm upgrade --install mon-system-prometheus {{ remote_charts_dir }}/mon-system/prometheus-k
          --namespace {{ mon_system_namespace }}
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ mon_system_prometheus_helm_timeout }}
      when: mon_system_prometheus_operator_enabled and mon_system_prometheus_enabled
      tags: [prometheus]

    - name: "[mon-system-prometheus] Wait for rollout"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
