    - name: "[mon-system-post] Install or upgrade via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "mon-system-post"
        dto_helm_command: >
          helm upgrade --install mon-system-post {{ remote_charts_dir }}/mon-system/post-k
          --namespace {{ mon_system_namespace }}
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ mon_system_post_helm_timeout }}
      tags: [post]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[mon-system-verify] Verify Helm releases"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-helm.yaml"
      vars:
        dto_helm_namespace: "{{ mon_system_namespace }}"
        dto_label_name: "mon-system-verify"
      tags: [always]

    - name: "[mon-system-verify] Show pods in {{ mon_system_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "mon-system-verify"
        dto_pods_namespace: "{{ mon_system_namespace }}"
      tags: [always]

    - name: "[mon-system-verify] Show NetworkPolicies in {{ mon_system_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-network-policy.yaml"
      vars:
        dto_label_name: "mon-system-verify"
        dto_np_namespace: "{{ mon_system_namespace }}"
      tags: [always]

    - name: "[mon-system-verify] Installation complete"
      debug:
        msg:
          - "mon-system-pre + mon-system-prometheus-operator + mon-system-prometheus + mon-system-alertmanager + mon-system-node-exporter + mon-system-ksm + mon-system-loki + mon-system-vector + mon-system-grafana + mon-system-post: OK"
          - "Grafana UI: https://{{ mon_system_grafana_domain }}"
          - "Prometheus UI: https://{{ mon_system_prometheus_domain }}"
          - "Alertmanager UI: https://{{ mon_system_alertmanager_domain }}"
          - "Namespace: {{ mon_system_namespace }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
