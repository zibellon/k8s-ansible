        dto_release_name: "mon-system-prometheus-operator"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-system/prometheus-operator"
        dto_values_file_path: "{{ remote_charts_dir }}/mon-system/prometheus-operator/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/mon-system/prometheus-operator-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/mon-system/prometheus-operator-k"
        dto_patches_list: "{{ mon_system_prometheus_operator_kustomize_patches }}"
        dto_target_namespace: "{{ mon_system_namespace }}"
        dto_kustomize_apply_namespace_transform: true
      when: mon_system_prometheus_operator_enabled
      tags: [prometheus-operator]

    - name: "[mon-system-prometheus-operator] Install or upgrade via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "mon-system-prometheus-operator"
        dto_helm_command: >
          helm upgrade --install mon-system-prometheus-operator {{ remote_charts_dir }}/mon-system/prometheus-operator-k
          --namespace {{ mon_system_namespace }}
          --create-namespace
          --cleanup-on-fail
          --skip-crds
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ mon_system_prometheus_operator_helm_timeout }}
      when: mon_system_prometheus_operator_enabled
      tags: [prometheus-operator]

    - name: "[mon-system-prometheus-operator] Wait for rollout"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "mon-system-prometheus-operator"
        dto_rollout_namespace: "{{ mon_system_namespace }}"
        dto_rollout_timeout: "{{ mon_system_prometheus_operator_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment.apps/prometheus-operator
      when: mon_system_prometheus_operator_enabled
      tags: [prometheus-operator]

    # =========================================================================
