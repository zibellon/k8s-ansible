        dto_rollout_timeout: "{{ mon_system_prometheus_rollout_timeout }}"
        dto_rollout_resources_list:
          - statefulset/prometheus-prometheus-instance
      when: mon_system_prometheus_operator_enabled and mon_system_prometheus_enabled
      tags: [prometheus]

    # =========================================================================
    # STEP 5: alertmanager (Alertmanager CR + AlertmanagerConfig + Service)
    # =========================================================================

    - name: "[mon-system-alertmanager] Copy alertmanager chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
