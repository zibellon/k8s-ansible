# =============================================================================
# Install consolidated mon-system stack via local Helm charts
# Replaces 6 separate mon-* install playbooks (mon-prometheus-operator,
# mon-grafana, mon-loki, mon-vector, mon-node-exporter, mon-kube-state-metrics).
# Single namespace: mon-system. Per-component enable flags gate each phase.
#
# Phases (--tags):
#   crds                  prometheus-operator CRDs (kubectl create)
#   pre                   namespace + NetworkPolicies + ESO (SA, SecretStore, ExternalSecret)
#   prometheus-operator   operator workload (Deployment + RBAC + Service)
#   prometheus            Prometheus CR + RBAC + Service
#   alertmanager          Alertmanager CR + AlertmanagerConfig + Service
#   node-exporter         DaemonSet + Service
#   ksm                   kube-state-metrics Deployment + RBAC + Service
#   loki                  Loki Deployment + emptyDir + ConfigMap + Service
#   vector                Vector DaemonSet + RBAC + ConfigMap (no Service)
#   grafana               Grafana Deployment + emptyDir + Service (with Vault/ESO lifecycle)
#   post                  Ingresses + Certificates + ServiceMonitors + system-* (always rendered)
#
# Usage:
#   ansible-playbook -i hosts-vars/ -i hosts-vars-override/ playbook-app/mon-system-install.yaml
#   ansible-playbook ... --tags pre        # only NetworkPolicies + ESO
#   ansible-playbook ... --tags grafana    # only Grafana phase
# =============================================================================

- name: Install mon-system consolidated stack via local Helm charts
  hosts: managers
  become: true
  gather_facts: false

  vars:
    # Имена локальных фактов — единая точка объявления (вынос из хардкода)
    _local_grafana_postgresql_vault_key: "_local_grafana_postgresql_vault"
    _local_grafana_postgresql_vault_exists_key: "_local_grafana_postgresql_vault_exists"
    _local_grafana_postgresql_password_generated_key: "_local_grafana_postgresql_password_generated"
    _local_grafana_postgresql_put_data_key: "_local_grafana_postgresql_put_data"
    _local_grafana_admin_vault_key: "_local_grafana_admin_vault"
    _local_grafana_admin_vault_exists_key: "_local_grafana_admin_vault_exists"
    _local_grafana_admin_password_generated_key: "_local_grafana_admin_password_generated"
    _local_loki_s3_access_key_vault_key: "_local_loki_s3_access_key_vault"
    _local_loki_s3_access_key_vault_exists_key: "_local_loki_s3_access_key_vault_exists"

  tasks:
    - name: "[mon-system-pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-pre-check.yaml"
      vars:
        dto_label_name: "mon-system-pre-check"
      tags: [always]

    - name: "[mon-system-pre-check] Forbid kube-system namespace"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-forbid-kube-system.yaml"
      vars:
        dto_label_name: "mon-system-pre-check"
        dto_target_namespace: "{{ mon_system_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations
    # =========================================================================

    - name: "[mon-system-init] Verify Vault config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-config-verify.yaml"
      vars:
        dto_label_name: "mon-system-init"
      tags: [always]

    - name: "[mon-system-init] Verify ESO config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-verify.yaml"
      vars:
        dto_label_name: "mon-system-init"
        dto_eso_secrets_list: "{{ eso_vault_integration_mon_system_secrets + (eso_vault_integration_mon_system_secrets_extra | default([])) }}"
        dto_eso_integration_object: "{{ eso_vault_integration_mon_system }}"
        dto_namespace: "{{ mon_system_namespace }}"
      tags: [always]

    # =========================================================================
    # STEP 1: CRDs (kubectl create — not helm)
    # =========================================================================

    - name: "[mon-system-crds] Copy CRDs to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "mon-system-crds"
        dto_chart_name: "crds"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/mon-system/crds/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-system/crds"
      when: mon_system_prometheus_operator_enabled
      tags: [crds]

    - name: "[mon-system-crds] Install prometheus-operator CRDs via kubectl"
      command: kubectl create -f {{ remote_charts_dir }}/mon-system/crds/crds.yaml
      failed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      when: mon_system_prometheus_operator_enabled
      tags: [crds]

    - name: "[mon-system-crds] Wait for CRDs"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-crds.yaml"
      vars:
        dto_label_name: "mon-system-crds"
        dto_crds_list:
          - crd/alertmanagerconfigs.monitoring.coreos.com
          - crd/alertmanagers.monitoring.coreos.com
          - crd/podmonitors.monitoring.coreos.com
          - crd/probes.monitoring.coreos.com
          - crd/prometheusagents.monitoring.coreos.com
          - crd/prometheuses.monitoring.coreos.com
          - crd/prometheusrules.monitoring.coreos.com
          - crd/scrapeconfigs.monitoring.coreos.com
          - crd/servicemonitors.monitoring.coreos.com
          - crd/thanosrulers.monitoring.coreos.com
      when: mon_system_prometheus_operator_enabled
      tags: [crds]

    # =========================================================================
    # STEP 2: pre (NetworkPolicies + ESO)
    # =========================================================================

    - name: "[mon-system-pre] Copy pre chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "mon-system-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/mon-system/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-system/pre"
      tags: [pre]

    - name: "[mon-system-pre] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "mon-system-pre"
        dto_dir: "{{ remote_charts_dir }}/mon-system/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ mon_system_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[mon-system-pre] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "mon-system-pre"
        dto_release_name: "mon-system-pre"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-system/pre"
        dto_values_file_path: "{{ remote_charts_dir }}/mon-system/pre/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/mon-system/pre-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/mon-system/pre-k"
        dto_patches_list: "{{ mon_system_pre_kustomize_patches }}"
        dto_target_namespace: "{{ mon_system_namespace }}"
      tags: [pre]

    - name: "[mon-system-pre] Install or upgrade via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "mon-system-pre"
        dto_helm_command: >
          helm upgrade --install mon-system-pre {{ remote_charts_dir }}/mon-system/pre-k
          --namespace {{ mon_system_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ mon_system_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 3: prometheus-operator (operator Deployment + RBAC + Service)
    # =========================================================================

    - name: "[mon-system-prometheus-operator] Copy prometheus-operator chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "mon-system-prometheus-operator"
        dto_chart_name: "prometheus-operator"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/mon-system/prometheus-operator/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-system/prometheus-operator"
      when: mon_system_prometheus_operator_enabled
      tags: [prometheus-operator]

    - name: "[mon-system-prometheus-operator] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "mon-system-prometheus-operator"
        dto_dir: "{{ remote_charts_dir }}/mon-system/prometheus-operator"
        dto_filename: "values-override.yaml"
        dto_content: "{{ mon_system_prometheus_operator_helm_values | to_nice_yaml }}"
      when: mon_system_prometheus_operator_enabled
