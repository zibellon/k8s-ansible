    - name: "[mon-system-loki-s3-validate] Assert S3 creds exist (fail-fast)"
      assert:
        that:
          - lookup('vars', _local_loki_s3_access_key_vault_exists_key)
        fail_msg: |
          ERROR: Loki S3 creds missing в Vault path
          '{{ eso_vault_integration_mon_system.kv_engine_path }}{{ mon_system_secret_loki_s3_creds.vault_path }}'.
          Loki не запустится без доступа к S3 object store.

          Вариант A (SeaweedFS sync) — раскомментируй loki opt-in в своём
          hosts-vars-override/seaweedfs-sync.yaml (см. hosts-vars/seaweedfs-sync.yaml —
          Pre-built opt-in для Loki: identity + bucket), затем:
            ansible-playbook -i hosts-vars/ -i hosts-vars-override/ \
              playbook-app/seaweedfs-install.yaml \
              --tags user-sync,identity-distribute,bucket-sync

          Вариант B (внешний S3 — cloud/etc.): в hosts-vars-override/mon-system.yaml
          задай mon_system_loki_s3_endpoint, затем положи creds в Vault вручную:
            vault kv put {{ eso_vault_integration_mon_system.kv_engine_path }}{{ mon_system_secret_loki_s3_creds.vault_path }} \
              {{ mon_system_loki_s3_secret_key_username }}=<username> \
              {{ mon_system_loki_s3_secret_key_access_key }}=<accessKey> \
              {{ mon_system_loki_s3_secret_key_secret_key }}=<secretKey>

          Затем повтори: ansible-playbook ... mon-system-install.yaml --tags loki
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      when: mon_system_loki_enabled
      tags: [loki]

