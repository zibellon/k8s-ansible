    # =========================================================================
    # STEP 6: node-exporter (DaemonSet + Service)
    # =========================================================================

    - name: "[mon-system-node-exporter] Copy node-exporter chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "mon-system-node-exporter"
        dto_chart_name: "node-exporter"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/mon-system/node-exporter/"
