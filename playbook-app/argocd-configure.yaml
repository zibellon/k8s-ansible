# =============================================================================
# Configure ArgoCD admin credentials
# Steps:
#   1. Resolve admin password: check Vault → check k8s secret → validate → save to Vault → delete k8s initial secret
#
# Usage:
#   ansible-playbook argocd-configure.yaml
#
# Prerequisites:
#   - ArgoCD must be installed and argocd-server running (argocd-install.yaml)
#   - Vault must be installed and unsealed
#   - External Secrets Operator must be installed
# =============================================================================

---
- name: Configure ArgoCD admin credentials
  hosts: managers
  become: true
  gather_facts: false

  vars:
    # Имена локальных фактов — единая точка объявления (вынос из хардкода)
    _local_argocd_admin_pw_vault_key: "_local_argocd_admin_pw_vault"
    _local_argocd_admin_pw_vault_exists_key: "_local_argocd_admin_pw_vault_exists"
    _local_k8s_argocd_initial_password_key: "_local_k8s_argocd_initial_password"
    _local_k8s_argocd_initial_password_exists_key: "_local_k8s_argocd_initial_password_exists"
    _local_active_admin_password_key: "_local_active_admin_password"
    _local_admin_password_source_key: "_local_admin_password_source"

  tasks:
    - name: "[argocd-configure] Assert component enabled"
      assert:
        that:
          - argocd_enabled | default(false) | bool
        fail_msg: "argocd is disabled (argocd_enabled=false). Set argocd_enabled: true in hosts-vars-override/ to install/configure it."
      run_once: true
      tags: [always]

    - name: "[argocd-configure-pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-pre-check.yaml"
      vars:
        dto_label_name: "argocd-configure-pre-check"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations and resolve ArgoCD config
    # =========================================================================

    - name: "[argocd-configure-init] Verify Vault config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-config-verify.yaml"
      vars:
        dto_label_name: "argocd-configure-init"
      tags: [always]

    - name: "[argocd-configure-init] Verify ESO config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-verify.yaml"
      vars:
        dto_label_name: "argocd-configure-init"
        dto_eso_secrets_list: "{{ eso_vault_integration_argocd_secrets + (eso_vault_integration_argocd_secrets_extra | default([])) }}"
        dto_eso_integration_object: "{{ eso_vault_integration_argocd }}"
        dto_namespace: "{{ argocd_namespace }}"
      tags: [always]

    # =========================================================================
    # STEP 0: CONFIGURE DEFAULT APP PROJECT
    # =========================================================================

    - name: "[argocd-default-project] Create manifest file"
      copy:
        dest: "/tmp/argocd-default-appproject.yaml"
        mode: "0644"
        content: |
          apiVersion: argoproj.io/v1alpha1
          kind: AppProject
          metadata:
            name: default
            namespace: {{ argocd_namespace }}
          spec:
            sourceRepos: []
            sourceNamespaces: []
            destinations: []
            clusterResourceBlacklist:
              - group: "*"
                kind: "*"
            namespaceResourceBlacklist:
              - group: "*"
                kind: "*"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[argocd-default-project] Apply manifest"
      command: kubectl apply -f /tmp/argocd-default-appproject.yaml
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    # =========================================================================
    # STEP 1: RESOLVE ADMIN PASSWORD
    # Priority: Vault password → k8s initial secret → fail if neither valid
    # =========================================================================

    - name: "[argocd-admin-password] Get admin password from Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-get.yaml"
      vars:
        dto_label_name: "argocd-admin-password"
        dto_vault_get_path: "{{ eso_vault_integration_argocd.kv_engine_path }}{{ argocd_secret_admin_creds.vault_path }}"
        dto_vault_get_field: "{{ argocd_admin_secret_key_password }}"
        dto_vault_get_res_fact_name: "{{ _local_argocd_admin_pw_vault_key }}"
        dto_vault_get_res_exists_fact_name: "{{ _local_argocd_admin_pw_vault_exists_key }}"
      tags: [always]

    - name: "[argocd-admin-password] Get admin password from k8s initial secret"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-secret-get.yaml"
      vars:
        dto_label_name: "argocd-admin-password"
        dto_secret_namespace: "{{ argocd_namespace }}"
        dto_secret_name: "argocd-initial-admin-secret"
        dto_secret_field: "password"
        dto_secret_res_fact_name: "{{ _local_k8s_argocd_initial_password_key }}"
        dto_secret_res_exists_fact_name: "{{ _local_k8s_argocd_initial_password_exists_key }}"
      tags: [always]

    - name: "[argocd-admin-password] Validate Vault password (plaintext)"
      shell: |
        kubectl exec -n {{ argocd_namespace }} deployment/argocd-server -- \
          argocd login localhost:8080 --username admin \
          --password "{{ lookup('vars', _local_argocd_admin_pw_vault_key) }}" \
          --plaintext > /dev/null 2>&1
      register: _local_vault_login_http
      when: lookup('vars', _local_argocd_admin_pw_vault_exists_key)
      failed_when: false
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[argocd-admin-password] Validate Vault password (TLS)"
      shell: |
        kubectl exec -n {{ argocd_namespace }} deployment/argocd-server -- \
          argocd login localhost:8080 --username admin \
          --password "{{ lookup('vars', _local_argocd_admin_pw_vault_key) }}" \
          --insecure > /dev/null 2>&1
      register: _local_vault_login_https
      when: lookup('vars', _local_argocd_admin_pw_vault_exists_key)
      failed_when: false
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[argocd-admin-password] Set active password from Vault if valid"
      set_fact:
        "{{ _local_active_admin_password_key }}": "{{ lookup('vars', _local_argocd_admin_pw_vault_key) }}"
        "{{ _local_admin_password_source_key }}": "vault"
      when:
        - lookup('vars', _local_argocd_admin_pw_vault_exists_key)
        - (_local_vault_login_http.rc | default(1)) == 0 or (_local_vault_login_https.rc | default(1)) == 0
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[argocd-admin-password] Validate k8s secret password (plaintext)"
      shell: |
        kubectl exec -n {{ argocd_namespace }} deployment/argocd-server -- \
          argocd login localhost:8080 --username "{{ argocd_admin_username }}" \
          --password "{{ lookup('vars', _local_k8s_argocd_initial_password_key) }}" \
          --plaintext > /dev/null 2>&1
      register: _local_k8s_login_http
      when:
        - _local_active_admin_password_key not in hostvars[inventory_hostname]
        - lookup('vars', _local_k8s_argocd_initial_password_exists_key)
      failed_when: false
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[argocd-admin-password] Validate k8s secret password (TLS)"
      shell: |
        kubectl exec -n {{ argocd_namespace }} deployment/argocd-server -- \
          argocd login localhost:8080 --username "{{ argocd_admin_username }}" \
          --password "{{ lookup('vars', _local_k8s_argocd_initial_password_key) }}" \
          --insecure > /dev/null 2>&1
      register: _local_k8s_login_https
      when:
        - _local_active_admin_password_key not in hostvars[inventory_hostname]
        - lookup('vars', _local_k8s_argocd_initial_password_exists_key)
      failed_when: false
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[argocd-admin-password] Set active password from k8s secret if valid"
      set_fact:
        "{{ _local_active_admin_password_key }}": "{{ lookup('vars', _local_k8s_argocd_initial_password_key) }}"
        "{{ _local_admin_password_source_key }}": "k8s_secret"
      when:
        - _local_active_admin_password_key not in hostvars[inventory_hostname]
        - lookup('vars', _local_k8s_argocd_initial_password_exists_key)
        - (_local_k8s_login_http.rc | default(1)) == 0 or (_local_k8s_login_https.rc | default(1)) == 0
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[argocd-admin-password] Fail if no valid password found"
      fail:
        msg: >
          No valid admin password found.
          Vault password: {{ 'present but invalid' if lookup('vars', _local_argocd_admin_pw_vault_exists_key) else 'not set' }}.
          K8s secret password: {{ 'present but invalid' if lookup('vars', _local_k8s_argocd_initial_password_exists_key) else 'not set' }}.
      when: _local_active_admin_password_key not in hostvars[inventory_hostname]
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[argocd-admin-password] Save active password to Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-put.yaml"
      vars:
        dto_label_name: "argocd-admin-password"
        dto_vault_put_path: "{{ eso_vault_integration_argocd.kv_engine_path }}{{ argocd_secret_admin_creds.vault_path }}"
        dto_vault_put_data: >-
          {{ {
               argocd_admin_secret_key_username: argocd_admin_username,
               argocd_admin_secret_key_password: lookup('vars', _local_active_admin_password_key)
             } }}
      when: lookup('vars', _local_admin_password_source_key) == "k8s_secret"
      tags: [always]

    - name: "[argocd-admin-password] Print password resolution result"
      debug:
        msg: "Admin password resolved from source: {{ lookup('vars', _local_admin_password_source_key) }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[argocd-admin-password] Delete k8s initial admin secret"
      command: >
        kubectl delete secret argocd-initial-admin-secret
        --namespace {{ argocd_namespace }} --ignore-not-found=true
      register: _local_argocd_initial_secret_delete
      changed_when: "'deleted' in _local_argocd_initial_secret_delete.stdout"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    # =========================================================================
    # VERIFY
    # =========================================================================

    - name: "[argocd-configure-verify] Show result"
      debug:
        msg:
          - "=============================================="
          - "ARGOCD CONFIGURE COMPLETE"
          - "=============================================="
          - "ArgoCD Web UI: https://{{ argocd_ui_domain }}"
          - ""
          - "Admin credentials stored in Vault:"
          - "  Path: {{ eso_vault_integration_argocd.kv_engine_path }}{{ argocd_secret_admin_creds.vault_path }}"
          - "  Fields: username, password"
          - ""
          - "Password source: {{ lookup('vars', _local_admin_password_source_key) }}"
          - "=============================================="
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[argocd-configure-verify] Configuration complete"
      debug:
        msg: "argocd-configure: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
