# =============================================================================
# Install GitLab (Production Helm Chart)
# Steps:
#   1. gitlab/pre: Vault initial secrets + ESO resources (NetworkPolicies, ServiceAccount, SecretStore, ExternalSecrets)
#   2. gitlab: PostgreSQL + Redis + MinIO + MinIO setup + GitLab (official chart)
#   3. gitlab/post: Ingress (Traefik) + HAProxy SSH
#
# Usage (tags):
#   ansible-playbook gitlab-install.yaml              # full install
#   ansible-playbook gitlab-install.yaml --tags pre   # only pre (Vault secrets + ESO resources)
#   ansible-playbook gitlab-install.yaml --tags install
#   ansible-playbook gitlab-install.yaml --tags post  # only post (Ingress + HAProxy SSH)
#
# Prerequisites:
#   - Vault must be installed and unsealed
#   - Vault policies and roles must be synced (vault-policy-sync.yaml)
#   - External Secrets Operator must be installed
#
# NOTE: Root password and PAT management → gitlab-configure.yaml
# =============================================================================

---
- name: Install GitLab (Production Helm)
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[gitlab-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        label_name: "gitlab-pre-check"
      tags: [always]

    - name: "[gitlab-pre-check] Forbid kube-system namespace"
      include_tasks: tasks/tasks-forbid-kube-system.yaml
      vars:
        label_name: "gitlab-pre-check"
        dto_target_namespace: "{{ gitlab_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations and resolve GitLab config
    # =========================================================================

    - name: "[gitlab-install-init] Merge ESO integrations"
      include_tasks: tasks/tasks-eso-merge.yaml
      tags: [always]

    - name: "[gitlab-install-init] Find secret names and vault paths by type"
      set_fact:
        # Secret names
        secret_postgresql: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'postgresql') | first).target_secret_name }}"
        secret_redis: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'redis') | first).target_secret_name }}"
        secret_minio_root: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'minio_root') | first).target_secret_name }}"
        secret_minio_registry: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'minio_registry') | first).target_secret_name }}"
        secret_gitlab_registry_minio_connection: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'gitlab_registry_minio_connection') | first).target_secret_name }}"
        secret_gitlab_minio_connection: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'gitlab_minio_connection') | first).target_secret_name }}"
        secret_gitlab_root: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'gitlab_root') | first).target_secret_name }}"
        # Vault paths
        vault_path_postgresql: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'postgresql') | first).vault_path }}"
        vault_path_redis: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'redis') | first).vault_path }}"
        vault_path_minio_root: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'minio_root') | first).vault_path }}"
        vault_path_minio_registry: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'minio_registry') | first).vault_path }}"
        vault_path_gitlab_root: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'gitlab_root') | first).vault_path }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    # =========================================================================
    # INIT: Resolve ClusterIssuer + ACME solver pod labels
    # =========================================================================

    - name: "[gitlab-install-init] Resolve ACME solver"
      include_tasks: tasks/tasks-resolve-acme-solver.yaml
      vars:
        label_name: gitlab-install-init
        dto_cluster_issuer_name: "{{ gitlab_cluster_issuer_name }}"
        dto_ingress_class_name: "{{ gitlab_ingress_class_name }}"
        dto_acme_cluster_issuer_result_var: "gitlab_ui_acme_cluster_issuer"
        dto_acme_solver_result_var: "gitlab_ui_acme_solver"
        dto_acme_pod_labels_result_var: "gitlab_acme_solver_pod_labels"
      tags: [always]

    # =========================================================================
    # STEP 1: INSTALL PRE (ESO Resources, NetworkPolicies)
    # =========================================================================

    - name: "[gitlab-pre] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "gitlab-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/gitlab/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/gitlab/pre"
      tags: [pre]

    - name: "[gitlab-pre] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "gitlab-pre"
        dto_dir: "{{ remote_charts_dir }}/gitlab/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ gitlab_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[gitlab-pre] Install via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "gitlab-pre"
        dto_helm_command: >
          helm upgrade --install gitlab-pre {{ remote_charts_dir }}/gitlab/pre
          --namespace {{ gitlab_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/gitlab/pre/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ gitlab_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: INSTALL POSTGRESQL
    # =========================================================================

    # ----- PostgreSQL credentials -----
    - name: "[gitlab-postgresql-secrets] Get PostgreSQL credentials from Vault"
      include_tasks: tasks/tasks-vault-get.yaml
      vars:
        label_name: "gitlab-postgresql-secrets"
        dto_vault_get_path: "{{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_postgresql }}"
        dto_vault_get_field: password
        dto_vault_get_res_fact_name: "gitlab_postgresql_vault"
      tags: [postgresql]

    - name: "[gitlab-postgresql-secrets] Generate PostgreSQL password"
      include_tasks: tasks/tasks-generate-secret.yaml
      vars:
        label_name: "gitlab-postgresql-secrets"
        dto_generate_fact_name: "_gitlab_postgresql_password_generated"
      when: not gitlab_postgresql_vault_exists
      tags: [postgresql]

    - name: "[gitlab-postgresql-secrets] Store PostgreSQL credentials in Vault"
      include_tasks: tasks/tasks-vault-put.yaml
      vars:
        label_name: "gitlab-postgresql-secrets"
        dto_vault_put_path: "{{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_postgresql }}"
        dto_vault_put_data:
          username: gitlab
          password: "{{ _gitlab_postgresql_password_generated }}"
      when: not gitlab_postgresql_vault_exists
      tags: [postgresql]

    - name: "[gitlab-postgresql-secrets] Trigger ESO sync"
      include_tasks: tasks/tasks-eso-force-sync.yaml
      vars:
        label_name: "gitlab-postgresql-secrets"
        dto_eso_sync_namespace: "{{ gitlab_namespace }}"
      tags: [postgresql]

    - name: "[gitlab-postgresql-secrets] Wait for secret"
      include_tasks: tasks/tasks-wait-secret.yaml
      vars:
        label_name: "gitlab-postgresql-secrets"
        dto_wait_secret_name: "{{ secret_postgresql }}"
        dto_wait_secret_namespace: "{{ gitlab_namespace }}"
      tags: [postgresql]

    # ------------------
    # ---INSTALL
    # ------------------
    
    - name: "[gitlab-postgresql] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "gitlab-postgresql"
        dto_chart_name: "postgresql"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/gitlab/postgresql/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/gitlab/postgresql"
      tags: [postgresql]

    - name: "[gitlab-postgresql] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "gitlab-postgresql"
        dto_dir: "{{ remote_charts_dir }}/gitlab/postgresql"
        dto_filename: "values-override.yaml"
        dto_content: "{{ gitlab_postgresql_helm_values | to_nice_yaml }}"
      tags: [postgresql]

    - name: "[gitlab-postgresql] Install via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "gitlab-postgresql"
        dto_helm_command: >
          helm upgrade --install gitlab-postgresql {{ remote_charts_dir }}/gitlab/postgresql
          --namespace {{ gitlab_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/gitlab/postgresql/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ gitlab_postgresql_helm_timeout }}
      tags: [postgresql]

    - name: "[gitlab-postgresql] Wait for rollout to be ready"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "gitlab-postgresql"
        dto_rollout_namespace: "{{ gitlab_namespace }}"
        dto_rollout_timeout: "{{ gitlab_postgresql_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment.apps/gitlab-postgresql
      tags: [postgresql]

    # =========================================================================
    # STEP 3: INSTALL REDIS
    # =========================================================================

    # ----- Redis credentials -----
    - name: "[gitlab-redis-secrets] Get Redis credentials from Vault"
      include_tasks: tasks/tasks-vault-get.yaml
      vars:
        label_name: "gitlab-redis-secrets"
        dto_vault_get_path: "{{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_redis }}"
        dto_vault_get_field: password
        dto_vault_get_res_fact_name: "gitlab_redis_vault"
      tags: [redis]

    # redis_args embeds the password, so we generate it here before the put
    - name: "[gitlab-redis-secrets] Generate Redis password"
      set_fact:
        _gitlab_redis_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
      when: not gitlab_redis_vault_exists
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [redis]

    - name: "[gitlab-redis-secrets] Store Redis credentials in Vault"
      include_tasks: tasks/tasks-vault-put.yaml
      vars:
        label_name: "gitlab-redis-secrets"
        dto_vault_put_path: "{{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_redis }}"
        dto_vault_put_data:
          password: "{{ _gitlab_redis_password }}"
          redis_args: "--save 1 1 --notify-keyspace-events KEA --requirepass {{ _gitlab_redis_password }}"
      when: not gitlab_redis_vault_exists
      tags: [redis]

    - name: "[gitlab-redis-secrets] Trigger ESO sync"
      include_tasks: tasks/tasks-eso-force-sync.yaml
      vars:
        label_name: "gitlab-redis-secrets"
        dto_eso_sync_namespace: "{{ gitlab_namespace }}"
      tags: [redis]

    - name: "[gitlab-redis-secrets] Wait for secret"
      include_tasks: tasks/tasks-wait-secret.yaml
      vars:
        label_name: "gitlab-redis-secrets"
        dto_wait_secret_name: "{{ secret_redis }}"
        dto_wait_secret_namespace: "{{ gitlab_namespace }}"
      tags: [redis]

    # ------------------
    # ---INSTALL
    # ------------------

    - name: "[gitlab-redis] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "gitlab-redis"
        dto_chart_name: "redis"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/gitlab/redis/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/gitlab/redis"
      tags: [redis]

    - name: "[gitlab-redis] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "gitlab-redis"
        dto_dir: "{{ remote_charts_dir }}/gitlab/redis"
        dto_filename: "values-override.yaml"
        dto_content: "{{ gitlab_redis_helm_values | to_nice_yaml }}"
      tags: [redis]

    - name: "[gitlab-redis] Install via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "gitlab-redis"
        dto_helm_command: >
          helm upgrade --install gitlab-redis {{ remote_charts_dir }}/gitlab/redis
          --namespace {{ gitlab_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/gitlab/redis/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ gitlab_redis_helm_timeout }}
      tags: [redis]

    - name: "[gitlab-redis] Wait for rollout to be ready"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "gitlab-redis"
        dto_rollout_namespace: "{{ gitlab_namespace }}"
        dto_rollout_timeout: "{{ gitlab_redis_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment.apps/gitlab-redis
      tags: [redis]

    # =========================================================================
    # STEP 4: INSTALL MINIO
    # =========================================================================

    # ----- MinIO root credentials -----
    - name: "[gitlab-minio-secrets] Get MinIO root credentials from Vault"
      include_tasks: tasks/tasks-vault-get.yaml
      vars:
        label_name: "gitlab-minio-secrets"
        dto_vault_get_path: "{{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_minio_root }}"
        dto_vault_get_field: password
        dto_vault_get_res_fact_name: "gitlab_minio_root_vault"
      tags: [minio]

    - name: "[gitlab-minio-secrets] Generate MinIO root password"
      include_tasks: tasks/tasks-generate-secret.yaml
      vars:
        label_name: "gitlab-minio-secrets"
        dto_generate_fact_name: "_gitlab_minio_root_password_generated"
      when: not gitlab_minio_root_vault_exists
      tags: [minio]

    - name: "[gitlab-minio-secrets] Store MinIO root credentials in Vault"
      include_tasks: tasks/tasks-vault-put.yaml
      vars:
        label_name: "gitlab-minio-secrets"
        dto_vault_put_path: "{{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_minio_root }}"
        dto_vault_put_data:
          username: "{{ gitlab_minio_root_user }}"
          password: "{{ _gitlab_minio_root_password_generated }}"
      when: not gitlab_minio_root_vault_exists
      tags: [minio]

    - name: "[gitlab-minio-secrets] Trigger ESO sync"
      include_tasks: tasks/tasks-eso-force-sync.yaml
      vars:
        label_name: "gitlab-minio-secrets"
        dto_eso_sync_namespace: "{{ gitlab_namespace }}"
      tags: [minio]

    - name: "[gitlab-minio-secrets] Wait for secret"
      include_tasks: tasks/tasks-wait-secret.yaml
      vars:
        label_name: "gitlab-minio-secrets"
        dto_wait_secret_name: "{{ secret_minio_root }}"
        dto_wait_secret_namespace: "{{ gitlab_namespace }}"
      tags: [minio]

    # ------------------
    # ---INSTALL
    # ------------------

    - name: "[gitlab-minio] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "gitlab-minio"
        dto_chart_name: "minio"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/gitlab/minio/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/gitlab/minio"
      tags: [minio]

    - name: "[gitlab-minio] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "gitlab-minio"
        dto_dir: "{{ remote_charts_dir }}/gitlab/minio"
        dto_filename: "values-override.yaml"
        dto_content: "{{ gitlab_minio_helm_values | to_nice_yaml }}"
      tags: [minio]

    - name: "[gitlab-minio] Install via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "gitlab-minio"
        dto_helm_command: >
          helm upgrade --install gitlab-minio {{ remote_charts_dir }}/gitlab/minio
          --namespace {{ gitlab_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/gitlab/minio/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ gitlab_minio_helm_timeout }}
      tags: [minio]

    - name: "[gitlab-minio] Wait for rollout to be ready"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "gitlab-minio"
        dto_rollout_namespace: "{{ gitlab_namespace }}"
        dto_rollout_timeout: "{{ gitlab_minio_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment.apps/gitlab-minio
      tags: [minio]

    # =========================================================================
    # STEP 5: MINIO SETUP (Buckets and Access Keys)
    # =========================================================================

    - name: "[gitlab-minio-setup] Get MinIO pod name"
      command: >
        kubectl get pods -n {{ gitlab_namespace }}
        -l app.kubernetes.io/name=gitlab-minio
        -o jsonpath='{.items[0].metadata.name}'
      register: minio_pod_name
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [minio]

    - name: "[gitlab-minio-setup] Get MinIO root username from secret"
      include_tasks: tasks/tasks-k8s-secret-get.yaml
      vars:
        label_name: "gitlab-minio-setup"
        dto_secret_namespace: "{{ gitlab_namespace }}"
        dto_secret_name: "{{ secret_minio_root }}"
        dto_secret_field: "username"
        dto_secret_res_fact_name: "minio_root_username"
      tags: [minio]

    - name: "[gitlab-minio-setup] Get MinIO root password from secret"
      include_tasks: tasks/tasks-k8s-secret-get.yaml
      vars:
        label_name: "gitlab-minio-setup"
        dto_secret_namespace: "{{ gitlab_namespace }}"
        dto_secret_name: "{{ secret_minio_root }}"
        dto_secret_field: "password"
        dto_secret_res_fact_name: "minio_root_password"
      tags: [minio]

    - name: "[gitlab-minio-setup] Assert MinIO root credentials are present"
      assert:
        that:
          - minio_root_username_exists
          - minio_root_password_exists
        fail_msg: "MinIO root credentials not found in secret {{ secret_minio_root }} (namespace {{ gitlab_namespace }})"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [minio]

    - name: "[gitlab-minio-setup] Configure mc alias"
      command: >
        kubectl exec -n {{ gitlab_namespace }} {{ minio_pod_name.stdout }} --
        mc alias set myminio http://localhost:9000
        '{{ minio_root_username }}'
        '{{ minio_root_password }}'
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [minio]

    # Create buckets
    - name: "[gitlab-minio-setup] Create buckets"
      command: >
        kubectl exec -n {{ gitlab_namespace }} {{ minio_pod_name.stdout }} --
        mc mb myminio/{{ item }} --ignore-existing
      loop:
        - registry
        - gitlab-artifacts
        - gitlab-uploads
        - gitlab-packages
        - gitlab-backups
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [minio]

    # Create access keys for registry
    - name: "[gitlab-minio-setup] Get registry access key from Vault"
      include_tasks: tasks/tasks-vault-get.yaml
      vars:
        label_name: "gitlab-minio-setup"
        dto_vault_get_path: "{{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_minio_registry }}"
        dto_vault_get_field: access_key
        dto_vault_get_res_fact_name: "gitlab_registry_access_key_vault"
      tags: [minio]

    - name: "[gitlab-minio-setup] Create access key for registry"
      command: >
        kubectl exec -n {{ gitlab_namespace }} {{ minio_pod_name.stdout }} --
        mc admin accesskey create myminio {{ minio_root_username }}
        --name 'registry-key' --json
      register: registry_accesskey_result
      when: not gitlab_registry_access_key_vault_exists
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [minio]

    - name: "[gitlab-minio-setup] Store registry access key in Vault"
      include_tasks: tasks/tasks-vault-put.yaml
      vars:
        label_name: "gitlab-minio-setup"
        dto_vault_put_path: "{{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_minio_registry }}"
        dto_vault_put_data:
          access_key: "{{ (registry_accesskey_result.stdout | from_json).accessKey }}"
          secret_key: "{{ (registry_accesskey_result.stdout | from_json).secretKey }}"
          bucket_name: registry
      when: not gitlab_registry_access_key_vault_exists
      tags: [minio]

    - name: "[gitlab-minio-setup] Trigger ESO sync"
      include_tasks: tasks/tasks-eso-force-sync.yaml
      vars:
        label_name: "gitlab-minio-setup"
        dto_eso_sync_namespace: "{{ gitlab_namespace }}"
      tags: [minio]

    - name: "[gitlab-minio-setup] Wait for secret"
      include_tasks: tasks/tasks-wait-secret.yaml
      vars:
        label_name: "gitlab-minio-setup"
        dto_wait_secret_name: "{{ secret_minio_registry }}"
        dto_wait_secret_namespace: "{{ gitlab_namespace }}"
      tags: [minio]

    # =========================================================================
    # STEP 6: INSTALL GITLAB (Official Helm Chart)
    # =========================================================================

    - name: "[gitlab] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "gitlab"
        dto_dir: "{{ remote_charts_dir }}/gitlab/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ gitlab_helm_values | to_nice_yaml }}"
      tags: [install]

    - name: "[gitlab] Add Helm repository"
      include_tasks: tasks/tasks-add-helm-repo.yaml
      vars:
        label_name: "gitlab"
        dto_helm_repo_name: "{{ gitlab_helm_repo_name }}"
        dto_helm_repo_url: "{{ gitlab_helm_repo_url }}"
      tags: [install]

    - name: "[gitlab] Install via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "gitlab"
        dto_helm_command: >
          helm upgrade --install gitlab {{ gitlab_helm_repo_name }}/{{ gitlab_helm_chart_name }}
          --namespace {{ gitlab_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/gitlab/install/values-override.yaml
          --version {{ gitlab_chart_version }}
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ gitlab_install_helm_timeout }}
      tags: [install]

    - name: "[gitlab] Wait for webservice deployment to be ready"
      command: >
        kubectl rollout status deployment -l app=webservice
        -n {{ gitlab_namespace }}
        --timeout={{ gitlab_rollout_timeout }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    # =========================================================================
    # STEP 7: INSTALL POST CHART (Ingress, HAProxy SSH)
    # =========================================================================

    - name: "[gitlab-post] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "gitlab-post"
        dto_chart_name: "post"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/gitlab/post/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/gitlab/post"
      tags: [post]

    - name: "[gitlab-post] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "gitlab-post"
        dto_dir: "{{ remote_charts_dir }}/gitlab/post"
        dto_filename: "values-override.yaml"
        dto_content: "{{ gitlab_post_helm_values | to_nice_yaml }}"
      tags: [post]

    - name: "[gitlab-post] Install via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "gitlab-post"
        dto_helm_command: >
          helm upgrade --install gitlab-post {{ remote_charts_dir }}/gitlab/post
          --namespace {{ gitlab_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/gitlab/post/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ gitlab_post_helm_timeout }}
      tags: [post]

    # =========================================================================
    # STEP 8: VERIFICATION
    # =========================================================================

    - name: "[gitlab-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        dto_helm_namespace: "{{ gitlab_namespace }}"
        label_name: "gitlab-verify"
      tags: [always]

    - name: "[gitlab-verify] Get gitlab pods status"
      command: kubectl get pods -n {{ gitlab_namespace }} -o wide
      register: gitlab_pods
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-verify] Print gitlab pods status"
      debug:
        msg: "{{ gitlab_pods.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-verify] Show access info"
      debug:
        msg:
          - "=============================================="
          - "GITLAB INSTALLATION COMPLETE"
          - "=============================================="
          - "GitLab Web UI: https://{{ gitlab_ui_domain }}"
          - "GitLab Registry: https://{{ gitlab_registry_domain }}"
          - "GitLab Pages: https://{{ gitlab_pages_domain }}"
          - "GitLab SSH: {{ gitlab_ui_domain }}:{{ gitlab_ssh_port_external }}"
          - ""
          - "Credentials stored in Vault:"
          - "  PostgreSQL: {{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_postgresql }}"
          - "  Redis: {{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_redis }}"
          - "  MinIO root: {{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_minio_root }}"
          - "  MinIO registry: {{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_minio_registry }}"
          - ""
          - "GitLab Runner: Installed but NOT registered."
          - "  Register manually via UI or CLI."
          - ""
          - "Run gitlab-configure.yaml to set root password + PAT in Vault."
          - "=============================================="
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-verify] Installation complete"
      debug:
        msg: "gitlab-pre + gitlab + gitlab-post: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
