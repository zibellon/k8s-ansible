# =============================================================================
# Install GitLab (Production Helm Chart)
# Steps:
#   1. gitlab/pre: Vault initial secrets + ESO resources (NetworkPolicies, ServiceAccount, SecretStore, ExternalSecrets)
#   2. gitlab: PostgreSQL + Redis + GitLab (official chart, external S3 via ESO)
#   3. gitlab/post: Ingress (Traefik) + HAProxy SSH
#
# Usage (tags):
#   ansible-playbook gitlab-install.yaml              # full install
#   ansible-playbook gitlab-install.yaml --tags pre   # only pre (Vault secrets + ESO resources)
#   ansible-playbook gitlab-install.yaml --tags install
#   ansible-playbook gitlab-install.yaml --tags post  # only post (Ingress + HAProxy SSH)
#   ansible-playbook gitlab-install.yaml --tags config-root  # reconcile root password vs Vault (seed/rotate/enforce)
#
# Prerequisites:
#   - Vault must be installed and unsealed
#   - Vault policies and roles must be synced (... playbook-app/vault-install.yaml --tags vault-cr)
#   - External Secrets Operator must be installed
#
# NOTE: Root password management → this playbook, --tags config-root (Vault = source of truth)
# =============================================================================

---
- name: Install GitLab (Production Helm)
  hosts: managers
  become: true
  gather_facts: false

  vars:
    # Имена локальных фактов — единая точка объявления (вынос из хардкода)
    _local_gitlab_postgresql_vault_key: "_local_gitlab_postgresql_vault"
    _local_gitlab_postgresql_vault_exists_key: "_local_gitlab_postgresql_vault_exists"
    _local_gitlab_postgresql_password_generated_key: "_local_gitlab_postgresql_password_generated"
    _local_gitlab_postgresql_put_data_key: "_local_gitlab_postgresql_put_data"
    _local_gitlab_redis_vault_key: "_local_gitlab_redis_vault"
    _local_gitlab_redis_vault_exists_key: "_local_gitlab_redis_vault_exists"
    _local_gitlab_redis_password_key: "_local_gitlab_redis_password"
    _local_gitlab_redis_args_key: "_local_gitlab_redis_args"
    _local_gitlab_s3_access_key_vault_key: "_local_gitlab_s3_access_key_vault"
    _local_gitlab_s3_access_key_vault_exists_key: "_local_gitlab_s3_access_key_vault_exists"
    _local_gitlab_helm_chart_source_key: "_local_gitlab_helm_chart_source"

  tasks:
    - name: "[gitlab-install] Assert component enabled"
      assert:
        that:
          - gitlab_enabled | default(false) | bool
        fail_msg: "gitlab is disabled (gitlab_enabled=false). Set gitlab_enabled: true in hosts-vars-override/ to install/configure it."
      run_once: true
      tags: [always]

    - name: "[gitlab-pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-pre-check.yaml"
      vars:
        dto_label_name: "gitlab-pre-check"
      tags: [always]

    - name: "[gitlab-pre-check] Forbid kube-system namespace"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-forbid-kube-system.yaml"
      vars:
        dto_label_name: "gitlab-pre-check"
        dto_target_namespace: "{{ gitlab_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations and resolve GitLab config
    # =========================================================================

    - name: "[gitlab-install-init] Verify Vault config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-config-verify.yaml"
      vars:
        dto_label_name: "gitlab-install-init"
      tags: [always]

    - name: "[gitlab-install-init] Verify ESO config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-verify.yaml"
      vars:
        dto_label_name: "gitlab-install-init"
        dto_eso_secrets_list: "{{ eso_vault_integration_gitlab_secrets + (eso_vault_integration_gitlab_secrets_extra | default([])) }}"
        dto_eso_integration_object: "{{ eso_vault_integration_gitlab }}"
        dto_namespace: "{{ gitlab_namespace }}"
      tags: [always]

    # =========================================================================
    # STEP 1: INSTALL PRE (ESO Resources, NetworkPolicies)
    # =========================================================================

    - name: "[gitlab-pre] Copy chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "gitlab-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/gitlab/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/gitlab/pre"
      tags: [pre]

    - name: "[gitlab-pre] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "gitlab-pre"
        dto_dir: "{{ remote_charts_dir }}/gitlab/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ gitlab_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[gitlab-pre] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "gitlab-pre"
        dto_release_name: "gitlab-pre"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/gitlab/pre"
        dto_values_file_path: "{{ remote_charts_dir }}/gitlab/pre/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/gitlab/pre-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/gitlab/pre-k"
        dto_patches_list: "{{ gitlab_pre_kustomize_patches }}"
        dto_target_namespace: "{{ gitlab_namespace }}"
      tags: [pre]

    - name: "[gitlab-pre] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "gitlab-pre"
        dto_helm_command: >
          helm upgrade --install gitlab-pre {{ remote_charts_dir }}/gitlab/pre-k
          --namespace {{ gitlab_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ gitlab_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: INSTALL POSTGRESQL
    # =========================================================================

    # ----- PostgreSQL credentials -----
    - name: "[gitlab-postgresql-secrets] Get PostgreSQL credentials from Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-get.yaml"
      vars:
        dto_label_name: "gitlab-postgresql-secrets"
        dto_vault_get_path: "{{ eso_vault_integration_gitlab.kv_engine_path }}{{ gitlab_secret_postgresql_creds.vault_path }}"
        dto_vault_get_field: "{{ gitlab_postgresql_secret_key_password }}"
        dto_vault_get_res_fact_name: "{{ _local_gitlab_postgresql_vault_key }}"
        dto_vault_get_res_exists_fact_name: "{{ _local_gitlab_postgresql_vault_exists_key }}"
      tags: [postgresql]

    - name: "[gitlab-postgresql-secrets] Generate PostgreSQL password"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-generate-secret.yaml"
      vars:
        dto_label_name: "gitlab-postgresql-secrets"
        dto_generate_fact_name: "{{ _local_gitlab_postgresql_password_generated_key }}"
      when: not lookup('vars', _local_gitlab_postgresql_vault_exists_key)
      tags: [postgresql]

    - name: "[gitlab-postgresql-secrets] Prepare PostgreSQL Vault put data"
      set_fact:
        "{{ _local_gitlab_postgresql_put_data_key }}": >-
          {{ {
               gitlab_postgresql_secret_key_username: gitlab_postgresql_username,
               gitlab_postgresql_secret_key_password: lookup('vars', _local_gitlab_postgresql_password_generated_key)
             } }}
      when: not lookup('vars', _local_gitlab_postgresql_vault_exists_key)
      tags: [postgresql]

    - name: "[gitlab-postgresql-secrets] Store PostgreSQL credentials in Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-put.yaml"
      vars:
        dto_label_name: "gitlab-postgresql-secrets"
        dto_vault_put_path: "{{ eso_vault_integration_gitlab.kv_engine_path }}{{ gitlab_secret_postgresql_creds.vault_path }}"
        dto_vault_put_data: "{{ lookup('vars', _local_gitlab_postgresql_put_data_key) }}"
      when: not lookup('vars', _local_gitlab_postgresql_vault_exists_key)
      tags: [postgresql]

    - name: "[gitlab-postgresql-secrets] Trigger ESO sync"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-force-sync.yaml"
      vars:
        dto_label_name: "gitlab-postgresql-secrets"
        dto_eso_sync_namespace: "{{ gitlab_namespace }}"
      tags: [postgresql]

    - name: "[gitlab-postgresql-secrets] Wait for secret"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-secret.yaml"
      vars:
        dto_label_name: "gitlab-postgresql-secrets"
        dto_wait_secret_name: "{{ gitlab_secret_postgresql_creds.body.target.name }}"
        dto_wait_secret_namespace: "{{ gitlab_namespace }}"
      tags: [postgresql]

    # ------------------
    # ---INSTALL
    # ------------------

    - name: "[gitlab-postgresql] Copy chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "gitlab-postgresql"
        dto_chart_name: "postgresql"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/gitlab/postgresql/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/gitlab/postgresql"
      tags: [postgresql]

    - name: "[gitlab-postgresql] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "gitlab-postgresql"
        dto_dir: "{{ remote_charts_dir }}/gitlab/postgresql"
        dto_filename: "values-override.yaml"
        dto_content: "{{ gitlab_postgresql_helm_values | to_nice_yaml }}"
      tags: [postgresql]

    - name: "[gitlab-postgresql] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "gitlab-postgresql"
        dto_release_name: "gitlab-postgresql"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/gitlab/postgresql"
        dto_values_file_path: "{{ remote_charts_dir }}/gitlab/postgresql/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/gitlab/postgresql-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/gitlab/postgresql-k"
        dto_patches_list: "{{ gitlab_postgresql_kustomize_patches }}"
        dto_target_namespace: "{{ gitlab_namespace }}"
      tags: [postgresql]

    - name: "[gitlab-postgresql] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "gitlab-postgresql"
        dto_helm_command: >
          helm upgrade --install gitlab-postgresql {{ remote_charts_dir }}/gitlab/postgresql-k
          --namespace {{ gitlab_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ gitlab_postgresql_helm_timeout }}
      tags: [postgresql]

    - name: "[gitlab-postgresql] Wait for rollout to be ready"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "gitlab-postgresql"
        dto_rollout_namespace: "{{ gitlab_namespace }}"
        dto_rollout_timeout: "{{ gitlab_postgresql_rollout_timeout }}"
        dto_rollout_resources_list:
          - statefulset.apps/gitlab-postgresql
      tags: [postgresql]

    # =========================================================================
    # STEP 3: INSTALL REDIS
    # =========================================================================

    # ----- Redis credentials -----
    - name: "[gitlab-redis-secrets] Get Redis credentials from Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-get.yaml"
      vars:
        dto_label_name: "gitlab-redis-secrets"
        dto_vault_get_path: "{{ eso_vault_integration_gitlab.kv_engine_path }}{{ gitlab_secret_redis_creds.vault_path }}"
        dto_vault_get_field: "{{ gitlab_redis_secret_key_password }}"
        dto_vault_get_res_fact_name: "{{ _local_gitlab_redis_vault_key }}"
        dto_vault_get_res_exists_fact_name: "{{ _local_gitlab_redis_vault_exists_key }}"
      tags: [redis]

    # redis_args embeds the password, so we generate it here before the put
    - name: "[gitlab-redis-secrets] Generate Redis password"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-generate-secret.yaml"
      vars:
        dto_label_name: "gitlab-redis-secrets"
        dto_generate_fact_name: "{{ _local_gitlab_redis_password_key }}"
      when: not lookup('vars', _local_gitlab_redis_vault_exists_key)
      tags: [redis]

    - name: "[gitlab-redis-secrets] Prepare redis_args value"
      set_fact:
        "{{ _local_gitlab_redis_args_key }}": "--save 1 1 --notify-keyspace-events KEA --requirepass {{ lookup('vars', _local_gitlab_redis_password_key) }}"
      when: not lookup('vars', _local_gitlab_redis_vault_exists_key)
      tags: [redis]

    - name: "[gitlab-redis-secrets] Store Redis credentials in Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-put.yaml"
      vars:
        dto_label_name: "gitlab-redis-secrets"
        dto_vault_put_path: "{{ eso_vault_integration_gitlab.kv_engine_path }}{{ gitlab_secret_redis_creds.vault_path }}"
        dto_vault_put_data: >-
          {{ {
               gitlab_redis_secret_key_password: lookup('vars', _local_gitlab_redis_password_key),
               gitlab_redis_secret_key_redis_args: lookup('vars', _local_gitlab_redis_args_key)
             } }}
      when: not lookup('vars', _local_gitlab_redis_vault_exists_key)
      tags: [redis]

    - name: "[gitlab-redis-secrets] Trigger ESO sync"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-force-sync.yaml"
      vars:
        dto_label_name: "gitlab-redis-secrets"
        dto_eso_sync_namespace: "{{ gitlab_namespace }}"
      tags: [redis]

    - name: "[gitlab-redis-secrets] Wait for secret"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-secret.yaml"
      vars:
        dto_label_name: "gitlab-redis-secrets"
        dto_wait_secret_name: "{{ gitlab_secret_redis_creds.body.target.name }}"
        dto_wait_secret_namespace: "{{ gitlab_namespace }}"
      tags: [redis]

    # ------------------
    # ---INSTALL
    # ------------------

    - name: "[gitlab-redis] Copy chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "gitlab-redis"
        dto_chart_name: "redis"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/gitlab/redis/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/gitlab/redis"
      tags: [redis]

    - name: "[gitlab-redis] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "gitlab-redis"
        dto_dir: "{{ remote_charts_dir }}/gitlab/redis"
        dto_filename: "values-override.yaml"
        dto_content: "{{ gitlab_redis_helm_values | to_nice_yaml }}"
      tags: [redis]

    - name: "[gitlab-redis] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "gitlab-redis"
        dto_release_name: "gitlab-redis"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/gitlab/redis"
        dto_values_file_path: "{{ remote_charts_dir }}/gitlab/redis/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/gitlab/redis-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/gitlab/redis-k"
        dto_patches_list: "{{ gitlab_redis_kustomize_patches }}"
        dto_target_namespace: "{{ gitlab_namespace }}"
      tags: [redis]

    - name: "[gitlab-redis] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "gitlab-redis"
        dto_helm_command: >
          helm upgrade --install gitlab-redis {{ remote_charts_dir }}/gitlab/redis-k
          --namespace {{ gitlab_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ gitlab_redis_helm_timeout }}
      tags: [redis]

    - name: "[gitlab-redis] Wait for rollout to be ready"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "gitlab-redis"
        dto_rollout_namespace: "{{ gitlab_namespace }}"
        dto_rollout_timeout: "{{ gitlab_redis_rollout_timeout }}"
        dto_rollout_resources_list:
          - statefulset.apps/gitlab-redis
      tags: [redis]

    # =========================================================================
    # STEP 4: VERIFY S3 CREDS IN VAULT (provisioned via SeaweedFS sync OR cloud S3 manual)
    # =========================================================================

    - name: "[gitlab-s3-validate] Check S3 creds in Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-get.yaml"
      vars:
        dto_label_name: "gitlab-s3-validate"
        dto_vault_get_path: "{{ eso_vault_integration_gitlab.kv_engine_path }}{{ gitlab_secret_object_store_connection_config.vault_path }}"
        dto_vault_get_field: "{{ gitlab_s3_secret_key_access_key }}"
        dto_vault_get_res_fact_name: "{{ _local_gitlab_s3_access_key_vault_key }}"
        dto_vault_get_res_exists_fact_name: "{{ _local_gitlab_s3_access_key_vault_exists_key }}"
      tags: [install]

    - name: "[gitlab-s3-validate] Assert S3 creds exist (fail-fast если отсутствуют)"
      assert:
        that:
          - lookup('vars', _local_gitlab_s3_access_key_vault_exists_key)
        fail_msg: |
          ERROR: GitLab S3 creds missing в Vault path '{{ eso_vault_integration_gitlab.kv_engine_path }}{{ gitlab_secret_object_store_connection_config.vault_path }}'.
          Друг оператор, нет данных для авторизации в S3-storage.

          Вариант A (SeaweedFS sync) — раскомментируй opt-in блоки в своём
          hosts-vars-override/seaweedfs-sync.yaml (см. hosts-vars/seaweedfs-sync.yaml
          SECTION 1 + SECTION 2 — Pre-built opt-in для GitLab + GitLab-Runner), затем:
            ansible-playbook -i hosts-vars/ -i hosts-vars-override/ \
              playbook-app/seaweedfs-install.yaml \
              --tags user-sync,identity-distribute,bucket-sync

          Вариант B (внешний S3 — cloud/etc.):
            vault kv put {{ eso_vault_integration_gitlab.kv_engine_path }}{{ gitlab_secret_object_store_connection_config.vault_path }} \
              {{ gitlab_s3_secret_key_username }}=<username> \
              {{ gitlab_s3_secret_key_access_key }}=<accessKey> \
              {{ gitlab_s3_secret_key_secret_key }}=<secretKey>

          Затем повтори ansible-playbook gitlab-install.yaml.
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-s3-validate] Trigger ESO sync (materialize K8s Secret)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-force-sync.yaml"
      vars:
        dto_label_name: "gitlab-s3-validate"
        dto_eso_sync_namespace: "{{ gitlab_namespace }}"
      tags: [install]

    - name: "[gitlab-s3-validate] Wait for K8s Secret eso-gitlab-object-store-connection-config materialized"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-secret.yaml"
      vars:
        dto_label_name: "gitlab-s3-validate"
        dto_wait_secret_name: "{{ gitlab_secret_object_store_connection_config.body.target.name }}"
        dto_wait_secret_namespace: "{{ gitlab_namespace }}"
      tags: [install]

    # =========================================================================
    # STEP 6: INSTALL GITLAB (Official Helm Chart)
    # =========================================================================

    - name: "[gitlab-install] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "gitlab-install"
        dto_dir: "{{ remote_charts_dir }}/gitlab/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ gitlab_helm_values | to_nice_yaml }}"
      tags: [install]

    - name: "[gitlab-install] Add Helm repository"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-add-helm-repo.yaml"
      vars:
        dto_label_name: "gitlab-install"
        dto_helm_is_oci: "{{ gitlab_helm_is_oci }}"
        dto_helm_url: "{{ gitlab_helm_url }}"
        dto_helm_chart_version: "{{ gitlab_helm_chart_version }}"
        dto_helm_repo_name: "{{ gitlab_helm_repo_name }}"
        dto_helm_chart_name: "{{ gitlab_helm_chart_name }}"
        dto_helm_chart_source_res_fact_name: "{{ _local_gitlab_helm_chart_source_key }}"
      tags: [install]

    - name: "[gitlab-install] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "gitlab-install"
        dto_helm_command: >
          helm upgrade --install gitlab {{ lookup('vars', _local_gitlab_helm_chart_source_key) }}
          --namespace {{ gitlab_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/gitlab/install/values-override.yaml
          --version {{ gitlab_helm_chart_version }}
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ gitlab_install_helm_timeout }}
      tags: [install]

    # Wait for every active GitLab workload to finish rollout.
    # Active set is derived from current gitlab_helm_values:
    #   - enabled subcharts → webservice, sidekiq, gitlab-shell,
    #     gitlab-exporter, gitlab-pages, toolbox
    #   - gitaly → StatefulSet
    #   - top-level registry subchart (registry.enabled: true)
    # Disabled subcharts are intentionally omitted (kas, mailroom, spamcheck,
    # praefect, geo-logcursor, gitlab-runner, nginx-ingress, minio).
    # Label pattern `app=<subchart-name>` is stable across upstream versions —
    # resource names with suffixes (webservice-default, sidekiq-*-v2) are not.
    - name: "[gitlab-install] Wait for workload rollout"
      command: >
        kubectl rollout status {{ item.kind }}
        -l {{ item.selector }}
        -n {{ gitlab_namespace }}
        --timeout={{ gitlab_rollout_timeout }}
      changed_when: false
      loop:
        - {kind: deployment, selector: "app=webservice"}
        - {kind: deployment, selector: "app=sidekiq"}
        - {kind: deployment, selector: "app=gitlab-shell"}
        - {kind: deployment, selector: "app=gitlab-exporter"}
        - {kind: deployment, selector: "app=gitlab-pages"}
        - {kind: deployment, selector: "app=registry"}
        - {kind: deployment, selector: "app=toolbox"}
        - {kind: statefulset, selector: "app=gitaly"}
      loop_control:
        label: "{{ item.kind }} l={{ item.selector }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-install] Delete initial root password secret (root managed via config-root)"
      command: >
        kubectl delete secret gitlab-gitlab-initial-root-password
        --namespace {{ gitlab_namespace }} --ignore-not-found=true
      register: _local_gitlab_initial_secret_delete
      changed_when: "'deleted' in _local_gitlab_initial_secret_delete.stdout"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    # =========================================================================
    # STEP 7: INSTALL POST CHART (Ingress, HAProxy SSH)
    # =========================================================================

    - name: "[gitlab-post] Copy chart to remote"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "gitlab-post"
        dto_chart_name: "post"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/gitlab/post/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/gitlab/post"
      tags: [post]

    - name: "[gitlab-post] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "gitlab-post"
        dto_dir: "{{ remote_charts_dir }}/gitlab/post"
        dto_filename: "values-override.yaml"
        dto_content: "{{ gitlab_post_helm_values | to_nice_yaml }}"
      tags: [post]

    - name: "[gitlab-post] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "gitlab-post"
        dto_release_name: "gitlab-post"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/gitlab/post"
        dto_values_file_path: "{{ remote_charts_dir }}/gitlab/post/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/gitlab/post-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/gitlab/post-k"
        dto_patches_list: "{{ gitlab_post_kustomize_patches }}"
        dto_target_namespace: "{{ gitlab_namespace }}"
      tags: [post]

    - name: "[gitlab-post] Install via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "gitlab-post"
        dto_helm_command: >
          helm upgrade --install gitlab-post {{ remote_charts_dir }}/gitlab/post-k
          --namespace {{ gitlab_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ gitlab_post_helm_timeout }}
      tags: [post]

    # =========================================================================
    # STEP 7.5: CONFIGURE ROOT PASSWORD (Vault = source of truth)
    # =========================================================================

    - name: "[gitlab-config-root] Reconcile root password against Vault"
      include_tasks: "{{ project_root }}/playbook-app/tasks/gitlab/tasks-gitlab-config-root.yaml"
      tags: [config-root]

    # =========================================================================
    # STEP 8: VERIFICATION
    # =========================================================================

    - name: "[gitlab-verify] Verify Helm releases"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-helm.yaml"
      vars:
        dto_helm_namespace: "{{ gitlab_namespace }}"
        dto_label_name: "gitlab-verify"
      tags: [always]

    - name: "[gitlab-verify] Show pods in {{ gitlab_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "gitlab-verify"
        dto_pods_namespace: "{{ gitlab_namespace }}"
      tags: [always]

    - name: "[gitlab-verify] Show NetworkPolicies in {{ gitlab_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-network-policy.yaml"
      vars:
        dto_label_name: "gitlab-verify"
        dto_np_namespace: "{{ gitlab_namespace }}"
      tags: [always]

    - name: "[gitlab-verify] Show access info"
      debug:
        msg:
          - "=============================================="
          - "GITLAB INSTALLATION COMPLETE"
          - "=============================================="
          - "GitLab Web UI: https://{{ gitlab_ui_domain }}"
          - "GitLab Registry: https://{{ gitlab_registry_domain }}"
          - "GitLab Pages: https://{{ gitlab_pages_domain }}"
          - "GitLab SSH: {{ gitlab_ui_domain }}:{{ gitlab_ssh_port_external }}"
          - ""
          - "Credentials stored in Vault:"
          - "  PostgreSQL: {{ eso_vault_integration_gitlab.kv_engine_path }}{{ gitlab_secret_postgresql_creds.vault_path }}"
          - "  Redis: {{ eso_vault_integration_gitlab.kv_engine_path }}{{ gitlab_secret_redis_creds.vault_path }}"
          - "  S3 storage: {{ eso_vault_integration_gitlab.kv_engine_path }}{{ gitlab_secret_object_store_connection_config.vault_path }}"
          - "  Root: {{ eso_vault_integration_gitlab.kv_engine_path }}{{ gitlab_root_creds.vaultPath }}"
          - ""
          - "GitLab Runner: Installed but NOT registered."
          - "  Register manually via UI or CLI."
          - ""
          - "Root password: managed via --tags config-root (Vault = source of truth)."
          - "=============================================="
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-verify] Installation complete"
      debug:
        msg: "gitlab-pre + gitlab + gitlab-post: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
