# =============================================================================
# Install GitLab (Production Helm Chart)
# Steps:
#   1. gitlab/pre: Vault initial secrets + ESO resources (NetworkPolicies, ServiceAccount, SecretStore, ExternalSecrets)
#   2. gitlab: PostgreSQL + Redis + MinIO + MinIO setup + GitLab (official chart)
#   3. gitlab/post: Ingress (Traefik) + HAProxy SSH
#
# Usage (tags):
#   ansible-playbook gitlab-install.yaml              # full install
#   ansible-playbook gitlab-install.yaml --tags pre   # only pre (Vault secrets + ESO resources)
#   ansible-playbook gitlab-install.yaml --tags install
#   ansible-playbook gitlab-install.yaml --tags post  # only post (Ingress + HAProxy SSH)
#
# Prerequisites:
#   - Vault must be installed and unsealed
#   - Vault policies and roles must be synced (vault-policy-sync.yaml)
#   - External Secrets Operator must be installed
#
# NOTE: Root password and PAT management → gitlab-configure.yaml
# =============================================================================

---
- name: Install GitLab (Production Helm)
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[gitlab-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        label_name: "gitlab-pre-check"
      tags: [always]

    - name: "[gitlab-pre-check] Forbid kube-system namespace"
      include_tasks: tasks/tasks-forbid-kube-system.yaml
      vars:
        label_name: "gitlab-pre-check"
        namespace_value: "{{ gitlab_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations and resolve GitLab config
    # =========================================================================

    - name: "[gitlab-install-init] Merge ESO integrations"
      include_tasks: tasks/tasks-eso-merge.yaml
      tags: [always]

    - name: "[gitlab-install-init] Find secret names and vault paths by type"
      set_fact:
        # Secret names
        secret_postgresql: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'postgresql') | first).target_secret_name }}"
        secret_redis: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'redis') | first).target_secret_name }}"
        secret_minio_root: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'minio_root') | first).target_secret_name }}"
        secret_minio_registry: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'minio_registry') | first).target_secret_name }}"
        secret_gitlab_registry_minio_connection: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'gitlab_registry_minio_connection') | first).target_secret_name }}"
        secret_gitlab_minio_connection: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'gitlab_minio_connection') | first).target_secret_name }}"
        secret_gitlab_root: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'gitlab_root') | first).target_secret_name }}"
        # Vault paths
        vault_path_postgresql: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'postgresql') | first).vault_path }}"
        vault_path_redis: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'redis') | first).vault_path }}"
        vault_path_minio_root: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'minio_root') | first).vault_path }}"
        vault_path_minio_registry: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'minio_registry') | first).vault_path }}"
        vault_path_gitlab_root: "{{ (eso_vault_integration_gitlab_secrets_merged | selectattr('type', 'equalto', 'gitlab_root') | first).vault_path }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    # =========================================================================
    # INIT: Resolve ClusterIssuer + ACME solver pod labels
    # =========================================================================

    - name: "[gitlab-install-init] Resolve GitLab ClusterIssuer"
      set_fact:
        _gitlab_ui_issuer: >-
          {{ cert_manager_cluster_issuers
             | selectattr('name', 'equalto', gitlab_cluster_issuer_name)
             | list | first | default(none) }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-install-init] Validate GitLab ClusterIssuer exists"
      assert:
        that: _gitlab_ui_issuer is not none
        fail_msg: >-
          gitlab_cluster_issuer_name='{{ gitlab_cluster_issuer_name }}'
          not found in cert_manager_cluster_issuers
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-install-init] Resolve ACME solver by ingressClass"
      set_fact:
        _gitlab_ui_solver: >-
          {{ _gitlab_ui_issuer.solvers
             | selectattr('ingressClass', 'equalto', gitlab_ingress_class_name)
             | list | first | default(none) }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-install-init] Validate ACME solver exists"
      assert:
        that: _gitlab_ui_solver is not none
        fail_msg: >-
          No solver with ingressClass='{{ gitlab_ingress_class_name }}'
          found in ClusterIssuer '{{ gitlab_cluster_issuer_name }}'
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-install-init] Set ACME solver pod labels"
      set_fact:
        gitlab_acme_solver_pod_labels: "{{ _gitlab_ui_solver.podLabels }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    # =========================================================================
    # STEP 1: INSTALL PRE (ESO Resources, NetworkPolicies)
    # =========================================================================

    - name: "[gitlab-pre] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "gitlab-pre"
        chart_name: "pre"
        chart_local_src: "{{ inventory_dir }}/playbook-app/charts/gitlab/pre/"
        chart_remote_dest: "{{ remote_charts_dir }}/gitlab/pre"
      tags: [pre]

    - name: "[gitlab-pre] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/gitlab/pre/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ gitlab_namespace }}
          externalSecrets:
            namespace: {{ external_secrets_namespace }}
          traefik:
            namespace: {{ traefik_namespace }}
            instanceName: traefik-{{ traefik_namespace }}
          haproxy:
            namespace: {{ haproxy_namespace }}
          gitlab:
            releaseName: gitlab
            sshPortExternal: {{ gitlab_ssh_port_external }}
            sshPortInternal: {{ gitlab_ssh_port_internal }}
            vpnOnlyEnabled: {{ gitlab_vpn_only_enabled }}
            vpnIps: {{ vpn_ips | to_json }}
          gitlabEso:
            vaultServerUrl: {{ vault_internal_url }}
            saName: {{ eso_vault_integration_gitlab.sa_name }}
            roleName: {{ eso_vault_integration_gitlab.role_name }}
            secretStoreName: {{ eso_vault_integration_gitlab.secret_store_name }}
            kvEnginePath: {{ eso_vault_integration_gitlab.kv_engine_path }}
            isNeedEso: {{ eso_vault_integration_gitlab.is_need_eso | default(true) }}
            secrets: {{ eso_vault_integration_gitlab_secrets_merged | to_json }}
          esoResourcesConfig:
            secretStoreRefreshInterval: {{ eso_resources_config.secret_store_refresh_interval }}
            externalSecretRefreshInterval: {{ eso_resources_config.external_secret_refresh_interval }}
            externalSecretRefreshPolicy: {{ eso_resources_config.external_secret_refresh_policy }}
          minio:
            s3Endpoint: {{ gitlab_minio_s3_endpoint }}
            s3Region: {{ gitlab_minio_s3_region }}
            s3PathStyle: {{ gitlab_minio_s3_path_style }}
          acmeSolverLabels: {{ gitlab_acme_solver_pod_labels | to_json }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [pre]

    - name: "[gitlab-pre] Install via Helm"
      command: >
        helm upgrade --install gitlab-pre {{ remote_charts_dir }}/gitlab/pre
        --namespace {{ gitlab_namespace }}
        --create-namespace
        --values {{ remote_charts_dir }}/gitlab/pre/values-override.yaml
        --cleanup-on-fail
        --atomic
        --wait
        --timeout {{ gitlab_pre_helm_timeout }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [pre]

    # =========================================================================
    # STEP 2: GENERATE AND STORE INITIAL SECRETS IN VAULT
    # =========================================================================

    # ----- PostgreSQL credentials -----
    - name: "[gitlab-vault-secrets] Check if PostgreSQL secret exists"
      shell: |
        kubectl exec -n {{ vault_namespace }} vault-0 -- \
          vault kv get -format=json \
          {{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_postgresql }} 2>/dev/null
      register: postgresql_secret_check
      failed_when: false
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-vault-secrets] Generate PostgreSQL password"
      set_fact:
        generated_postgresql_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
      when: postgresql_secret_check.rc != 0
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-vault-secrets] Store PostgreSQL credentials in Vault"
      command: >
        kubectl exec -n {{ vault_namespace }} vault-0 --
        vault kv put {{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_postgresql }}
        username=gitlab
        password={{ generated_postgresql_password }}
      when: postgresql_secret_check.rc != 0
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    # ----- Redis credentials -----
    - name: "[gitlab-vault-secrets] Check if Redis secret exists"
      shell: |
        kubectl exec -n {{ vault_namespace }} vault-0 -- \
          vault kv get -format=json \
          {{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_redis }} 2>/dev/null
      register: redis_secret_check
      failed_when: false
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-vault-secrets] Generate Redis password"
      set_fact:
        generated_redis_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
      when: redis_secret_check.rc != 0
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-vault-secrets] Store Redis credentials in Vault"
      command: >
        kubectl exec -n {{ vault_namespace }} vault-0 --
        vault kv put {{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_redis }}
        password={{ generated_redis_password }}
        redis_args="--save 1 1 --notify-keyspace-events KEA --requirepass {{ generated_redis_password }}"
      when: redis_secret_check.rc != 0
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    # ----- MinIO root credentials -----
    - name: "[gitlab-vault-secrets] Check if MinIO root secret exists"
      shell: |
        kubectl exec -n {{ vault_namespace }} vault-0 -- \
          vault kv get -format=json \
          {{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_minio_root }} 2>/dev/null
      register: minio_root_secret_check
      failed_when: false
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-vault-secrets] Generate MinIO root password"
      set_fact:
        generated_minio_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
      when: minio_root_secret_check.rc != 0
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-vault-secrets] Store MinIO root credentials in Vault"
      command: >
        kubectl exec -n {{ vault_namespace }} vault-0 --
        vault kv put {{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_minio_root }}
        username={{ gitlab_minio_root_user }}
        password={{ generated_minio_password }}
      when: minio_root_secret_check.rc != 0
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    # =========================================================================
    # STEP 3: WAIT FOR INITIAL SECRETS TO SYNC
    # =========================================================================

    - name: "[gitlab-wait-eso] Force sync initial secrets"
      include_tasks: tasks/tasks-eso-force-sync.yaml
      vars:
        label_name: "gitlab-wait-eso"
        eso_sync_namespace: "{{ gitlab_namespace }}"
        eso_sync_es_name: "{{ item }}"
      loop: >-
        {{
          eso_vault_integration_gitlab_secrets_merged
          | selectattr('type', 'in', ['postgresql', 'redis', 'minio_root'])
          | map(attribute='external_secret_name')
          | list
        }}
      tags: [install]

    - name: "[gitlab-wait-eso] Wait for PostgreSQL secret"
      command: kubectl get secret {{ secret_postgresql }} -n {{ gitlab_namespace }}
      register: postgresql_secret_wait
      until: postgresql_secret_wait.rc == 0
      retries: 30
      delay: 5
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-wait-eso] Wait for Redis secret"
      command: kubectl get secret {{ secret_redis }} -n {{ gitlab_namespace }}
      register: redis_secret_wait
      until: redis_secret_wait.rc == 0
      retries: 30
      delay: 5
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-wait-eso] Wait for MinIO root secret"
      command: kubectl get secret {{ secret_minio_root }} -n {{ gitlab_namespace }}
      register: minio_root_secret_wait
      until: minio_root_secret_wait.rc == 0
      retries: 30
      delay: 5
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    # =========================================================================
    # STEP 4: INSTALL POSTGRESQL
    # =========================================================================

    - name: "[gitlab-postgresql] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "gitlab-postgresql"
        chart_name: "postgresql"
        chart_local_src: "{{ inventory_dir }}/playbook-app/charts/gitlab/postgresql/"
        chart_remote_dest: "{{ remote_charts_dir }}/gitlab/postgresql"
      tags: [install]

    - name: "[gitlab-postgresql] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/gitlab/postgresql/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ gitlab_namespace }}
          image: {{ gitlab_postgresql_image }}
          storageClass: {{ gitlab_postgresql_storage_class }}
          storageSize: {{ gitlab_postgresql_storage_size }}
          credentialsSecretName: {{ secret_postgresql }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-postgresql] Install via Helm"
      command: >
        helm upgrade --install gitlab-postgresql {{ remote_charts_dir }}/gitlab/postgresql
        --namespace {{ gitlab_namespace }}
        --values {{ remote_charts_dir }}/gitlab/postgresql/values-override.yaml
        --cleanup-on-fail
        --atomic
        --wait
        --timeout {{ gitlab_storage_helm_timeout }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-postgresql] Wait for rollout to be ready"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "gitlab-postgresql"
        rollout_namespace: "{{ gitlab_namespace }}"
        rollout_timeout: "{{ gitlab_storage_rollout_timeout }}"
        rollout_resources:
          - deployment/gitlab-postgresql
      tags: [install]

    # =========================================================================
    # STEP 5: INSTALL REDIS
    # =========================================================================

    - name: "[gitlab-redis] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "gitlab-redis"
        chart_name: "redis"
        chart_local_src: "{{ inventory_dir }}/playbook-app/charts/gitlab/redis/"
        chart_remote_dest: "{{ remote_charts_dir }}/gitlab/redis"
      tags: [install]

    - name: "[gitlab-redis] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/gitlab/redis/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ gitlab_namespace }}
          image: {{ gitlab_redis_image }}
          credentialsSecretName: {{ secret_redis }}
          storageClass: {{ gitlab_redis_storage_class }}
          storageSize: {{ gitlab_redis_storage_size }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-redis] Install via Helm"
      command: >
        helm upgrade --install gitlab-redis {{ remote_charts_dir }}/gitlab/redis
        --namespace {{ gitlab_namespace }}
        --values {{ remote_charts_dir }}/gitlab/redis/values-override.yaml
        --cleanup-on-fail
        --atomic
        --wait
        --timeout {{ gitlab_storage_helm_timeout }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-redis] Wait for rollout to be ready"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "gitlab-redis"
        rollout_namespace: "{{ gitlab_namespace }}"
        rollout_timeout: "{{ gitlab_storage_rollout_timeout }}"
        rollout_resources:
          - deployment/gitlab-redis
      tags: [install]

    # =========================================================================
    # STEP 6: INSTALL MINIO
    # =========================================================================

    - name: "[gitlab-minio] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "gitlab-minio"
        chart_name: "minio"
        chart_local_src: "{{ inventory_dir }}/playbook-app/charts/gitlab/minio/"
        chart_remote_dest: "{{ remote_charts_dir }}/gitlab/minio"
      tags: [install]

    - name: "[gitlab-minio] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/gitlab/minio/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ gitlab_namespace }}
          image: {{ gitlab_minio_image }}
          storageClass: {{ gitlab_minio_storage_class }}
          storageSize: {{ gitlab_minio_storage_size }}
          rootSecretName: {{ secret_minio_root }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-minio] Install via Helm"
      command: >
        helm upgrade --install gitlab-minio {{ remote_charts_dir }}/gitlab/minio
        --namespace {{ gitlab_namespace }}
        --values {{ remote_charts_dir }}/gitlab/minio/values-override.yaml
        --cleanup-on-fail
        --atomic
        --wait
        --timeout {{ gitlab_storage_helm_timeout }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-minio] Wait for rollout to be ready"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "gitlab-minio"
        rollout_namespace: "{{ gitlab_namespace }}"
        rollout_timeout: "{{ gitlab_storage_rollout_timeout }}"
        rollout_resources:
          - deployment/gitlab-minio
      tags: [install]

    # =========================================================================
    # STEP 7: MINIO SETUP (Buckets and Access Keys)
    # =========================================================================

    - name: "[gitlab-minio-setup] Get MinIO pod name"
      command: >
        kubectl get pods -n {{ gitlab_namespace }}
        -l app.kubernetes.io/name=gitlab-minio
        -o jsonpath='{.items[0].metadata.name}'
      register: minio_pod_name
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-minio-setup] Get MinIO root credentials from secret"
      shell: |
        kubectl get secret {{ secret_minio_root }} -n {{ gitlab_namespace }} \
          -o jsonpath='{.data.username}' | base64 -d
      register: minio_root_user_from_secret
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-minio-setup] Get MinIO root password from secret"
      shell: |
        kubectl get secret {{ secret_minio_root }} -n {{ gitlab_namespace }} \
          -o jsonpath='{.data.password}' | base64 -d
      register: minio_root_password_from_secret
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-minio-setup] Configure mc alias"
      command: >
        kubectl exec -n {{ gitlab_namespace }} {{ minio_pod_name.stdout }} --
        mc alias set myminio http://localhost:9000
        '{{ minio_root_user_from_secret.stdout }}'
        '{{ minio_root_password_from_secret.stdout }}'
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    # Create buckets
    - name: "[gitlab-minio-setup] Create buckets"
      command: >
        kubectl exec -n {{ gitlab_namespace }} {{ minio_pod_name.stdout }} --
        mc mb myminio/{{ item }} --ignore-existing
      loop:
        - registry
        - gitlab-artifacts
        - gitlab-uploads
        - gitlab-packages
        - gitlab-backups
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    # Create access keys for registry
    - name: "[gitlab-minio-setup] Check if registry access_key exists in Vault"
      shell: |
        kubectl exec -n {{ vault_namespace }} vault-0 -- \
          vault kv get -format=json \
          {{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_minio_registry }} 2>/dev/null \
          | jq -r '.data.data.access_key // empty'
      register: registry_access_key_check
      failed_when: false
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-minio-setup] Create access key for registry"
      command: >
        kubectl exec -n {{ gitlab_namespace }} {{ minio_pod_name.stdout }} --
        mc admin accesskey create myminio {{ minio_root_user_from_secret.stdout }}
        --name 'registry-key' --json
      register: registry_accesskey_result
      when: registry_access_key_check.stdout == ""
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab-minio-setup] Store registry access key in Vault"
      command: >
        kubectl exec -n {{ vault_namespace }} vault-0 --
        vault kv put {{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_minio_registry }}
        access_key={{ (registry_accesskey_result.stdout | from_json).accessKey }}
        secret_key={{ (registry_accesskey_result.stdout | from_json).secretKey }}
        bucket_name=registry
      when: registry_access_key_check.stdout == ""
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    # =========================================================================
    # STEP 8: WAIT FOR MINIO ACCESS KEYS TO SYNC
    # =========================================================================

    - name: "[gitlab-wait-eso] Force sync MinIO access key secrets"
      include_tasks: tasks/tasks-eso-force-sync.yaml
      vars:
        label_name: "gitlab-wait-eso"
        eso_sync_namespace: "{{ gitlab_namespace }}"
        eso_sync_es_name: "{{ item }}"
      loop: >-
        {{
          eso_vault_integration_gitlab_secrets_merged
          | selectattr('type', 'in', ['minio_registry', 'gitlab_registry_minio_connection', 'gitlab_minio_connection'])
          | map(attribute='external_secret_name')
          | list
        }}
      tags: [install]

    - name: "[gitlab-wait-eso] Wait for registry secret with access_key"
      shell: |
        kubectl get secret {{ secret_minio_registry }} -n {{ gitlab_namespace }} \
          -o jsonpath='{.data.access_key}' | base64 -d
      register: registry_access_key_sync_check
      until: registry_access_key_sync_check.stdout != ""
      retries: 30
      delay: 5
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    # =========================================================================
    # STEP 9: INSTALL GITLAB (Official Helm Chart)
    # =========================================================================

    - name: "[gitlab] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/gitlab/gitlab-values-override.yaml"
        mode: "0644"
        content: |
          global:
            edition: ce
            hosts:
              domain: {{ gitlab_base_domain }}
              https: {{ gitlab_external_https | ternary('true', 'false') }}
              gitlab:
                name: {{ gitlab_ui_domain }}
                https: {{ gitlab_external_https | ternary('true', 'false') }}
              registry:
                name: {{ gitlab_registry_domain }}
                https: {{ gitlab_external_https | ternary('true', 'false') }}
              pages:
                name: {{ gitlab_pages_domain }}
                https: {{ gitlab_external_https | ternary('true', 'false') }}
            ingress:
              enabled: false
              configureCertmanager: false
            shell:
              port: {{ gitlab_ssh_port_external }}
            psql:
              host: gitlab-postgresql
              port: 5432
              database: gitlabhq_production
              username: gitlab
              password:
                useSecret: true
                secret: {{ secret_postgresql }}
                key: password
            redis:
              host: gitlab-redis
              port: 6379
              auth:
                enabled: true
                secret: {{ secret_redis }}
                key: password
            minio:
              enabled: false
            registry:
              bucket: registry
            kas:
              enabled: false
            pages:
              enabled: true
            appConfig:
              lfs:
                enabled: false
              object_store:
                enabled: true
                proxy_download: true
                connection:
                  secret: {{ secret_gitlab_minio_connection }}
                  key: connection
              artifacts:
                enabled: true
                bucket: gitlab-artifacts
              uploads:
                enabled: true
                bucket: gitlab-uploads
              packages:
                enabled: true
                bucket: gitlab-packages
              backups:
                bucket: gitlab-backups
            smtp:
              enabled: false
          nginx-ingress:
            enabled: false
          certmanager:
            install: false
          prometheus:
            install: false
          postgresql:
            install: false
          redis:
            install: false
          registry:
            enabled: true
            tolerations: {{ gitlab_registry_tolerations | to_json }}
            nodeSelector: {{ gitlab_registry_node_selector | to_json }}
            resources: {{ gitlab_registry_resources | to_json }}
            hpa:
              minReplicas: 1
              maxReplicas: 1
            maxUnavailable: 1
            deployment:
              strategy:
                type: Recreate
            storage:
              secret: {{ secret_gitlab_registry_minio_connection }}
              key: config
              redirect:
                disable: true
          gitlab:
            webservice:
              tolerations: {{ gitlab_webservice_tolerations | to_json }}
              nodeSelector: {{ gitlab_webservice_node_selector | to_json }}
              minReplicas: 1
              maxReplicas: 1
              maxUnavailable: 1
              deployment:
                strategy:
                  type: Recreate
              workerProcesses: 2
              workerTimeout: 180
              resources: {{ gitlab_webservice_resources | to_json }}
            sidekiq:
              tolerations: {{ gitlab_sidekiq_tolerations | to_json }}
              nodeSelector: {{ gitlab_sidekiq_node_selector | to_json }}
              minReplicas: 1
              maxReplicas: 1
              maxUnavailable: 1
              deployment:
                strategy:
                  type: Recreate
              concurrency: 10
              resources: {{ gitlab_sidekiq_resources | to_json }}
            gitlab-shell:
              tolerations: {{ gitlab_gitlab_shell_tolerations | to_json }}
              nodeSelector: {{ gitlab_gitlab_shell_node_selector | to_json }}
              resources: {{ gitlab_gitlab_shell_resources | to_json }}
              minReplicas: 1
              maxReplicas: 1
              maxUnavailable: 1
              deployment:
                strategy:
                  type: Recreate
            gitaly:
              tolerations: {{ gitlab_gitaly_tolerations | to_json }}
              nodeSelector: {{ gitlab_gitaly_node_selector | to_json }}
              resources: {{ gitlab_gitaly_resources | to_json }}
              persistence:
                size: {{ gitlab_gitaly_storage_size }}
                storageClass: {{ gitlab_gitaly_storage_class }}
            gitlab-exporter:
              tolerations: {{ gitlab_gitlab_exporter_tolerations | to_json }}
              nodeSelector: {{ gitlab_gitlab_exporter_node_selector | to_json }}
              resources: {{ gitlab_gitlab_exporter_resources | to_json }}
              deployment:
                strategy:
                  type: Recreate
            gitlab-pages:
              tolerations: {{ gitlab_pages_tolerations | to_json }}
              nodeSelector: {{ gitlab_pages_node_selector | to_json }}
              resources: {{ gitlab_pages_resources | to_json }}
              hpa:
                minReplicas: 1
                maxReplicas: 1
              deployment:
                strategy:
                  type: Recreate
            toolbox:
              enabled: true
              tolerations: {{ gitlab_toolbox_tolerations | to_json }}
              nodeSelector: {{ gitlab_toolbox_node_selector | to_json }}
              resources: {{ gitlab_toolbox_resources | to_json }}
              deployment:
                strategy:
                  type: Recreate
            migrations:
              enabled: true
              tolerations: {{ gitlab_migrations_tolerations | to_json }}
              nodeSelector: {{ gitlab_migrations_node_selector | to_json }}
              resources: {{ gitlab_migrations_resources | to_json }}
          gitlab-runner:
            install: false
          upgradeCheck:
            enabled: true
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab] Add Helm repository"
      include_tasks: tasks/tasks-add-helm-repo.yaml
      vars:
        label_name: "gitlab"
        helm_repo_name: "gitlab"
        helm_repo_url: "https://charts.gitlab.io"
      tags: [install]

    - name: "[gitlab] Install via Helm"
      command: >
        helm upgrade --install gitlab gitlab/gitlab
        --namespace {{ gitlab_namespace }}
        --values {{ remote_charts_dir }}/gitlab/gitlab-values-override.yaml
        --version {{ gitlab_chart_version }}
        --cleanup-on-fail
        --atomic
        --wait
        --timeout {{ gitlab_helm_timeout }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[gitlab] Wait for webservice deployment to be ready"
      command: >
        kubectl rollout status deployment -l app=webservice
        -n {{ gitlab_namespace }}
        --timeout={{ gitlab_rollout_timeout }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    # =========================================================================
    # STEP 10: INSTALL POST CHART (Ingress, HAProxy SSH)
    # =========================================================================

    - name: "[gitlab-post] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "gitlab-post"
        chart_name: "post"
        chart_local_src: "{{ inventory_dir }}/playbook-app/charts/gitlab/post/"
        chart_remote_dest: "{{ remote_charts_dir }}/gitlab/post"
      tags: [post]

    - name: "[gitlab-post] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/gitlab/post/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ gitlab_namespace }}
          sshPortExternal: {{ gitlab_ssh_port_external }}
          gitlab:
            ingressClass: {{ gitlab_ingress_class_name }}
            entryPoints:
              web: {{ traefik_web_entrypoint }}
              websecure: {{ traefik_websecure_entrypoint }}
            domain: {{ gitlab_ui_domain }}
            registryDomain: {{ gitlab_registry_domain }}
            pagesDomain: {{ gitlab_pages_domain }}
            clusterIssuer: {{ gitlab_cluster_issuer_name }}
            uiSecretName: {{ gitlab_ui_https_secret_name }}
            registrySecretName: {{ gitlab_registry_https_secret_name }}
            pagesSecretName: {{ gitlab_pages_https_secret_name }}
            vpnOnlyEnabled: {{ gitlab_vpn_only_enabled }}
            httpEnable: {{ gitlab_ingress_http_enable }}
            httpsEnable: {{ gitlab_ingress_https_enable }}
          traefik:
            namespace: {{ traefik_namespace }}
          minio:
            ingressClass: {{ gitlab_ingress_class_name }}
            entryPoints:
              web: {{ traefik_web_entrypoint }}
              websecure: {{ traefik_websecure_entrypoint }}
            consoleDomain: {{ gitlab_minio_console_domain }}
            apiDomain: {{ gitlab_minio_api_domain }}
            clusterIssuer: {{ gitlab_cluster_issuer_name }}
            consoleSecretName: {{ gitlab_minio_console_https_secret_name }}
            apiSecretName: {{ gitlab_minio_api_https_secret_name }}
            vpnOnlyEnabled: {{ gitlab_vpn_only_enabled }}
            httpEnable: {{ gitlab_minio_ingress_http_enable }}
            httpsEnable: {{ gitlab_minio_ingress_https_enable }}
          haproxy:
            namespace: {{ haproxy_namespace }}
            ingressClass: {{ haproxy_ingress_class }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [post]

    - name: "[gitlab-post] Install via Helm"
      command: >
        helm upgrade --install gitlab-post {{ remote_charts_dir }}/gitlab/post
        --namespace {{ gitlab_namespace }}
        --values {{ remote_charts_dir }}/gitlab/post/values-override.yaml
        --cleanup-on-fail
        --atomic
        --wait
        --timeout {{ gitlab_helm_timeout }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [post]

    # =========================================================================
    # STEP 12: VERIFICATION
    # =========================================================================

    - name: "[gitlab-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        helm_namespace: "{{ gitlab_namespace }}"
        label_name: "gitlab-verify"
      tags: [always]

    - name: "[gitlab-verify] Get gitlab pods status"
      command: kubectl get pods -n {{ gitlab_namespace }} -o wide
      register: gitlab_pods
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-verify] Print gitlab pods status"
      debug:
        msg: "{{ gitlab_pods.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-verify] Show access info"
      debug:
        msg:
          - "=============================================="
          - "GITLAB INSTALLATION COMPLETE"
          - "=============================================="
          - "GitLab Web UI: https://{{ gitlab_ui_domain }}"
          - "GitLab Registry: https://{{ gitlab_registry_domain }}"
          - "GitLab Pages: https://{{ gitlab_pages_domain }}"
          - "GitLab SSH: {{ gitlab_ui_domain }}:{{ gitlab_ssh_port_external }}"
          - ""
          - "Credentials stored in Vault:"
          - "  PostgreSQL: {{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_postgresql }}"
          - "  Redis: {{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_redis }}"
          - "  MinIO root: {{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_minio_root }}"
          - "  MinIO registry: {{ eso_vault_integration_gitlab.kv_engine_path }}{{ vault_path_minio_registry }}"
          - ""
          - "GitLab Runner: Installed but NOT registered."
          - "  Register manually via UI or CLI."
          - ""
          - "Run gitlab-configure.yaml to set root password + PAT in Vault."
          - "=============================================="
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[gitlab-verify] Installation complete"
      debug:
        msg: "gitlab-pre + gitlab + gitlab-post: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
