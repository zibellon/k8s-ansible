# =============================================================================
# Install Grafana via local Helm charts
# Steps:
#   1. pre:     NetworkPolicies + ESO (ServiceAccount, SecretStore, ExternalSecret)
#   2. vault:   Generate and store admin credentials in Vault
#   3. install: PVC + Deployment + Service
#   4. post:    Ingress + Certificate
#
# Usage (tags):
#   ansible-playbook mon-grafana-install.yaml              # full install
#   ansible-playbook mon-grafana-install.yaml --tags pre   # only NetworkPolicies + ESO
#   ansible-playbook mon-grafana-install.yaml --tags install
#   ansible-playbook mon-grafana-install.yaml --tags post  # only Ingress
# =============================================================================

- name: Install Grafana via local Helm chart
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[grafana-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        label_name: "grafana-pre-check"
      tags: [always]

    - name: "[grafana-pre-check] Forbid kube-system namespace"
      include_tasks: tasks/tasks-forbid-kube-system.yaml
      vars:
        label_name: "grafana-pre-check"
        dto_target_namespace: "{{ grafana_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations + resolve ACME solver labels
    # =========================================================================

    - name: "[grafana-init] Merge ESO integrations"
      include_tasks: tasks/tasks-eso-merge.yaml
      tags: [always]

    - name: "[grafana-init] Resolve ACME solver"
      include_tasks: tasks/tasks-resolve-acme-solver.yaml
      vars:
        label_name: grafana-init
        dto_cluster_issuer_name: "{{ grafana_cluster_issuer }}"
        dto_ingress_class_name: "{{ grafana_ingress_class }}"
        dto_acme_cluster_issuer_result_var: "grafana_acme_cluster_issuer"
        dto_acme_solver_result_var: "grafana_acme_solver"
        dto_acme_pod_labels_result_var: "grafana_acme_solver_pod_labels"
      tags: [always]

    # =========================================================================
    # STEP 1: PRE (NetworkPolicies + ESO)
    # =========================================================================

    - name: "[grafana-pre] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "grafana-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/mon-grafana/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-grafana/pre"
      tags: [pre]

    - name: "[grafana-pre] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "grafana-pre"
        dto_dir: "{{ remote_charts_dir }}/mon-grafana/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ grafana_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[grafana-pre] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "grafana-pre"
        dto_helm_command: >
          helm upgrade --install grafana-pre {{ remote_charts_dir }}/mon-grafana/pre
          --namespace {{ grafana_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/mon-grafana/pre/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ grafana_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: GENERATE AND STORE ADMIN CREDENTIALS IN VAULT
    # =========================================================================

    - name: "[grafana-vault-secrets] Resolve admin secret paths"
      set_fact:
        vault_path_grafana_admin: >-
          {{ (eso_vault_integration_grafana_secrets_merged | selectattr('type', 'equalto', 'grafana_admin') | first).vault_path }}
        grafana_admin_secret_name: >-
          {{ (eso_vault_integration_grafana_secrets_merged | selectattr('type', 'equalto', 'grafana_admin') | first).target_secret_name }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[grafana-vault-secrets] Get admin credentials from Vault"
      include_tasks: tasks/tasks-vault-get.yaml
      vars:
        label_name: "grafana-vault-secrets"
        dto_vault_get_path: "{{ eso_vault_integration_grafana.kv_engine_path }}{{ vault_path_grafana_admin }}"
        dto_vault_get_field: password
        dto_vault_get_res_fact_name: "grafana_admin_vault"
      tags: [install]

    - name: "[grafana-vault-secrets] Generate admin password"
      include_tasks: tasks/tasks-generate-secret.yaml
      vars:
        label_name: "grafana-vault-secrets"
        dto_generate_fact_name: "_grafana_admin_password_generated"
      when: not grafana_admin_vault_exists
      tags: [install]

    - name: "[grafana-vault-secrets] Store admin credentials in Vault"
      include_tasks: tasks/tasks-vault-put.yaml
      vars:
        label_name: "grafana-vault-secrets"
        dto_vault_put_path: "{{ eso_vault_integration_grafana.kv_engine_path }}{{ vault_path_grafana_admin }}"
        dto_vault_put_data:
          username: "{{ grafana_admin_username }}"
          password: "{{ _grafana_admin_password_generated }}"
      when: not grafana_admin_vault_exists
      tags: [install]

    - name: "[grafana-vault-secrets] Trigger ESO sync"
      include_tasks: tasks/tasks-eso-force-sync.yaml
      vars:
        label_name: "grafana-vault-secrets"
        dto_eso_sync_namespace: "{{ grafana_namespace }}"
      tags: [install]

    - name: "[grafana-vault-secrets] Wait for secret"
      include_tasks: tasks/tasks-wait-secret.yaml
      vars:
        label_name: "grafana-vault-secrets"
        dto_wait_secret_name: "{{ grafana_admin_secret_name }}"
        dto_wait_secret_namespace: "{{ grafana_namespace }}"
      tags: [install]

    # =========================================================================
    # STEP 3: INSTALL (PVC + Deployment + Service)
    # =========================================================================

    - name: "[grafana-install] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "grafana-install"
        dto_chart_name: "install"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/mon-grafana/install/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-grafana/install"
      tags: [install]

    - name: "[grafana-install] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "grafana-install"
        dto_dir: "{{ remote_charts_dir }}/mon-grafana/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ grafana_install_helm_values | to_nice_yaml }}"
      tags: [install]

    - name: "[grafana-install] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "grafana-install"
        dto_helm_command: >
          helm upgrade --install grafana {{ remote_charts_dir }}/mon-grafana/install
          --namespace {{ grafana_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/mon-grafana/install/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ grafana_install_helm_timeout }}
      tags: [install]

    - name: "[grafana-install] Wait for rollout"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "grafana-install"
        dto_rollout_namespace: "{{ grafana_namespace }}"
        dto_rollout_timeout: "{{ grafana_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment.apps/grafana
      tags: [install]

    # =========================================================================
    # STEP 4: POST (Ingress + Certificate)
    # =========================================================================

    - name: "[grafana-post] Copy chart to remote"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "grafana-post"
        dto_chart_name: "post"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/mon-grafana/post/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/mon-grafana/post"
      tags: [post]

    - name: "[grafana-post] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "grafana-post"
        dto_dir: "{{ remote_charts_dir }}/mon-grafana/post"
        dto_filename: "values-override.yaml"
        dto_content: "{{ grafana_post_helm_values | to_nice_yaml }}"
      tags: [post]

    - name: "[grafana-post] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "grafana-post"
        dto_helm_command: >
          helm upgrade --install grafana-post {{ remote_charts_dir }}/mon-grafana/post
          --namespace {{ grafana_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/mon-grafana/post/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ grafana_post_helm_timeout }}
      tags: [post]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[grafana-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        dto_helm_namespace: "{{ grafana_namespace }}"
        label_name: "grafana-verify"
      tags: [always]

    - name: "[grafana-verify] Get pods status"
      command: kubectl get pods -n {{ grafana_namespace }} -o wide
      register: grafana_pods
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[grafana-verify] Print pods status"
      debug:
        msg: "{{ grafana_pods.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[grafana-verify] Verify NetworkPolicies"
      command: kubectl get networkpolicies -n {{ grafana_namespace }}
      register: np_verify
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[grafana-verify] Show NetworkPolicies"
      debug:
        var: np_verify.stdout_lines
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[grafana-verify] Installation complete"
      debug:
        msg:
          - "grafana-pre + grafana + grafana-post: OK"
          - "Grafana UI: https://{{ grafana_domain }}"
          - "Namespace: {{ grafana_namespace }}"
          - "Admin credentials stored in Vault: {{ eso_vault_integration_grafana.kv_engine_path }}{{ vault_path_grafana_admin | default('') }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
