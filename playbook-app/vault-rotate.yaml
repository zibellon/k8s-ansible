# =============================================================================
# Rotate Vault Unseal Keys (Rekey) — bank-vaults operator, resume-safe
# =============================================================================
# Performs Vault rekey operation, replaces K8s Secret with new keys,
# and distributes them to all manager nodes.
#
# Resume safety via temp-file on master_manager_fact:
#   - After `vault operator rekey` succeeds, new keys + root token are
#     written to {{ vault_rekey_temp_file_path }} (mode 0600, root) BEFORE
#     any K8s-Secret / distribute operation.
#   - If the playbook crashes between rekey and distribute, the temp-file
#     remains on disk. Re-run detects it and resumes: replace K8s Secret
#     from temp-file, distribute, delete temp-file. NO second rekey.
#   - The temp-file is deleted only after distribute succeeds.
#
# Usage:
#   ansible-playbook -i hosts-vars/ -i hosts-vars-override/ playbook-app/vault-rotate.yaml
#
# Override rekey parameters:
#   ansible-playbook ... vault-rotate.yaml -e vault_rekey_shares=3 -e vault_rekey_threshold=2
#
# Prerequisites:
#   - Vault must be running and unsealed (bank-vaults handles unseal automatically)
#   - K8s Secret {{ vault_unsealer_secret_name }} must exist in {{ vault_namespace }}
# =============================================================================

---
- name: Rotate Vault Unseal Keys (Rekey)
  hosts: managers
  become: true
  gather_facts: false

  vars:
    vault_rekey_shares: "{{ vault_key_shares }}"
    vault_rekey_threshold: "{{ vault_key_threshold }}"
    # Имена локальных фактов — единая точка объявления (вынос из хардкода)
    _local_vault_sealed_key: "_local_vault_sealed"
    _local_vault_initialized_key: "_local_vault_initialized"
    _local_vault_rekey_temp_exists_key: "_local_vault_rekey_temp_exists"
    _local_vault_creds_key: "_local_vault_creds"
    _local_current_unseal_keys_key: "_local_current_unseal_keys"
    _local_vault_root_token_key: "_local_vault_root_token"
    _local_rekey_nonce_key: "_local_rekey_nonce"
    _local_rekey_required_key: "_local_rekey_required"
    _local_new_keys_hex_key: "_local_new_keys_hex"
    _local_vault_rekey_payload_key: "_local_vault_rekey_payload"
    _local_rekey_from_literals_key: "_local_rekey_from_literals"

  tasks:
    - name: "[vault-rotate-pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-pre-check.yaml"
      vars:
        dto_label_name: "vault-rotate-pre-check"

    # =========================================================================
    # STEP 1: CHECK VAULT STATUS
    # =========================================================================

    - name: "[vault-rotate] Get Vault status"
      command: >
        kubectl exec -n {{ vault_namespace }} vault-0 -c vault --
        vault status -format=json
      register: _local_vault_status_raw
      changed_when: false
      failed_when: _local_vault_status_raw.rc not in [0, 2]
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    - name: "[vault-rotate] Parse Vault status"
      set_fact:
        "{{ _local_vault_sealed_key }}": "{{ (_local_vault_status_raw.stdout | from_json).sealed }}"
        "{{ _local_vault_initialized_key }}": "{{ (_local_vault_status_raw.stdout | from_json).initialized }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    - name: "[vault-rotate] Fail if not initialized"
      fail:
        msg: "Vault is not initialized. Run vault-install.yaml first."
      when: not (lookup('vars', _local_vault_initialized_key) | bool)
      run_once: true

    - name: "[vault-rotate] Fail if sealed"
      fail:
        msg: >
          Vault is sealed. bank-vaults should unseal it automatically.
          Check pod: kubectl logs vault-0 -n {{ vault_namespace }} -c bank-vaults
      when: lookup('vars', _local_vault_sealed_key) | bool
      run_once: true

    - name: "[vault-rotate] Show current status"
      debug:
        msg: "Vault is initialized and unsealed. Proceeding."
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    # =========================================================================
    # STEP 2: CHECK TEMP-FILE EXISTENCE (resume detection)
    # =========================================================================

    - name: "[vault-rotate] Stat temp-file on master"
      stat:
        path: "{{ vault_rekey_temp_file_path }}"
      register: _local_vault_rekey_temp_stat
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    - name: "[vault-rotate] Set temp-file flag"
      set_fact:
        "{{ _local_vault_rekey_temp_exists_key }}": "{{ _local_vault_rekey_temp_stat.stat.exists }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    - name: "[vault-rotate] Show detected branch"
      debug:
        msg: >-
          {{ 'RECOVERY branch: temp-file exists at '
             + vault_rekey_temp_file_path
             + ' — will skip rekey and resume from it.'
             if lookup('vars', _local_vault_rekey_temp_exists_key)
             else 'ROTATE branch: no temp-file — will perform full rekey.' }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    # =========================================================================
    # STEP 3A: ROTATE BRANCH (no temp-file → full rekey)
    # =========================================================================

    - name: "[vault-rotate] STEP 3A: normal rotate"
      when: not lookup('vars', _local_vault_rekey_temp_exists_key) | bool
      block:

        - name: "[vault-rotate-3A] Read current credentials from K8s Secret"
          command: >
            kubectl get secret {{ vault_unsealer_secret_name }}
            -n {{ vault_namespace }} -o json
          register: _local_vault_secret_raw
          changed_when: false
          delegate_to: "{{ master_manager_fact }}"
          run_once: true

        - name: "[vault-rotate-3A] Decode credentials dict"
          set_fact:
            "{{ _local_vault_creds_key }}": >-
              {{ dict(
                   (_local_vault_secret_raw.stdout | from_json).data.keys() | list
                   | zip(
                       (_local_vault_secret_raw.stdout | from_json).data.values()
                       | map('b64decode') | list
                     )
                 ) }}
          delegate_to: "{{ master_manager_fact }}"
          run_once: true

        - name: "[vault-rotate-3A] Extract current unseal keys and root token"
          set_fact:
            "{{ _local_current_unseal_keys_key }}": >-
              {{ lookup('vars', _local_vault_creds_key)
                 | dict2items
                 | selectattr('key', 'match', 'vault-unseal-.*')
                 | sort(attribute='key')
                 | map(attribute='value')
                 | list }}
            "{{ _local_vault_root_token_key }}": "{{ lookup('vars', _local_vault_creds_key)['vault-root'] }}"
          delegate_to: "{{ master_manager_fact }}"
          run_once: true

        - name: "[vault-rotate-3A] Show current key count"
          debug:
            msg: "Found {{ lookup('vars', _local_current_unseal_keys_key) | length }} unseal keys in K8s Secret."
          delegate_to: "{{ master_manager_fact }}"
          run_once: true

        - name: "[vault-rotate-3A] Initialize rekey operation"
          command: >
            kubectl exec -n {{ vault_namespace }} vault-0 -c vault --
            vault operator rekey
            -init
            -key-shares={{ vault_rekey_shares }}
            -key-threshold={{ vault_rekey_threshold }}
            -format=json
          register: _local_rekey_init_raw
          delegate_to: "{{ master_manager_fact }}"
          run_once: true

        - name: "[vault-rotate-3A] Parse rekey nonce and required count"
          set_fact:
            "{{ _local_rekey_nonce_key }}": "{{ (_local_rekey_init_raw.stdout | from_json).nonce }}"
            "{{ _local_rekey_required_key }}": "{{ (_local_rekey_init_raw.stdout | from_json).required }}"
          delegate_to: "{{ master_manager_fact }}"
          run_once: true

        - name: "[vault-rotate-3A] Show rekey init info"
          debug:
            msg:
              - "Rekey initiated. Nonce: {{ lookup('vars', _local_rekey_nonce_key) }}"
              - "Keys required: {{ lookup('vars', _local_rekey_required_key) }}"
              - "New shares: {{ vault_rekey_shares }}, new threshold: {{ vault_rekey_threshold }}"
          delegate_to: "{{ master_manager_fact }}"
          run_once: true

        - name: "[vault-rotate-3A] Submit unseal keys for rekey"
          command: >
            kubectl exec -n {{ vault_namespace }} vault-0 -c vault --
            vault operator rekey
            -nonce={{ lookup('vars', _local_rekey_nonce_key) }}
            -format=json
            {{ item }}
          loop: "{{ lookup('vars', _local_current_unseal_keys_key)[: (lookup('vars', _local_rekey_required_key) | int)] }}"
          loop_control:
            index_var: idx
            loop_var: item
            label: "Key {{ idx + 1 }} of {{ lookup('vars', _local_rekey_required_key) }}"
          register: _local_rekey_results
          delegate_to: "{{ master_manager_fact }}"
          run_once: true

        - name: "[vault-rotate-3A] Extract new keys from rekey result"
          set_fact:
            "{{ _local_new_keys_hex_key }}": "{{ (_local_rekey_results.results[-1].stdout | from_json)['keys'] }}"
          delegate_to: "{{ master_manager_fact }}"
          run_once: true

        - name: "[vault-rotate-3A] Fail if no new keys returned"
          fail:
            msg: "Rekey failed — new keys not returned. Check Vault logs."
          when: _local_new_keys_hex_key not in hostvars[inventory_hostname] or lookup('vars', _local_new_keys_hex_key) | length == 0
          run_once: true

        - name: "[vault-rotate-3A] Build rekey payload dict"
          set_fact:
            "{{ _local_vault_rekey_payload_key }}": >-
              {{ {'vault-root': lookup('vars', _local_vault_root_token_key)}
                 | combine(dict(
                     range(lookup('vars', _local_new_keys_hex_key) | length)
                     | map('string')
                     | map('regex_replace', '^', 'vault-unseal-')
                     | zip(lookup('vars', _local_new_keys_hex_key))
                   )) }}
          delegate_to: "{{ master_manager_fact }}"
          run_once: true

        - name: "[vault-rotate-3A] CRITICAL — print new keys to console (operator capture)"
          debug:
            msg:
              - "=============================================="
              - "NEW VAULT UNSEAL KEYS — COPY THESE NOW"
              - "=============================================="
              - "If this playbook crashes before finishing, the keys below"
              - "are your only recovery material besides the temp-file"
              - "at {{ vault_rekey_temp_file_path }} on {{ master_manager_fact }}."
              - "Re-running vault-rotate.yaml will resume from temp-file"
              - "automatically — no second rekey."
              - "----------------------------------------------"
              - "{{ lookup('vars', _local_vault_rekey_payload_key) | to_nice_json }}"
              - "=============================================="
          delegate_to: "{{ master_manager_fact }}"
          run_once: true

        - name: "[vault-rotate-3A] Ensure temp-file parent directory exists"
          file:
            path: "{{ vault_rekey_temp_file_path | dirname }}"
            state: directory
            mode: "0755"
            owner: root
            group: root
          delegate_to: "{{ master_manager_fact }}"
          run_once: true

        - name: "[vault-rotate-3A] Write temp-file with new keys + root token"
          copy:
            content: "{{ lookup('vars', _local_vault_rekey_payload_key) | to_nice_json }}"
            dest: "{{ vault_rekey_temp_file_path }}"
            mode: "0600"
            owner: root
            group: root
          delegate_to: "{{ master_manager_fact }}"
          run_once: true

    # =========================================================================
    # STEP 3B: RECOVERY BRANCH (temp-file exists → load + validate)
    # =========================================================================

    - name: "[vault-rotate] STEP 3B: recovery from temp-file"
      when: lookup('vars', _local_vault_rekey_temp_exists_key) | bool
      block:

        - name: "[vault-rotate-3B] Announce recovery"
          debug:
            msg:
              - "Resuming from temp-file {{ vault_rekey_temp_file_path }}."
              - "Skipping rekey (Vault already has the new keys from the previous attempt)."
          delegate_to: "{{ master_manager_fact }}"
          run_once: true

        - name: "[vault-rotate-3B] Slurp temp-file contents"
          slurp:
            src: "{{ vault_rekey_temp_file_path }}"
          register: _local_vault_rekey_temp_slurp
          delegate_to: "{{ master_manager_fact }}"
          run_once: true

        - name: "[vault-rotate-3B] Parse temp-file JSON"
          set_fact:
            "{{ _local_vault_rekey_payload_key }}": "{{ _local_vault_rekey_temp_slurp.content | b64decode | from_json }}"
          delegate_to: "{{ master_manager_fact }}"
          run_once: true

        - name: "[vault-rotate-3B] Validate temp-file structure"
          assert:
            that:
              - lookup('vars', _local_vault_rekey_payload_key) is mapping
              - "'vault-root' in lookup('vars', _local_vault_rekey_payload_key)"
              - lookup('vars', _local_vault_rekey_payload_key).keys() | select('match', '^vault-unseal-[0-9]+$') | list | length > 0
            fail_msg: >-
              Temp file {{ vault_rekey_temp_file_path }} is corrupted or incomplete.
              Expected JSON dict with 'vault-root' and at least one 'vault-unseal-<N>' key.
              Inspect the file manually; if rekey did not actually happen,
              remove it and re-run the playbook.
          delegate_to: "{{ master_manager_fact }}"
          run_once: true

    # =========================================================================
    # STEP 4: REPLACE K8S SECRET (from _local_vault_rekey_payload — both branches)
    # =========================================================================

    - name: "[vault-rotate] Build --from-literal args from payload"
      set_fact:
        "{{ _local_rekey_from_literals_key }}": >-
          {% for k, v in lookup('vars', _local_vault_rekey_payload_key).items() %}
          --from-literal={{ k }}={{ v }}
          {% endfor %}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    - name: "[vault-rotate] Replace K8s Secret with payload"
      shell: >
        kubectl create secret generic {{ vault_unsealer_secret_name }}
        -n {{ vault_namespace }}
        {{ lookup('vars', _local_rekey_from_literals_key) }}
        --dry-run=client -o yaml | kubectl replace -f -
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    # =========================================================================
    # STEP 5: DISTRIBUTE TO ALL MANAGERS
    # =========================================================================

    - name: "[vault-rotate] Distribute credentials to all managers"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-distribute-creds.yaml"
      vars:
        dto_label_name: "vault-rotate"

    # =========================================================================
    # STEP 6: DELETE TEMP-FILE (only after distribute succeeded)
    # =========================================================================

    - name: "[vault-rotate] Delete temp-file"
      file:
        path: "{{ vault_rekey_temp_file_path }}"
        state: absent
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    # =========================================================================
    # STEP 7: VERIFY
    # =========================================================================

    - name: "[vault-rotate] Verify Vault status after rotate"
      command: >
        kubectl exec -n {{ vault_namespace }} vault-0 -c vault --
        vault status -format=json
      register: _local_vault_final_status
      changed_when: false
      failed_when: _local_vault_final_status.rc not in [0, 2]
      delegate_to: "{{ master_manager_fact }}"
      run_once: true

    - name: "[vault-rotate] Show completion summary"
      debug:
        msg:
          - "=============================================="
          - "VAULT REKEY COMPLETED"
          - "=============================================="
          - "Sealed: {{ (_local_vault_final_status.stdout | from_json).sealed }}"
          - "New key shares: {{ vault_rekey_shares }}"
          - "New key threshold: {{ vault_rekey_threshold }}"
          - "Distributed to: {{ groups['managers'] | join(', ') }}"
          - "Distributed file: {{ vault_creds_host_path }}"
          - "Temp-file removed: {{ vault_rekey_temp_file_path }}"
          - "=============================================="
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
