# =============================================================================
# Install HAProxy via Helm
# Steps:
#   1. haproxy/pre: NetworkPolicies for haproxy namespace
#   2. Official haproxytech/kubernetes-ingress chart
#   3. haproxy/post: Global + Defaults configuration
#
# Usage (tags):
#   ansible-playbook haproxy-install.yaml              # full install
#   ansible-playbook haproxy-install.yaml --tags pre   # only pre (NetworkPolicies + ESO)
#   ansible-playbook haproxy-install.yaml --tags install
#   ansible-playbook haproxy-install.yaml --tags post  # only post (Global + Defaults config)
# =============================================================================

---
- name: Install HAProxy via Helm
  hosts: managers
  become: true
  gather_facts: false

  vars:
    # Имена локальных фактов — единая точка объявления (вынос из хардкода)
    _local_haproxy_helm_chart_source_key: "_local_haproxy_helm_chart_source"

  tasks:
    - name: "[haproxy-install-pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-pre-check.yaml"
      vars:
        dto_label_name: "haproxy-install-pre-check"
      tags: [always]

    - name: "[haproxy-install-pre-check] Forbid kube-system namespace"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-forbid-kube-system.yaml"
      vars:
        dto_label_name: "haproxy-install-pre-check"
        dto_target_namespace: "{{ haproxy_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations and resolve HAProxy config
    # =========================================================================

    - name: "[haproxy-install-init] Verify Vault config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-config-verify.yaml"
      vars:
        dto_label_name: "haproxy-install-init"
      tags: [always]

    - name: "[haproxy-install-init] Verify ESO config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-eso-verify.yaml"
      vars:
        dto_label_name: "haproxy-install-init"
        dto_eso_secrets_list: "{{ eso_vault_integration_haproxy_secrets + (eso_vault_integration_haproxy_secrets_extra | default([])) }}"
        dto_eso_integration_object: "{{ eso_vault_integration_haproxy }}"
        dto_namespace: "{{ haproxy_namespace }}"
      tags: [always]


    # =========================================================================
    # STEP 1: HAPROXY/PRE (NetworkPolicies, ESO)
    # =========================================================================

    - name: "[haproxy-pre] Copy chart to server"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "haproxy-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/haproxy/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/haproxy/pre"
      tags: [pre]

    - name: "[haproxy-pre] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "haproxy-pre"
        dto_dir: "{{ remote_charts_dir }}/haproxy/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ haproxy_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[haproxy-pre] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "haproxy-pre"
        dto_release_name: "haproxy-pre"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/haproxy/pre"
        dto_values_file_path: "{{ remote_charts_dir }}/haproxy/pre/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/haproxy/pre-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/haproxy/pre-k"
        dto_patches_list: "{{ haproxy_pre_kustomize_patches }}"
        dto_target_namespace: "{{ haproxy_namespace }}"
      tags: [pre]

    - name: "[haproxy-pre] Install or upgrade via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "haproxy-pre"
        dto_helm_command: >
          helm upgrade --install haproxy-pre {{ remote_charts_dir }}/haproxy/pre-k
          --namespace {{ haproxy_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ haproxy_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: OFFICIAL HAPROXYTECH/KUBERNETES-INGRESS
    # =========================================================================

    - name: "[haproxy-install] Add Helm repository"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-add-helm-repo.yaml"
      vars:
        dto_label_name: "haproxy-install"
        dto_helm_is_oci: "{{ haproxy_helm_is_oci }}"
        dto_helm_url: "{{ haproxy_helm_url }}"
        dto_helm_chart_version: "{{ haproxy_helm_chart_version }}"
        dto_helm_repo_name: "{{ haproxy_helm_repo_name }}"
        dto_helm_chart_name: "{{ haproxy_helm_chart_name }}"
        dto_helm_chart_source_res_fact_name: "{{ _local_haproxy_helm_chart_source_key }}"
      tags: [install]

    - name: "[haproxy-install] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "haproxy-install"
        dto_dir: "{{ remote_charts_dir }}/haproxy/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ haproxy_helm_values | to_nice_yaml }}"
      tags: [install]

    - name: "[haproxy-install] Install or upgrade HAProxy via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "haproxy-install"
        dto_helm_command: >
          helm upgrade --install haproxy-ingress {{ lookup('vars', _local_haproxy_helm_chart_source_key) }}
          --namespace {{ haproxy_namespace }}
          --create-namespace
          --version {{ haproxy_helm_chart_version }}
          --values {{ remote_charts_dir }}/haproxy/install/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ haproxy_install_helm_timeout }}
      tags: [install]

    - name: "[haproxy-install] Wait for CRDs"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-crds.yaml"
      vars:
        dto_label_name: "haproxy-install"
        dto_crds_list:
          - crd/backends.ingress.v3.haproxy.org
          - crd/defaults.ingress.v3.haproxy.org
          - crd/frontends.ingress.v3.haproxy.org
          - crd/globals.ingress.v3.haproxy.org
          - crd/tcps.ingress.v3.haproxy.org
          - crd/validationrules.ingress.v3.haproxy.org
      tags: [install]

    - name: "[haproxy-install] Wait for rollouts"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "haproxy-install"
        dto_rollout_namespace: "{{ haproxy_namespace }}"
        dto_rollout_timeout: "{{ haproxy_rollout_timeout }}"
        dto_rollout_resources_list:
          - daemonset/{{ haproxy_daemonset_name }}
      tags: [install]

    # =========================================================================
    # STEP 3: HAPROXY/POST (Global + Defaults config)
    # =========================================================================

    - name: "[haproxy-post] Copy chart to server"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "haproxy-post"
        dto_chart_name: "post"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/haproxy/post/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/haproxy/post"
      tags: [post]

    - name: "[haproxy-post] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "haproxy-post"
        dto_dir: "{{ remote_charts_dir }}/haproxy/post"
        dto_filename: "values-override.yaml"
        dto_content: "{{ haproxy_post_helm_values | to_nice_yaml }}"
      tags: [post]

    - name: "[haproxy-post] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "haproxy-post"
        dto_release_name: "haproxy-post"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/haproxy/post"
        dto_values_file_path: "{{ remote_charts_dir }}/haproxy/post/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/haproxy/post-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/haproxy/post-k"
        dto_patches_list: "{{ haproxy_post_kustomize_patches }}"
        dto_target_namespace: "{{ haproxy_namespace }}"
      tags: [post]

    - name: "[haproxy-post] Install or upgrade via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "haproxy-post"
        dto_helm_command: >
          helm upgrade --install haproxy-post {{ remote_charts_dir }}/haproxy/post-k
          --namespace {{ haproxy_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ haproxy_post_helm_timeout }}
      tags: [post]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[haproxy-verify] Verify Helm releases"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-helm.yaml"
      vars:
        dto_helm_namespace: "{{ haproxy_namespace }}"
        dto_label_name: "haproxy-verify"
      tags: [always]

    - name: "[haproxy-verify] Show pods in {{ haproxy_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "haproxy-verify"
        dto_pods_namespace: "{{ haproxy_namespace }}"
      tags: [always]

    - name: "[haproxy-verify] Show NetworkPolicies in {{ haproxy_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-network-policy.yaml"
      vars:
        dto_label_name: "haproxy-verify"
        dto_np_namespace: "{{ haproxy_namespace }}"
      tags: [always]

    - name: "[haproxy-verify] Installation complete"
      debug:
        msg: "haproxy-pre + haproxy-ingress + haproxy-post: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
