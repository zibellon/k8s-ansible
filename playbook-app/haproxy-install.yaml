# =============================================================================
# Install HAProxy via Helm
# Steps:
#   1. haproxy/pre: NetworkPolicies for haproxy namespace
#   2. Official haproxytech/kubernetes-ingress chart
#   3. haproxy/post: Global + Defaults configuration
#
# Usage (tags):
#   ansible-playbook haproxy-install.yaml              # full install
#   ansible-playbook haproxy-install.yaml --tags pre   # only pre (NetworkPolicies + ESO)
#   ansible-playbook haproxy-install.yaml --tags install
#   ansible-playbook haproxy-install.yaml --tags post  # only post (Global + Defaults config)
# =============================================================================

---
- name: Install HAProxy via Helm
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[haproxy-install-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        label_name: "haproxy-install-pre-check"
      tags: [always]

    - name: "[haproxy-install-pre-check] Forbid kube-system namespace"
      include_tasks: tasks/tasks-forbid-kube-system.yaml
      vars:
        label_name: "haproxy-install-pre-check"
        namespace_value: "{{ haproxy_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations and resolve HAProxy config
    # =========================================================================

    - name: "[haproxy-install-init] Merge ESO integrations"
      include_tasks: tasks/tasks-eso-merge.yaml
      tags: [always]


    # =========================================================================
    # STEP 1: HAPROXY/PRE (NetworkPolicies, ESO)
    # =========================================================================

    - name: "[haproxy-pre] Copy chart to server"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "haproxy-pre"
        chart_name: "pre"
        chart_local_src: "{{ project_root }}/playbook-app/charts/haproxy/pre/"
        chart_remote_dest: "{{ remote_charts_dir }}/haproxy/pre"
      tags: [pre]

    - name: "[haproxy-pre] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/haproxy/pre/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ haproxy_namespace }}
          eso:
            vaultServerUrl: {{ vault_internal_url }}
            saName: {{ eso_vault_integration_haproxy.sa_name }}
            roleName: {{ eso_vault_integration_haproxy.role_name }}
            secretStoreName: {{ eso_vault_integration_haproxy.secret_store_name }}
            kvEnginePath: {{ eso_vault_integration_haproxy.kv_engine_path }}
            isNeedEso: {{ eso_vault_integration_haproxy.is_need_eso | default(true) }}
            secrets: {{ eso_vault_integration_haproxy_secrets_merged | to_json }}
          esoResourcesConfig:
            secretStoreRefreshInterval: {{ eso_resources_config.secret_store_refresh_interval }}
            externalSecretRefreshInterval: {{ eso_resources_config.external_secret_refresh_interval }}
            externalSecretRefreshPolicy: {{ eso_resources_config.external_secret_refresh_policy }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [pre]

    - name: "[haproxy-pre] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "haproxy-pre"
        helm_command: >
          helm upgrade --install haproxy-pre {{ remote_charts_dir }}/haproxy/pre
          --namespace {{ haproxy_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/haproxy/pre/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ haproxy_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: OFFICIAL HAPROXYTECH/KUBERNETES-INGRESS
    # =========================================================================

    - name: "[haproxy-install] Add Helm repository"
      include_tasks: tasks/tasks-add-helm-repo.yaml
      vars:
        label_name: "haproxy-install"
        helm_repo_name: "haproxytech"
        helm_repo_url: "https://haproxytech.github.io/helm-charts"
      tags: [install]

    - name: "[haproxy-install] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/haproxy/values-override.yaml"
        mode: "0644"
        content: |
          fullnameOverride: {{ haproxy_daemonset_name }}
          controller:
            image:
              repository: "{{ haproxy_image_registry }}/{{ haproxy_image_repository }}"
              tag: "{{ haproxy_image_tag }}"
            kind: DaemonSet
            tolerations: {{ haproxy_tolerations | to_json }}
            nodeSelector: {{ haproxy_node_selector | to_json }}
            resources: {{ haproxy_resources | to_json }}
            ingressClassResource:
              name: {{ haproxy_ingress_class }}
            ingressClass: {{ haproxy_ingress_class }}
            defaultTLSSecret:
              enabled: false
            logging:
              level: info
              traffic:
                address: stdout
                format: raw
                facility: daemon
            service:
              enabled: true
              type: ClusterIP
              enablePorts:
                http: false
                https: false
                quic: false
                stat: true
            serviceMonitor:
              enabled: {{ haproxy_service_monitor_enabled }}
              extraLabels: {{ haproxy_service_monitor_extra_labels | to_json }}
              endpoints: {{ haproxy_service_monitor_endpoints | to_json }}
          serviceAccount:
            create: true
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[haproxy-install] Install or upgrade HAProxy via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "haproxy-install"
        helm_command: >
          helm upgrade --install haproxy-ingress haproxytech/kubernetes-ingress
          --namespace {{ haproxy_namespace }}
          --version {{ haproxy_chart_version }}
          --values {{ remote_charts_dir }}/haproxy/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ haproxy_helm_timeout }}
      tags: [install]

    - name: "[haproxy-install] Wait for CRDs"
      include_tasks: tasks/tasks-wait-crds.yaml
      vars:
        label_name: "haproxy-install"
        crds_list:
          - crd/backends.ingress.v1.haproxy.org
          - crd/defaults.ingress.v1.haproxy.org
          - crd/globals.ingress.v1.haproxy.org
          - crd/tcps.ingress.v1.haproxy.org
      tags: [install]

    - name: "[haproxy-install] Wait for rollouts"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "haproxy-install"
        rollout_namespace: "{{ haproxy_namespace }}"
        rollout_timeout: "{{ haproxy_rollout_timeout }}"
        rollout_resources:
          - daemonset/{{ haproxy_daemonset_name }}
      tags: [install]

    # =========================================================================
    # STEP 3: HAPROXY/POST (Global + Defaults config)
    # =========================================================================

    - name: "[haproxy-post] Copy chart to server"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "haproxy-post"
        chart_name: "post"
        chart_local_src: "{{ project_root }}/playbook-app/charts/haproxy/post/"
        chart_remote_dest: "{{ remote_charts_dir }}/haproxy/post"
      tags: [post]

    - name: "[haproxy-post] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/haproxy/post/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ haproxy_namespace }}
          ingressClass: {{ haproxy_ingress_class }}
          global: {{ haproxy_global_config | to_json }}
          defaults: {{ haproxy_defaults_config | to_json }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [post]

    - name: "[haproxy-post] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "haproxy-post"
        helm_command: >
          helm upgrade --install haproxy-post {{ remote_charts_dir }}/haproxy/post
          --namespace {{ haproxy_namespace }}
          --values {{ remote_charts_dir }}/haproxy/post/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ haproxy_config_helm_timeout }}
      tags: [post]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[haproxy-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        helm_namespace: "{{ haproxy_namespace }}"
        label_name: "haproxy-verify"
      tags: [always]

    - name: "[haproxy-verify] Get haproxy pods status"
      command: kubectl get pods -n {{ haproxy_namespace }} -o wide
      register: haproxy_pods
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[haproxy-verify] Print haproxy pods status"
      debug:
        msg: "{{ haproxy_pods.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[haproxy-verify] Installation complete"
      debug:
        msg: "haproxy-pre + haproxy-ingress + haproxy-post: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
