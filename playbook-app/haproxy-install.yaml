# =============================================================================
# Install HAProxy via Helm
# Steps:
#   1. haproxy/pre: NetworkPolicies for haproxy namespace
#   2. Official haproxytech/kubernetes-ingress chart
#   3. haproxy/post: Global + Defaults configuration
#
# Usage (tags):
#   ansible-playbook haproxy-install.yaml              # full install
#   ansible-playbook haproxy-install.yaml --tags pre   # only pre (NetworkPolicies + ESO)
#   ansible-playbook haproxy-install.yaml --tags install
#   ansible-playbook haproxy-install.yaml --tags post  # only post (Global + Defaults config)
# =============================================================================

---
- name: Install HAProxy via Helm
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[haproxy-install-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        label_name: "haproxy-install-pre-check"
      tags: [always]

    - name: "[haproxy-install-pre-check] Forbid kube-system namespace"
      include_tasks: tasks/tasks-forbid-kube-system.yaml
      vars:
        label_name: "haproxy-install-pre-check"
        dto_target_namespace: "{{ haproxy_namespace }}"
      tags: [always]

    # =========================================================================
    # INIT: Merge ESO integrations and resolve HAProxy config
    # =========================================================================

    - name: "[haproxy-install-init] Merge ESO integrations"
      include_tasks: tasks/tasks-eso-merge.yaml
      tags: [always]


    # =========================================================================
    # STEP 1: HAPROXY/PRE (NetworkPolicies, ESO)
    # =========================================================================

    - name: "[haproxy-pre] Copy chart to server"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "haproxy-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/haproxy/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/haproxy/pre"
      tags: [pre]

    - name: "[haproxy-pre] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "haproxy-pre"
        dto_dir: "{{ remote_charts_dir }}/haproxy/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ haproxy_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[haproxy-pre] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "haproxy-pre"
        dto_helm_command: >
          helm upgrade --install haproxy-pre {{ remote_charts_dir }}/haproxy/pre
          --namespace {{ haproxy_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/haproxy/pre/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ haproxy_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # STEP 2: OFFICIAL HAPROXYTECH/KUBERNETES-INGRESS
    # =========================================================================

    - name: "[haproxy-install] Add Helm repository"
      include_tasks: tasks/tasks-add-helm-repo.yaml
      vars:
        label_name: "haproxy-install"
        dto_helm_repo_name: "{{ haproxy_helm_repo_name }}"
        dto_helm_repo_url: "{{ haproxy_helm_repo_url }}"
      tags: [install]

    - name: "[haproxy-install] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "haproxy-install"
        dto_dir: "{{ remote_charts_dir }}/haproxy/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ haproxy_helm_values | to_nice_yaml }}"
      tags: [install]

    - name: "[haproxy-install] Install or upgrade HAProxy via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "haproxy-install"
        dto_helm_command: >
          helm upgrade --install haproxy-ingress {{ haproxy_helm_repo_name }}/{{ haproxy_helm_chart_name }}
          --namespace {{ haproxy_namespace }}
          --create-namespace
          --version {{ haproxy_chart_version }}
          --values {{ remote_charts_dir }}/haproxy/install/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ haproxy_install_helm_timeout }}
      tags: [install]

    - name: "[haproxy-install] Wait for CRDs"
      include_tasks: tasks/tasks-wait-crds.yaml
      vars:
        label_name: "haproxy-install"
        dto_crds_list:
          - crd/backends.ingress.v3.haproxy.org
          - crd/defaults.ingress.v3.haproxy.org
          - crd/frontends.ingress.v3.haproxy.org
          - crd/globals.ingress.v3.haproxy.org
          - crd/tcps.ingress.v3.haproxy.org
          - crd/validationrules.ingress.v3.haproxy.org
      tags: [install]

    - name: "[haproxy-install] Wait for rollouts"
      include_tasks: tasks/tasks-wait-rollout.yaml
      vars:
        label_name: "haproxy-install"
        dto_rollout_namespace: "{{ haproxy_namespace }}"
        dto_rollout_timeout: "{{ haproxy_rollout_timeout }}"
        dto_rollout_resources_list:
          - daemonset/{{ haproxy_daemonset_name }}
      tags: [install]

    # =========================================================================
    # STEP 3: HAPROXY/POST (Global + Defaults config)
    # =========================================================================

    - name: "[haproxy-post] Copy chart to server"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "haproxy-post"
        dto_chart_name: "post"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/haproxy/post/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/haproxy/post"
      tags: [post]

    - name: "[haproxy-post] Create values file"
      include_tasks: tasks/tasks-copy-helm-values.yaml
      vars:
        label_name: "haproxy-post"
        dto_dir: "{{ remote_charts_dir }}/haproxy/post"
        dto_filename: "values-override.yaml"
        dto_content: "{{ haproxy_post_helm_values | to_nice_yaml }}"
      tags: [post]

    - name: "[haproxy-post] Install or upgrade via Helm (async)"
      include_tasks: tasks/tasks-helm-upgrade-async.yaml
      vars:
        label_name: "haproxy-post"
        dto_helm_command: >
          helm upgrade --install haproxy-post {{ remote_charts_dir }}/haproxy/post
          --namespace {{ haproxy_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/haproxy/post/values-override.yaml
          --cleanup-on-fail
          --atomic
          --wait
          --wait-for-jobs
          --timeout {{ haproxy_post_helm_timeout }}
      tags: [post]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[haproxy-verify] Verify Helm releases"
      include_tasks: tasks/tasks-verify-helm.yaml
      vars:
        dto_helm_namespace: "{{ haproxy_namespace }}"
        label_name: "haproxy-verify"
      tags: [always]

    - name: "[haproxy-verify] Get haproxy pods status"
      command: kubectl get pods -n {{ haproxy_namespace }} -o wide
      register: haproxy_pods
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[haproxy-verify] Print haproxy pods status"
      debug:
        msg: "{{ haproxy_pods.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[haproxy-verify] Installation complete"
      debug:
        msg: "haproxy-pre + haproxy-ingress + haproxy-post: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
