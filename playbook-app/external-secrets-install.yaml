# =============================================================================
# Install External Secrets Operator
# Steps:
#   1. external-secrets/pre: NetworkPolicies
#   2. CRDs (kubectl create -f) + official Helm chart (--skip-crds)
#   3. external-secrets/post: empty
#
# Usage (tags):
#   ansible-playbook external-secrets-install.yaml              # full install
#   ansible-playbook external-secrets-install.yaml --tags pre   # only pre (NetworkPolicies)
#   ansible-playbook external-secrets-install.yaml --tags install
# =============================================================================

---
- name: Install External Secrets Operator
  hosts: managers
  become: true
  gather_facts: false

  vars:
    # Имена локальных фактов — единая точка объявления (вынос из хардкода)
    _local_external_secrets_helm_chart_source_key: "_local_external_secrets_helm_chart_source"

  tasks:
    - name: "[external-secrets-install-pre-check] Validate target"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-pre-check.yaml"
      vars:
        dto_label_name: "external-secrets-install-pre-check"
      tags: [always]

    - name: "[external-secrets-install-pre-check] Forbid kube-system namespace"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-forbid-kube-system.yaml"
      vars:
        dto_label_name: "external-secrets-install-pre-check"
        dto_target_namespace: "{{ external_secrets_namespace }}"
      tags: [always]

    # =========================================================================
    # STEP 1: EXTERNAL-SECRETS/PRE (NetworkPolicies)
    # =========================================================================

    - name: "[external-secrets-pre] Copy chart to server"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-chart.yaml"
      vars:
        dto_label_name: "external-secrets-pre"
        dto_chart_name: "pre"
        dto_chart_local_src: "{{ project_root }}/playbook-app/charts/external-secrets/pre/"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/external-secrets/pre"
      tags: [pre]

    - name: "[external-secrets-pre] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "external-secrets-pre"
        dto_dir: "{{ remote_charts_dir }}/external-secrets/pre"
        dto_filename: "values-override.yaml"
        dto_content: "{{ external_secrets_pre_helm_values | to_nice_yaml }}"
      tags: [pre]

    - name: "[external-secrets-pre] Build kustomize artifact"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-template-kustomize-build.yaml"
      vars:
        dto_label_name: "external-secrets-pre"
        dto_release_name: "external-secrets-pre"
        dto_chart_remote_dest: "{{ remote_charts_dir }}/external-secrets/pre"
        dto_values_file_path: "{{ remote_charts_dir }}/external-secrets/pre/values-override.yaml"
        dto_kustomize_tmp_dir: "{{ remote_charts_dir }}/external-secrets/pre-k-tmp"
        dto_kustomize_final_dir: "{{ remote_charts_dir }}/external-secrets/pre-k"
        dto_patches_list: "{{ external_secrets_pre_kustomize_patches }}"
        dto_target_namespace: "{{ external_secrets_namespace }}"
      tags: [pre]

    - name: "[external-secrets-pre] Install or upgrade via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "external-secrets-pre"
        dto_helm_command: >
          helm upgrade --install external-secrets-pre {{ remote_charts_dir }}/external-secrets/pre-k
          --namespace {{ external_secrets_namespace }}
          --create-namespace
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ external_secrets_pre_helm_timeout }}
      tags: [pre]

    # =========================================================================
    # Install Phase
    # =========================================================================

    - name: "[external-secrets-install] Add Helm repository"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-add-helm-repo.yaml"
      vars:
        dto_label_name: "external-secrets-install"
        dto_helm_is_oci: "{{ external_secrets_helm_is_oci }}"
        dto_helm_url: "{{ external_secrets_helm_url }}"
        dto_helm_chart_version: "{{ external_secrets_helm_chart_version }}"
        dto_helm_repo_name: "{{ external_secrets_helm_repo_name }}"
        dto_helm_chart_name: "{{ external_secrets_helm_chart_name }}"
        dto_helm_chart_source_res_fact_name: "{{ _local_external_secrets_helm_chart_source_key }}"
      tags: [install]

    - name: "[external-secrets-install] Create values file"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-copy-helm-values.yaml"
      vars:
        dto_label_name: "external-secrets-install"
        dto_dir: "{{ remote_charts_dir }}/external-secrets/install"
        dto_filename: "values-override.yaml"
        dto_content: "{{ external_secrets_helm_values | to_nice_yaml }}"
      tags: [install]

    - name: "[external-secrets-install] Install or upgrade via Helm (async)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-helm-upgrade-async.yaml"
      vars:
        dto_label_name: "external-secrets-install"
        dto_helm_command: >
          helm upgrade --install external-secrets {{ lookup('vars', _local_external_secrets_helm_chart_source_key) }}
          --namespace {{ external_secrets_namespace }}
          --create-namespace
          --values {{ remote_charts_dir }}/external-secrets/install/values-override.yaml
          --version {{ external_secrets_helm_chart_version }}
          --cleanup-on-fail
          --atomic
          --wait
          --timeout {{ external_secrets_install_helm_timeout }}
      tags: [install]

    # =========================================================================
    # WAIT FOR CRDS
    # =========================================================================

    - name: "[external-secrets-install] Wait for CRDs"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-crds.yaml"
      vars:
        dto_label_name: "external-secrets-install"
        dto_crds_list:
          - crd/externalsecrets.external-secrets.io
          - crd/clustersecretstores.external-secrets.io
          - crd/secretstores.external-secrets.io
          - crd/clusterexternalsecrets.external-secrets.io
          - crd/pushsecrets.external-secrets.io
          - crd/clusterpushsecrets.external-secrets.io
          - crd/acraccesstokens.generators.external-secrets.io
          - crd/cloudsmithaccesstokens.generators.external-secrets.io
          - crd/clustergenerators.generators.external-secrets.io
          - crd/ecrauthorizationtokens.generators.external-secrets.io
          - crd/fakes.generators.external-secrets.io
          - crd/gcraccesstokens.generators.external-secrets.io
          - crd/generatorstates.generators.external-secrets.io
          - crd/githubaccesstokens.generators.external-secrets.io
          - crd/grafanas.generators.external-secrets.io
          - crd/mfas.generators.external-secrets.io
          - crd/passwords.generators.external-secrets.io
          - crd/quayaccesstokens.generators.external-secrets.io
          - crd/sshkeys.generators.external-secrets.io
          - crd/stssessiontokens.generators.external-secrets.io
          - crd/uuids.generators.external-secrets.io
          - crd/vaultdynamicsecrets.generators.external-secrets.io
          - crd/webhooks.generators.external-secrets.io
      tags: [install]

    # =========================================================================
    # WAIT FOR DEPLOYMENT
    # =========================================================================

    - name: "[external-secrets-install] Wait for rollouts"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-wait-rollout.yaml"
      vars:
        dto_label_name: "external-secrets-install"
        dto_rollout_namespace: "{{ external_secrets_namespace }}"
        dto_rollout_timeout: "{{ external_secrets_rollout_timeout }}"
        dto_rollout_resources_list:
          - deployment.apps/external-secrets
          - deployment.apps/external-secrets-webhook
          - deployment.apps/external-secrets-cert-controller
      tags: [install]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[external-secrets-verify] Verify Helm releases"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-helm.yaml"
      vars:
        dto_helm_namespace: "{{ external_secrets_namespace }}"
        dto_label_name: "external-secrets-verify"
      tags: [always]

    - name: "[external-secrets-verify] Show pods in {{ external_secrets_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-pods.yaml"
      vars:
        dto_label_name: "external-secrets-verify"
        dto_pods_namespace: "{{ external_secrets_namespace }}"
      tags: [always]

    - name: "[external-secrets-verify] Show NetworkPolicies in {{ external_secrets_namespace }}"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-k8s-list-network-policy.yaml"
      vars:
        dto_label_name: "external-secrets-verify"
        dto_np_namespace: "{{ external_secrets_namespace }}"
      tags: [always]

    - name: "[external-secrets-verify] Installation complete"
      debug:
        msg: "external-secrets-pre + external-secrets: OK"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
