# =============================================================================
# Install Cilium Hubble UI Ingress
# Steps:
#   1. cilium-hubble/pre: NetworkPolicies for Hubble UI Ingress
#   2. cilium-hubble/install: Certificate + Ingress for Hubble UI
#   3. cilium-hubble/post: No resources (README only)
#
# Usage (tags):
#   ansible-playbook cilium-hubble-install.yaml              # full install
#   ansible-playbook cilium-hubble-install.yaml --tags pre   # only pre (NetworkPolicies)
#   ansible-playbook cilium-hubble-install.yaml --tags install
#   ansible-playbook cilium-hubble-install.yaml --tags post  # only post (no resources)
# =============================================================================

---
- name: Install Cilium Hubble UI Ingress
  hosts: managers
  become: true
  gather_facts: false

  tasks:
    - name: "[cilium-hubble-install-pre-check] Validate target"
      include_tasks: tasks/tasks-pre-check.yaml
      vars:
        label_name: "cilium-hubble-install-pre-check"
      tags: [always]

    # =========================================================================
    # STEP 1: CILIUM-HUBBLE/PRE (NetworkPolicies)
    # =========================================================================

    # =========================================================================
    # INIT: Resolve ClusterIssuer + ACME solver pod labels
    # =========================================================================

    - name: "[cilium-hubble-init] Resolve ACME solver"
      include_tasks: tasks/tasks-resolve-acme-solver.yaml
      vars:
        label_name: cilium-hubble-init
        cluster_issuer_name: "{{ cilium_hubble_ui_cluster_issuer_name }}"
        ingress_class_name: "{{ cilium_hubble_ui_ingress_class_name }}"
        acme_cluster_issuer_result_var: "cilium_hubble_ui_acme_cluster_issuer"
        acme_solver_result_var: "cilium_hubble_ui_acme_solver"
        acme_pod_labels_result_var: "cilium_hubble_acme_solver_pod_labels"

    - name: "[cilium-hubble-pre] Copy chart to server"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "cilium-hubble-pre"
        chart_name: "pre"
        chart_local_src: "{{ project_root }}/playbook-app/charts/cilium-hubble/pre/"
        chart_remote_dest: "{{ remote_charts_dir }}/cilium-hubble/pre"
      tags: [pre]

    - name: "[cilium-hubble-pre] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/cilium-hubble/pre/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ cilium_namespace }}
          traefik:
            namespace: {{ traefik_namespace }}
          acmeSolverLabels: {{ cilium_hubble_acme_solver_pod_labels | to_json }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [pre]

    - name: "[cilium-hubble-pre] Install or upgrade via Helm"
      command: >
        helm upgrade --install cilium-hubble-pre {{ remote_charts_dir }}/cilium-hubble/pre
        --namespace {{ cilium_namespace }}
        --values {{ remote_charts_dir }}/cilium-hubble/pre/values-override.yaml
        --cleanup-on-fail
        --atomic
        --wait
        --timeout {{ cilium_hubble_helm_timeout | default('2m') }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [pre]

    # =========================================================================
    # STEP 2: CILIUM-HUBBLE/INSTALL (Certificate + Ingress)
    # =========================================================================

    - name: "[cilium-hubble-install] Copy chart to server"
      include_tasks: tasks/tasks-copy-chart.yaml
      vars:
        label_name: "cilium-hubble-install"
        chart_name: "install"
        chart_local_src: "{{ project_root }}/playbook-app/charts/cilium-hubble/install/"
        chart_remote_dest: "{{ remote_charts_dir }}/cilium-hubble/install"
      tags: [install]

    - name: "[cilium-hubble-install] Create values file"
      copy:
        dest: "{{ remote_charts_dir }}/cilium-hubble/install/values-override.yaml"
        mode: "0644"
        content: |
          namespace: {{ cilium_namespace }}

          hubbleUi:
            domain: {{ cilium_hubble_ui_domain }}
            clusterIssuer: {{ cilium_hubble_ui_cluster_issuer_name }}
            ingressClass: {{ cilium_hubble_ui_ingress_class_name }}
            entryPoints:
              web: {{ traefik_web_entrypoint }}
              websecure: {{ traefik_websecure_entrypoint }}
            secretName: {{ cilium_hubble_ui_https_secret_name }}
            vpnOnlyEnabled: {{ cilium_hubble_ui_vpn_only_enabled }}
            httpEnable: {{ cilium_hubble_ui_http_enable }}
            httpsEnable: {{ cilium_hubble_ui_https_enable }}

          traefik:
            namespace: {{ traefik_namespace }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    - name: "[cilium-hubble-install] Install or upgrade via Helm"
      command: >
        helm upgrade --install cilium-hubble {{ remote_charts_dir }}/cilium-hubble/install
        --namespace {{ cilium_namespace }}
        --values {{ remote_charts_dir }}/cilium-hubble/install/values-override.yaml
        --cleanup-on-fail
        --atomic
        --wait
        --wait-for-jobs
        --timeout {{ cilium_hubble_helm_timeout | default('2m') }}
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [install]

    # =========================================================================
    # STEP 3: CILIUM-HUBBLE/POST (No resources)
    # =========================================================================

    - name: "[cilium-hubble-post] Skip - no post-install resources"
      debug:
        msg: "cilium-hubble/post: No resources to install"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [post]

    # =========================================================================
    # VERIFICATION
    # =========================================================================

    - name: "[cilium-hubble-verify] Get Cilium Hubble Helm releases"
      command: helm list -n {{ cilium_namespace }} -f cilium-hubble
      register: helm_list
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[cilium-hubble-verify] Print Helm releases"
      debug:
        msg: "{{ helm_list.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[cilium-hubble-verify] Get Cilium Hubble pods status"
      command: kubectl get pods -n {{ cilium_namespace }} -o wide
      register: hubble_pods
      changed_when: false
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[cilium-hubble-verify] Print Cilium Hubble pods status"
      debug:
        msg: "{{ hubble_pods.stdout_lines }}"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]

    - name: "[cilium-hubble-verify] Installation complete"
      debug:
        msg: "cilium-hubble: OK (Hubble UI available at https://{{ cilium_hubble_ui_domain }})"
      delegate_to: "{{ master_manager_fact }}"
      run_once: true
      tags: [always]
