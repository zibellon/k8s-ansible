all:
  vars:
    # ------
    # Teleport Configure — все CRD-ресурсы (via Teleport Operator)
    # main arrays — committed to git
    # extra arrays — for hosts-vars-override/, merged at runtime
    # ------

    # Roles (TeleportRoleV8)
    teleport_configure_roles:
      - name: superadmin
        labels: {}
        annotations: {}
        spec:
          allow:
            logins: [root, ubuntu, admin, ec2-user]
            node_labels:
              '*': ['*']
            kubernetes_groups: [system:masters]
            kubernetes_users: [admin]
            kubernetes_labels:
              '*': ['*']
            kubernetes_resources:
              - kind: '*'
                name: '*'
                namespace: '*'
                verbs: ['*']
                api_group: '*'
            db_labels:
              '*': ['*']
            db_names: ['*']
            db_users: ['*']
            app_labels:
              '*': ['*']
            rules:
              - resources: ['*']
                verbs: ['*']
          options:
            max_session_ttl: 30h0m0s
            forward_agent: true
            port_forwarding: true
            client_idle_timeout: "0"
            disconnect_expired_cert: false
            ssh_file_copy: true
    teleport_configure_roles_extra: []

    # Users (TeleportUser)
    teleport_configure_users:
      - name: superadmin
        labels: {}
        annotations: {}
        spec:
          roles: [superadmin]
          traits:
            logins: [root, ubuntu, admin, ec2-user]
            kubernetes_groups: [system:masters]
            kubernetes_users: [admin]
            db_names: ['*']
            db_users: ['*']
    teleport_configure_users_extra: []

    # Bots (TeleportBotV1)
    teleport_configure_bots: []
    teleport_configure_bots_extra: []

    # Provision Tokens (TeleportProvisionToken)
    teleport_configure_provision_tokens: []
    teleport_configure_provision_tokens_extra: []

    # Apps (TeleportAppV3)
    teleport_configure_apps: []
    teleport_configure_apps_extra: []

    # Databases (TeleportDatabaseV3)
    teleport_configure_databases: []
    teleport_configure_databases_extra: []

    # GitHub Connectors (TeleportGithubConnector)
    teleport_configure_github_connectors: []
    teleport_configure_github_connectors_extra: []

    # OIDC Connectors (TeleportOIDCConnector)
    teleport_configure_oidc_connectors: []
    teleport_configure_oidc_connectors_extra: []

    # SAML Connectors (TeleportSAMLConnector)
    teleport_configure_saml_connectors: []
    teleport_configure_saml_connectors_extra: []

    # Access Lists (TeleportAccessList)
    teleport_configure_access_lists: []
    teleport_configure_access_lists_extra: []

    # Trusted Clusters (TeleportTrustedClusterV2)
    teleport_configure_trusted_clusters: []
    teleport_configure_trusted_clusters_extra: []

    # Login Rules (TeleportLoginRule)
    teleport_configure_login_rules: []
    teleport_configure_login_rules_extra: []

    # Access Monitoring Rules (TeleportAccessMonitoringRuleV1)
    teleport_configure_access_monitoring_rules: []
    teleport_configure_access_monitoring_rules_extra: []

    # Okta Import Rules (TeleportOktaImportRule)
    teleport_configure_okta_import_rules: []
    teleport_configure_okta_import_rules_extra: []

    # OpenSSH Servers (TeleportOpenSSHServerV2)
    teleport_configure_openssh_servers: []
    teleport_configure_openssh_servers_extra: []

    # OpenSSH EICE Servers (TeleportOpenSSHEICEServerV2)
    teleport_configure_openssh_eice_servers: []
    teleport_configure_openssh_eice_servers_extra: []

    # Workload Identities (TeleportWorkloadIdentityV1)
    teleport_configure_workload_identities: []
    teleport_configure_workload_identities_extra: []

    # Inference Models (TeleportInferenceModel)
    teleport_configure_inference_models: []
    teleport_configure_inference_models_extra: []

    # Inference Policies (TeleportInferencePolicy)
    teleport_configure_inference_policies: []
    teleport_configure_inference_policies_extra: []

    # Inference Secrets (TeleportInferenceSecret)
    teleport_configure_inference_secrets: []
    teleport_configure_inference_secrets_extra: []

    # AutoUpdate Configs (TeleportAutoUpdateConfigV1)
    teleport_configure_autoupdate_configs: []
    teleport_configure_autoupdate_configs_extra: []

    # AutoUpdate Versions (TeleportAutoUpdateVersionV1)
    teleport_configure_autoupdate_versions: []
    teleport_configure_autoupdate_versions_extra: []
