all:
  vars:
    teleport_namespace: "teleport"
    # Cluster identity (clusterName = FQDN, immutable після першого деплоя!)
    teleport_cluster_name: "{{ teleport_domain }}"
    teleport_kube_cluster_name: "drawapp-k8s-v2" # Название кластера внутри Teleport. Любое произвольное название
    # Networking / Ingress
    teleport_domain: "teleport-k8s-v2.drawapp.ru"
    teleport_external_url: "https://teleport-k8s-v2.drawapp.ru"
    teleport_tls_secret_name: "cert-teleport"
    teleport_ingress_class_name: "traefik-lb"
    teleport_vpn_only_enabled: false
    teleport_web_port: 3080
    teleport_web_listen_addr: "0.0.0.0:{{ teleport_web_port }}"
    # Used in teleport-ssh-agent-install.yaml
    teleport_web_public_addr: "{{ teleport_cluster_name }}:443"
    # SSH / tunnel ports (HAProxy TCP NodePort)
    teleport_ssh_port: 3023
    teleport_ssh_listen_addr: "0.0.0.0:{{ teleport_ssh_port }}"
    teleport_reverse_tunnel_port: 3024 # Другой телепорт или агент подключается к ЭТОМУ teleport. Другой - под NAT, и этот не может до него достучаться
    teleport_reverse_tunnel_listen_addr: "0.0.0.0:{{ teleport_reverse_tunnel_port }}"
    teleport_internal_connect_port: 3025 # Auth-server общается с Proxy-server
    teleport_kube_listen_port: 3026
    teleport_kube_listen_addr: "0.0.0.0:{{ teleport_kube_listen_port }}"
    teleport_kube_public_addr: "{{ teleport_cluster_name }}:{{ teleport_kube_listen_port }}"
    # cert-manager Issuer (per-component, namespaced) — единый объект {enabled, body}.
    # enabled: true  → Issuer + solver-NetworkPolicies (pre); Certificate доступен (post).
    # enabled: false → ни Issuer, ни solver-NP, ни Certificate.
    teleport_acme_server: "https://acme-v02.api.letsencrypt.org/directory"
    teleport_acme_email: "some-email-123@gmail.com"
    teleport_acme_solvers:
      - http01:
          ingress:
            ingressClassName: "traefik-lb"
            ingressTemplate:
              metadata:
                annotations:
                  "kubernetes.io/ingress.class": "traefik-lb"
                  "traefik.ingress.kubernetes.io/router.entrypoints": "web"
            podTemplate:
              metadata:
                labels:
                  app.kubernetes.io/name: acme-solver
                  app.kubernetes.io/instance: traefik-lb
                  app.kubernetes.io/component: acme-http01-solver
                  app.kubernetes.io/managed-by: cert-manager
    teleport_cert_manager_issuer_enabled: true
    teleport_cert_manager_issuer:
      enabled: "{{ teleport_cert_manager_issuer_enabled }}"
      body:
        name: "teleport-acme"
        spec:
          acme:
            server: "{{ teleport_acme_server }}"
            email: "{{ teleport_acme_email }}"
            privateKeySecretRef:
              name: "teleport-acme-account-key"
            solvers: "{{ teleport_acme_solvers }}"
    # Ingress config (per-domain) — независимые toggle'ы ingress / certificate.
    # 1 domain === 1 ingress_config. teleport — 1 домен (web UI).
    teleport_ingress_enabled: true
    teleport_ingress_tls_enabled: true
    teleport_ingress_certificate_enabled: true
    teleport_ingress_config:
      domain: "{{ teleport_domain }}"
      tlsSecretName: "{{ teleport_tls_secret_name }}"
      ingress:
        enabled: "{{ teleport_ingress_enabled }}"
        ingressClass: "{{ teleport_ingress_class_name }}"
        tlsEnabled: "{{ teleport_ingress_tls_enabled }}"
        vpnOnlyEnabled: "{{ teleport_vpn_only_enabled }}"
        vpnIngressRouteMiddlewares: "{{ vpn_ingress_route_middlewares }}"
      certificate:
        enabled: "{{ teleport_ingress_certificate_enabled }}"
    # ---
    # --- PHASE: pre ---
    # Timeouts
    teleport_pre_helm_timeout: "5m"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    teleport_pre_extra_objects: []
    # Pre-phase kustomize patches (operator-side customization, default empty)
    teleport_pre_kustomize_patches: []
    # Pre-phase values (NetworkPolicies chart)
    teleport_pre_helm_values:
      namespace: "{{ teleport_namespace }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        instanceName: "traefik-{{ traefik_namespace }}"
      haproxy:
        namespace: "{{ haproxy_namespace }}"
      teleport:
        webPort: "{{ teleport_web_port }}"
        sshPort: "{{ teleport_ssh_port }}"
        reverseTunnelPort: "{{ teleport_reverse_tunnel_port }}"
        internalConnectPort: "{{ teleport_internal_connect_port }}"
        kubeApiPort: "{{ teleport_kube_listen_port }}"
        vpnOnlyEnabled: "{{ teleport_vpn_only_enabled }}"
        vpnIps: "{{ vpn_ips }}"
      issuer: "{{ teleport_cert_manager_issuer }}"
      extraObjects: "{{ teleport_pre_extra_objects }}"
    # ---
    # --- PHASE: install ---
    teleport_install_helm_timeout: "10m"
    teleport_rollout_timeout: "300s"
    # Helm repository - источник chart (переопределить в hosts-vars-override/ для airgap)
    teleport_helm_is_oci: false
    teleport_helm_url: "https://charts.releases.teleport.dev"
    teleport_helm_repo_name: "teleport"
    teleport_helm_chart_name: "teleport-cluster"
    teleport_helm_chart_version: "18.8.2"
    # SQLite data directory (Longhorn PVC)
    teleport_data_storage_class: "lnstr-major-local"
    teleport_data_storage_size: "10Gi"
    # ВАЖНО: tag для teleport-distroless / teleport-operator НЕ задаётся —
    # teleport-cluster chart автоматически подставляет appVersion (= teleport_helm_chart_version)
    # через helper {{ include "teleport-cluster.version" . }}.
    # Т.е. обновление версии Teleport = bump teleport_helm_chart_version.
    # --- Operator-overridable blocks (extracted from teleport_helm_values) ---
    teleport_helm_values_chart_mode: standalone
    teleport_helm_values_proxy_listener_mode: separate
    teleport_helm_values_auth:
      teleportConfig:
        teleport:
          storage:
            type: sqlite
            sync: NORMAL
            journal: WAL
    teleport_helm_values_proxy:
      teleportConfig:
        proxy_service:
          public_addr: "{{ teleport_web_public_addr }}"
          web_listen_addr: "{{ teleport_web_listen_addr }}"
          listen_addr: "{{ teleport_ssh_listen_addr }}"
          tunnel_listen_addr: "{{ teleport_reverse_tunnel_listen_addr }}"
          kube_listen_addr: "{{ teleport_kube_listen_addr }}"
          kube_public_addr: "{{ teleport_kube_public_addr }}"
    teleport_helm_values_operator:
      enabled: true
      tolerations: []
      nodeSelector: {}
      affinity: {}
      resources: {}
    # --- round-4 blocks (extracted from teleport_helm_values) ---
    teleport_helm_values_persistence:
      enabled: true
      storageClassName: "{{ teleport_data_storage_class }}"
      volumeSize: "{{ teleport_data_storage_size }}"
    # ---------
    teleport_helm_values:
      clusterName: "{{ teleport_cluster_name }}"
      kubeClusterName: "{{ teleport_kube_cluster_name }}"
      chartMode: "{{ teleport_helm_values_chart_mode }}"
      proxyListenerMode: "{{ teleport_helm_values_proxy_listener_mode }}"
      persistence: "{{ teleport_helm_values_persistence }}"
      auth: "{{ teleport_helm_values_auth }}"
      proxy: "{{ teleport_helm_values_proxy }}"
      operator: "{{ teleport_helm_values_operator }}"
      log:
        format: json
      service:
        type: ClusterIP
      podMonitor:
        enabled: true
        interval: "30s"
        additionalLabels: {}
      tolerations: []
      nodeSelector: {}
      affinity: {}
      resources: {}
      ingress:
        enabled: false
    # ---
    # --- PHASE: post ---
    teleport_post_helm_timeout: "5m"
    teleport_web_service_port: 443
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    teleport_post_extra_objects: []
    # Post-phase kustomize patches (operator-side customization, default empty)
    teleport_post_kustomize_patches: []
    # Post-phase values (Ingress + HAProxy TCP chart)
    teleport_post_helm_values:
      namespace: "{{ teleport_namespace }}"
      issuer: "{{ teleport_cert_manager_issuer }}"
      ingressConfig: "{{ teleport_ingress_config }}"
      webServicePort: "{{ teleport_web_service_port }}"
      sshPort: "{{ teleport_ssh_port }}"
      reverseTunnelPort: "{{ teleport_reverse_tunnel_port }}"
      kubeApiPort: "{{ teleport_kube_listen_port }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        entryPoints:
          web: "{{ traefik_web_entrypoint }}"
          websecure: "{{ traefik_websecure_entrypoint }}"
      haproxy:
        namespace: "{{ haproxy_namespace }}"
        ingressClass: "{{ haproxy_ingress_class }}"
      extraObjects: "{{ teleport_post_extra_objects }}"
    # ---
    # --- PHASE: configure ---
    teleport_configure_helm_timeout: "5m"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    teleport_configure_extra_objects: []
    # Configure-phase kustomize patches (operator-side customization, default empty)
    teleport_configure_kustomize_patches: []
    # Configure-phase values (Teleport Operator CRDs chart)
    # Все teleport_configure_* переменные определены в hosts-vars/teleport-configure.yaml
    teleport_configure_helm_values:
      namespace: "{{ teleport_namespace }}"
      roles: "{{ teleport_configure_roles + teleport_configure_roles_extra }}"
      users: "{{ teleport_configure_users + teleport_configure_users_extra }}"
      bots: "{{ teleport_configure_bots + teleport_configure_bots_extra }}"
      provisionTokens: "{{ teleport_configure_provision_tokens + teleport_configure_provision_tokens_extra }}"
      apps: "{{ teleport_configure_apps + teleport_configure_apps_extra }}"
      databases: "{{ teleport_configure_databases + teleport_configure_databases_extra }}"
      githubConnectors: "{{ teleport_configure_github_connectors + teleport_configure_github_connectors_extra }}"
      oidcConnectors: "{{ teleport_configure_oidc_connectors + teleport_configure_oidc_connectors_extra }}"
      samlConnectors: "{{ teleport_configure_saml_connectors + teleport_configure_saml_connectors_extra }}"
      accessLists: "{{ teleport_configure_access_lists + teleport_configure_access_lists_extra }}"
      trustedClusters: "{{ teleport_configure_trusted_clusters + teleport_configure_trusted_clusters_extra }}"
      loginRules: "{{ teleport_configure_login_rules + teleport_configure_login_rules_extra }}"
      accessMonitoringRules: "{{ teleport_configure_access_monitoring_rules + teleport_configure_access_monitoring_rules_extra }}"
      oktaImportRules: "{{ teleport_configure_okta_import_rules + teleport_configure_okta_import_rules_extra }}"
      opensshServers: "{{ teleport_configure_openssh_servers + teleport_configure_openssh_servers_extra }}"
      opensshEiceServers: "{{ teleport_configure_openssh_eice_servers + teleport_configure_openssh_eice_servers_extra }}"
      workloadIdentities: "{{ teleport_configure_workload_identities + teleport_configure_workload_identities_extra }}"
      inferenceModels: "{{ teleport_configure_inference_models + teleport_configure_inference_models_extra }}"
      inferencePolicies: "{{ teleport_configure_inference_policies + teleport_configure_inference_policies_extra }}"
      inferenceSecrets: "{{ teleport_configure_inference_secrets + teleport_configure_inference_secrets_extra }}"
      autoupdateConfigs: "{{ teleport_configure_autoupdate_configs + teleport_configure_autoupdate_configs_extra }}"
      autoupdateVersions: "{{ teleport_configure_autoupdate_versions + teleport_configure_autoupdate_versions_extra }}"
      extraObjects: "{{ teleport_configure_extra_objects }}"

    # ---------
    # SSH-AGENT
    # ---------

    # Data directory on the node (config is always at /etc/teleport.yaml)
    teleport_ssh_agent_data_dir: "/var/lib/teleport"

    # Log level
    teleport_ssh_agent_log_level: "INFO"
