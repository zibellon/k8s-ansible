all:
  vars:
    # ------
    # binaries (AirGap) — downloadable packages
    # ------
    # 6 внешних бинарников тянутся с публичных источников на этапе
    # node-install.yaml (playbook-system/main-components.yaml,
    # install-helm.yaml, install-k9s.yaml). Каждый URL собирается как
    # `{{ <c>_download_host }}/<upstream-path>/{{ <c>_version }}/...`
    # Для airgap достаточно переопределить только `<c>_download_host`
    # в hosts-vars-override/k8s-base.yaml — путь соберётся автоматически.
    # Работает для passthrough-зеркал (reverse proxy с сохранением
    # upstream path). Если у mirror'а другая структура — переопределяй
    # `<c>_url` целиком.
    #
    # СБ должна подложить на mirror следующие 6 файлов:
    #   <containerd_download_host>/containerd/containerd/releases/download/v<ver>/containerd-<ver>-linux-amd64.tar.gz
    #   <containerd_service_download_host>/containerd/containerd/main/containerd.service
    #   <runc_download_host>/opencontainers/runc/releases/download/<ver>/runc.amd64
    #   <cni_plugins_download_host>/containernetworking/plugins/releases/download/<ver>/cni-plugins-linux-amd64-<ver>.tgz
    #   <helm_download_host>/helm-<ver>-linux-amd64.tar.gz
    #   <k9s_download_host>/derailed/k9s/releases/download/<ver>/k9s_linux_amd64.deb
    #
    # Пример airgap-override (hosts-vars-override/k8s-base.yaml):
    #   containerd_download_host:         "https://my-mirror.local/github.com"
    #   containerd_service_download_host: "https://my-mirror.local/raw.githubusercontent.com"
    #   runc_download_host:               "https://my-mirror.local/github.com"
    #   cni_plugins_download_host:        "https://my-mirror.local/github.com"
    #   helm_download_host:               "https://my-mirror.local/get.helm.sh"
    #   k9s_download_host:                "https://my-mirror.local/github.com"
    #
    # Альтернатива mirror'у — полностью офлайн (control machine без доступа в сеть):
    # Скачать 6 файлов заранее, положить в pkgs-sources/, переопределить в
    # hosts-vars-override/k8s-base.yaml:
    #   containerd_install_method:       "local_tarball"
    #   containerd_local_tarball_path:   "pkgs-sources/containerd-<ver>-linux-amd64.tar.gz"
    #   containerd_service_local_path:   "pkgs-sources/containerd.service"
    #   runc_install_method:             "local_file"
    #   runc_local_path:                 "pkgs-sources/runc.amd64"
    #   cni_plugins_install_method:      "local_tarball"
    #   cni_plugins_local_tarball_path:  "pkgs-sources/cni-plugins-linux-amd64-<ver>.tgz"
    #   helm_install_method:             "local_tarball"
    #   helm_local_tarball_path:         "pkgs-sources/helm-<ver>-linux-amd64.tar.gz"
    #   k9s_install_method:              "local_deb"
    #   k9s_local_deb_path:              "pkgs-sources/k9s_linux_amd64.deb"
    # ---------
    # ---------

    # LLVM/Clang version for Cilium eBPF
    llvm_version: 20

    # Kubernetes version (MAJOR.MINOR only, without patch)
    k8s_version: "1.35"

    # Kubernetes full version for kubeadm (with patch)
    k8s_full_version: "v1.35.3"

    # Kubeadm config path (used by init-cluster and update-apiserver-sans)
    kubeadm_config_path: "/etc/kubernetes/kubeadm-config.yaml"

    # Containerd version
    containerd_version: "2.2.2"
    containerd_download_host: "https://github.com"
    containerd_url: "{{ containerd_download_host }}/containerd/containerd/releases/download/v{{ containerd_version }}/containerd-{{ containerd_version }}-linux-amd64.tar.gz"
    containerd_service_download_host: "https://raw.githubusercontent.com"
    containerd_service_url: "{{ containerd_service_download_host }}/containerd/containerd/main/containerd.service"
    # Install method: "url" (default — download from containerd_url + containerd_service_url) or
    # "local_tarball" (offline; containerd_local_tarball_path for tarball,
    # containerd_service_local_path for .service — both relative to project_root,
    # kept in pkgs-sources/).
    containerd_install_method: "url"
    containerd_local_tarball_path: ""
    containerd_service_local_path: ""

    # Force regenerate containerd config (set to true to update config after containerd upgrade)
    force_containerd_config_regenerate: false

    # ------
    # Containerd registry mirror
    # ------
    # Containerd 2.x поддерживает special `_default` namespace в
    # `/etc/containerd/certs.d/` — содержимое `_default/hosts.toml`
    # применяется как fallback ко ВСЕМ registries, у которых нет
    # собственной dedicated dir. Это даёт ОДИН config, перехватывающий
    # запросы к docker.io / quay.io / gcr.io / ghcr.io / registry.k8s.io
    # / registry.gitlab.com / public.ecr.aws / любым другим — без
    # необходимости перечислять каждый.
    # Docs: https://github.com/containerd/containerd/blob/main/docs/hosts.md
    #
    # ## Базовый дефолт
    # По умолчанию `_default/hosts.toml` указывает на mirror.gcr.io
    # (публичный mirror Google Container Registry для docker.io) —
    # обходит docker.io rate limits на свежих узлах без дополнительной
    # настройки. При отсутствии образа в mirror'е containerd возвращается
    # к upstream registry (mirror + fallback). Если оператору нужен
    # другой mirror (локальный pull-through cache на Harbor / Zot /
    # docker `distribution` v2 с `proxy.remoteurl`) — переопределяет
    # `containerd_additional_configs` целиком в hosts-vars-override/k8s-base.yaml
    # (replace, не concat — см. variables.md §1.5).
    #
    # ## Несколько mirrors последовательно
    # Containerd идёт по `[host."..."]` блокам ПО ПОРЯДКУ объявления.
    # Если первый mirror не отдал образ — пробует второй, затем третий,
    # и т.д. После всех — fallback на upstream (для `_default` —
    # отсутствует, см. ниже). Пример цепочки mirror1 → mirror2:
    #
    #   [host."https://mirror.gcr.io"]
    #     capabilities = ["pull", "resolve"]
    #   [host."https://public.ecr.aws"]
    #     capabilities = ["pull", "resolve"]
    #
    # ## Strict mode (fail если ни один mirror не отдал образ)
    # Для `_default` namespace отсутствие верхнего `server = "..."`
    # означает: после всех `[host."..."]` блоков нет fallback'а на
    # upstream — pull завершается ошибкой. Это даёт config-level
    # AirGap-режим без сетевых ограничений.
    #
    # Каждая entry — dict с двумя ключами: dirName (имя поддиректории
    # в /etc/containerd/certs.d/) + content (содержимое hosts.toml).
    containerd_additional_configs:
      - dirName: "_default"
        content: |
          [host."https://mirror.gcr.io"]
            capabilities = ["pull", "resolve"]

    # runc version
    runc_version: "v1.4.2"
    runc_download_host: "https://github.com"
    runc_url: "{{ runc_download_host }}/opencontainers/runc/releases/download/{{ runc_version }}/runc.amd64"
    # Install method: "url" (default — download from runc_url) or
    # "local_file" (offline, path relative to project_root, file kept in pkgs-sources/).
    runc_install_method: "url"
    runc_local_path: ""

    # CNI plugins version
    cni_plugins_version: "v1.9.1"
    cni_plugins_download_host: "https://github.com"
    cni_plugins_url: "{{ cni_plugins_download_host }}/containernetworking/plugins/releases/download/{{ cni_plugins_version }}/cni-plugins-linux-amd64-{{ cni_plugins_version }}.tgz"
    # Install method: "url" (default — download from cni_plugins_url) or
    # "local_tarball" (offline, path relative to project_root, file kept in pkgs-sources/).
    cni_plugins_install_method: "url"
    cni_plugins_local_tarball_path: ""

    # Helm version
    helm_version: "v3.20.2"
    helm_download_host: "https://get.helm.sh"
    helm_url: "{{ helm_download_host }}/helm-{{ helm_version }}-linux-amd64.tar.gz"
    # Install method: "url" (default — download from helm_url) or
    # "local_tarball" (offline, path relative to project_root, file kept in pkgs-sources/).
    helm_install_method: "url"
    helm_local_tarball_path: ""

    # k9s version
    k9s_version: "v0.50.18"
    k9s_download_host: "https://github.com"
    k9s_url: "{{ k9s_download_host }}/derailed/k9s/releases/download/{{ k9s_version }}/k9s_linux_amd64.deb"
    # Install method: "url" (default — download from k9s_url) or
    # "local_deb" (offline, path relative to project_root, file kept in pkgs-sources/).
    k9s_install_method: "url"
    k9s_local_deb_path: ""

    # Cluster networking
    service_subnet: "10.128.0.0/12"
    pod_subnet: "10.64.0.0/10"
    cluster_dns_domain: "cluster.local"
    node_port_start: 1
    node_port_end: 50000

    # kube-controller-manager settings
    node_monitor_grace_period: "30s" # default: 40s (for faster node failure detection)

    # Node drain settings
    node_drain_timeout: "10m"

    # Watchdog (softdog) for medik8s
    softdog_timeout: 30 # seconds before reboot if not pinged

    # APT repository packages (required for adding k8s repo)
    apt_repo_package_list:
      - apt-transport-https
      - ca-certificates
      - curl
      - gpg

    # Kubernetes packages
    k8s_package_list:
      - kubelet
      - kubeadm
      - kubectl

    # Kubernetes base kernel modules
    k8s_module_list:
      - overlay
      - br_netfilter

    # Kubernetes sysctl parameters (all must be = 1)
    k8s_sysctl_list:
      - net.bridge.bridge-nf-call-iptables
      - net.bridge.bridge-nf-call-ip6tables
      - net.ipv4.ip_forward

    # Longhorn kernel modules
    longhorn_modules:
      - iscsi_tcp
      - dm_crypt

    # Longhorn packages install method: "apt" (default — standard Ubuntu repos)
    # or "local_deb" (offline; paths relative to project_root, files kept in
    # pkgs-sources/). In local_deb mode longhorn_local_deb_path_list is
    # positionally paired with longhorn_packages (same length AND same order).
    longhorn_install_method: "apt"
    longhorn_packages:
      - open-iscsi
      - nfs-common
      - cryptsetup
      - dmsetup
      - libcryptsetup12
    longhorn_local_deb_path_list: []

    # Cilium kernel modules (ALL are critical)
    cilium_modules:
      - cls_bpf
      - sch_ingress
      - udp_tunnel
      - ip6_udp_tunnel
      - geneve
      - vxlan
      - algif_hash
      - af_alg
      - sch_fq
      - ip_set
      - ip_set_hash_ip
      - xt_set
      - xt_comment
      - xt_TPROXY
      - xt_CT
      - xt_mark
      - xt_socket
      - xfrm_algo
      - xfrm_user
      - esp4
      - esp6
      - ipcomp
      - ipcomp6
      - xfrm4_tunnel
      - xfrm6_tunnel
      - tunnel4
      - tunnel6

    # ------
    # HAProxy API Server LB (linux service)
    # ------
    haproxy_apiserver_lb_package_version: "3.3"
    haproxy_apiserver_lb_host: "127.0.0.1"
    haproxy_apiserver_lb_port: 16443
    haproxy_apiserver_lb_healthz_port: 16444
    # Install method: "ppa" (default — vbernat PPA) or "local_deb" (offline,
    # path relative to project_root, file kept in pkgs-sources/).
    haproxy_apiserver_lb_install_method: "ppa"
    haproxy_apiserver_lb_local_deb_path: ""

    # ETCD encryption at rest
    etcd_encryption_resources:
      - secrets
      - configmaps
    etcd_encryption_config_path: "/etc/kubernetes/pki/encryption-config.yaml"
    # ETCD key rotation state files
    etcd_rotation_state_dir: "/etc/kubernetes/pki"
    etcd_rotation_state_step1: "{{ etcd_rotation_state_dir }}/rotation-state-step1.yaml"
    etcd_rotation_state_step2: "{{ etcd_rotation_state_dir }}/rotation-state-step2.yaml"
    etcd_rotation_state_step4: "{{ etcd_rotation_state_dir }}/rotation-state-step4.yaml"

    # Kubelet logging
    kubelet_container_log_max_size: "100Mi"
    kubelet_container_log_max_files: 5

    # CrashLoopBackOff max backoff (1s - 300s) (default 300s = 5min)
    kubelet_crashloop_max_backoff: "2m"

    # ------
    # Kubelet Image Garbage Collection
    # Очистка неиспользуемых Docker/containerd images
    # Docs: https://kubernetes.io/docs/concepts/cluster-administration/kubelet-garbage-collection/
    # ------
    # Процент использования диска, при котором НАЧИНАЕТСЯ очистка images (default: 85)
    kubelet_image_gc_high_threshold: 85
    # Процент использования диска, до которого очищать images (default: 80)
    kubelet_image_gc_low_threshold: 75
    # Минимальное время с последнего использования image перед удалением (default: 2m)
    kubelet_image_minimum_gc_age: "5m"

    # ------
    # Kubelet Eviction — Soft Thresholds
    # Отложенное удаление pods с grace period (SIGTERM)
    # Срабатывает раньше hard, даёт время на graceful shutdown
    # Если soft eviction не нужен — установить: kubelet_eviction_soft: {}
    # ------
    kubelet_eviction_soft:
      # Минимум свободной RAM для soft eviction (default: не установлен)
      memory.available: "1Gi"
      # Минимум свободного места на root filesystem (default: не установлен)
      nodefs.available: "15%"
      # Минимум свободного места для images (default: не установлен)
      imagefs.available: "15%"
    # ------
    # Kubelet Eviction — Soft Grace Periods
    # Время ожидания перед началом eviction (если ресурс не восстановился)
    # ------

    # Grace periods для soft eviction
    kubelet_eviction_soft_grace_period:
      memory.available: "2m"
      nodefs.available: "2m"
      imagefs.available: "2m"

    # ------
    # Kubelet Eviction — Hard Thresholds
    # Немедленное удаление pods при критической нехватке ресурсов (SIGKILL)
    # Docs: https://kubernetes.io/docs/concepts/scheduling-eviction/node-pressure-eviction/
    # ------
    kubelet_eviction_hard:
      # Минимум свободной RAM, иначе eviction pods (default: 100Mi)
      memory.available: "500Mi"
      # Минимум свободного места на root filesystem (default: 10%)
      nodefs.available: "10%"
      # Минимум свободных inodes на root filesystem (default: 5%)
      nodefs.inodesFree: "5%"
      # Минимум свободного места для images (default: 15%)
      imagefs.available: "10%"
      # Минимум свободных PID, защита от fork bomb (default: не установлен)
      pid.available: "1000"

    # ------
    # CRDs wait configuration (shared for all apps)
    # ------
    crds_wait:
      timeout: "60s"
      retries: 30
      delay: 5

    secret_wait:
      retries: 30
      delay: 5

    rollout_wait:
      retries: 30
      delay: 5

    # ------
    # Async Helm upgrade configuration (shared for all apps)
    # Resilient to SSH disconnects during long helm upgrade operations
    # ------
    helm_async:
      timeout: 1800    # 30 minutes — max execution time per command
      poll: 5          # 5 seconds — polling interval
      # retries: 360     # (1800 / 5) — number of status checks
      # delay: 5         # 5 seconds — delay between checks

    # ------
    # Async system playbook configuration (shared for all long-running
    # imperative tasks in playbook-system/: kubeadm init/join, node drain,
    # LLVM install, etc.). Resilient to SSH disconnects during long ops.
    # ------
    system_async:
      timeout: 900     # 15 minutes — max wall-clock per remote job
      poll: 10         # 10 seconds — async_status polling interval
      # retries derived per use-site as (timeout / poll) → 90
