all:
  vars:
    # =============================================================================
    # SeaweedFS Sync — declarative source-of-truth для managed policies, identities, buckets
    # =============================================================================
    # Этот файл потребляется:
    #   - playbook-app/seaweedfs-install.yaml — bootstrap admin identity (читает
    #     seaweedfs_identities entry где actions=['Admin']).
    #   - playbook-app/seaweedfs-install.yaml — sync через
    #     --tags policy-sync/user-sync/identity-distribute/bucket-sync.
    #
    # Архитектура filer-driven IAM (v14→v18; см. .claude/rules/components.md §17.5):
    #   Layer P: Managed policies (seaweedfs_managed_policies) → weed shell s3.policy
    #            -put/-delete → filer /etc/iam/policies/<n>.json. Прикрепляются к
    #            identities через identity.policy_names (identity-based access).
    #   Layer 1: Identities → weed shell s3.configure -apply → filer /etc/iam/identities/<n>.json
    #            (live-reload, без рестарта S3; filer = источник истины, нет Vault key-store).
    #            Доступ: actions=[] + policy_names=[<p>].
    #   Layer 3: Identity credentials distribution → произвольные дополнительные
    #            Vault paths (через identity.extra_vault_paths, SECTION 2 schema),
    #            ConfigMap-tracked diff sync.
    #   Layer 2: Buckets + quotas + owner → filer Postgres metadata (weed shell
    #            s3.bucket.create -owner / s3.bucket.quota / fs.configure; owner immutable).
    #
    # base arrays — committed (admin + anonymous identities в seaweedfs_identities).
    # _extra arrays — для hosts-vars-override/, merged at runtime через `+ (var | default([]))`.
    # =============================================================================

    # ------
    # S3 identity credentials generation (consumed by seaweedfs_identities_to_create)
    # ------
    # AK/SK длины и charset'ы для generation новых identity credentials. Используются
    # ТОЛЬКО при CREATE новой identity (in target, not in filer yet). Для existing
    # identities — creds preserved в filer (не трогаются).
    seaweedfs_sync_access_key_length: 20
    seaweedfs_sync_secret_key_length: 40
    seaweedfs_sync_access_key_charset: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"
    seaweedfs_sync_secret_key_charset: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789"

    # ------
    # SECTION 1: Managed policies (Layer P)
    # ------
    # SeaweedFS managed IAM policies — named AWS-style policy documents, хранятся в filer
    # (weed shell s3.policy -put/-delete → /etc/iam/policies/<n>.json). Прикрепляются к
    # identities через identity.policy_names (SECTION 2). Identity-based access model:
    # права на identity (через attached managed policy), НЕ на bucket (v14 — bucket policies
    # удалены). Sync (--tags policy-sync) читает текущее состояние из живого filer
    # (`s3.policy -list`) и приводит к target: put changed/new (semantic doc-compare,
    # order-insensitive — только changed/new) + delete стейл. ConfigMap-state не используется (v17+).
    #
    # Granularity: одна policy на consumer (gitlab-rw покрывает все бакеты gitlab) —
    # см. .claude/rules/secrets-and-eso.md §11 (v14).
    #
    # Schema per policy:
    #   name:     policy name (ссылается из identity.policy_names) — required non-empty string.
    #   document: AWS IAM policy document {Version, Statement: [...]} — required non-empty mapping.
    #     Statement[].Sid:      OPTIONAL human-readable label (метка statement'а; на доступ не влияет).
    #     Statement[].Effect:   "Allow" (только Allow; explicit Deny блокирует и admin).
    #     Statement[].Action:   list S3 actions ("s3:GetObject", "s3:*", ...).
    #     Statement[].Resource: bucket ARN(s) — "arn:aws:s3:::<bucket>" + "arn:aws:s3:::<bucket>/*".
    #     Principal НЕ нужен — policy прикрепляется к identity (principal = эта identity).
    # ------
    seaweedfs_managed_policies: []
    seaweedfs_managed_policies_extra: []
    # Пример operator extension (для hosts-vars-override/seaweedfs-sync.yaml):
    # seaweedfs_managed_policies_extra:
    #   - name: team-alpha-rw
    #     document:
    #       Version: "2012-10-17"
    #       Statement:
    #         - Sid: "TeamAlphaFullAccess"
    #           Effect: "Allow"
    #           Action: ["s3:*"]
    #           Resource:
    #             - "arn:aws:s3:::team-alpha"
    #             - "arn:aws:s3:::team-alpha/*"
    # ------
    # --- Pre-built opt-in для GitLab + GitLab-Runner + Loki managed policies ---
    # Раскомментируйте вместе с identity (SECTION 2) + bucket (SECTION 3) opt-in блоками.
    # Одна policy на consumer (gitlab-rw покрывает все 5 GitLab бакетов).
    # seaweedfs_managed_policies_extra:
    #   - name: gitlab-rw
    #     document:
    #       Version: "2012-10-17"
    #       Statement:
    #         - Sid: "GitLabFullAccess"
    #           Effect: "Allow"
    #           Action: ["s3:GetObject", "s3:PutObject", "s3:DeleteObject", "s3:ListBucket", "s3:GetBucketLocation"]
    #           Resource:
    #             - "arn:aws:s3:::gitlab-registry"
    #             - "arn:aws:s3:::gitlab-registry/*"
    #             - "arn:aws:s3:::gitlab-artifacts"
    #             - "arn:aws:s3:::gitlab-artifacts/*"
    #             - "arn:aws:s3:::gitlab-uploads"
    #             - "arn:aws:s3:::gitlab-uploads/*"
    #             - "arn:aws:s3:::gitlab-packages"
    #             - "arn:aws:s3:::gitlab-packages/*"
    #             - "arn:aws:s3:::gitlab-backups"
    #             - "arn:aws:s3:::gitlab-backups/*"
    #   - name: gitlab-runner-rw
    #     document:
    #       Version: "2012-10-17"
    #       Statement:
    #         - Sid: "GitLabRunnerFullAccess"
    #           Effect: "Allow"
    #           Action: ["s3:GetObject", "s3:PutObject", "s3:DeleteObject", "s3:ListBucket", "s3:GetBucketLocation"]
    #           Resource:
    #             - "arn:aws:s3:::gitlab-runner-cache"
    #             - "arn:aws:s3:::gitlab-runner-cache/*"
    #   - name: loki-rw
    #     document:
    #       Version: "2012-10-17"
    #       Statement:
    #         - Sid: "LokiFullAccess"
    #           Effect: "Allow"
    #           Action: ["s3:GetObject", "s3:PutObject", "s3:DeleteObject", "s3:ListBucket", "s3:GetBucketLocation"]
    #           Resource:
    #             - "arn:aws:s3:::loki-logs"
    #             - "arn:aws:s3:::loki-logs/*"

    # ------
    # SECTION 2: Identities
    # ------
    # SeaweedFS S3 IAM identities — admin + per-user named principals + anonymous.
    # Sync (--tags user-sync) читает live filer (`s3.configure`) и приводит его к target
    # 4 фазами (filer = источник истины, нет Vault key-store): DELETE (in filer, not in
    # target → bare `-delete`, whole identity); CREATE (in target, not in filer → fresh
    # access_key 20 chars uppercase+digits + secret_key 40 chars letters+digits + full
    # actions/policies); GRANT (existing, add-delta target−filer); REVOKE (existing,
    # remove-delta filer−target, НИКОГДА bare -delete).
    #
    # Schema per identity:
    #   name:    SeaweedFS identity name. Используется в bucket.owner (SECTION 3) и как
    #            S3 credential identity. Special name 'anonymous' для public-read.
    #   actions: SeaweedFS-internal actions list.
    #            - admin:  ["Admin"] → bypass identity check (isAdmin()), доступ ко всему.
    #            - users:  [] + policy_names=[<p>] → identity-based access через attached
    #                        managed policy Allow (см. policy_names ниже; v14 model).
    #            - anonymous: [] (public-read через managed policy на anonymous, опционально).
    #   policy_names: OPTIONAL list of managed-policy names (из seaweedfs_managed_policies,
    #            SECTION 1) прикрепляемых к identity (weed shell s3.configure -policies=<csv>).
    #            Identity с actions=[] + policy_names=[<p>] = identity-based access. Пусто/
    #            отсутствует — без attached policies (нет доступа кроме admin bypass).
    #   extra_vault_paths: OPTIONAL list of full Vault paths (с mount engine prefix,
    #            например "eso-secret/gitlab/s3-storage" или "secret/team-alpha/creds").
    #            Sync (--tags identity-distribute) дополнительно доставляет identity
    #            credentials (читая из live filer s3.configure) в каждый указанный путь.
    #            Fixed Vault field keys (HARD-CODED, изменить нельзя):
    #              username   — identity name (например "alice")
    #              accessKey  — из filer s3.configure identities[].credentials[0].accessKey
    #              secretKey  — из filer s3.configure identities[].credentials[0].secretKey
    #            Distribute идёт через per-item state ConfigMaps
    #            seaweedfs-sync-identity-distributions-<identity> (по одному на identity,
    #            label seaweedfs-sync-state=identity-distributions) в namespace seaweedfs
    #            (diff-based: removed paths → vault-delete; target paths → vault-put full-replace).
    #            Anonymous identity с непустым extra_vault_paths → fail на sync
    #            (нет creds для distribute).
    #            Если поле отсутствует или [] — distribute для этой identity не выполняется.
    #
    # Admin safety guard в sync playbook: warning если в target identities нет
    # ни одной entry с actions=['Admin'] (защита от accidental lockout).
    # ------
    # Admin identity — отдельная переменная для устранения hardcoded 'admin' в коде.
    # Operator может переопределить name через hosts-vars-override/seaweedfs-sync.yaml.
    seaweedfs_identity_admin:
      name: admin
      actions: ["Admin"]

    seaweedfs_identities:
      - "{{ seaweedfs_identity_admin }}"
      - name: anonymous
        actions: []
    seaweedfs_identities_extra: []
    # Пример operator extension (для hosts-vars-override/seaweedfs-sync.yaml):
    # seaweedfs_identities_extra:
    #   - name: alice
    #     actions: []
    #     policy_names: ["team-alpha-rw"]   # attached managed policy (SECTION 1)
    #     extra_vault_paths:
    #       - "eso-secret/gitlab/s3-storage"
    #       - "secret/team-alpha/s3-creds"
    #   - name: bob
    #     actions: []
    #     # без policy_names — нет доступа; без extra_vault_paths — distribute не выполняется

    # ------
    # --- Pre-built opt-in для GitLab + GitLab-Runner identities ---
    # Если используете SeaweedFS как S3 backend для GitLab / gitlab-runner — раскомментируйте
    # этот блок в своём hosts-vars-override/seaweedfs-sync.yaml. Это создаст identities
    # 'gitlab' + 'gitlab-runner', distribute их creds в Vault через identity-distribute
    # в paths из gitlab/gitlab-runner inventory ESO secrets (variable references — single
    # source of truth, не hardcode). Альтернатива: внешнее S3 (cloud) — operator вручную
    # делает 'vault kv put' для тех же resolved путей.
    # seaweedfs_identities_extra:
    #   - name: gitlab
    #     actions: []                       # identity-based: доступ через managed policy
    #     policy_names: ["gitlab-rw"]       # attach managed policy (SECTION 1 opt-in)
    #     extra_vault_paths:
    #       - "{{ eso_vault_integration_gitlab.kv_engine_path }}{{ gitlab_secret_s3_creds.vault_path }}"
    #   - name: gitlab-runner
    #     actions: []
    #     policy_names: ["gitlab-runner-rw"]
    #     extra_vault_paths:
    #       - "{{ eso_vault_integration_gitlab_runner.kv_engine_path }}{{ gitlab_runner_secret_s3_creds.vault_path }}"
    # ------
    # --- Pre-built opt-in для Loki (mon-system) identity ---
    # Если используете SeaweedFS как S3 backend для Loki — раскомментируйте этот блок
    # (объедините с gitlab-блоком выше в ОДИН seaweedfs_identities_extra, если нужны оба).
    # Создаёт identity 'loki', distribute её creds в Vault path из mon-system ESO secret
    # (variable reference — single source of truth). Альтернатива: внешний S3 — operator
    # вручную делает 'vault kv put' для того же resolved пути.
    # seaweedfs_identities_extra:
    #   - name: loki
    #     actions: []                       # identity-based: доступ через managed policy
    #     policy_names: ["loki-rw"]         # attach managed policy (SECTION 1 opt-in)
    #     extra_vault_paths:
    #       - "{{ eso_vault_integration_mon_system.kv_engine_path }}{{ mon_system_secret_loki_s3_creds.vault_path }}"

    # ------
    # SECTION 3: Buckets + quotas + owner
    # ------
    # S3 buckets + per-bucket SeaweedFS-native quotas + owner. Доступ к данным — через
    # managed policy на identity (SECTION 1+2), НЕ через bucket (v14 — bucket policies удалены).
    # Sync (--tags bucket-sync) читает текущее состояние напрямую из живого filer
    # (fs.configure + s3.bucket.list) и diff'ит vs target (seaweedfs_sync_buckets + _extra).
    # filer = единственный источник истины; ConfigMap-state для bucket не используется (v17+).
    #
    # Sync flow (--tags bucket-sync; фактический порядок — tasks-seaweedfs-bucket-sync.yaml):
    #   READ. fs.configure + s3.bucket.list (живой filer) → текущее состояние.
    #   ASSERT. immutable (owner/replication/rack/dataCenter) на kept buckets → fail-fast до Phase A.
    #   A. DELETE стейл buckets (filer не в target): 's3.bucket.delete -name=<n>'.
    #   B. CREATE new buckets (target не в filer): 's3.bucket.create -name=<n> -owner=<owner>'.
    #   C. fs.configure для new buckets: '-replication=<r> -rack=<rk> -dataCenter=<dc> -apply' (все три всегда).
    #   D. QUOTA upsert (target с quota_size, чья квота ≠ filer — diff vs s3.bucket.list quota:): 's3.bucket.quota -op=set -sizeMB=<X>' (unchanged скипаются).
    #   E. QUOTA delete (target без quota_size, у кого в filer квота ЕСТЬ): 's3.bucket.quota -op=remove' (unlimited; уже-без-квоты скипаются).
    #
    # NOTE про bucket delete: в SeaweedFS shell command 's3.bucket.delete' нет
    # флага -force. Команда сама по себе делает hard delete — CollectionDelete
    # напрямую через master (sweeps все volumes/objects bucket'а) + filer_pb.Remove
    # (sweeps bucket record). Bucket с объектами удаляется без жалоб.
    # Единственное препятствие — Object Lock с locked objects (s3_objectlock check).
    #
    # Quota enforcement: нативный в SeaweedFS 4.31+ — s3-gateway сам переключает bucket
    # read-only в обе стороны (~раз в минуту, leader-locked на одной из реплик), без
    # внешнего крона. Источник: weed/s3api/bucket_size_metrics.go (enforceBucketQuotas).
    # bucket-sync Phase D/E только ЗАДАЁТ/снимает квоты (s3.bucket.quota -op=set / -op=remove); энфорсит gateway.
    #
    # Schema per bucket:
    #   name:        bucket name (DNS-compatible, lower-case) — required.
    #   owner:       SeaweedFS identity name — owner бакета (s3.bucket.create -owner) — REQUIRED.
    #                Owner видит бакет в ListBuckets + владеет объектами. Доступ к данным —
    #                через managed policy identity (owner НЕ влияет на policy-check).
    #                IMMUTABLE post-creation (см. блок IMMUTABLE ниже): смена owner на
    #                существующем бакете → sync fail-fast.
    #   rack:        REQUIRED string — preferred volume tier (SeaweedFS rack axis).
    #                Допустимые = rack-метки volume-групп из hosts-vars/seaweedfs.yaml
    #                (по конвенции 'managers-1' / 'workers-1'). SOFT preference: при заполнении
    #                тира SeaweedFS спилит на другой (altRequest fallback). IMMUTABLE post-creation.
    #   dataCenter:  REQUIRED string — preferred DC (SeaweedFS dataCenter axis). Сейчас
    #                кластер одно-DC ('dc-1'). SOFT preference. IMMUTABLE post-creation.
    #   replication: SeaweedFS replication code — REQUIRED 3-digit string '^[0-9]{3}$'.
    #                Format XYZ: X=other DCs, Y=other racks (same DC), Z=other servers (same rack).
    #                Total copies = 1 + sum digits. Examples: '000' (no rep), '001' (+1 same rack),
    #                '100' (+1 other DC), '205' (8 total copies). Same fs.configure command (combined).
    #                ВНИМАНИЕ при rack-преференсе: используй формат 00Z (реплики в том же
    #                тире, e.g. '001'), НЕ 0Y0 ('010') — иначе копия форсится в другой тир,
    #                ломая rack-преференс. Лимиты: workers до '004' (5 нод), managers до '002' (3).
    #   IMPORTANT — owner, replication, rack, dataCenter immutable post-creation:
    #                Change post-create технически работает (fs.configure applies к новым writes),
    #                НО existing data остаётся в old configuration → data fragmentation.
    #                Sync code FAIL-FAST если ЛЮБОЕ из immutable полей changed vs filer:
    #                assert после compute calls, до Phase A → sync aborts, cluster intact.
    #                To resolve: revert inventory к filer values OR delete+recreate bucket manually.
    #   quota_size:  OPTIONAL human-readable size string (e.g. "100GiB", "5TiB").
    #                Задан + валиден → set quota (s3.bucket.quota -op=set -sizeMB=<X>).
    #                Отсутствует     → remove quota (-op=remove → unlimited).
    #                Невалиден (плохой суффикс / не целое / не положительное) → sync FAIL-FAST.
    #                Поддерживаемые единицы: MiB / GiB / TiB.
    #                NOTE: снятие квоты с бакета, уже переключённого в read-only прошлым
    #                превышением, НЕ снимает read-only автоматически (SeaweedFS оставляет
    #                вручную-запертый бакет запертым) — снимай вручную при необходимости.
    # ------
    seaweedfs_sync_buckets: []
    seaweedfs_sync_buckets_extra: []
    # Пример operator extension (для hosts-vars-override/seaweedfs-sync.yaml):
    # seaweedfs_sync_buckets_extra:
    #   - name: bucket-1
    #     owner: "alice"       # SeaweedFS identity (REQUIRED, IMMUTABLE), access через её managed policy
    #     replication: "001"   # +1 копия в том же тире
    #     rack: "workers-1"    # preferred tier (soft), IMMUTABLE
    #     dataCenter: "dc-1"   # preferred DC (soft), IMMUTABLE
    #     quota_size: "100GiB"

    # ------
    # --- Pre-built opt-in для GitLab + GitLab-Runner buckets ---
    # Если используете SeaweedFS как S3 backend для GitLab / gitlab-runner — раскомментируйте
    # этот блок в своём hosts-vars-override/seaweedfs-sync.yaml (вместе с managed policies
    # gitlab-rw/gitlab-runner-rw SECTION 1 + identities gitlab/gitlab-runner SECTION 2).
    # 6 buckets: 5 owned by 'gitlab', 1 by 'gitlab-runner'. Доступ — через attached managed
    # policy (SECTION 1). replication='001' (+1 копия в same rack — baseline durability).
    # Альтернатива: внешнее S3 — operator сам создаёт buckets вне Ansible.
    # seaweedfs_sync_buckets_extra:
    #   # --- GitLab buckets (5) — owner 'gitlab' (access через managed policy gitlab-rw) ---
    #   - name: gitlab-registry
    #     owner: "gitlab"
    #     replication: "001"
    #     rack: "workers-1"
    #     dataCenter: "dc-1"
    #   - name: gitlab-artifacts
    #     owner: "gitlab"
    #     replication: "001"
    #     rack: "workers-1"
    #     dataCenter: "dc-1"
    #   - name: gitlab-uploads
    #     owner: "gitlab"
    #     replication: "001"
    #     rack: "workers-1"
    #     dataCenter: "dc-1"
    #   - name: gitlab-packages
    #     owner: "gitlab"
    #     replication: "001"
    #     rack: "workers-1"
    #     dataCenter: "dc-1"
    #   - name: gitlab-backups
    #     owner: "gitlab"
    #     replication: "001"
    #     rack: "workers-1"
    #     dataCenter: "dc-1"
    #   # --- GitLab-Runner cache (1) — owner 'gitlab-runner' (managed policy gitlab-runner-rw) ---
    #   - name: gitlab-runner-cache
    #     owner: "gitlab-runner"
    #     replication: "001"
    #     rack: "workers-1"
    #     dataCenter: "dc-1"
    # ------
    # --- Pre-built opt-in для Loki (mon-system) bucket ---
    # Если используете SeaweedFS как S3 backend для Loki — раскомментируйте этот блок
    # (объедините с gitlab-блоком выше в ОДИН seaweedfs_sync_buckets_extra, если нужны оба;
    # вместе с managed policy loki-rw SECTION 1 + identity loki SECTION 2).
    # 1 bucket 'loki-logs' (ДОЛЖЕН совпадать с mon_system_loki_s3_bucket), owner 'loki'.
    # Альтернатива: внешний S3 — operator сам создаёт bucket вне Ansible.
    # seaweedfs_sync_buckets_extra:
    #   - name: loki-logs
    #     owner: "loki"
    #     replication: "001"
    #     rack: "workers-1"
    #     dataCenter: "dc-1"
