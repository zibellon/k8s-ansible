all:
  vars:
    # =============================================================================
    # SeaweedFS Sync — declarative source-of-truth для identities, buckets, policies
    # =============================================================================
    # Этот файл потребляется:
    #   - playbook-app/seaweedfs-install.yaml — bootstrap admin identity (читает
    #     seaweedfs_identities entry где actions=['Admin']).
    #   - playbook-app/seaweedfs-install.yaml — sync через --tags user-sync/bucket-sync/bucket-policy-sync.
    #
    # Архитектура (см. .claude/rules/components.md §17.5):
    #   Layer 1: Identities → Vault path /seaweedfs/s3-config/all (combined JSON)
    #            → ESO template → K8s Secret seaweedfs-s3-identities → mounted в
    #            S3 pods через existingConfigSecret.
    #   Layer 2: Buckets + quotas + AWS IAM policies → filer Postgres metadata
    #            (weed shell для buckets/quotas + CronJob enforce; aws s3api для
    #            policies). Policies — per-bucket field в SECTION 2 schema.
    #   Layer 3: Identity credentials distribution → произвольные дополнительные
    #            Vault paths (через identity.extra_vault_paths, SECTION 1 schema),
    #            ConfigMap-tracked diff sync.
    #
    # base arrays — committed (admin + anonymous identities в seaweedfs_identities).
    # _extra arrays — для hosts-vars-override/, merged at runtime через `+ (var | default([]))`.
    # =============================================================================

    # ------
    # SECTION 1: Identities
    # ------
    # SeaweedFS S3 IAM identities — admin + per-user named principals + anonymous.
    # Sync (--tags user-sync) приводит Vault combined JSON к target state:
    #   CREATE (in target, not in Vault): generate fresh access_key (20 chars
    #     uppercase+digits) + secret_key (40 chars letters+digits); store в Vault
    #     combined JSON.
    #   UPDATE (in both, actions differ): keep existing keys, refresh actions.
    #   DELETE (in Vault, not in target): remove from combined JSON.
    #
    # Schema per identity:
    #   name:    SeaweedFS identity name. Используется в bucket policies как
    #            Principal: "arn:aws:iam::*:user/<name>" (wildcard accountID).
    #            Special name 'anonymous' для public-read (Principal: '*' в bucket
    #            policy совпадёт с anonymous identity — special name required
    #            in static JSON; см. buildPrincipalARN auth_credentials.go:1640).
    #   actions: SeaweedFS-internal actions list.
    #            - admin:  ["Admin"] → bypass identity check (isAdmin()).
    #            - users:  [] → "policy-only principals" (auth_credentials.go:1481),
    #                        доступ ТОЛЬКО через bucket policy Allow (по design,
    #                        не workaround).
    #            - anonymous: [] (same).
    #   extra_vault_paths: OPTIONAL list of full Vault paths (с mount engine prefix,
    #            например "eso-secret/gitlab/s3-storage" или "secret/team-alpha/creds").
    #            Sync (--tags identity-distribute) дополнительно доставляет identity
    #            credentials в каждый указанный путь поверх mandatory combined JSON.
    #            Fixed Vault field keys (HARD-CODED, изменить нельзя):
    #              username   — identity name (например "alice")
    #              accessKey  — из combined JSON identities[].credentials[0].accessKey
    #              secretKey  — из combined JSON identities[].credentials[0].secretKey
    #            Distribute идёт через ConfigMap state seaweedfs-sync-identity-distributions-state
    #            в namespace seaweedfs (diff-based: removed paths → vault-delete;
    #            target paths → vault-put full-replace).
    #            Anonymous identity с непустым extra_vault_paths → fail на sync
    #            (нет creds для distribute).
    #            Если поле отсутствует или [] — distribute для этой identity не выполняется.
    #
    # Admin safety guard в sync playbook: warning если в target identities нет
    # ни одной entry с actions=['Admin'] (защита от accidental lockout).
    # ------
    seaweedfs_identities:
      - name: admin
        actions: ["Admin"]
      - name: anonymous
        actions: []
    seaweedfs_identities_extra: []
    # Пример operator extension (для hosts-vars-override/seaweedfs-sync.yaml):
    # seaweedfs_identities_extra:
    #   - name: alice
    #     actions: []
    #     extra_vault_paths:
    #       - "eso-secret/gitlab/s3-storage"
    #       - "secret/team-alpha/s3-creds"
    #   - name: bob
    #     actions: []
    #     # без extra_vault_paths — distribute не выполняется для bob

    # ------
    # SECTION 2: Buckets + quotas + policies
    # ------
    # S3 buckets + per-bucket SeaweedFS-native quotas + optional AWS IAM policy.
    # Sync (--tags bucket-sync) применяет diff vs K8s ConfigMap state
    # 'seaweedfs-sync-buckets-state' (хранит target snapshot — [{name, quota, policy}, ...]).
    #
    # Sync order (6 фаз):
    #   1. DELETE стейл buckets (in state, not in target): weed shell
    #      's3.bucket.delete -name=<n>' — sweep вместе с их policies (collection
    #      delete через master). См. NOTE про -force ниже.
    #   2. DELETE стейл policies у kept buckets (in state with policy, in target
    #      without): aws s3api delete-bucket-policy --bucket <n>.
    #   3. APPLY policies у kept buckets (target has policy — всегда put,
    #      idempotent): aws s3api put-bucket-policy --bucket <n> --policy '<JSON>'.
    #   4. CREATE new buckets (in target, not in state): weed shell
    #      's3.bucket.create -name=<n> -owner=admin'; затем apply policy (если есть).
    #   5. APPLY quotas для всех target buckets с quota.defined (новых и kept):
    #      weed shell 's3.bucket.quota -name=<n> -op=set|disable -sizeMB=<X>'.
    #   6. UPDATE ConfigMap state с новым target snapshot.
    #
    # NOTE про bucket delete: в SeaweedFS shell command 's3.bucket.delete' нет
    # флага -force. Команда сама по себе делает hard delete — CollectionDelete
    # напрямую через master (sweeps все volumes/objects bucket'а) + filer_pb.Remove
    # (sweeps bucket record). Bucket с объектами удаляется без жалоб.
    # Единственное препятствие — Object Lock с locked objects (s3_objectlock check).
    #
    # Quota enforcement: НЕ автоматический в SeaweedFS (command_s3_bucket_quota_check.go:38-103).
    # K8s CronJob 'seaweedfs-quota-enforce' запускает 'weed shell s3.bucket.quota.enforce
    # -apply' каждые 5 минут — см. charts/seaweedfs/quota-cron/.
    #
    # Schema per bucket:
    #   name:   bucket name (DNS-compatible, lower-case).
    #   quota:  OPTIONAL {enabled, size}.
    #     enabled: bool — true → apply size limit, false → disable (keep config).
    #     size:    human-readable размер (e.g. "100GiB", "5TiB") — sync конвертирует
    #              в MiB для weed shell.
    #   policy: OPTIONAL AWS IAM policy document {Version, Statement: [...]} (один на bucket).
    #     Storage: filer Postgres metadata (entry.Extended["s3-bucket-policy"] —
    #     persistent через pod restart automatically).
    #     Если поле отсутствует — у bucket нет policy.
    #
    # CRITICAL — SeaweedFS 4.29 non-AWS policy deviations:
    #
    #   1. Principal — ТОЛЬКО flat string или array, НЕ AWS dict-form
    #      `{"AWS": "..."}` (policy_engine/types.go:55-77 — UnmarshalJSON
    #      принимает только string или []string).
    #         OK:    Principal: "arn:aws:iam::*:user/alice"
    #         OK:    Principal: ["arn:aws:iam::*:user/alice", "arn:aws:iam::*:user/bob"]
    #         OK:    Principal: "*"     # anonymous (требует anonymous identity)
    #         FAIL:  Principal: {AWS: "arn:aws:iam::*:user/alice"}
    #      Sync task валидирует — отклоняет dict-form с явным сообщением.
    #
    #   2. Resource — должен ссылаться на ЭТОТ bucket (cross-bucket policy запрещён;
    #      s3api_bucket_policy_handlers.go:340-366):
    #         "arn:aws:s3:::<bucket>"    — на сам bucket (s3:ListBucket, s3:GetBucketLocation).
    #         "arn:aws:s3:::<bucket>/*"  — на objects (s3:GetObject, s3:PutObject, ...).
    #
    #   3. Explicit Deny statement блокирует и admin (auth_credentials.go:1487).
    #      Использовать ТОЛЬКО Allow statements; rely on default-deny для остального.
    #
    #   4. Account ID в Principal ARN — wildcard '*' (no per-user account binding).
    # ------
    seaweedfs_sync_buckets: []
    seaweedfs_sync_buckets_extra: []
    # Пример operator extension (для hosts-vars-override/seaweedfs-sync.yaml):
    # seaweedfs_sync_buckets_extra:
    #   - name: bucket-1
    #     quota:
    #       enabled: true
    #       size: "100GiB"
    #     policy:
    #       Version: "2012-10-17"
    #       Statement:
    #         - Sid: "UserAliceObjects"
    #           Effect: "Allow"
    #           Principal: "arn:aws:iam::*:user/alice"
    #           Action:
    #             - "s3:GetObject"
    #             - "s3:PutObject"
    #             - "s3:DeleteObject"
    #           Resource: ["arn:aws:s3:::bucket-1/*"]
    #         - Sid: "UserAliceBucketOps"
    #           Effect: "Allow"
    #           Principal: "arn:aws:iam::*:user/alice"
    #           Action: ["s3:ListBucket"]
    #           Resource: ["arn:aws:s3:::bucket-1"]
    #   - name: bucket-2
    #     # quota опц — без quota = unlimited
    #     # policy опц — без policy = только default-deny (admin может всегда)
    #   - name: assets-public
    #     quota:
    #       enabled: true
    #       size: "10GiB"
    #     policy:
    #       Version: "2012-10-17"
    #       Statement:
    #         - Sid: "PublicReadObjects"
    #           Effect: "Allow"
    #           Principal: "*"
    #           Action: ["s3:GetObject"]
    #           Resource: ["arn:aws:s3:::assets-public/*"]
    #         - Sid: "PublicListBucket"
    #           Effect: "Allow"
    #           Principal: "*"
    #           Action: ["s3:ListBucket"]
    #           Resource: ["arn:aws:s3:::assets-public"]
