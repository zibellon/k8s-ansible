all:
  vars:
    # ------
    # Metrics Server
    # ------
    metrics_server_version: "3.13.0"
    metrics_server_namespace: "metrics-server"
    # ---
    metrics_server_replica_count: 1
    metrics_server_tolerations: []
    metrics_server_node_selector: {}
    metrics_server_affinity: {}
    metrics_server_resources: {}
    # Helm timeouts
    metrics_server_helm_timeout: "5m"
    metrics_server_rollout_timeout: "120s"
