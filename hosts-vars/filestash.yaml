all:
  vars:
    # Component enable flag (default false, opt-in): guards install start + gates cross-ns NetworkPolicies to this component.
    filestash_enabled: false

    # ------

    filestash_namespace: "filestash"

    # Ingress + TLS (домен — placeholder, реальный задаётся в hosts-vars-override/<cluster>/)
    filestash_domain: "filestash-k8s-v2.drawapp.ru"
    filestash_tls_secret_name: "cert-filestash"
    filestash_ingress_class_name: "traefik-lb"
    filestash_vpn_only_enabled: false

    # Container / S3 backend
    filestash_container_port: 8334
    # SeaweedFS S3 gateway port — для cross-ns NetworkPolicy egress (endpoint дев вводит вручную в /admin UI)
    filestash_seaweedfs_s3_port: 8333

    # ------
    # ------
    # ------

    filestash_acme_issuer_name: "filestash-acme"
    filestash_acme_private_key_name: "filestash-acme-account-key"
    filestash_acme_server: "https://acme-v02.api.letsencrypt.org/directory"
    filestash_acme_email: "some-email-123@gmail.com"
    filestash_acme_solvers:
      - http01:
          ingress:
            ingressClassName: "traefik-lb"
            ingressTemplate:
              metadata:
                annotations:
                  "kubernetes.io/ingress.class": "traefik-lb"
                  "traefik.ingress.kubernetes.io/router.entrypoints": "web"
            podTemplate:
              metadata:
                labels:
                  app.kubernetes.io/name: acme-solver
                  app.kubernetes.io/instance: traefik-lb
                  app.kubernetes.io/component: acme-http01-solver
                  app.kubernetes.io/managed-by: cert-manager
    filestash_cert_manager_issuer_enabled: true
    filestash_cert_manager_issuer:
      enabled: "{{ filestash_cert_manager_issuer_enabled }}"
      name: "{{ filestash_acme_issuer_name }}"
      spec:
        acme:
          server: "{{ filestash_acme_server }}"
          email: "{{ filestash_acme_email }}"
          privateKeySecretRef:
            name: "{{ filestash_acme_private_key_name }}"
          solvers: "{{ filestash_acme_solvers }}"

    # ------
    # ------
    # ------

    filestash_ui_ingress_enabled: true
    filestash_ui_ingress_tls_enabled: true
    filestash_ui_certificate_enabled: true
    filestash_ui_ingress_config:
      enabled: "{{ filestash_ui_ingress_enabled }}"
      domain: "{{ filestash_domain }}"
      ingressClass: "{{ filestash_ingress_class_name }}"
      tlsEnabled: "{{ filestash_ui_ingress_tls_enabled }}"
      tlsSecretName: "{{ filestash_tls_secret_name }}"
      vpnOnlyEnabled: "{{ filestash_vpn_only_enabled }}"
      vpnIngressMiddlewares: "{{ vpn_ingress_middlewares }}"
    # cert-manager Certificate (per-domain) — плоский объект {enabled, name, spec}.
    filestash_ui_certificate:
      enabled: "{{ filestash_ui_certificate_enabled }}"
      name: "{{ filestash_tls_secret_name }}"
      spec:
        secretName: "{{ filestash_tls_secret_name }}"
        dnsNames:
          - "{{ filestash_domain }}"
        issuerRef:
          name: "{{ filestash_acme_issuer_name }}"
          kind: "Issuer"

    # ------
    # ------
    # ------

    # Admin-пароль: в Vault (eso-secret/filestash/app) хранятся ОБА ключа —
    # admin_password (plaintext, оператор читает для входа в /admin) +
    # admin_password_hash (bcrypt). ExternalSecret тянет в k8s Secret ТОЛЬКО хэш.
    filestash_admin_password_secret_key: "admin_password_hash"
    filestash_admin_password_plaintext_key: "admin_password"

    # === SECTION 2: ESO ===
    # ---------
    # ESO integration: Vault → K8s Secrets
    # Базовые секреты — named-переменные с полным dict-объектом; _extra — расширение
    # оператора через hosts-vars-override/. chart eso-external-secret.yaml рендерит
    # .Values.eso.secrets единообразно (base-ссылки + _extra dict'ы).
    # ---------
    eso_vault_integration_filestash:
      sa_name: "eso-main"
      role_name: "filestash.eso-main"
      secret_store_name: "eso-main.vault"
      kv_engine_path: "eso-secret"

    # ExternalSecret тянет ТОЛЬКО admin_password_hash (explicit data + remoteRef.property),
    # plaintext admin_password остаётся в Vault (least-privilege).
    filestash_secret_app:
      external_secret_name: "eso-filestash-app"
      vault_path: "/filestash/app"
      body:
        target:
          name: "eso-filestash-app"
        data:
          - secretKey: "{{ filestash_admin_password_secret_key }}"
            remoteRef:
              key: "{{ eso_vault_integration_filestash.kv_engine_path }}/data/filestash/app"
              property: "{{ filestash_admin_password_secret_key }}"

    eso_vault_integration_filestash_secrets:
      - "{{ filestash_secret_app }}"

    eso_vault_integration_filestash_secrets_extra: []

    # === SECTION 3 ===
    # --- PHASE: pre ---
    filestash_pre_helm_timeout: "5m"
    filestash_pre_extra_objects: []
    filestash_pre_kustomize_patches: []
    # Pre-phase values (ESO Resources + NetworkPolicies + cert-manager Issuer chart)
    filestash_pre_helm_values:
      namespace: "{{ filestash_namespace }}"
      externalSecrets:
        namespace: "{{ external_secrets_namespace }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        instanceName: "traefik-{{ traefik_namespace }}"
      seaweedfs:
        namespace: "{{ seaweedfs_namespace }}"
        enabled: "{{ seaweedfs_enabled }}"
        s3Port: "{{ filestash_seaweedfs_s3_port }}"
      filestash:
        port: "{{ filestash_container_port }}"
      eso:
        vaultServerUrl: "{{ vault_internal_url }}"
        saName: "{{ eso_vault_integration_filestash.sa_name }}"
        roleName: "{{ eso_vault_integration_filestash.role_name }}"
        secretStoreName: "{{ eso_vault_integration_filestash.secret_store_name }}"
        kvEnginePath: "{{ eso_vault_integration_filestash.kv_engine_path }}"
        secrets: "{{ eso_vault_integration_filestash_secrets + (eso_vault_integration_filestash_secrets_extra | default([])) }}"
      esoResourcesConfig:
        secretStoreRefreshInterval: "{{ eso_resources_config.secret_store_refresh_interval }}"
        externalSecretRefreshInterval: "{{ eso_resources_config.external_secret_refresh_interval }}"
        externalSecretRefreshPolicy: "{{ eso_resources_config.external_secret_refresh_policy }}"
      issuer: "{{ filestash_cert_manager_issuer }}"
      extraObjects: "{{ filestash_pre_extra_objects }}"
    # --- PHASE: install ---
    filestash_install_helm_timeout: "5m"
    filestash_install_rollout_timeout: "300s"
    # Образ — full URI:tag. PIN per-cluster к дайджесту в hosts-vars-override/ (см. risk #2 в плане).
    filestash_image: "docker.io/machines/filestash:latest"
    filestash_storage_class: "lnstr-major-multi-sync"
    filestash_storage_size: "2Gi"
    # securityContext — uid контейнера filestash (подтвердить `docker run --rm machines/filestash id`)
    filestash_run_as_user: 1000
    filestash_run_as_group: 1000
    filestash_fs_group: 1000
    filestash_read_only_root_fs: true
    filestash_install_extra_objects: []
    filestash_install_kustomize_patches: []
    # Install-phase values (handwritten chart: StatefulSet + PVC + headless Service)
    filestash_install_helm_values:
      namespace: "{{ filestash_namespace }}"
      image: "{{ filestash_image }}"
      storageClass: "{{ filestash_storage_class }}"
      storageSize: "{{ filestash_storage_size }}"
      port: "{{ filestash_container_port }}"
      applicationUrl: "https://{{ filestash_domain }}"
      adminSecret:
        name: "{{ filestash_secret_app.body.target.name }}"
        key: "{{ filestash_admin_password_secret_key }}"
      securityContext:
        runAsUser: "{{ filestash_run_as_user }}"
        runAsGroup: "{{ filestash_run_as_group }}"
        fsGroup: "{{ filestash_fs_group }}"
        readOnlyRootFilesystem: "{{ filestash_read_only_root_fs }}"
      extraObjects: "{{ filestash_install_extra_objects }}"
    # --- PHASE: post ---
    filestash_post_helm_timeout: "5m"
    filestash_post_extra_objects: []
    filestash_post_kustomize_patches: []
    # Post-phase values (IngressRoute + cert-manager Certificate chart)
    filestash_post_helm_values:
      namespace: "{{ filestash_namespace }}"
      ingressConfig: "{{ filestash_ui_ingress_config }}"
      certificateConfig: "{{ filestash_ui_certificate }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        entryPoints:
          web: "{{ traefik_web_entrypoint }}"
          websecure: "{{ traefik_websecure_entrypoint }}"
      service:
        port: "{{ filestash_container_port }}"
      extraObjects: "{{ filestash_post_extra_objects }}"
