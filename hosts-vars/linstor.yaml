all:
  vars:
    # =============================================================================
    # Piraeus Operator + LINSTOR Cluster — base defaults
    # Operator: oci://ghcr.io/piraeusdatastore/piraeus-operator/piraeus
    # Cluster:  oci://ghcr.io/piraeusdatastore/helm-charts/linstor-cluster
    # =============================================================================

    # === Shared ===
    linstor_namespace: "piraeus-datastore"
    linstor_rollout_timeout: "300s"

    # === Pre chart (NetworkPolicy + namespace) ===
    linstor_pre_helm_timeout: "5m"

    linstor_pre_helm_values:
      namespace: "{{ linstor_namespace }}"
      clusterDomain: "{{ cluster_dns_domain }}"
      dns:
        port: 53
      apiserver:
        port: 6443
      kubelet:
        port: 10250
    # Pre-phase kustomize patches (operator-side customization, default empty)
    linstor_pre_kustomize_patches: []

    # === Install operator chart (external OCI: piraeus-operator) ===
    piraeus_operator_helm_is_oci: true
    piraeus_operator_helm_url: "oci://ghcr.io/piraeusdatastore/piraeus-operator/piraeus"
    piraeus_operator_helm_chart_version: "2.10.6"
    piraeus_operator_helm_timeout: "15m"
    piraeus_operator_rollout_timeout: "900s"

    piraeus_operator_helm_values:
      installCRDs: true
      replicaCount: 1
      tls:
        autogenerate: true
        renew: true
      # ----- закомментировано как memo (chart defaults, оставлены для напоминания) -----
      # affinity: {}
      # nodeSelector: {}
      # tolerations:
      #   - key: drbd.linbit.com/lost-quorum
      #     effect: NoSchedule
      #   - key: drbd.linbit.com/force-io-error
      #     effect: NoSchedule
      # operator:
      #   resources: {}

    # === Install cluster chart (external OCI: linstor-cluster) ===
    linstor_cluster_helm_is_oci: true
    linstor_cluster_helm_url: "oci://ghcr.io/piraeusdatastore/helm-charts/linstor-cluster"
    linstor_cluster_helm_chart_version: "1.1.1"
    linstor_cluster_helm_timeout: "15m"
    linstor_cluster_rollout_timeout: "900s"

    linstor_cluster_helm_values:
      # === linstorCluster — главный CR ===
      linstorCluster:
        nodeSelector: {}
        tolerations:
          - operator: Exists
        controller:
          enabled: true
        csiController:
          enabled: true
        csiNode:
          enabled: true
        highAvailabilityController:
          enabled: true
        affinityController:
          enabled: true
        nfsServer:
          enabled: true
        # === Active cluster-wide DRBD properties (controller-level) ===
        # Property keys verified через `linstor controller drbd-options --<flag>` на кластере.
        # Defaults для sync rate слишком консервативны (c-min-rate=250 KB/s, c-fill-target=50 KiB);
        # 2 из quorum-properties (on-no-quorum, auto-add-quorum-tiebreaker) уже задаются Piraeus
        # operator'ом по умолчанию — фиксируем явно для защиты от изменения upstream-default'ов.
        properties:
          # --- Sync rate tuning (DrbdOptions/PeerDevice) ---
          # На VPS network эти tuned values дают ~120× ускорение sync.
          # Values normalized — CLI `drbd-options --c-<X> 10M` парсит unit и кладёт
          # числовое значение в LINSTOR API. Piraeus operator передаёт values из Helm
          # as-is без unit translation, поэтому используем уже-нормализованные числа:
          #   - c-min-rate/c-max-rate: KiB/s (CLI: 10M → 10240, 100M → 102400)
          #   - c-fill-target: sectors=512B (CLI: 10M → 20480)
          #   - c-plan-ahead: 1/10 seconds (no unit)
          - name: DrbdOptions/PeerDevice/c-min-rate
            value: "10240"
          - name: DrbdOptions/PeerDevice/c-max-rate
            value: "102400"
          - name: DrbdOptions/PeerDevice/c-fill-target
            value: "20480"
          - name: DrbdOptions/PeerDevice/c-plan-ahead
            value: "20"

          # --- DRBD durability + split-brain protection ---
          # End-to-end CRC за реплицируемый блок — защита от silent network bit-flip.
          # crc32c — HW-accelerated, overhead <1%.
          - name: DrbdOptions/Net/data-integrity-alg
            value: "crc32c"

          # Alg для on-demand scrubbing (`linstor resource verify <rd>`) — детектит bit rot.
          - name: DrbdOptions/Net/verify-alg
            value: "crc32c"

          # Quorum policy — primary без quorum блокирует I/O (split-brain protection).
          # КРИТИЧНО: без этого on-no-quorum: suspend-io не активен.
          - name: DrbdOptions/Resource/quorum
            value: "majority"

          # Поведение при потере quorum — заморозить I/O, не возвращать I/O-error приложению.
          # Piraeus default'ом задано `suspend-io`; фиксируем явно.
          - name: DrbdOptions/Resource/on-no-quorum
            value: "suspend-io"

          # Авто-создание diskless tiebreaker для replica=2 RD (нужно для majority quorum математически).
          # Piraeus default'ом задано `True`; фиксируем явно.
          - name: DrbdOptions/auto-add-quorum-tiebreaker
            value: "True"

      # === Encryption + TLS creation method (не используем) ===
      # linstorPassphrase: ""
      # createApiTLS: ""
      # createInternalTLS: ""

      # === Ingress для LINSTOR Controller — не используем, user создаёт сам ===
      # Service внутрикластерный: linstor-controller (namespace piraeus-datastore)
      # Port: 3370 (HTTP), 3371 (HTTPS при apiTLS)
      ingress:
        enabled: false

      # === linstorSatelliteConfigurations — два config'а (Path B: pool name per tier) ===
      # fileThinPool = VPS/VDS, с одним диском и на этом диске стоит Операционная система
      #   То есть: нет неразмеченного пространства, все уже размечено
      # lvmThinPool = VPS/VDS/BareMetal, где есть НЕРАЗМЕЧЕННЫЕ диски
      #   То есть: 1 или несколько неразмеченных дисков автоматически объединяются в VolumeGroup (через LVM)
      linstorSatelliteConfigurations:
        - name: manager
          nodeSelector:
            node-role.kubernetes.io/control-plane: ""
          storagePools:
            - name: lnstr-file-thin-manager
              fileThinPool:
                directory: /var/lib/linstor-pools/lnstr-file-thin-manager

            # - name: lnstr-lvm-thin-manager
            #   lvmThinPool:
            #     volumeGroup: lnstr-lvm-thin-manager
            #   source:
            #     hostDevices:
            #       - /dev/sdb
            #       - /dev/sdc

        - name: worker
          nodeSelector:
            node-role.kubernetes.io/worker: ""
          storagePools:
            - name: lnstr-file-thin-worker
              fileThinPool:
                directory: /var/lib/linstor-pools/lnstr-file-thin-worker

            # - name: lnstr-lvm-thin-worker
            #   lvmThinPool:
            #     volumeGroup: lnstr-lvm-thin-worker
            #   source:
            #     hostDevices:
            #       - /dev/sdb
            #       - /dev/sdc

      # === linstorNodeConnections — пустой, не используем ===
      linstorNodeConnections: []

      # === Prometheus monitoring ===
      # monitoring.enabled = Автоматически создать кучу правил для пониторинга (PrometheusRule)
      monitoring:
        enabled: false
        dashboard:
          enabled: false

      # === storageClasses — 9 SC (3 tier × 3 modes) ===
      storageClasses:
        # === tier: lnstr-major-manager (only managers) ===
        - name: "lnstr-manager-local"
          allowVolumeExpansion: true
          reclaimPolicy: "Retain"
          volumeBindingMode: "WaitForFirstConsumer"
          provisioner: linstor.csi.linbit.com
          parameters:
            linstor.csi.linbit.com/autoPlace: "1"
            linstor.csi.linbit.com/storagePool: "lnstr-file-thin-manager"
            linstor.csi.linbit.com/allowRemoteVolumeAccess: "false"
            csi.storage.k8s.io/fstype: "ext4"

        - name: "lnstr-manager-multi-sync"
          allowVolumeExpansion: true
          reclaimPolicy: "Retain"
          volumeBindingMode: "WaitForFirstConsumer"
          provisioner: linstor.csi.linbit.com
          parameters:
            linstor.csi.linbit.com/autoPlace: "2"
            linstor.csi.linbit.com/storagePool: "lnstr-file-thin-manager"
            linstor.csi.linbit.com/allowRemoteVolumeAccess: "true"
            property.linstor.csi.linbit.com/DrbdOptions/Net/protocol: "C"
            csi.storage.k8s.io/fstype: "ext4"

        # === tier: lnstr-major (managers + workers, multi-pool) ===
        - name: "lnstr-major-local"
          allowVolumeExpansion: true
          reclaimPolicy: "Retain"
          volumeBindingMode: "WaitForFirstConsumer"
          provisioner: linstor.csi.linbit.com
          parameters:
            linstor.csi.linbit.com/autoPlace: "1"
            linstor.csi.linbit.com/storagePool: "lnstr-file-thin-manager lnstr-file-thin-worker"
            linstor.csi.linbit.com/allowRemoteVolumeAccess: "false"
            csi.storage.k8s.io/fstype: "ext4"

        - name: "lnstr-major-multi-sync"
          allowVolumeExpansion: true
          reclaimPolicy: "Retain"
          volumeBindingMode: "WaitForFirstConsumer"
          provisioner: linstor.csi.linbit.com
          parameters:
            linstor.csi.linbit.com/autoPlace: "2"
            linstor.csi.linbit.com/storagePool: "lnstr-file-thin-manager lnstr-file-thin-worker"
            linstor.csi.linbit.com/allowRemoteVolumeAccess: "true"
            property.linstor.csi.linbit.com/DrbdOptions/Net/protocol: "C"
            csi.storage.k8s.io/fstype: "ext4"

        # === tier: lnstr-major-worker (only workers) ===
        - name: "lnstr-worker-local"
          allowVolumeExpansion: true
          reclaimPolicy: "Retain"
          volumeBindingMode: "WaitForFirstConsumer"
          provisioner: linstor.csi.linbit.com
          parameters:
            linstor.csi.linbit.com/autoPlace: "1"
            linstor.csi.linbit.com/storagePool: "lnstr-file-thin-worker"
            linstor.csi.linbit.com/allowRemoteVolumeAccess: "false"
            csi.storage.k8s.io/fstype: "ext4"

        - name: "lnstr-worker-multi-sync"
          allowVolumeExpansion: true
          reclaimPolicy: "Retain"
          volumeBindingMode: "WaitForFirstConsumer"
          provisioner: linstor.csi.linbit.com
          parameters:
            linstor.csi.linbit.com/autoPlace: "2"
            linstor.csi.linbit.com/storagePool: "lnstr-file-thin-worker"
            linstor.csi.linbit.com/allowRemoteVolumeAccess: "true"
            property.linstor.csi.linbit.com/DrbdOptions/Net/protocol: "C"
            csi.storage.k8s.io/fstype: "ext4"

      # === volumeSnapshotClasses и volumeGroupSnapshotClasses — пустые ===
      volumeSnapshotClasses: []
      volumeGroupSnapshotClasses: []

    # ---------
    # Post phase — ServiceMonitor + PodMonitor для linstor-controller, linstor-satellite, linstor-affinity-controller.
    # Operator override: переопределяет linstor_post_helm_values целиком в hosts-vars-override/linstor.yaml.
    # ---------
    linstor_post_helm_timeout: "3m"

    linstor_post_helm_values:
      linstorController:
        serviceMonitor:
          enabled: true
          interval: "30s"
          scrapeTimeout: "15s"
          labels: {}
      linstorSatellite:
        podMonitor:
          enabled: true
          interval: "30s"
          scrapeTimeout: "15s"
          labels: {}
      linstorAffinityController:
        podMonitor:
          enabled: true
          interval: "30s"
          scrapeTimeout: "15s"
          labels: {}
    # Post-phase kustomize patches (operator-side customization, default empty)
    linstor_post_kustomize_patches: []

    # === Companion playbook (piraeus-restart.yaml) — целевые workloads ===
    linstor_restart_resources:
      - deployment/piraeus-operator-controller-manager
      - deployment/linstor-controller
      - deployment/linstor-csi-controller
      - daemonset/linstor-csi-node
      - deployment/ha-controller
      - deployment/affinity-controller
      - daemonset/linstor-satellite.managers-config
      - daemonset/linstor-satellite.workers-config
