all:
  vars:
    # ------
    # Cert-manager
    # ------
    cert_manager_namespace: "cert-manager"
    cert_manager_chart_version: "1.20.2"
    # ------
    # Cluster issuers
    cert_manager_cluster_issuers:
      - name: "acme-prod"
        email: "some-email-123@gmail.com"
        server: "https://acme-v02.api.letsencrypt.org/directory"
        privateKeySecretName: "cluster-issuer-acme-prod-account-key"
        solvers:
          - ingressClass: "traefik-lb"
            ingressAnnotations:
              "kubernetes.io/ingress.class": "traefik-lb"
              "traefik.ingress.kubernetes.io/router.entrypoints": "web"
            podLabels:
              app.kubernetes.io/name: acme-solver
              app.kubernetes.io/instance: traefik-lb
              app.kubernetes.io/component: acme-http01-solver
              app.kubernetes.io/managed-by: cert-manager
    # Helm timeouts
    cert_manager_helm_timeout: "5m"
    cert_manager_config_helm_timeout: "2m"
    cert_manager_rollout_timeout: "180s"
    # Helm chart values
    cert_manager_helm_values:
      crds:
        enabled: true
      image:
        repository: "quay.io/jetstack/cert-manager-controller"
        tag: "v1.20.2"
      prometheus:
        enabled: true
        servicemonitor:
          enabled: true
          prometheusInstance: "default"
          targetPort: "http-metrics"
          path: "/metrics"
          interval: "60s"
          scrapeTimeout: "30s"
          labels: {}
      tolerations: []
      nodeSelector: {}
      affinity: {}
      replicaCount: 1
      resources: {}
      cainjector:
        image:
          repository: "quay.io/jetstack/cert-manager-cainjector"
          tag: "v1.20.2"
        tolerations: []
        nodeSelector: {}
        affinity: {}
        replicaCount: 1
        resources: {}
      webhook:
        image:
          repository: "quay.io/jetstack/cert-manager-webhook"
          tag: "v1.20.2"
        tolerations: []
        nodeSelector: {}
        affinity: {}
        replicaCount: 1
        resources: {}
      startupapicheck:
        tolerations: []
        nodeSelector: {}
        affinity: {}
        resources: {}
