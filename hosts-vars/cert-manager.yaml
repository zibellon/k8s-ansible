all:
  vars:
    # ------
    # Cert-manager
    # ------
    cert_manager_version: "1.19.2"
    cert_manager_namespace: "cert-manager"
    # Tolerations (Deployments)
    cert_manager_tolerations: []
    cert_manager_node_selector: {}
    cert_manager_affinity: {}
    cert_manager_replica_count: 1
    cert_manager_resources: {}
    # ---
    cert_manager_cainjector_tolerations: []
    cert_manager_cainjector_node_selector: {}
    cert_manager_cainjector_affinity: {}
    cert_manager_cainjector_replica_count: 1
    cert_manager_cainjector_resources: {}
    # ---
    cert_manager_webhook_tolerations: []
    cert_manager_webhook_node_selector: {}
    cert_manager_webhook_affinity: {}
    cert_manager_webhook_replica_count: 1
    cert_manager_webhook_resources: {}
    # ---
    # Job tolerations
    cert_manager_startupapicheck_tolerations: []
    cert_manager_startupapicheck_node_selector: {}
    cert_manager_startupapicheck_affinity: {}
    cert_manager_startupapicheck_resources: {}
    # Cluster issuers
    cert_manager_cluster_issuers:
      - name: "acme-prod"
        email: "some-email-123@gmail.com"
        server: "https://acme-v02.api.letsencrypt.org/directory"
        privateKeySecretName: "cluster-issuer-acme-prod-account-key"
        solvers:
          - ingressClass: "traefik-lb"
            ingressAnnotations:
              "kubernetes.io/ingress.class": "traefik-lb"
              "traefik.ingress.kubernetes.io/router.entrypoints": "web"
            podLabels:
              app.kubernetes.io/name: acme-solver
              app.kubernetes.io/instance: traefik-lb
              app.kubernetes.io/component: acme-http01-solver
              app.kubernetes.io/managed-by: cert-manager
    # Prometheus metrics port
    cert_manager_prometheus_port: 9402 # NOT CHANGE
    # Helm timeouts
    cert_manager_helm_timeout: "5m"
    cert_manager_config_helm_timeout: "2m"
    cert_manager_rollout_timeout: "180s"
