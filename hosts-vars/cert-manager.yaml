all:
  vars:
    # ------
    # registry+images (AirGap)
    # ------
    # Registry для образов cert-manager. По умолчанию — quay.io.
    # Для airgap/приватного registry — переопределить в hosts-vars-override/cert-manager.yaml:
    #   cert_manager_image_registry: "my-private-registry.local"
    #
    # СБ должна загрузить следующие образы (только хост меняется, путь jetstack/* остаётся):
    #   <registry>/jetstack/cert-manager-controller:v1.20.2
    #   <registry>/jetstack/cert-manager-cainjector:v1.20.2
    #   <registry>/jetstack/cert-manager-webhook:v1.20.2
    #   <registry>/jetstack/cert-manager-acmesolver:v1.20.2
    #   <registry>/jetstack/cert-manager-startupapicheck:v1.20.2
    cert_manager_image_registry: "quay.io"
    cert_manager_image_tag: "v1.20.2"
    # ---------
    # ---------
    cert_manager_namespace: "cert-manager"
    # Helm repository - источник chart (переопределить в hosts-vars-override/ для airgap)
    cert_manager_helm_repo_url: "https://charts.jetstack.io"
    cert_manager_helm_repo_name: "jetstack"
    cert_manager_helm_chart_name: "cert-manager"
    cert_manager_chart_version: "1.20.2"
    # ------
    # Helm timeouts
    cert_manager_pre_helm_timeout: "2m"
    cert_manager_install_helm_timeout: "5m"
    cert_manager_post_helm_timeout: "2m"
    cert_manager_rollout_timeout: "180s"
    # Cluster issuers
    cert_manager_cluster_issuers:
      - name: "acme-prod"
        email: "some-email-123@gmail.com"
        server: "https://acme-v02.api.letsencrypt.org/directory"
        privateKeySecretName: "cluster-issuer-acme-prod-account-key"
        solvers:
          - ingressClass: "traefik-lb"
            ingressAnnotations:
              "kubernetes.io/ingress.class": "traefik-lb"
              "traefik.ingress.kubernetes.io/router.entrypoints": "web"
            podLabels:
              app.kubernetes.io/name: acme-solver
              app.kubernetes.io/instance: traefik-lb
              app.kubernetes.io/component: acme-http01-solver
              app.kubernetes.io/managed-by: cert-manager
    # Pre-phase values (NetworkPolicies chart)
    cert_manager_pre_helm_values:
      namespace: "{{ cert_manager_namespace }}"
    # Post-phase values (ClusterIssuers chart)
    cert_manager_post_helm_values:
      clusterIssuers: "{{ cert_manager_cluster_issuers }}"
    # Helm chart values
    cert_manager_helm_values:
      # imageRegistry + imageNamespace заменяют per-component image.repository
      # chart строит: {imageRegistry}/{imageNamespace}/{image.name}:{tag} для всех компонентов
      imageRegistry: "{{ cert_manager_image_registry }}"
      imageNamespace: "jetstack"
      crds:
        enabled: true
      image:
        tag: "{{ cert_manager_image_tag }}"
      prometheus:
        enabled: true
        servicemonitor:
          enabled: true
          prometheusInstance: "default"
          targetPort: "http-metrics"
          path: "/metrics"
          interval: "60s"
          scrapeTimeout: "30s"
          labels: {}
      tolerations: []
      nodeSelector: {}
      affinity: {}
      replicaCount: 1
      resources: {}
      acmesolver:
        image:
          tag: "{{ cert_manager_image_tag }}"
      cainjector:
        image:
          tag: "{{ cert_manager_image_tag }}"
        tolerations: []
        nodeSelector: {}
        affinity: {}
        replicaCount: 1
        resources: {}
      webhook:
        image:
          tag: "{{ cert_manager_image_tag }}"
        tolerations: []
        nodeSelector: {}
        affinity: {}
        replicaCount: 1
        resources: {}
      startupapicheck:
        image:
          tag: "{{ cert_manager_image_tag }}"
        tolerations: []
        nodeSelector: {}
        affinity: {}
        resources: {}
