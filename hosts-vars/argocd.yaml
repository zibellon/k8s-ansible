all:
  vars:
    # Helm timeouts
    argocd_pre_helm_timeout: "5m"
    argocd_install_helm_timeout: "5m"
    argocd_rollout_timeout: "180s"
    argocd_post_helm_timeout: "5m"
    argocd_gitops_helm_timeout: "3m"
    # ---------
    argocd_namespace: "argocd" # Configurable: namespace handled by helm template --namespace при render'е chart templates
    argocd_ui_domain: "argocd-ui-k8s-v2.drawapp.ru"
    argocd_external_url: "https://argocd-ui-k8s-v2.drawapp.ru"
    argocd_ui_https_secret_name: "cert-argocd-ui"
    argocd_rpc_domain: "argocd-rpc-k8s-v2.drawapp.ru"
    argocd_rpc_https_secret_name: "cert-argocd-rpc"
    argocd_vpn_only_enabled: false
    argocd_ingress_class_name: "traefik-lb"
    # cert-manager Issuer (per-component, namespaced).
    # issuer_enabled: true → Issuer + Certificate + HTTPS-ingress c TLS;
    # false → HTTP-ingress без TLS (например за Cloudflare).
    argocd_cert_manager_issuer_enabled: true
    argocd_cert_manager_issuer:
      name: "argocd-acme"
      spec:
        acme:
          server: "https://acme-v02.api.letsencrypt.org/directory"
          email: "some-email-123@gmail.com"
          privateKeySecretRef:
            name: "argocd-acme-account-key"
          solvers:
            - http01:
                ingress:
                  ingressClassName: "traefik-lb"
                  ingressTemplate:
                    metadata:
                      annotations:
                        "kubernetes.io/ingress.class": "traefik-lb"
                        "traefik.ingress.kubernetes.io/router.entrypoints": "web"
                  podTemplate:
                    metadata:
                      labels:
                        app.kubernetes.io/name: acme-solver
                        app.kubernetes.io/instance: traefik-lb
                        app.kubernetes.io/component: acme-http01-solver
                        app.kubernetes.io/managed-by: cert-manager
    # ------
    argocd_admin_username: "admin"
    argocd_admin_secret_key_username: "username"
    argocd_admin_secret_key_password: "password"
    # Prometheus metrics ports (hardcoded in ArgoCD manifests)
    argocd_application_controller_metrics_port: 8082
    argocd_server_metrics_port: 8083
    argocd_repo_server_metrics_port: 8084
    argocd_applicationset_controller_metrics_port: 8080
    argocd_dex_server_metrics_port: 5558
    argocd_notifications_controller_metrics_port: 9001
    # ------
    # ArgoCD git-ops setup
    # ------
    # Each entry creates one AppProject + one or more Applications in ArgoCD
    # Пример и переопределение — в hosts-vars-override/argocd.yaml
    argocd_git_ops_apps: []
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    argocd_pre_extra_objects: []
    # Pre-phase kustomize patches (operator-side customization, default empty)
    argocd_pre_kustomize_patches: []
    # Pre-phase values (ESO + NetworkPolicies chart)
    # eso_vault_integration_argocd_secrets — inline merge base + extra (задаётся ниже в eso_vault_integration_argocd_secrets)
    argocd_pre_helm_values:
      namespace: "{{ argocd_namespace }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        instanceName: "traefik-{{ traefik_namespace }}"
      gitlab:
        namespace: "{{ gitlab_namespace }}"
        sshPortInternal: "{{ gitlab_ssh_port_internal }}"
      gitlabRunner:
        namespace: "{{ gitlab_runner_namespace }}"
      gitlabRunnerJob:
        name: "{{ gitlab_runner_job_label_name }}"
        component: "{{ gitlab_runner_job_label_component }}"
      eso:
        vaultServerUrl: "{{ vault_internal_url }}"
        saName: "{{ eso_vault_integration_argocd.sa_name }}"
        roleName: "{{ eso_vault_integration_argocd.role_name }}"
        secretStoreName: "{{ eso_vault_integration_argocd.secret_store_name }}"
        kvEnginePath: "{{ eso_vault_integration_argocd.kv_engine_path }}"
        secrets: "{{ eso_vault_integration_argocd_secrets + (eso_vault_integration_argocd_secrets_extra | default([])) }}"
      esoResourcesConfig:
        secretStoreRefreshInterval: "{{ eso_resources_config.secret_store_refresh_interval }}"
        externalSecretRefreshInterval: "{{ eso_resources_config.external_secret_refresh_interval }}"
        externalSecretRefreshPolicy: "{{ eso_resources_config.external_secret_refresh_policy }}"
      issuer: "{{ argocd_cert_manager_issuer }}"
      issuerEnabled: "{{ argocd_cert_manager_issuer_enabled }}"
      extraObjects: "{{ argocd_pre_extra_objects }}"
    # ---
    # ---
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    argocd_install_extra_objects: []
    # Install-phase kustomize patches (operator-side customization for ArgoCD pristine upstream install.yaml)
    argocd_install_kustomize_patches:
      - target:
          kind: ConfigMap
          name: argocd-cm
        patch: |-
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: argocd-cm
          data:
            url: "{{ argocd_external_url }}"
            timeout.reconciliation: "30s"
            timeout.reconciliation.jitter: "10s"
            users.anonymous.enabled: "false"
            users.session.duration: "120h"
            resource.customizations: |
              networking.k8s.io/Ingress:
                health.lua: |
                  hs = {}
                  hs.status = "Healthy"
                  hs.message = "Skip health check for Ingress"
                  return hs
      - target:
          kind: ConfigMap
          name: argocd-cmd-params-cm
        patch: |-
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: argocd-cmd-params-cm
          data:
            server.insecure: "true"
    # Helm values для KUSTOMIZE_WRAPPER install phase — содержит только extraObjects wiring
    argocd_install_helm_values:
      extraObjects: "{{ argocd_install_extra_objects }}"
    # ---
    # ---
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    argocd_post_extra_objects: []
    # Post-phase kustomize patches (operator-side customization, default empty)
    argocd_post_kustomize_patches: []
    # Post-phase values (Ingress + ServiceMonitor chart)
    argocd_post_helm_values:
      namespace: "{{ argocd_namespace }}"
      issuer: "{{ argocd_cert_manager_issuer }}"
      issuerEnabled: "{{ argocd_cert_manager_issuer_enabled }}"
      ingress:
        uiDomain: "{{ argocd_ui_domain }}"
        rpcDomain: "{{ argocd_rpc_domain }}"
        ingressClass: "{{ argocd_ingress_class_name }}"
        uiSecretName: "{{ argocd_ui_https_secret_name }}"
        rpcSecretName: "{{ argocd_rpc_https_secret_name }}"
        vpnOnlyEnabled: "{{ argocd_vpn_only_enabled }}"
        vpnIngressRouteMiddlewares: "{{ vpn_ingress_route_middlewares }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        entryPoints:
          web: "{{ traefik_web_entrypoint }}"
          websecure: "{{ traefik_websecure_entrypoint }}"
      serviceMonitor:
        enabled: true
        interval: "30s"
        scrapeTimeout: "15s"
        labels: {}
      extraObjects: "{{ argocd_post_extra_objects }}"
    # ---
    # ---
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    argocd_gitops_extra_objects: []
    # GitOps-phase kustomize patches (operator-side customization, default empty)
    argocd_gitops_kustomize_patches: []
    # GitOps-phase values (AppProject + Applications chart)
    argocd_gitops_helm_values:
      namespace: "{{ argocd_namespace }}"
      gitOpsApps: "{{ argocd_git_ops_apps }}"
      extraObjects: "{{ argocd_gitops_extra_objects }}"
    # ---------
    # ESO integration: Vault → K8s Secrets
    # Базовые секреты (нужны для запуска) — отдельные named-переменные с полным dict-объектом.
    # eso_vault_integration_argocd_secrets — массив ссылок на named-переменные
    # (chart eso-external-secret.yaml рендерит .Values.eso.secrets единообразно
    # как для base-ссылок, так и для _extra dict'ов).
    # _extra — расширение оператора через hosts-vars-override/ (типично — git-ops repo credentials
    # с argocd.argoproj.io/secret-type labels).
    # ---------
    eso_vault_integration_argocd:
      sa_name: "eso-main"
      role_name: "argocd.eso-main"
      secret_store_name: "eso-main.vault"
      kv_engine_path: "eso-secret"

    # never rendered (is_need_eso: false) — body присутствует для консистентности схемы.
    # Используется только playbook'ом argocd-configure.yaml для чтения/записи в Vault.
    argocd_secret_admin_creds:
      external_secret_name: "eso-argocd-admin-creds"
      vault_path: "/argocd/admin/creds"
      is_need_eso: false
      body:
        target:
          name: "eso-argocd-admin-creds"
        dataFrom:
          - extract:
              key: "{{ eso_vault_integration_argocd.kv_engine_path }}/data/argocd/admin/creds"

    eso_vault_integration_argocd_secrets:
      - "{{ argocd_secret_admin_creds }}"

    eso_vault_integration_argocd_secrets_extra: []
