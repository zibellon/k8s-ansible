all:
  vars:
    # Component enable flag (default false, opt-in): guards install/configure start + gates cross-ns NetworkPolicies to this component.
    argocd_enabled: false

    # ------

    argocd_namespace: "argocd" # Configurable: namespace handled by helm template --namespace при render'е chart templates

    # ------
    # ------
    # ------

    argocd_ui_domain: "argocd-ui-k8s-v2.drawapp.ru"
    argocd_external_url: "https://argocd-ui-k8s-v2.drawapp.ru"
    argocd_ui_https_secret_name: "cert-argocd-ui"
    argocd_vpn_only_enabled: false
    argocd_ingress_class_name: "traefik-lb"

    # ------
    # ------
    # ------
    argocd_acme_issuer_name: "argocd-acme"
    argocd_acme_private_key_name: "argocd-acme-account-key"
    argocd_acme_server: "https://acme-v02.api.letsencrypt.org/directory"
    argocd_acme_email: "some-email-123@gmail.com"
    argocd_acme_solvers:
      - http01:
          ingress:
            ingressClassName: "traefik-lb"
            ingressTemplate:
              metadata:
                annotations:
                  "kubernetes.io/ingress.class": "traefik-lb"
                  "traefik.ingress.kubernetes.io/router.entrypoints": "web"
            podTemplate:
              metadata:
                labels:
                  app.kubernetes.io/name: acme-solver
                  app.kubernetes.io/instance: traefik-lb
                  app.kubernetes.io/component: acme-http01-solver
                  app.kubernetes.io/managed-by: cert-manager
    argocd_cert_manager_issuer_enabled: true
    argocd_cert_manager_issuer:
      enabled: "{{ argocd_cert_manager_issuer_enabled }}"
      name: "{{ argocd_acme_issuer_name }}"
      spec:
        acme:
          server: "{{ argocd_acme_server }}"
          email: "{{ argocd_acme_email }}"
          privateKeySecretRef:
            name: "{{ argocd_acme_private_key_name }}"
          solvers: "{{ argocd_acme_solvers }}"
    # Ingress config — ОДИН домен. UI/REST + gRPC (CLI) идут через тот же Host:
    # из этого конфига рендерятся два IngressRoute (argocd-ui + argocd-grpc, по Content-Type
    # header → h2c), на один tlsSecret. Отдельный rpc-домен не нужен (см. оф. доку Traefik v3).
    argocd_ui_ingress_enabled: true
    argocd_ui_ingress_tls_enabled: true
    argocd_ui_certificate_enabled: true
    argocd_ingress_config:
      enabled: "{{ argocd_ui_ingress_enabled }}"
      domain: "{{ argocd_ui_domain }}"
      ingressClass: "{{ argocd_ingress_class_name }}"
      tlsEnabled: "{{ argocd_ui_ingress_tls_enabled }}"
      tlsSecretName: "{{ argocd_ui_https_secret_name }}"
      vpnOnlyEnabled: "{{ argocd_vpn_only_enabled }}"
      vpnIngressRouteMiddlewares: "{{ vpn_ingress_route_middlewares }}"
    # cert-manager Certificate (один на домен) — плоский объект {enabled, name, spec}.
    argocd_certificate:
      enabled: "{{ argocd_ui_certificate_enabled }}"
      name: "{{ argocd_ui_https_secret_name }}"
      spec:
        secretName: "{{ argocd_ui_https_secret_name }}"
        dnsNames:
          - "{{ argocd_ui_domain }}"
        issuerRef:
          name: "{{ argocd_acme_issuer_name }}"
          kind: "Issuer"

    # ------
    # ------
    # ------

    # Prometheus metrics ports (hardcoded in ArgoCD manifests)
    argocd_application_controller_metrics_port: 8082
    argocd_server_metrics_port: 8083
    argocd_repo_server_metrics_port: 8084
    argocd_applicationset_controller_metrics_port: 8080
    argocd_dex_server_metrics_port: 5558
    argocd_notifications_controller_metrics_port: 9001
    # === SECTION: LOCAL ACCOUNTS (declarative) ===
    # Декларативные локальные аккаунты ArgoCD (login + пароль). Пароли НЕ здесь — генерятся
    # в рантайме task'ом accounts-sync и кладутся в Vault-зеркало. Per-project RBAC
    # (AppProject roles/groups) — вне репозитория (внешний git-ops repo ссылается на эти имена).
    # Реальный список — в hosts-vars-override/<cluster>/argocd.yaml. Схема элемента:
    #   - name: <str>                 # ^[A-Za-z0-9._-]+$
    #     passwordMtime: "<RFC3339>"  # ОБЯЗАТЕЛЬНО; смена значения = триггер ротации пароля
    #     enabled: <bool>             # ОБЯЗАТЕЛЬНО; false → аккаунт выключен (accounts.<name>.enabled)
    #     capabilities: "<str>"       # ОБЯЗАТЕЛЬНО; CSV из login/apiKey: "login" | "apiKey" | "login, apiKey"
    #     vault_paths: [<str>]        # OPTIONAL; FULL Vault-пути (с mount engine prefix), куда accounts-distribute
    #                                 # раздаёт username+password аккаунта; пусто/нет → не distribute'ится
    argocd_local_accounts: []
    # Встроенный admin: true (default) для безопасного bootstrap. Флипать в false ТОЛЬКО после того,
    # как заведён custom-admin и ему выдан role:admin через argocd_policy_csv_list (иначе lock-out).
    argocd_builtin_admin_enabled: false
    # Глобальный RBAC argocd-rbac-cm (policy.csv) — явный список Casbin-строк. Каждый элемент = одна строка, напр.:
    #   - "g, root-admin, role:admin"
    #   - "g, ci-bot, role:readonly"
    # Реальные значения — в hosts-vars-override/<cluster>/argocd.yaml.
    argocd_policy_csv_list: []
    # Vault-зеркало аккаунтов: один path, ПОЛЕ НА АККАУНТ = {plaintext, hash, passwordMtime} (nested object).
    # Полный путь = eso_vault_integration_argocd.kv_engine_path + argocd_accounts_vault_path.
    argocd_accounts_vault_path: "/argocd/accounts/creds"

    # === SECTION: OIDC / SSO (ZITADEL) ===
    # Аддитивно к локальным аккаунтам (те остаются break-glass). Включать: в override
    # argocd_oidc_enabled: true + реальный client_id + org-pin scope + гранты в argocd_policy_csv_list
    # (g, <email>, role:...). ClientSecret — ТОЛЬКО через ESO (argocd-oidc-secret), НИКОГДА в
    # argocd-secret (инвариант). Секрет в Vault: eso-secret/argocd/oidc (ключи clientId/clientSecret).
    argocd_oidc_enabled: false
    argocd_oidc_name: "ZITADEL"
    # clientID (НЕ секрет) = <appId>@cluster-tools — реальное значение в override.
    argocd_oidc_client_id: ""
    argocd_oidc_issuer: "https://{{ zitadel_domain }}"
    # requestedScopes — inline YAML-список, оператор задаёт целиком. offline_access ОБЯЗАТЕЛЕН для
    # refresh-token (без него refreshTokenThreshold не работает). groups НЕ добавляем (нет group-маппинга).
    # Для org-pin в override добавить ", \"urn:zitadel:iam:org:id:<orgId>\"".
    argocd_oidc_requested_scopes: '["openid", "profile", "email", "offline_access"]'
    # Окно превентивного refresh id_token'а. ДОЛЖНО быть < ID Token Lifetime в ZITADEL.
    argocd_oidc_refresh_token_threshold: "2h"
    argocd_oidc_logout_url: "https://{{ zitadel_domain }}/oidc/v1/end_session"

    # === SECTION 2: ESO ===
    # ---------
    # ESO integration: Vault → K8s Secrets
    # Базовые секреты (нужны для запуска) — отдельные named-переменные с полным dict-объектом.
    # eso_vault_integration_argocd_secrets — массив ссылок на named-переменные
    # (chart eso-external-secret.yaml рендерит .Values.eso.secrets единообразно
    # как для base-ссылок, так и для _extra dict'ов).
    # _extra — расширение оператора через hosts-vars-override/ (типично — git-ops repo credentials
    # с argocd.argoproj.io/secret-type labels).
    # ---------
    eso_vault_integration_argocd:
      sa_name: "eso-main"
      role_name: "argocd.eso-main"
      secret_store_name: "eso-main.vault"
      kv_engine_path: "eso-secret"

    # OIDC client-secret → ОТДЕЛЬНЫЙ секрет argocd-oidc-secret (метка part-of: argocd для резолва
    # $argocd-oidc-secret:clientSecret). НЕ argocd-secret (инвариант).
    argocd_secret_oidc_creds:
      external_secret_name: "argocd-oidc-secret"
      vault_path: "/argocd/oidc"
      body:
        target:
          name: "argocd-oidc-secret"
          template:
            engineVersion: v2
            metadata:
              labels:
                app.kubernetes.io/part-of: argocd
        dataFrom:
          - extract:
              key: "{{ eso_vault_integration_argocd.kv_engine_path }}/data/argocd/oidc"

    # Base ESO secrets list: OIDC client-secret добавляется только при argocd_oidc_enabled: true
    # (при false → [] → рендер идентичен прежнему). Local-account passwords пишутся в argocd-secret
    # accounts-sync'ом (kubectl patch), не через ESO. Git-ops repo creds — через _extra в override.
    eso_vault_integration_argocd_secrets: "{{ [argocd_secret_oidc_creds] if argocd_oidc_enabled | bool else [] }}"

    eso_vault_integration_argocd_secrets_extra: []
    # === SECTION 3 ===
    # --- PHASE: pre ---
    argocd_pre_helm_timeout: "5m"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    argocd_pre_extra_objects: []
    # Pre-phase kustomize patches (operator-side customization, default empty)
    argocd_pre_kustomize_patches: []
    # Pre-phase values (ESO + NetworkPolicies chart)
    # eso_vault_integration_argocd_secrets — inline merge base + extra (задаётся ниже в eso_vault_integration_argocd_secrets)
    argocd_pre_helm_values:
      namespace: "{{ argocd_namespace }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        instanceName: "traefik-{{ traefik_namespace }}"
      gitlab:
        namespace: "{{ gitlab_namespace }}"
        enabled: "{{ gitlab_enabled }}"
        sshPortInternal: "{{ gitlab_ssh_port_internal }}"
      gitlabRunner:
        namespace: "{{ gitlab_runner_namespace }}"
        enabled: "{{ gitlab_runner_enabled }}"
      gitlabRunnerJob:
        name: "{{ gitlab_runner_job_label_name }}"
        component: "{{ gitlab_runner_job_label_component }}"
      eso:
        vaultServerUrl: "{{ vault_internal_url }}"
        saName: "{{ eso_vault_integration_argocd.sa_name }}"
        roleName: "{{ eso_vault_integration_argocd.role_name }}"
        secretStoreName: "{{ eso_vault_integration_argocd.secret_store_name }}"
        kvEnginePath: "{{ eso_vault_integration_argocd.kv_engine_path }}"
        secrets: "{{ eso_vault_integration_argocd_secrets + (eso_vault_integration_argocd_secrets_extra | default([])) }}"
      esoResourcesConfig:
        secretStoreRefreshInterval: "{{ eso_resources_config.secret_store_refresh_interval }}"
        externalSecretRefreshInterval: "{{ eso_resources_config.external_secret_refresh_interval }}"
        externalSecretRefreshPolicy: "{{ eso_resources_config.external_secret_refresh_policy }}"
      issuer: "{{ argocd_cert_manager_issuer }}"
      extraObjects: "{{ argocd_pre_extra_objects }}"
    # --- PHASE: install ---
    argocd_install_helm_timeout: "5m"
    argocd_rollout_timeout: "180s"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    argocd_install_extra_objects: []
    # Install-phase kustomize patches: base = operator patches + generated accounts/RBAC patches.
    # argocd-cm (url/timeouts) + argocd-cmd-params-cm (server.insecure) + generated argocd-cm
    # (accounts.<name>: <capabilities> + accounts.<name>.enabled из argocd_local_accounts + admin.enabled) + argocd-rbac-cm
    # (policy.csv из argocd_policy_csv_list) + argocd-server ClusterRole (pods/exec для web-terminal).
    # kustomize мержит несколько патчей на один target.
    argocd_kustomize_patches_base:
      - target:
          kind: ConfigMap
          name: argocd-cm
        patch: |-
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: argocd-cm
          data:
            url: "{{ argocd_external_url }}"
            timeout.reconciliation: "30s"
            timeout.reconciliation.jitter: "10s"
            users.anonymous.enabled: "false"
            users.session.duration: "120h"
            exec.enabled: "true"
            exec.shells: "bash,sh"
            resource.customizations: |
              networking.k8s.io/Ingress:
                health.lua: |
                  hs = {}
                  hs.status = "Healthy"
                  hs.message = "Skip health check for Ingress"
                  return hs
      - target:
          kind: ConfigMap
          name: argocd-cmd-params-cm
        patch: |-
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: argocd-cmd-params-cm
          data:
            server.insecure: "true"
      - target:
          kind: ConfigMap
          name: argocd-cm
        patch: |-
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: argocd-cm
          data:
          {% for acc in argocd_local_accounts %}
            accounts.{{ acc.name }}: "{{ acc.capabilities }}"
            accounts.{{ acc.name }}.enabled: "{{ acc.enabled | string | lower }}"
          {% endfor %}
            admin.enabled: "{{ argocd_builtin_admin_enabled | string | lower }}"
      - target:
          kind: ConfigMap
          name: argocd-rbac-cm
        patch: |-
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: argocd-rbac-cm
          data:
            policy.default: ''
            policy.csv: |
          {% for line in argocd_policy_csv_list %}
              {{ line }}
          {% endfor %}
      # argocd-server ClusterRole — grant pods/exec (create) for the web terminal (exec.enabled above).
      # JSON6902 (rules has no merge-key → strategic-merge would replace it); k8s 1.35+ needs create even on the WebSocket path.
      - target:
          group: rbac.authorization.k8s.io
          version: v1
          kind: ClusterRole
          name: argocd-server
        patch: |-
          - op: add
            path: /rules/-
            value:
              apiGroups: [""]
              resources: ["pods/exec"]
              verbs: ["create"]
    # Operator-side extra patches — задаются в hosts-vars-override/ (напр. argocd-ssh-known-hosts-cm). Default пусто.
    argocd_install_kustomize_patches_extra: []
    # OIDC-патчи — отдельными объектами, добавляются в список только при argocd_oidc_enabled: true.
    # kustomize мержит их поверх base-патчей argocd-cm / argocd-rbac-cm.
    argocd_oidc_cm_patch:
      target:
        kind: ConfigMap
        name: argocd-cm
      patch: |-
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: argocd-cm
        data:
          oidc.config: |
            name: {{ argocd_oidc_name }}
            issuer: {{ argocd_oidc_issuer }}
            clientID: {{ argocd_oidc_client_id }}
            clientSecret: "$argocd-oidc-secret:clientSecret"
            requestedScopes: {{ argocd_oidc_requested_scopes }}
            refreshTokenThreshold: "{{ argocd_oidc_refresh_token_threshold }}"
            logoutURL: {{ argocd_oidc_logout_url }}
    argocd_oidc_rbac_patch:
      target:
        kind: ConfigMap
        name: argocd-rbac-cm
      patch: |-
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: argocd-rbac-cm
        data:
          scopes: '[email]'
    # Consumed by the install phase: base + OIDC-патчи (если включено) + operator extra.
    argocd_install_kustomize_patches: "{{ argocd_kustomize_patches_base + ([argocd_oidc_cm_patch, argocd_oidc_rbac_patch] if argocd_oidc_enabled | bool else []) + argocd_install_kustomize_patches_extra }}"
    # Helm values для KUSTOMIZE_WRAPPER install phase — содержит только extraObjects wiring
    argocd_install_helm_values:
      extraObjects: "{{ argocd_install_extra_objects }}"
    # --- PHASE: post ---
    argocd_post_helm_timeout: "5m"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    argocd_post_extra_objects: []
    # Post-phase kustomize patches (operator-side customization, default empty)
    argocd_post_kustomize_patches: []
    # Post-phase values (Ingress + ServiceMonitor chart)
    argocd_post_helm_values:
      namespace: "{{ argocd_namespace }}"
      ingressConfig: "{{ argocd_ingress_config }}"
      certificateConfig: "{{ argocd_certificate }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        entryPoints:
          web: "{{ traefik_web_entrypoint }}"
          websecure: "{{ traefik_websecure_entrypoint }}"
      serviceMonitor:
        enabled: true
        interval: "30s"
        scrapeTimeout: "15s"
        labels: {}
      extraObjects: "{{ argocd_post_extra_objects }}"
    # --- PHASE: gitops ---
    argocd_gitops_helm_timeout: "3m"
    # ------
    # ArgoCD git-ops setup — full-spec модель.
    # AppProjects + Applications задаются ПОЛНЫМ spec'ом; chart оборачивает
    # apiVersion/kind/metadata (+ optional annotations для обоих + finalizers для Application — пусто/нет = не добавляется).
    # Пример и переопределение — в hosts-vars-override/argocd.yaml
    # ------
    argocd_git_ops_app_projects: []
    argocd_git_ops_applications: []
    # Default AppProject lockdown. ArgoCD АВТО-создаёт `default` project (permissive: source/dest/* = '*')
    # и НЕ даёт его удалить — только модифицировать (оф. дока). Применяется raw `kubectl apply` в gitops-фазе,
    # ЕСЛИ непусто (НЕ через helm-чарт — default-project ArgoCD-owned). Дефолт снимает ВСЕ права (deny-by-default);
    # приложения переводи в явные проекты. {} = пропустить (оставить permissive default).
    argocd_gitops_default_project_update:
      apiVersion: argoproj.io/v1alpha1
      kind: AppProject
      metadata:
        name: default
        namespace: "{{ argocd_namespace }}"
      spec:
        sourceRepos: []
        sourceNamespaces: []
        destinations: []
        clusterResourceBlacklist:
          - group: "*"
            kind: "*"
        namespaceResourceBlacklist:
          - group: "*"
            kind: "*"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    argocd_gitops_extra_objects: []
    # GitOps-phase kustomize patches (operator-side customization, default empty)
    argocd_gitops_kustomize_patches: []
    # GitOps-phase values (AppProjects + Applications chart)
    argocd_gitops_helm_values:
      namespace: "{{ argocd_namespace }}"
      appProjects: "{{ argocd_git_ops_app_projects }}"
      applications: "{{ argocd_git_ops_applications }}"
      extraObjects: "{{ argocd_gitops_extra_objects }}"
