all:
  vars:
    # ------
    # registry+images (AirGap)
    # ------
    # для приватного registry переопределить все три переменные в hosts-vars-override/argocd.yaml:
    #   argocd_image_main_with_registry: "my-registry.local/argoproj/argocd"
    #   argocd_image_dex_with_registry:  "my-registry.local/dexidp/dex"
    #   argocd_image_redis_with_registry: "my-registry.local/library/redis"
    #
    # СБ должна загрузить следующие образы (путь после хоста остаётся оригинальным):
    #   quay.io/argoproj/argocd:<argocd_image_main_tag>     (main + dex initContainer)
    #   ghcr.io/dexidp/dex:<argocd_image_dex_tag>           (dex server)
    #   docker.io/library/redis:<argocd_image_redis_tag>    (redis)
    argocd_image_main_with_registry: "quay.io/argoproj/argocd"
    argocd_image_main_tag: "v3.0.6"
    # Dex server image
    argocd_image_dex_with_registry: "ghcr.io/dexidp/dex"
    argocd_image_dex_tag: "v2.41.1"
    argocd_image_redis_with_registry: "docker.io/library/redis"
    argocd_image_redis_tag: "7.2.7-alpine"
    # ---------
    # ---------
    # Helm timeouts
    argocd_pre_helm_timeout: "5m"
    argocd_install_helm_timeout: "5m"
    argocd_rollout_timeout: "180s"
    argocd_post_helm_timeout: "5m"
    argocd_gitops_helm_timeout: "3m"
    # ---------
    argocd_namespace: "argocd" # DO NOT CHANGE - hardcoded in ClusterRoleBindings
    argocd_ui_domain: "argocd-ui-k8s-v2.drawapp.ru"
    argocd_external_url: "https://argocd-ui-k8s-v2.drawapp.ru"
    argocd_ui_https_secret_name: "cert-argocd-ui"
    argocd_rpc_domain: "argocd-rpc-k8s-v2.drawapp.ru"
    argocd_rpc_https_secret_name: "cert-argocd-rpc"
    argocd_vpn_only_enabled: false
    argocd_cluster_issuer_name: "acme-prod"
    argocd_ingress_class_name: "traefik-lb"
    argocd_ingress_http_enable: false
    argocd_ingress_https_enable: true
    # ------
    argocd_admin_username: "admin"
    argocd_cm_extra:
      url: "{{ argocd_external_url }}"
      timeout.reconciliation: "30s"
      timeout.reconciliation.jitter: "10s"
      users.anonymous.enabled: "false"
      users.session.duration: "120h"
      resource.customizations: |
        networking.k8s.io/Ingress:
          health.lua: |
            hs = {}
            hs.status = "Healthy"
            hs.message = "Skip health check for Ingress"
            return hs
    argocd_cm_cmd_params_extra:
      server.insecure: "true"
    argocd_cm_gpg_keys_extra: {}
    argocd_cm_notifications_extra: {}
    argocd_cm_rbac_extra: {}
    argocd_cm_ssh_known_hosts_extra: []
    argocd_cm_tls_certs_extra: {}
    # Prometheus metrics ports (hardcoded in ArgoCD manifests)
    argocd_application_controller_metrics_port: 8082
    argocd_server_metrics_port: 8083
    argocd_repo_server_metrics_port: 8084
    argocd_applicationset_controller_metrics_port: 8080
    argocd_dex_server_metrics_port: 5558
    argocd_notifications_controller_metrics_port: 9001
    # ------
    # ArgoCD git-ops setup
    # ------
    # Each entry creates one AppProject + one or more Applications in ArgoCD
    # Пример и переопределение — в hosts-vars-override/argocd.yaml
    argocd_git_ops_apps: []
    # Pre-phase values (ESO + ConfigMaps + NetworkPolicies chart)
    # eso_vault_integration_argocd_secrets_merged — runtime-факт от tasks-eso-merge.yaml [always]
    # argocd_acme_solver_pod_labels — runtime-факт от tasks-resolve-acme-solver.yaml [always]
    argocd_pre_helm_values:
      namespace: "{{ argocd_namespace }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        instanceName: "traefik-{{ traefik_namespace }}"
      gitlab:
        namespace: "{{ gitlab_namespace }}"
        sshPortInternal: "{{ gitlab_ssh_port_internal }}"
      gitlabRunner:
        namespace: "{{ gitlab_runner_namespace }}"
      gitlabRunnerJob:
        name: "{{ gitlab_runner_job_label_name }}"
        component: "{{ gitlab_runner_job_label_component }}"
      eso:
        vaultServerUrl: "{{ vault_internal_url }}"
        saName: "{{ eso_vault_integration_argocd.sa_name }}"
        roleName: "{{ eso_vault_integration_argocd.role_name }}"
        secretStoreName: "{{ eso_vault_integration_argocd.secret_store_name }}"
        kvEnginePath: "{{ eso_vault_integration_argocd.kv_engine_path }}"
        isNeedEso: "{{ eso_vault_integration_argocd.is_need_eso | default(true) }}"
        secrets: "{{ eso_vault_integration_argocd_secrets_merged }}"
      esoResourcesConfig:
        secretStoreRefreshInterval: "{{ eso_resources_config.secret_store_refresh_interval }}"
        externalSecretRefreshInterval: "{{ eso_resources_config.external_secret_refresh_interval }}"
        externalSecretRefreshPolicy: "{{ eso_resources_config.external_secret_refresh_policy }}"
      configMaps:
        argocdCm:
          data: "{{ argocd_cm_extra }}"
        cmdParamsCm:
          data: "{{ argocd_cm_cmd_params_extra }}"
        gpgKeysCm:
          data: "{{ argocd_cm_gpg_keys_extra }}"
        notificationsCm:
          data: "{{ argocd_cm_notifications_extra }}"
        rbacCm:
          data: "{{ argocd_cm_rbac_extra }}"
        sshKnownHostsCm:
          additional: "{{ argocd_cm_ssh_known_hosts_extra }}"
        tlsCertsCm:
          data: "{{ argocd_cm_tls_certs_extra }}"
      acmeSolverLabels: "{{ argocd_acme_solver_pod_labels }}"
    # Install-phase values (ArgoCD manifests chart)
    argocd_install_helm_values:
      namespace: "{{ argocd_namespace }}"
      global:
        image:
          mainWithRegistry: "{{ argocd_image_main_with_registry }}"
          mainTag: "{{ argocd_image_main_tag }}"
          dexWithRegistry: "{{ argocd_image_dex_with_registry }}"
          dexTag: "{{ argocd_image_dex_tag }}"
          redisWithRegistry: "{{ argocd_image_redis_with_registry }}"
          redisTag: "{{ argocd_image_redis_tag }}"
      tolerations: []
      nodeSelector: {}
      resources:
        applicationController: {}
        applicationsetController: {}
        dexServer: {}
        notificationsController: {}
        redis: {}
        repoServer: {}
        server: {}
    # Post-phase values (Ingress + ServiceMonitor chart)
    argocd_post_helm_values:
      namespace: "{{ argocd_namespace }}"
      ingress:
        uiDomain: "{{ argocd_ui_domain }}"
        rpcDomain: "{{ argocd_rpc_domain }}"
        ingressClass: "{{ argocd_ingress_class_name }}"
        clusterIssuer: "{{ argocd_cluster_issuer_name }}"
        uiSecretName: "{{ argocd_ui_https_secret_name }}"
        rpcSecretName: "{{ argocd_rpc_https_secret_name }}"
        vpnOnlyEnabled: "{{ argocd_vpn_only_enabled }}"
        vpnIngressRouteMiddlewares: "{{ vpn_ingress_route_middlewares }}"
        httpEnable: "{{ argocd_ingress_http_enable }}"
        httpsEnable: "{{ argocd_ingress_https_enable }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        entryPoints:
          web: "{{ traefik_web_entrypoint }}"
          websecure: "{{ traefik_websecure_entrypoint }}"
      serviceMonitor:
        enabled: true
        interval: "30s"
        scrapeTimeout: "15s"
        labels: {}
    # GitOps-phase values (AppProject + Applications chart)
    argocd_gitops_helm_values:
      namespace: "{{ argocd_namespace }}"
      gitOpsApps: "{{ argocd_git_ops_apps }}"
