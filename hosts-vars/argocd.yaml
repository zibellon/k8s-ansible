all:
  vars:
    # ------
    # registry+images (AirGap)
    # ------
    # для приватного registry переопределить все три переменные в hosts-vars-override/argocd.yaml:
    #   argocd_image_main_with_registry: "my-registry.local/argoproj/argocd"
    #   argocd_image_dex_with_registry:  "my-registry.local/dexidp/dex"
    #   argocd_image_redis_with_registry: "my-registry.local/library/redis"
    #
    # СБ должна загрузить следующие образы (путь после хоста остаётся оригинальным):
    #   quay.io/argoproj/argocd:<argocd_image_main_tag>     (main + dex initContainer)
    #   ghcr.io/dexidp/dex:<argocd_image_dex_tag>           (dex server)
    #   docker.io/library/redis:<argocd_image_redis_tag>    (redis)
    argocd_image_main_with_registry: "quay.io/argoproj/argocd"
    argocd_image_main_tag: "v3.0.6"
    # Dex server image
    argocd_image_dex_with_registry: "ghcr.io/dexidp/dex"
    argocd_image_dex_tag: "v2.41.1"
    argocd_image_redis_with_registry: "docker.io/library/redis"
    argocd_image_redis_tag: "7.2.7-alpine"
    # ---------
    # ---------
    # Helm timeouts
    argocd_pre_helm_timeout: "5m"
    argocd_install_helm_timeout: "5m"
    argocd_rollout_timeout: "180s"
    argocd_post_helm_timeout: "5m"
    argocd_gitops_helm_timeout: "3m"
    # ---------
    argocd_namespace: "argocd" # DO NOT CHANGE - hardcoded in ClusterRoleBindings
    argocd_ui_domain: "argocd-ui-k8s-v2.drawapp.ru"
    argocd_external_url: "https://argocd-ui-k8s-v2.drawapp.ru"
    argocd_ui_https_secret_name: "cert-argocd-ui"
    argocd_rpc_domain: "argocd-rpc-k8s-v2.drawapp.ru"
    argocd_rpc_https_secret_name: "cert-argocd-rpc"
    argocd_vpn_only_enabled: false
    argocd_cluster_issuer_name: "acme-prod"
    argocd_ingress_class_name: "traefik-lb"
    argocd_ingress_http_enable: false
    argocd_ingress_https_enable: true
    # ------
    argocd_admin_username: "admin"
    argocd_reconciliation_timeout: "30s"
    argocd_reconciliation_jitter: "10s"
    argocd_session_duration: "120h"
    argocd_cm_extra:
      url: "{{ argocd_external_url }}"
      timeout.reconciliation: "30s"
      timeout.reconciliation.jitter: "10s"
      users.anonymous.enabled: "false"
      users.session.duration: "120h"
      resource.customizations: |
        networking.k8s.io/Ingress:
          health.lua: |
            hs = {}
            hs.status = "Healthy"
            hs.message = "Skip health check for Ingress"
            return hs
    argocd_cm_cmd_params_extra:
      server.insecure: "true"
    argocd_cm_gpg_keys_extra: {}
    argocd_cm_notifications_extra: {}
    argocd_cm_rbac_extra: {}
    argocd_cm_ssh_known_hosts_extra: []
    argocd_cm_tls_certs_extra: {}
    # Tolerations (все ArgoCD workloads)
    argocd_tolerations: []
    argocd_node_selector: {}
    # Resources (по компонентам)
    argocd_resources_application_controller: {}
    argocd_resources_applicationset_controller: {}
    argocd_resources_dex_server: {}
    argocd_resources_notifications_controller: {}
    argocd_resources_redis: {}
    argocd_resources_repo_server: {}
    argocd_resources_server: {}
    # Prometheus metrics ports (hardcoded in ArgoCD manifests)
    argocd_application_controller_metrics_port: 8082
    argocd_server_metrics_port: 8083
    argocd_repo_server_metrics_port: 8084
    argocd_applicationset_controller_metrics_port: 8080
    argocd_dex_server_metrics_port: 5558
    argocd_notifications_controller_metrics_port: 9001
    # ServiceMonitor (prometheus-operator)
    argocd_service_monitor_enabled: true
    argocd_service_monitor_interval: "30s"
    argocd_service_monitor_scrape_timeout: "15s"
    argocd_service_monitor_additional_labels: {}
    # ------
    # ArgoCD git-ops setup
    # ------
    # Each entry creates one AppProject + one or more Applications in ArgoCD
    # Пример и переопределение — в hosts-vars-override/argocd.yaml
    argocd_git_ops_apps: []
