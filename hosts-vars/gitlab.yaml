all:
  vars:
    # ------
    # registry+images (AirGap)
    # ------
    # Registry для образов GitLab. По умолчанию — registry.gitlab.com.
    # Для airgap/приватного registry — переопределить в hosts-vars-override/gitlab.yaml:
    #   gitlab_image_registry_host: "my-private-registry.local"
    #
    # СБ должна загрузить следующие образы (только хост меняется, пути остаются оригинальными):
    #   <host>/gitlab-org/build/cng/gitlab-webservice-ce:v<gitlabVersion>
    #   <host>/gitlab-org/build/cng/gitlab-workhorse-ce:v<gitlabVersion>
    #   <host>/gitlab-org/build/cng/gitlab-sidekiq-ce:v<gitlabVersion>
    #   <host>/gitlab-org/build/cng/gitlab-toolbox-ce:v<gitlabVersion>   (toolbox + migrations)
    #   <host>/gitlab-org/build/cng/gitaly:v<gitlabVersion>
    #   <host>/gitlab-org/build/cng/gitlab-shell:v<gitlabVersion>
    #   <host>/gitlab-org/build/cng/gitlab-exporter:v<gitlabVersion>
    #   <host>/gitlab-org/build/cng/gitlab-pages:v<gitlabVersion>
    #   <host>/gitlab-org/build/cng/gitlab-container-registry:v<gitlabVersion>
    #   <host>/gitlab-org/build/cng/certificates:v<gitlabVersion>
    #   <host>/gitlab-org/build/cng/kubectl:v<gitlabVersion>
    #   <host>/gitlab-org/build/cng/gitlab-base:v<gitlabVersion>
    gitlab_image_registry_host: "registry.gitlab.com"
    # ---------
    # Registry для sub-releases: PostgreSQL, Redis, MinIO. По умолчанию — docker.io.
    # Для airgap — переопределить в hosts-vars-override/gitlab.yaml:
    #   gitlab_postgresql_image_registry: "my-private-registry.local"
    #   gitlab_redis_image_registry:      "my-private-registry.local"
    #   gitlab_minio_image_registry:      "my-private-registry.local"
    #
    # СБ должна загрузить (3 образа):
    #   <registry>/postgres:16-alpine
    #   <registry>/redis/redis-stack-server:latest
    #   <registry>/minio/minio:latest
    gitlab_postgresql_image_registry: "docker.io"
    gitlab_redis_image_registry: "docker.io"
    gitlab_minio_image_registry: "docker.io"
    # ---------
    # ---------
    gitlab_namespace: "gitlab"
    # Helm repository - источник chart (переопределить в hosts-vars-override/ для airgap)
    gitlab_helm_repo_url: "https://charts.gitlab.io"
    gitlab_helm_repo_name: "gitlab"
    gitlab_helm_chart_name: "gitlab"
    gitlab_chart_version: "8.11.8"  # GitLab 17.11
    # Helm timeouts
    gitlab_pre_helm_timeout: "5m"
    
    gitlab_postgresql_helm_timeout: "5m"
    gitlab_postgresql_rollout_timeout: "300s"

    gitlab_redis_helm_timeout: "5m"
    gitlab_redis_rollout_timeout: "300s"

    gitlab_minio_helm_timeout: "5m"
    gitlab_minio_rollout_timeout: "300s"
    
    gitlab_install_helm_timeout: "15m"
    gitlab_rollout_timeout: "600s"
    
    gitlab_post_helm_timeout: "5m"

    # Base domain - используется для генерации внутренних URL (CI/CD переменные, clone URL, webhooks)
    # https: true - потому что внешний трафик приходит по HTTPS (TLS терминируется на Traefik + cert-manager)
    gitlab_ssh_port_external: 3714
    gitlab_ssh_port_internal: 2222 # WARNING: DO NOT CHANGE - hardcoded in charts
    gitlab_ui_domain: "gitlab-k8s-v2.drawapp.ru"
    gitlab_base_domain: "gitlab-k8s-v2.drawapp.ru"
    gitlab_external_https: true
    gitlab_ui_https_secret_name: "cert-gitlab-ui"
    gitlab_registry_domain: "gitlab-registry-k8s-v2.drawapp.ru"
    gitlab_registry_https_secret_name: "cert-gitlab-registry"
    gitlab_pages_domain: "gitlab-pages-k8s-v2.drawapp.ru"
    gitlab_pages_https_secret_name: "cert-gitlab-pages"
    gitlab_minio_console_domain: "gitlab-minio-k8s-v2.drawapp.ru"
    gitlab_minio_console_https_secret_name: "cert-gitlab-minio-console"
    gitlab_minio_api_domain: "gitlab-minio-api-k8s-v2.drawapp.ru"
    gitlab_minio_api_https_secret_name: "cert-gitlab-minio-api"
    # ---
    gitlab_cluster_issuer_name: "acme-prod"
    gitlab_ingress_class_name: "traefik-lb"
    gitlab_ingress_http_enable: false
    gitlab_ingress_https_enable: true
    gitlab_minio_ingress_http_enable: false
    gitlab_minio_ingress_https_enable: true
    gitlab_vpn_only_enabled: false

    # GitLab PostgreSQL
    gitlab_postgresql_image: "{{ gitlab_postgresql_image_registry }}/postgres:16-alpine"
    gitlab_postgresql_storage_class: "lh-major-multi-best-effort"
    gitlab_postgresql_storage_size: "4Gi"

    # GitLab Redis
    gitlab_redis_image: "{{ gitlab_redis_image_registry }}/redis/redis-stack-server:latest"
    gitlab_redis_storage_class: "lh-major-single-best-effort"
    gitlab_redis_storage_size: "1Gi"

    # GitLab MinIO
    gitlab_minio_image: "{{ gitlab_minio_image_registry }}/minio/minio:latest"
    gitlab_minio_root_user: "admin"
    gitlab_minio_storage_class: "lh-major-single-best-effort"
    gitlab_minio_storage_size: "2Gi"

    # GitLab MinIO S3 connection settings (used by ESO template for gitlab_minio_connection secret)
    gitlab_minio_s3_endpoint: "http://gitlab-minio:9000"
    gitlab_minio_s3_region: "us-east-1"
    gitlab_minio_s3_path_style: true

    # GitLab Gitaly storage
    gitlab_gitaly_storage_size: "4Gi"
    gitlab_gitaly_storage_class: "lh-major-single-best-effort"

    # Helm chart values
    gitlab_helm_values:
      global:
        edition: ce
        # Версия образов GitLab — должна соответствовать gitlab_chart_version (8.11.8 = GitLab 17.11)
        gitlabVersion: "17.11.7"
        communityImages:
          webservice:
            repository: "{{ gitlab_image_registry_host }}/gitlab-org/build/cng/gitlab-webservice-ce"
          workhorse:
            repository: "{{ gitlab_image_registry_host }}/gitlab-org/build/cng/gitlab-workhorse-ce"
          sidekiq:
            repository: "{{ gitlab_image_registry_host }}/gitlab-org/build/cng/gitlab-sidekiq-ce"
          toolbox:
            repository: "{{ gitlab_image_registry_host }}/gitlab-org/build/cng/gitlab-toolbox-ce"
          migrations:
            repository: "{{ gitlab_image_registry_host }}/gitlab-org/build/cng/gitlab-toolbox-ce"
        certificates:
          image:
            repository: "{{ gitlab_image_registry_host }}/gitlab-org/build/cng/certificates"
        kubectl:
          image:
            repository: "{{ gitlab_image_registry_host }}/gitlab-org/build/cng/kubectl"
        gitlabBase:
          image:
            repository: "{{ gitlab_image_registry_host }}/gitlab-org/build/cng/gitlab-base"
        hosts:
          domain: "{{ gitlab_base_domain }}"
          https: "{{ gitlab_external_https }}"
          gitlab:
            name: "{{ gitlab_ui_domain }}"
            https: "{{ gitlab_external_https }}"
          registry:
            name: "{{ gitlab_registry_domain }}"
            https: "{{ gitlab_external_https }}"
          pages:
            name: "{{ gitlab_pages_domain }}"
            https: "{{ gitlab_external_https }}"
        ingress:
          enabled: false
          configureCertmanager: false
        shell:
          port: "{{ gitlab_ssh_port_external }}"
        psql:
          host: gitlab-postgresql
          port: 5432
          database: gitlabhq_production
          username: gitlab
          password:
            useSecret: true
            secret: "{{ secret_postgresql }}"
            key: password
        redis:
          host: gitlab-redis
          port: 6379
          auth:
            enabled: true
            secret: "{{ secret_redis }}"
            key: password
        minio:
          enabled: false
        registry:
          bucket: registry
        kas:
          enabled: false
        pages:
          enabled: true
        appConfig:
          lfs:
            enabled: false
          object_store:
            enabled: true
            proxy_download: true
            connection:
              secret: "{{ secret_gitlab_minio_connection }}"
              key: connection
          artifacts:
            enabled: true
            bucket: gitlab-artifacts
          uploads:
            enabled: true
            bucket: gitlab-uploads
          packages:
            enabled: true
            bucket: gitlab-packages
          backups:
            bucket: gitlab-backups
        smtp:
          enabled: false
        monitoring:
          enabled: true
      nginx-ingress:
        enabled: false
      certmanager:
        install: false
      prometheus:
        install: false
      postgresql:
        install: false
      redis:
        install: false
      registry:
        enabled: true
        image:
          repository: "{{ gitlab_image_registry_host }}/gitlab-org/build/cng/gitlab-container-registry"
        tolerations: []
        nodeSelector: {}
        resources: {}
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
            endpointConfig:
              interval: "30s"
              scrapeTimeout: "10s"
        hpa:
          minReplicas: 1
          maxReplicas: 1
        maxUnavailable: 1
        deployment:
          strategy:
            type: Recreate
        storage:
          secret: "{{ secret_gitlab_registry_minio_connection }}"
          key: config
          redirect:
            disable: true
      gitlab:
        webservice:
          tolerations: []
          nodeSelector: {}
          minReplicas: 1
          maxReplicas: 1
          maxUnavailable: 1
          deployment:
            strategy:
              type: Recreate
          workerProcesses: 2
          workerTimeout: 180
          resources:
            requests:
              memory: "2Gi"
              cpu: "250m"
            limits:
              memory: "4Gi"
          metrics:
            serviceMonitor:
              enabled: true
              endpointConfig:
                interval: "30s"
                scrapeTimeout: "10s"
          workhorse:
            metrics:
              enabled: true
              serviceMonitor:
                enabled: true
                endpointConfig:
                  interval: "30s"
                  scrapeTimeout: "10s"
        sidekiq:
          tolerations: []
          nodeSelector: {}
          minReplicas: 1
          maxReplicas: 1
          maxUnavailable: 1
          deployment:
            strategy:
              type: Recreate
          concurrency: 10
          resources:
            requests:
              memory: "1Gi"
              cpu: "250m"
            limits:
              memory: "3Gi"
          metrics:
            enabled: true
            podMonitor:
              enabled: true
              endpointConfig:
                interval: "30s"
                scrapeTimeout: "10s"
        gitlab-shell:
          image:
            repository: "{{ gitlab_image_registry_host }}/gitlab-org/build/cng/gitlab-shell"
          tolerations: []
          nodeSelector: {}
          resources: {}
          minReplicas: 1
          maxReplicas: 1
          maxUnavailable: 1
          deployment:
            strategy:
              type: Recreate
        gitaly:
          image:
            repository: "{{ gitlab_image_registry_host }}/gitlab-org/build/cng/gitaly"
          tolerations: []
          nodeSelector: {}
          resources: {}
          persistence:
            size: "{{ gitlab_gitaly_storage_size }}"
            storageClass: "{{ gitlab_gitaly_storage_class }}"
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
              endpointConfig:
                interval: "30s"
                scrapeTimeout: "10s"
        gitlab-exporter:
          image:
            repository: "{{ gitlab_image_registry_host }}/gitlab-org/build/cng/gitlab-exporter"
          tolerations: []
          nodeSelector: {}
          resources: {}
          deployment:
            strategy:
              type: Recreate
          metrics:
            serviceMonitor:
              enabled: true
              endpointConfig:
                interval: "30s"
                scrapeTimeout: "10s"
        gitlab-pages:
          image:
            repository: "{{ gitlab_image_registry_host }}/gitlab-org/build/cng/gitlab-pages"
          tolerations: []
          nodeSelector: {}
          resources: {}
          hpa:
            minReplicas: 1
            maxReplicas: 1
          deployment:
            strategy:
              type: Recreate
          metrics:
            serviceMonitor:
              enabled: true
              endpointConfig:
                interval: "30s"
                scrapeTimeout: "10s"
        toolbox:
          enabled: true
          tolerations: []
          nodeSelector: {}
          resources: {}
          deployment:
            strategy:
              type: Recreate
        migrations:
          enabled: true
          tolerations: []
          nodeSelector: {}
          resources: {}
      gitlab-runner:
        install: false
      upgradeCheck:
        enabled: true
