all:
  vars:
    gitlab_namespace: "gitlab"
    # Helm repository - источник chart (переопределить в hosts-vars-override/ для airgap)
    gitlab_helm_is_oci: false
    gitlab_helm_url: "https://charts.gitlab.io"
    gitlab_helm_repo_name: "gitlab"
    gitlab_helm_chart_name: "gitlab"
    gitlab_helm_chart_version: "8.11.8"  # GitLab 17.11
    # Helm timeouts
    gitlab_pre_helm_timeout: "5m"

    gitlab_postgresql_helm_timeout: "5m"
    gitlab_postgresql_rollout_timeout: "300s"

    gitlab_redis_helm_timeout: "5m"
    gitlab_redis_rollout_timeout: "300s"

    gitlab_minio_helm_timeout: "5m"
    gitlab_minio_rollout_timeout: "300s"

    gitlab_install_helm_timeout: "30m"
    gitlab_rollout_timeout: "900s"

    gitlab_post_helm_timeout: "5m"

    # Base domain - используется для генерации внутренних URL (CI/CD переменные, clone URL, webhooks)
    # https: true - потому что внешний трафик приходит по HTTPS (TLS терминируется на Traefik + cert-manager)
    gitlab_ssh_port_external: 3714
    gitlab_ssh_port_internal: 2222 # WARNING: DO NOT CHANGE - hardcoded in charts
    gitlab_ui_domain: "gitlab-k8s-v2.drawapp.ru"
    gitlab_base_domain: "gitlab-k8s-v2.drawapp.ru"
    gitlab_external_https: true
    gitlab_ui_https_secret_name: "cert-gitlab-ui"
    gitlab_registry_domain: "gitlab-registry-k8s-v2.drawapp.ru"
    gitlab_registry_https_secret_name: "cert-gitlab-registry"
    gitlab_pages_domain: "gitlab-pages-k8s-v2.drawapp.ru"
    gitlab_pages_https_secret_name: "cert-gitlab-pages"
    gitlab_minio_console_domain: "gitlab-minio-k8s-v2.drawapp.ru"
    gitlab_minio_console_https_secret_name: "cert-gitlab-minio-console"
    gitlab_minio_api_domain: "gitlab-minio-api-k8s-v2.drawapp.ru"
    gitlab_minio_api_https_secret_name: "cert-gitlab-minio-api"
    # ---
    gitlab_cluster_issuer_name: "acme-prod"
    gitlab_ingress_class_name: "traefik-lb"
    gitlab_ingress_http_enable: false
    gitlab_ingress_https_enable: true
    gitlab_minio_ingress_http_enable: false
    gitlab_minio_ingress_https_enable: true
    gitlab_vpn_only_enabled: false

    # GitLab PostgreSQL
    gitlab_postgresql_image: "docker.io/postgres:16-alpine"
    gitlab_postgresql_storage_class: "lnstr-major-multi-sync"
    gitlab_postgresql_storage_size: "4Gi"

    # GitLab Redis
    gitlab_redis_image: "docker.io/redis/redis-stack-server:latest"
    gitlab_redis_storage_class: "lnstr-major-local"
    gitlab_redis_storage_size: "1Gi"

    # GitLab MinIO
    gitlab_minio_image: "docker.io/minio/minio:latest"
    gitlab_minio_root_user: "admin"
    gitlab_minio_storage_class: "lnstr-major-local"
    gitlab_minio_storage_size: "2Gi"

    # GitLab MinIO S3 connection settings (used by ESO template for gitlab_minio_connection secret)
    gitlab_minio_s3_endpoint: "http://gitlab-minio:9000"
    gitlab_minio_s3_region: "us-east-1"
    gitlab_minio_s3_path_style: true

    # GitLab Gitaly storage
    gitlab_gitaly_storage_size: "4Gi"
    gitlab_gitaly_storage_class: "lnstr-major-local"

    # ---
    # ---
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    gitlab_pre_extra_objects: []
    # Pre-phase kustomize patches (operator-side customization, default empty)
    gitlab_pre_kustomize_patches: []
    # Pre-phase values (ESO Resources + NetworkPolicies chart)
    # eso_vault_integration_gitlab_secrets_merged — runtime-факт от tasks-eso-merge.yaml [always]
    # acme_pod_labels_result_fact — runtime-факт от tasks-resolve-acme-solver.yaml [always]
    gitlab_pre_helm_values:
      namespace: "{{ gitlab_namespace }}"
      externalSecrets:
        namespace: "{{ external_secrets_namespace }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        instanceName: "traefik-{{ traefik_namespace }}"
      haproxy:
        namespace: "{{ haproxy_namespace }}"
      gitlab:
        releaseName: gitlab
        sshPortExternal: "{{ gitlab_ssh_port_external }}"
        sshPortInternal: "{{ gitlab_ssh_port_internal }}"
        vpnOnlyEnabled: "{{ gitlab_vpn_only_enabled }}"
        vpnIps: "{{ vpn_ips }}"
      eso:
        vaultServerUrl: "{{ vault_internal_url }}"
        saName: "{{ eso_vault_integration_gitlab.sa_name }}"
        roleName: "{{ eso_vault_integration_gitlab.role_name }}"
        secretStoreName: "{{ eso_vault_integration_gitlab.secret_store_name }}"
        kvEnginePath: "{{ eso_vault_integration_gitlab.kv_engine_path }}"
        isNeedEso: "{{ eso_vault_integration_gitlab.is_need_eso | default(true) }}"
        secrets: "{{ eso_vault_integration_gitlab_secrets_merged }}"
      esoResourcesConfig:
        secretStoreRefreshInterval: "{{ eso_resources_config.secret_store_refresh_interval }}"
        externalSecretRefreshInterval: "{{ eso_resources_config.external_secret_refresh_interval }}"
        externalSecretRefreshPolicy: "{{ eso_resources_config.external_secret_refresh_policy }}"
      minio:
        s3Endpoint: "{{ gitlab_minio_s3_endpoint }}"
        s3Region: "{{ gitlab_minio_s3_region }}"
        s3PathStyle: "{{ gitlab_minio_s3_path_style }}"
      acmeSolverLabels: "{{ acme_pod_labels_result_fact }}"
      extraObjects: "{{ gitlab_pre_extra_objects }}"
    # ---
    # ---
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    gitlab_postgresql_extra_objects: []
    # Postgresql-phase kustomize patches (operator-side customization, default empty)
    gitlab_postgresql_kustomize_patches: []
    # PostgreSQL sub-release values
    # _local_gitlab_secret_name_postgresql_creds — runtime-факт от set_fact [always] в playbook
    gitlab_postgresql_helm_values:
      namespace: "{{ gitlab_namespace }}"
      image: "{{ gitlab_postgresql_image }}"
      storageClass: "{{ gitlab_postgresql_storage_class }}"
      storageSize: "{{ gitlab_postgresql_storage_size }}"
      credentialsSecretName: "{{ _local_gitlab_secret_name_postgresql_creds }}"
      extraObjects: "{{ gitlab_postgresql_extra_objects }}"
    # ---
    # ---
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    gitlab_redis_extra_objects: []
    # Redis-phase kustomize patches (operator-side customization, default empty)
    gitlab_redis_kustomize_patches: []
    # Redis sub-release values
    # _local_gitlab_secret_name_redis_creds — runtime-факт от set_fact [always] в playbook
    gitlab_redis_helm_values:
      namespace: "{{ gitlab_namespace }}"
      image: "{{ gitlab_redis_image }}"
      credentialsSecretName: "{{ _local_gitlab_secret_name_redis_creds }}"
      storageClass: "{{ gitlab_redis_storage_class }}"
      storageSize: "{{ gitlab_redis_storage_size }}"
      extraObjects: "{{ gitlab_redis_extra_objects }}"
    # ---
    # ---
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    gitlab_minio_extra_objects: []
    # Minio-phase kustomize patches (operator-side customization, default empty)
    gitlab_minio_kustomize_patches: []
    # MinIO sub-release values
    # _local_gitlab_secret_name_minio_root_creds — runtime-факт от set_fact [always] в playbook
    gitlab_minio_helm_values:
      namespace: "{{ gitlab_namespace }}"
      image: "{{ gitlab_minio_image }}"
      storageClass: "{{ gitlab_minio_storage_class }}"
      storageSize: "{{ gitlab_minio_storage_size }}"
      rootSecretName: "{{ _local_gitlab_secret_name_minio_root_creds }}"
      extraObjects: "{{ gitlab_minio_extra_objects }}"
    # ---
    # ---
    # Helm chart values
    gitlab_helm_values:
      global:
        edition: ce
        # Версия образов GitLab — должна соответствовать gitlab_helm_chart_version (8.11.8 = GitLab 17.11)
        gitlabVersion: "17.11.7"
        hosts:
          domain: "{{ gitlab_base_domain }}"
          https: "{{ gitlab_external_https }}"
          gitlab:
            name: "{{ gitlab_ui_domain }}"
            https: "{{ gitlab_external_https }}"
          registry:
            name: "{{ gitlab_registry_domain }}"
            https: "{{ gitlab_external_https }}"
          pages:
            name: "{{ gitlab_pages_domain }}"
            https: "{{ gitlab_external_https }}"
        ingress:
          enabled: false
          configureCertmanager: false
        shell:
          port: "{{ gitlab_ssh_port_external }}"
        psql:
          host: gitlab-postgresql
          port: 5432
          database: gitlabhq_production
          username: gitlab
          password:
            useSecret: true
            secret: "{{ _local_gitlab_secret_name_postgresql_creds }}"
            key: password
        redis:
          host: gitlab-redis
          port: 6379
          auth:
            enabled: true
            secret: "{{ _local_gitlab_secret_name_redis_creds }}"
            key: password
        minio:
          enabled: false
        registry:
          bucket: registry
        kas:
          enabled: false
        pages:
          enabled: true
        appConfig:
          lfs:
            enabled: false
          object_store:
            enabled: true
            proxy_download: true
            connection:
              secret: "{{ _local_gitlab_secret_name_backup_s3_connection_config }}"
              key: connection
          artifacts:
            enabled: true
            bucket: gitlab-artifacts
          uploads:
            enabled: true
            bucket: gitlab-uploads
          packages:
            enabled: true
            bucket: gitlab-packages
          backups:
            bucket: gitlab-backups
        smtp:
          enabled: false
        monitoring:
          enabled: true
      nginx-ingress:
        enabled: false
      certmanager:
        install: false
      prometheus:
        install: false
      postgresql:
        install: false
      redis:
        install: false
      registry:
        enabled: true
        tolerations: []
        nodeSelector: {}
        resources: {}
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
            endpointConfig:
              interval: "30s"
              scrapeTimeout: "10s"
        hpa:
          minReplicas: 1
          maxReplicas: 1
        maxUnavailable: 1
        deployment:
          strategy:
            type: Recreate
        storage:
          secret: "{{ _local_gitlab_secret_name_registry_connection_config }}"
          key: config
          redirect:
            disable: true
      gitlab:
        webservice:
          tolerations: []
          nodeSelector: {}
          minReplicas: 1
          maxReplicas: 1
          maxUnavailable: 1
          deployment:
            strategy:
              type: Recreate
          workerProcesses: 2
          workerTimeout: 180
          resources:
            requests:
              memory: "2Gi"
              cpu: "250m"
            limits:
              memory: "4Gi"
          metrics:
            serviceMonitor:
              enabled: true
              endpointConfig:
                interval: "30s"
                scrapeTimeout: "10s"
          workhorse:
            metrics:
              enabled: true
              serviceMonitor:
                enabled: true
                endpointConfig:
                  interval: "30s"
                  scrapeTimeout: "10s"
        sidekiq:
          tolerations: []
          nodeSelector: {}
          minReplicas: 1
          maxReplicas: 1
          maxUnavailable: 1
          deployment:
            strategy:
              type: Recreate
          concurrency: 10
          resources:
            requests:
              memory: "1Gi"
              cpu: "250m"
            limits:
              memory: "3Gi"
          metrics:
            enabled: true
            podMonitor:
              enabled: true
              endpointConfig:
                interval: "30s"
                scrapeTimeout: "10s"
        gitlab-shell:
          tolerations: []
          nodeSelector: {}
          resources: {}
          minReplicas: 1
          maxReplicas: 1
          maxUnavailable: 1
          deployment:
            strategy:
              type: Recreate
        gitaly:
          tolerations: []
          nodeSelector: {}
          resources: {}
          persistence:
            size: "{{ gitlab_gitaly_storage_size }}"
            storageClass: "{{ gitlab_gitaly_storage_class }}"
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
              endpointConfig:
                interval: "30s"
                scrapeTimeout: "10s"
        gitlab-exporter:
          tolerations: []
          nodeSelector: {}
          resources: {}
          deployment:
            strategy:
              type: Recreate
          metrics:
            serviceMonitor:
              enabled: true
              endpointConfig:
                interval: "30s"
                scrapeTimeout: "10s"
        gitlab-pages:
          tolerations: []
          nodeSelector: {}
          resources: {}
          hpa:
            minReplicas: 1
            maxReplicas: 1
          deployment:
            strategy:
              type: Recreate
          metrics:
            serviceMonitor:
              enabled: true
              endpointConfig:
                interval: "30s"
                scrapeTimeout: "10s"
        toolbox:
          enabled: true
          tolerations: []
          nodeSelector: {}
          resources: {}
          deployment:
            strategy:
              type: Recreate
        migrations:
          enabled: true
          tolerations: []
          nodeSelector: {}
          resources: {}
      gitlab-runner:
        install: false
      upgradeCheck:
        enabled: true
    # ---
    # ---
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    gitlab_post_extra_objects: []
    # Post-phase kustomize patches (operator-side customization, default empty)
    gitlab_post_kustomize_patches: []
    # Post-phase values (Ingress chart)
    gitlab_post_helm_values:
      namespace: "{{ gitlab_namespace }}"
      sshPortExternal: "{{ gitlab_ssh_port_external }}"
      gitlab:
        ingressClass: "{{ gitlab_ingress_class_name }}"
        domain: "{{ gitlab_ui_domain }}"
        registryDomain: "{{ gitlab_registry_domain }}"
        pagesDomain: "{{ gitlab_pages_domain }}"
        clusterIssuer: "{{ gitlab_cluster_issuer_name }}"
        uiSecretName: "{{ gitlab_ui_https_secret_name }}"
        registrySecretName: "{{ gitlab_registry_https_secret_name }}"
        pagesSecretName: "{{ gitlab_pages_https_secret_name }}"
        vpnOnlyEnabled: "{{ gitlab_vpn_only_enabled }}"
        vpnIngressMiddlewares: "{{ vpn_ingress_middlewares }}"
        httpEnable: "{{ gitlab_ingress_http_enable }}"
        httpsEnable: "{{ gitlab_ingress_https_enable }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        entryPoints:
          web: "{{ traefik_web_entrypoint }}"
          websecure: "{{ traefik_websecure_entrypoint }}"
      minio:
        ingressClass: "{{ gitlab_ingress_class_name }}"
        consoleDomain: "{{ gitlab_minio_console_domain }}"
        apiDomain: "{{ gitlab_minio_api_domain }}"
        clusterIssuer: "{{ gitlab_cluster_issuer_name }}"
        consoleSecretName: "{{ gitlab_minio_console_https_secret_name }}"
        apiSecretName: "{{ gitlab_minio_api_https_secret_name }}"
        vpnOnlyEnabled: "{{ gitlab_vpn_only_enabled }}"
        vpnIngressMiddlewares: "{{ vpn_ingress_middlewares }}"
        httpEnable: "{{ gitlab_minio_ingress_http_enable }}"
        httpsEnable: "{{ gitlab_minio_ingress_https_enable }}"
      haproxy:
        namespace: "{{ haproxy_namespace }}"
        ingressClass: "{{ haproxy_ingress_class }}"
      extraObjects: "{{ gitlab_post_extra_objects }}"
    
    # -------
    # Secret name lookups — used by tasks-eso-lookup.yaml in gitlab-install.yaml / gitlab-configure.yaml
    # Values must match external_secret_name of corresponding eso_vault_integration_gitlab_secrets entry
    # -------
    gitlab_secret_name_postgresql_creds: "eso-gitlab-postgresql-creds"
    gitlab_secret_name_redis_creds: "eso-gitlab-redis-creds"
    gitlab_secret_name_minio_root_creds: "eso-gitlab-minio-root-creds"
    gitlab_secret_name_minio_registry_creds: "eso-gitlab-minio-registry-creds"
    gitlab_secret_name_registry_connection_config: "eso-gitlab-registry-connection-config"
    gitlab_secret_name_backup_s3_connection_config: "eso-gitlab-backup-s3-connection-config"
    gitlab_secret_name_root_creds: "eso-gitlab-root-creds"
    # ---------
    # GitLab (all secrets: postgresql, redis, minio, gitlab root)
    # ---------
    eso_vault_integration_gitlab:
      sa_name: "eso-main"
      role_name: "gitlab.eso-main"
      secret_store_name: "eso-main.vault"
      kv_engine_path: "eso-secret"

    eso_vault_integration_gitlab_secrets:
      - external_secret_name: "{{ gitlab_secret_name_postgresql_creds }}"
        vault_path: "/gitlab/postgresql/creds"
        body:
          target:
            name: "{{ gitlab_secret_name_postgresql_creds }}"
          dataFrom:
            - extract:
                key: "{{ eso_vault_integration_gitlab.kv_engine_path }}/data/gitlab/postgresql/creds"
      - external_secret_name: "{{ gitlab_secret_name_redis_creds }}"
        vault_path: "/gitlab/redis/creds"
        body:
          target:
            name: "{{ gitlab_secret_name_redis_creds }}"
          dataFrom:
            - extract:
                key: "{{ eso_vault_integration_gitlab.kv_engine_path }}/data/gitlab/redis/creds"
      - external_secret_name: "{{ gitlab_secret_name_minio_root_creds }}"
        vault_path: "/gitlab/minio/root"
        body:
          target:
            name: "{{ gitlab_secret_name_minio_root_creds }}"
          dataFrom:
            - extract:
                key: "{{ eso_vault_integration_gitlab.kv_engine_path }}/data/gitlab/minio/root"
      - external_secret_name: "{{ gitlab_secret_name_minio_registry_creds }}"
        vault_path: "/gitlab/minio/registry"
        body:
          target:
            name: "{{ gitlab_secret_name_minio_registry_creds }}"
          dataFrom:
            - extract:
                key: "{{ eso_vault_integration_gitlab.kv_engine_path }}/data/gitlab/minio/registry"
      # SPECIAL: registry_connection_config uses ESO template to generate registry storage config
      - external_secret_name: "{{ gitlab_secret_name_registry_connection_config }}"
        vault_path: "/gitlab/minio/registry"
        body:
          target:
            name: "{{ gitlab_secret_name_registry_connection_config }}"
            template:
              engineVersion: v2
              data:
                config: |
                  s3:
                    bucket: registry
                    accesskey: {% raw %}{{ .access_key }}{% endraw +%}
                    secretkey: {% raw %}{{ .secret_key }}{% endraw +%}
                    regionendpoint: {{ gitlab_minio_s3_endpoint }}
                    region: {{ gitlab_minio_s3_region }}
                    v4auth: true
          data:
            - secretKey: access_key
              remoteRef:
                key: "{{ eso_vault_integration_gitlab.kv_engine_path }}/data/gitlab/minio/registry"
                property: access_key
            - secretKey: secret_key
              remoteRef:
                key: "{{ eso_vault_integration_gitlab.kv_engine_path }}/data/gitlab/minio/registry"
                property: secret_key
      # SPECIAL: backup_s3_connection_config uses ESO template to generate s3_connection YAML
      - external_secret_name: "{{ gitlab_secret_name_backup_s3_connection_config }}"
        vault_path: "/gitlab/minio/registry"
        body:
          target:
            name: "{{ gitlab_secret_name_backup_s3_connection_config }}"
            template:
              engineVersion: v2
              data:
                connection: |
                  provider: AWS
                  region: {{ gitlab_minio_s3_region }}
                  endpoint: {{ gitlab_minio_s3_endpoint }}
                  path_style: {{ gitlab_minio_s3_path_style | lower }}
                  aws_access_key_id: {% raw %}{{ .access_key }}{% endraw +%}
                  aws_secret_access_key: {% raw %}{{ .secret_key }}{% endraw +%}
          data:
            - secretKey: access_key
              remoteRef:
                key: "{{ eso_vault_integration_gitlab.kv_engine_path }}/data/gitlab/minio/registry"
                property: access_key
            - secretKey: secret_key
              remoteRef:
                key: "{{ eso_vault_integration_gitlab.kv_engine_path }}/data/gitlab/minio/registry"
                property: secret_key
      # never rendered (is_need_eso: false) — body присутствует для консистентности схемы
      - external_secret_name: "{{ gitlab_secret_name_root_creds }}"
        vault_path: "/gitlab/root/creds"
        is_need_eso: false
        body:
          target:
            name: "{{ gitlab_secret_name_root_creds }}"
          dataFrom:
            - extract:
                key: "{{ eso_vault_integration_gitlab.kv_engine_path }}/data/gitlab/root/creds"

    eso_vault_integration_gitlab_secrets_extra: []
