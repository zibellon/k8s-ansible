all:
  vars:
    # Component enable flag (default false, opt-in): guards install/configure start + gates cross-ns NetworkPolicies to this component.
    gitlab_enabled: false

    # ------

    gitlab_namespace: "gitlab"

    # ------
    # ------
    # ------

    # Base domain - используется для генерации внутренних URL (CI/CD переменные, clone URL, webhooks)
    # https: true - потому что внешний трафик приходит по HTTPS (TLS терминируется на Traefik + cert-manager)
    gitlab_ssh_port_external: 20001    # NodePort в bastion-proxy L4-диапазоне 20000-22000 (внутренний порт — gitlab_ssh_port_internal)
    gitlab_ssh_accept_proxy: false   # true на кластерах за bastion-proxy (accept PROXY v2); default — прямой доступ
    gitlab_ssh_port_internal: 2222 # WARNING: DO NOT CHANGE - hardcoded in charts
    gitlab_ui_domain: "gitlab-k8s-v2.drawapp.ru"
    gitlab_base_domain: "gitlab-k8s-v2.drawapp.ru"
    gitlab_external_https: true
    gitlab_ui_https_secret_name: "cert-gitlab-ui"
    gitlab_registry_domain: "gitlab-registry-k8s-v2.drawapp.ru"
    gitlab_registry_https_secret_name: "cert-gitlab-registry"
    gitlab_pages_domain: "gitlab-pages-k8s-v2.drawapp.ru"
    gitlab_pages_https_secret_name: "cert-gitlab-pages"
    gitlab_ingress_class_name: "traefik-lb"
    gitlab_vpn_only_enabled: false

    # ------
    # ------
    # ------

    gitlab_acme_issuer_name: "gitlab-acme"
    gitlab_acme_private_key_name: "gitlab-acme-account-key"
    gitlab_acme_server: "https://acme-v02.api.letsencrypt.org/directory"
    gitlab_acme_email: "some-email-123@gmail.com"
    gitlab_acme_solvers:
      - http01:
          ingress:
            ingressClassName: "traefik-lb"
            ingressTemplate:
              metadata:
                annotations:
                  "kubernetes.io/ingress.class": "traefik-lb"
                  "traefik.ingress.kubernetes.io/router.entrypoints": "web"
            podTemplate:
              metadata:
                labels:
                  app.kubernetes.io/name: acme-solver
                  app.kubernetes.io/instance: traefik-lb
                  app.kubernetes.io/component: acme-http01-solver
                  app.kubernetes.io/managed-by: cert-manager
    gitlab_cert_manager_issuer_enabled: true
    gitlab_cert_manager_issuer:
      enabled: "{{ gitlab_cert_manager_issuer_enabled }}"
      name: "{{ gitlab_acme_issuer_name }}"
      spec:
        acme:
          server: "{{ gitlab_acme_server }}"
          email: "{{ gitlab_acme_email }}"
          privateKeySecretRef:
            name: "{{ gitlab_acme_private_key_name }}"
          solvers: "{{ gitlab_acme_solvers }}"

    # ------
    # ------
    # ------

    # Ingress config (per-domain). gitlab — 3 домена (ui + registry + pages).
    gitlab_ui_ingress_enabled: true
    gitlab_ui_ingress_tls_enabled: true
    gitlab_ui_certificate_enabled: true
    gitlab_ui_ingress_config:
      enabled: "{{ gitlab_ui_ingress_enabled }}"
      domain: "{{ gitlab_ui_domain }}"
      ingressClass: "{{ gitlab_ingress_class_name }}"
      tlsEnabled: "{{ gitlab_ui_ingress_tls_enabled }}"
      tlsSecretName: "{{ gitlab_ui_https_secret_name }}"
      vpnOnlyEnabled: "{{ gitlab_vpn_only_enabled }}"
      vpnIngressMiddlewares: "{{ vpn_ingress_middlewares }}"
    # cert-manager Certificate (per-domain) — плоский объект {enabled, name, spec}.
    gitlab_ui_certificate:
      enabled: "{{ gitlab_ui_certificate_enabled }}"
      name: "{{ gitlab_ui_https_secret_name }}"
      spec:
        secretName: "{{ gitlab_ui_https_secret_name }}"
        dnsNames:
          - "{{ gitlab_ui_domain }}"
        issuerRef:
          name: "{{ gitlab_acme_issuer_name }}"
          kind: "Issuer"
    gitlab_registry_ingress_enabled: true
    gitlab_registry_ingress_tls_enabled: true
    gitlab_registry_certificate_enabled: true
    gitlab_registry_ingress_config:
      enabled: "{{ gitlab_registry_ingress_enabled }}"
      domain: "{{ gitlab_registry_domain }}"
      ingressClass: "{{ gitlab_ingress_class_name }}"
      tlsEnabled: "{{ gitlab_registry_ingress_tls_enabled }}"
      tlsSecretName: "{{ gitlab_registry_https_secret_name }}"
      vpnOnlyEnabled: "{{ gitlab_vpn_only_enabled }}"
      vpnIngressMiddlewares: "{{ vpn_ingress_middlewares }}"
    # cert-manager Certificate (per-domain) — плоский объект {enabled, name, spec}.
    gitlab_registry_certificate:
      enabled: "{{ gitlab_registry_certificate_enabled }}"
      name: "{{ gitlab_registry_https_secret_name }}"
      spec:
        secretName: "{{ gitlab_registry_https_secret_name }}"
        dnsNames:
          - "{{ gitlab_registry_domain }}"
        issuerRef:
          name: "{{ gitlab_acme_issuer_name }}"
          kind: "Issuer"
    gitlab_pages_ingress_enabled: true
    gitlab_pages_ingress_tls_enabled: true
    gitlab_pages_certificate_enabled: true
    gitlab_pages_ingress_config:
      enabled: "{{ gitlab_pages_ingress_enabled }}"
      domain: "{{ gitlab_pages_domain }}"
      ingressClass: "{{ gitlab_ingress_class_name }}"
      tlsEnabled: "{{ gitlab_pages_ingress_tls_enabled }}"
      tlsSecretName: "{{ gitlab_pages_https_secret_name }}"
      vpnOnlyEnabled: "{{ gitlab_vpn_only_enabled }}"
      vpnIngressMiddlewares: "{{ vpn_ingress_middlewares }}"
    # cert-manager Certificate (per-domain) — плоский объект {enabled, name, spec}.
    gitlab_pages_certificate:
      enabled: "{{ gitlab_pages_certificate_enabled }}"
      name: "{{ gitlab_pages_https_secret_name }}"
      spec:
        secretName: "{{ gitlab_pages_https_secret_name }}"
        dnsNames:
          - "{{ gitlab_pages_domain }}"
        issuerRef:
          name: "{{ gitlab_acme_issuer_name }}"
          kind: "Issuer"
    gitlab_postgresql_username: "gitlab"
    gitlab_postgresql_database_name: "gitlabhq_production"
    gitlab_postgresql_secret_key_username: "username"
    gitlab_postgresql_secret_key_password: "password"
    gitlab_redis_secret_key_password: "password"
    gitlab_redis_secret_key_redis_args: "redis_args"
    # S3 storage backend (replaces MinIO sub-chart).
    # Endpoint — SeaweedFS S3 service в seaweedfs namespace (default).
    # Operator переопределяет в hosts-vars-override/gitlab.yaml если использует cloud S3.
    gitlab_s3_endpoint: "http://seaweedfs-s3.{{ seaweedfs_namespace }}.svc.{{ cluster_dns_domain }}:8333"
    gitlab_s3_region: "us-east-1"
    gitlab_s3_path_style: true
    # S3 bucket names (hardcoded, mirror seaweedfs-sync.yaml SECTION 2 commented opt-in).
    gitlab_registry_bucket: "gitlab-registry"
    gitlab_artifacts_bucket: "gitlab-artifacts"
    gitlab_uploads_bucket: "gitlab-uploads"
    gitlab_packages_bucket: "gitlab-packages"
    gitlab_backups_bucket: "gitlab-backups"
    gitlab_backups_stage_bucket: "gitlab-backups-stage"
    # S3 creds Vault field names (standardized — identity-distribute Layer 3 fixed keys).
    # Variable name = snake_case convention; value = actual Vault field name (camelCase).
    gitlab_s3_secret_key_username: "username"
    gitlab_s3_secret_key_access_key: "accessKey"
    gitlab_s3_secret_key_secret_key: "secretKey"

    # === SECTION: OIDC / SSO (ZITADEL) ===
    # Выключено по умолчанию (default false). Флипать в true в hosts-vars-override/<cluster>/gitlab.yaml
    # после создания Application gitlab в ZITADEL Console и заполнения eso-secret/gitlab/oidc в Vault
    # (ключи clientId + clientSecret). Локальный root/пароль остаётся (break-glass). Перенос
    # существующих юзеров — link-by-email (autoLinkUser + blockAutoCreatedUsers): поле Email юзера
    # в ZITADEL = email GitLab-аккаунта + verified.
    # ВНИМАНИЕ: GitLab НЕ ре-валидирует сессию у IdP — отзыв юзера = block в GitLab Admin Area,
    # НЕ через ZITADEL; поэтому offline_access в scope не нужен.
    gitlab_oidc_enabled: false
    gitlab_oidc_label: "ZITADEL"
    gitlab_oidc_issuer: "https://{{ zitadel_domain }}"
    # scope — inline JSON-список, оператор задаёт целиком. Для org-pin в override добавить
    # ", \"urn:zitadel:iam:org:id:<orgId>\"".
    gitlab_oidc_scopes: '["openid", "profile", "email"]'

    # === SECTION 2: ESO ===
    # ---------
    # ESO integration: Vault → K8s Secrets
    # Базовые секреты (нужны для запуска) — отдельные named-переменные с полным dict-объектом.
    # eso_vault_integration_gitlab_secrets — массив ссылок на named-переменные
    # (chart eso-external-secret.yaml рендерит .Values.eso.secrets единообразно
    # как для base-ссылок, так и для _extra dict'ов).
    # _extra — расширение оператора через hosts-vars-override/.
    # ---------
    eso_vault_integration_gitlab:
      sa_name: "eso-main"
      role_name: "gitlab.eso-main"
      secret_store_name: "eso-main.vault"
      kv_engine_path: "eso-secret"

    gitlab_secret_postgresql_creds:
      external_secret_name: "eso-gitlab-postgresql-creds"
      vault_path: "/gitlab/postgresql/creds"
      body:
        target:
          name: "eso-gitlab-postgresql-creds"
        dataFrom:
          - extract:
              key: "{{ eso_vault_integration_gitlab.kv_engine_path }}/data/gitlab/postgresql/creds"

    gitlab_secret_redis_creds:
      external_secret_name: "eso-gitlab-redis-creds"
      vault_path: "/gitlab/redis/creds"
      body:
        target:
          name: "eso-gitlab-redis-creds"
        dataFrom:
          - extract:
              key: "{{ eso_vault_integration_gitlab.kv_engine_path }}/data/gitlab/redis/creds"

    # SPECIAL: registry_connection_config uses ESO template to generate registry storage config.
    # Reads creds from new /gitlab/s3-storage path (single source).
    gitlab_secret_registry_connection_config:
      external_secret_name: "eso-gitlab-registry-connection-config"
      vault_path: "/gitlab/s3-storage"
      body:
        target:
          name: "eso-gitlab-registry-connection-config"
          template:
            engineVersion: v2
            data:
              config: |
                s3:
                  bucket: {{ gitlab_registry_bucket }}
                  accesskey: {% raw %}{{ .access_key }}{% endraw +%}
                  secretkey: {% raw %}{{ .secret_key }}{% endraw +%}
                  regionendpoint: {{ gitlab_s3_endpoint }}
                  region: {{ gitlab_s3_region }}
                  v4auth: true
        data:
          - secretKey: access_key
            remoteRef:
              key: "{{ eso_vault_integration_gitlab.kv_engine_path }}/data/gitlab/s3-storage"
              property: "{{ gitlab_s3_secret_key_access_key }}"
          - secretKey: secret_key
            remoteRef:
              key: "{{ eso_vault_integration_gitlab.kv_engine_path }}/data/gitlab/s3-storage"
              property: "{{ gitlab_s3_secret_key_secret_key }}"

    # SPECIAL: object_store_connection_config uses ESO template to generate the consolidated object_store connection YAML.
    # Reads creds from new /gitlab/s3-storage path.
    gitlab_secret_object_store_connection_config:
      external_secret_name: "eso-gitlab-object-store-connection-config"
      vault_path: "/gitlab/s3-storage"
      body:
        target:
          name: "eso-gitlab-object-store-connection-config"
          template:
            engineVersion: v2
            data:
              connection: |
                provider: AWS
                region: {{ gitlab_s3_region }}
                endpoint: {{ gitlab_s3_endpoint }}
                path_style: {{ gitlab_s3_path_style | lower }}
                aws_access_key_id: {% raw %}{{ .access_key }}{% endraw +%}
                aws_secret_access_key: {% raw %}{{ .secret_key }}{% endraw +%}
        data:
          - secretKey: access_key
            remoteRef:
              key: "{{ eso_vault_integration_gitlab.kv_engine_path }}/data/gitlab/s3-storage"
              property: "{{ gitlab_s3_secret_key_access_key }}"
          - secretKey: secret_key
            remoteRef:
              key: "{{ eso_vault_integration_gitlab.kv_engine_path }}/data/gitlab/s3-storage"
              property: "{{ gitlab_s3_secret_key_secret_key }}"

    # SPECIAL: backup_s3cfg — ESO template → s3cmd .s3cfg (INI), потребляется toolbox
    # backup-utility (s3cmd) для backup/restore tarball'а. Reads creds from /gitlab/s3-storage.
    gitlab_secret_backup_s3cfg:
      external_secret_name: "eso-gitlab-backup-s3cfg"
      vault_path: "/gitlab/s3-storage"
      body:
        target:
          name: "eso-gitlab-backup-s3cfg"
          template:
            engineVersion: v2
            data:
              config: |
                [default]
                access_key = {% raw %}{{ .access_key }}{% endraw +%}
                secret_key = {% raw %}{{ .secret_key }}{% endraw +%}
                host_base = {{ gitlab_s3_endpoint | regex_replace('^https?://','') }}
                host_bucket = {{ gitlab_s3_endpoint | regex_replace('^https?://','') }}
                bucket_location = {{ gitlab_s3_region }}
                use_https = {{ 'True' if gitlab_s3_endpoint.startswith('https://') else 'False' }}
                signature_v2 = False
        data:
          - secretKey: access_key
            remoteRef:
              key: "{{ eso_vault_integration_gitlab.kv_engine_path }}/data/gitlab/s3-storage"
              property: "{{ gitlab_s3_secret_key_access_key }}"
          - secretKey: secret_key
            remoteRef:
              key: "{{ eso_vault_integration_gitlab.kv_engine_path }}/data/gitlab/s3-storage"
              property: "{{ gitlab_s3_secret_key_secret_key }}"

    # OIDC omniauth-провайдер (ZITADEL) — ESO template-секрет с полным omniauth-конфигом.
    # clientId/clientSecret инъектятся ESO из Vault eso-secret/gitlab/oidc (escape {% raw %}).
    # Добавляется в eso_vault_integration_gitlab_secrets только при gitlab_oidc_enabled: true.
    gitlab_secret_zitadel_omniauth:
      external_secret_name: "eso-gitlab-zitadel-omniauth"
      vault_path: "/gitlab/oidc"
      body:
        target:
          name: "eso-gitlab-zitadel-omniauth"
          template:
            engineVersion: v2
            data:
              provider: |
                name: openid_connect
                label: {{ gitlab_oidc_label }}
                args:
                  name: openid_connect
                  scope: {{ gitlab_oidc_scopes }}
                  response_type: code
                  issuer: {{ gitlab_oidc_issuer }}
                  discovery: true
                  client_auth_method: basic
                  uid_field: sub
                  extra_authorize_params:
                    prompt: select_account
                  client_options:
                    identifier: "{% raw %}{{ .clientId }}{% endraw +%}"
                    secret: "{% raw %}{{ .clientSecret }}{% endraw +%}"
                    redirect_uri: https://{{ gitlab_ui_domain }}/users/auth/openid_connect/callback
        data:
          - secretKey: clientId
            remoteRef:
              key: "{{ eso_vault_integration_gitlab.kv_engine_path }}/data/gitlab/oidc"
              property: clientId
          - secretKey: clientSecret
            remoteRef:
              key: "{{ eso_vault_integration_gitlab.kv_engine_path }}/data/gitlab/oidc"
              property: clientSecret

    gitlab_root_secret_key_username: "username"
    gitlab_root_secret_key_password: "password"
    gitlab_root_secret_key_password_mtime: "passwordMtime"
    # PINNED — GitLab root user фиксирован, менять нельзя
    gitlab_root_username: "root"
    # Root creds — Vault-source-of-truth, управляются ТОЛЬКО через ansible (gitlab-install.yaml --tags config-root).
    # НЕ ESO-секрет: пароль + passwordMtime живут в Vault (eso_vault_integration_gitlab.kv_engine_path + vaultPath)
    # и пишутся out-of-band task'ом config-root. passwordMtime — ОБЯЗАТЕЛЬНО, RFC3339; смена = триггер ротации.
    gitlab_root_creds:
      passwordMtime: "2026-07-06T00:00:00Z"
      vaultPath: "/gitlab/root/creds"

    # OIDC omniauth-секрет добавляется в список только при gitlab_oidc_enabled: true
    # (при false ExternalSecret не создаётся — Vault-путь /gitlab/oidc ещё пуст).
    eso_vault_integration_gitlab_secrets: >-
      {{ [gitlab_secret_postgresql_creds,
          gitlab_secret_redis_creds,
          gitlab_secret_registry_connection_config,
          gitlab_secret_object_store_connection_config,
          gitlab_secret_backup_s3cfg]
         + ([gitlab_secret_zitadel_omniauth] if gitlab_oidc_enabled | bool else []) }}

    eso_vault_integration_gitlab_secrets_extra: []

    # === SECTION 3 ===
    # --- PHASE: pre ---
    gitlab_pre_helm_timeout: "5m"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    gitlab_pre_extra_objects: []
    # Pre-phase kustomize patches (operator-side customization, default empty)
    gitlab_pre_kustomize_patches: []
    # Pre-phase values (ESO Resources + NetworkPolicies chart)
    # eso_vault_integration_gitlab_secrets — inline merge base + extra (задаётся ниже в eso_vault_integration_gitlab_secrets)
    gitlab_pre_helm_values:
      namespace: "{{ gitlab_namespace }}"
      externalSecrets:
        namespace: "{{ external_secrets_namespace }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        instanceName: "traefik-{{ traefik_namespace }}"
      haproxy:
        namespace: "{{ haproxy_namespace }}"
      seaweedfs:
        namespace: "{{ seaweedfs_namespace }}"
        enabled: "{{ seaweedfs_enabled }}"
        s3Component: "s3"
        s3HttpPort: 8333
      gitlab:
        releaseName: gitlab
        sshPortExternal: "{{ gitlab_ssh_port_external }}"
        sshPortInternal: "{{ gitlab_ssh_port_internal }}"
        vpnOnlyEnabled: "{{ gitlab_vpn_only_enabled }}"
        vpnIps: "{{ vpn_ips }}"
      eso:
        vaultServerUrl: "{{ vault_internal_url }}"
        saName: "{{ eso_vault_integration_gitlab.sa_name }}"
        roleName: "{{ eso_vault_integration_gitlab.role_name }}"
        secretStoreName: "{{ eso_vault_integration_gitlab.secret_store_name }}"
        kvEnginePath: "{{ eso_vault_integration_gitlab.kv_engine_path }}"
        secrets: "{{ eso_vault_integration_gitlab_secrets + (eso_vault_integration_gitlab_secrets_extra | default([])) }}"
      esoResourcesConfig:
        secretStoreRefreshInterval: "{{ eso_resources_config.secret_store_refresh_interval }}"
        externalSecretRefreshInterval: "{{ eso_resources_config.external_secret_refresh_interval }}"
        externalSecretRefreshPolicy: "{{ eso_resources_config.external_secret_refresh_policy }}"
      issuer: "{{ gitlab_cert_manager_issuer }}"
      extraObjects: "{{ gitlab_pre_extra_objects }}"
    # --- PHASE: postgresql ---
    gitlab_postgresql_helm_timeout: "5m"
    gitlab_postgresql_rollout_timeout: "300s"
    gitlab_postgresql_image: "docker.io/postgres:17.9-alpine3.23"
    gitlab_postgresql_storage_class: "lnstr-major-multi-sync"
    gitlab_postgresql_storage_size: "4Gi"
    # Resources / placement (активные default'ы; override заменяет значение ЦЕЛИКОМ).
    gitlab_postgresql_resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    gitlab_postgresql_node_selector:
      node-role.kubernetes.io/worker: ""
    gitlab_postgresql_tolerations: []
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    gitlab_postgresql_extra_objects: []
    # Postgresql-phase kustomize patches (operator-side customization, default empty)
    gitlab_postgresql_kustomize_patches: []
    # PostgreSQL sub-release values
    # secretName берётся из named-переменной gitlab_secret_postgresql_creds.body.target.name
    gitlab_postgresql_helm_values:
      namespace: "{{ gitlab_namespace }}"
      databaseName: "{{ gitlab_postgresql_database_name }}"
      image: "{{ gitlab_postgresql_image }}"
      storageClass: "{{ gitlab_postgresql_storage_class }}"
      storageSize: "{{ gitlab_postgresql_storage_size }}"
      resources: "{{ gitlab_postgresql_resources }}"
      nodeSelector: "{{ gitlab_postgresql_node_selector }}"
      tolerations: "{{ gitlab_postgresql_tolerations }}"
      creds:
        secretName: "{{ gitlab_secret_postgresql_creds.body.target.name }}"
        usernameKey: "{{ gitlab_postgresql_secret_key_username }}"
        passwordKey: "{{ gitlab_postgresql_secret_key_password }}"
      extraObjects: "{{ gitlab_postgresql_extra_objects }}"
    # --- PHASE: redis ---
    gitlab_redis_helm_timeout: "5m"
    gitlab_redis_rollout_timeout: "300s"
    gitlab_redis_image: "docker.io/redis/redis-stack-server:latest"
    gitlab_redis_storage_class: "lnstr-major-local"
    gitlab_redis_storage_size: "1Gi"
    # Resources / placement (активные default'ы; override заменяет значение ЦЕЛИКОМ).
    gitlab_redis_resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
    gitlab_redis_node_selector:
      node-role.kubernetes.io/worker: ""
    gitlab_redis_tolerations: []
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    gitlab_redis_extra_objects: []
    # Redis-phase kustomize patches (operator-side customization, default empty)
    gitlab_redis_kustomize_patches: []
    # Redis sub-release values
    # creds.secretName берётся из named-переменной gitlab_secret_redis_creds.body.target.name
    gitlab_redis_helm_values:
      namespace: "{{ gitlab_namespace }}"
      image: "{{ gitlab_redis_image }}"
      creds:
        secretName: "{{ gitlab_secret_redis_creds.body.target.name }}"
        passwordKey: "{{ gitlab_redis_secret_key_redis_args }}"
      storageClass: "{{ gitlab_redis_storage_class }}"
      storageSize: "{{ gitlab_redis_storage_size }}"
      resources: "{{ gitlab_redis_resources }}"
      nodeSelector: "{{ gitlab_redis_node_selector }}"
      tolerations: "{{ gitlab_redis_tolerations }}"
      extraObjects: "{{ gitlab_redis_extra_objects }}"
    # --- PHASE: install ---
    gitlab_install_helm_timeout: "30m"
    gitlab_rollout_timeout: "900s"
    # Helm repository - источник chart (переопределить в hosts-vars-override/ для airgap)
    gitlab_helm_is_oci: false
    gitlab_helm_url: "https://charts.gitlab.io"
    gitlab_helm_repo_name: "gitlab"
    gitlab_helm_chart_name: "gitlab"
    gitlab_helm_chart_version: "8.11.8" # GitLab 17.11
    gitlab_gitaly_storage_size: "4Gi"
    gitlab_gitaly_storage_class: "lnstr-major-local"
    # Helm chart values
    # --- Hot operator knobs (component-level; extracted from gitlab_helm_values) ---
    # HPA replica bounds (SCALE) — min/max per workload
    gitlab_helm_values_registry_min_replicas: 1
    gitlab_helm_values_registry_max_replicas: 1
    gitlab_helm_values_webservice_min_replicas: 1
    gitlab_helm_values_webservice_max_replicas: 1
    gitlab_helm_values_sidekiq_min_replicas: 1
    gitlab_helm_values_sidekiq_max_replicas: 1
    gitlab_helm_values_shell_min_replicas: 1
    gitlab_helm_values_shell_max_replicas: 1
    gitlab_helm_values_pages_min_replicas: 1
    gitlab_helm_values_pages_max_replicas: 1
    # Per-pod parallelism (capacity)
    gitlab_helm_values_webservice_worker_processes: 2
    gitlab_helm_values_sidekiq_concurrency: 10
    # --- Component resources (requests+limits) — активные default'ы (blast-radius cap;
    #     НИКОГДА не {}: пустые resources = BestEffort QoS → runaway душит ноду,
    #     см. hosts-vars/seaweedfs.yaml инцидент 1520-tech-prod-1). Override заменяет
    #     dict ЦЕЛИКОМ (НЕ _extra, не concat — variables.md §1.5). Значения — demo-scale;
    #     prod задаётся в hosts-vars-override/<cluster>/gitlab.yaml.
    #     Policy: webservice/sidekiq/gitaly — только mem-limit (throttle-sensitive
    #     критический путь); прочие — cpu+mem limit.
    gitlab_helm_values_webservice_resources:
      requests:
        cpu: "250m"
        memory: "2Gi"
      limits:
        memory: "4Gi"
    gitlab_helm_values_sidekiq_resources:
      requests:
        cpu: "250m"
        memory: "1Gi"
      limits:
        memory: "3Gi"
    gitlab_helm_values_gitaly_resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        memory: "1Gi"
    gitlab_helm_values_registry_resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
    gitlab_helm_values_shell_resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
    gitlab_helm_values_pages_resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
    gitlab_helm_values_gitlab_exporter_resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"
    gitlab_helm_values_toolbox_resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"
    gitlab_helm_values_migrations_resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    # --- Component node placement — per-component nodeSelector (default: worker-ноды)
    #     + tolerations (default: []). Все GitLab-компоненты пиннятся на worker'ы.
    gitlab_helm_values_webservice_node_selector:
      node-role.kubernetes.io/worker: ""
    gitlab_helm_values_sidekiq_node_selector:
      node-role.kubernetes.io/worker: ""
    gitlab_helm_values_gitaly_node_selector:
      node-role.kubernetes.io/worker: ""
    gitlab_helm_values_registry_node_selector:
      node-role.kubernetes.io/worker: ""
    gitlab_helm_values_shell_node_selector:
      node-role.kubernetes.io/worker: ""
    gitlab_helm_values_pages_node_selector:
      node-role.kubernetes.io/worker: ""
    gitlab_helm_values_gitlab_exporter_node_selector:
      node-role.kubernetes.io/worker: ""
    gitlab_helm_values_toolbox_node_selector:
      node-role.kubernetes.io/worker: ""
    gitlab_helm_values_migrations_node_selector:
      node-role.kubernetes.io/worker: ""
    gitlab_helm_values_webservice_tolerations: []
    gitlab_helm_values_sidekiq_tolerations: []
    gitlab_helm_values_gitaly_tolerations: []
    gitlab_helm_values_registry_tolerations: []
    gitlab_helm_values_shell_tolerations: []
    gitlab_helm_values_pages_tolerations: []
    gitlab_helm_values_gitlab_exporter_tolerations: []
    gitlab_helm_values_toolbox_tolerations: []
    gitlab_helm_values_migrations_tolerations: []
    # --- round-3 blocks (extracted from gitlab_helm_values) ---
    gitlab_helm_values_global:
      edition: ce
      # Версия образов GitLab — должна соответствовать gitlab_helm_chart_version (8.11.8 = GitLab 17.11)
      gitlabVersion: "17.11.7"
      hosts:
        domain: "{{ gitlab_base_domain }}"
        https: "{{ gitlab_external_https }}"
        gitlab:
          name: "{{ gitlab_ui_domain }}"
          https: "{{ gitlab_external_https }}"
        registry:
          name: "{{ gitlab_registry_domain }}"
          https: "{{ gitlab_external_https }}"
        pages:
          name: "{{ gitlab_pages_domain }}"
          https: "{{ gitlab_external_https }}"
      ingress:
        enabled: false
        configureCertmanager: false
      shell:
        port: "{{ gitlab_ssh_port_external }}"
      psql:
        host: gitlab-postgresql-0.gitlab-postgresql
        port: 5432
        database: "{{ gitlab_postgresql_database_name }}"
        username: "{{ gitlab_postgresql_username }}"
        password:
          useSecret: true
          secret: "{{ gitlab_secret_postgresql_creds.body.target.name }}"
          key: "{{ gitlab_postgresql_secret_key_password }}"
      redis:
        host: gitlab-redis-0.gitlab-redis
        port: 6379
        auth:
          enabled: true
          secret: "{{ gitlab_secret_redis_creds.body.target.name }}"
          key: password
      minio:
        enabled: false
      registry:
        bucket: "{{ gitlab_registry_bucket }}"
      kas:
        enabled: false
      pages:
        enabled: true
      appConfig:
        lfs:
          enabled: false
        object_store:
          enabled: true
          proxy_download: true
          connection:
            secret: "{{ gitlab_secret_object_store_connection_config.body.target.name }}"
            key: connection
        artifacts:
          enabled: true
          bucket: "{{ gitlab_artifacts_bucket }}"
        uploads:
          enabled: true
          bucket: "{{ gitlab_uploads_bucket }}"
        packages:
          enabled: true
          bucket: "{{ gitlab_packages_bucket }}"
        backups:
          bucket: "{{ gitlab_backups_bucket }}"
          tmpBucket: "{{ gitlab_backups_stage_bucket }}"
        # OIDC omniauth (ZITADEL). providers ГЕЙТИТСЯ toggle'ом (пустой при OFF): чарт монтирует
        # provider-секрет по НЕПУСТОМУ providers, не по enabled (_omniauth.tpl) — при OFF секрета нет.
        omniauth:
          enabled: "{{ gitlab_oidc_enabled | bool }}"
          allowSingleSignOn:
            - openid_connect
          blockAutoCreatedUsers: true
          autoLinkUser:
            - openid_connect
          providers: "{{ [{'secret': gitlab_secret_zitadel_omniauth.body.target.name, 'key': 'provider'}] if gitlab_oidc_enabled | bool else [] }}"
      smtp:
        enabled: false
      monitoring:
        enabled: true
    gitlab_helm_values_nginx_ingress:
      enabled: false
    gitlab_helm_values_certmanager:
      install: false
    gitlab_helm_values_prometheus:
      install: false
    gitlab_helm_values_postgresql:
      install: false
    gitlab_helm_values_redis:
      install: false
    gitlab_helm_values_registry:
      enabled: true
      tolerations: "{{ gitlab_helm_values_registry_tolerations }}"
      nodeSelector: "{{ gitlab_helm_values_registry_node_selector }}"
      resources: "{{ gitlab_helm_values_registry_resources }}"
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          endpointConfig:
            interval: "30s"
            scrapeTimeout: "10s"
      hpa:
        minReplicas: "{{ gitlab_helm_values_registry_min_replicas }}"
        maxReplicas: "{{ gitlab_helm_values_registry_max_replicas }}"
      maxUnavailable: 1
      deployment:
        strategy:
          type: Recreate
      storage:
        secret: "{{ gitlab_secret_registry_connection_config.body.target.name }}"
        key: config
        redirect:
          disable: true
    gitlab_helm_values_webservice:
      tolerations: "{{ gitlab_helm_values_webservice_tolerations }}"
      nodeSelector: "{{ gitlab_helm_values_webservice_node_selector }}"
      minReplicas: "{{ gitlab_helm_values_webservice_min_replicas }}"
      maxReplicas: "{{ gitlab_helm_values_webservice_max_replicas }}"
      maxUnavailable: 1
      deployment:
        strategy:
          type: Recreate
      workerProcesses: "{{ gitlab_helm_values_webservice_worker_processes }}"
      workerTimeout: 180
      resources: "{{ gitlab_helm_values_webservice_resources }}"
      metrics:
        serviceMonitor:
          enabled: true
          endpointConfig:
            interval: "30s"
            scrapeTimeout: "10s"
      workhorse:
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
            endpointConfig:
              interval: "30s"
              scrapeTimeout: "10s"
    gitlab_helm_values_sidekiq:
      tolerations: "{{ gitlab_helm_values_sidekiq_tolerations }}"
      nodeSelector: "{{ gitlab_helm_values_sidekiq_node_selector }}"
      minReplicas: "{{ gitlab_helm_values_sidekiq_min_replicas }}"
      maxReplicas: "{{ gitlab_helm_values_sidekiq_max_replicas }}"
      maxUnavailable: 1
      deployment:
        strategy:
          type: Recreate
      concurrency: "{{ gitlab_helm_values_sidekiq_concurrency }}"
      resources: "{{ gitlab_helm_values_sidekiq_resources }}"
      metrics:
        enabled: true
        podMonitor:
          enabled: true
          endpointConfig:
            interval: "30s"
            scrapeTimeout: "10s"
    gitlab_helm_values_gitlab_shell:
      tolerations: "{{ gitlab_helm_values_shell_tolerations }}"
      nodeSelector: "{{ gitlab_helm_values_shell_node_selector }}"
      resources: "{{ gitlab_helm_values_shell_resources }}"
      minReplicas: "{{ gitlab_helm_values_shell_min_replicas }}"
      maxReplicas: "{{ gitlab_helm_values_shell_max_replicas }}"
      maxUnavailable: 1
      deployment:
        strategy:
          type: Recreate
    gitlab_helm_values_gitaly:
      tolerations: "{{ gitlab_helm_values_gitaly_tolerations }}"
      nodeSelector: "{{ gitlab_helm_values_gitaly_node_selector }}"
      resources: "{{ gitlab_helm_values_gitaly_resources }}"
      persistence:
        size: "{{ gitlab_gitaly_storage_size }}"
        storageClass: "{{ gitlab_gitaly_storage_class }}"
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          endpointConfig:
            interval: "30s"
            scrapeTimeout: "10s"
    gitlab_helm_values_gitlab_exporter:
      tolerations: "{{ gitlab_helm_values_gitlab_exporter_tolerations }}"
      nodeSelector: "{{ gitlab_helm_values_gitlab_exporter_node_selector }}"
      resources: "{{ gitlab_helm_values_gitlab_exporter_resources }}"
      deployment:
        strategy:
          type: Recreate
      metrics:
        serviceMonitor:
          enabled: true
          endpointConfig:
            interval: "30s"
            scrapeTimeout: "10s"
    gitlab_helm_values_gitlab_pages:
      tolerations: "{{ gitlab_helm_values_pages_tolerations }}"
      nodeSelector: "{{ gitlab_helm_values_pages_node_selector }}"
      resources: "{{ gitlab_helm_values_pages_resources }}"
      hpa:
        minReplicas: "{{ gitlab_helm_values_pages_min_replicas }}"
        maxReplicas: "{{ gitlab_helm_values_pages_max_replicas }}"
      deployment:
        strategy:
          type: Recreate
      metrics:
        serviceMonitor:
          enabled: true
          endpointConfig:
            interval: "30s"
            scrapeTimeout: "10s"
    # Toolbox backup target (s3cmd .s3cfg via ESO). cron off + no PVC by design (manual backups).
    gitlab_helm_values_toolbox_backups:
      objectStorage:
        backend: s3
        config:
          secret: "{{ gitlab_secret_backup_s3cfg.body.target.name }}"
          key: config
    gitlab_helm_values_toolbox:
      enabled: true
      tolerations: "{{ gitlab_helm_values_toolbox_tolerations }}"
      nodeSelector: "{{ gitlab_helm_values_toolbox_node_selector }}"
      resources: "{{ gitlab_helm_values_toolbox_resources }}"
      backups: "{{ gitlab_helm_values_toolbox_backups }}"
      deployment:
        strategy:
          type: Recreate
    gitlab_helm_values_migrations:
      enabled: true
      tolerations: "{{ gitlab_helm_values_migrations_tolerations }}"
      nodeSelector: "{{ gitlab_helm_values_migrations_node_selector }}"
      resources: "{{ gitlab_helm_values_migrations_resources }}"
    gitlab_helm_values_gitlab_runner:
      install: false
    gitlab_helm_values_upgrade_check:
      enabled: true
    # ---------
    gitlab_helm_values:
      global: "{{ gitlab_helm_values_global }}"
      nginx-ingress: "{{ gitlab_helm_values_nginx_ingress }}"
      certmanager: "{{ gitlab_helm_values_certmanager }}"
      prometheus: "{{ gitlab_helm_values_prometheus }}"
      postgresql: "{{ gitlab_helm_values_postgresql }}"
      redis: "{{ gitlab_helm_values_redis }}"
      registry: "{{ gitlab_helm_values_registry }}"
      gitlab:
        webservice: "{{ gitlab_helm_values_webservice }}"
        sidekiq: "{{ gitlab_helm_values_sidekiq }}"
        gitlab-shell: "{{ gitlab_helm_values_gitlab_shell }}"
        gitaly: "{{ gitlab_helm_values_gitaly }}"
        gitlab-exporter: "{{ gitlab_helm_values_gitlab_exporter }}"
        gitlab-pages: "{{ gitlab_helm_values_gitlab_pages }}"
        toolbox: "{{ gitlab_helm_values_toolbox }}"
        migrations: "{{ gitlab_helm_values_migrations }}"
      gitlab-runner: "{{ gitlab_helm_values_gitlab_runner }}"
      upgradeCheck: "{{ gitlab_helm_values_upgrade_check }}"
    # --- PHASE: post ---
    gitlab_post_helm_timeout: "5m"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    gitlab_post_extra_objects: []
    # Post-phase kustomize patches (operator-side customization, default empty)
    gitlab_post_kustomize_patches: []
    # Post-phase values (Ingress chart)
    gitlab_post_helm_values:
      namespace: "{{ gitlab_namespace }}"
      uiIngressConfig: "{{ gitlab_ui_ingress_config }}"
      uiCertificateConfig: "{{ gitlab_ui_certificate }}"
      registryIngressConfig: "{{ gitlab_registry_ingress_config }}"
      registryCertificateConfig: "{{ gitlab_registry_certificate }}"
      pagesIngressConfig: "{{ gitlab_pages_ingress_config }}"
      pagesCertificateConfig: "{{ gitlab_pages_certificate }}"
      sshPortExternal: "{{ gitlab_ssh_port_external }}"
      sshAcceptProxy: "{{ gitlab_ssh_accept_proxy }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        entryPoints:
          web: "{{ traefik_web_entrypoint }}"
          websecure: "{{ traefik_websecure_entrypoint }}"
      haproxy:
        namespace: "{{ haproxy_namespace }}"
        ingressClass: "{{ haproxy_ingress_class }}"
      extraObjects: "{{ gitlab_post_extra_objects }}"
