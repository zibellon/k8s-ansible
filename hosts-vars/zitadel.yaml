all:
  vars:
    zitadel_namespace: "zitadel"
    zitadel_domain: "zitadel-k8s-v2.drawapp.ru"
    zitadel_tls_secret_name: "cert-zitadel"
    zitadel_ingress_class_name: "traefik-lb"
    zitadel_vpn_only_enabled: false
    # cert-manager Issuer (per-component, namespaced) — единый объект {enabled, body}.
    # enabled: true  → Issuer + solver-NetworkPolicies (pre); Certificate доступен (post).
    # enabled: false → ни Issuer, ни solver-NP, ни Certificate.
    zitadel_acme_server: "https://acme-v02.api.letsencrypt.org/directory"
    zitadel_acme_email: "some-email-123@gmail.com"
    zitadel_acme_solvers:
      - http01:
          ingress:
            ingressClassName: "traefik-lb"
            ingressTemplate:
              metadata:
                annotations:
                  "kubernetes.io/ingress.class": "traefik-lb"
                  "traefik.ingress.kubernetes.io/router.entrypoints": "web"
            podTemplate:
              metadata:
                labels:
                  app.kubernetes.io/name: acme-solver
                  app.kubernetes.io/instance: traefik-lb
                  app.kubernetes.io/component: acme-http01-solver
                  app.kubernetes.io/managed-by: cert-manager
    zitadel_cert_manager_issuer_enabled: true
    # Issuer identity — вынесено в простые переменные (единый источник истины:
    # на name ссылается и Issuer, и issuerRef.name сертификата).
    zitadel_acme_issuer_name: "zitadel-acme"
    zitadel_acme_private_key_name: "zitadel-acme-account-key"
    zitadel_cert_manager_issuer:
      enabled: "{{ zitadel_cert_manager_issuer_enabled }}"
      name: "{{ zitadel_acme_issuer_name }}"
      spec:
        acme:
          server: "{{ zitadel_acme_server }}"
          email: "{{ zitadel_acme_email }}"
          privateKeySecretRef:
            name: "{{ zitadel_acme_private_key_name }}"
          solvers: "{{ zitadel_acme_solvers }}"
    # Ingress config (per-domain). zitadel — 1 домен (2 IngressRoute: ui + grpc).
    zitadel_ui_ingress_enabled: true
    zitadel_ui_ingress_tls_enabled: true
    zitadel_ui_certificate_enabled: true
    zitadel_ui_ingress_config:
      domain: "{{ zitadel_domain }}"
      tlsSecretName: "{{ zitadel_tls_secret_name }}"
      ingress:
        enabled: "{{ zitadel_ui_ingress_enabled }}"
        ingressClass: "{{ zitadel_ingress_class_name }}"
        tlsEnabled: "{{ zitadel_ui_ingress_tls_enabled }}"
        vpnOnlyEnabled: "{{ zitadel_vpn_only_enabled }}"
        vpnIngressRouteMiddlewares: "{{ vpn_ingress_route_middlewares }}"
    # cert-manager Certificate (per-domain) — плоский объект {enabled, name, spec}.
    # Полный raw spec → issuer указывается через spec.issuerRef (любой Issuer/ClusterIssuer).
    zitadel_ui_certificate:
      enabled: "{{ zitadel_ui_certificate_enabled }}"
      name: "{{ zitadel_tls_secret_name }}"
      spec:
        secretName: "{{ zitadel_tls_secret_name }}"
        dnsNames:
          - "{{ zitadel_domain }}"
        issuerRef:
          name: "{{ zitadel_acme_issuer_name }}"
          kind: "Issuer"
    zitadel_postgresql_username: "zitadel"
    zitadel_postgresql_database_name: "zitadel"
    zitadel_postgresql_secret_key_username: "username"
    zitadel_postgresql_secret_key_password: "password"
    # PINNED to "masterkey": zitadel chart 9.x хардкодит имя ключа секрета — НЕ переопределять
    zitadel_masterkey_secret_key: "masterkey"
    # --- First human-admin (bootstrap, greenfield) ---
    # Полный loginname = <zitadel_admin_username>@<org-label>.<zitadel_domain>,
    # где <org-label> — zitadel_org_name, приведённое ZITADEL к нижнему регистру
    # (ZITADEL генерирует primary domain организации из её имени).
    # Пример: zitadel-admin@zitadel.zitadel-k8s-v2.drawapp.ru
    # Дополнительно возможен вход по реальному email (zitadel_admin_email).
    zitadel_admin_username: "zitadel-admin"
    zitadel_org_name: "ZITADEL"
    # Placeholder — реальный email оператор задаёт в hosts-vars-override/zitadel.yaml
    zitadel_admin_email: "zitadel-admin@example.com"
    zitadel_admin_secret_key_username: "username"
    zitadel_admin_secret_key_password: "password"
    # === SECTION 2: ESO ===
    # ---------
    # ESO integration: Vault → K8s Secrets
    # Базовые секреты (нужны для запуска) — отдельные named-переменные с полным dict-объектом.
    # eso_vault_integration_zitadel_secrets — массив ссылок на named-переменные
    # (chart eso-external-secret.yaml рендерит .Values.eso.secrets единообразно
    # как для base-ссылок, так и для _extra dict'ов).
    # _extra — расширение оператора через hosts-vars-override/.
    # ---------
    eso_vault_integration_zitadel:
      sa_name: "eso-main"
      role_name: "zitadel.eso-main"
      secret_store_name: "eso-main.vault"
      kv_engine_path: "eso-secret"

    zitadel_secret_postgresql_creds:
      external_secret_name: "eso-zitadel-postgresql-creds"
      vault_path: "/zitadel/postgresql/creds"
      body:
        target:
          name: "eso-zitadel-postgresql-creds"
        dataFrom:
          - extract:
              key: "{{ eso_vault_integration_zitadel.kv_engine_path }}/data/zitadel/postgresql/creds"

    zitadel_secret_masterkey:
      external_secret_name: "eso-zitadel-masterkey"
      vault_path: "/zitadel/masterkey"
      body:
        target:
          name: "eso-zitadel-masterkey"
        dataFrom:
          - extract:
              key: "{{ eso_vault_integration_zitadel.kv_engine_path }}/data/zitadel/masterkey"

    zitadel_secret_admin_creds:
      external_secret_name: "eso-zitadel-admin-creds"
      vault_path: "/zitadel/admin/creds"
      body:
        target:
          name: "eso-zitadel-admin-creds"
        dataFrom:
          - extract:
              key: "{{ eso_vault_integration_zitadel.kv_engine_path }}/data/zitadel/admin/creds"

    eso_vault_integration_zitadel_secrets:
      - "{{ zitadel_secret_postgresql_creds }}"
      - "{{ zitadel_secret_masterkey }}"
      - "{{ zitadel_secret_admin_creds }}"

    eso_vault_integration_zitadel_secrets_extra: []
    # === SECTION 3 ===
    # --- PHASE: pre ---
    zitadel_pre_helm_timeout: "5m"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    zitadel_pre_extra_objects: []
    # Pre-phase kustomize patches (operator-side customization, default empty)
    zitadel_pre_kustomize_patches: []
    # Pre-phase values (ESO Resources + NetworkPolicies chart)
    # eso_vault_integration_zitadel_secrets — inline merge base + extra (задаётся ниже в eso_vault_integration_zitadel_secrets)
    zitadel_pre_helm_values:
      namespace: "{{ zitadel_namespace }}"
      externalSecrets:
        namespace: "{{ external_secrets_namespace }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        instanceName: "traefik-{{ traefik_namespace }}"
      eso:
        vaultServerUrl: "{{ vault_internal_url }}"
        saName: "{{ eso_vault_integration_zitadel.sa_name }}"
        roleName: "{{ eso_vault_integration_zitadel.role_name }}"
        secretStoreName: "{{ eso_vault_integration_zitadel.secret_store_name }}"
        kvEnginePath: "{{ eso_vault_integration_zitadel.kv_engine_path }}"
        secrets: "{{ eso_vault_integration_zitadel_secrets + (eso_vault_integration_zitadel_secrets_extra | default([])) }}"
      esoResourcesConfig:
        secretStoreRefreshInterval: "{{ eso_resources_config.secret_store_refresh_interval }}"
        externalSecretRefreshInterval: "{{ eso_resources_config.external_secret_refresh_interval }}"
        externalSecretRefreshPolicy: "{{ eso_resources_config.external_secret_refresh_policy }}"
      issuer: "{{ zitadel_cert_manager_issuer }}"
      extraObjects: "{{ zitadel_pre_extra_objects }}"
    # --- PHASE: postgresql ---
    zitadel_postgresql_helm_timeout: "5m"
    zitadel_postgresql_rollout_timeout: "300s"
    # PostgreSQL image (handwritten chart — full URI:tag).
    # Используется в zitadel_postgresql_helm_values.image
    # (handwritten chart playbook-app/charts/zitadel/postgresql/).
    # Для AirGap оператор переопределяет в hosts-vars-override/zitadel.yaml.
    zitadel_postgresql_image: "docker.io/postgres:16-alpine"
    zitadel_postgresql_storage_class: "lnstr-major-multi-sync"
    zitadel_postgresql_storage_size: "4Gi"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    zitadel_postgresql_extra_objects: []
    # Postgresql-phase kustomize patches (operator-side customization, default empty)
    zitadel_postgresql_kustomize_patches: []
    # PostgreSQL sub-release values
    # secretName берётся из named-переменной zitadel_secret_postgresql_creds.body.target.name
    zitadel_postgresql_helm_values:
      namespace: "{{ zitadel_namespace }}"
      databaseName: "{{ zitadel_postgresql_database_name }}"
      image: "{{ zitadel_postgresql_image }}"
      storageClass: "{{ zitadel_postgresql_storage_class }}"
      storageSize: "{{ zitadel_postgresql_storage_size }}"
      credentials:
        secretName: "{{ zitadel_secret_postgresql_creds.body.target.name }}"
        usernameKey: "{{ zitadel_postgresql_secret_key_username }}"
        passwordKey: "{{ zitadel_postgresql_secret_key_password }}"
      extraObjects: "{{ zitadel_postgresql_extra_objects }}"
    # --- PHASE: install ---
    zitadel_install_helm_timeout: "15m"
    zitadel_install_rollout_timeout: "900s"
    # Helm repository - источник chart (переопределить в hosts-vars-override/ для airgap)
    zitadel_helm_is_oci: false
    zitadel_helm_url: "https://charts.zitadel.com"
    zitadel_helm_repo_name: "zitadel"
    zitadel_helm_chart_name: "zitadel"
    zitadel_helm_chart_version: "9.30.0"
    # Replica count (SCALE).
    zitadel_helm_values_replica_count: 1
    # --- round-4 blocks (extracted from zitadel_helm_values) ---
    zitadel_helm_values_zitadel:
      masterkeySecretName: "{{ zitadel_secret_masterkey.body.target.name }}"
      # masterkeySecretKeyName удалён — в chart 9.x ключ в secret hardcoded: "masterkey"
      configmapConfig:
        ExternalDomain: "{{ zitadel_domain }}"
        ExternalPort: 443
        ExternalSecure: true
        TLS:
          Enabled: false
        Database:
          Postgres:
            Host: zitadel-postgresql
            Port: 5432
            Database: "{{ zitadel_postgresql_database_name }}"
            MaxOpenConns: 20
            MaxIdleConns: 10
            ConnMaxLifetime: "30m"
            Admin:
              Username: "{{ zitadel_postgresql_username }}"
              SSL:
                Mode: disable
            User:
              Username: "{{ zitadel_postgresql_username }}"
              SSL:
                Mode: disable
        FirstInstance:
          Org:
            Name: "{{ zitadel_org_name }}"
            Human:
              Username: "{{ zitadel_admin_username }}"
              Email:
                Address: "{{ zitadel_admin_email }}"
                Verified: true
    zitadel_helm_values_env:
      - name: ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD
        valueFrom:
          secretKeyRef:
            name: "{{ zitadel_secret_postgresql_creds.body.target.name }}"
            key: "{{ zitadel_postgresql_secret_key_password }}"
      - name: ZITADEL_DATABASE_POSTGRES_USER_PASSWORD
        valueFrom:
          secretKeyRef:
            name: "{{ zitadel_secret_postgresql_creds.body.target.name }}"
            key: "{{ zitadel_postgresql_secret_key_password }}"
      - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD
        valueFrom:
          secretKeyRef:
            name: "{{ zitadel_secret_admin_creds.body.target.name }}"
            key: "{{ zitadel_admin_secret_key_password }}"
      - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED
        value: "false"
    zitadel_helm_values_service:
      type: ClusterIP
      port: 8080
      annotations:
        traefik.ingress.kubernetes.io/service.serversscheme: h2c
    # ---------
    # Helm chart values
    zitadel_helm_values:
      replicaCount: "{{ zitadel_helm_values_replica_count }}"
      resources: {}
      nodeSelector: {}
      tolerations: []
      affinity: {}
      zitadel: "{{ zitadel_helm_values_zitadel }}"
      env: "{{ zitadel_helm_values_env }}"
      service: "{{ zitadel_helm_values_service }}"
      ingress:
        enabled: false
      autoscaling:
        enabled: false
      pdb:
        enabled: false
      setupJob:
        # --init-projections=true переехал из initJob → setupJob (chart 9.x default)
        # --masterkeyFile убран: chart 9.x сам пробрасывает --masterkeyFromEnv из secret
        additionalArgs:
          - "--init-projections=true"
    # --- PHASE: post ---
    zitadel_post_helm_timeout: "5m"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    zitadel_post_extra_objects: []
    # Post-phase kustomize patches (operator-side customization, default empty)
    zitadel_post_kustomize_patches: []
    # Post-phase values (Ingress chart)
    # zitadel_resources / zitadel_node_selector / zitadel_tolerations / zitadel_affinity
    # не определены в hosts-vars/ — берутся из hosts-vars-override/zitadel.yaml
    zitadel_post_helm_values:
      namespace: "{{ zitadel_namespace }}"
      ingressConfig: "{{ zitadel_ui_ingress_config }}"
      certificateConfig: "{{ zitadel_ui_certificate }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        entryPoints:
          web: "{{ traefik_web_entrypoint }}"
          websecure: "{{ traefik_websecure_entrypoint }}"
      extraObjects: "{{ zitadel_post_extra_objects }}"
