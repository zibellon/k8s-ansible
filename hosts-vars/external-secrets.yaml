all:
  vars:
    # ------
    # registry+images (AirGap)
    # ------
    # Registry для образов ESO. По умолчанию — ghcr.io.
    # Для airgap/приватного registry — переопределить в hosts-vars-override/external-secrets.yaml:
    #   external_secrets_image_registry: "my-private-registry.local"
    #
    # СБ должна загрузить 1 образ (используется для controller, webhook, certController):
    #   <registry>/external-secrets/external-secrets:v2.3.0
    external_secrets_image_registry: "ghcr.io"
    external_secrets_image_tag: "v2.3.0"
    # ---------
    # ---------
    external_secrets_namespace: "external-secrets"
    # Helm repository - источник chart (переопределить в hosts-vars-override/ для airgap)
    external_secrets_helm_repo_url: "https://charts.external-secrets.io"
    external_secrets_helm_repo_name: "external-secrets"
    external_secrets_helm_chart_name: "external-secrets"
    external_secrets_chart_version: "2.3.0"
    # Helm timeouts
    external_secrets_pre_helm_timeout: "5m"
    external_secrets_install_helm_timeout: "5m"
    external_secrets_rollout_timeout: "300s"
    # ESO resources global config (SecretStore + ExternalSecret)
    eso_resources_config:
      secret_store_refresh_interval: 60   # int (секунды); SecretStoreSpec.refreshInterval
      external_secret_refresh_interval: "1m"  # string (Golang Duration); ExternalSecretSpec.refreshInterval (default, per-secret override через refresh_interval)
      external_secret_refresh_policy: "Periodic"  # ExternalSecretSpec.refreshPolicy

    # Pre-phase values (NetworkPolicies chart)
    external_secrets_pre_helm_values:
      namespace: "{{ external_secrets_namespace }}"
    # Helm chart values
    external_secrets_helm_values:
      global:
        repository: "{{ external_secrets_image_registry }}/external-secrets/external-secrets"
      image:
        tag: "{{ external_secrets_image_tag }}"
      concurrent: 10
      tolerations: []
      metrics:
        listen:
          port: 8080
        service:
          enabled: true
          port: 8080
      nodeSelector: {}
      affinity: {}
      replicaCount: 1
      resources: {}
      webhook:
        image:
          tag: "{{ external_secrets_image_tag }}"
        tolerations: []
        nodeSelector: {}
        affinity: {}
        replicaCount: 1
        resources: {}
        metrics:
          listen:
            port: 8080
          service:
            enabled: true
            port: 8080
      certController:
        image:
          tag: "{{ external_secrets_image_tag }}"
        tolerations: []
        nodeSelector: {}
        affinity: {}
        replicaCount: 1
        resources: {}
        metrics:
          listen:
            port: 8080
          service:
            enabled: true
            port: 8080
      extraArgs:
        client-burst: 200
        # concurrent: 10 # Говорит, что тут есть конфликт с другим параметром
        enable-managed-secrets-caching: "false"
        store-requeue-interval: "1m0s"
      serviceMonitor:
        enabled: true
        renderMode: "skipIfMissing"
        interval: "30s"
        scrapeTimeout: "25s"
        additionalLabels: {}
