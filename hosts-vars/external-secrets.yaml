all:
  vars:
    # ------
    # External Secrets Operator
    # ------
    external_secrets_namespace: "external-secrets"
    # ESO resources global config (SecretStore + ExternalSecret)
    eso_resources_config:
      secret_store_refresh_interval: 60   # int (секунды); SecretStoreSpec.refreshInterval
      external_secret_refresh_interval: "1m"  # string (Golang Duration); ExternalSecretSpec.refreshInterval (default, per-secret override через refresh_interval)
      external_secret_refresh_policy: "Periodic"  # ExternalSecretSpec.refreshPolicy
    # Helm timeouts
    external_secrets_helm_timeout: "5m"
    external_secrets_rollout_timeout: "300s"
    # Helm chart values
    external_secrets_helm_values:
      image:
        repository: "ghcr.io/external-secrets/external-secrets"
        tag: "v2.3.0"
      tolerations: []
      metrics:
        listen:
          port: 8080
        service:
          enabled: true
          port: 8080
      nodeSelector: {}
      affinity: {}
      replicaCount: 1
      resources: {}
      webhook:
        image:
          repository: "ghcr.io/external-secrets/external-secrets"
          tag: "v2.3.0"
        tolerations: []
        nodeSelector: {}
        affinity: {}
        replicaCount: 1
        resources: {}
        metrics:
          listen:
            port: 8080
          service:
            enabled: true
            port: 8080
      certController:
        image:
          repository: "ghcr.io/external-secrets/external-secrets"
          tag: "v2.3.0"
        tolerations: []
        nodeSelector: {}
        affinity: {}
        replicaCount: 1
        resources: {}
        metrics:
          listen:
            port: 8080
          service:
            enabled: true
            port: 8080
      extraArgs:
        client-burst: 200
        concurrent: 10
        enable-managed-secrets-caching: "false"
        store-requeue-interval: "1m0s"
      serviceMonitor:
        enabled: true
        renderMode: "skipIfMissing"
        interval: "30s"
        scrapeTimeout: "25s"
        additionalLabels: {}
