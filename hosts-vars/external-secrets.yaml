all:
  vars:
    # ------
    # External Secrets Operator
    # ------
    external_secrets_namespace: "external-secrets"
    external_secrets_repository: "ghcr.io/external-secrets/external-secrets"
    external_secrets_version: "v1.2.1"
    # Tolerations (Deployments)
    external_secrets_tolerations: []
    external_secrets_node_selector: {}
    external_secrets_affinity: {}
    external_secrets_replica_count: 1
    external_secrets_resources: {}
    # ---
    external_secrets_webhook_tolerations: []
    external_secrets_webhook_node_selector: {}
    external_secrets_webhook_affinity: {}
    external_secrets_webhook_replica_count: 1
    external_secrets_webhook_resources: {}
    # ---
    external_secrets_cert_controller_tolerations: []
    external_secrets_cert_controller_node_selector: {}
    external_secrets_cert_controller_affinity: {}
    external_secrets_cert_controller_replica_count: 1
    external_secrets_cert_controller_resources: {}
    # ESO controller flags
    eso_controller_config:
      client_burst: 200
      concurrent: 10
      enable_managed_secrets_caching: false
      store_requeue_interval: "1m0s"
    # ESO resources global config (SecretStore + ExternalSecret)
    eso_resources_config:
      secret_store_refresh_interval: 60   # int (секунды); SecretStoreSpec.refreshInterval
      external_secret_refresh_interval: "1m"  # string (Golang Duration); ExternalSecretSpec.refreshInterval (default, per-secret override через refresh_interval)
      external_secret_refresh_policy: "Periodic"  # ExternalSecretSpec.refreshPolicy
    # Prometheus metrics port
    external_secrets_metrics_port: 8080
    # ServiceMonitor (prometheus-operator)
    external_secrets_service_monitor_enabled: true
    external_secrets_service_monitor_interval: "30s"
    external_secrets_service_monitor_scrape_timeout: "25s"
    external_secrets_service_monitor_render_mode: "skipIfMissing"
    # Дополнительные labels для совпадения с serviceMonitorSelector
    external_secrets_service_monitor_additional_labels: {}
    # Helm timeouts
    external_secrets_helm_timeout: "5m"
    external_secrets_rollout_timeout: "300s"
