all:
  vars:
    external_secrets_namespace: "external-secrets"
    # ESO resources global config (SecretStore + ExternalSecret)
    eso_resources_config:
      secret_store_refresh_interval: 60   # int (секунды); SecretStoreSpec.refreshInterval
      external_secret_refresh_interval: "1m"  # string (Golang Duration); ExternalSecretSpec.refreshInterval (default, per-secret override через refresh_interval)
      external_secret_refresh_policy: "Periodic"  # ExternalSecretSpec.refreshPolicy
    # ---
    # ---
    # Helm timeouts
    external_secrets_pre_helm_timeout: "5m"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    external_secrets_pre_extra_objects: []
    # Pre-phase kustomize patches (operator-side customization, default empty)
    external_secrets_pre_kustomize_patches: []
    # Pre-phase values (NetworkPolicies chart)
    external_secrets_pre_helm_values:
      namespace: "{{ external_secrets_namespace }}"
      extraObjects: "{{ external_secrets_pre_extra_objects }}"
    # ---
    # ---
    external_secrets_install_helm_timeout: "5m"
    external_secrets_rollout_timeout: "300s"
    # Helm repository - источник chart (переопределить в hosts-vars-override/ для airgap)
    external_secrets_helm_is_oci: false
    external_secrets_helm_url: "https://charts.external-secrets.io"
    external_secrets_helm_repo_name: "external-secrets"
    external_secrets_helm_chart_name: "external-secrets"
    external_secrets_helm_chart_version: "2.5.0"
    # Replica counts (SCALE) — controller, webhook, cert-controller.
    external_secrets_replica_count: 1
    external_secrets_webhook_replica_count: 1
    external_secrets_cert_controller_replica_count: 1
    # Helm chart values
    external_secrets_helm_values:
      concurrent: 10
      tolerations: []
      metrics:
        listen:
          port: 8080
        service:
          enabled: true
          port: 8080
      nodeSelector: {}
      affinity: {}
      replicaCount: "{{ external_secrets_replica_count }}"
      resources: {}
      webhook:
        tolerations: []
        nodeSelector: {}
        affinity: {}
        replicaCount: "{{ external_secrets_webhook_replica_count }}"
        resources: {}
        metrics:
          listen:
            port: 8080
          service:
            enabled: true
            port: 8080
      certController:
        tolerations: []
        nodeSelector: {}
        affinity: {}
        replicaCount: "{{ external_secrets_cert_controller_replica_count }}"
        resources: {}
        metrics:
          listen:
            port: 8080
          service:
            enabled: true
            port: 8080
      extraArgs:
        client-burst: 200
        # concurrent: 10 # Говорит, что тут есть конфликт с другим параметром
        enable-managed-secrets-caching: "false"
        store-requeue-interval: "1m0s"
      serviceMonitor:
        enabled: true
        renderMode: "skipIfMissing"
        interval: "30s"
        scrapeTimeout: "25s"
        additionalLabels: {}
