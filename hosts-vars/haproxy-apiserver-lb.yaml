all:
  vars:
    # -----------------------------------------------------------------------
    # HAProxy API Server Load Balancer — config template
    # -----------------------------------------------------------------------
    #
    # ВАЖНО: placeholder __MANAGER_SERVER_IP_LIST__ — НЕ удалять и НЕ менять!
    #
    # На это место при выполнении playbook будут подставлены IP всех manager нод.
    # Без placeholder конфиг будет без backend серверов и HAProxy не заработает.
    #
    # Чтобы переопределить конфиг:
    #   1. Создать hosts-vars-override/haproxy-apiserver-lb.yaml
    #   2. Переопределить haproxy_apiserver_lb_config_template целиком
    #   3. ОБЯЗАТЕЛЬНО сохранить строку __MANAGER_SERVER_IP_LIST__ в backend
    #
    haproxy_apiserver_lb_config_template: |
      global
          log stdout format raw local0
          maxconn 2100

      defaults
          log     global
          mode    tcp
          option  tcplog
          option  dontlognull
          timeout connect 5s
          timeout client  30s
          timeout server  30s
          retries 3

      # Health check endpoint for liveness probe
      frontend healthz
          bind *:{{ haproxy_apiserver_lb_healthz_port }}
          mode http
          monitor-uri /healthz

      # Kubernetes API frontend
      frontend kubernetes-api
          bind {{ haproxy_apiserver_lb_host }}:{{ haproxy_apiserver_lb_port }}
          default_backend kubernetes-masters

      # Backend with control-plane nodes
      backend kubernetes-masters
          option tcp-check
          balance roundrobin
          default-server inter 5s fall 3 rise 2
          __MANAGER_SERVER_IP_LIST__
