all:
  vars:
    # ------
    # registry+images (AirGap)
    # ------
    # Registry для образов Vector. По умолчанию — docker.io.
    # Для airgap — переопределить в hosts-vars-override/mon-vector.yaml:
    #   vector_image_registry: "my-private-registry.local"
    #
    # СБ должна загрузить:
    #   <registry>/timberio/vector:0.50.0-debian
    vector_image_registry: "docker.io"
    vector_image_name: "{{ vector_image_registry }}/timberio/vector"
    vector_image_tag: "0.50.0-debian"
    # ---------
    vector_namespace: "vector"
    # Timeouts
    vector_pre_helm_timeout: "3m"
    vector_install_helm_timeout: "5m"
    vector_rollout_timeout: "180s"
    # ---------
    # Vector config (full vector-config.yaml — override the whole block in
    # hosts-vars-override/mon-vector.yaml to change any parameter).
    # Endpoint Loki резолвится Ansible'ом ({{ loki_namespace }}, {{ loki_port }}
    # из hosts-vars/mon-loki.yaml). Все Loki labels вида {{ containerName }}
    # обёрнуты единым {% raw %}{% endraw %} блоком, чтобы Ansible/Jinja2 не
    # пытался их резолвить — они должны попасть в финальный ConfigMap как
    # литерал и обрабатываться Vector'ом во время выполнения.
    vector_config_yaml: |
      # Источник логов - Kubernetes pods
      sources:
        kubernetes_logs:
          type: kubernetes_logs
          # Vector автоматически добавляет metadata:
          # - .kubernetes.pod_name
          # - .kubernetes.namespace_name
          # - .kubernetes.pod_labels
          # - .kubernetes.container_name
          # - .kubernetes.pod_node_name
          auto_partial_merge: true

      transforms:
        # 1. Попытка распарсить JSON логи
        parse_json_logs:
          type: remap
          inputs:
            - kubernetes_logs
          source: |
            # Удаляем ANSI escape codes (цвета в терминале)
            .message = replace!(.message, r'\x1B\[([0-9]{1,2}(;[0-9]{1,2})?)?[m|K]', "")

            # Пытаемся распарсить JSON
            parsed, err = parse_json(.message)

            if err == null {
              # Успешно распарсили JSON
              .is_json = true
              .parsed_message = parsed

              # Извлекаем level из JSON если есть
              if exists(.parsed_message.level) {
                .level = downcase(string!(.parsed_message.level))
              } else {
                .level = "info"
              }

              # Извлекаем timestamp из JSON если есть
              if exists(.parsed_message.timestamp) {
                # Формат: 2024-04-27T18:34:45.249230292Z (ISO 8601 с наносекундами)
                ts, ts_err = parse_timestamp(.parsed_message.timestamp, format: "%+")
                if ts_err == null {
                  .timestamp = ts
                }
              }
            } else {
              # Не JSON - обычная строка
              .is_json = false
              .level = "info"
            }

            # Определяем containerName из Kubernetes metadata
            .containerName = .kubernetes.container_name || "unknown"

            # Добавляем дополнительные labels для Loki
            .pod_name = .kubernetes.pod_name || "unknown"
            .namespace = .kubernetes.namespace_name || "default"
            .node_name = .kubernetes.pod_node_name || "unknown"

            # Извлекаем app label если есть (стандартный k8s label)
            if exists(.kubernetes.pod_labels."app.kubernetes.io/name") {
              .app = .kubernetes.pod_labels."app.kubernetes.io/name"
            } else {
              .app = "unknown"
            }

            # Извлекаем instance label если есть (стандартный k8s label)
            if exists(.kubernetes.pod_labels."app.kubernetes.io/instance") {
              .env = .kubernetes.pod_labels."app.kubernetes.io/instance"
            } else {
              .env = "unknown"
            }

        # 2. Форматирование финального сообщения
        format_message:
          type: remap
          inputs:
            - parse_json_logs
          source: |
            # Для JSON логов - убираем timestamp и level из message (чтобы не дублировать)
            if .is_json == true {
              # Удаляем поля timestamp и level из JSON строки
              .message = replace!(.message, r',\s*"timestamp"\s*:\s*"[^"]*"|"timestamp"\s*:\s*"[^"]*",?', "")
              .message = replace(.message, r',\s*"level"\s*:\s*"[^"]*"|"level"\s*:\s*"[^"]*",?', "")
            }
            # Для plain text логов - оставляем как есть

            # Удаляем временное поле
            del(.is_json)
            del(.parsed_message)

      sinks:
        loki_output:
          type: loki
          inputs:
            - format_message
          endpoint: "http://loki.{{ loki_namespace }}.svc.cluster.local:{{ loki_port }}"
          compression: gzip
          remove_label_fields: true
          out_of_order_action: accept
          remove_timestamp: false
          labels:
            {% raw %}
            containerName: "{{ containerName }}"
            level: "{{ level }}"
            pod: "{{ pod_name }}"
            namespace: "{{ namespace }}"
            app: "{{ app }}"
            env: "{{ env }}"
            node: "{{ node_name }}"
            {% endraw %}

          healthcheck:
            enabled: true
          encoding:
            codec: text
    # ---------
    # Pre-phase values (NetworkPolicies chart)
    vector_pre_helm_values:
      namespace: "{{ vector_namespace }}"
      vector:
        serviceLabel: "vector"
      loki:
        namespace: "{{ loki_namespace }}"
        port: "{{ loki_port }}"
        serviceLabel: "loki"
    # Install-phase values (SA, ClusterRole, ClusterRoleBinding, ConfigMap, DaemonSet)
    vector_install_helm_values:
      namespace: "{{ vector_namespace }}"
      vector:
        image:
          name: "{{ vector_image_name }}"
          tag: "{{ vector_image_tag }}"
        serviceAccount: "vector"
      config_yaml: "{{ vector_config_yaml }}"
      tolerations: []
      nodeSelector: {}
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "1"
          memory: "1Gi"
