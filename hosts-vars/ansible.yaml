all:
  vars:
    # Use the PWD env var set by the launching shell. Project invariant:
    # all playbooks are launched from the repo root (cd <repo> first), so
    # PWD = repo root. The Docker test image sets PWD=/repo via Dockerfile
    # ENV so direct `docker run ... ansible-playbook` (without an outer
    # shell) also resolves correctly. `lookup('pipe', 'pwd')` was tried
    # but Ansible chdirs to the playbook's dir during include resolution,
    # so pwd would return the playbook's location rather than the repo
    # root — env-based lookup is stable.
    project_root: "{{ lookup('env', 'PWD') }}"

    # Explicitly set Python interpreter to avoid discovery warnings
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_private_key_file: "~/.ssh/id_rsa" # for all playbooks
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no" # skip host key verification

    # SSH settings
    ssh_public_key_paths:  # for setup-ssh-keys.yaml
      - "~/.ssh/id_rsa.pub"

    # Path for local helm charts on remote server
    remote_charts_dir: "/opt/helm-charts"

    # работа с iperf. Для проверки сети
    iperf3_port: 5201
    iperf3_duration: 30
    iperf3_streams: 4

    # работа с fio (random READ). Для проверки производительности диска
    fio_read_directory: "/mnt"
    fio_read_runtime: 120
    fio_read_size: "1G"
    fio_read_blocksize: "8k"
    fio_read_iodepth: 64
    fio_read_numjobs: 1

    # работа с fio (random WRITE). Для проверки производительности диска
    fio_write_directory: "/mnt"
    fio_write_runtime: 120
    fio_write_size: "1G"
    fio_write_blocksize: "8k"
    fio_write_iodepth: 64
    fio_write_numjobs: 1

    # fail2ban — security daemon, защита от brute-force.
    # Каждый item рендерится в /etc/fail2ban/jail.d/<filename>. Filename ОБЯЗАН
    # начинаться с "ansible-" (для auto-cleanup). Оператор для смены full-replace'ит
    # массив через hosts-vars-override/ansible.yaml. Применяется playbook-system/fail2ban-install.yaml.
    fail2ban_jail_d_files:
      - filename: ansible-defaults.conf
        content: |
          [DEFAULT]
          bantime  = 1h
          findtime = 10m
          maxretry = 5
          backend  = systemd
      - filename: ansible-sshd.conf
        content: |
          [sshd]
          enabled = true
          port    = ssh
          filter  = sshd
          logpath = %(sshd_log)s

    # sshd hardening — drop-ins в /etc/ssh/sshd_config.d/.
    # Каждый item: {filename, content}. Filename ОБЯЗАН начинаться с "ansible-"
    # (для auto-cleanup). Оператор для смены набора full-replace'ит массив через
    # hosts-vars-override/ansible.yaml. Применяется playbook-system/sshd-configure.yaml.
    sshd_config_d_files:
      - filename: ansible-hardening.conf
        content: |
          # Ansible-managed sshd hardening — disable password auth, keys only.
          PasswordAuthentication no
          PermitEmptyPasswords no
          KbdInteractiveAuthentication no
