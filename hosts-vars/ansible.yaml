all:
  vars:
    # Use the PWD env var set by the launching shell. Project invariant:
    # all playbooks are launched from the repo root (cd <repo> first), so
    # PWD = repo root. The Docker test image sets PWD=/repo via Dockerfile
    # ENV so direct `docker run ... ansible-playbook` (without an outer
    # shell) also resolves correctly. `lookup('pipe', 'pwd')` was tried
    # but Ansible chdirs to the playbook's dir during include resolution,
    # so pwd would return the playbook's location rather than the repo
    # root — env-based lookup is stable.
    project_root: "{{ lookup('env', 'PWD') }}"

    # Explicitly set Python interpreter to avoid discovery warnings
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_private_key_file: "~/.ssh/id_rsa" # for all playbooks
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no" # skip host key verification

    # SSH settings
    ssh_public_key_paths:  # for setup-ssh-keys.yaml
      - "~/.ssh/id_rsa.pub"

    # Path for local helm charts on remote server
    remote_charts_dir: "/opt/helm-charts"

    # работа с iperf. Для проверки сети
    iperf3_port: 5201
    iperf3_duration: 30
    iperf3_streams: 4

    # работа с fio. Для проверки производительности диска
    fio_directory: "/mnt"
    fio_runtime: 120
    fio_size: "1G"
    fio_blocksize: "8k"
    fio_iodepth: 64
    fio_numjobs: 1
