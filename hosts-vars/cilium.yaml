all:
  vars:
    # ------
    # registry+images (AirGap)
    # ------
    # Registry для образов Cilium. По умолчанию — quay.io.
    # Для airgap/приватного registry — переопределить в hosts-vars-override/cilium.yaml:
    #   cilium_image_registry_host: "my-private-registry.local"
    #
    # СБ должна загрузить следующие образы (только хост меняется, пути остаются оригинальными):
    #   <host>/cilium/cilium:v1.19.1
    #   <host>/cilium/operator-generic:v1.19.1
    #   <host>/cilium/cilium-envoy:v1.36.5
    #   <host>/cilium/hubble-relay:v1.19.1
    #   <host>/cilium/hubble-ui-backend:v0.13.3
    #   <host>/cilium/hubble-ui:v0.13.3
    cilium_image_registry_host: "quay.io"
    # Image tags
    # cilium_image_tag — общий для agent, operator, hubble-relay (одна версия Cilium-релиза)
    cilium_image_tag: "v1.19.1"
    # cilium-envoy версионируется отдельно; формат tag содержит digest-suffix (useDigest: false — см. ниже)
    cilium_envoy_image_tag: "v1.36.5-1775659161-c07fe96b7c1b6cbfc3d477da1821e70205e572a9"
    # Hubble UI backend + frontend всегда одной версии
    cilium_hubble_ui_image_tag: "v0.13.3"
    # ---------
    # ---------
    # ---------
    # Helm repository - источник chart (переопределить в hosts-vars-override/ для airgap)
    cilium_namespace: "cilium"
    cilium_helm_repo_url: "https://helm.cilium.io/"
    cilium_helm_repo_name: "cilium"
    cilium_helm_chart_name: "cilium"
    cilium_chart_version: "1.19.1"
    # ---
    cilium_hubble_ui_domain: "cilium-hubble-ui-k8s-v2.drawapp.ru" # Hubble UI domain
    cilium_hubble_ui_vpn_only_enabled: false
    cilium_hubble_ui_https_secret_name: "cert-cilium-hubble-ui"
    cilium_hubble_ui_ingress_http_enable: false
    cilium_hubble_ui_ingress_https_enable: true
    cilium_hubble_ui_cluster_issuer_name: "acme-prod"
    cilium_hubble_ui_ingress_class_name: "traefik-lb"
    # Helm timeouts
    cilium_pre_helm_timeout: "2m"
    cilium_install_helm_timeout: "5m"
    cilium_post_helm_timeout: "2m"
    # Rollout timeout
    cilium_rollout_timeout: "300s"

    # Helm chart values
    cilium_helm_values:
      image:
        repository: "{{ cilium_image_registry_host }}/cilium/cilium"
        tag: "{{ cilium_image_tag }}"
      operator:
        image:
          repository: "{{ cilium_image_registry_host }}/cilium/operator"
          tag: "{{ cilium_image_tag }}"
          # suffix="" → chart template produces operator-{cloud}{suffix} = operator-generic
          # default chart suffix is "-ci" which would produce operator-generic-ci (wrong)
          suffix: ""
        tolerations:
          - operator: "Exists"
        nodeSelector: {}
        replicas: 1
        resources: {}
        prometheus:
          enabled: true
          port: 9963
          metricsService: true
          serviceMonitor:
            enabled: true
            interval: "30s"
            scrapeTimeout: "10s"
            labels: {}
      envoy:
        image:
          repository: "{{ cilium_image_registry_host }}/cilium/cilium-envoy"
          tag: "{{ cilium_envoy_image_tag }}"
          # chart default useDigest=true with digest for v1.36.6; our tag is v1.36.5 → must disable
          useDigest: false
        tolerations:
          - operator: "Exists"
        nodeSelector: {}
        resources: {}
        prometheus:
          enabled: true
          port: "9964"
          serviceMonitor:
            enabled: true
            interval: "30s"
            scrapeTimeout: "10s"
            labels: {}
      hubble:
        relay:
          image:
            repository: "{{ cilium_image_registry_host }}/cilium/hubble-relay"
            tag: "{{ cilium_image_tag }}"
          enabled: true
          tolerations: []
          nodeSelector: {}
          resources: {}
          replicas: 1
          affinity: {}
          prometheus:
            enabled: true
            port: 9966
            serviceMonitor:
              enabled: true
              interval: "30s"
              labels: {}
        ui:
          backend:
            image:
              repository: "{{ cilium_image_registry_host }}/cilium/hubble-ui-backend"
              tag: "{{ cilium_hubble_ui_image_tag }}"
            resources: {}
          frontend:
            image:
              repository: "{{ cilium_image_registry_host }}/cilium/hubble-ui"
              tag: "{{ cilium_hubble_ui_image_tag }}"
            resources: {}
          enabled: true
          tolerations: []
          nodeSelector: {}
          replicas: 1
          affinity: {}
        metrics:
          port: 9965
          enabled:
            - dns
            - drop
            - tcp
            - "flow:sourceContext=workload;destinationContext=workload"
            - flows-to-world
            - port-distribution
            - icmp
            - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction"
          serviceMonitor:
            enabled: true
            interval: "30s"
            labels: {}
        peerService:
          clusterDomain: "{{ cluster_dns_domain }}"
      tolerations:
        - operator: "Exists"
      nodeSelector: {}
      resources: {}
      prometheus:
        enabled: true
        port: 9962
        metricsService: true
        serviceMonitor:
          enabled: true
          interval: "30s"
          scrapeTimeout: "10s"
          labels: {}
      ipam:
        operator:
          clusterPoolIPv4PodCIDRList:
            - "{{ pod_subnet }}"
          clusterPoolIPv4MaskSize: 21
      kubeProxyReplacement: true
      kubeProxyReplacementHealthzBindAddr: "0.0.0.0:10256"
      k8sServiceHost: "{{ haproxy_apiserver_lb_host }}"
      k8sServicePort: "{{ haproxy_apiserver_lb_port }}"
      nodePort:
        range: "{{ node_port_start }},{{ node_port_end }}"
      hostFirewall:
        enabled: true

    # Pre-phase values (NetworkPolicies chart)
    # cilium_hubble_acme_solver_pod_labels - create in playbook runtime 
    cilium_pre_helm_values:
      namespace: "{{ cilium_namespace }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        instanceName: "traefik-{{ traefik_namespace }}"
      acmeSolverLabels: "{{ cilium_hubble_acme_solver_pod_labels }}"

    # Post-phase node IPs — built at playbook-time from inventory (groups/hostvars available then)
    cilium_post_node_ips_list: >-
      {{ ((groups['managers'] + groups['workers'])
          | map('extract', hostvars, 'ansible_host')
          | map('regex_replace', '$', '/32')
          | list)
         + ((groups['managers'] + groups['workers'])
            | map('extract', hostvars, 'internal_ip')
            | map('regex_replace', '$', '/32')
            | list) }}

    # Post-phase values (CiliumClusterwideNetworkPolicy + Hubble UI ingress)
    cilium_post_helm_values:
      namespace: "{{ cilium_namespace }}"
      nodeIpsList: "{{ cilium_post_node_ips_list }}"
      hubbleUi:
        domain: "{{ cilium_hubble_ui_domain }}"
        clusterIssuer: "{{ cilium_hubble_ui_cluster_issuer_name }}"
        ingressClass: "{{ cilium_hubble_ui_ingress_class_name }}"
        secretName: "{{ cilium_hubble_ui_https_secret_name }}"
        vpnOnlyEnabled: "{{ cilium_hubble_ui_vpn_only_enabled }}"
        vpnIngressMiddlewares: "{{ vpn_ingress_middlewares }}"
        httpEnable: "{{ cilium_hubble_ui_ingress_http_enable }}"
        httpsEnable: "{{ cilium_hubble_ui_ingress_https_enable }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        entryPoints:
          web: "{{ traefik_web_entrypoint }}"
          websecure: "{{ traefik_websecure_entrypoint }}"
