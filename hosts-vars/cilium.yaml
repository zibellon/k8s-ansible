all:
  vars:
    cilium_namespace: "cilium"
    cilium_hubble_ui_domain: "cilium-hubble-ui-k8s-v2.drawapp.ru" # Hubble UI domain
    cilium_hubble_ui_vpn_only_enabled: false
    cilium_hubble_ui_https_secret_name: "cert-cilium-hubble-ui"
    cilium_hubble_ui_ingress_class_name: "traefik-lb"
    cilium_acme_server: "https://acme-v02.api.letsencrypt.org/directory"
    cilium_acme_email: "some-email-123@gmail.com"
    cilium_acme_solvers:
      - http01:
          ingress:
            ingressClassName: "traefik-lb"
            ingressTemplate:
              metadata:
                annotations:
                  "kubernetes.io/ingress.class": "traefik-lb"
                  "traefik.ingress.kubernetes.io/router.entrypoints": "web"
            podTemplate:
              metadata:
                labels:
                  app.kubernetes.io/name: acme-solver
                  app.kubernetes.io/instance: traefik-lb
                  app.kubernetes.io/component: acme-http01-solver
                  app.kubernetes.io/managed-by: cert-manager
    cilium_cert_manager_issuer_enabled: true
    # Issuer identity — вынесено в простые переменные (единый источник истины:
    # на name ссылается и Issuer, и issuerRef.name сертификата).
    cilium_acme_issuer_name: "cilium-acme"
    cilium_acme_private_key_name: "cilium-acme-account-key"
    # cert-manager Issuer (per-component, namespaced) — плоский объект {enabled, name, spec}.
    # enabled: true → Issuer + solver-NetworkPolicies (pre); enabled: false → ничего.
    cilium_cert_manager_issuer:
      enabled: "{{ cilium_cert_manager_issuer_enabled }}"
      name: "{{ cilium_acme_issuer_name }}"
      spec:
        acme:
          server: "{{ cilium_acme_server }}"
          email: "{{ cilium_acme_email }}"
          privateKeySecretRef:
            name: "{{ cilium_acme_private_key_name }}"
          solvers: "{{ cilium_acme_solvers }}"
    # Ingress config (per-domain). cilium — 1 домен (Hubble UI).
    cilium_hubble_ui_ingress_enabled: true
    cilium_hubble_ui_ingress_tls_enabled: true
    cilium_hubble_ui_certificate_enabled: true
    cilium_hubble_ui_ingress_config:
      domain: "{{ cilium_hubble_ui_domain }}"
      tlsSecretName: "{{ cilium_hubble_ui_https_secret_name }}"
      ingress:
        enabled: "{{ cilium_hubble_ui_ingress_enabled }}"
        ingressClass: "{{ cilium_hubble_ui_ingress_class_name }}"
        tlsEnabled: "{{ cilium_hubble_ui_ingress_tls_enabled }}"
        vpnOnlyEnabled: "{{ cilium_hubble_ui_vpn_only_enabled }}"
        vpnIngressMiddlewares: "{{ vpn_ingress_middlewares }}"
    # cert-manager Certificate (per-domain) — плоский объект {enabled, name, spec}.
    # Полный raw spec → issuer указывается через spec.issuerRef (любой Issuer/ClusterIssuer).
    cilium_hubble_ui_certificate:
      enabled: "{{ cilium_hubble_ui_certificate_enabled }}"
      name: "{{ cilium_hubble_ui_https_secret_name }}"
      spec:
        secretName: "{{ cilium_hubble_ui_https_secret_name }}"
        dnsNames:
          - "{{ cilium_hubble_ui_domain }}"
        issuerRef:
          name: "{{ cilium_acme_issuer_name }}"
          kind: "Issuer"
    # ---
    # Helm timeouts
    cilium_pre_helm_timeout: "2m"
    # ---
    # ---
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    cilium_pre_extra_objects: []
    # Pre-phase kustomize patches (operator-side customization, default empty)
    cilium_pre_kustomize_patches: []
    # Pre-phase values (NetworkPolicies chart)
    cilium_pre_helm_values:
      namespace: "{{ cilium_namespace }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        instanceName: "traefik-{{ traefik_namespace }}"
      issuer: "{{ cilium_cert_manager_issuer }}"
      extraObjects: "{{ cilium_pre_extra_objects }}"
    # ---
    # ---
    cilium_install_helm_timeout: "5m"
    # Rollout timeout
    cilium_rollout_timeout: "300s"
    # Helm repository - источник chart (переопределить в hosts-vars-override/ для airgap)
    cilium_helm_is_oci: false
    cilium_helm_url: "https://helm.cilium.io/"
    cilium_helm_repo_name: "cilium"
    cilium_helm_chart_name: "cilium"
    cilium_helm_chart_version: "1.19.4"
    # IPAM (operator clusterPool) — pod CIDR(s) + per-node mask. Наиболее часто меняемые knob'ы cilium.
    cilium_helm_values_ipam_operator_pod_cidr_list:
      - "{{ pod_subnet }}"
    cilium_helm_values_ipam_operator_pod_cidr_mask_size: 23 # /23 = 512 IP на ноду (вмещает kubelet maxPods=200 с запасом)
    # Replica counts (SCALE) — operator + Hubble relay/UI.
    cilium_helm_values_operator_replica_count: 1
    cilium_helm_values_hubble_relay_replica_count: 1
    cilium_helm_values_hubble_ui_replica_count: 1
    # --- round-3 blocks (extracted from cilium_helm_values) ---
    cilium_helm_values_operator:
      image:
        # suffix="" → chart template produces operator-{cloud}{suffix} = operator-generic
        # default chart suffix is "-ci" which would produce operator-generic-ci (wrong)
        suffix: ""
      tolerations:
        - operator: "Exists"
      nodeSelector: {}
      replicas: "{{ cilium_helm_values_operator_replica_count }}"
      resources: {}
      prometheus:
        enabled: true
        port: 9963
        metricsService: true
        serviceMonitor:
          enabled: true
          interval: "30s"
          scrapeTimeout: "10s"
          labels: {}
    cilium_helm_values_envoy:
      image:
        # chart default useDigest=true with digest pinned to upstream version;
        # disable digest to allow upstream chart's default image tag to apply cleanly
        useDigest: false
      tolerations:
        - operator: "Exists"
      nodeSelector: {}
      resources: {}
      prometheus:
        enabled: true
        port: "9964"
        serviceMonitor:
          enabled: true
          interval: "30s"
          scrapeTimeout: "10s"
          labels: {}
    cilium_helm_values_hubble:
      relay:
        enabled: true
        tolerations: []
        nodeSelector: {}
        resources: {}
        replicas: "{{ cilium_helm_values_hubble_relay_replica_count }}"
        affinity: {}
        prometheus:
          enabled: true
          port: 9966
          serviceMonitor:
            enabled: true
            interval: "30s"
            labels: {}
      ui:
        backend:
          resources: {}
        frontend:
          resources: {}
        enabled: true
        tolerations: []
        nodeSelector: {}
        replicas: "{{ cilium_helm_values_hubble_ui_replica_count }}"
        affinity: {}
      metrics:
        port: 9965
        enabled:
          - dns
          - drop
          - tcp
          - "flow:sourceContext=workload;destinationContext=workload"
          - flows-to-world
          - port-distribution
          - icmp
          - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction"
        serviceMonitor:
          enabled: true
          interval: "30s"
          labels: {}
      peerService:
        clusterDomain: "{{ cluster_dns_domain }}"
    cilium_helm_values_kube_proxy_replacement_healthz_bind_addr: "0.0.0.0:10256"
    cilium_helm_values_host_firewall:
      enabled: true
    # ---------
    cilium_helm_values:
      operator: "{{ cilium_helm_values_operator }}"
      envoy: "{{ cilium_helm_values_envoy }}"
      hubble: "{{ cilium_helm_values_hubble }}"
      tolerations:
        - operator: "Exists"
      nodeSelector: {}
      resources: {}
      prometheus:
        enabled: true
        port: 9962
        metricsService: true
        serviceMonitor:
          enabled: true
          interval: "30s"
          scrapeTimeout: "10s"
          labels: {}
      ipam:
        operator:
          clusterPoolIPv4PodCIDRList: "{{ cilium_helm_values_ipam_operator_pod_cidr_list }}"
          clusterPoolIPv4MaskSize: "{{ cilium_helm_values_ipam_operator_pod_cidr_mask_size }}"
      kubeProxyReplacement: true
      kubeProxyReplacementHealthzBindAddr: "{{ cilium_helm_values_kube_proxy_replacement_healthz_bind_addr }}"
      k8sServiceHost: "{{ haproxy_apiserver_lb_host }}"
      k8sServicePort: "{{ haproxy_apiserver_lb_port }}"
      nodePort:
        range: "{{ node_port_start }},{{ node_port_end }}"
      hostFirewall: "{{ cilium_helm_values_host_firewall }}"
    # ---
    # ---
    cilium_post_helm_timeout: "2m"
    # Post-phase node IPs — built at playbook-time from inventory (groups/hostvars available then)
    cilium_post_node_ips_list: >-
      {{ ((groups['managers'] + groups['workers'])
          | map('extract', hostvars, 'ansible_host')
          | map('regex_replace', '$', '/32')
          | list)
         + ((groups['managers'] + groups['workers'])
            | map('extract', hostvars, 'internal_ip')
            | map('regex_replace', '$', '/32')
            | list) }}

    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    cilium_post_extra_objects: []
    # Post-phase kustomize patches (operator-side customization, default empty)
    cilium_post_kustomize_patches: []
    # Post-phase values (CiliumClusterwideNetworkPolicy + Hubble UI ingress)
    cilium_post_helm_values:
      namespace: "{{ cilium_namespace }}"
      ingressConfig: "{{ cilium_hubble_ui_ingress_config }}"
      certificateConfig: "{{ cilium_hubble_ui_certificate }}"
      nodeIpsList: "{{ cilium_post_node_ips_list }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        entryPoints:
          web: "{{ traefik_web_entrypoint }}"
          websecure: "{{ traefik_websecure_entrypoint }}"
      extraObjects: "{{ cilium_post_extra_objects }}"
