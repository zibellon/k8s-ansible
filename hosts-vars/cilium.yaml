all:
  vars:
    # ------
    # Cilium
    # ------
    cilium_chart_version: "1.19.1"
    cilium_namespace: "cilium"
    # ---
    cilium_hubble_ui_domain: "cilium-hubble-ui-k8s-v2.drawapp.ru" # Hubble UI domain
    cilium_hubble_ui_vpn_only_enabled: false
    cilium_hubble_ui_https_secret_name: "cert-cilium-hubble-ui"
    cilium_hubble_ui_ingress_http_enable: false
    cilium_hubble_ui_ingress_https_enable: true
    cilium_hubble_ui_cluster_issuer_name: "acme-prod"
    cilium_hubble_ui_ingress_class_name: "traefik-lb"
    # Helm timeouts
    cilium_helm_timeout: "5m"
    cilium_config_helm_timeout: "2m"
    cilium_post_config_helm_timeout: "2m"
    cilium_daemonset_rollout_timeout: "300s"
    cilium_deployment_rollout_timeout: "120s"
    # Helm chart values
    cilium_helm_values:
      image:
        repository: "quay.io/cilium/cilium"
        tag: "v1.19.1"
      operator:
        image:
          repository: "quay.io/cilium/operator"
          tag: "v1.19.1"
        tolerations:
          - operator: "Exists"
        nodeSelector: {}
        replicas: 1
        resources: {}
        prometheus:
          enabled: true
          port: 9963
          metricsService: true
          serviceMonitor:
            enabled: true
            interval: "30s"
            scrapeTimeout: "10s"
            labels: {}
      envoy:
        image:
          repository: "quay.io/cilium/cilium-envoy"
          tag: "v1.36.5"
        tolerations:
          - operator: "Exists"
        nodeSelector: {}
        resources: {}
        prometheus:
          enabled: true
          port: "9964"
          serviceMonitor:
            enabled: true
            interval: "30s"
            scrapeTimeout: "10s"
            labels: {}
      hubble:
        relay:
          image:
            repository: "quay.io/cilium/hubble-relay"
            tag: "v1.19.1"
          enabled: true
          tolerations: []
          nodeSelector: {}
          resources: {}
          replicas: 1
          affinity: {}
          prometheus:
            enabled: true
            port: 9966
            serviceMonitor:
              enabled: true
              interval: "30s"
              labels: {}
        ui:
          backend:
            image:
              repository: "quay.io/cilium/hubble-ui-backend"
              tag: "v0.13.3"
            resources: {}
          frontend:
            image:
              repository: "quay.io/cilium/hubble-ui"
              tag: "v0.13.3"
            resources: {}
          enabled: true
          tolerations: []
          nodeSelector: {}
          replicas: 1
          affinity: {}
        metrics:
          port: 9965
          enabled:
            - dns
            - drop
            - tcp
            - "flow:sourceContext=workload;destinationContext=workload"
            - flows-to-world
            - port-distribution
            - icmp
            - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction"
          serviceMonitor:
            enabled: true
            interval: "30s"
            labels: {}
        peerService:
          clusterDomain: "{{ cluster_dns_domain }}"
      tolerations:
        - operator: "Exists"
      nodeSelector: {}
      resources: {}
      prometheus:
        enabled: true
        port: 9962
        metricsService: true
        serviceMonitor:
          enabled: true
          interval: "30s"
          scrapeTimeout: "10s"
          labels: {}
      ipam:
        operator:
          clusterPoolIPv4PodCIDRList:
            - "{{ pod_subnet }}"
          clusterPoolIPv4MaskSize: 21
      kubeProxyReplacement: true
      kubeProxyReplacementHealthzBindAddr: "0.0.0.0:10256"
      k8sServiceHost: "{{ haproxy_apiserver_lb_host }}"
      k8sServicePort: "{{ haproxy_apiserver_lb_port }}"
      nodePort:
        range: "{{ node_port_start }},{{ node_port_end }}"
      hostFirewall:
        enabled: true
