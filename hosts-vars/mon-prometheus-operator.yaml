all:
  vars:
    # -----------------
    # Prometheus Operator
    # -----------------
    prometheus_operator_namespace: "mon"
    prometheus_operator_ingress_class: "traefik-lb"
    prometheus_operator_cluster_issuer: "acme-prod"
    prometheus_operator_tolerations: []
    prometheus_operator_node_selector:
      kubernetes.io/os: linux
    prometheus_operator_resources:
      limits:
        cpu: 200m
        memory: 200Mi
      requests:
        cpu: 100m
        memory: 100Mi
    prometheus_operator_port: 8080
    prometheus_operator_args:
      - --kubelet-service=kube-system/kubelet
      - --prometheus-config-reloader=quay.io/prometheus-operator/prometheus-config-reloader:v0.90.1
      - --watch-referenced-objects-in-all-namespaces=true
      - --disable-unmanaged-prometheus-configuration=true
      - --kubelet-endpoints=true
      - --kubelet-endpointslice=false
    # Helm timeouts
    prometheus_operator_helm_timeout: "3m"
    prometheus_operator_components_rollout_timeout: "60s"

    # -----------------
    # Prometheus Instance
    # -----------------
    # Ingress
    prometheus_domain: "prom-k8s-v2.drawapp.ru"
    prometheus_external_url: "https://prom-k8s-v2.drawapp.ru"
    prometheus_https_secret_name: "cert-prometheus"
    prometheus_vpn_only_enabled: false
    prometheus_ingress_http_enable: false
    prometheus_ingress_https_enable: true
    prometheus_port: 9090
    prometheus_reloader_port: 8080
    # Helm timeouts
    prometheus_helm_timeout: "5m"
    prometheus_rollout_timeout: "300s"

    # Full spec for kind: Prometheus CRD — passed as-is into .spec
    prometheus_spec:
      podMetadata:
        labels:
          app.kubernetes.io/name: prometheus
          app.kubernetes.io/instance: prometheus-instance
          app.kubernetes.io/version: "v3.7.2"
          app.kubernetes.io/component: server
          app.kubernetes.io/part-of: monitoring
          app.kubernetes.io/managed-by: Helm
      serviceAccountName: prometheus-instance
      automountServiceAccountToken: true
      image: "quay.io/prometheus/prometheus:v3.7.2"
      imagePullPolicy: IfNotPresent
      version: v3.7.2
      replicas: 1
      logLevel: info
      logFormat: json
      retention: "60d"
      walCompression: true
      enableAdminAPI: false
      enableOTLPReceiver: false
      listenLocal: false
      hostNetwork: false
      portName: http-web
      externalUrl: "{{ prometheus_external_url }}"
      routePrefix: "/"
      paused: false
      # Read from ALL namespaces — empty selectors
      serviceMonitorSelector: {}
      serviceMonitorNamespaceSelector: {}
      podMonitorSelector: {}
      podMonitorNamespaceSelector: {}
      probeSelector: {}
      probeNamespaceSelector: {}
      ruleSelector: {}
      ruleNamespaceSelector: {}
      scrapeConfigSelector: {}
      scrapeConfigNamespaceSelector: {}
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: lh-major-single-best-effort
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 5Gi
      tsdb:
        outOfOrderTimeWindow: 0s
      securityContext:
        fsGroup: 2000
        runAsGroup: 2000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      tolerations: []
      nodeSelector:
        kubernetes.io/os: linux
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi
      alerting:
        alertmanagers:
          - namespace: mon
            name: alertmanager-instance
            port: http-web

    # -----------------
    # Alertmanager Instance
    # -----------------
    # Ingress
    alertmanager_domain: "alertmanager-k8s-v2.drawapp.ru"
    alertmanager_external_url: "https://alertmanager-k8s-v2.drawapp.ru"
    alertmanager_https_secret_name: "cert-alertmanager"
    alertmanager_vpn_only_enabled: false
    alertmanager_ingress_http_enable: false
    alertmanager_ingress_https_enable: true
    alertmanager_port: 9093
    alertmanager_mesh_tcp_port: 9094
    alertmanager_mesh_udp_port: 9094

    # Full spec for kind: Alertmanager CRD — passed as-is into .spec
    alertmanager_spec:
      podMetadata:
        labels:
          app.kubernetes.io/name: alertmanager
          app.kubernetes.io/instance: alertmanager-instance
          app.kubernetes.io/component: alertmanager
          app.kubernetes.io/part-of: monitoring
          app.kubernetes.io/managed-by: Helm
      image: "quay.io/prometheus/alertmanager:v0.28.1"
      imagePullPolicy: IfNotPresent
      version: v0.28.1
      replicas: 1
      logLevel: info
      logFormat: json
      portName: http-web
      externalUrl: "{{ alertmanager_external_url }}"
      routePrefix: "/"
      paused: false
      # Reference to the root AlertmanagerConfig CRD
      alertmanagerConfiguration:
        name: alertmanager-root-config
      # Read AlertmanagerConfig from ALL namespaces
      alertmanagerConfigSelector: {}
      alertmanagerConfigNamespaceSelector: {}
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: lh-major-single-best-effort
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
      securityContext:
        fsGroup: 2000
        runAsGroup: 2000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      tolerations: []
      nodeSelector:
        kubernetes.io/os: linux
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi

    # Root AlertmanagerConfig spec — passed as-is into .spec
    # Defines the default (fallback) route with a "null" receiver that silently
    # discards alerts that don't match any per-namespace AlertmanagerConfig route.
    alertmanager_root_config_spec:
      route:
        receiver: "null"
        groupBy:
          - alertname
          - namespace
        groupWait: 30s
        groupInterval: 5m
        repeatInterval: 4h
      receivers:
        - name: "null"

    # -----------------
    # System Component Services (for ServiceMonitor scraping)
    # Headless Services in kube-system pointing to static pods.
    # ServiceMonitor selects these Services by their metadata labels.
    # -----------------
    prometheus_system_services:
      - name: kube-controller-manager
        namespace: kube-system
        labels:
          app.kubernetes.io/name: kube-controller-manager
        clusterIP: None
        podSelector:
          component: kube-controller-manager
        ports:
          - name: https-metrics
            port: 10257
            targetPort: 10257
            protocol: TCP

      - name: kube-etcd
        namespace: kube-system
        labels:
          app.kubernetes.io/name: kube-etcd
        clusterIP: None
        podSelector:
          component: etcd
        ports:
          - name: http-metrics
            port: 2381
            targetPort: 2381
            protocol: TCP

      - name: kube-scheduler
        namespace: kube-system
        labels:
          app.kubernetes.io/name: kube-scheduler
        clusterIP: None
        podSelector:
          component: kube-scheduler
        ports:
          - name: https-metrics
            port: 10259
            targetPort: 10259
            protocol: TCP

      - name: coredns
        namespace: kube-system
        labels:
          app.kubernetes.io/name: coredns
        clusterIP: None
        podSelector:
          k8s-app: kube-dns
        ports:
          - name: http-metrics
            port: 9153
            targetPort: 9153
            protocol: TCP

    # -----------------
    # System Component ServiceMonitors
    # Created in prometheus_operator_namespace (mon).
    # Prometheus reads from all namespaces (serviceMonitorNamespaceSelector: {}).
    # kubelet Service is auto-created by prometheus-operator (--kubelet-service=kube-system/kubelet).
    # -----------------
    prometheus_system_service_monitors:
      - name: kube-apiserver
        namespace: "{{ prometheus_operator_namespace }}"
        jobLabel: kube-apiserver
        namespaceSelector:
          matchNames: [default]
        selector:
          matchLabels:
            component: apiserver
            provider: kubernetes
        endpoints:
          - port: https
            scheme: https
            bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
            tlsConfig:
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              serverName: kubernetes
              insecureSkipVerify: false

      - name: kube-controller-manager
        namespace: "{{ prometheus_operator_namespace }}"
        jobLabel: kube-controller-manager
        namespaceSelector:
          matchNames: [kube-system]
        selector:
          matchLabels:
            app.kubernetes.io/name: kube-controller-manager
        endpoints:
          - port: https-metrics
            scheme: https
            bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
            tlsConfig:
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              insecureSkipVerify: true

      - name: kube-etcd
        namespace: "{{ prometheus_operator_namespace }}"
        jobLabel: kube-etcd
        namespaceSelector:
          matchNames: [kube-system]
        selector:
          matchLabels:
            app.kubernetes.io/name: kube-etcd
        endpoints:
          - port: http-metrics
            scheme: http

      - name: kube-scheduler
        namespace: "{{ prometheus_operator_namespace }}"
        jobLabel: kube-scheduler
        namespaceSelector:
          matchNames: [kube-system]
        selector:
          matchLabels:
            app.kubernetes.io/name: kube-scheduler
        endpoints:
          - port: https-metrics
            scheme: https
            bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
            tlsConfig:
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              insecureSkipVerify: true

      - name: coredns
        namespace: "{{ prometheus_operator_namespace }}"
        jobLabel: coredns
        namespaceSelector:
          matchNames: [kube-system]
        selector:
          matchLabels:
            app.kubernetes.io/name: coredns
        endpoints:
          - port: http-metrics
            scheme: http

      - name: kubelet
        namespace: "{{ prometheus_operator_namespace }}"
        jobLabel: k8s-app
        namespaceSelector:
          matchNames: [kube-system]
        selector:
          matchLabels:
            app.kubernetes.io/name: kubelet
            k8s-app: kubelet
        endpoints:
          - port: https-metrics
            scheme: https
            bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
            honorLabels: true
            tlsConfig:
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              insecureSkipVerify: true
          - port: https-metrics
            scheme: https
            path: /metrics/cadvisor
            bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
            honorLabels: true
            tlsConfig:
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              insecureSkipVerify: true
