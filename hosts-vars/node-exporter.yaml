all:
  vars:
    # ---------------
    # NodeExporter
    # ---------------
    node_exporter_namespace: "node-exporter"
    node_exporter_image_name: "quay.io/prometheus/node-exporter"
    node_exporter_image_tag: "v1.11.0"
    node_exporter_tolerations:
      - operator: "Exists"
    node_exporter_node_selector:
      kubernetes.io/os: linux
    node_exporter_resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 128Mi
    # Timeouts
    node_exporter_helm_timeout: "3m"
    node_exporter_rollout_timeout: "120s"
