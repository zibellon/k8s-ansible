all:
  vars:
    # ------
    # registry+images (AirGap)
    # ------
    # Registry для образов kube-state-metrics. По умолчанию — registry.k8s.io.
    # Для airgap — переопределить в hosts-vars-override/mon-kube-state-metrics.yaml:
    #   kube_state_metrics_image_registry: "my-private-registry.local"
    #
    # СБ должна загрузить:
    #   <registry>/kube-state-metrics/kube-state-metrics:v2.18.0
    kube_state_metrics_image_registry: "registry.k8s.io"
    kube_state_metrics_image_name: "{{ kube_state_metrics_image_registry }}/kube-state-metrics/kube-state-metrics"
    kube_state_metrics_image_tag: "v2.18.0"
    # ---------
    # ---------
    kube_state_metrics_namespace: "kube-state-metrics"
    # Timeouts
    kube_state_metrics_pre_helm_timeout: "3m"
    kube_state_metrics_install_helm_timeout: "3m"
    kube_state_metrics_post_helm_timeout: "3m"
    kube_state_metrics_rollout_timeout: "60s"
    # ---------
    kube_state_metrics_port: 8080
    kube_state_metrics_args:
      - --port=8080
      - --resources=certificatesigningrequests,configmaps,cronjobs,daemonsets,deployments,endpoints,horizontalpodautoscalers,ingresses,jobs,leases,limitranges,mutatingwebhookconfigurations,namespaces,networkpolicies,nodes,persistentvolumeclaims,persistentvolumes,poddisruptionbudgets,pods,replicasets,replicationcontrollers,resourcequotas,secrets,services,statefulsets,storageclasses,validatingwebhookconfigurations,volumeattachments
    # ServiceMonitor (prometheus-operator)
    kube_state_metrics_service_monitor_enabled: true
    kube_state_metrics_service_monitor_interval: "30s"
    kube_state_metrics_service_monitor_scrape_timeout: "15s"
    kube_state_metrics_service_monitor_additional_labels: {}
    kube_state_metrics_tolerations: []
    kube_state_metrics_node_selector:
      kubernetes.io/os: linux
    kube_state_metrics_resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
