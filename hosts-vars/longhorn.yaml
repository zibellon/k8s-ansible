all:
  vars:
    longhorn_namespace: "longhorn-system" # DO NOT CHANGE
    # Component enable flag (default false, opt-in): guards install/configure start + gates cross-ns NetworkPolicies to this component.
    longhorn_enabled: false
    longhorn_ui_domain: "longhorn-ui-k8s-v2.drawapp.ru"
    longhorn_external_url: "https://longhorn-ui-k8s-v2.drawapp.ru"
    longhorn_ui_vpn_only_enabled: false
    longhorn_ui_https_secret_name: "cert-longhorn-ui"
    longhorn_ui_ingress_class_name: "traefik-lb"
    # cert-manager Issuer (per-component, namespaced) — плоский объект {enabled, name, spec}.
    # enabled: true  → Issuer + solver-NetworkPolicies (pre); Certificate доступен (post).
    # enabled: false → ни Issuer, ни solver-NP, ни Certificate.
    longhorn_acme_server: "https://acme-v02.api.letsencrypt.org/directory"
    longhorn_acme_email: "some-email-123@gmail.com"
    longhorn_acme_solvers:
      - http01:
          ingress:
            ingressClassName: "traefik-lb"
            ingressTemplate:
              metadata:
                annotations:
                  "kubernetes.io/ingress.class": "traefik-lb"
                  "traefik.ingress.kubernetes.io/router.entrypoints": "web"
            podTemplate:
              metadata:
                labels:
                  app.kubernetes.io/name: acme-solver
                  app.kubernetes.io/instance: traefik-lb
                  app.kubernetes.io/component: acme-http01-solver
                  app.kubernetes.io/managed-by: cert-manager
    longhorn_cert_manager_issuer_enabled: true
    # Issuer identity — вынесено в простые переменные (единый источник истины:
    # на name ссылается и Issuer, и issuerRef.name сертификата).
    longhorn_acme_issuer_name: "longhorn-acme"
    longhorn_acme_private_key_name: "longhorn-acme-account-key"
    longhorn_cert_manager_issuer:
      enabled: "{{ longhorn_cert_manager_issuer_enabled }}"
      name: "{{ longhorn_acme_issuer_name }}"
      spec:
        acme:
          server: "{{ longhorn_acme_server }}"
          email: "{{ longhorn_acme_email }}"
          privateKeySecretRef:
            name: "{{ longhorn_acme_private_key_name }}"
          solvers: "{{ longhorn_acme_solvers }}"
    # Ingress config (per-domain). longhorn — 1 домен (UI).
    longhorn_ui_ingress_enabled: true
    longhorn_ui_ingress_tls_enabled: true
    longhorn_ui_certificate_enabled: true
    longhorn_ui_ingress_config:
      enabled: "{{ longhorn_ui_ingress_enabled }}"
      domain: "{{ longhorn_ui_domain }}"
      ingressClass: "{{ longhorn_ui_ingress_class_name }}"
      tlsEnabled: "{{ longhorn_ui_ingress_tls_enabled }}"
      tlsSecretName: "{{ longhorn_ui_https_secret_name }}"
      vpnOnlyEnabled: "{{ longhorn_ui_vpn_only_enabled }}"
      vpnIngressMiddlewares: "{{ vpn_ingress_middlewares }}"
    # cert-manager Certificate (per-domain) — плоский объект {enabled, name, spec}.
    # Полный raw spec → issuer указывается через spec.issuerRef (любой Issuer/ClusterIssuer).
    longhorn_ui_certificate:
      enabled: "{{ longhorn_ui_certificate_enabled }}"
      name: "{{ longhorn_ui_https_secret_name }}"
      spec:
        secretName: "{{ longhorn_ui_https_secret_name }}"
        dnsNames:
          - "{{ longhorn_ui_domain }}"
        issuerRef:
          name: "{{ longhorn_acme_issuer_name }}"
          kind: "Issuer"
    # ---------
    # ESO integration: Vault → K8s Secrets
    # Базовые секреты (нужны для запуска) — отдельные named-переменные с полным dict-объектом.
    # eso_vault_integration_longhorn_secrets — массив ссылок на named-переменные
    # (chart eso-external-secret.yaml рендерит .Values.eso.secrets единообразно
    # как для base-ссылок, так и для _extra dict'ов).
    # Для longhorn base пуст: S3-backup credentials определяются в
    # hosts-vars-override/ через eso_vault_integration_longhorn_secrets_extra.
    # ---------
    eso_vault_integration_longhorn:
      sa_name: "eso-main"
      role_name: "longhorn.eso-main"
      secret_store_name: "eso-main.vault"
      kv_engine_path: "eso-secret"

    eso_vault_integration_longhorn_secrets: []  # S3-backup secrets определяются в hosts-vars-override/ (eso_vault_integration_longhorn_secrets_extra)
    eso_vault_integration_longhorn_secrets_extra: []
    # ---
    # --- PHASE: pre ---
    # Helm timeouts
    longhorn_pre_helm_timeout: "5m"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    longhorn_pre_extra_objects: []
    # Pre-phase kustomize patches (operator-side customization, default empty)
    longhorn_pre_kustomize_patches: []
    # Pre-phase values (NetworkPolicies + ESO chart)
    longhorn_pre_helm_values:
      namespace: "{{ longhorn_namespace }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        instanceName: "traefik-{{ traefik_namespace }}"
      eso:
        vaultServerUrl: "{{ vault_internal_url }}"
        saName: "{{ eso_vault_integration_longhorn.sa_name }}"
        roleName: "{{ eso_vault_integration_longhorn.role_name }}"
        secretStoreName: "{{ eso_vault_integration_longhorn.secret_store_name }}"
        kvEnginePath: "{{ eso_vault_integration_longhorn.kv_engine_path }}"
        secrets: "{{ eso_vault_integration_longhorn_secrets + (eso_vault_integration_longhorn_secrets_extra | default([])) }}"
      esoResourcesConfig:
        secretStoreRefreshInterval: "{{ eso_resources_config.secret_store_refresh_interval }}"
        externalSecretRefreshInterval: "{{ eso_resources_config.external_secret_refresh_interval }}"
        externalSecretRefreshPolicy: "{{ eso_resources_config.external_secret_refresh_policy }}"
      issuer: "{{ longhorn_cert_manager_issuer }}"
      extraObjects: "{{ longhorn_pre_extra_objects }}"
    # ---
    # --- PHASE: install ---
    longhorn_install_helm_timeout: "10m"
    longhorn_rollout_timeout: "600s"
    # Helm repository - источник chart (переопределить в hosts-vars-override/ для airgap)
    longhorn_helm_is_oci: false
    longhorn_helm_url: "https://charts.longhorn.io"
    longhorn_helm_repo_name: "longhorn"
    longhorn_helm_chart_name: "longhorn"
    longhorn_helm_chart_version: "1.11.1"
    # Replica counts (SCALE) — per-volume default, default StorageClass, UI deployment.
    longhorn_helm_values_default_replica_count: 2
    longhorn_helm_values_persistence_default_class_replica_count: 2
    longhorn_helm_values_ui_replica_count: 1
    # ---------
    # Helm chart values
    longhorn_helm_values:
      defaultSettings:
        # Есть компонент longhorn-driver-deployer, Этот товарищ ходит к longhorn-manager по dyenhtyytve flhtce http://longhorn-manager:9200
        # Если переопределить managerUrl - то товарищ longhorn-driver-deployer начнет ходить к manager ПО НОВОМУ УКАЗАНОМУ url
        # это спровоцирует ошибку (сетевые политики или домен еще не доступен)
        # managerUrl: "{{ longhorn_external_url }}"
        defaultDataLocality: "best-effort"
        defaultReplicaCount: "{{ longhorn_helm_values_default_replica_count }}"
        defaultLonghornStaticStorageClass: "longhorn-static"
        disableRevisionCounter: '{"v1":"true"}'
        allowCollectingLonghornUsageMetrics: false
        systemManagedPodsImagePullPolicy: "if-not-present"
        snapshotDataIntegrity: "enabled"
        backupExecutionTimeout: 15
        backupCompressionMethod: "gzip"
        storageMinimalAvailablePercentage: 5
        storageReservedPercentageForDefaultDisk: 5
        priorityClass: "longhorn-critical"
        disableSchedulingOnCordonedNode: true
        replicaAutoBalance: "best-effort"
        removeSnapshotsDuringFilesystemTrim: true
        nodeDownPodDeletionPolicy: "do-nothing"
        nodeDrainPolicy: "block-for-eviction"
        taintToleration: "node-role.kubernetes.io/control-plane:NoSchedule"
        systemManagedComponentsNodeSelector: ""
      persistence:
        defaultClassReplicaCount: "{{ longhorn_helm_values_persistence_default_class_replica_count }}"
      longhornManager:
        log:
          format: json
        tolerations:
          - operator: "Exists"
        nodeSelector: {}
        resources: {}
      longhornDriver:
        tolerations:
          - operator: "Exists"
        nodeSelector: {}
      longhornUI:
        replicas: "{{ longhorn_helm_values_ui_replica_count }}"
        affinity: {}
        tolerations: []
        nodeSelector: {}
      metrics:
        serviceMonitor:
          enabled: true
          interval: "30s"
          scrapeTimeout: "10s"
    # ---
    # --- PHASE: post ---
    longhorn_post_helm_timeout: "2m"
    longhorn_storage_classes: []
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    longhorn_post_extra_objects: []
    # Post-phase kustomize patches (operator-side customization, default empty)
    longhorn_post_kustomize_patches: []
    # Post-phase values (StorageClasses + Ingress chart)
    longhorn_post_helm_values:
      namespace: "{{ longhorn_namespace }}"
      ingressConfig: "{{ longhorn_ui_ingress_config }}"
      certificateConfig: "{{ longhorn_ui_certificate }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        entryPoints:
          web: "{{ traefik_web_entrypoint }}"
          websecure: "{{ traefik_websecure_entrypoint }}"
      storageClasses: "{{ longhorn_storage_classes }}"
      extraObjects: "{{ longhorn_post_extra_objects }}"
