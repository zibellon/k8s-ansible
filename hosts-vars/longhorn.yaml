all:
  vars:
    # ------
    # Longhorn
    # ------
    longhorn_chart_version: "1.11.0"
    longhorn_namespace: "longhorn-system" # DO NOT CHANGE
    # Image configuration (AirGapped support) — каждый компонент со своим образом
    longhorn_image_registry: "docker.io"
    # Longhorn components
    longhorn_image_engine_repository: "longhornio/longhorn-engine"
    longhorn_image_engine_tag: "v1.11.0"
    longhorn_image_manager_repository: "longhornio/longhorn-manager"
    longhorn_image_manager_tag: "v1.11.0"
    longhorn_image_ui_repository: "longhornio/longhorn-ui"
    longhorn_image_ui_tag: "v1.11.0"
    longhorn_image_instance_manager_repository: "longhornio/longhorn-instance-manager"
    longhorn_image_instance_manager_tag: "v1.11.0"
    longhorn_image_share_manager_repository: "longhornio/longhorn-share-manager"
    longhorn_image_share_manager_tag: "v1.11.0"
    longhorn_image_backing_image_manager_repository: "longhornio/backing-image-manager"
    longhorn_image_backing_image_manager_tag: "v1.11.0"
    longhorn_image_support_bundle_kit_repository: "longhornio/support-bundle-kit"
    longhorn_image_support_bundle_kit_tag: "v0.0.79"
    # CSI components
    longhorn_csi_attacher_repository: "longhornio/csi-attacher"
    longhorn_csi_attacher_tag: "v4.10.0-20251226"
    longhorn_csi_provisioner_repository: "longhornio/csi-provisioner"
    longhorn_csi_provisioner_tag: "v5.3.0-20251226"
    longhorn_csi_node_driver_registrar_repository: "longhornio/csi-node-driver-registrar"
    longhorn_csi_node_driver_registrar_tag: "v2.15.0-20251226"
    longhorn_csi_resizer_repository: "longhornio/csi-resizer"
    longhorn_csi_resizer_tag: "v2.0.0-20251226"
    longhorn_csi_snapshotter_repository: "longhornio/csi-snapshotter"
    longhorn_csi_snapshotter_tag: "v8.4.0-20251226"
    longhorn_csi_liveness_probe_repository: "longhornio/livenessprobe"
    longhorn_csi_liveness_probe_tag: "v2.17.0-20251226"
    longhorn_ui_domain: "longhorn-ui-k8s-v2.drawapp.ru"
    longhorn_external_url: "https://longhorn-ui-k8s-v2.drawapp.ru"
    longhorn_ui_vpn_only_enabled: false
    longhorn_ui_https_secret_name: "cert-longhorn-ui"
    longhorn_ui_ingress_http_enable: false
    longhorn_ui_ingress_https_enable: true
    longhorn_ui_cluster_issuer_name: "acme-prod"
    longhorn_ui_ingress_class_name: "traefik-lb"
    longhorn_default_class_replica_count: 2
    # ---
    # Tolerations (system-managed: Instance Manager, CSI Driver, Engine Image)
    # Format: "key1=value1:NoSchedule; key2:NoExecute" — special string, NOT a list
    longhorn_system_managed_components_taint_toleration: "node-role.kubernetes.io/control-plane:NoSchedule"
    # Format: "label-key1:label-value1; label-key2:label-value2;" — special string, NOT a list
    longhorn_system_managed_components_node_selector: ""
    # ---
    # Tolerations (user-deployed components)
    longhorn_manager_tolerations:
      - operator: "Exists"
    longhorn_manager_node_selector: {}
    longhorn_manager_resources: {}
    # ---
    longhorn_driver_tolerations:
      - operator: "Exists"
    longhorn_driver_node_selector: {}
    # ---
    longhorn_ui_replicas: 1
    longhorn_ui_affinity: {}
    longhorn_ui_tolerations: []
    longhorn_ui_node_selector: {}
    # ---
    longhorn_storage_classes: []
    # Helm timeouts
    longhorn_helm_timeout: "10m"
    longhorn_config_helm_timeout: "2m"
    longhorn_manager_rollout_timeout: "300s"
    longhorn_ui_rollout_timeout: "120s"
    # Prometheus metrics port (Longhorn Manager, always-on)
    longhorn_prometheus_port: 9500 # NOT CHANGE
    # Prometheus ServiceMonitor
    longhorn_service_monitor_enabled: true
    longhorn_service_monitor_interval: "30s"
    longhorn_service_monitor_scrape_timeout: "10s"
