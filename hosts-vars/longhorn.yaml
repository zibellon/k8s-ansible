all:
  vars:
    # ------
    # Longhorn
    # ------
    longhorn_chart_version: "1.11.1"
    longhorn_namespace: "longhorn-system" # DO NOT CHANGE
    # ---
    longhorn_ui_domain: "longhorn-ui-k8s-v2.drawapp.ru"
    longhorn_external_url: "https://longhorn-ui-k8s-v2.drawapp.ru"
    longhorn_ui_vpn_only_enabled: false
    longhorn_ui_https_secret_name: "cert-longhorn-ui"
    longhorn_ui_ingress_http_enable: false
    longhorn_ui_ingress_https_enable: true
    longhorn_ui_cluster_issuer_name: "acme-prod"
    longhorn_ui_ingress_class_name: "traefik-lb"
    longhorn_storage_classes: []
    # Helm timeouts
    longhorn_helm_timeout: "10m"
    longhorn_config_helm_timeout: "2m"
    longhorn_rollout_timeout: "300s"

    # Helm chart values
    longhorn_helm_values:
      image:
        longhorn:
          engine:
            registry: "docker.io"
            repository: "longhornio/longhorn-engine"
            tag: "v1.11.1"
          manager:
            registry: "docker.io"
            repository: "longhornio/longhorn-manager"
            tag: "v1.11.1"
          ui:
            registry: "docker.io"
            repository: "longhornio/longhorn-ui"
            tag: "v1.11.1"
          instanceManager:
            registry: "docker.io"
            repository: "longhornio/longhorn-instance-manager"
            tag: "v1.11.1"
          shareManager:
            registry: "docker.io"
            repository: "longhornio/longhorn-share-manager"
            tag: "v1.11.1"
          backingImageManager:
            registry: "docker.io"
            repository: "longhornio/backing-image-manager"
            tag: "v1.11.1"
          supportBundleKit:
            registry: "docker.io"
            repository: "longhornio/support-bundle-kit"
            tag: "v0.0.81"
        csi:
          attacher:
            registry: "docker.io"
            repository: "longhornio/csi-attacher"
            tag: "v4.11.0"
          provisioner:
            registry: "docker.io"
            repository: "longhornio/csi-provisioner"
            tag: "v5.3.0-20260225"
          nodeDriverRegistrar:
            registry: "docker.io"
            repository: "longhornio/csi-node-driver-registrar"
            tag: "v2.16.0"
          resizer:
            registry: "docker.io"
            repository: "longhornio/csi-resizer"
            tag: "v2.1.0"
          snapshotter:
            registry: "docker.io"
            repository: "longhornio/csi-snapshotter"
            tag: "v8.5.0"
          livenessProbe:
            registry: "docker.io"
            repository: "longhornio/livenessprobe"
            tag: "v2.18.0"
      defaultSettings:
        # managerUrl: "{{ longhorn_external_url }}" # ПРЕКОЛ ...
        defaultDataLocality: "best-effort"
        defaultReplicaCount: 2
        defaultLonghornStaticStorageClass: "longhorn-static"
        disableRevisionCounter: '{"v1":"true"}'
        allowCollectingLonghornUsageMetrics: false
        systemManagedPodsImagePullPolicy: "if-not-present"
        snapshotDataIntegrity: "enabled"
        backupExecutionTimeout: 15
        backupCompressionMethod: "gzip"
        storageMinimalAvailablePercentage: 5
        storageReservedPercentageForDefaultDisk: 5
        priorityClass: "longhorn-critical"
        disableSchedulingOnCordonedNode: true
        replicaAutoBalance: "best-effort"
        removeSnapshotsDuringFilesystemTrim: true
        nodeDownPodDeletionPolicy: "do-nothing"
        nodeDrainPolicy: "block-for-eviction"
        taintToleration: "node-role.kubernetes.io/control-plane:NoSchedule"
        systemManagedComponentsNodeSelector: ""
      persistence:
        defaultClassReplicaCount: 2
      longhornManager:
        log:
          format: json
        tolerations:
          - operator: "Exists"
        nodeSelector: {}
        resources: {}
      longhornDriver:
        tolerations:
          - operator: "Exists"
        nodeSelector: {}
      longhornUI:
        replicas: 1
        affinity: {}
        tolerations: []
        nodeSelector: {}
      metrics:
        serviceMonitor:
          enabled: true
          interval: "30s"
          scrapeTimeout: "10s"
