all:
  vars:
    # ------
    # Vault (HashiCorp) — managed by bank-vaults operator
    # Operator: oci://ghcr.io/bank-vaults/helm-charts/vault-operator
    # Vault CR: playbook-app/charts/vault/cr/
    # 1 namespace = 1 SA + 1 SecretStore (для ESO)
    # sa_name - это название ServiceAccount (который будет создан в этом namespace)
    # role_name - это название Role (Внутри Vault - auth/kubernetes/role/${role_name})
    # secret_store_name - это название SecretStore (который будет создан в этом namespace)
    # ---
    # secrets - это массив ExternalSecret (который будет создан в этом namespace)
    # name - это название ExternalSecret
    # target_secret - это название секрета в Kubernetes (который будет создан в этом namespace)
    # vault_path - это full path в Vault
    # refresh_interval - опциональное переопределение интервала (иначе используется eso_resources_config.external_secret_refresh_interval)
    # ------
    vault_namespace: "vault"
    vault_image_registry: "docker.io"
    vault_image_repository: "hashicorp/vault"
    vault_image_tag: "1.21.2"
    vault_internal_url: "http://vault.{{ vault_namespace }}.svc.{{ cluster_dns_domain }}:8200"
    vault_ui_domain: "vault-k8s-v2.drawapp.ru"
    vault_ui_https_secret_name: "cert-vault-ui"
    vault_ui_vpn_only_enabled: false
    vault_ui_ingress_http_enable: false
    vault_ui_ingress_https_enable: true
    vault_ui_cluster_issuer_name: "acme-prod"
    vault_ui_ingress_class_name: "traefik-lb"
    vault_storage_class: "lh-major-single-best-effort"
    vault_storage_size: "2Gi"
    # Vault unseal (bank-vaults operator stores keys in K8s Secret)
    # secretShares / secretThreshold map directly to unsealConfig.secretShares / secretThreshold in Vault CR
    # bank-vaults defaults: 5 / 3 — always set explicitly to avoid surprises
    vault_key_shares: 3
    vault_key_threshold: 2
    vault_creds_host_path: "/etc/kubernetes/vault-unseal.json"
    # K8s Secret created by bank-vaults unsealer
    vault_unsealer_secret_name: "vault-unseal-keys"
    # Vault Kubernetes Auth
    vault_kubernetes_host: "https://kubernetes.default.svc:443"
    # bank-vaults operator
    vault_operator_chart: "oci://ghcr.io/bank-vaults/helm-charts/vault-operator"
    vault_bank_vaults_version: "v1.32.1"
    vault_roles_default_ttl: "1h"
    # Operator pod scheduling (отдельные от Vault server)
    vault_operator_tolerations: []
    vault_operator_node_selector: {}
    vault_operator_resources: {}
    # ---
    vault_tolerations: []
    vault_resources: {}
    vault_node_selector: {}
    vault_affinity: {}
    # Helm timeouts
    vault_helm_timeout: "5m"
    vault_config_helm_timeout: "2m"
    vault_rollout_timeout: "300s"
    # Prometheus metrics port (Vault API)
    vault_prometheus_port: 8200 # NOT CHANGE
    # Prometheus ServiceMonitor
    vault_service_monitor_enabled: true
    vault_service_monitor_interval: "30s"
    vault_service_monitor_scrape_timeout: "10s"
    vault_service_monitor_additional_labels: {}

    # ---------
    # VAULT POLICIES
    # bank-vaults externalConfig format: name + rules (HCL)
    # ---------
    vault_policies_extra: []
    vault_policies:
      # ---------
      # ESO: Traefik
      # ---------
      - name: traefik.eso-main
        rules: |
          path "eso-secret/data/traefik/*" { capabilities = ["read", "list"] }
          path "eso-secret/metadata/traefik/*" { capabilities = ["read", "list"] }
      # ---------
      # ESO: HAProxy
      # ---------
      - name: haproxy.eso-main
        rules: |
          path "eso-secret/data/haproxy/*" { capabilities = ["read", "list"] }
          path "eso-secret/metadata/haproxy/*" { capabilities = ["read", "list"] }
      # ---------
      # ESO: Longhorn
      # ---------
      - name: longhorn.eso-main
        rules: |
          path "eso-secret/data/longhorn/*" { capabilities = ["read", "list"] }
          path "eso-secret/metadata/longhorn/*" { capabilities = ["read", "list"] }
      # ---------
      # ESO: GitLab
      # ---------
      - name: gitlab.eso-main
        rules: |
          path "eso-secret/data/gitlab/*" { capabilities = ["read", "list"] }
          path "eso-secret/metadata/gitlab/*" { capabilities = ["read", "list"] }
      # ---------
      # ESO: GitLab Runner
      # ---------
      - name: gitlab-runner.eso-main
        rules: |
          path "eso-secret/data/gitlab-runner/*" { capabilities = ["read", "list"] }
          path "eso-secret/metadata/gitlab-runner/*" { capabilities = ["read", "list"] }
      # ---------
      # ESO: ZITADEL
      # ---------
      - name: zitadel.eso-main
        rules: |
          path "eso-secret/data/zitadel/*" { capabilities = ["read", "list"] }
          path "eso-secret/metadata/zitadel/*" { capabilities = ["read", "list"] }
      # ---------
      # ESO: ArgoCD
      # ---------
      - name: argocd.eso-main
        rules: |
          path "eso-secret/data/argocd/*" { capabilities = ["read", "list"] }
          path "eso-secret/metadata/argocd/*" { capabilities = ["read", "list"] }
      # ---------
      # ESO: ArgoCD Git-Ops
      # ---------
      - name: argocd.eso-git-ops
        rules: |
          path "eso-secret/data/argocd/*" { capabilities = ["read", "list"] }
          path "eso-secret/metadata/argocd/*" { capabilities = ["read", "list"] }
      # ---------
      # ESO: Grafana
      # ---------
      - name: grafana.eso-main
        rules: |
          path "eso-secret/data/grafana/*" { capabilities = ["read", "list"] }
          path "eso-secret/metadata/grafana/*" { capabilities = ["read", "list"] }
      # ---------
      # Vault Admin (full access for vault-admin SA, used by Ansible for writing secrets)
      # ---------
      - name: vault-admin
        rules: |
          path "secret/data/*" { capabilities = ["create", "read", "update", "delete", "list"] }
          path "secret/metadata/*" { capabilities = ["create", "read", "update", "delete", "list"] }
          path "eso-secret/data/*" { capabilities = ["create", "read", "update", "delete", "list"] }
          path "eso-secret/metadata/*" { capabilities = ["create", "read", "update", "delete", "list"] }
          path "sys/policies/acl/*" { capabilities = ["create", "read", "update", "delete", "list"] }
          path "auth/*" { capabilities = ["create", "read", "update", "delete", "list"] }

    # ---------
    # VAULT ROLES
    # bank-vaults externalConfig format: bound_service_account_names/namespaces + policies + ttl
    # ---------
    vault_roles_extra: []
    vault_roles:
      # ---------
      # ESO: Traefik
      # ---------
      - name: traefik.eso-main
        bound_service_account_namespaces: traefik-lb
        bound_service_account_names: eso-main
        policies:
          - traefik.eso-main
        ttl: "{{ vault_roles_default_ttl }}"
      # ---------
      # ESO: HAProxy
      # ---------
      - name: haproxy.eso-main
        bound_service_account_namespaces: haproxy-lb
        bound_service_account_names: eso-main
        policies:
          - haproxy.eso-main
        ttl: "{{ vault_roles_default_ttl }}"
      # ---------
      # ESO: Longhorn
      # ---------
      - name: longhorn.eso-main
        bound_service_account_namespaces: longhorn-system
        bound_service_account_names: eso-main
        policies:
          - longhorn.eso-main
        ttl: "{{ vault_roles_default_ttl }}"
      # ---------
      # ESO: GitLab
      # ---------
      - name: gitlab.eso-main
        bound_service_account_namespaces: gitlab
        bound_service_account_names: eso-main
        policies:
          - gitlab.eso-main
        ttl: "{{ vault_roles_default_ttl }}"
      # ---------
      # ESO: GitLab Runner
      # ---------
      - name: gitlab-runner.eso-main
        bound_service_account_namespaces: gitlab-runner
        bound_service_account_names: eso-main
        policies:
          - gitlab-runner.eso-main
        ttl: "{{ vault_roles_default_ttl }}"
      # ---------
      # ESO: ZITADEL
      # ---------
      - name: zitadel.eso-main
        bound_service_account_namespaces: zitadel
        bound_service_account_names: eso-main
        policies:
          - zitadel.eso-main
        ttl: "{{ vault_roles_default_ttl }}"
      # ---------
      # ESO: ArgoCD
      # ---------
      - name: argocd.eso-main
        bound_service_account_namespaces: argocd
        bound_service_account_names: eso-main
        policies:
          - argocd.eso-main
        ttl: "{{ vault_roles_default_ttl }}"
      # ---------
      # ESO: ArgoCD Git-Ops
      # ---------
      - name: argocd.eso-git-ops
        bound_service_account_namespaces: argocd
        bound_service_account_names: eso-git-ops
        policies:
          - argocd.eso-git-ops
        ttl: "{{ vault_roles_default_ttl }}"
      # ---------
      # ESO: Grafana
      # ---------
      - name: grafana.eso-main
        bound_service_account_namespaces: grafana
        bound_service_account_names: eso-main
        policies:
          - grafana.eso-main
        ttl: "{{ vault_roles_default_ttl }}"
      # ---------
      # Vault Admin (for writing secrets from Ansible)
      # ---------
      - name: vault-admin
        bound_service_account_namespaces: vault
        bound_service_account_names: vault-admin
        policies:
          - vault-admin
        ttl: "{{ vault_roles_default_ttl }}"
