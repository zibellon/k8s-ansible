# =============================================================================
# Bastion / SSH ProxyJump scheme (optional — alternative to the public-IP
# scheme above). Use when manager/worker nodes have NO public IP and are
# reachable only via a bastion host (e.g. cloud VPC).
#
# The two schemes are mutually exclusive per hosts-vars-override/ directory:
#   - Public-IP scheme: ansible_host = public IP, no ProxyJump (see above).
#   - Bastion scheme:   ansible_host = private IP (== internal_ip),
#                       ProxyJump injected via ansible_ssh_common_args at
#                       the managers/workers group level.
#
# Multi-cluster: each hosts-vars-override-<cluster>/ chooses its own scheme.
# Operator's SSH key must be present on the bastion AND on all nodes.
#
# Below — fully commented-out example. Copy the structure into your
# hosts-vars-override/hosts.yaml and fill real values. Do NOT uncomment here:
# this file is the committed skeleton.
# =============================================================================

