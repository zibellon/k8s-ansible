all:
  vars:
    # ------
    # registry+images (AirGap)
    # ------
    # Registry для образа Traefik. По умолчанию — docker.io.
    # Для airgap/приватного registry — переопределить в hosts-vars-override/traefik.yaml:
    #   traefik_image_registry: "my-private-registry.local"
    #
    # СБ должна загрузить 1 образ:
    #   <registry>/traefik:v3.6.12
    traefik_image_registry: "docker.io"
    traefik_image_tag: "v3.6.12"
    # ---------
    # ---------
    # Helm repository - источник chart (переопределить в hosts-vars-override/ для airgap)
    traefik_namespace: "traefik-lb"
    traefik_helm_repo_url: "https://traefik.github.io/charts"
    traefik_helm_repo_name: "traefik"
    traefik_helm_chart_name: "traefik"
    traefik_chart_version: "39.0.5"
    # Helm timeouts
    traefik_pre_helm_timeout: "5m"
    traefik_install_helm_timeout: "5m"
    traefik_post_helm_timeout: "5m"
    traefik_rollout_timeout: "300s"
    # ---
    traefik_daemonset_name: "traefik-lb"
    traefik_ingress_class: "traefik-lb"
    traefik_web_entrypoint: "web" # WARNING: DO NOT CHANGE - hardcoded in helm chart
    traefik_websecure_entrypoint: "websecure" # WARNING: DO NOT CHANGE - hardcoded in helm chart
    traefik_dashboard_domain: "traefik-dashboard-k8s-v2.drawapp.ru"
    traefik_dashboard_vpn_only_enabled: false
    traefik_dashboard_https_secret_name: "cert-traefik-dashboard"
    traefik_dashboard_service_name: "traefik-dashboard"
    traefik_dashboard_ingress_http_enable: false
    traefik_dashboard_ingress_https_enable: true
    traefik_dashboard_cluster_issuer_name: "acme-prod"
    traefik_dashboard_ingress_class_name: "traefik-lb"
    # Used in cilium-install.yaml post values
    traefik_web_port: 80 # NOT CHANGE
    traefik_websecure_port: 443 # NOT CHANGE
    # Middlewares
    traefik_middlewares:
      - name: http-to-https
        spec:
          redirectRegex:
            regex: "^http://(.+)"
            replacement: "https://${1}"
            permanent: true
      - name: http-www-to-https
        spec:
          redirectRegex:
            regex: "^http://www.(.+)"
            replacement: "https://${1}"
            permanent: true
      - name: http-www-to-http
        spec:
          redirectRegex:
            regex: "^http://www.(.+)"
            replacement: "http://${1}"
            permanent: true
      - name: https-www-to-https
        spec:
          redirectRegex:
            regex: "^https://www.(.+)"
            replacement: "https://${1}"
            permanent: true
      - name: all-to-https
        spec:
          redirectRegex:
            regex: "(^https://www.|^http://www.|^http://)(.+)"
            replacement: "https://${2}"
            permanent: true
    # Helm chart values
    traefik_helm_values:
      image:
        registry: "{{ traefik_image_registry }}"
        repository: "traefik"
        tag: "{{ traefik_image_tag }}"
      fullnameOverride: "{{ traefik_daemonset_name }}"
      tolerations:
        - operator: "Exists"
      nodeSelector: {}
      resources: {}
      serviceAccountAnnotations:
        app.kubernetes.io/component: ingress-controller
      deployment:
        kind: DaemonSet
        annotations:
          app.kubernetes.io/component: ingress-controller
      ingressClass:
        enabled: true
        name: "{{ traefik_ingress_class }}"
        isDefaultClass: false
      service:
        # type: NodePort # говорит что не используется
        annotations:
          app.kubernetes.io/component: ingress-controller
        spec:
          type: NodePort
          externalTrafficPolicy: Local
      ports:
        traefik:
          port: 8080
          exposedPort: 8080
          expose:
            default: false
        web:
          asDefault: true
          port: 80
          nodePort: 80
          expose:
            default: true
          exposedPort: 80
          forwardedHeaders:
            insecure: true
          proxyProtocol:
            insecure: true
          transport:
            respondingTimeouts:
              idleTimeout: 600
              writeTimeout: 600
              readTimeout: 600
        websecure:
          asDefault: true
          port: 443
          nodePort: 443
          expose:
            default: true
          exposedPort: 443
          http:
            tls:
              enabled: true
          forwardedHeaders:
            insecure: true
          proxyProtocol:
            insecure: true
          transport:
            respondingTimeouts:
              idleTimeout: 600
              writeTimeout: 600
              readTimeout: 600
        metrics:
          port: 9200
          exposedPort: 9200
          expose:
            default: false
      providers:
        kubernetesCRD:
          enabled: true
          ingressClass: "{{ traefik_ingress_class }}"
          allowCrossNamespace: true
        kubernetesIngress:
          enabled: true
          ingressClass: "{{ traefik_ingress_class }}"
          publishedService:
            enabled: false
      logs:
        general:
          level: DEBUG
          format: json
        access:
          enabled: true
          format: json
      gateway:
        enabled: false
      gatewayClass:
        enabled: false
      api:
        dashboard: true
      metrics:
        addInternals: true
        prometheus:
          entryPoint: metrics
          service:
            enabled: true
          serviceMonitor:
            enabled: true
            interval: "30s"
            scrapeTimeout: "15s"
            additionalLabels: {}
      additionalArguments:
        - "--api.insecure=true"
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      extraObjects:
        - apiVersion: v1
          kind: Service
          metadata:
            name: "traefik-dashboard"
            labels:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: "traefik-{{ traefik_namespace }}"
          spec:
            type: ClusterIP
            selector:
              app.kubernetes.io/name: traefik
              app.kubernetes.io/instance: "traefik-{{ traefik_namespace }}"
            ports:
              - name: dashboard
                protocol: TCP
                port: 8080
                targetPort: 8080
