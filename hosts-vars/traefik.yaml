all:
  vars:
    traefik_namespace: "traefik-lb"
    traefik_daemonset_name: "traefik-lb"
    traefik_ingress_class: "traefik-lb"
    traefik_web_entrypoint: "web" # WARNING: DO NOT CHANGE - hardcoded in helm chart
    traefik_websecure_entrypoint: "websecure" # WARNING: DO NOT CHANGE - hardcoded in helm chart
    # Used in cilium-install.yaml post values
    traefik_web_port: 80 # NOT CHANGE
    traefik_websecure_port: 443 # NOT CHANGE
    traefik_dashboard_domain: "traefik-dashboard-k8s-v2.drawapp.ru"
    traefik_dashboard_vpn_only_enabled: false
    traefik_dashboard_https_secret_name: "cert-traefik-dashboard"
    traefik_dashboard_service_name: "traefik-dashboard"
    traefik_dashboard_ingress_class_name: "traefik-lb"
    traefik_acme_server: "https://acme-v02.api.letsencrypt.org/directory"
    traefik_acme_email: "some-email-123@gmail.com"
    traefik_acme_solvers:
      - http01:
          ingress:
            ingressClassName: "traefik-lb"
            ingressTemplate:
              metadata:
                annotations:
                  "kubernetes.io/ingress.class": "traefik-lb"
                  "traefik.ingress.kubernetes.io/router.entrypoints": "web"
            podTemplate:
              metadata:
                labels:
                  app.kubernetes.io/name: acme-solver
                  app.kubernetes.io/instance: traefik-lb
                  app.kubernetes.io/component: acme-http01-solver
                  app.kubernetes.io/managed-by: cert-manager
    traefik_cert_manager_issuer_enabled: true
    # cert-manager Issuer (per-component, namespaced) — единый объект {enabled, body}.
    # enabled: true  → Issuer + solver-NetworkPolicies (pre); Certificate доступен (post).
    # enabled: false → ни Issuer, ни solver-NP, ни Certificate.
    traefik_cert_manager_issuer:
      enabled: "{{ traefik_cert_manager_issuer_enabled }}"
      body:
        name: "traefik-acme"
        spec:
          acme:
            server: "{{ traefik_acme_server }}"
            email: "{{ traefik_acme_email }}"
            privateKeySecretRef:
              name: "traefik-acme-account-key"
            solvers: "{{ traefik_acme_solvers }}"
    # Ingress config (per-domain) — независимые toggle'ы ingress / certificate.
    # 1 domain === 1 ingress_config. traefik — 1 домен (dashboard).
    traefik_ingress_enabled: true
    traefik_ingress_tls_enabled: true
    traefik_ingress_certificate_enabled: true
    traefik_ingress_config:
      domain: "{{ traefik_dashboard_domain }}"
      tlsSecretName: "{{ traefik_dashboard_https_secret_name }}"
      ingress:
        enabled: "{{ traefik_ingress_enabled }}"
        ingressClass: "{{ traefik_dashboard_ingress_class_name }}"
        tlsEnabled: "{{ traefik_ingress_tls_enabled }}"
        vpnOnlyEnabled: "{{ traefik_dashboard_vpn_only_enabled }}"
        vpnIngressMiddlewares: "{{ vpn_ingress_middlewares }}"
      certificate:
        enabled: "{{ traefik_ingress_certificate_enabled }}"
    # ---------
    # ESO integration: Vault → K8s Secrets
    # Базовые секреты (нужны для запуска) — отдельные named-переменные с полным dict-объектом.
    # eso_vault_integration_traefik_secrets — массив ссылок на named-переменные
    # (chart eso-external-secret.yaml рендерит .Values.eso.secrets единообразно
    # как для base-ссылок, так и для _extra dict'ов).
    # Для traefik base пуст: TLS / basic-auth и прочие секреты — через
    # eso_vault_integration_traefik_secrets_extra в hosts-vars-override/.
    # ---------
    eso_vault_integration_traefik:
      sa_name: "eso-main" # Название ServiceAccount в namespace traefik-lb
      role_name: "traefik.eso-main" # {namespace}.{sa_name} Название Role в traefik-lb
      secret_store_name: "eso-main.vault" # {sa_name}.{PROVIDER} Название SecretStore в namespace traefik-lb
      kv_engine_path: "eso-secret" # Название KV Engine в Vault

    eso_vault_integration_traefik_secrets: []
    # Пример элемента с полем body (плоский default — target.name + dataFrom.extract.key):
    # eso_vault_integration_traefik_secrets_extra:
    #   - external_secret_name: "eso-traefik-my-secret"
    #     vault_path: "/traefik/my-secret"
    #     body:
    #       target:
    #         name: "eso-traefik-my-secret"
    #       dataFrom:
    #         - extract:
    #             key: "{{ eso_vault_integration_traefik.kv_engine_path }}/data/traefik/my-secret"
    eso_vault_integration_traefik_secrets_extra: []
    # ---
    # --- PHASE: pre ---
    # Helm timeouts
    traefik_pre_helm_timeout: "5m"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    traefik_pre_extra_objects: []
    # Pre-phase kustomize patches (operator-side customization, default empty)
    traefik_pre_kustomize_patches: []
    # Pre-phase values (NetworkPolicies + ESO chart)
    # Примечание: eso.secrets — runtime-факт от tasks-eso-merge.yaml (tags: [always])
    traefik_pre_helm_values:
      namespace: "{{ traefik_namespace }}"
      instanceName: "traefik-{{ traefik_namespace }}"
      eso:
        vaultServerUrl: "{{ vault_internal_url }}"
        saName: "{{ eso_vault_integration_traefik.sa_name }}"
        roleName: "{{ eso_vault_integration_traefik.role_name }}"
        secretStoreName: "{{ eso_vault_integration_traefik.secret_store_name }}"
        kvEnginePath: "{{ eso_vault_integration_traefik.kv_engine_path }}"
        secrets: "{{ eso_vault_integration_traefik_secrets + (eso_vault_integration_traefik_secrets_extra | default([])) }}"
      esoResourcesConfig:
        secretStoreRefreshInterval: "{{ eso_resources_config.secret_store_refresh_interval }}"
        externalSecretRefreshInterval: "{{ eso_resources_config.external_secret_refresh_interval }}"
        externalSecretRefreshPolicy: "{{ eso_resources_config.external_secret_refresh_policy }}"
      issuer: "{{ traefik_cert_manager_issuer }}"
      extraObjects: "{{ traefik_pre_extra_objects }}"
    # ---
    # --- PHASE: install ---
    traefik_install_helm_timeout: "5m"
    traefik_rollout_timeout: "300s"
    # Helm repository - источник chart (переопределить в hosts-vars-override/ для airgap)
    traefik_helm_is_oci: false
    traefik_helm_url: "https://traefik.github.io/charts"
    traefik_helm_repo_name: "traefik"
    traefik_helm_chart_name: "traefik"
    traefik_helm_chart_version: "39.0.9"
    # Helm chart values
    # --- Operator-overridable blocks (extracted from traefik_helm_values) ---
    traefik_helm_values_providers:
      kubernetesCRD:
        enabled: true
        ingressClass: "{{ traefik_ingress_class }}"
        allowCrossNamespace: true
      kubernetesIngress:
        enabled: true
        ingressClass: "{{ traefik_ingress_class }}"
        publishedService:
          enabled: false
    traefik_helm_values_logs:
      general:
        level: DEBUG
        format: json
      access:
        enabled: true
        format: json
    traefik_helm_values_extra_objects:
      - apiVersion: v1
        kind: Service
        metadata:
          name: "traefik-dashboard"
          labels:
            app.kubernetes.io/name: traefik
            app.kubernetes.io/instance: "traefik-{{ traefik_namespace }}"
        spec:
          type: ClusterIP
          selector:
            app.kubernetes.io/name: traefik
            app.kubernetes.io/instance: "traefik-{{ traefik_namespace }}"
          ports:
            - name: dashboard
              protocol: TCP
              port: 8080
              targetPort: 8080
    # --- round-4 blocks (extracted from traefik_helm_values) ---
    traefik_helm_values_service:
      # type: NodePort # говорит что не используется
      annotations:
        app.kubernetes.io/component: ingress-controller
      spec:
        type: NodePort
        externalTrafficPolicy: Local
    traefik_helm_values_ports:
      traefik:
        port: 8080
        exposedPort: 8080
        expose:
          default: false
      web:
        asDefault: true
        port: 80
        nodePort: 80
        expose:
          default: true
        exposedPort: 80
        forwardedHeaders:
          insecure: true
        proxyProtocol:
          insecure: true
        transport:
          respondingTimeouts:
            idleTimeout: 600
            writeTimeout: 600
            readTimeout: 600
      websecure:
        asDefault: true
        port: 443
        nodePort: 443
        expose:
          default: true
        exposedPort: 443
        http:
          tls:
            enabled: true
        forwardedHeaders:
          insecure: true
        proxyProtocol:
          insecure: true
        transport:
          respondingTimeouts:
            idleTimeout: 600
            writeTimeout: 600
            readTimeout: 600
      metrics:
        port: 9200
        exposedPort: 9200
        expose:
          default: false
    # ---------
    traefik_helm_values:
      fullnameOverride: "{{ traefik_daemonset_name }}"
      tolerations:
        - operator: "Exists"
      nodeSelector: {}
      resources: {}
      serviceAccountAnnotations:
        app.kubernetes.io/component: ingress-controller
      deployment:
        kind: DaemonSet
        annotations:
          app.kubernetes.io/component: ingress-controller
      ingressClass:
        enabled: true
        name: "{{ traefik_ingress_class }}"
        isDefaultClass: false
      service: "{{ traefik_helm_values_service }}"
      ports: "{{ traefik_helm_values_ports }}"
      providers: "{{ traefik_helm_values_providers }}"
      logs: "{{ traefik_helm_values_logs }}"
      gateway:
        enabled: false
      gatewayClass:
        enabled: false
      api:
        dashboard: true
      metrics:
        addInternals: true
        prometheus:
          entryPoint: metrics
          service:
            enabled: true
          serviceMonitor:
            enabled: true
            interval: "30s"
            scrapeTimeout: "15s"
            additionalLabels: {}
      additionalArguments:
        - "--api.insecure=true"
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      extraObjects: "{{ traefik_helm_values_extra_objects }}"
    # ---
    # --- PHASE: post ---
    traefik_post_helm_timeout: "5m"
    # Middlewares
    traefik_middlewares:
      - name: http-to-https
        spec:
          redirectRegex:
            regex: "^http://(.+)"
            replacement: "https://${1}"
            permanent: true
      - name: http-www-to-https
        spec:
          redirectRegex:
            regex: "^http://www.(.+)"
            replacement: "https://${1}"
            permanent: true
      - name: http-www-to-http
        spec:
          redirectRegex:
            regex: "^http://www.(.+)"
            replacement: "http://${1}"
            permanent: true
      - name: https-www-to-https
        spec:
          redirectRegex:
            regex: "^https://www.(.+)"
            replacement: "https://${1}"
            permanent: true
      - name: all-to-https
        spec:
          redirectRegex:
            regex: "(^https://www.|^http://www.|^http://)(.+)"
            replacement: "https://${2}"
            permanent: true
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    traefik_post_extra_objects: []
    # Post-phase kustomize patches (operator-side customization, default empty)
    traefik_post_kustomize_patches: []
    # Post-phase values (Middlewares + Dashboard Ingress chart)
    traefik_post_helm_values:
      namespace: "{{ traefik_namespace }}"
      issuer: "{{ traefik_cert_manager_issuer }}"
      ingressConfig: "{{ traefik_ingress_config }}"
      traefik:
        entryPoints:
          web: "{{ traefik_web_entrypoint }}"
          websecure: "{{ traefik_websecure_entrypoint }}"
      middlewares: "{{ traefik_middlewares }}"
      vpnMiddlewares: "{{ vpn_traefik_middlewares }}"
      dashboard:
        serviceName: "{{ traefik_dashboard_service_name }}"
      extraObjects: "{{ traefik_post_extra_objects }}"
