all:
  vars:
    # ------
    # registry+images (AirGap)
    # ------
    # Registry для образов node-exporter. По умолчанию — quay.io.
    # Для airgap — переопределить в hosts-vars-override/mon-node-exporter.yaml:
    #   node_exporter_image_registry: "my-private-registry.local"
    #
    # СБ должна загрузить:
    #   <registry>/prometheus/node-exporter:v1.11.1
    node_exporter_image_registry: "quay.io"
    node_exporter_image_name: "{{ node_exporter_image_registry }}/prometheus/node-exporter"
    node_exporter_image_tag: "v1.11.1"
    # ---------
    # ---------
    node_exporter_namespace: "node-exporter"
    # Timeouts
    node_exporter_pre_helm_timeout: "3m"
    node_exporter_install_helm_timeout: "3m"
    node_exporter_post_helm_timeout: "3m"
    node_exporter_rollout_timeout: "120s"
    # ---------
    node_exporter_port: 9100
    # ---------
    # Pre-phase values (NetworkPolicies chart)
    node_exporter_pre_helm_values:
      namespace: "{{ node_exporter_namespace }}"
      node_exporter:
        port: "{{ node_exporter_port }}"
    # ---------
    # Install-phase values
    node_exporter_install_helm_values:
      namespace: "{{ node_exporter_namespace }}"
      node_exporter:
        image:
          name: "{{ node_exporter_image_name }}"
          tag: "{{ node_exporter_image_tag }}"
        port: "{{ node_exporter_port }}"
        args:
          - --path.procfs=/host/proc
          - --path.sysfs=/host/sys
          - --path.rootfs=/host/root
          - --path.udev.data=/host/root/run/udev/data
          - '--web.listen-address=0.0.0.0:9100'
          - '--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)'
          - '--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs|erofs)$'
      tolerations:
        - operator: "Exists"
      nodeSelector:
        kubernetes.io/os: linux
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 200m
          memory: 128Mi
    # ---------
    # Post-phase values (ServiceMonitor chart)
    node_exporter_post_helm_values:
      namespace: "{{ node_exporter_namespace }}"
      serviceMonitor:
        enabled: true
        interval: "30s"
        scrapeTimeout: "15s"
        labels: {}
