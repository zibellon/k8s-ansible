all:
  vars:
    # ------
    # registry+images (AirGap)
    # ------
    # Registry для образа HAProxy Ingress Controller. По умолчанию — docker.io.
    # Для airgap/приватного registry — переопределить в hosts-vars-override/haproxy.yaml:
    #   haproxy_image_registry: "my-private-registry.local"
    #
    # СБ должна загрузить 1 образ:
    #   <registry>/haproxytech/kubernetes-ingress:3.2.6
    haproxy_image_registry: "docker.io"
    haproxy_image_tag: "3.2.6"
    # ---------
    # ---------
    haproxy_namespace: "haproxy-lb"
    # Helm repository - источник chart (переопределить в hosts-vars-override/ для airgap)
    haproxy_helm_repo_url: "https://haproxytech.github.io/helm-charts"
    haproxy_helm_repo_name: "haproxytech"
    haproxy_helm_chart_name: "kubernetes-ingress"
    haproxy_chart_version: "1.49.0"
    haproxy_daemonset_name: "haproxy-lb"
    haproxy_ingress_class: "haproxy-lb"
    # Helm timeouts
    haproxy_pre_helm_timeout: "5m"
    haproxy_install_helm_timeout: "5m"
    haproxy_post_helm_timeout: "2m"
    haproxy_rollout_timeout: "300s"
    # Global CRD spec: config + logTargets
    haproxy_global_config:
      config:
        maxconn: 10000
        nbthread: 2
        tune_options:
          bufsize: 32768
          maxrewrite: 8192
          rcvbuf_client: 32768
          rcvbuf_server: 32768
          sndbuf_client: 32768
          sndbuf_server: 32768
          maxaccept: 32
          runqueue_depth: 128
      logTargets:
        - index: 0
          address: stdout
          facility: daemon
          format: raw
          level: warning
    # Defaults CRD spec.config
    haproxy_defaults_config:
      mode: tcp
      client_timeout: 3600000
      server_timeout: 3600000
      connect_timeout: 5000
      queue_timeout: 60000
      retries: 5
      check_timeout: 5000
      tcpka: enabled
      clitcpka: enabled
      srvtcpka: enabled
      clitcpka_idle: 60000
      clitcpka_intvl: 10000
      clitcpka_cnt: 3
      srvtcpka_idle: 60000
      srvtcpka_intvl: 10000
      srvtcpka_cnt: 3
      tcp_smart_connect: enabled
      tcp_smart_accept: enabled
      tcplog: true
    # Helm chart values
    haproxy_helm_values:
      fullnameOverride: "{{ haproxy_daemonset_name }}"
      controller:
        image:
          repository: "{{ haproxy_image_registry }}/haproxytech/kubernetes-ingress"
          tag: "{{ haproxy_image_tag }}"
        kind: DaemonSet
        tolerations:
          - operator: "Exists"
        nodeSelector: {}
        resources: {}
        ingressClassResource:
          name: "{{ haproxy_ingress_class }}"
        ingressClass: "{{ haproxy_ingress_class }}"
        defaultTLSSecret:
          enabled: false
        logging:
          level: info
          traffic:
            address: stdout
            format: raw
            facility: daemon
        service:
          enabled: true
          type: ClusterIP
          enablePorts:
            http: false
            https: false
            quic: false
            stat: true
        serviceMonitor:
          enabled: true
          extraLabels: {}
          endpoints:
            - port: stat
              path: /metrics
              scheme: http
              interval: "30s"
      serviceAccount:
        create: true
