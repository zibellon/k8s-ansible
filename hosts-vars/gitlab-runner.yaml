all:
  vars:
    # GitLab Runner internal images (helper + DinD executor + DinD service).
    # Используются в gitlab_runner_config TOML (runners.kubernetes.image,
    # runners.kubernetes.services, helper_image).
    # Для AirGap оператор переопределяет в hosts-vars-override/gitlab-runner.yaml.
    gitlab_runner_helper_image: "registry.gitlab.com/gitlab-org/gitlab-runner/gitlab-runner-helper:x86_64-alpine-v17.11.4"
    gitlab_runner_dind_image: "docker.io/docker:29.3.0"
    gitlab_runner_dind_dind_image: "docker.io/docker:29.3.0-dind"
    gitlab_runner_namespace: "gitlab-runner"
    # Helm repository - источник chart (переопределить в hosts-vars-override/ для airgap)
    gitlab_runner_helm_is_oci: false
    gitlab_runner_helm_url: "https://charts.gitlab.io"
    gitlab_runner_helm_repo_name: "gitlab"
    gitlab_runner_helm_chart_name: "gitlab-runner"
    gitlab_runner_helm_chart_version: "0.78.0" # gitlab-runner 17.11
    # Helm timeouts
    gitlab_runner_pre_helm_timeout: "5m"
    gitlab_runner_install_helm_timeout: "5m"
    gitlab_runner_rollout_timeout: "180s"
    # Internal GitLab URL (webservice via cluster DNS, bypasses external ingress)
    gitlab_runner_gitlab_url: "http://gitlab-webservice-default.{{ gitlab_namespace }}.svc.{{ cluster_dns_domain }}:8181"
    gitlab_runner_label_name: "gitlab-runner"
    gitlab_runner_label_component: "runner"
    gitlab_runner_job_label_name: "gitlab-runner-job"
    gitlab_runner_job_label_component: "job"
    # ---
    # ---
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    gitlab_runner_pre_extra_objects: []
    # Pre-phase kustomize patches (operator-side customization, default empty)
    gitlab_runner_pre_kustomize_patches: []
    # Pre-phase values (ESO Resources + NetworkPolicies chart)
    # eso_vault_integration_gitlab_runner_secrets — inline merge base + extra (задаётся ниже в eso_vault_integration_gitlab_runner_secrets)
    gitlab_runner_pre_helm_values:
      namespace: "{{ gitlab_runner_namespace }}"
      externalSecrets:
        namespace: "{{ external_secrets_namespace }}"
      eso:
        vaultServerUrl: "{{ vault_internal_url }}"
        saName: "{{ eso_vault_integration_gitlab_runner.sa_name }}"
        roleName: "{{ eso_vault_integration_gitlab_runner.role_name }}"
        secretStoreName: "{{ eso_vault_integration_gitlab_runner.secret_store_name }}"
        kvEnginePath: "{{ eso_vault_integration_gitlab_runner.kv_engine_path }}"
        secrets: "{{ eso_vault_integration_gitlab_runner_secrets + (eso_vault_integration_gitlab_runner_secrets_extra | default([])) }}"
      esoResourcesConfig:
        secretStoreRefreshInterval: "{{ eso_resources_config.secret_store_refresh_interval }}"
        externalSecretRefreshInterval: "{{ eso_resources_config.external_secret_refresh_interval }}"
        externalSecretRefreshPolicy: "{{ eso_resources_config.external_secret_refresh_policy }}"
      gitlab:
        namespace: "{{ gitlab_namespace }}"
        releaseName: gitlab
      gitlab_runner:
        name: "{{ gitlab_runner_label_name }}"
        component: "{{ gitlab_runner_label_component }}"
      gitlab_runner_job:
        name: "{{ gitlab_runner_job_label_name }}"
        component: "{{ gitlab_runner_job_label_component }}"
      extraObjects: "{{ gitlab_runner_pre_extra_objects }}"
    # ---
    # ---
    gitlab_runner_config: |
      [[runners]]
        executor = "kubernetes"
        shell = "bash"
        helper_image = "{{ gitlab_runner_helper_image }}"
        environment = ["DOCKER_TLS_CERTDIR=", "DOCKER_HOST=tcp://docker-my-dind:2375"]

        [runners.cache]
          Type = "s3"
          Shared = false

          [runners.cache.s3]
            ServerAddress = "gitlab-minio.{{ gitlab_namespace }}.svc.{{ cluster_dns_domain }}:9000"
            Insecure = false
            BucketName = "runner-cache"
            BucketLocation = "{{ gitlab_minio_s3_region }}"
            PathStyle = true

        [runners.kubernetes]
          namespace = "{{ gitlab_runner_namespace }}"
          service_account = "gitlab-runner"
          image = "{{ gitlab_runner_dind_image }}"
          privileged = true
          allow_privilege_escalation = true

          [runners.kubernetes.node_selector]
            "node-role.kubernetes.io/worker" = ""

          [runners.kubernetes.pod_labels]
            "app.kubernetes.io/name"       = "{{ gitlab_runner_job_label_name }}"
            "app.kubernetes.io/component"  = "{{ gitlab_runner_job_label_component }}"
            "app.kubernetes.io/part-of"    = "gitlab"
            "app.kubernetes.io/managed-by" = "gitlab-runner"

          [[runners.kubernetes.services]]
            name = "{{ gitlab_runner_dind_dind_image }}"
            alias = "docker-my-dind"
            environment = ["HEALTHCHECK_TCP_PORT=2375"]

    # Helm chart values
    gitlab_runner_helm_values:
      gitlabUrl: "{{ gitlab_runner_gitlab_url }}"
      replicas: 3
      concurrent: 10
      checkInterval: 30
      unregisterRunners: false
      runners:
        secret: "{{ gitlab_runner_secret_auth_token.body.target.name }}"
        cache:
          secretName: "{{ gitlab_runner_secret_minio_cache_creds.body.target.name }}"
        config: "{{ gitlab_runner_config }}"
      rbac:
        create: true
        clusterWideAccess: false
      serviceAccount:
        create: true
        name: gitlab-runner
      podLabels:
        app.kubernetes.io/name: gitlab-runner
        app.kubernetes.io/component: runner
        app.kubernetes.io/part-of: gitlab
        app.kubernetes.io/managed-by: helm
      tolerations: []
      nodeSelector: {}
      affinity: {}
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 100
        fsGroup: 65533
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
        readOnlyRootFilesystem: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
      metrics:
        enabled: true
        port: 9252
        podMonitor:
          enabled: true
          interval: "30s"
          scrapeTimeout: "15s"
    # ---------
    # ESO integration: Vault → K8s Secrets
    # Базовые секреты (нужны для запуска) — отдельные named-переменные с полным dict-объектом.
    # eso_vault_integration_gitlab_runner_secrets — массив ссылок на named-переменные
    # (chart eso-external-secret.yaml рендерит .Values.eso.secrets единообразно
    # как для base-ссылок, так и для _extra dict'ов).
    # _extra — расширение оператора через hosts-vars-override/.
    # ---------
    eso_vault_integration_gitlab_runner:
      sa_name: "eso-main"
      role_name: "gitlab-runner.eso-main"
      secret_store_name: "eso-main.vault"
      kv_engine_path: "eso-secret"

    # SPECIAL: runner_token maps Vault key 'token' → k8s key 'runner-token'.
    # runner-registration-token must be present as empty string for chart compatibility.
    gitlab_runner_secret_auth_token:
      external_secret_name: "eso-gitlab-runner-auth-token"
      vault_path: "/gitlab-runner/token"
      body:
        target:
          name: "eso-gitlab-runner-auth-token"
          template:
            engineVersion: v2
            data:
              runner-registration-token: ""
              runner-token: "{% raw %}{{ .token }}{% endraw %}"
        data:
          - secretKey: token
            remoteRef:
              key: "{{ eso_vault_integration_gitlab_runner.kv_engine_path }}/data/gitlab-runner/token"
              property: token

    # SPECIAL: minio_runner_cache remaps access_key/secret_key → accesskey/secretkey
    # as expected by the official gitlab-runner chart runners.cache.secretName.
    gitlab_runner_secret_minio_cache_creds:
      external_secret_name: "eso-gitlab-runner-minio-cache-creds"
      vault_path: "/gitlab-runner/minio/cache"
      body:
        target:
          name: "eso-gitlab-runner-minio-cache-creds"
        data:
          - secretKey: accesskey
            remoteRef:
              key: "{{ eso_vault_integration_gitlab_runner.kv_engine_path }}/data/gitlab-runner/minio/cache"
              property: access_key
          - secretKey: secretkey
            remoteRef:
              key: "{{ eso_vault_integration_gitlab_runner.kv_engine_path }}/data/gitlab-runner/minio/cache"
              property: secret_key

    eso_vault_integration_gitlab_runner_secrets:
      - "{{ gitlab_runner_secret_auth_token }}"
      - "{{ gitlab_runner_secret_minio_cache_creds }}"

    eso_vault_integration_gitlab_runner_secrets_extra: []
