all:
  vars:
    # ------
    # registry+images (AirGap)
    # ------
    # Registry для образов GitLab Runner. По умолчанию — registry.gitlab.com.
    # Для airgap/приватного registry — переопределить в hosts-vars-override/gitlab-runner.yaml:
    #   gitlab_runner_image_registry_host: "my-private-registry.local"
    #
    # СБ должна загрузить следующий образ (только registry меняется, путь остаётся оригинальным):
    #   <host>/gitlab-org/gitlab-runner:alpine-v<appVersion>
    #   Пример: registry.gitlab.com/gitlab-org/gitlab-runner:alpine-v17.11.4
    gitlab_runner_image_registry_host: "registry.gitlab.com"
    gitlab_runner_image_tag: "alpine-v17.11.4"
    # ---------
    # Registry для helper-образа GitLab Runner. По умолчанию — registry.gitlab.com.
    # Для airgap — переопределить в hosts-vars-override/gitlab-runner.yaml:
    #   gitlab_runner_helper_image_registry_host: "my-private-registry.local"
    #
    # СБ должна загрузить:
    #   <registry>/gitlab-org/gitlab-runner/gitlab-runner-helper:x86_64-<tag>
    #   Пример: registry.gitlab.com/gitlab-org/gitlab-runner/gitlab-runner-helper:x86_64-alpine-v17.11.4
    gitlab_runner_helper_image_registry_host: "registry.gitlab.com"
    # Registry и тег для DinD (Docker-in-Docker) executor образа. По умолчанию — docker.io.
    # Используется как executor image и DinD sidecar в runners.config TOML.
    # Для airgap — переопределить в hosts-vars-override/gitlab-runner.yaml:
    #   gitlab_runner_dind_image_registry: "my-private-registry.local"
    #
    # СБ должна загрузить (2 образа):
    #   <registry>/docker:<tag>       (executor)
    #   <registry>/docker:<tag>-dind  (DinD sidecar)
    gitlab_runner_dind_image_registry: "docker.io"
    gitlab_runner_dind_image_tag: "29.3.0"
    # ---------
    # ---------
    gitlab_runner_namespace: "gitlab-runner"
    # Helm repository - источник chart (переопределить в hosts-vars-override/ для airgap)
    gitlab_runner_helm_repo_url: "https://charts.gitlab.io"
    gitlab_runner_helm_repo_name: "gitlab"
    gitlab_runner_helm_chart_name: "gitlab-runner"
    gitlab_runner_chart_version: "0.78.0" # gitlab-runner 17.11
    # Helm timeouts
    gitlab_runner_pre_helm_timeout: "5m"
    gitlab_runner_install_helm_timeout: "5m"
    gitlab_runner_rollout_timeout: "180s"
    # Internal GitLab URL (webservice via cluster DNS, bypasses external ingress)
    gitlab_runner_gitlab_url: "http://gitlab-webservice-default.{{ gitlab_namespace }}.svc.{{ cluster_dns_domain }}:8181"
    gitlab_runner_label_name: "gitlab-runner"
    gitlab_runner_label_component: "runner"
    gitlab_runner_job_label_name: "gitlab-runner-job"
    gitlab_runner_job_label_component: "job"
    # Pre-phase values (ESO Resources + NetworkPolicies chart)
    # eso_vault_integration_gitlab_runner_secrets_merged — runtime-факт от tasks-eso-merge.yaml [always]
    gitlab_runner_pre_helm_values:
      namespace: "{{ gitlab_runner_namespace }}"
      externalSecrets:
        namespace: "{{ external_secrets_namespace }}"
      runnerEso:
        vaultServerUrl: "{{ vault_internal_url }}"
        saName: "{{ eso_vault_integration_gitlab_runner.sa_name }}"
        roleName: "{{ eso_vault_integration_gitlab_runner.role_name }}"
        secretStoreName: "{{ eso_vault_integration_gitlab_runner.secret_store_name }}"
        kvEnginePath: "{{ eso_vault_integration_gitlab_runner.kv_engine_path }}"
        isNeedEso: "{{ eso_vault_integration_gitlab_runner.is_need_eso | default(true) }}"
        secrets: "{{ eso_vault_integration_gitlab_runner_secrets_merged }}"
      esoResourcesConfig:
        secretStoreRefreshInterval: "{{ eso_resources_config.secret_store_refresh_interval }}"
        externalSecretRefreshInterval: "{{ eso_resources_config.external_secret_refresh_interval }}"
        externalSecretRefreshPolicy: "{{ eso_resources_config.external_secret_refresh_policy }}"
      gitlab:
        namespace: "{{ gitlab_namespace }}"
        releaseName: gitlab
      gitlab_runner:
        name: "{{ gitlab_runner_label_name }}"
        component: "{{ gitlab_runner_label_component }}"
      gitlab_runner_job:
        name: "{{ gitlab_runner_job_label_name }}"
        component: "{{ gitlab_runner_job_label_component }}"
    gitlab_runner_config: |
      [[runners]]
        executor = "kubernetes"
        shell = "bash"
        helper_image = "{{ gitlab_runner_helper_image_registry_host }}/gitlab-org/gitlab-runner/gitlab-runner-helper:x86_64-{{ gitlab_runner_image_tag }}"
        environment = ["DOCKER_TLS_CERTDIR=", "DOCKER_HOST=tcp://docker-my-dind:2375"]

        [runners.cache]
          Type = "s3"
          Shared = false

          [runners.cache.s3]
            ServerAddress = "gitlab-minio.{{ gitlab_namespace }}.svc.{{ cluster_dns_domain }}:9000"
            Insecure = false
            BucketName = "runner-cache"
            BucketLocation = "{{ gitlab_minio_s3_region }}"
            PathStyle = true

        [runners.kubernetes]
          namespace = "{{ gitlab_runner_namespace }}"
          service_account = "gitlab-runner"
          image = "{{ gitlab_runner_dind_image_registry }}/docker:{{ gitlab_runner_dind_image_tag }}"
          privileged = true
          allow_privilege_escalation = true

          [runners.kubernetes.node_selector]
            "node-role.kubernetes.io/worker" = ""

          [runners.kubernetes.pod_labels]
            "app.kubernetes.io/name"       = "{{ gitlab_runner_job_label_name }}"
            "app.kubernetes.io/component"  = "{{ gitlab_runner_job_label_component }}"
            "app.kubernetes.io/part-of"    = "gitlab"
            "app.kubernetes.io/managed-by" = "gitlab-runner"

          [[runners.kubernetes.services]]
            name = "{{ gitlab_runner_dind_image_registry }}/docker:{{ gitlab_runner_dind_image_tag }}-dind"
            alias = "docker-my-dind"
            environment = ["HEALTHCHECK_TCP_PORT=2375"]

    # Helm chart values
    gitlab_runner_helm_values:
      image:
        registry: "{{ gitlab_runner_image_registry_host }}"
        image: "gitlab-org/gitlab-runner"
        tag: "{{ gitlab_runner_image_tag }}"
      gitlabUrl: "{{ gitlab_runner_gitlab_url }}"
      replicas: 3
      concurrent: 10
      checkInterval: 30
      unregisterRunners: false
      runners:
        secret: "{{ secret_runner_token }}"
        cache:
          secretName: "{{ secret_minio_cache }}"
        config: "{{ gitlab_runner_config }}"
      rbac:
        create: true
        clusterWideAccess: false
      serviceAccount:
        create: true
        name: gitlab-runner
      podLabels:
        app.kubernetes.io/name: gitlab-runner
        app.kubernetes.io/component: runner
        app.kubernetes.io/part-of: gitlab
        app.kubernetes.io/managed-by: helm
      tolerations: []
      nodeSelector: {}
      affinity: {}
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 100
        fsGroup: 65533
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
        readOnlyRootFilesystem: false
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
      metrics:
        enabled: true
        port: 9252
        podMonitor:
          enabled: true
          interval: "30s"
          scrapeTimeout: "15s"
