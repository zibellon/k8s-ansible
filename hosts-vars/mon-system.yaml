all:
  vars:
    mon_system_namespace: "mon-system"

    # Per-component enable flags. Composite gate: prometheus/alertmanager skipped if
    # mon_system_prometheus_operator_enabled: false (regardless of own flag).
    mon_system_prometheus_operator_enabled: true
    mon_system_prometheus_enabled: true
    mon_system_alertmanager_enabled: true
    mon_system_node_exporter_enabled: true
    mon_system_ksm_enabled: true
    mon_system_loki_enabled: true
    mon_system_vector_enabled: true
    mon_system_grafana_enabled: true
    mon_system_loki_service_monitor_enabled: true
    mon_system_ksm_service_monitor_enabled: true
    mon_system_node_exporter_service_monitor_enabled: true

    # Common ingress (unified for grafana / prometheus / alertmanager UIs).
    mon_system_ingress_class_name: "traefik-lb"
    # cert-manager Issuer (per-component, namespaced) — единый объект {enabled, body}.
    # Один на mon-system (3 UI: grafana/prometheus/alertmanager).
    # enabled: true  → Issuer + solver-NetworkPolicies (pre); Certificate доступен (post).
    # enabled: false → ни Issuer, ни solver-NP, ни Certificate.
    mon_system_cert_manager_issuer:
      enabled: true
      body:
        name: "mon-system-acme"
        spec:
          acme:
            server: "https://acme-v02.api.letsencrypt.org/directory"
            email: "some-email-123@gmail.com"
            privateKeySecretRef:
              name: "mon-system-acme-account-key"
            solvers:
              - http01:
                  ingress:
                    ingressClassName: "traefik-lb"
                    ingressTemplate:
                      metadata:
                        annotations:
                          "kubernetes.io/ingress.class": "traefik-lb"
                          "traefik.ingress.kubernetes.io/router.entrypoints": "web"
                    podTemplate:
                      metadata:
                        labels:
                          app.kubernetes.io/name: acme-solver
                          app.kubernetes.io/instance: traefik-lb
                          app.kubernetes.io/component: acme-http01-solver
                          app.kubernetes.io/managed-by: cert-manager

    mon_system_grafana_domain: "grafana-k8s-v2.drawapp.ru"
    mon_system_grafana_external_url: "https://grafana-k8s-v2.drawapp.ru"
    mon_system_grafana_https_secret_name: "cert-grafana-drawapp"
    mon_system_grafana_vpn_only_enabled: false

    mon_system_prometheus_domain: "prom-k8s-v2.drawapp.ru"
    mon_system_prometheus_external_url: "https://prom-k8s-v2.drawapp.ru"
    mon_system_prometheus_https_secret_name: "cert-prometheus"
    mon_system_prometheus_vpn_only_enabled: false

    mon_system_alertmanager_domain: "alertmanager-k8s-v2.drawapp.ru"
    mon_system_alertmanager_external_url: "https://alertmanager-k8s-v2.drawapp.ru"
    mon_system_alertmanager_https_secret_name: "cert-alertmanager"
    mon_system_alertmanager_vpn_only_enabled: false

    # Ingress config (per-domain) — независимые toggle'ы ingress / certificate.
    # 1 domain === 1 ingress_config. mon-system — 3 домена.
    mon_system_grafana_ingress_config:
      domain: "{{ mon_system_grafana_domain }}"
      tlsSecretName: "{{ mon_system_grafana_https_secret_name }}"
      ingress:
        enabled: true
        ingressClass: "{{ mon_system_ingress_class_name }}"
        tlsEnabled: true
        vpnOnlyEnabled: "{{ mon_system_grafana_vpn_only_enabled }}"
        vpnIngressMiddlewares: "{{ vpn_ingress_middlewares }}"
      certificate:
        enabled: true
    mon_system_prometheus_ingress_config:
      domain: "{{ mon_system_prometheus_domain }}"
      tlsSecretName: "{{ mon_system_prometheus_https_secret_name }}"
      ingress:
        enabled: true
        ingressClass: "{{ mon_system_ingress_class_name }}"
        tlsEnabled: true
        vpnOnlyEnabled: "{{ mon_system_prometheus_vpn_only_enabled }}"
        vpnIngressMiddlewares: "{{ vpn_ingress_middlewares }}"
      certificate:
        enabled: true
    mon_system_alertmanager_ingress_config:
      domain: "{{ mon_system_alertmanager_domain }}"
      tlsSecretName: "{{ mon_system_alertmanager_https_secret_name }}"
      ingress:
        enabled: true
        ingressClass: "{{ mon_system_ingress_class_name }}"
        tlsEnabled: true
        vpnOnlyEnabled: "{{ mon_system_alertmanager_vpn_only_enabled }}"
        vpnIngressMiddlewares: "{{ vpn_ingress_middlewares }}"
      certificate:
        enabled: true

    mon_system_prometheus_port: 9090
    mon_system_prometheus_reloader_port: 8080
    mon_system_alertmanager_port: 9093
    mon_system_alertmanager_mesh_tcp_port: 9094
    mon_system_alertmanager_mesh_udp_port: 9094
    mon_system_node_exporter_port: 9100
    mon_system_ksm_port: 8080
    mon_system_loki_port: 3100
    mon_system_grafana_postgresql_port: 5432
    mon_system_grafana_port: 3000

    mon_system_grafana_admin_username: "admin"
    mon_system_grafana_admin_secret_key_username: "username"
    mon_system_grafana_admin_secret_key_password: "password"

    mon_system_grafana_postgresql_username: "grafana"
    mon_system_grafana_postgresql_database_name: "grafana"
    mon_system_grafana_postgresql_secret_key_username: "username"
    mon_system_grafana_postgresql_secret_key_password: "password"

    # === SECTION 2: ESO ===
    # ============================================================================
    # ESO integration — mon-system namespace (Grafana is the only consumer)
    # ============================================================================
    # SA name + SecretStore name follow project convention: constants `eso-main`
    # and `eso-main.vault` shared across all 8 ESO-integrated namespaces.
    # Role name follows `<namespace>.eso-main` pattern.
    # Базовые секреты (нужны для запуска Grafana) — отдельные named-переменные
    # с полным dict-объектом. eso_vault_integration_mon_system_secrets — массив
    # ссылок на named-переменные (chart eso-external-secret.yaml рендерит
    # .Values.eso.secrets единообразно как для base-ссылок, так и для _extra dict'ов).
    # _extra — расширение оператора через hosts-vars-override/.
    # See secrets-and-eso.md §2.4 for canonical pattern.
    eso_vault_integration_mon_system:
      sa_name: "eso-main"
      role_name: "mon-system.eso-main"
      secret_store_name: "eso-main.vault"
      kv_engine_path: "eso-secret"

    mon_system_secret_grafana_admin_creds:
      external_secret_name: "eso-mon-system-grafana-admin-creds"
      vault_path: "/mon-system/grafana/admin/creds"
      body:
        target:
          name: "eso-mon-system-grafana-admin-creds"
        dataFrom:
          - extract:
              key: "{{ eso_vault_integration_mon_system.kv_engine_path }}/data/mon-system/grafana/admin/creds"

    mon_system_secret_grafana_postgresql_creds:
      external_secret_name: "eso-mon-system-grafana-postgresql-creds"
      vault_path: "/mon-system/grafana/postgresql/creds"
      body:
        target:
          name: "eso-mon-system-grafana-postgresql-creds"
        dataFrom:
          - extract:
              key: "{{ eso_vault_integration_mon_system.kv_engine_path }}/data/mon-system/grafana/postgresql/creds"

    mon_system_secret_loki_s3_creds:
      external_secret_name: "eso-mon-system-loki-s3-creds"
      vault_path: "/mon-system/loki/s3/creds"
      body:
        target:
          name: "eso-mon-system-loki-s3-creds"
        dataFrom:
          - extract:
              key: "{{ eso_vault_integration_mon_system.kv_engine_path }}/data/mon-system/loki/s3/creds"

    eso_vault_integration_mon_system_secrets:
      - "{{ mon_system_secret_grafana_admin_creds }}"
      - "{{ mon_system_secret_grafana_postgresql_creds }}"
      - "{{ mon_system_secret_loki_s3_creds }}"

    eso_vault_integration_mon_system_secrets_extra: []

    # === SECTION 3 ===
    # --- PHASE: crds ---
    mon_system_crds_helm_timeout: "5m"

    # --- PHASE: pre ---
    mon_system_pre_helm_timeout: "3m"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    mon_system_pre_extra_objects: []
    # Pre-phase kustomize patches (operator-side customization, default empty)
    mon_system_pre_kustomize_patches: []
    # ---------
    # Pre-phase Helm values (NetworkPolicies + ESO chart)
    # eso_vault_integration_mon_system_secrets — inline merge base + extra (задаётся ниже в eso_vault_integration_mon_system_secrets)
    mon_system_pre_helm_values:
      namespace: "{{ mon_system_namespace }}"
      prometheus_operator:
        enabled: "{{ mon_system_prometheus_operator_enabled }}"
      prometheus:
        enabled: "{{ mon_system_prometheus_enabled }}"
        port: "{{ mon_system_prometheus_port }}"
      alertmanager:
        enabled: "{{ mon_system_alertmanager_enabled }}"
        port: "{{ mon_system_alertmanager_port }}"
      grafana:
        enabled: "{{ mon_system_grafana_enabled }}"
        port: "{{ mon_system_grafana_port }}"
      loki:
        enabled: "{{ mon_system_loki_enabled }}"
      vector:
        enabled: "{{ mon_system_vector_enabled }}"
      nodeExporter:
        enabled: "{{ mon_system_node_exporter_enabled }}"
      ksm:
        enabled: "{{ mon_system_ksm_enabled }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        instanceName: "traefik-{{ traefik_namespace }}"
      seaweedfs:
        namespace: "{{ seaweedfs_namespace }}"
        s3Component: "s3"
        s3HttpPort: 8333
      issuer: "{{ mon_system_cert_manager_issuer }}"
      eso:
        vaultServerUrl: "{{ vault_internal_url }}"
        saName: "{{ eso_vault_integration_mon_system.sa_name }}"
        roleName: "{{ eso_vault_integration_mon_system.role_name }}"
        secretStoreName: "{{ eso_vault_integration_mon_system.secret_store_name }}"
        kvEnginePath: "{{ eso_vault_integration_mon_system.kv_engine_path }}"
        secrets: "{{ eso_vault_integration_mon_system_secrets + (eso_vault_integration_mon_system_secrets_extra | default([])) }}"
      esoResourcesConfig:
        secretStoreRefreshInterval: "{{ eso_resources_config.secret_store_refresh_interval }}"
        externalSecretRefreshInterval: "{{ eso_resources_config.external_secret_refresh_interval }}"
        externalSecretRefreshPolicy: "{{ eso_resources_config.external_secret_refresh_policy }}"
      extraObjects: "{{ mon_system_pre_extra_objects }}"

    # --- PHASE: prometheus-operator ---
    mon_system_prometheus_operator_helm_timeout: "3m"
    # ----------------------------------------------------------------------------
    # Prometheus-Operator stack: operator + Prometheus instance + Alertmanager
    # ----------------------------------------------------------------------------
    # При апгрейде prometheus-operator: 4 hardcoded image URIs живут в разных местах.
    # Синхронизируй ВСЕ при bump:
    #   1. operator           — playbook-app/charts/mon-system/prometheus-operator/templates/prometheus-operator.yaml (image + 6 labels)
    #   2. config-reloader    — playbook-app/charts/mon-system/prometheus-operator/templates/prometheus-operator.yaml (Deployment containers[0].args --prometheus-config-reloader)
    #   3. prometheus image   — mon_system_prometheus_spec.image / .version (выше)
    #   4. alertmanager image — mon_system_alertmanager_spec.image / .version (выше)
    mon_system_prometheus_operator_rollout_timeout: "300s"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    mon_system_prometheus_operator_extra_objects: []
    # kustomize patches применяются tasks-helm-template-kustomize-build.yaml перед helm install.
    # Pristine templates/prometheus-operator.yaml не модифицируется — все customizations здесь.
    mon_system_prometheus_operator_kustomize_patches:
      # Customization Deployment: resources, tolerations, nodeSelector.
      - target:
          kind: Deployment
          name: prometheus-operator
        patch: |-
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: prometheus-operator
          spec:
            template:
              spec:
                tolerations: []
                nodeSelector:
                  kubernetes.io/os: linux
                containers:
                  - name: prometheus-operator
                    resources:
                      limits:
                        cpu: 200m
                        memory: 200Mi
                      requests:
                        cpu: 100m
                        memory: 100Mi
    # Helm values для KUSTOMIZE_WRAPPER prometheus-operator phase — содержит только extraObjects wiring
    mon_system_prometheus_operator_helm_values:
      extraObjects: "{{ mon_system_prometheus_operator_extra_objects }}"

    # --- PHASE: prometheus ---
    mon_system_prometheus_helm_timeout: "5m"
    mon_system_prometheus_rollout_timeout: "300s"
    # Prometheus CR spec — passed verbatim to monitoring.coreos.com/v1 Prometheus
    # Prometheus hot knobs (SCALE / capacity)
    mon_system_prometheus_replica_count: 1
    mon_system_prometheus_retention: "60d"
    mon_system_prometheus_storage_size: "4Gi"
    mon_system_prometheus_spec:
      podMetadata:
        labels:
          app.kubernetes.io/name: prometheus
          app.kubernetes.io/instance: prometheus-instance
          app.kubernetes.io/version: "v3.7.2"
          app.kubernetes.io/component: server
          app.kubernetes.io/part-of: monitoring
          app.kubernetes.io/managed-by: Helm
      serviceAccountName: prometheus-instance
      automountServiceAccountToken: true
      # При апгрейде синхронизируй с label app.kubernetes.io/version выше + 6 hardcoded version labels в playbook-app/charts/mon-system/prometheus-operator/templates/prometheus-operator.yaml
      image: "quay.io/prometheus/prometheus:v3.7.2"
      imagePullPolicy: IfNotPresent
      version: "v3.7.2"
      replicas: "{{ mon_system_prometheus_replica_count }}"
      logLevel: info
      logFormat: json
      retention: "{{ mon_system_prometheus_retention }}"
      walCompression: true
      enableAdminAPI: false
      enableOTLPReceiver: false
      listenLocal: false
      hostNetwork: false
      portName: http-web
      externalUrl: "{{ mon_system_prometheus_external_url }}"
      routePrefix: "/"
      paused: false
      serviceMonitorSelector: {}
      serviceMonitorNamespaceSelector: {}
      podMonitorSelector: {}
      podMonitorNamespaceSelector: {}
      probeSelector: {}
      probeNamespaceSelector: {}
      ruleSelector: {}
      ruleNamespaceSelector: {}
      scrapeConfigSelector: {}
      scrapeConfigNamespaceSelector: {}
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: lnstr-major-local
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: "{{ mon_system_prometheus_storage_size }}"
      tsdb:
        outOfOrderTimeWindow: 0s
      securityContext:
        fsGroup: 2000
        runAsGroup: 2000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      tolerations: []
      nodeSelector:
        kubernetes.io/os: linux
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 2Gi
      alerting:
        alertmanagers:
          - namespace: mon-system
            name: alertmanager-instance
            port: http-web
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    mon_system_prometheus_extra_objects: []
    # Prometheus-phase kustomize patches (operator-side customization, default empty)
    mon_system_prometheus_kustomize_patches: []
    # Prometheus CR Helm values (Prometheus instance + RBAC + Service)
    mon_system_prometheus_helm_values:
      namespace: "{{ mon_system_namespace }}"
      prometheusSpec: "{{ mon_system_prometheus_spec }}"
      prometheus:
        port: "{{ mon_system_prometheus_port }}"
        reloaderPort: "{{ mon_system_prometheus_reloader_port }}"
      extraObjects: "{{ mon_system_prometheus_extra_objects }}"

    # --- PHASE: alertmanager ---
    mon_system_alertmanager_helm_timeout: "5m"
    mon_system_alertmanager_rollout_timeout: "300s"
    # Alertmanager CR spec — passed verbatim to monitoring.coreos.com/v1 Alertmanager
    # Alertmanager hot knobs (SCALE / capacity)
    mon_system_alertmanager_replica_count: 1
    mon_system_alertmanager_storage_size: "4Gi"
    mon_system_alertmanager_spec:
      podMetadata:
        labels:
          app.kubernetes.io/name: alertmanager
          app.kubernetes.io/instance: alertmanager-instance
          app.kubernetes.io/component: alertmanager
          app.kubernetes.io/part-of: monitoring
          app.kubernetes.io/managed-by: Helm
      # При апгрейде синхронизируй с 6 hardcoded version labels в playbook-app/charts/mon-system/prometheus-operator/templates/prometheus-operator.yaml
      image: "quay.io/prometheus/alertmanager:v0.28.1"
      imagePullPolicy: IfNotPresent
      version: "v0.28.1"
      replicas: "{{ mon_system_alertmanager_replica_count }}"
      logLevel: info
      logFormat: json
      portName: http-web
      externalUrl: "{{ mon_system_alertmanager_external_url }}"
      routePrefix: "/"
      paused: false
      alertmanagerConfiguration:
        name: alertmanager-root-config
      alertmanagerConfigSelector: {}
      alertmanagerConfigNamespaceSelector: {}
      alertmanagerConfigMatcherStrategy:
        type: "None"
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: lnstr-major-local
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: "{{ mon_system_alertmanager_storage_size }}"
      securityContext:
        fsGroup: 2000
        runAsGroup: 2000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      tolerations: []
      nodeSelector:
        kubernetes.io/os: linux
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
    # AlertmanagerConfig root spec (referenced via spec.alertmanagerConfiguration.name)
    mon_system_alertmanager_root_config_spec:
      route:
        receiver: "null"
        groupBy:
          - alertname
          - namespace
        groupWait: 30s
        groupInterval: 5m
        repeatInterval: 4h
      receivers:
        - name: "null"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    mon_system_alertmanager_extra_objects: []
    # Alertmanager-phase kustomize patches (operator-side customization, default empty)
    mon_system_alertmanager_kustomize_patches: []
    # Alertmanager CR Helm values (Alertmanager instance + root AlertmanagerConfig + Service)
    mon_system_alertmanager_helm_values:
      namespace: "{{ mon_system_namespace }}"
      alertmanagerSpec: "{{ mon_system_alertmanager_spec }}"
      alertmanagerRootConfigSpec: "{{ mon_system_alertmanager_root_config_spec }}"
      alertmanager:
        port: "{{ mon_system_alertmanager_port }}"
        meshTcpPort: "{{ mon_system_alertmanager_mesh_tcp_port }}"
        meshUdpPort: "{{ mon_system_alertmanager_mesh_udp_port }}"
      extraObjects: "{{ mon_system_alertmanager_extra_objects }}"

    # --- PHASE: node-exporter ---
    mon_system_node_exporter_helm_timeout: "3m"
    mon_system_node_exporter_rollout_timeout: "120s"
    mon_system_node_exporter_image: "quay.io/prometheus/node-exporter:v1.11.1"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    mon_system_node_exporter_extra_objects: []
    # Node-exporter-phase kustomize patches (operator-side customization, default empty)
    mon_system_node_exporter_kustomize_patches: []
    # node-exporter Helm values (DaemonSet + Service)
    mon_system_node_exporter_helm_values:
      namespace: "{{ mon_system_namespace }}"
      nodeExporter:
        image: "{{ mon_system_node_exporter_image }}"
        port: "{{ mon_system_node_exporter_port }}"
        args:
          - --path.procfs=/host/proc
          - --path.sysfs=/host/sys
          - --path.rootfs=/host/root
          - --path.udev.data=/host/root/run/udev/data
          - '--web.listen-address=0.0.0.0:9100'
          - '--collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)'
          - '--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs|erofs)$'
      tolerations:
        - operator: "Exists"
      nodeSelector:
        kubernetes.io/os: linux
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 200m
          memory: 128Mi
      extraObjects: "{{ mon_system_node_exporter_extra_objects }}"

    # --- PHASE: ksm ---
    mon_system_ksm_helm_timeout: "3m"
    mon_system_ksm_rollout_timeout: "60s"
    mon_system_ksm_image: "registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.18.0"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    mon_system_ksm_extra_objects: []
    # Ksm-phase kustomize patches (operator-side customization, default empty)
    mon_system_ksm_kustomize_patches: []
    # kube-state-metrics Helm values (Deployment + RBAC + Service)
    mon_system_ksm_helm_values:
      namespace: "{{ mon_system_namespace }}"
      ksm:
        image: "{{ mon_system_ksm_image }}"
        port: "{{ mon_system_ksm_port }}"
        args:
          - --port=8080
          - --resources=certificatesigningrequests,configmaps,cronjobs,daemonsets,deployments,endpoints,horizontalpodautoscalers,ingresses,jobs,leases,limitranges,mutatingwebhookconfigurations,namespaces,networkpolicies,nodes,persistentvolumeclaims,persistentvolumes,poddisruptionbudgets,pods,replicasets,replicationcontrollers,resourcequotas,secrets,services,statefulsets,storageclasses,validatingwebhookconfigurations,volumeattachments
      tolerations: []
      nodeSelector:
        kubernetes.io/os: linux
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
      extraObjects: "{{ mon_system_ksm_extra_objects }}"

    # --- PHASE: loki ---
    mon_system_loki_helm_timeout: "5m"
    mon_system_loki_rollout_timeout: "120s"
    mon_system_loki_image: "docker.io/grafana/loki:3.5.0"
    # --- Loki S3 object-store backend ---
    # Default — наш SeaweedFS (cross-ns NetworkPolicy Loki→seaweedfs ВСЕГДА создаётся
    # в pre-чарте; creds провижинятся через seaweedfs-install sync, loki opt-in).
    # Для внешнего S3 (cloud): задай endpoint ниже + положи creds в Vault вручную
    # (vault kv put) — egress на 443/80 (external API) уже разрешён NP allow-loki.
    mon_system_loki_s3_endpoint: "seaweedfs-s3.{{ seaweedfs_namespace }}.svc.{{ cluster_dns_domain }}:8333"
    mon_system_loki_s3_bucket: "loki-logs"
    mon_system_loki_s3_region: "us-east-1"
    mon_system_loki_s3_path_style: true
    mon_system_loki_s3_insecure: true
    # Vault field names (standardized identity-distribute Layer 3 keys)
    mon_system_loki_s3_secret_key_username: "username"
    mon_system_loki_s3_secret_key_access_key: "accessKey"
    mon_system_loki_s3_secret_key_secret_key: "secretKey"
    # emptyDir size cap for Loki local volume (WAL + index cache + compactor scratch)
    mon_system_loki_emptydir_size_limit: "4Gi"
    # Full loki-config.yaml as block scalar — override entire variable in
    # hosts-vars-override/mon-system.yaml to change any parameter. Jinja
    # substitutions: port, S3 endpoint/bucket/region/path-style/insecure
    # (S3 creds come via ${CUSTOM_LOKI_STORE_S3_ACCESS_KEY_ID}/${CUSTOM_LOKI_STORE_S3_SECRET_ACCESS_KEY} env at runtime).
    mon_system_loki_config_yaml: |
      auth_enabled: false

      server:
        http_listen_port: {{ mon_system_loki_port }}

      common:
        instance_addr: 127.0.0.1
        path_prefix: /loki
        storage:
          s3:
            endpoint: {{ mon_system_loki_s3_endpoint }}
            bucketnames: {{ mon_system_loki_s3_bucket }}
            region: {{ mon_system_loki_s3_region }}
            access_key_id: ${CUSTOM_LOKI_STORE_S3_ACCESS_KEY_ID}
            secret_access_key: ${CUSTOM_LOKI_STORE_S3_SECRET_ACCESS_KEY}
            s3forcepathstyle: {{ mon_system_loki_s3_path_style | lower }}
            insecure: {{ mon_system_loki_s3_insecure | lower }}
        replication_factor: 1
        ring:
          kvstore:
            store: inmemory

      schema_config:
        configs:
          - from: 2025-05-15
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: index_
              period: 24h

      compactor:
        working_directory: /loki/retention
        delete_request_store: s3
        compaction_interval: 10m
        retention_enabled: true
        retention_delete_delay: 2h
        retention_delete_worker_count: 100

      limits_config:
        retention_period: 744h
        max_line_size: 512KB
        ingestion_rate_mb: 30
        ingestion_burst_size_mb: 60

      analytics:
        reporting_enabled: false

    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    mon_system_loki_extra_objects: []
    # Loki-phase kustomize patches (operator-side customization, default empty)
    mon_system_loki_kustomize_patches: []
    # Loki Helm values (Deployment + PVC + ConfigMap + Service)
    mon_system_loki_helm_values:
      namespace: "{{ mon_system_namespace }}"
      loki:
        image: "{{ mon_system_loki_image }}"
        port: "{{ mon_system_loki_port }}"
        s3:
          secretName: "{{ mon_system_secret_loki_s3_creds.body.target.name }}"
          accessKeyIdKey: "{{ mon_system_loki_s3_secret_key_access_key }}"
          secretAccessKeyKey: "{{ mon_system_loki_s3_secret_key_secret_key }}"
      emptyDir:
        sizeLimit: "{{ mon_system_loki_emptydir_size_limit }}"
      config_yaml: "{{ mon_system_loki_config_yaml }}"
      tolerations: []
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "1"
          memory: "1Gi"
      extraObjects: "{{ mon_system_loki_extra_objects }}"

    # --- PHASE: vector ---
    mon_system_vector_helm_timeout: "5m"
    mon_system_vector_rollout_timeout: "180s"
    mon_system_vector_image: "docker.io/timberio/vector:0.50.0-debian"
    # Full vector-config.yaml as block scalar — override entire variable in
    # hosts-vars-override/mon-system.yaml to change any parameter.
    # Endpoint Loki resolved by Ansible: loki.{{ mon_system_namespace }}.svc.cluster.local:{{ mon_system_loki_port }}
    # — intra-namespace after consolidation, no cross-ns DNS needed.
    # Loki labels ({{ containerName }}, etc.) wrapped in {% raw %}{% endraw %} so
    # Ansible/Jinja2 leaves them as literals — Vector resolves them at runtime.
    mon_system_vector_config_yaml: |
      # Источник логов - Kubernetes pods
      sources:
        kubernetes_logs:
          type: kubernetes_logs
          # Vector автоматически добавляет metadata:
          # - .kubernetes.pod_name
          # - .kubernetes.namespace_name
          # - .kubernetes.pod_labels
          # - .kubernetes.container_name
          # - .kubernetes.pod_node_name
          auto_partial_merge: true

      transforms:
        # 1. Попытка распарсить JSON логи
        parse_json_logs:
          type: remap
          inputs:
            - kubernetes_logs
          source: |
            # Удаляем ANSI escape codes (цвета в терминале)
            .message = replace!(.message, r'\x1B\[([0-9]{1,2}(;[0-9]{1,2})?)?[m|K]', "")

            # Пытаемся распарсить JSON
            parsed, err = parse_json(.message)

            if err == null {
              # Успешно распарсили JSON
              .is_json = true
              .parsed_message = parsed

              # Извлекаем level из JSON если есть
              if exists(.parsed_message.level) {
                .level = downcase(string!(.parsed_message.level))
              } else {
                .level = "info"
              }

              # Извлекаем timestamp из JSON если есть
              if exists(.parsed_message.timestamp) {
                # Формат: 2024-04-27T18:34:45.249230292Z (ISO 8601 с наносекундами)
                ts, ts_err = parse_timestamp(.parsed_message.timestamp, format: "%+")
                if ts_err == null {
                  .timestamp = ts
                }
              }
            } else {
              # Не JSON - обычная строка
              .is_json = false
              .level = "info"
            }

            # Определяем containerName из Kubernetes metadata

            # Добавляем дополнительные labels для Loki
            .podName = .kubernetes.pod_name || "unknown"
            .namespace = .kubernetes.namespace_name || "default"
            .nodeName = .kubernetes.pod_node_name || "unknown"
            .containerName = .kubernetes.container_name || "unknown"

            # Извлекаем стандартные k8s labels (app.kubernetes.io/*)
            if exists(.kubernetes.pod_labels."app.kubernetes.io/name") {
              .name = .kubernetes.pod_labels."app.kubernetes.io/name"
            } else {
              .name = "unknown"
            }

            if exists(.kubernetes.pod_labels."app.kubernetes.io/instance") {
              .instance = .kubernetes.pod_labels."app.kubernetes.io/instance"
            } else {
              .instance = "unknown"
            }

            if exists(.kubernetes.pod_labels."app.kubernetes.io/component") {
              .component = .kubernetes.pod_labels."app.kubernetes.io/component"
            } else {
              .component = "unknown"
            }

            if exists(.kubernetes.pod_labels."app.kubernetes.io/part-of") {
              .partOf = .kubernetes.pod_labels."app.kubernetes.io/part-of"
            } else {
              .partOf = "unknown"
            }

        # 2. Форматирование финального сообщения
        format_message:
          type: remap
          inputs:
            - parse_json_logs
          source: |
            # Для JSON логов - убираем timestamp и level из message (чтобы не дублировать)
            if .is_json == true {
              # Удаляем поля timestamp и level из JSON строки
              .message = replace!(.message, r',\s*"timestamp"\s*:\s*"[^"]*"|"timestamp"\s*:\s*"[^"]*",?', "")
              .message = replace(.message, r',\s*"level"\s*:\s*"[^"]*"|"level"\s*:\s*"[^"]*",?', "")
            }
            # Для plain text логов - оставляем как есть

            # Удаляем временное поле
            del(.is_json)
            del(.parsed_message)

      sinks:
        loki_output:
          type: loki
          inputs:
            - format_message
          endpoint: "http://loki.{{ mon_system_namespace }}.svc.cluster.local:{{ mon_system_loki_port }}"
          compression: gzip
          remove_label_fields: true
          out_of_order_action: accept
          remove_timestamp: false
          labels:
            {% raw %}
            level: "{{ level }}"
            nodeName: "{{ nodeName }}"
            containerName: "{{ containerName }}"
            pod: "{{ podName }}"
            namespace: "{{ namespace }}"
            name: "{{ name }}"
            instance: "{{ instance }}"
            component: "{{ component }}"
            partOf: "{{ partOf }}"
            {% endraw %}

          healthcheck:
            enabled: true
          encoding:
            codec: text

    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    mon_system_vector_extra_objects: []
    # Vector-phase kustomize patches (operator-side customization, default empty)
    mon_system_vector_kustomize_patches: []
    # Vector Helm values (DaemonSet + RBAC + ConfigMap; no Service by design)
    mon_system_vector_helm_values:
      namespace: "{{ mon_system_namespace }}"
      vector:
        image: "{{ mon_system_vector_image }}"
        serviceAccount: "vector"
      config_yaml: "{{ mon_system_vector_config_yaml }}"
      tolerations:
        - operator: "Exists"
      nodeSelector: {}
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "1"
          memory: "1Gi"
      extraObjects: "{{ mon_system_vector_extra_objects }}"

    # --- PHASE: grafana-postgresql ---
    mon_system_grafana_postgresql_helm_timeout: "3m"
    mon_system_grafana_postgresql_rollout_timeout: "120s"
    mon_system_grafana_postgresql_image: "docker.io/postgres:16-alpine"
    mon_system_grafana_postgresql_storage_class: "lnstr-major-multi-sync"
    mon_system_grafana_postgresql_storage_size: "10Gi"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    mon_system_grafana_postgresql_extra_objects: []
    # grafana-postgresql phase kustomize patches (operator-side customization, default empty)
    mon_system_grafana_postgresql_kustomize_patches: []
    # PostgreSQL (backing Grafana) Helm values
    mon_system_grafana_postgresql_helm_values:
      namespace: "{{ mon_system_namespace }}"
      image: "{{ mon_system_grafana_postgresql_image }}"
      databaseName: "{{ mon_system_grafana_postgresql_database_name }}"
      username: "{{ mon_system_grafana_postgresql_username }}"
      port: "{{ mon_system_grafana_postgresql_port }}"
      storageClass: "{{ mon_system_grafana_postgresql_storage_class }}"
      storageSize: "{{ mon_system_grafana_postgresql_storage_size }}"
      credentials:
        secretName: "{{ mon_system_secret_grafana_postgresql_creds.body.target.name }}"
        usernameKey: "{{ mon_system_grafana_postgresql_secret_key_username }}"
        passwordKey: "{{ mon_system_grafana_postgresql_secret_key_password }}"
      tolerations: []
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      affinity: {}
      resources: {}
      extraObjects: "{{ mon_system_grafana_postgresql_extra_objects }}"

    # --- PHASE: grafana ---
    mon_system_grafana_helm_timeout: "3m"
    mon_system_grafana_rollout_timeout: "120s"
    mon_system_grafana_image: "docker.io/grafana/grafana:12.4.2"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    mon_system_grafana_extra_objects: []
    # Grafana-phase kustomize patches (operator-side customization, default empty)
    mon_system_grafana_kustomize_patches: []
    # Grafana Helm values (Deployment + PVC + Service)
    # adminSecret.name — K8s Secret created by ESO (mon-system/pre/), populated
    # from Vault path /mon-system/grafana/admin/creds with keys username + password
    mon_system_grafana_helm_values:
      namespace: "{{ mon_system_namespace }}"
      grafana:
        port: "{{ mon_system_grafana_port }}"
        image: "{{ mon_system_grafana_image }}"
        installPlugins: "grafana-piechart-panel"
        externalUrl: "{{ mon_system_grafana_external_url }}"
      adminSecret:
        name: "{{ mon_system_secret_grafana_admin_creds.body.target.name }}"
        usernameKey: "{{ mon_system_grafana_admin_secret_key_username }}"
        passwordKey: "{{ mon_system_grafana_admin_secret_key_password }}"
      database:
        type: "postgres"
        host: "mon-system-grafana-postgresql.{{ mon_system_namespace }}.svc.{{ cluster_dns_domain }}:{{ mon_system_grafana_postgresql_port }}"
        name: "{{ mon_system_grafana_postgresql_database_name }}"
        sslMode: "disable"
        maxOpenConns: 20
        maxIdleConns: 10
        connMaxLifetime: "30m"
        credentialsSecretName: "{{ mon_system_secret_grafana_postgresql_creds.body.target.name }}"
        usernameKey: "{{ mon_system_grafana_postgresql_secret_key_username }}"
        passwordKey: "{{ mon_system_grafana_postgresql_secret_key_password }}"
      tolerations: []
      nodeSelector:
        node-role.kubernetes.io/worker: ""
      resources: {}
      extraObjects: "{{ mon_system_grafana_extra_objects }}"

    # --- PHASE: post ---
    mon_system_post_helm_timeout: "3m"
    # Headless Services in kube-system for system-component scraping
    # (kube-controller-manager, kube-etcd, kube-scheduler, coredns)
    mon_system_prometheus_system_services:
      - name: kube-controller-manager
        namespace: kube-system
        labels:
          app.kubernetes.io/name: kube-controller-manager
        clusterIP: None
        podSelector:
          component: kube-controller-manager
        ports:
          - name: https-metrics
            port: 10257
            targetPort: 10257
            protocol: TCP

      - name: kube-etcd
        namespace: kube-system
        labels:
          app.kubernetes.io/name: kube-etcd
        clusterIP: None
        podSelector:
          component: etcd
        ports:
          - name: http-metrics
            port: 2381
            targetPort: 2381
            protocol: TCP

      - name: kube-scheduler
        namespace: kube-system
        labels:
          app.kubernetes.io/name: kube-scheduler
        clusterIP: None
        podSelector:
          component: kube-scheduler
        ports:
          - name: https-metrics
            port: 10259
            targetPort: 10259
            protocol: TCP

      - name: coredns
        namespace: kube-system
        labels:
          app.kubernetes.io/name: coredns
        clusterIP: None
        podSelector:
          k8s-app: kube-dns
        ports:
          - name: http-metrics
            port: 9153
            targetPort: 9153
            protocol: TCP

    # ServiceMonitors for system components (apiserver, kubelet, etcd,
    # controller-manager, scheduler, coredns) — created in mon-system namespace
    mon_system_prometheus_system_service_monitors:
      - name: kube-apiserver
        namespace: "{{ mon_system_namespace }}"
        jobLabel: kube-apiserver
        namespaceSelector:
          matchNames: [default]
        selector:
          matchLabels:
            component: apiserver
            provider: kubernetes
        endpoints:
          - port: https
            scheme: https
            bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
            tlsConfig:
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              serverName: kubernetes
              insecureSkipVerify: false

      - name: kube-controller-manager
        namespace: "{{ mon_system_namespace }}"
        jobLabel: kube-controller-manager
        namespaceSelector:
          matchNames: [kube-system]
        selector:
          matchLabels:
            app.kubernetes.io/name: kube-controller-manager
        endpoints:
          - port: https-metrics
            scheme: https
            bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
            tlsConfig:
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              insecureSkipVerify: true

      - name: kube-etcd
        namespace: "{{ mon_system_namespace }}"
        jobLabel: kube-etcd
        namespaceSelector:
          matchNames: [kube-system]
        selector:
          matchLabels:
            app.kubernetes.io/name: kube-etcd
        endpoints:
          - port: http-metrics
            scheme: http

      - name: kube-scheduler
        namespace: "{{ mon_system_namespace }}"
        jobLabel: kube-scheduler
        namespaceSelector:
          matchNames: [kube-system]
        selector:
          matchLabels:
            app.kubernetes.io/name: kube-scheduler
        endpoints:
          - port: https-metrics
            scheme: https
            bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
            tlsConfig:
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              insecureSkipVerify: true

      - name: coredns
        namespace: "{{ mon_system_namespace }}"
        jobLabel: coredns
        namespaceSelector:
          matchNames: [kube-system]
        selector:
          matchLabels:
            app.kubernetes.io/name: coredns
        endpoints:
          - port: http-metrics
            scheme: http

      - name: kubelet
        namespace: "{{ mon_system_namespace }}"
        jobLabel: k8s-app
        namespaceSelector:
          matchNames: [kube-system]
        selector:
          matchLabels:
            app.kubernetes.io/name: kubelet
            k8s-app: kubelet
        endpoints:
          - port: https-metrics
            scheme: https
            bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
            honorLabels: true
            tlsConfig:
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              insecureSkipVerify: true
          - port: https-metrics
            scheme: https
            path: /metrics/cadvisor
            bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
            honorLabels: true
            tlsConfig:
              caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              insecureSkipVerify: true

    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    mon_system_post_extra_objects: []
    # Post-phase kustomize patches (operator-side customization, default empty)
    mon_system_post_kustomize_patches: []
    # Post-phase Helm values (Ingresses + Certificates + ServiceMonitors + system-*)
    mon_system_post_helm_values:
      namespace: "{{ mon_system_namespace }}"
      issuer: "{{ mon_system_cert_manager_issuer }}"
      grafanaIngressConfig: "{{ mon_system_grafana_ingress_config }}"
      prometheusIngressConfig: "{{ mon_system_prometheus_ingress_config }}"
      alertmanagerIngressConfig: "{{ mon_system_alertmanager_ingress_config }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        entryPoints:
          web: "{{ traefik_web_entrypoint }}"
          websecure: "{{ traefik_websecure_entrypoint }}"
      prometheus_operator:
        enabled: "{{ mon_system_prometheus_operator_enabled }}"
      grafana:
        enabled: "{{ mon_system_grafana_enabled }}"
        port: "{{ mon_system_grafana_port }}"
      prometheus:
        enabled: "{{ mon_system_prometheus_enabled }}"
        port: "{{ mon_system_prometheus_port }}"
      alertmanager:
        enabled: "{{ mon_system_alertmanager_enabled }}"
        port: "{{ mon_system_alertmanager_port }}"
      loki:
        enabled: "{{ mon_system_loki_enabled }}"
        serviceMonitor:
          enabled: "{{ mon_system_loki_service_monitor_enabled }}"
          interval: "30s"
          scrapeTimeout: "15s"
          labels: {}
      ksm:
        enabled: "{{ mon_system_ksm_enabled }}"
        serviceMonitor:
          enabled: "{{ mon_system_ksm_service_monitor_enabled }}"
          interval: "30s"
          scrapeTimeout: "15s"
          labels: {}
      nodeExporter:
        enabled: "{{ mon_system_node_exporter_enabled }}"
        serviceMonitor:
          enabled: "{{ mon_system_node_exporter_service_monitor_enabled }}"
          interval: "30s"
          scrapeTimeout: "15s"
          labels: {}
      systemServices: "{{ mon_system_prometheus_system_services }}"
      systemServiceMonitors: "{{ mon_system_prometheus_system_service_monitors }}"
      extraObjects: "{{ mon_system_post_extra_objects }}"
