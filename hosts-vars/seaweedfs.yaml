all:
  vars:
    seaweedfs_namespace: "seaweedfs"

    # Domain'ы — placeholder values в hosts-vars/, реальные в hosts-vars-override/
    # S3 endpoint + три раздельных UI-поддомена (master/filer/admin), без path-prefix.
    seaweedfs_s3_domain: "s3-k8s-v2.drawapp.ru"
    seaweedfs_master_ui_domain: "s3-master-k8s-v2.drawapp.ru"
    seaweedfs_filer_ui_domain: "s3-filer-k8s-v2.drawapp.ru"
    seaweedfs_admin_ui_domain: "s3-admin-k8s-v2.drawapp.ru"

    seaweedfs_s3_tls_secret_name: "cert-seaweedfs-s3"
    seaweedfs_master_ui_tls_secret_name: "cert-seaweedfs-master"
    seaweedfs_filer_ui_tls_secret_name: "cert-seaweedfs-filer"
    seaweedfs_admin_ui_tls_secret_name: "cert-seaweedfs-admin"

    seaweedfs_ingress_class_name: "traefik-lb"

    # VPN-only middleware: в тестовой фазе всё открыто наружу (false). Для prod-харденинга
    # admin/master/filer UI можно закрыть в VPN правкой соответствующего флага.
    seaweedfs_s3_vpn_only_enabled: false
    seaweedfs_master_ui_vpn_only_enabled: false
    seaweedfs_filer_ui_vpn_only_enabled: false
    seaweedfs_admin_ui_vpn_only_enabled: false

    # cert-manager Issuer (per-component, namespaced) — единый объект {enabled, body}.
    # enabled: true  → Issuer + solver-NetworkPolicies (pre); Certificate доступен (post).
    # enabled: false → ни Issuer, ни solver-NP, ни Certificate.
    seaweedfs_cert_manager_issuer:
      enabled: true
      body:
        name: "seaweedfs-acme"
        spec:
          acme:
            server: "https://acme-v02.api.letsencrypt.org/directory"
            email: "some-email-123@gmail.com"
            privateKeySecretRef:
              name: "seaweedfs-acme-account-key"
            solvers:
              - http01:
                  ingress:
                    ingressClassName: "traefik-lb"
                    ingressTemplate:
                      metadata:
                        annotations:
                          "kubernetes.io/ingress.class": "traefik-lb"
                          "traefik.ingress.kubernetes.io/router.entrypoints": "web"
                    podTemplate:
                      metadata:
                        labels:
                          app.kubernetes.io/name: acme-solver
                          app.kubernetes.io/instance: traefik-lb
                          app.kubernetes.io/component: acme-http01-solver
                          app.kubernetes.io/managed-by: cert-manager

    # Ingress config 1: S3 endpoint (без VPN-only) — 1 domain === 1 ingress_config
    seaweedfs_s3_ingress_config:
      domain: "{{ seaweedfs_s3_domain }}"
      tlsSecretName: "{{ seaweedfs_s3_tls_secret_name }}"
      ingress:
        enabled: true
        ingressClass: "{{ seaweedfs_ingress_class_name }}"
        tlsEnabled: true
        vpnOnlyEnabled: "{{ seaweedfs_s3_vpn_only_enabled }}"
        vpnIngressRouteMiddlewares: "{{ vpn_ingress_route_middlewares }}"
      certificate:
        enabled: true

    # Ingress config 2: Master UI — отдельный поддомен (только Host, без path-prefix)
    seaweedfs_master_ui_ingress_config:
      domain: "{{ seaweedfs_master_ui_domain }}"
      tlsSecretName: "{{ seaweedfs_master_ui_tls_secret_name }}"
      ingress:
        enabled: true
        ingressClass: "{{ seaweedfs_ingress_class_name }}"
        tlsEnabled: true
        vpnOnlyEnabled: "{{ seaweedfs_master_ui_vpn_only_enabled }}"
        vpnIngressRouteMiddlewares: "{{ vpn_ingress_route_middlewares }}"
      certificate:
        enabled: true

    # Ingress config 3: Filer UI — отдельный поддомен (только Host, без path-prefix)
    seaweedfs_filer_ui_ingress_config:
      domain: "{{ seaweedfs_filer_ui_domain }}"
      tlsSecretName: "{{ seaweedfs_filer_ui_tls_secret_name }}"
      ingress:
        enabled: true
        ingressClass: "{{ seaweedfs_ingress_class_name }}"
        tlsEnabled: true
        vpnOnlyEnabled: "{{ seaweedfs_filer_ui_vpn_only_enabled }}"
        vpnIngressRouteMiddlewares: "{{ vpn_ingress_route_middlewares }}"
      certificate:
        enabled: true

    # Ingress config 4: Admin component UI — отдельный поддомен (только Host, без path-prefix)
    seaweedfs_admin_ui_ingress_config:
      domain: "{{ seaweedfs_admin_ui_domain }}"
      tlsSecretName: "{{ seaweedfs_admin_ui_tls_secret_name }}"
      ingress:
        enabled: true
        ingressClass: "{{ seaweedfs_ingress_class_name }}"
        tlsEnabled: true
        vpnOnlyEnabled: "{{ seaweedfs_admin_ui_vpn_only_enabled }}"
        vpnIngressRouteMiddlewares: "{{ vpn_ingress_route_middlewares }}"
      certificate:
        enabled: true

    # PostgreSQL creds field names (потребляются через ESO-materialised Secret)
    seaweedfs_postgresql_username: "seaweedfs"
    seaweedfs_postgresql_database_name: "seaweedfs_filer"
    seaweedfs_postgresql_secret_key_username: "username"
    seaweedfs_postgresql_secret_key_password: "password"

    # Admin UI creds: login-значение + field names (K8s Secret keys = Vault поля).
    # Потребляются: admin.secret.{userKey,pwKey} (helm) + seaweedfs-install.yaml seed (login).
    seaweedfs_admin_ui_username: "admin"
    seaweedfs_admin_ui_secret_key_user: "adminUser"
    seaweedfs_admin_ui_secret_key_password: "adminPassword"


    # === SECTION 2: ESO ===
    # ---------
    # ESO integration: Vault → K8s Secrets
    # Базовые секреты (нужны для запуска) — отдельные named-переменные с полным dict-объектом.
    # eso_vault_integration_seaweedfs_secrets — массив ссылок на named-переменные
    # (chart eso-external-secret.yaml рендерит .Values.eso.secrets единообразно
    # как для base-ссылок, так и для _extra dict'ов).
    # _extra — расширение оператора через hosts-vars-override/.
    # ---------
    eso_vault_integration_seaweedfs:
      sa_name: "eso-main"
      role_name: "seaweedfs.eso-main"
      secret_store_name: "eso-main.vault"
      kv_engine_path: "eso-secret"

    # Vault field name for the bootstrap empty-config (seaweedfs_secret_s3_bootstrap, path
    # /seaweedfs/s3-config/bootstrap). Used by seaweedfs-install.yaml bootstrap-get/put.
    # (v17: identities live only in the filer — read/written via weed shell s3.configure;
    # there is no Vault identity key-store anymore.)
    seaweedfs_s3_bootstrap_vault_field: "config"

    # Named secret 1: PostgreSQL creds (simple dataFrom.extract)
    seaweedfs_secret_postgresql_creds:
      external_secret_name: "eso-seaweedfs-postgresql-creds"
      vault_path: "/seaweedfs/postgresql/creds"
      body:
        target:
          name: "eso-seaweedfs-postgresql-creds"
        dataFrom:
          - extract:
              key: "{{ eso_vault_integration_seaweedfs.kv_engine_path }}/data/seaweedfs/postgresql/creds"

    # Named secret 2: S3 bootstrap config (ESO template — single Vault field 'config' со строкой
    # JSON, рендерит K8s Secret с key 'seaweedfs_s3_config' для upstream chart's existingConfigSecret).
    # Содержимое — empty static config '{"identities":[]}': форсит S3-gateway в filer-driven
    # (Replace) режим (staticIdentityNames=0 → hasStaticConfig=false), identity/policy приходят
    # в живой filer через weed shell (НЕ static mount). Vault path /seaweedfs/s3-config/bootstrap;
    # seed (seed-if-not-exists) от seaweedfs-install.yaml (--tags install).
    seaweedfs_secret_s3_bootstrap:
      external_secret_name: "eso-seaweedfs-s3-bootstrap"
      vault_path: "/seaweedfs/s3-config/bootstrap"
      body:
        target:
          name: "eso-seaweedfs-s3-bootstrap"
          template:
            engineVersion: v2
            data:
              # K8s Secret key — upstream chart 4.31.0 ожидает 'seaweedfs_s3_config'
              # (см. sources/seaweedfs/k8s/charts/seaweedfs/values.yaml line ~958).
              # Inline-quoted form: {% endraw %} БЕЗ +% (см. .claude/rules/secrets-and-eso.md §2.4).
              seaweedfs_s3_config: '{% raw %}{{ .config }}{% endraw %}'
        data:
          - secretKey: config
            remoteRef:
              key: "{{ eso_vault_integration_seaweedfs.kv_engine_path }}/data/seaweedfs/s3-config/bootstrap"
              property: config

    # Named secret 3: Admin UI creds (simple dataFrom.extract — adminUser + adminPassword).
    # Vault поля 'adminUser'/'adminPassword' → K8s Secret eso-seaweedfs-admin-ui-creds с теми же
    # ключами; чарт admin.secret.{userKey,pwKey} указывает на них. Seed — seaweedfs-install.yaml.
    seaweedfs_secret_admin_ui_creds:
      external_secret_name: "eso-seaweedfs-admin-ui-creds"
      vault_path: "/seaweedfs/admin-ui/creds"
      body:
        target:
          name: "eso-seaweedfs-admin-ui-creds"
        dataFrom:
          - extract:
              key: "{{ eso_vault_integration_seaweedfs.kv_engine_path }}/data/seaweedfs/admin-ui/creds"

    eso_vault_integration_seaweedfs_secrets:
      - "{{ seaweedfs_secret_postgresql_creds }}"
      - "{{ seaweedfs_secret_s3_bootstrap }}"
      - "{{ seaweedfs_secret_admin_ui_creds }}"

    eso_vault_integration_seaweedfs_secrets_extra: []

    # === SECTION 3 ===
    # --- PHASE: pre ---
    seaweedfs_pre_helm_timeout: "5m"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    seaweedfs_pre_extra_objects: []
    # Pre-phase kustomize patches (operator-side customization, default empty)
    seaweedfs_pre_kustomize_patches: []
    # Pre-phase values (ESO Resources + NetworkPolicies chart)
    seaweedfs_pre_helm_values:
      namespace: "{{ seaweedfs_namespace }}"
      externalSecrets:
        namespace: "{{ external_secrets_namespace }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        instanceName: "traefik-{{ traefik_namespace }}"
      eso:
        vaultServerUrl: "{{ vault_internal_url }}"
        saName: "{{ eso_vault_integration_seaweedfs.sa_name }}"
        roleName: "{{ eso_vault_integration_seaweedfs.role_name }}"
        secretStoreName: "{{ eso_vault_integration_seaweedfs.secret_store_name }}"
        kvEnginePath: "{{ eso_vault_integration_seaweedfs.kv_engine_path }}"
        secrets: "{{ eso_vault_integration_seaweedfs_secrets + (eso_vault_integration_seaweedfs_secrets_extra | default([])) }}"
      esoResourcesConfig:
        secretStoreRefreshInterval: "{{ eso_resources_config.secret_store_refresh_interval }}"
        externalSecretRefreshInterval: "{{ eso_resources_config.external_secret_refresh_interval }}"
        externalSecretRefreshPolicy: "{{ eso_resources_config.external_secret_refresh_policy }}"
      issuer: "{{ seaweedfs_cert_manager_issuer }}"
      extraObjects: "{{ seaweedfs_pre_extra_objects }}"

    # --- PHASE: postgresql ---
    seaweedfs_postgresql_helm_timeout: "5m"
    seaweedfs_postgresql_rollout_timeout: "300s"
    # PostgreSQL image (handwritten chart — full URI:tag).
    # Для AirGap оператор переопределяет в hosts-vars-override/seaweedfs.yaml.
    seaweedfs_postgresql_image: "docker.io/postgres:16-alpine"
    seaweedfs_postgresql_storage_class: "lnstr-major-multi-sync"
    seaweedfs_postgresql_storage_size: "2Gi"
    # Filer metadata schema (apply via kubectl exec после postgres rollout, ДО filer start).
    # Bootstrap SQL — официальная docs sources/seaweedfs/weed/filer/postgres/README.txt.
    # CREATE TABLE IF NOT EXISTS — idempotent (no-op на existing table).
    # Single-line SQL (psql -c принимает single-line; multi-line через -f /tmp/file.sql).
    seaweedfs_postgresql_filemeta_schema_sql: >-
      CREATE TABLE IF NOT EXISTS filemeta (
        dirhash BIGINT,
        name VARCHAR(65535),
        directory VARCHAR(65535),
        meta bytea,
        PRIMARY KEY (dirhash, name)
      );
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    seaweedfs_postgresql_extra_objects: []
    # Postgresql-phase kustomize patches (operator-side customization, default empty)
    seaweedfs_postgresql_kustomize_patches: []
    # PostgreSQL sub-release values
    # secretName берётся из named-переменной seaweedfs_secret_postgresql_creds.body.target.name
    seaweedfs_postgresql_helm_values:
      namespace: "{{ seaweedfs_namespace }}"
      databaseName: "{{ seaweedfs_postgresql_database_name }}"
      image: "{{ seaweedfs_postgresql_image }}"
      storageClass: "{{ seaweedfs_postgresql_storage_class }}"
      storageSize: "{{ seaweedfs_postgresql_storage_size }}"
      credentials:
        secretName: "{{ seaweedfs_secret_postgresql_creds.body.target.name }}"
        usernameKey: "{{ seaweedfs_postgresql_secret_key_username }}"
        passwordKey: "{{ seaweedfs_postgresql_secret_key_password }}"
      extraObjects: "{{ seaweedfs_postgresql_extra_objects }}"

    # --- PHASE: install ---
    seaweedfs_install_helm_timeout: "10m"
    seaweedfs_install_rollout_timeout: "600s"
    # Helm repository — источник chart (переопределить в hosts-vars-override/ для airgap)
    seaweedfs_helm_is_oci: false
    seaweedfs_helm_url: "https://seaweedfs.github.io/seaweedfs/helm"
    seaweedfs_helm_repo_name: "seaweedfs"
    seaweedfs_helm_chart_name: "seaweedfs"
    seaweedfs_helm_chart_version: "4.31.0"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    seaweedfs_install_extra_objects: []
    # Install-phase kustomize patches (operator-side customization, default empty)
    seaweedfs_install_kustomize_patches: []
    # Helm chart values — структура соответствует upstream chart 4.31.0
    seaweedfs_helm_values:
      # Включить upstream Prometheus ServiceMonitor для всех компонентов
      # (master/volume/filer/s3/worker/admin). gatewayHost остаётся null → pull-only.
      global:
        seaweedfs:
          monitoring:
            enabled: true
      master:
        enabled: true
        replicas: 1
        # PVC для Raft state (1Gi достаточно для метаданных мастера)
        data:
          type: "persistentVolumeClaim"
          size: "1Gi"
          storageClass: "lnstr-major-local"
        # Логи в stdout/stderr (chart emits -logtostderr=true когда logs.type не set)
        logs: {}
        # Размер одного volume file в MB. По достижению — volume автоматически
        # seal'ится в read-only, дальнейшие writes идут в новый volume.
        # Cealed volumes становятся eligible для EC encoding через weed shell.
        # Маленькие volumes (1 GB) — низкий metadata overhead на master'е,
        # быстрая fill → быстрая EC eligibility, быстрый rebalance при failover.
        # Большие volumes (30 GB — weed binary default) — меньше metadata,
        # дольше до EC encoding. SeaweedFS chart 4.31.0 default = 1000 (1 GB).
        volumeSizeLimitMB: 200
        # defaultReplication "000" — без репликации по умолчанию; бакеты задают свою
        # replication сами через fs.configure (Phase C2). Default — fallback для non-bucket writes.
        defaultReplication: "000"

      # Singular volume отключён — используем volumes: (plural) для тир-размещения.
      # Chart мёрджит singular в named-группы (mergeOverwrite deepCopy volume → group),
      # поэтому держим singular минимальным; каждая группа специфицирует всё полностью.
      volume:
        enabled: false
      # Тир-группы volume-серверов. rack-метка = тир + номер физ. rack (managers-1/workers-1;
      # в одном DC физически может быть несколько rack), потребляется bucket-схемой
      # (hosts-vars/seaweedfs-sync.yaml: bucket.rack → fs.configure -rack).
      # dataCenter 'dc-1' (одно-DC). replication '001' держит реплики в том же rack (00Z).
      # storageClass *-local (НЕ *-multi-sync) — реплику делает SeaweedFS, не LINSTOR. maxVolumes:0 = auto-size.
      volumes:
        # 3 control-plane (диск 100GB, делят с OS/etcd/containerd/LINSTOR/Vault).
        # rack 'managers-1' в DC 'dc-1' (имя группы кодирует rack+DC).
        managers-1-dc-1:
          enabled: true
          replicas: 1
          dataCenter: "dc-1"
          rack: "managers-1"
          dataDirs:
            - name: data1
              type: "persistentVolumeClaim"
              size: "4Gi"
              storageClass: "lnstr-manager-local"
              maxVolumes: 0
          logs: {}
          nodeSelector: |
            node-role.kubernetes.io/control-plane: ""
          tolerations: |
            - operator: Exists
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
        # 5 worker (диск 300GB).
        # rack 'workers-1' в DC 'dc-1'.
        workers-1-dc-1:
          enabled: true
          replicas: 2
          dataCenter: "dc-1"
          rack: "workers-1"
          dataDirs:
            - name: data1
              type: "persistentVolumeClaim"
              size: "4Gi"
              storageClass: "lnstr-worker-local"
              maxVolumes: 0
          logs: {}
          nodeSelector: |
            node-role.kubernetes.io/worker: ""

      filer:
        enabled: true
        replicas: 1
        # Логи в stdout/stderr (chart emits -logtostderr=true когда logs.type не set)
        logs: {}
        # PostgreSQL backend через env vars — отключаем leveldb, включаем postgres
        extraEnvironmentVars:
          WEED_LEVELDB2_ENABLED: "false"
          WEED_POSTGRES_ENABLED: "true"
          WEED_POSTGRES_HOSTNAME: "seaweedfs-postgresql"
          WEED_POSTGRES_PORT: "5432"
          WEED_POSTGRES_DATABASE: "{{ seaweedfs_postgresql_database_name }}"
          WEED_POSTGRES_CONNECTION_MAX_IDLE: "5"
          WEED_POSTGRES_CONNECTION_MAX_OPEN: "75"
          WEED_POSTGRES_CONNECTION_MAX_LIFETIME_SECONDS: "600"
          WEED_FILER_BUCKETS_FOLDER: "/buckets"
        # Credentials из ESO-materialised Secret eso-seaweedfs-postgresql-creds
        secretExtraEnvironmentVars:
          WEED_POSTGRES_USERNAME:
            secretKeyRef:
              name: "{{ seaweedfs_secret_postgresql_creds.body.target.name }}"
              key: "{{ seaweedfs_postgresql_secret_key_username }}"
          WEED_POSTGRES_PASSWORD:
            secretKeyRef:
              name: "{{ seaweedfs_secret_postgresql_creds.body.target.name }}"
              key: "{{ seaweedfs_postgresql_secret_key_password }}"

      s3:
        enabled: true
        replicas: 3
        # HA: 3 replicas + Kubernetes Deployment default RollingUpdate strategy.
        # IAM auth: filer-driven (v14). existingConfigSecret указывает на empty-config
        # (eso-seaweedfs-s3-bootstrap, '{"identities":[]}') — форсит S3-gateway в Replace-режим
        # (staticIdentityNames=0 → hasStaticConfig=false → чистый filer-driven, без anvAdmin/anvReadOnly).
        # Identities/policies применяются в живой filer через weed shell (policy-sync/user-sync),
        # live-reload подхватывает без рестарта.
        enableAuth: true
        existingConfigSecret: "{{ seaweedfs_secret_s3_bootstrap.body.target.name }}"

      # Admin компонент (StatefulSet) — панель управления + координатор worker'ов.
      admin:
        enabled: true
        replicas: 1
        # Креды admin UI — через ESO (existingSecret)
        secret:
          existingSecret: "{{ seaweedfs_secret_admin_ui_creds.body.target.name }}"
          userKey: "{{ seaweedfs_admin_ui_secret_key_user }}"
          pwKey: "{{ seaweedfs_admin_ui_secret_key_password }}"
        # Persistence: admin хранит session keys + maintenance/task config + историю задач
        data:
          type: "persistentVolumeClaim"
          size: "2Gi"
          storageClass: "lnstr-major-multi-sync"
        # Логи в stdout (logs.type="" → -logtostderr=true): kubectl logs + Vector→Loki.
        logs:
          type: ""

      # Worker компонент (Deployment) — background-job runner (vacuum/balance/EC/...).
      # Требует admin (чарт hard-fail'ит без admin.enabled); adminServer не задаём —
      # чарт авто-указывает на in-cluster admin gRPC.
      worker:
        enabled: true
        replicas: 1
        # jobType "all" — default (vacuum/volume_balance/ec_balance/admin_script)
        # + heavy (erasure_coding/iceberg_maintenance). Фиксируем явно (= upstream default).
        jobType: "all"
        # Логи в stdout (logs.type="" → -logtostderr=true): kubectl logs + Vector→Loki.
        logs:
          type: ""

    # --- PHASE: post ---
    seaweedfs_post_helm_timeout: "5m"
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    seaweedfs_post_extra_objects: []
    # Post-phase kustomize patches (operator-side customization, default empty)
    seaweedfs_post_kustomize_patches: []
    # Post-phase values (Ingress chart)
    seaweedfs_post_helm_values:
      namespace: "{{ seaweedfs_namespace }}"
      issuer: "{{ seaweedfs_cert_manager_issuer }}"
      s3IngressConfig: "{{ seaweedfs_s3_ingress_config }}"
      masterIngressConfig: "{{ seaweedfs_master_ui_ingress_config }}"
      filerIngressConfig: "{{ seaweedfs_filer_ui_ingress_config }}"
      adminIngressConfig: "{{ seaweedfs_admin_ui_ingress_config }}"
      traefik:
        namespace: "{{ traefik_namespace }}"
        entryPoints:
          web: "{{ traefik_web_entrypoint }}"
          websecure: "{{ traefik_websecure_entrypoint }}"
      extraObjects: "{{ seaweedfs_post_extra_objects }}"
