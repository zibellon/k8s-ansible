all:
  vars:
    stakater_reloader_namespace: "stakater-reloader"
    # Helm timeouts
    stakater_reloader_pre_helm_timeout: "5m"
    # ---
    # extraObjects (operator-side, default empty) — добавление произвольных K8s resources
    stakater_reloader_pre_extra_objects: []
    # Pre-phase kustomize patches (operator-side customization, default empty)
    stakater_reloader_pre_kustomize_patches: []
    # Pre-phase values (NetworkPolicies chart)
    stakater_reloader_pre_helm_values:
      namespace: "{{ stakater_reloader_namespace }}"
      extraObjects: "{{ stakater_reloader_pre_extra_objects }}"
    # ---
    stakater_reloader_install_helm_timeout: "5m"
    stakater_reloader_rollout_timeout: "120s"
    # Helm repository - источник chart (переопределить в hosts-vars-override/ для airgap)
    stakater_reloader_helm_is_oci: false
    stakater_reloader_helm_url: "https://stakater.github.io/stakater-charts"
    stakater_reloader_helm_repo_name: "stakater"
    stakater_reloader_helm_chart_name: "reloader"
    stakater_reloader_helm_chart_version: "2.2.12"
    # Replica count (SCALE).
    stakater_reloader_helm_values_replica_count: 1
    # ---------
    # Helm chart values (nested under upstream chart's top-level `reloader:` key)
    stakater_reloader_helm_values:
      # nameOverride + fullnameOverride => все ресурсы и labels = "stakater-reloader"
      nameOverride: stakater-reloader
      fullnameOverride: stakater-reloader
      reloader:
        # OFF by default: Reloader reloads NOTHING unless a workload carries an
        # explicit opt-in annotation. Do NOT set autoReloadAll: true.
        autoReloadAll: false
        watchGlobally: true
        reloadOnCreate: false
        # annotations strategy: patches pod-template annotation (GitOps/ArgoCD-friendly)
        reloadStrategy: annotations
        rbac:
          enabled: true
        serviceAccount:
          create: true
        deployment:
          replicas: "{{ stakater_reloader_helm_values_replica_count }}"
          tolerations: []
          nodeSelector: {}
          affinity: {}
          resources: {}
        # Prometheus scrape via chart's PodMonitor (scrapes pod :9090/metrics directly)
        podMonitor:
          enabled: true
        serviceMonitor:
          enabled: false
        # NetworkPolicy is managed by stakater-reloader/pre chart, not the upstream chart
        netpol:
          enabled: false
