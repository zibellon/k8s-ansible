---
# =============================================================================
# Layer 2: render upstream chart values + helm template + kubeconform
# =============================================================================
# Usage (через `make test-helm`; вручную для отладки):
#   ansible-playbook -i hosts-vars/ -i hosts-vars-override/ \
#     tests/helm-validate.yaml
#
# Tests upstream Helm releases only (12 charts: cilium, cert-manager,
# external-secrets, haproxy-ingress, longhorn, teleport, traefik,
# gitlab-runner, metrics-server, zitadel, gitlab, vault-operator).
# Local wrappers (pre/, post/, gitlab/postgresql, etc.) — out of scope.
# =============================================================================

- name: "[helm-test] Validate upstream charts (render + helm template + kubeconform)"
  hosts: localhost
  gather_facts: false
  connection: local

  vars:
    rendered_dir: /tmp/values-rendered

    upstream_charts:
      # Naming: name = release name (used in helm template).
      # All params come from hosts-vars/<c>.yaml — no hardcode here.

      - name: cilium
        helm_chart_name: "{{ cilium_helm_chart_name }}"
        helm_repo_name: "{{ cilium_helm_repo_name }}"
        helm_repo_url: "{{ cilium_helm_repo_url }}"
        chart_version: "{{ cilium_chart_version }}"
        namespace: "{{ cilium_namespace }}"
        values: "{{ cilium_helm_values }}"

      - name: cert-manager
        helm_chart_name: "{{ cert_manager_helm_chart_name }}"
        helm_repo_name: "{{ cert_manager_helm_repo_name }}"
        helm_repo_url: "{{ cert_manager_helm_repo_url }}"
        chart_version: "v{{ cert_manager_chart_version }}"
        namespace: "{{ cert_manager_namespace }}"
        values: "{{ cert_manager_helm_values }}"

      - name: external-secrets
        helm_chart_name: "{{ external_secrets_helm_chart_name }}"
        helm_repo_name: "{{ external_secrets_helm_repo_name }}"
        helm_repo_url: "{{ external_secrets_helm_repo_url }}"
        chart_version: "{{ external_secrets_chart_version }}"
        namespace: "{{ external_secrets_namespace }}"
        values: "{{ external_secrets_helm_values }}"

      - name: haproxy-ingress
        helm_chart_name: "{{ haproxy_helm_chart_name }}"
        helm_repo_name: "{{ haproxy_helm_repo_name }}"
        helm_repo_url: "{{ haproxy_helm_repo_url }}"
        chart_version: "{{ haproxy_chart_version }}"
        namespace: "{{ haproxy_namespace }}"
        values: "{{ haproxy_helm_values }}"

      - name: longhorn
        helm_chart_name: "{{ longhorn_helm_chart_name }}"
        helm_repo_name: "{{ longhorn_helm_repo_name }}"
        helm_repo_url: "{{ longhorn_helm_repo_url }}"
        chart_version: "{{ longhorn_chart_version }}"
        namespace: "{{ longhorn_namespace }}"
        values: "{{ longhorn_helm_values }}"

      - name: teleport
        helm_chart_name: "{{ teleport_helm_chart_name }}"
        helm_repo_name: "{{ teleport_helm_repo_name }}"
        helm_repo_url: "{{ teleport_helm_repo_url }}"
        chart_version: "{{ teleport_chart_version }}"
        namespace: "{{ teleport_namespace }}"
        values: "{{ teleport_helm_values }}"

      - name: traefik
        helm_chart_name: "{{ traefik_helm_chart_name }}"
        helm_repo_name: "{{ traefik_helm_repo_name }}"
        helm_repo_url: "{{ traefik_helm_repo_url }}"
        chart_version: "{{ traefik_chart_version }}"
        namespace: "{{ traefik_namespace }}"
        values: "{{ traefik_helm_values }}"

      - name: gitlab-runner
        helm_chart_name: "{{ gitlab_runner_helm_chart_name }}"
        helm_repo_name: "{{ gitlab_runner_helm_repo_name }}"
        helm_repo_url: "{{ gitlab_runner_helm_repo_url }}"
        chart_version: "{{ gitlab_runner_chart_version }}"
        namespace: "{{ gitlab_runner_namespace }}"
        values: "{{ gitlab_runner_helm_values }}"

      - name: metrics-server
        helm_chart_name: "{{ metrics_server_helm_chart_name }}"
        helm_repo_name: "{{ metrics_server_helm_repo_name }}"
        helm_repo_url: "{{ metrics_server_helm_repo_url }}"
        chart_version: "{{ metrics_server_chart_version }}"
        namespace: "{{ metrics_server_namespace }}"
        values: "{{ metrics_server_helm_values }}"

      - name: zitadel
        helm_chart_name: "{{ zitadel_helm_chart_name }}"
        helm_repo_name: "{{ zitadel_helm_repo_name }}"
        helm_repo_url: "{{ zitadel_helm_repo_url }}"
        chart_version: "{{ zitadel_chart_version }}"
        namespace: "{{ zitadel_namespace }}"
        values: "{{ zitadel_helm_values }}"

      - name: gitlab
        helm_chart_name: "{{ gitlab_helm_chart_name }}"
        helm_repo_name: "{{ gitlab_helm_repo_name }}"
        helm_repo_url: "{{ gitlab_helm_repo_url }}"
        chart_version: "{{ gitlab_chart_version }}"
        namespace: "{{ gitlab_namespace }}"
        values: "{{ gitlab_helm_values }}"

      # OCI special case — chart_url напрямую, без repo add/update.
      - name: vault-operator
        is_oci: true
        chart_url: "{{ vault_operator_chart }}"
        chart_version: "{{ vault_bank_vaults_chart_version }}"
        namespace: "{{ vault_namespace }}"
        values: "{{ vault_operator_helm_values }}"

  tasks:
    - name: "[helm-test] Ensure rendered values dir exists"
      file:
        path: "{{ rendered_dir }}"
        state: directory
        mode: "0755"

    - name: "[helm-test] Add upstream Helm repos (skip OCI, idempotent)"
      command: >-
        helm repo add {{ item.helm_repo_name | quote }}
        {{ item.helm_repo_url | quote }} --force-update
      loop: "{{ upstream_charts }}"
      loop_control:
        label: "{{ item.helm_repo_name | default(item.name) }}"
      when: not (item.is_oci | default(false))
      changed_when: false

    - name: "[helm-test] helm repo update"
      command: helm repo update
      changed_when: false

    - name: "[helm-test] Render values per upstream chart"
      copy:
        content: "{{ item.values | to_nice_yaml }}"
        dest: "{{ rendered_dir }}/{{ item.name }}.yaml"
        mode: "0644"
      loop: "{{ upstream_charts }}"
      loop_control:
        label: "{{ item.name }}"

    - name: "[helm-test] helm template + kubeconform per chart (handles OCI)"
      shell: |
        set -o pipefail
        helm template {{ item.name | quote }} \
          {{ (item.chart_url if (item.is_oci | default(false)) else item.helm_repo_name + '/' + item.helm_chart_name) | quote }} \
          --version {{ item.chart_version | quote }} \
          --namespace {{ item.namespace | quote }} \
          -f {{ rendered_dir }}/{{ item.name }}.yaml \
        | kubeconform -strict --ignore-missing-schemas -summary
      args:
        executable: /bin/bash
      register: results
      changed_when: false
      failed_when: false
      loop: "{{ upstream_charts }}"
      loop_control:
        label: "{{ item.name }}"

    - name: "[helm-test] Per-chart status"
      debug:
        msg: >-
          {{ 'OK:   ' if r.rc == 0 else 'FAIL: ' }}{{ r.item.name }}
          ({{ (r.item.chart_url if (r.item.is_oci | default(false)) else r.item.helm_repo_name + '/' + r.item.helm_chart_name) }}:{{ r.item.chart_version }})
      loop: "{{ results.results }}"
      loop_control:
        loop_var: r
        label: "{{ r.item.name }}"

    - name: "[helm-test] Aggregate failures"
      assert:
        that:
          - "results.results | selectattr('rc', 'ne', 0) | list | length == 0"
        fail_msg: |
          One or more upstream charts failed validation. Per-chart stdout:
          {% for r in results.results | selectattr('rc', 'ne', 0) %}
          --- {{ r.item.name }} ---
          {{ r.stdout }}
          {{ r.stderr }}
          {% endfor %}
