---
# =============================================================================
# Layer 2: validate upstream Helm charts via helm template + kubeconform.
# =============================================================================
# Steps:
#   PRE    — mock master_manager_fact + ESO secrets/lookups for chart values rendering.
#   STEP 1 — helm repo add (HTTP) или set_fact OCI URL для каждого chart
#            (через tasks-add-helm-repo.yaml).
#   STEP 2 — ensure /tmp dirs (rendered values + templated outputs).
#   STEP 3 — render values per chart (write chart.values to /tmp/values-rendered/<chart>.yaml).
#   STEP 4 — helm template per chart (output to /tmp/helm-templated/<chart>.yaml).
#   STEP 5 — kubeconform per chart (read from /tmp/helm-templated/<chart>.yaml).
#   STEP 6 — print per-chart OK/FAIL.
#   STEP 7 — assert: всё OK / aggregate failures.
# Vars: см. hosts-vars-test/upstream-charts.yaml — auto-loaded via `-i hosts-vars-test/` в Makefile.
# =============================================================================

- name: "[helm-test] Validate upstream charts"
  hosts: localhost
  gather_facts: false
  connection: local

  tasks:
    # -------------------------------------------------------------------------
    # PRE: mocks for production tasks (ESO lookups produce facts used in
    # chart values; master_manager_fact required by tasks-add-helm-repo.yaml).
    # -------------------------------------------------------------------------
    - name: "[helm-test-pre] Set master_manager_fact = localhost (mock for production task delegation)"
      set_fact:
        master_manager_fact: localhost
      tags: [always]

    - name: "[helm-test-pre] Verify Vault config"
      include_tasks: "{{ project_root }}/playbook-app/tasks/vault/tasks-vault-config-verify.yaml"
      vars:
        dto_label_name: "helm-test-pre"
      tags: [always]

    # -------------------------------------------------------------------------
    # STEP 1: helm repo add (HTTP) или set_fact OCI URL per chart.
    # Через tasks-add-helm-repo.yaml — для is_oci=true делает только set_fact,
    # для HTTP — helm repo add + update + set_fact. Output fact name per chart:
    # <chart_name_with_underscores>_helm_chart_source.
    # -------------------------------------------------------------------------
    - name: "[helm-test-step-1] Add Helm repo + export chart-source fact (per chart)"
      include_tasks: "{{ project_root }}/playbook-app/tasks/tasks-add-helm-repo.yaml"
      vars:
        dto_label_name: "helm-test-step-1-{{ chart_item.name }}"
        dto_helm_is_oci: "{{ chart_item.is_oci }}"
        dto_helm_url: "{{ chart_item.helm_url }}"
        dto_helm_chart_version: "{{ chart_item.helm_chart_version }}"
        dto_helm_repo_name: "{{ chart_item.helm_repo_name }}"
        dto_helm_chart_name: "{{ chart_item.helm_chart_name }}"
        dto_helm_chart_source_res_fact_name: "{{ chart_item.name | replace('-', '_') }}_helm_chart_source"
      loop: "{{ upstream_charts }}"
      loop_control:
        loop_var: chart_item
        label: "{{ chart_item.name }}"

    # -------------------------------------------------------------------------
    # STEP 2: ensure /tmp dirs.
    # -------------------------------------------------------------------------
    - name: "[helm-test-step-2] Ensure rendered values + templated dirs"
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ rendered_dir }}"
        - "{{ templated_dir }}"

    # -------------------------------------------------------------------------
    # STEP 3: write chart values to disk per chart.
    # -------------------------------------------------------------------------
    - name: "[helm-test-step-3] Render chart values to {{ rendered_dir }}/<chart>.yaml"
      copy:
        content: "{{ chart_item['values'] | to_nice_yaml }}"
        dest: "{{ rendered_dir }}/{{ chart_item.name }}.yaml"
        mode: "0644"
      loop: "{{ upstream_charts }}"
      loop_control:
        loop_var: chart_item
        label: "{{ chart_item.name }}"

    # -------------------------------------------------------------------------
    # STEP 4: helm template per chart → {{ templated_dir }}/<chart>.yaml.
    # chart-source приходит из dynamic fact (set в STEP 1).
    # -------------------------------------------------------------------------
    - name: "[helm-test-step-4] helm template per chart"
      shell: |
        set -o pipefail
        helm template {{ chart_item.name | quote }} \
          {{ lookup('vars', (chart_item.name | replace('-', '_')) + '_helm_chart_source') | quote }} \
          --version {{ chart_item.helm_chart_version | quote }} \
          --namespace {{ chart_item.namespace | quote }} \
          {% for av in helm_template_api_versions %}--api-versions {{ av | quote }} {% endfor %}\
          -f {{ rendered_dir }}/{{ chart_item.name }}.yaml \
          > {{ templated_dir }}/{{ chart_item.name }}.yaml
      args:
        executable: /bin/bash
      changed_when: false
      register: helm_template_results
      loop: "{{ upstream_charts }}"
      loop_control:
        loop_var: chart_item
        label: "{{ chart_item.name }}"

    # -------------------------------------------------------------------------
    # STEP 5: kubeconform per chart (validate templated output against K8s schemas).
    # -------------------------------------------------------------------------
    - name: "[helm-test-step-5] kubeconform per chart"
      shell: |
        kubeconform -strict --ignore-missing-schemas -summary \
          < {{ templated_dir }}/{{ chart_item.name }}.yaml
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false
      register: kubeconform_results
      loop: "{{ upstream_charts }}"
      loop_control:
        loop_var: chart_item
        label: "{{ chart_item.name }}"

    # -------------------------------------------------------------------------
    # STEP 6: print per-chart status.
    # -------------------------------------------------------------------------
    - name: "[helm-test-step-6] Per-chart status"
      debug:
        msg: >-
          {% if r.rc == 0 -%}
          OK:   {{ r['chart_item'].name }} ({{ lookup('vars', (r['chart_item'].name | replace('-', '_')) + '_helm_chart_source') }}:{{ r['chart_item'].helm_chart_version }})
          {%- else -%}
          FAIL: {{ r['chart_item'].name }} ({{ lookup('vars', (r['chart_item'].name | replace('-', '_')) + '_helm_chart_source') }}:{{ r['chart_item'].helm_chart_version }})
          {%- endif %}
      loop: "{{ kubeconform_results.results }}"
      loop_control:
        loop_var: r
        label: "{{ r['chart_item'].name }}"

    # -------------------------------------------------------------------------
    # STEP 7: aggregate failures (assert all kubeconform calls returned rc=0).
    # -------------------------------------------------------------------------
    - name: "[helm-test-step-7] Aggregate failures"
      assert:
        that:
          - "(kubeconform_results.results | selectattr('rc', 'ne', 0) | list | length) == 0"
        fail_msg: |
          One or more upstream charts failed validation. Per-chart stdout:
          {% for r in kubeconform_results.results | selectattr('rc', 'ne', 0) %}
          --- {{ r['chart_item'].name }} ---
          {{ r.stdout }}
          {{ r.stderr }}
          {% endfor %}
