# =============================================================================
# Список серверов
# Заполни реальными данными
# =============================================================================

all:
  vars:
    # Explicitly set Python interpreter to avoid discovery warnings
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_private_key_file: "~/.ssh/id_rsa" # for all playbooks
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no" # skip host key verification

    # SSH settings
    ssh_public_key_path: "~/.ssh/id_rsa.pub" # for setup-ssh-keys.yaml

    # Path for local helm charts on remote server
    remote_charts_dir: "/opt/helm-charts"

    # LLVM/Clang version for Cilium eBPF
    llvm_version: 20

    # Kubernetes version (MAJOR.MINOR only, without patch)
    k8s_version: "1.34"

    # Kubernetes full version for kubeadm (with patch)
    k8s_full_version: "v1.34.0"

    # Kubeadm config path (used by init-cluster and update-apiserver-sans)
    kubeadm_config_path: "/etc/kubernetes/kubeadm-config.yaml"

    # Containerd version
    containerd_version: "2.2.1"

    # Force regenerate containerd config (set to true to update config after containerd upgrade)
    force_containerd_config_regenerate: false

    # runc version
    runc_version: "1.4.0"

    # CNI plugins version
    cni_plugins_version: "1.9.0"

    # Cluster networking
    service_subnet: "10.128.0.0/12"
    pod_subnet: "10.64.0.0/10"
    dns_domain: "cluster.local"
    node_port_start: 1
    node_port_end: 50000

    # kube-controller-manager settings
    node_monitor_grace_period: "30s" # default: 40s (for faster node failure detection)

    # Node drain settings
    node_drain_timeout: "10m"

    # Watchdog (softdog) for medik8s
    softdog_timeout: 30 # seconds before reboot if not pinged

    # Helm version
    helm_version: "3.19.2"

    # k9s version
    k9s_version: "0.50.18"

    # APT repository packages (required for adding k8s repo)
    apt_repo_package_list:
      - apt-transport-https
      - ca-certificates
      - curl
      - gpg

    # Kubernetes packages
    k8s_package_list:
      - kubelet
      - kubeadm
      - kubectl

    # Kubernetes base kernel modules
    k8s_module_list:
      - overlay
      - br_netfilter

    # Kubernetes sysctl parameters (all must be = 1)
    k8s_sysctl_list:
      - net.bridge.bridge-nf-call-iptables
      - net.bridge.bridge-nf-call-ip6tables
      - net.ipv4.ip_forward

    # Longhorn kernel modules
    longhorn_modules:
      - iscsi_tcp
      - dm_crypt

    # Longhorn required packages
    longhorn_packages:
      - open-iscsi
      - nfs-common
      - cryptsetup
      - dmsetup

    # Cilium kernel modules (ALL are critical)
    cilium_modules:
      - cls_bpf
      - sch_ingress
      - udp_tunnel
      - ip6_udp_tunnel
      - geneve
      - vxlan
      - algif_hash
      - af_alg
      - sch_fq
      - ip_set
      - ip_set_hash_ip
      - xt_set
      - xt_comment
      - xt_TPROXY
      - xt_CT
      - xt_mark
      - xt_socket
      - xfrm_algo
      - xfrm_user
      - esp4
      - esp6
      - ipcomp
      - ipcomp6
      - xfrm4_tunnel
      - xfrm6_tunnel
      - tunnel4
      - tunnel6

    # ------
    # HAProxy API Server LB (static pod)
    # ------
    haproxy_apiserver_lb_image: "haproxy:3.3.1-alpine3.23"
    haproxy_apiserver_lb_host: "127.0.0.1"
    haproxy_apiserver_lb_port: 16443
    haproxy_apiserver_lb_healthz_port: 16444

    # ETCD encryption at rest
    etcd_encryption_resources:
      - secrets
      - configmaps
    etcd_encryption_config_path: "/etc/kubernetes/pki/encryption-config.yaml"
    # ETCD key rotation state files
    etcd_rotation_state_dir: "/etc/kubernetes/pki"
    etcd_rotation_state_step1: "{{ etcd_rotation_state_dir }}/rotation-state-step1.yaml"
    etcd_rotation_state_step2: "{{ etcd_rotation_state_dir }}/rotation-state-step2.yaml"
    etcd_rotation_state_step4: "{{ etcd_rotation_state_dir }}/rotation-state-step4.yaml"

    # Kubelet logging
    kubelet_container_log_max_size: "100Mi"
    kubelet_container_log_max_files: 5

    # CrashLoopBackOff max backoff (1s - 300s) (default 300s = 5min)
    kubelet_crashloop_max_backoff: "2m"

    # ------
    # Kubelet Image Garbage Collection
    # Очистка неиспользуемых Docker/containerd images
    # Docs: https://kubernetes.io/docs/concepts/cluster-administration/kubelet-garbage-collection/
    # ------
    # Процент использования диска, при котором НАЧИНАЕТСЯ очистка images (default: 85)
    kubelet_image_gc_high_threshold: 85
    # Процент использования диска, до которого очищать images (default: 80)
    kubelet_image_gc_low_threshold: 75
    # Минимальное время с последнего использования image перед удалением (default: 2m)
    kubelet_image_minimum_gc_age: "5m"

    # ------
    # Kubelet Eviction — Soft Thresholds
    # Отложенное удаление pods с grace period (SIGTERM)
    # Срабатывает раньше hard, даёт время на graceful shutdown
    # ------
    # Включить soft eviction (default: false в kubernetes)
    kubelet_eviction_soft_enabled: true
    # Минимум свободной RAM для soft eviction (default: не установлен)
    kubelet_eviction_soft_memory_available: "1Gi"
    # Минимум свободного места на root filesystem (default: не установлен)
    kubelet_eviction_soft_nodefs_available: "15%"
    # Минимум свободного места для images (default: не установлен)
    kubelet_eviction_soft_imagefs_available: "15%"

    # ------
    # Kubelet Eviction — Soft Grace Periods
    # Время ожидания перед началом eviction (если ресурс не восстановился)
    # 11:00:00 — memory.available = 900Mi (< 1Gi soft threshold)
    #  ├─ Kubelet обнаруживает нарушение soft threshold
    #  ├─ Нода получает condition: MemoryPressure=True
    #  ├─ Scheduler ПЕРЕСТАЁТ планировать новые pods на эту ноду
    #  └─ Запускается ТАЙМЕР на 2 минуты (grace period)
    # 
    # 11:00:00 - 11:02:00 — ПЕРИОД ОЖИДАНИЯ
    #  ├─ Kubelet продолжает мониторить memory каждые 10 сек
    #  ├─ Pods продолжают работать
    #  └─ Приложения имеют шанс освободить память
    #
    # 11:02:00 — Таймер истёк, проверяем memory
    #  └─ ВАРИАНТ A: memory.available >= 1Gi
    #     ├─ Soft eviction ОТМЕНЯЕТСЯ
    #     ├─ MemoryPressure=False
    #     └─ Scheduler снова планирует pods на эту ноду
    #
    #  └─ ВАРИАНТ B: memory.available всё ещё < 1Gi
    #     ├─ Начинается EVICTION
    #     ├─ Kubelet выбирает pods для удаления (по QoS + usage)
    #     ├─ Pods получают SIGTERM (graceful shutdown)
    #     ├─ Ждёт terminationGracePeriodSeconds (из pod spec)
    #     └─ После graceful shutdown — pod удалён
    # ------
    # Grace period для memory.available
    kubelet_eviction_soft_grace_period_memory: "2m"
    # Grace period для nodefs.available
    kubelet_eviction_soft_grace_period_nodefs: "2m"
    # Grace period для imagefs.available
    kubelet_eviction_soft_grace_period_imagefs: "2m"

    # ------
    # Kubelet Eviction — Hard Thresholds
    # Немедленное удаление pods при критической нехватке ресурсов (SIGKILL)
    # Docs: https://kubernetes.io/docs/concepts/scheduling-eviction/node-pressure-eviction/
    # ------
    # 11:00:00 — memory = 900Mi → Soft eviction таймер запущен
    # 11:00:30 — memory = 400Mi (< 500Mi HARD threshold!)
    #  ├─ HARD eviction срабатывает НЕМЕДЛЕННО
    #  ├─ Soft eviction таймер игнорируется
    #  ├─ Pods получают SIGKILL (без grace period)
    #  └─ Принудительное удаление
    # ------
    # Включить hard eviction (default: true в kubernetes)
    kubelet_eviction_hard_enabled: true
    # Минимум свободной RAM, иначе eviction pods (default: 100Mi)
    kubelet_eviction_hard_memory_available: "500Mi"
    # Минимум свободного места на root filesystem (default: 10%)
    kubelet_eviction_hard_nodefs_available: "10%"
    # Минимум свободных inodes на root filesystem (default: 5%)
    kubelet_eviction_hard_nodefs_inodes_free: "5%"
    # Минимум свободного места для images (default: 15%)
    kubelet_eviction_hard_imagefs_available: "10%"
    # Минимум свободных PID, защита от fork bomb (default: не установлен)
    kubelet_eviction_hard_pid_available: "1000"

    # VPN IPs for vpn-only middleware
    vpn_ips:
      - "1.2.3.4/32"

    # ------
    # CRDs wait configuration (shared for all apps)
    # ------
    crds_wait:
      timeout: "60s"
      retries: 15
      delay: 5

    # ------
    # Cilium
    # ------
    cilium_version: "1.19.1"
    cilium_namespace: "cilium"
    cilium_mask_size: 21 # Cilium IPAM settings (pods per node)
    cilium_hubble_ui_domain: "cilium-hubble-ui-k8s-v2.drawapp.ru" # Hubble UI domain
    cilium_hubble_ui_vpn_only_enabled: false
    cilium_hubble_ui_https_secret_name: "cert-cilium-hubble-ui"
    cilium_hubble_ui_http_enable: false
    cilium_hubble_ui_https_enable: true
    cilium_hubble_ui_cluster_issuer_name: "acme-prod"
    cilium_hubble_ui_ingress_class_name: "traefik-lb"
    cilium_healthz_bind_addr: "0.0.0.0:10256"
    # DaemonSet tolerations (cilium agent - ДОЛЖЕН работать на ВСЕХ нодах)
    cilium_tolerations:
      - operator: "Exists"
    cilium_node_selector: {}
    cilium_resources: {}
    # cilium-envoy DaemonSet tolerations (ДОЛЖЕН работать на ВСЕХ нодах)
    cilium_envoy_tolerations:
      - operator: "Exists"
    cilium_envoy_node_selector: {}
    cilium_envoy_resources: {}
    # Operator tolerations (Deployment) - воспроизводит Helm-дефолт
    cilium_operator_tolerations:
      - operator: "Exists"
    cilium_operator_node_selector: {}
    cilium_operator_resources: {}
    cilium_operator_replicas: 1
    # Hubble Relay tolerations (Deployment)
    cilium_hubble_relay_tolerations: []
    cilium_hubble_relay_node_selector: {}
    cilium_hubble_relay_resources: {}
    cilium_hubble_relay_replicas: 1
    cilium_hubble_relay_affinity: {}
    # Hubble UI tolerations (Deployment)
    cilium_hubble_ui_tolerations: []
    cilium_hubble_ui_node_selector: {}
    cilium_hubble_ui_replicas: 1
    cilium_hubble_ui_affinity: {}
    cilium_hubble_ui_backend_resources: {}
    cilium_hubble_ui_frontend_resources: {}
    # Helm timeouts
    cilium_helm_timeout: "5m"
    cilium_config_helm_timeout: "2m"
    cilium_post_config_helm_timeout: "2m"
    cilium_daemonset_rollout_timeout: "300s"
    cilium_deployment_rollout_timeout: "120s"

    # ------
    # Metrics Server
    # ------
    metrics_server_version: "3.13.0"
    metrics_server_namespace: "metrics-server"
    # ---
    metrics_server_replica_count: 1
    metrics_server_tolerations: []
    metrics_server_node_selector: {}
    metrics_server_affinity: {}
    metrics_server_resources: {}
    # Helm timeouts
    metrics_server_helm_timeout: "5m"
    metrics_server_rollout_timeout: "120s"

    # ------
    # Cert-manager
    # ------
    cert_manager_version: "1.19.2"
    cert_manager_namespace: "cert-manager"
    # Tolerations (Deployments)
    cert_manager_tolerations: []
    cert_manager_node_selector: {}
    cert_manager_affinity: {}
    cert_manager_replica_count: 1
    cert_manager_resources: {}
    # ---
    cert_manager_cainjector_tolerations: []
    cert_manager_cainjector_node_selector: {}
    cert_manager_cainjector_affinity: {}
    cert_manager_cainjector_replica_count: 1
    cert_manager_cainjector_resources: {}
    # ---
    cert_manager_webhook_tolerations: []
    cert_manager_webhook_node_selector: {}
    cert_manager_webhook_affinity: {}
    cert_manager_webhook_replica_count: 1
    cert_manager_webhook_resources: {}
    # ---
    # Job tolerations
    cert_manager_startupapicheck_tolerations: []
    cert_manager_startupapicheck_node_selector: {}
    cert_manager_startupapicheck_affinity: {}
    cert_manager_startupapicheck_resources: {}
    # Cluster issuers
    cert_manager_cluster_issuers:
      - name: "acme-prod"
        email: "some-email-123@gmail.com"
        server: "https://acme-v02.api.letsencrypt.org/directory"
        privateKeySecretName: "cluster-issuer-acme-prod-account-key"
        solvers:
          - ingressClass: "traefik-lb"
            ingressAnnotations:
              "kubernetes.io/ingress.class": "traefik-lb"
              "traefik.ingress.kubernetes.io/router.entrypoints": "web"
            podLabels:
              app.kubernetes.io/name: acme-solver
              app.kubernetes.io/instance: traefik-lb
              app.kubernetes.io/component: acme-http01-solver
              app.kubernetes.io/managed-by: cert-manager
    # Helm timeouts
    cert_manager_helm_timeout: "5m"
    cert_manager_config_helm_timeout: "2m"
    cert_manager_rollout_timeout: "180s"

    # ------
    # External Secrets Operator
    # ------
    external_secrets_namespace: "external-secrets"
    external_secrets_repository: "ghcr.io/external-secrets/external-secrets"
    external_secrets_version: "v1.2.1"
    # Tolerations (Deployments)
    external_secrets_tolerations: []
    external_secrets_node_selector: {}
    external_secrets_affinity: {}
    external_secrets_replica_count: 1
    external_secrets_resources: {}
    # ---
    external_secrets_webhook_tolerations: []
    external_secrets_webhook_node_selector: {}
    external_secrets_webhook_affinity: {}
    external_secrets_webhook_replica_count: 1
    external_secrets_webhook_resources: {}
    # ---
    external_secrets_cert_controller_tolerations: []
    external_secrets_cert_controller_node_selector: {}
    external_secrets_cert_controller_affinity: {}
    external_secrets_cert_controller_replica_count: 1
    external_secrets_cert_controller_resources: {}
    # ESO controller flags
    eso_controller_config:
      client_burst: 200
      concurrent: 10
      enable_managed_secrets_caching: false
      store_requeue_interval: "1m0s"
    # ESO resources global config (SecretStore + ExternalSecret)
    eso_resources_config:
      secret_store_refresh_interval: 60   # int (секунды); SecretStoreSpec.refreshInterval
      external_secret_refresh_interval: "1m"  # string (Golang Duration); ExternalSecretSpec.refreshInterval (default, per-secret override через refresh_interval)
      external_secret_refresh_policy: "Periodic"  # ExternalSecretSpec.refreshPolicy
    # Helm timeouts
    external_secrets_helm_timeout: "5m"
    external_secrets_rollout_timeout: "300s"

    # ------
    # Traefik
    # ------
    traefik_chart_version: "38.0.2"
    traefik_version: "v3.6.2"
    traefik_namespace: "traefik-lb"
    traefik_daemonset_name: "traefik-lb"
    traefik_ingress_class: "traefik-lb"
    traefik_web_entrypoint: "web" # WARNING: DO NOT CHANGE - hardcoded in helm chart
    traefik_websecure_entrypoint: "websecure" # WARNING: DO NOT CHANGE - hardcoded in helm chart
    traefik_dashboard_domain: "traefik-dashboard-k8s-v2.drawapp.ru"
    traefik_dashboard_vpn_only_enabled: false
    traefik_dashboard_https_secret_name: "cert-traefik-dashboard"
    traefik_dashboard_service_name: "traefik-dashboard"
    traefik_dashboard_http_enable: false
    traefik_dashboard_https_enable: true
    traefik_dashboard_cluster_issuer_name: "acme-prod"
    traefik_dashboard_ingress_class_name: "traefik-lb"
    # Tolerations (DaemonSet)
    traefik_tolerations:
      - operator: "Exists"
    traefik_node_selector: {}
    traefik_resources: {}
    # Helm timeouts
    traefik_helm_timeout: "5m"
    traefik_rollout_timeout: "300s"

    # ------
    # HAProxy (Ingress Controller)
    # ------
    haproxy_chart_version: "1.44.0"
    haproxy_namespace: "haproxy-lb"
    haproxy_daemonset_name: "haproxy-lb"
    haproxy_ingress_class: "haproxy-lb"
    # Tolerations (DaemonSet)
    haproxy_tolerations:
      - operator: "Exists"
    haproxy_node_selector: {}
    haproxy_resources: {}
    # Helm timeouts
    haproxy_helm_timeout: "5m"
    haproxy_config_helm_timeout: "2m"
    haproxy_rollout_timeout: "300s"

    # ------
    # OLM v0 (Operator Lifecycle Manager)
    # ------
    olm_namespace: "olm" # DO NOT CHANGE - hardcoded in templates/olm-v0-install.yaml
    olm_operators_namespace: "operators" # DO NOT CHANGE - hardcoded in templates/olm-v0-install.yaml
    olm_helm_timeout: "5m"
    olm_rollout_timeout: "300s"

    # ------
    # medik8s (Node Health Check + Self Node Remediation)
    # ------
    medik8s_watchdog_file_path: "/dev/watchdog"
    medik8s_api_check_interval: "6s"
    medik8s_api_server_timeout: "3s"
    medik8s_max_api_error_threshold: 2
    medik8s_peer_dial_timeout: "3s"
    medik8s_peer_request_timeout: "5s"
    medik8s_peer_update_interval: "15m"
    medik8s_safe_time_to_assume_rebooted: 120
    medik8s_remediation_strategy: "OutOfServiceTaint"
    medik8s_nhc_unhealthy_duration: "15s"
    medik8s_nhc_workers_min_healthy: "51%"
    medik8s_nhc_control_plane_min_healthy: "51%"
    medik8s_config_helm_timeout: "2m"

    # ------
    # Longhorn
    # ------
    longhorn_chart_version: "1.10.1"
    longhorn_namespace: "longhorn-system" # DO NOT CHANGE
    longhorn_ui_domain: "longhorn-ui-k8s-v2.drawapp.ru"
    longhorn_ui_vpn_only_enabled: false
    longhorn_ui_https_secret_name: "cert-longhorn-ui"
    longhorn_ui_http_enable: false
    longhorn_ui_https_enable: true
    longhorn_ui_cluster_issuer_name: "acme-prod"
    longhorn_ui_ingress_class_name: "traefik-lb"
    longhorn_default_class_replica_count: 2
    # ---
    # Tolerations (system-managed: Instance Manager, CSI Driver, Engine Image)
    # Format: "key1=value1:NoSchedule; key2:NoExecute" — special string, NOT a list
    longhorn_system_managed_components_taint_toleration: "node-role.kubernetes.io/control-plane:NoSchedule"
    # Format: "label-key1:label-value1; label-key2:label-value2;" — special string, NOT a list
    longhorn_system_managed_components_node_selector: ""
    # ---
    # Tolerations (user-deployed components)
    longhorn_manager_tolerations:
      - operator: "Exists"
    longhorn_manager_node_selector: {}
    longhorn_manager_resources: {}
    # ---
    longhorn_driver_tolerations:
      - operator: "Exists"
    longhorn_driver_node_selector: {}
    # ---
    longhorn_ui_replicas: 1
    longhorn_ui_affinity: {}
    longhorn_ui_tolerations: []
    longhorn_ui_node_selector: {}
    # ---
    longhorn_storage_classes: []
    # Helm timeouts
    longhorn_helm_timeout: "10m"
    longhorn_config_helm_timeout: "2m"
    longhorn_manager_rollout_timeout: "300s"
    longhorn_ui_rollout_timeout: "120s"

    # ------
    # Vault (HashiCorp)
    # 1 namespace = 1 SA + 1 SecretStore (для ESO)
    # sa_name - это название ServiceAccount (который будет создан в этом namespace)
    # role_name - это название Role (Внутри Vault - auth/kubernetes/role/${role_name})
    # secret_store_name - это название SecretStore (который будет создан в этом namespace)
    # ---
    # secrets - это массив ExternalSecret (который будет создан в этом namespace)
    # name - это название ExternalSecret
    # target_secret - это название секрета в Kubernetes (который будет создан в этом namespace)
    # vault_path - это full path в Vault
    # refresh_interval - опциональное переопределение интервала (иначе используется eso_resources_config.external_secret_refresh_interval)
    # ------
    vault_namespace: "vault"
    vault_image_tag: "1.21.2"
    vault_image_repository: "hashicorp/vault"
    vault_internal_url: "http://vault.vault.svc.cluster.local:8200"
    vault_ui_domain: "vault-k8s-v2.drawapp.ru"
    vault_ui_https_secret_name: "cert-vault-ui"
    vault_ui_vpn_only_enabled: false
    vault_ui_http_enable: false
    vault_ui_https_enable: true
    vault_ui_cluster_issuer_name: "acme-prod"
    vault_ui_ingress_class_name: "traefik-lb"
    vault_storage_class: "lh-major-single-best-effort"
    vault_storage_size: "2Gi"
    # Vault unseal
    vault_key_shares: 3
    vault_key_threshold: 2
    vault_auto_unseal_schedule: "*/5 * * * *"  # CronJob schedule for auto-unseal
    vault_creds_host_path: "/etc/kubernetes/vault-unseal.json"  # Path to credentials file on control-plane nodes
    vault_creds_init_tmp_path: "/etc/kubernetes/vault-creds-init-tmp.json"  # Temp file for interrupted init
    vault_creds_rotate_tmp_path: "/etc/kubernetes/vault-creds-rotate-tmp.json"  # Temp file for interrupted rotate
    # Vault Kubernetes Auth
    vault_kubernetes_host: "https://kubernetes.default.svc:443"
    # Vault KV engines to create (array of mount paths)
    vault_kv_engines:
      - "secret"
      - "eso-secret"
    vault_standalone_config: |
      ui = true
      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }
      storage "raft" {
        path = "/vault/data"
      }
    # ---
    vault_tolerations: []
    vault_resources: {}
    vault_node_selector: {}
    vault_affinity: {}
    # Helm timeouts
    vault_helm_timeout: "5m"
    vault_config_helm_timeout: "2m"
    vault_rollout_timeout: "300s"
    
    # ------
    # GitLab
    # ------
    gitlab_namespace: "gitlab"
    gitlab_chart_version: "8.11.8"  # GitLab 17.11
    # Base domain - используется для генерации внутренних URL (CI/CD переменные, clone URL, webhooks)
    # https: true - потому что внешний трафик приходит по HTTPS (TLS терминируется на Traefik + cert-manager)
    gitlab_ssh_port_external: 3714
    gitlab_ssh_port_internal: 2222 # WARNING: DO NOT CHANGE - hardcoded in charts
    gitlab_base_domain: "gitlab-k8s-v2.drawapp.ru"
    gitlab_ui_domain: "gitlab-k8s-v2.drawapp.ru"
    gitlab_ui_https_secret_name: "cert-gitlab-ui"
    gitlab_registry_domain: "gitlab-registry-k8s-v2.drawapp.ru"
    gitlab_registry_https_secret_name: "cert-gitlab-registry"
    gitlab_pages_domain: "gitlab-pages-k8s-v2.drawapp.ru"
    gitlab_pages_https_secret_name: "cert-gitlab-pages"
    gitlab_minio_console_domain: "gitlab-minio-k8s-v2.drawapp.ru"
    gitlab_minio_console_https_secret_name: "cert-gitlab-minio-console"
    gitlab_minio_api_domain: "gitlab-minio-api-k8s-v2.drawapp.ru"
    gitlab_minio_api_https_secret_name: "cert-gitlab-minio-api"
    # ---
    gitlab_cluster_issuer_name: "acme-prod"
    gitlab_ingress_class_name: "traefik-lb"
    gitlab_external_https: true
    gitlab_ingress_http_enable: false
    gitlab_ingress_https_enable: true
    gitlab_minio_ingress_http_enable: false
    gitlab_minio_ingress_https_enable: true
    gitlab_vpn_only_enabled: false

    # GitLab PostgreSQL
    gitlab_postgresql_image: "postgres:16-alpine"
    gitlab_postgresql_storage_class: "lh-major-multi-best-effort"
    gitlab_postgresql_storage_size: "4Gi"

    # GitLab Redis
    gitlab_redis_image: "redis/redis-stack-server:latest"
    gitlab_redis_storage_class: "lh-major-single-best-effort"
    gitlab_redis_storage_size: "1Gi"

    # GitLab MinIO
    gitlab_minio_image: "minio/minio:latest"
    gitlab_minio_root_user: "admin"
    gitlab_minio_storage_class: "lh-major-single-best-effort"
    gitlab_minio_storage_size: "2Gi"

    # GitLab MinIO S3 connection settings (used by ESO template for gitlab_minio_connection secret)
    gitlab_minio_s3_endpoint: "http://gitlab-minio:9000"
    gitlab_minio_s3_region: "us-east-1"
    gitlab_minio_s3_path_style: true

    # GitLab Registry
    gitlab_registry_tolerations: []
    gitlab_registry_node_selector: {}
    gitlab_registry_resources: {}

    # GitLab Webservice
    gitlab_webservice_tolerations: []
    gitlab_webservice_node_selector: {}
    gitlab_webservice_resources:
      requests:
        memory: "2Gi"
        cpu: "250m"
      limits:
        memory: "4Gi"

    # GitLab Sidekiq
    gitlab_sidekiq_tolerations: []
    gitlab_sidekiq_node_selector: {}
    gitlab_sidekiq_resources:
      requests:
        memory: "1Gi"
        cpu: "250m"
      limits:
        memory: "3Gi"

    # GitLab Shell
    gitlab_gitlab_shell_tolerations: []
    gitlab_gitlab_shell_node_selector: {}
    gitlab_gitlab_shell_resources: {}

    # GitLab Gitaly
    gitlab_gitaly_storage_size: "4Gi"
    gitlab_gitaly_storage_class: "lh-major-single-best-effort"
    gitlab_gitaly_tolerations: []
    gitlab_gitaly_node_selector: {}
    gitlab_gitaly_resources: {}

    # GitLab Exporter
    gitlab_gitlab_exporter_tolerations: []
    gitlab_gitlab_exporter_node_selector: {}
    gitlab_gitlab_exporter_resources: {}

    # GitLab Pages
    gitlab_pages_tolerations: []
    gitlab_pages_node_selector: {}
    gitlab_pages_resources: {}

    # GitLab Toolbox
    gitlab_toolbox_tolerations: []
    gitlab_toolbox_node_selector: {}
    gitlab_toolbox_resources: {}

    # GitLab Migrations
    gitlab_migrations_tolerations: []
    gitlab_migrations_node_selector: {}
    gitlab_migrations_resources: {}

    # Helm timeouts
    gitlab_helm_timeout: "15m"
    gitlab_pre_helm_timeout: "5m"
    gitlab_storage_helm_timeout: "5m"
    gitlab_minio_rollout_timeout: "300s"
    gitlab_rollout_timeout: "600s"
    gitlab_storage_rollout_timeout: "300s"

    # ------
    # ZITADEL (Identity & Access Management)
    # ------
    zitadel_namespace: "zitadel"
    zitadel_chart_version: "8.12.0"
    zitadel_domain: ""
    zitadel_tls_secret_name: "cert-zitadel"
    zitadel_cluster_issuer_name: "acme-prod"
    zitadel_ingress_class_name: "traefik-lb"
    zitadel_http_enabled: false
    zitadel_vpn_only_enabled: false
    # PostgreSQL
    zitadel_postgresql_image: "postgres:16-alpine"
    zitadel_postgresql_storage_class: "lh-major-multi-best-effort"
    zitadel_postgresql_storage_size: "10Gi"
    # ---
    zitadel_resources: {}
    zitadel_node_selector: {}
    zitadel_tolerations: []
    zitadel_affinity: {}
    # Timeouts
    zitadel_helm_timeout: "10m"
    zitadel_pre_helm_timeout: "5m"
    zitadel_storage_helm_timeout: "5m"
    zitadel_rollout_timeout: "300s"
    zitadel_storage_rollout_timeout: "300s"

    # ------
    # GitLab Runner
    # ------
    gitlab_runner_namespace: "gitlab-runner"
    gitlab_runner_chart_version: "0.78.0"  # gitlab-runner 17.11
    # Internal GitLab URL (webservice via cluster DNS, bypasses external ingress)
    gitlab_runner_gitlab_url: "http://gitlab-webservice-default.gitlab.svc.cluster.local:8181"
    # Tolerations (Deployment)
    gitlab_runner_tolerations: []
    gitlab_runner_node_selector: {}
    gitlab_runner_resources: {}
    gitlab_runner_affinity: {}
    # ---
    gitlab_runner_replicas: 3
    gitlab_runner_concurrent: 10
    gitlab_runner_check_interval: 30
    gitlab_runner_memory_request: "256Mi"
    gitlab_runner_cpu_request: "100m"
    gitlab_runner_memory_limit: "512Mi"
    # Prevent runner from being deleted from GitLab on pod termination
    # (preStop lifecycle hook is disabled, runner goes "offline" gracefully)
    gitlab_runner_unregister_runners: false
    gitlab_runner_label_name: "gitlab-runner"
    gitlab_runner_label_component: "runner"
    gitlab_runner_job_label_name: "gitlab-runner-job"
    gitlab_runner_job_label_component: "job"
    gitlab_runner_config: |
      [[runners]]
        executor = "kubernetes"
        shell = "bash"
        environment = ["DOCKER_TLS_CERTDIR=", "DOCKER_HOST=tcp://docker-my-dind:2375"]

        [runners.cache]
          Type = "s3"
          Shared = false

          [runners.cache.s3]
            ServerAddress = "gitlab-minio.{{ gitlab_namespace }}.svc.{{ dns_domain }}:9000"
            Insecure = false
            BucketName = "runner-cache"
            BucketLocation = "{{ gitlab_minio_s3_region }}"
            PathStyle = true

        [runners.kubernetes]
          namespace = "{{ gitlab_runner_namespace }}"
          service_account = "gitlab-runner"
          image = "docker:29.3.0"
          privileged = true
          allow_privilege_escalation = true

          [runners.kubernetes.node_selector]
            "node-role.kubernetes.io/worker" = ""

          [runners.kubernetes.pod_labels]
            "app.kubernetes.io/name"       = "gitlab-runner-job"
            "app.kubernetes.io/component"  = "job"
            "app.kubernetes.io/part-of"    = "gitlab"
            "app.kubernetes.io/managed-by" = "gitlab-runner"

          [[runners.kubernetes.services]]
            name = "docker:29.3.0-dind"
            alias = "docker-my-dind"
            environment = ["HEALTHCHECK_TCP_PORT=2375"]
    # Helm timeouts
    gitlab_runner_helm_timeout: "5m"
    gitlab_runner_rollout_timeout: "180s"

    # ------
    # ArgoCD
    # ------
    argocd_namespace: "argocd" # DO NOT CHANGE - hardcoded in ClusterRoleBindings
    argocd_ui_domain: "argocd-ui-k8s-v2.drawapp.ru"
    argocd_ui_https_secret_name: "cert-argocd-ui"
    argocd_rpc_domain: "argocd-rpc-k8s-v2.drawapp.ru"
    argocd_rpc_https_secret_name: "cert-argocd-rpc"
    argocd_vpn_only_enabled: false
    argocd_cluster_issuer_name: "acme-prod"
    argocd_ingress_class_name: "traefik-lb"
    argocd_http_enable: false
    argocd_https_enable: true
    argocd_reconciliation_timeout: "30s"
    argocd_reconciliation_jitter: "10s"
    argocd_session_duration: "120h"
    argocd_cm_extra:
      timeout.reconciliation: "30s"
      timeout.reconciliation.jitter: "10s"
      users.anonymous.enabled: "false"
      users.session.duration: "120h"
      resource.customizations: |
        networking.k8s.io/Ingress:
          health.lua: |
            hs = {}
            hs.status = "Healthy"
            hs.message = "Skip health check for Ingress"
            return hs
    argocd_cm_cmd_params_extra:
      server.insecure: "true"
    argocd_cm_gpg_keys_extra: {}
    argocd_cm_notifications_extra: {}
    argocd_cm_rbac_extra: {}
    argocd_cm_ssh_known_hosts_extra: []
    argocd_cm_tls_certs_extra: {}
    # Tolerations (все ArgoCD workloads)
    argocd_tolerations: []
    argocd_node_selector: {}
    # Helm timeouts
    argocd_helm_timeout: "5m"
    argocd_components_rollout_timeout: "120s"

    # ------
    # ArgoCD git-ops setup
    # ------
    # Each entry creates one AppProject + one Application in ArgoCD
    # Example in: hosts-extra.yaml.example
    argocd_git_ops_apps: []
    # ---
    argocd_git_ops_install_helm_timeout: "3m"

    # ---------------
    # ---------------
    # ---------------

    # ---------
    # ESO VAULT INTEGRATIONS (per-component)
    # Каждый объект = конфиг SecretStore (SA, role, store name, kv engine)
    # Секреты — в отдельном массиве *_secrets (расширяемом через *_secrets_extra в hosts-extra.yaml)
    # eso_vault_integration_XXX — не расширяется через extra
    # ---------

    # ---------
    # Traefik
    # ---------
    eso_vault_integration_traefik:
      sa_name: "eso-main" # Название ServiceAccount в namespace traefik-lb
      role_name: "traefik.eso-main" # {namespace}.{sa_name} Название Role в traefik-lb
      secret_store_name: "eso-main.vault" # {sa_name}.{PROVIDER} Название SecretStore в namespace traefik-lb
      kv_engine_path: "eso-secret" # Название KV Engine в Vault

    eso_vault_integration_traefik_secrets: []
    eso_vault_integration_traefik_secrets_extra: []

    # ---------
    # HAProxy
    # ---------
    eso_vault_integration_haproxy:
      sa_name: "eso-main"
      role_name: "haproxy.eso-main"
      secret_store_name: "eso-main.vault"
      kv_engine_path: "eso-secret"

    eso_vault_integration_haproxy_secrets: []
    eso_vault_integration_haproxy_secrets_extra: []

    # ---------
    # Longhorn (S3 backup credentials)
    # ---------
    eso_vault_integration_longhorn:
      sa_name: "eso-main"
      role_name: "longhorn.eso-main"
      secret_store_name: "eso-main.vault"
      kv_engine_path: "eso-secret"

    eso_vault_integration_longhorn_secrets: []  # S3-backup secrets определяются в hosts-extra.yaml (eso_vault_integration_longhorn_secrets_extra)
    eso_vault_integration_longhorn_secrets_extra: []

    # ---------
    # GitLab (all secrets: postgresql, redis, minio, gitlab root)
    # ---------
    eso_vault_integration_gitlab:
      sa_name: "eso-main"
      role_name: "gitlab.eso-main"
      secret_store_name: "eso-main.vault"
      kv_engine_path: "eso-secret"

    eso_vault_integration_gitlab_secrets:
      - external_secret_name: "eso-gitlab-postgresql"
        target_secret_name: "eso-gitlab-postgresql"
        vault_path: "/gitlab/postgresql/creds"
        type: "postgresql"
      - external_secret_name: "eso-gitlab-redis"
        target_secret_name: "eso-gitlab-redis"
        vault_path: "/gitlab/redis/creds"
        type: "redis"
      - external_secret_name: "eso-gitlab-minio-root"
        target_secret_name: "eso-gitlab-minio-root"
        vault_path: "/gitlab/minio/root"
        type: "minio_root"
      - external_secret_name: "eso-gitlab-minio-registry"
        target_secret_name: "eso-gitlab-minio-registry"
        vault_path: "/gitlab/minio/registry"
        type: "minio_registry"
      # SPECIAL: gitlab_registry_minio_connection uses ESO template to generate registry storage config
      - external_secret_name: "eso-gitlab-registry-minio-connection"
        target_secret_name: "eso-gitlab-registry-minio-connection"
        vault_path: "/gitlab/minio/registry"
        type: "gitlab_registry_minio_connection"
      # SPECIAL: gitlab_minio_connection uses ESO template to generate s3_connection YAML
      - external_secret_name: "eso-gitlab-minio-connection"
        target_secret_name: "eso-gitlab-minio-connection"
        vault_path: "/gitlab/minio/registry"
        type: "gitlab_minio_connection"
      - external_secret_name: "eso-gitlab-root"
        target_secret_name: "eso-gitlab-root"
        vault_path: "/gitlab/root/creds"
        type: "gitlab_root"
        is_need_eso: false  # vault-only: root creds stored in Vault, no k8s Secret needed
    
    eso_vault_integration_gitlab_secrets_extra: []

    # ---------
    # GitLab Runner
    # ---------
    eso_vault_integration_gitlab_runner:
      sa_name: "eso-main"
      role_name: "gitlab-runner.eso-main"
      secret_store_name: "eso-main.vault"
      kv_engine_path: "eso-secret"

    eso_vault_integration_gitlab_runner_secrets:
      - external_secret_name: "eso-gitlab-runner-token"
        target_secret_name: "eso-gitlab-runner-token"
        vault_path: "/gitlab-runner/token"
        type: "runner_token"
      - external_secret_name: "eso-gitlab-runner-minio-cache"
        target_secret_name: "eso-gitlab-runner-minio-cache"
        vault_path: "/gitlab-runner/minio/cache"
        type: "minio_runner_cache"

    eso_vault_integration_gitlab_runner_secrets_extra: []

    # ---------
    # ZITADEL (postgresql + masterkey)
    # ---------
    eso_vault_integration_zitadel:
      sa_name: "eso-main"
      role_name: "zitadel.eso-main"
      secret_store_name: "eso-main.vault"
      kv_engine_path: "eso-secret"

    eso_vault_integration_zitadel_secrets:
      - external_secret_name: "eso-zitadel-postgresql"
        target_secret_name: "eso-zitadel-postgresql"
        vault_path: "/zitadel/postgresql/creds"
        type: "postgresql"
      - external_secret_name: "eso-zitadel-masterkey"
        target_secret_name: "eso-zitadel-masterkey"
        vault_path: "/zitadel/masterkey"
        type: "masterkey"

    eso_vault_integration_zitadel_secrets_extra: []

    # ---------
    # ArgoCD (SSH repo-creds)
    # ---------
    eso_vault_integration_argocd:
      sa_name: "eso-main"
      role_name: "argocd.eso-main"
      secret_store_name: "eso-main.vault"
      kv_engine_path: "eso-secret"

    eso_vault_integration_argocd_secrets:
      - external_secret_name: "eso-argocd-root"
        target_secret_name: "eso-argocd-root"
        vault_path: "/argocd/root/creds"
        type: "argocd_root"
        is_need_eso: false  # vault-only: root creds stored in Vault, no k8s Secret needed

    eso_vault_integration_argocd_secrets_extra: []

    # ---------
    # ArgoCD Git-Ops ESO (SSH/HTTPS repo-creds, helm repos)
    # Отдельный SA eso-argocd-git-ops в namespace argocd
    # Развёртывается через argocd-git-ops/pre при установке argocd-git-ops-install.yaml
    # ---------
    eso_vault_integration_argocd_git_ops:
      sa_name: "eso-git-ops"
      role_name: "argocd.eso-git-ops"
      secret_store_name: "eso-git-ops.vault"
      kv_engine_path: "eso-secret"

    eso_vault_integration_argocd_git_ops_secrets: []
    eso_vault_integration_argocd_git_ops_secrets_extra: []

    # ---------
    # VAULT POLICIES
    # Политики для ESO SA + административные политики Vault
    # ---------
    vault_policies_extra: []
    vault_policies:
      # ---------
      # ESO: Traefik
      # ---------
      - name: traefik.eso-main
        paths:
          - path: eso-secret/data/traefik/*
            capabilities: [read, list]
          - path: eso-secret/metadata/traefik/*
            capabilities: [read, list]
      # ---------
      # ESO: HAProxy
      # ---------
      - name: haproxy.eso-main
        paths:
          - path: eso-secret/data/haproxy/*
            capabilities: [read, list]
          - path: eso-secret/metadata/haproxy/*
            capabilities: [read, list]
      # ---------
      # ESO: Longhorn
      # ---------
      - name: longhorn.eso-main
        paths:
          - path: eso-secret/data/longhorn/*
            capabilities: [read, list]
          - path: eso-secret/metadata/longhorn/*
            capabilities: [read, list]
      # ---------
      # ESO: GitLab
      # ---------
      - name: gitlab.eso-main
        paths:
          - path: eso-secret/data/gitlab/*
            capabilities: [read, list]
          - path: eso-secret/metadata/gitlab/*
            capabilities: [read, list]
      # ---------
      # ESO: GitLab Runner
      # ---------
      - name: gitlab-runner.eso-main
        paths:
          - path: eso-secret/data/gitlab-runner/*
            capabilities: [read, list]
          - path: eso-secret/metadata/gitlab-runner/*
            capabilities: [read, list]
      # ---------
      # ESO: ZITADEL
      # ---------
      - name: zitadel.eso-main
        paths:
          - path: eso-secret/data/zitadel/*
            capabilities: [read, list]
          - path: eso-secret/metadata/zitadel/*
            capabilities: [read, list]
      # ---------
      # ESO: ArgoCD
      # ---------
      - name: argocd.eso-main
        paths:
          - path: eso-secret/data/argocd/*
            capabilities: [read, list]
          - path: eso-secret/metadata/argocd/*
            capabilities: [read, list]
      # ---------
      # ESO: ArgoCD Git-Ops
      # ---------
      - name: argocd.eso-git-ops
        paths:
          - path: eso-secret/data/argocd/*
            capabilities: [read, list]
          - path: eso-secret/metadata/argocd/*
            capabilities: [read, list]
      # ---------
      # Vault Admin (full access for vault-admin SA, used by Ansible for writing secrets)
      # ---------
      - name: vault-admin
        paths:
          - path: secret/data/*
            capabilities: [create, read, update, delete, list]
          - path: secret/metadata/*
            capabilities: [create, read, update, delete, list]
          - path: eso-secret/data/*
            capabilities: [create, read, update, delete, list]
          - path: eso-secret/metadata/*
            capabilities: [create, read, update, delete, list]
          - path: sys/policies/acl/*
            capabilities: [create, read, update, delete, list]
          - path: auth/*
            capabilities: [create, read, update, delete, list]

    # ---------
    # VAULT ROLES
    # ---------
    vault_roles_extra: []
    vault_roles:
      # ---------
      # ESO: Traefik
      # ---------
      - name: traefik.eso-main
        namespace: traefik-lb
        sa_name: eso-main
        policies:
          - traefik.eso-main
      # ---------
      # ESO: HAProxy
      # ---------
      - name: haproxy.eso-main
        namespace: haproxy-lb
        sa_name: eso-main
        policies:
          - haproxy.eso-main
      # ---------
      # ESO: Longhorn
      # ---------
      - name: longhorn.eso-main
        namespace: longhorn-system
        sa_name: eso-main
        policies:
          - longhorn.eso-main
      # ---------
      # ESO: GitLab
      # ---------
      - name: gitlab.eso-main
        namespace: gitlab
        sa_name: eso-main
        policies:
          - gitlab.eso-main
      # ---------
      # ESO: GitLab Runner
      # ---------
      - name: gitlab-runner.eso-main
        namespace: gitlab-runner
        sa_name: eso-main
        policies:
          - gitlab-runner.eso-main
      # ---------
      # ESO: ZITADEL
      # ---------
      - name: zitadel.eso-main
        namespace: zitadel
        sa_name: eso-main
        policies:
          - zitadel.eso-main
      # ---------
      # ESO: ArgoCD
      # ---------
      - name: argocd.eso-main
        namespace: argocd
        sa_name: eso-main
        policies:
          - argocd.eso-main
      # ---------
      # ESO: ArgoCD Git-Ops
      # ---------
      - name: argocd.eso-git-ops
        namespace: argocd
        sa_name: eso-git-ops
        policies:
          - argocd.eso-git-ops
      # ---------
      # Vault Admin (for writing secrets from Ansible)
      # ---------
      - name: vault-admin
        namespace: vault
        sa_name: vault-admin
        policies:
          - vault-admin

  children:
    managers:
      hosts:
        # k8s-manager-1:
        #   ansible_host: 89.169.175.229
        #   ansible_user: ubuntu
        #   ansible_password: "some-password-123"
        #   new_hostname: k8s-manager-1
        #   is_master: true
        #   # internal_ip - internal network interface IP (same as api_server_advertise_address for managers)
        #   internal_ip: "10.129.0.26"
        #   # api_server_advertise_address - IP for kube-apiserver to listen on and advertise to cluster
        #   # BareMetal: usually same as ansible_host (public IP)
        #   # Cloud (AWS/Yandex): usually private VPC IP (check with: ip route get 1)
        #   api_server_advertise_address: "10.129.0.26"
        #   api_server_bind_port: 6443
        #   longhorn_node_tags:
        #     - "lh-manager"
        #     - "lh-major"

    workers:
      hosts:
        # k8s-worker-1:
        #   ansible_host: 89.169.185.44
        #   ansible_user: ubuntu
        #   ansible_password: "some-password-789"
        #   new_hostname: k8s-worker-1
        #   internal_ip: "10.129.0.27"
        #   node_labels:
        #     - "node-role.kubernetes.io/worker="
        #   longhorn_node_tags:
        #     - "lh-worker"
        #     - "lh-major"
        #     - "lh-minor"

        # k8s-worker-2:
